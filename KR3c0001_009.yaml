body:
  text: 霸形第二十二內言五桓公在位管仲隰朋見立有閒有二鴻飛而過之桓公嘆曰仲父今彼鴻鵠有時而南有時而北有時而往有時而來四方無遠所欲至而至焉非唯有羽翼之故是以能通其意於天下乎管仲隰朋不對桓公曰二子何故不對管子對曰君有霸王之心而夷吾非霸王之臣也是以不敢對桓公曰仲父胡為然盍不當言寡人其有鄉乎寡人之有仲父也猶飛鴻之有羽翼也若濟大水有舟楫也仲父不一言教寡人寡人之有耳將安聞道而得度哉管子對曰君若將欲霸王舉大事乎則必從其本事矣桓公變躬遷席拱手而問曰敢問何謂其本管子對曰齊國百姓公之本也人甚憂飢而稅斂重人甚懼死而刑政險人甚傷勞而上舉事不時公輕其稅斂則人不憂飢緩其刑政則人不懼死舉事以時則人不傷勞桓公曰寡人聞仲父之言此三者聞命矣不敢擅也將薦之先君於是令百官有司削方墨筆明日皆朝於太廟之門朝定令於百吏使稅者百一鍾孤幼不刑澤梁時縱關譏而不征市書而不賦近者示之以忠信遠者示之以禮義行此數年而民歸之如流水此其後宋伐杞狄伐邢衛桓公不救裸體紉胸稱疾召管仲曰寡人有千歲之食而無百歲之壽今有疾病姑樂乎管子曰諾於是令之縣鍾磬之榬陳歌舞竽瑟之樂日殺數十牛者數旬群臣進諫曰宋伐杞狄伐邢衛君不可不救桓公曰寡人有千歲之食而無百歲之壽今又疾病姑樂乎且彼非伐寡人之國也伐鄰國也子無事焉宋已取杞狄已拔邢衛矣桓公起行筍虡之閒管子從至大鍾之西桓公南面而立管仲北鄉對之大鍾鳴桓公親管子曰樂夫仲父管子對曰此臣之所謂哀非樂也臣聞之古者之言樂於鍾磬之閒者不如此言脫於口而令行乎天下游鍾磬之閒而無四面兵革之憂今君之事言脫於口令不得行於天下在鍾磬之閒而有四面兵革之憂此臣之所謂哀非樂也桓公曰善於是伐鍾磬之縣併歌舞之樂宮中虛無人桓公曰寡人以伐鍾磬之縣併歌舞之樂矣請問所始於國將為何行管子對曰宋伐杞狄伐邢衛而君之不救也臣請以慶臣聞之諸侯爭於彊者勿與分於彊今君何不定三君之處哉於是桓公曰諾因命以車百乘卒千人以緣陵封杞車百乘卒千人以夷儀封邢車五百乘卒五千人以楚丘封衛桓公曰寡人以定三君之居處矣今又將何行管子對曰臣聞諸侯貪於利勿與分於利君何不發虎豹之皮文錦以使諸侯令諸侯以縵帛鹿皮報桓公曰諾於是以虎豹皮文錦使諸侯諸侯以縵帛鹿皮報則令固始行於天下矣此其後楚人攻宋鄭燒𤋲熯焚鄭地使城壞者不得復築也屋之燒者不得復葺也令其人有喪雌雄居室如鳥鼠處穴要宋田夾塞兩川使水不得東流東山之西水深滅垝四百里而後可田也楚欲吞宋鄭而畏齊思人衆兵彊能害己者必齊也於是乎楚王號令於國中曰寡人之所明於人君者莫如桓公所賢於人臣者莫如管仲明其君而賢其臣寡人願事之誰能為我交齊者寡人不愛封侯之君焉於是楚國之賢士皆抱其重寶幣帛以事齊桓公之左右無不受重寶幣帛者於是桓公召管仲曰寡人聞之善人者人亦善之今楚王之善寡人一甚矣寡人不善將拂於道仲父何不遂交楚哉管子對曰不可楚人攻宋鄭燒𤋲熯焚鄭地使城壞者不得復築也屋之燒者不得復葺也令人有喪雌雄居室如鳥鼠處穴要宋田夾塞兩川使水不得東流東山之西水深滅垝四百里而后可田也楚欲吞宋鄭思人衆兵彊而能害己者必齊也是欲以文克齊而以武取宋鄭也楚取宋鄭而不止禁是失宋鄭也禁之則是又不信於楚也知失於內兵困於外非善舉也桓公曰善然則若何管子對曰請興兵而南存宋鄭而令曰無攻楚言與楚王遇至於遇上而以鄭城與宋水為請楚若許則是我以文令也楚若不許則遂以武令焉桓公曰善於是遂興兵而南存宋鄭與楚王遇於召陵之上而令於遇上曰毋貯粟毋曲隄無擅廢適子無置妾以為妻因以鄭城與宋水為請於楚楚人不許遂退七十里而舍使軍人城鄭南之地立百代城焉曰自此而北至於河者鄭自城之而楚不敢隳也東發宋田夾兩川使水復東流而楚不敢塞也遂南伐楚踰方城濟於汝水望汶山南致吳越之君而西伐秦北伐狄東存晉公於南北伐孤竹還存燕公兵車之會六乘車之會三九合諸侯反位已霸修鍾磬而復樂管子曰此臣之所謂樂也霸言第二十三內言六霸王之形象天則地化人易代創制天下等列諸侯賓屬四海時匡天下大國小之曲國正之彊國弱之重國輕之亂國并之暴王殘之僇其罪卑其列維其民然后王之夫豐國之謂霸兼正之國之謂王夫王者有所獨明德共者不取也道同者不王也夫爭天下者以威易危暴王之常也君人者有道霸王者有時國修而鄰國無道霸王之資也夫國之存也鄰國有焉國之亡也鄰國有焉鄰國有事鄰國得焉鄰國有事鄰國亡焉天下有事則聖王利也國危則聖人知矣夫先王所以王者資鄰國之舉不當也舉而不當此鄰敵之所以得意也夫欲用天下之權者必先布德諸侯是故先王有所取有所與有所詘有所信然後能用天下之權夫兵幸於權權幸於地故諸侯之得地利者權從之失地利者權去之夫爭天下者必先爭人明大數者得人審小計者失人得天下之衆者王得其半者霸是故聖王卑禮以下天下之賢而壬之均分以釣天下之衆而臣之故貴為天子富有天下而世不謂貪者其大計存也以天下之財利天下之人以明威之振合天下之權以遂德之行結諸侯之親以姦佞之罪刑天下之心因天下之威以廣明王之伐攻逆亂之國賞有功之勞封賢聖之德明一人之行而百姓定矣夫先王取天下也術術乎大德哉物利之謂也夫使國常無患而名利並至者神聖也國在危亡而能壽者明聖也是故先王之所師者神聖也其所賞者明聖也夫一言而壽國不聽而國亡若此者大聖之言也夫明王之所輕者馬與玉其所重者政與軍若失主不然輕與人政而重豫人馬輕豫人軍而重豫人玉重宮門之營而輕四竟之守所以削也夫權者神聖之所資也獨明者天下之利器也獨斷者微密之營壘也此二者聖人之所則也聖人畏微而愚人畏明聖人之憎惡也內愚人之憎惡也外聖人將動必知愚人至危勿辭聖人能輔時不能違時知者善謀不如當時精時者日少而功多夫謀無主則困事無備則廢是以聖王務具其備而慎守其時以備待時以時興事時至而舉兵絶堅而攻國破大而制地大本而小摽地近而攻遠以大牽小以彊使弱以衆致寡德利百姓威振天下令行諸侯而不拂近無不服遠無不聽夫明王為天下正理也案彊助弱圉暴止貪存亡定危繼絶世此天下之所載也諸侯之所與也百姓之所利也是故天下王之知蓋天下斷最一世材振四海王之佐也千乘之國得其守諸侯可得而臣天下可得而有也萬乘之國失其守國非其國也天下皆治己獨亂國非其國也諸侯皆合己獨孤國非其國也鄰國皆險己獨易國非其國也此三者亡國之徵也夫國大而政小者國從其政國小而政大者國益大大而不為者復小彊而不治者復弱衆而不治者復寡貴而無禮者復賤重而凌節者復輕富而驕肆者復貧故觀國者觀君觀軍者觀將觀備者觀野其君如明而非明也其將如賢而非賢也其人如耕者而非耕也三守既失國非其國也地大而不為命曰土滿人衆而不治命曰人滿兵威而不正命曰武滿三滿而不止國非其國也地大而不耕非其地也卿貴而不臣非其卿也人衆而不親非其人也夫無土而欲富者憂無德而欲王者危施薄而求厚者孤夫上夾而下苴國小而都大者弒主尊臣卑上威下敬令行人服治之至也使天下兩天子天下不可治也一國而兩君一國不可治也一家而兩父一家不可治也夫令不高不行不搏不聽堯舜之人非生而治也桀紂之人非生而亂也故治亂在上也夫霸王之所始也以人為本本治則國固本亂則國危故上明則下敬政平則人安士教和則兵勝敵使能則百事治親仁則上不危任賢則諸侯服霸王之形德義勝之智謀勝之兵戰勝之地形勝之動作勝之故王之夫善用國者因其大國之重以其勢小之因彊國之權以其勢弱之因重國之形以其勢輕之彊國衆合彊以攻弱以圖霸彊國少合小以攻大以圖王彊國衆而言王勢者愚人之智也彊國少而施霸道者敗事之謀也夫神聖視天下之形知動靜之時視先後之稱知禍福之門彊國衆先舉者危後舉者利彊國少先舉者王後舉者亡戰國衆後舉可以霸戰國少先舉可以王夫王者之心方而不最列不讓賢賢不齒弟擇衆是貪大物也是以王之形大也夫先王之爭天下也以方正其立之也以整齊其理之也以平易立政出令用人道施爵祿用地道舉大事用天道是故先王之伐也伐逆不伐順伐險不伐易伐過不伐及四封之內以正使之諸侯之會以權致之近而不服者以地患之遠而不聽者以形危之二而伐之武也服而舍之文也文武具滿德也夫輕重彊弱之形諸侯合則彊孤則弱驥之材而百馬代之驥必罷矣彊最一代而天下攻之國必弱矣彊國得之也以收小其失之也以恃彊小國得之也以制節其失之也以離彊夫國小大有謀彊弱有形服近而彊遠王國之形也合小以攻大敵國之形也以負海攻負海中國之形也折節事彊以避罪小國之形也自古以至今未嘗有能先作難違時易形以立功名者無有常先作難違時易形而不敗者也夫欲臣伐君正四海者不可以兵獨攻而取也必先定謀慮便地形利權稱親與國視時而動王者之術也夫先王之伐也舉之必義用之必暴相形而知可量力而知攻考得而知時是故先王之伐也必先戰而后攻先攻而后取地故善攻者料衆以攻衆料食以攻食料備以攻備以衆攻衆衆存不攻以食攻食食存不攻以備攻備備存不攻釋實而攻虛釋堅而攻膬釋難而攻易夫摶國不在敦古治世不在善故霸王不在成典夫舉失而國危刑過而權倒謀易而禍及計得而彊信功得而名從權重而令行固其數也夫爭彊之國必先爭謀爭刑爭權令人主一喜一怒者謀也令國一輕一重者形也令兵一進一退者權也故精於謀則人主之願可得而令可行也精於形則大國之地可奪彊國之兵可圉也精於權則天下之兵可齊諸侯之君可朝也夫神聖視天下之形知世之所謀知兵之所攻知地之所歸知令之所加矣夫兵攻所憎而利之此鄰國之所不親也權動所惡而實寡歸者彊擅破一國彊在後世者王擅破一國彊在鄰國者亡問第二十四內言七凡立朝廷問有本紀爵授有德則大臣興義祿豫有功則士輕死節上帥士以人之所戴則上下和授事以能則人上功審刑當罪則人不易訟無亂社稷宗廟則人有所宗毋遺老忘親則大臣不怨舉知人急則衆不亂行此道也國有常經人知終始此霸王之術也然後問事事先大功政自小始問死事之孤其未有田宅者有乎門少壯而未勝甲兵者幾何人問死事之寡其餼廩何如問國之有功大者何官之吏也問州之大夫也何里之士也今吏亦何以明之矣問刑論有常以行不可改也今其事之久留也何若問五官有度制官都其有常斷今事之稽也何待問獨夫寡婦孤窮疾病者幾何人也問國之棄人何族之子弟也問鄉之良家其所牧養者幾何人矣問邑之貧人債而食者幾何家問理園圃而食者幾何家人之開田而耕者幾何家士之身耕者幾何家問鄉之貧人何族之別也問宗子之收昆弟者以貧從昆弟者幾何家餘子仕而有田邑今入者幾何人子弟以孝聞於鄉里者幾何人餘子父母存不養而出離者幾何人士之有田而不使者幾何人吏惡何事士之有田而不耕者幾何人身何事群臣有位而未有田者幾何人外人之來從而未有田宅者幾何家國子弟之游于外者幾何人貧士之受責於大夫者幾何人官賤行賈身出以家臣自代者幾何人官丞吏之無田餼而徒理事者幾何人群臣有位事官大夫者幾何人外人來游在大夫之家者幾何人鄉子弟力田為人率者幾何人國子弟之無上事衣食不節率子弟不田弋獵者幾何人男女不整齊亂鄉子弟者有乎問人之貸粟米有別券者幾何家問國之伏利其可應人之急者幾何所也人之所害於鄉里者何物也問士之有田宅身在陳列者幾何人餘子之勝甲兵有行伍者幾何人問男女有巧伎能利備用者幾何人處女操工事者幾何人問國所開口而食者幾何人問一民有幾人之食也問兵車之計幾何乘也牽家馬軛家車者幾何乘處士修行足以教人可使帥衆蒞百姓者幾何人士之急難可使者幾何人工之巧出足以利軍伍處可以修城郭補守備者幾何人城粟軍糧其可以行幾何年也吏之急難可使者幾何人大夫疏器甲兵兵車旌旗鼓鐃帷幕帥車之載幾何乘疏藏器弓弩之張夾錟之衣鉤弦之造戈戟之繄其厲何若其宜修而不修者故何視而造修之官出器處器之具宜起而未起者何待鄉帥車輜造修之具其繕何若工尹伐材用毋於三時群材乃植而造器定冬完良備用必足人有餘兵詭陳之行以慎國常時簡稽帥馬牛之肥膌其老而死者皆舉之其就山藪林澤食薦者幾何出入死生之會幾何若夫城郭之厚薄溝壑之淺深門閭之尊卑宜修而不修者上必幾之守備之伍器物不失其具淫雨而各有處藏問兵官之吏國之豪士其急難足以先後者幾何人夫兵事者危物也不時而勝不義而得未為福也失謀而敗國之危也慎謀乃保國問所以教選人者何事問執官都者其位事幾何年矣所辟草萊有益於家邑者幾何矣所封表以益人之生利者何物也所築城郭修牆閈絶通道深厄門闕溝防以益人之地守者何所也所捕盜賊除人害者幾何矣制地君曰理國之道地德為首君臣之禮父子之親覆育萬人官府之藏彊兵保國城郭之險外應四極具取之地而市者天地之財具也而萬人之所和而利也正是道也民荒無苛人盡地之職一保其國各主異位毋使讒人亂𤾕而德營九軍之親關者諸侯之陬隧也而外財之門戶也萬人之道行也明道以重告之征於關者勿征於市征於市者勿征於關虛車勿索徒負勿入以來遠人十六道同身外事謹則聽其名視其色是其事稽其德以觀其外則無敦於權人以困貌德國則不惑行之職也問於邊吏曰小利害信小怒傷義邊信傷德厚和構四國以順完德后鄉四極令守法之官曰行度必明無失經常謀失第二十五篇亡
