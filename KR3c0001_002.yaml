body:
  text: 七法第六經言六言是而不能立言非而不能廢有功而不能賞有罪而不能誅若是而能治民者未之有也是必立非必廢有功必賞有罪必誅若是安治矣未也是何也曰形勢器械未具猶之不治也形勢器械具四者備治矣不能治其民而能強其兵者未之有也能治其民矣而不明于為兵之數猶之不可不能強其兵而能必勝敵國者未之有也能強其兵而不明于勝敵國之理猶之不勝也兵不必勝敵國而能正天下者未之有也兵必勝敵國矣而不明正天下之分猶之不可故曰治民有器為兵有數勝敵國有理正天下有分則象法化決塞心術計數根天地之氣寒暑之和水土之性人民鳥獸草木之生物雖甚多皆有均焉而未嘗變也謂之則義也名也時也似也類也比也狀也謂之象尺寸也繩墨也規矩也衡石也斗斛也角量也謂之法漸也順也靡也久也服也習也謂之化豫奪也險易也利害也難易也開閉也殺生也謂之決塞實也誠也厚也施也度也恕也謂之心術剛柔也輕重也大小也實虛也遠近也多少也謂之計數不明於則而欲錯儀畫制猶立朝夕於運均之上搖竿而欲定其末不明於象而欲論材審用猶絶長以為短續短以為長不明於法而欲治民一衆猶左書而右息之不明於化而欲變俗易教猶朝揉輪而夕欲乘車不明於決塞而欲歐衆移民猶使水逆流不明於心術而欲行令於人猶倍招而必射之不明於計數而欲舉大事猶無舟楫而欲經於水險也故曰錯儀畫制不知則不可論材審用不知象不可治民一衆不知法不可變俗易教不知化不可驅衆移民不知決塞不可布令必行不知心術不可舉事必成不知計數不可右七法百匿傷上威姦吏傷官法姦民傷俗教賊盜傷國衆威傷則重在下法傷則貨上流教傷則從令者不輯衆傷則百姓不安其居重在下則令不行貨上流則官德毀從令者不輯則百事無功百姓不安其居則輕民處而重民散輕民處重民散則地不辟地不辟則六畜不育六畜不育則國貧而用不足國貧而用不足則兵弱而士不厲兵弱而士不厲則戰不勝而守不固戰不勝而守不固則國不安矣故曰常令不審則百匿勝官爵不審則姦吏勝符籍不審則姦民勝刑法不審則盜賊勝國之四經敗人君泄見危人君泄則言實之士不進言實之士不進則國之情偽不竭于上世主所貴者寶也所親者戚也所愛者民也所重者爵祿也明君則不然致所貴非寶也致所親非戚也致所愛非民也致所重非爵祿也故不為重寶虧其命故曰令貴於寶不為愛親危其社稷故曰社稷親於戚不為愛人枉其法故曰法愛於人不為重祿爵分其威故曰威重於爵祿不通此四者則反於無有故曰治人如治水潦養人如養六畜用人如用草木居身論道行理則群臣服教百吏嚴斷莫敢開私焉論功計勞未嘗失法律也便辟左右大族尊貴大臣不得增其功焉疏遠卑賤隱不知之人不忘其勞故有罪者不怨上受賞者無貪心則列陳之士皆輕其死而安難以要上事為兵之極也右百匿四傷為兵之數存乎聚財而財無敵存乎論工而工無敵存乎制器而器無敵存乎選士而士無敵存乎政教而政教無敵存乎服習而服習無敵存乎遍知天下而遍知天下無敵存乎明於機數而明於機數無敵故兵未出境而無敵者八是以欲正天下財不蓋天下不能正天下財蓋天下而工不蓋天下不能正天下工蓋天下而器不蓋天下不能正天下器蓋天下而士不蓋天下不能正天下士蓋天下而教不蓋天下不能正天下教蓋天下而習不蓋天下不能正天下習蓋天下而不遍知天下不能正天下遍知天下而不明於機數不能正天下故明於機數者用兵之勢也大者時也小者計也王道非廢也而天下莫敢窺者王者之正也衡庫者天子之禮也是故器成卒選則士知勝矣遍知天下審御機數則獨行而無敵矣所愛之國而獨利之所惡之國而獨害之則令行禁止是以聖王貴之勝一而服百則天下畏之矣立少而觀多則天下懷之矣罰有罪賞有功則天下從之矣故聚天下之精財論百工之鋭器春秋角試以練精鋭為右成器不課不用不試不臧收天下之豪傑有天下之駿雄故舉之如飛鳥動之如雷電發之如風雨莫當其前莫害其後獨出獨入莫敢禁圉成功立事必順於理義故不理不勝天下不義不勝人故賢知之君必立於勝地故正天下而莫之敢御也右為兵之數若夫曲制時舉不失天時毋壙地利其數多少其要必出於計故凡攻伐之為道也計必先定于內然後兵出乎境計未定於內而兵出乎境是則戰之自敗攻之自毀也是故張軍而不能戰圍邑而不能攻得地而不能實三者見一焉則可破毀也故不明于敵人之政不能加也不明于敵人之情不可約也不明于敵人之將不先軍也不明于敵人之士不先陳也是故以衆擊寡以治擊亂以富擊貧以能擊不能以教卒練士擊驅衆白徒故十戰十勝百戰百勝故事無備兵無主則不蚤知野不辟地無吏則無蓄積官無常下怨上而器械不功朝無政則賞罰不明賞罰不明則民幸生故蚤知敵則獨行有蓄積則久而不匱器械功則伐而不費賞罰明則民不幸生民不幸生則勇士勸矣故兵也者審於地啚謀于日官量蓄積齊勇士遍知天下審御機數兵主之事也有風雨之行故能不遠道里矣有飛鳥之舉故能不險山河矣有雷電之戰故能獨行而無敵矣有水旱之功故能攻國救邑矣有金城之守故能定宗廟育男女矣有一體之治故能出號令明憲法矣風雨之行者速也飛鳥之舉者輕也雷電之戰者士不齊也水旱之功者野不收耕不穫也金城之守者用貨財設耳目也一體之治者去奇説禁雕俗也不遠道里故能威絶域之民不險山河故能服恃固之國獨行無敵故令行而禁止故攻國救邑不恃權與之國故所指必聽定宗廟育男女天下莫之能傷然后可以有國制儀法出號令莫不嚮應然后可以治民一衆矣版法第七經言七凡將立事正彼天植版法者法天地之位象四時之行以治天下四時之行有寒有暑聖人法之故有文有武天地之位有前有後有左有右聖人法之以建經紀春生於左秋殺於右夏長於前冬藏於後生長之事文也收藏之事武也是故文事在左武事在右聖人法之以行法令以治事理凡法事者操持不可以不正操持不正則聽治不公聽治不公則治不盡理事不盡應治不盡理則疏遠微賤者無所告訴事不盡應則功利不盡舉功利不盡舉則國貧疏遠微賤者無所告訴則下饒故曰凡將立事正彼天植天植者心也天植正則不私近親不孽疏遠不私近親不孽疏遠則無遺利無隱治無遺利無隱治則事無不舉物無遺者風雨無違遠近高下各得其嗣欲見天心明以風雨故曰風雨無違遠近高下各得其嗣三經既飭君乃有國萬物尊天而貴風雨所以尊天者為其莫不受命焉也所以貴風雨者為其莫不待風而動待雨而濡也若使萬物釋天而更有所受命釋風而更有所仰動釋雨而更有所仰濡則無為尊天而貴風雨矣今人君之所尊安者為其威立而令行也其所以能立威行令者為其威利之操莫不在君也若使威利之操不專在君而有所分散則君日益輕而威利日衰侵暴之道也故曰三經既飭君乃有國喜無以賞怒無以殺喜以賞怒以殺怨乃起令乃廢驟令不行民心乃外外之有徒禍乃始牙衆之所忿置不能圖乘夏方長審治刑賞必明經紀陳義設法斷事以理虛氣平心乃去怒喜若倍法棄令而行怒喜禍亂乃生上位乃殆故曰喜無以賞怒無以殺喜以賞怒以殺怨乃起令乃廢驟令而不行民心乃外外之有徒禍乃始牙衆之所忿寡不能圖舉所美必觀其所終廢所惡必計其所窮冬既閉藏百事盡止往事畢登來事未起方冬無事慎觀終始審察事理事有先易而後難者有始不足見而終不可及者此常利之所以不舉事之所以困者也事之先易者人輕行之人輕行之則必困難成之事始不足見者人輕棄之人輕棄之則必失不可及之功夫數困難成之事而時失不可及之功衰耗之道也是故明君審察事理慎觀終始為必知其所成成必知其所用用必知其所利害為而不知所成成而不知所用用而不知所利害謂之妄舉妄舉者其事不成其功不立故曰舉所美必觀其所終廢所惡必計其所窮慶勉敦敬以顯之祿富有功以勸之爵貴有名以休之凡人君者欲民之有禮義也夫民無禮義則上下亂而貴賤爭故曰慶勉敦敬以顯之富祿有功以勸之爵貴有名以休之兼愛無遺是謂君心必先順教萬民鄉風旦暮利之衆乃勝任凡人君者欲衆之親上鄉意也欲其從事之勝任也而衆者不愛則不親不親則不明不教順則不鄉意是故明君兼愛以親之明教順以道之便其勢利其備愛其力而勿奪其時以利之如此則衆親上鄉意從事勝任矣故曰兼愛無遺是謂君心必先順教萬民鄉風旦暮利之衆乃勝任取人以己成事以質治之本二一曰人二曰事人欲必用事欲必工人有逆順事有稱量人心逆則人不用事失稱量則事不工事不工則傷人不用則怨故曰取人以己成事以質審用財慎施報察稱量故用財不可以嗇用力不可以苦用財嗇則費用力苦則勞成事以質者用稱量也取人以己者度恕而行也度恕者度之於己也己之所不安勿施於人故曰審用財慎施報察稱量故用財不可以嗇用力不可以苦用財嗇則費用力苦則勞矣民不足令乃辱民苦殃令不行施報不得禍乃始昌禍昌不寤民乃自啚以知其然也用力苦則事不工事不工而數復之故曰勞矣用財嗇則不當人心不當人心則怨起用財而生怨故曰費怨起而不復反衆勞而不得息則必有崩弛堵壤之心故曰民不足令乃辱民苦殃令不行施報不得禍乃始昌禍昌而不悟民乃自圗正法直度罪殺不赦殺僇必信民畏而懼武威既明令不再行凡國無法則衆不知所為無度則事無機有法不正有度不直則治辟治辟則國亂故曰正法直度罪殺不赦殺僇必信民畏而懼武威既明令不再行頓卒怠倦以辱之罰罪宥過以懲之殺僇犯禁以振之凡民者莫不惡罰而畏罪是以人君嚴教以示之明刑罰以致之故曰頓卒怠倦以辱之罰罪有過以懲之殺僇犯禁以振之植固不動倚邪乃恐倚革邪化令往民移治國有三器亂國有六攻明君能勝六攻而立三器則國治不肖之君不能勝六攻而立三器故國不治三器者何也曰號令也斧鉞也祿賞也六攻者何也親也貴也貨也色也巧佞也玩好也三器之用何也曰非號令無以使下非斧鉞無以畏衆非祿賞無以勸民六攻之敗何也曰雖不聽而可以得存雖犯禁而可以得免雖無功而可以得富夫國有不聽而可以得存者則號令不足以使下有犯禁而可以得免者則斧鉞不足以畏衆有無功而可以得富者則祿賞不足以勸民號令不足以使下斧鉞不足以畏衆祿賞不足以勸民則人君無以自守也然則明君奈何明君不為六者變更號令不為六者疑錯斧鉞不為六者益損祿賞故曰植固而不動倚邪乃恐倚革邪化令往民移法天合德象法無親凡人君者覆載萬民而兼有之燭臨萬族而事使之是故以天地日月四時為主為質以治天下天覆而無外也其德無所不在地載而無棄也安固而不動故莫不生殖聖人法之以覆載萬民故莫不得其職性得其職性則莫不為用故曰法天合德象地無親參於日月佐於四時日月之明無私故莫不得光聖人法之以燭萬民故能審察則無遺善無隱姦無遺善無隱姦則刑賞信必刑賞信必則善勸而姦止故曰參於日月四時之行信必而著明聖人法之以事萬民故不失時功故曰伍於四時悅在施有衆在廢私凡衆者愛之則親利之則至是故明君設利以致之明愛以親之徒利而不愛則衆至而不親徒愛而不利則衆親而不至愛施俱行則説君臣説朋友説兄弟説父子愛施所設四固不能守故曰説在愛施凡君所以有衆者愛施之德也愛有所移利有所并則不能盡有故曰有衆在廢私召遠在修近愛施之德雖行而無私內行不修則不能朝遠方之君是故正君臣上下之義飾父子兄弟夫妻之義飾男女之別別疏數之差使君德臣忠父慈子孝兄愛弟敬禮義章明如此則近者親之遠者歸之故曰召遠在修近閉禍在除怨閉禍在除怨非有怨乃除之所事之地常無怨也凡禍亂之所生生於怨咎怨咎所生生於非理是以明君之事衆也必經使之必道施報必當出言必得刑罰必理如此則衆無鬱怨之心無憾恨之意如此則禍亂不生上位不殆故曰閉禍在除怨也備長在乎任賢凡人君所以尊安者賢佐也佐賢則君尊國安民治無佐則君卑國危民亂故曰備長存乎任賢高安在乎同利凡人者莫不欲利而惡害是故與天下同利者天下持之擅天下之利者天下謀之天下所謀雖立必隳天下所持雖高不危故曰安高在乎同利
