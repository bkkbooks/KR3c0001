body:
  text: 事語第七十一管子輕重四桓公問管子曰事之至數可聞乎管子對曰何謂至數桓公曰秦奢教我曰帷蓋不修衣服不衆則女事不泰俎豆之禮不致牲諸侯太牢大夫少牢不若此則六畜不育非高其臺榭美其宮室則群材不散此言何如管子曰非數也桓公曰何謂非數管子對曰此定壤之數也彼天子之制壤方千里齊諸侯方百里負海子七十里男五十里若胸臂之相使也故準徐疾贏不足雖在下也不為君憂彼壤狹而欲舉與大國爭者農夫寒耕暑藝力歸於上女勤於緝績徽織功歸於府者非怨民心傷民意也非有積蓄不可以用人非有積財無以勸下泰奢之數不可用於厄隘之國桓公曰善桓公又問管子曰佚田謂寡人曰善者用非其有使非其人何不因諸侯權以制天下管子對曰佚田之言非也彼善為國者壤辟舉則民留處倉廩實則知禮節且無委致圍城肥致衝夫不定內不可以持天下佚田之言非也管子曰歲藏一十年而十也歲藏二五年而十也穀十而守五綈素滿之五在上故視歲而藏縣時積歲國有十年之蓄富勝貧勇勝怯智勝愚微勝不微有義勝無義練士勝歐衆凡十勝者盡有之故發如風雨動如雷霆獨出獨入莫之能禁止不待權與故佚田之言非也桓公曰善海王第七十二管子輕重五桓公問於管子曰吾欲藉於臺射何如管子對曰此毀成也吾欲藉於樹木管子對曰此伐生也吾欲藉於六畜管子對曰此殺生也吾欲藉於人何如管子對曰此隱情也桓公曰然則吾何以為國管子對曰唯官山海為可耳桓公曰何謂官山海管子對曰海王之國謹正鹽策桓公曰何謂正鹽策管子對曰十口之家十人食鹽百口之家百人食鹽終月大男食鹽五升少半大女食鹽三升少半吾子食鹽二升少半此其大曆也鹽百升而釜令鹽之重升加分強釜五十也升加一強釜百也升加二強釜二百也鍾二千十鍾二萬百鍾二十萬千鍾二百萬萬乘之國人數開口千萬也禺策之商日二百萬十日二千萬一月六千萬正萬乘之國人百萬也月人三十錢之籍為錢三千萬今吾非籍之諸君吾子而有二國之籍者六千萬使君施令曰吾將籍於諸君吾子則必囂號今夫給之鹽策則百倍歸於上人無以避此者數也今鐵官之數曰一女必有一針一刀若其事立耕者必有一耒一耜一銚若其事立行服連軺輂者必有一斤一鋸一錐一鑿若其事立不爾而成事者天下無有令針之重加一也三十針一人之籍刀之重加六五六三十五刀一人之籍也耜鐵之重加十三耜鐵一人之籍也其餘輕重皆準此而行然則舉臂勝事無不服藉者桓公曰然則國無山海不王乎管子曰因人之山海假之名有海之國讎鹽於吾國釜十五吾受而官出之以百我未與其本事也受人之事此用以重相推人之數也國蓄第七十三管子輕重六國有十年之蓄而民不足於食皆以其技能望君之祿也君有山海之金而民不足於用是皆以其事業交接於君上也故人君挾其食守其用據有餘而制不足故民無不纍於上也五穀食米民之司命也黃金刀幣民之通施也故善者執其通施以御其司命故民力可得而盡也夫民者信親而死利海內皆然民豫則喜奪則怒民情皆然先王知其然故見豫之形不見奪之理故民愛可洽於上也租籍者所以強求也租稅者所慮而請也王霸之君去其所以強求廢其所慮而請故天下樂從也利出於一孔者其國無敵出二孔者其兵半詘出三孔者不可以舉兵出四孔者其國必亡先王知其然故塞民之羡隘其利途故豫之在君奪之在君貧之在君富之在君故民之戴上如日月親君若父母凡將為國不通於輕重不可為籠以守民不能調通民利不可以語制為大治是故萬乘之國有萬金之賈千乘之國有千金之賈然者何也國多失利則臣不盡其忠士不盡其死矣歲有凶穰故穀有貴賤令有緩急故物有輕重然而人君不能治故使蓄賈遊市乘民之不給百倍其本分地若一強者能守分財若一智者能收智者有什倍人之功愚者有不賡本之事然而人君不能調故民有相百倍之生也夫民富則不可以祿使也貧則不可以罰威也法令之不行萬民之不治貧富之不齊也且君引錣量用耕田發草上得其數矣民人所食人有若干步畝之數矣計本量委則足矣然而民有飢餓不食者何也穀有所藏也人君鑄錢立幣民庶之通施也人有若干百千之數矣然而人事不及用不足者何也利有所并藏也然則人君非能散積聚鈞羡不足分并財利而調民事也則君雖強本趣耕而自為鑄幣而無已乃今使民下相役耳惡能以為治乎歲適美則市糶無豫而狗彘食人食歲適凶則市糴釜十繈而道有餓民然則豈壤力固不足而食固不贍也哉夫往歲之糶賤狗彘食人食故來歲之民不足也物適賤則半力而無豫民事不償其本物適貴則什倍而不可得民失其用然則豈財物固寡而本委不足也哉夫民利之時失而物利之不平也故善者委施於民之所不足操事於民之所有餘夫民有餘則輕之故人君斂之以輕民不足則重之故人君散之以重斂積之以輕散行之以重故君必有什倍之利而財之櫎可得而平也凡輕重之大利以重射輕以賤泄貴萬物之滿虛隨時準平而不變衡絶則重見人君知其然故守之以準平使萬室之都必有萬鍾之藏藏繈千萬使千室之都必有千鍾之藏藏繈百萬春以奉耕夏以奉藝耒耜械器鍾餉糧食畢取贍於君故大賈蓄家不得豪奪吾民矣然則何君養其本謹也春賦以斂繒帛夏貸以收秋實是故民無廢事而國無失利也凡五穀者萬物之主也穀貴則萬物必賤穀賤則萬物必貴兩者為敵則不俱平故人君御穀物之秩相勝而操事於其不平之間故萬民無籍而國利歸於君也夫以室廡籍謂之毀成以六畜籍謂之止生以田畝籍謂之禁耕以正人籍謂之離情以正戶籍謂之養贏五者不可畢用故王者遍行而不盡也故天子籍於幣諸侯籍於食中歲之穀糶石十錢大男食四石月有四十之籍大女食三石月有三十之籍吾子食二石月有二十之籍歲凶穀貴糴石二十錢則大男有八十之籍大女有六十之籍吾子有四十之籍是人君非發號令收穡而戶籍也彼人君守其本委謹而男女諸君吾子無不服籍者也一人廩食十人得餘十人廩食百人得餘百人廩食千人得餘夫物多則賤寡則貴散則輕聚則重人君知其然故視國之羡不足而御其財物穀賤則以幣豫食布帛賤則以幣豫衣視物之輕重而御之以準故貴賤可調而君得其利前有萬乘之國而後有千乘之國謂之抵國前有千乘之國而後有萬乘之國謂之距國壤正方四面受敵謂之衢國以百乘衢處謂之託食之君千乘衢處壤削太半萬乘衢處壤削少半何謂百乘衢處託食之君也夫以百乘衢處危懾圍阻千乘萬乘之間大國之君不相中舉兵而相攻必以為杆格蔽圉之用有功利不得鄉大臣死於外分壤而功列陳係纍獲虜分賞而祿是壤地盡於功賞而稅臧殫於繼孤也是特名羅於為君耳無壤之有號有百乘之守而實無尺壤之用故謂託食之君然則大國內款小國用盡何以及此曰百乘之國官賦軌符乘四時之朝夕御之以輕重之準然后百乘可及也千乘之國封天財之所殖械器之所出財物之所生視歲之滿虛而輕重其祿然后千乘可足也萬乘之國守歲之滿虛乘民之緩急正其號令而御其大準然后萬乘可資也玉起於禺氏金起於汝漢珠起於赤野東西南北距周七千八百里水絶壤斷舟車不能通先王為其途之遠其至之難故託用於其重以珠玉為上幣以黃金為中幣以刀布為下幣三幣握之則非有補於暖也食之則非有補於飽也先王以守財物以御民事而平天下也今人君籍求於民令曰十日而具則財物之賈什去一令曰八日而具則財物之賈什去二令曰五日而具則財物之賈什去半朝令而夕具則財物之賈什去九先王知其然故不求於萬民而籍於號令也山國軌第七十四管子輕重七桓公問管子曰請問官國管子對曰田有軌人有軌用有軌鄉有軌人事有軌幣有軌縣有軌國有軌不通於軌數而欲為國不可桓公曰行軌數奈何對曰某鄉田若干人事之準若干穀重若干曰某縣之人若干田若干幣若干而中用穀重若干而中幣終歲度人食其餘若干曰某鄉女勝事者終歲績其功業若干以功業直時而櫎之終歲人已衣被之後餘衣若干別群軌相壤宜桓公曰何謂別群軌相壤宜管子對曰有莞蒲之壤有竹前檀柘之壤有泛下漸澤之壤有水潦魚鱉之壤今四壤之數君皆善官而守之則籍於財物不籍於人畝十鼓之壤君不以軌守則民且守之民有通移長刀不以本為得此君失也桓公曰軌意安出管子對曰不陰據其軌皆下制其上桓公曰此若言何謂也管子對曰某鄉田若干食者若干某鄉之女事若干餘衣若干謹行州里曰田若干人若干人衆田不度食若干曰田若干餘食若干必得軌程此謂之泰軌也然后調立環乘之幣田軌之有餘於其人食者謹置公幣焉大家衆小家寡山田間田曰終歲其食不足於其人若干則置公幣焉以滿其準重歲豐年五穀登謂高田之萌曰吾所寄幣於子者若干鄉穀之櫎若干請為子什減三穀為上幣為下高田撫間田山不被穀十倍山田以君寄幣振其不贍未淫失也高田以時撫於主上坐長加十也女貢織帛苟合于國奉者皆置而券之以鄉櫎市準曰上無幣有穀以穀準幣環穀而應策國奉決穀反準賦軌幣穀廩重有加十謂大家委資家曰上且循遊人出若干幣謂鄰縣曰有實者皆勿左右不贍則且為人馬假其食民鄰縣四面皆櫎穀坐長而十倍上下令曰資家假幣皆以穀準幣直幣而庚之穀為下幣為上百都百縣軌據穀坐長十倍環穀而應假幣國幣之九在上一在下幣重而萬物輕斂萬物應之以幣幣在下萬物皆在上萬物重十倍府官以市櫎出隆萬物而止國軌布於未形據其已成乘令而進退無求於民謂之國軌桓公問於管子曰不籍而贍國為之有道乎管子對曰軌守其時有官天財何求於民桓公曰何謂官天財管子對曰泰春民之功繇泰夏民之令之所止令之所發泰秋民令之所止令之所發泰冬民令之所止令之所發此皆民所以時守也此物之高下之時也此民之所以相并兼之時也君守諸四務桓公曰何謂四務管子對曰泰春民之且所用者君已廩之矣泰夏民之且所用者君已廩之矣泰秋民之且所用者君已廩之矣泰冬民之且所用者君已廩之矣泰春功布日春縑衣夏單衣梩籠纍箕筲幐籯稯若干日之功用人若干無資之家皆假之械器筲稯幐籯公衣功已而歸公折券故力出於民而用出於上春十日不害耕事夏十日不害藝事秋十日不害斂實冬二十日不害除田此之謂時作桓公曰善吾欲立軌官為之奈何管子對曰鹽鐵之策足以立軌官桓公曰奈何管子對曰龍夏之地布黃金九千以幣資金巨家以金小家以幣周岐山至於崢丘之西塞丘者山邑之田也布幣稱貧富而調之周壽陵而東至少沙者中田也據之以幣巨家以金小家以幣三壤已撫而國穀再什倍梁渭陽瑣之牛馬滿齊衍請區之顛齒量其高壯曰國為師旅戰車毆就斂子之牛馬上無幣請以穀視市櫎而庚子牛馬為上粟二家二家散其粟反準牛馬歸於上管子曰請立資於民有田倍之其內毋有外皆為資壤被鞍之馬千乘齊之戰車之具具於此無求於民此去丘邑之籍也國穀之朝夕在上山林廩械器之高下在上春秋冬夏之輕重在上行田疇田中有木者謂之穀賊宮中四榮樹其餘曰害女功宮室械器非山無所仰然后君立三等之租於山曰握以下者為柴楂把以上者為室奉三圍以上為棺槨之奉柴楂之租若干室奉之租若干棺槨之租若干管子曰鹽鐵撫軌穀一廩十君常操九民衣食而繇下安無怨咎去其田賦以租其山巨家重葬其親者服重租小家菲葬其親者服小租巨家美修其宮室者服重租小家為室廬者服小租上立軌於國民之貧富如加之以繩謂之國軌山權數第七十五管子輕重八桓公問管子曰請問權數管子對曰天以時為權地以財為權人以力為權君以令為權失天之權則人地之權亡桓公曰何為失天之權則人地之權亡管子對曰湯七年旱禹五年水民之無饘賣子者湯以莊山之金鑄幣而贖民之無饘賣子者禹以歷山之金鑄幣而贖民之無饘賣子者故天權失人地之權皆失也故王者歲守十分之參三年與少半成歲三十七年而藏十一年與少半藏參之一不足以傷民而農夫敬事力作故天毀地凶旱水泆民無入於溝壑乞請者也此守時以待天權之道也桓公曰善吾欲行三權之數為之奈何管子對曰梁山之陽綪茜夜石之幣天下無有管子曰以守國穀歲守一分以行五年國穀之重什倍異日管子曰請立幣國銅以二年之粟顧之立黔落施輕重與天下調彼重則見射輕則見泄故與天下調泄者失權也見射者失策也不備天權下相求備準下陰相隸此刑罰之所起而亂之之本也故平則不平民富則不如貧委積則虛矣此三權之失也已桓公曰守三權之數奈何管子對曰大豐則藏分厄亦藏分桓公曰厄者所以益也何以藏分管子對曰隘則易益也一可以為十十可以為百以厄守豐厄之準數一上十豐之策數十去九則吾九為餘於數策豐則三權皆在君此之謂國權桓公問於管子曰請問國制管子對曰國無制地有量桓公曰何謂國無制地有量管子對曰高田十石間田五石庸田三石其餘皆屬諸荒田地量百畝一夫之力也粟賈一粟賈十粟賈三十粟賈百其在流策者百畝從中千畝之策也然則百乘從千乘也千乘從萬乘也故地無量國無策桓公曰善今欲為大國大國欲為天下不通權策其無能者矣桓公曰今行權奈何管子對曰君通於廣狹之數不以狹畏廣通於輕重之數不以少畏多此國策之大者也桓公曰善蓋天下視海內長譽而無止為之有道乎管子對曰有曰軌守其數準平其流動於未形而守事已成物一也而十是九為用徐疾之數輕重之策也一可以為十十可以為百引十之半而藏四以五操事在君之決塞桓公曰何謂決塞管子曰君不高仁則問不相被君不高慈孝則民簡其親而輕過此亂之至也則君請以國策十分之一者樹表置高鄉之孝子聘之幣孝子兄弟衆寡不與師旅之事樹表置高而高仁慈孝財散而輕乘輕而守之以策則十之五有在上運五如行事如日月之終復此長有天下之道謂之準道桓公問於管子曰請問教數管子對曰民之能明於農事者置之黃金一斤直食八石民之能蕃育六畜者置之黃金一斤直食八石民之能樹藝者置之黃金一斤直食八石民之能樹瓜瓠葷菜百果使蕃裕者置之黃金一斤直食八石民之能已民疾病者置之黃金一斤直食八石民之知時曰歲且厄曰某穀不登曰者某穀豐置之黃金一斤直食八石民之通於蠶桑使蠶不疾病者皆置之黃金一斤直食八石謹聽其言而藏之官使師旅之事無所與此國策之者也國用相靡而足相因揲而𠸆相揲而淡然後置四限高下令之徐疾驅屏萬物守之以策有五官技桓公曰何謂五官技管子曰詩者所以記物也時者所以記歲也春秋者所以記成敗也行者道民之利害也易者所以守凶吉成敗也卜者卜凶吉利害也民之能此者皆一馬之田一金之衣此使君不迷妄之數也五家者即見其時使豫先蚤間之日受之故君無失時無失策萬物興豐其春秋遠占得失以為末教詩記人無失辭行殫道無失義易守禍福凶吉不相亂此之謂君柄桓公問於管子曰權柄之數吾已得聞之矣守國之固奈何曰能皆已官時皆已官得失之數萬物之終始君皆已官之矣其餘皆以數行桓公曰何謂以數行管子對曰穀者民之司命也智者民之輔也民智而君愚下富而君貧下貧而君富此之謂事名二國機徐疾而已矣君道度法而已矣人心禁繆而已矣桓公曰何謂度法何謂禁繆管子對曰度法者量人力而舉功禁繆者非往而戒來故禍不萌通而民無患咎桓公曰請聞心禁管子對曰晉有臣不忠於其君慮殺其主謂之公過諸公過之家毋使得事君此晉之過失也齊之公過坐立長差惡惡乎來刑善善乎來榮戒也此之謂國戒桓公問管子曰輕重準施之矣策盡於此乎管子曰未也將御神用寶桓公曰何謂御神用寶管子對曰北郭有掘闕而得龜者此檢數百里之地也桓公曰何謂得龜百里之地管子對曰北郭之得龜者令過之平盤之中君請起十乘之使百金之提命北郭得龜之家曰賜若服中大夫曰東海之子類於龜託舍於若賜若大夫之服以終而身勞若以百金之龜為無資而藏諸泰臺一日而亹之以四牛立寶曰無資還四年伐孤竹丁氏之家粟可食三軍之師行五月召丁氏而命之曰吾有無資之寶於此吾今將有大事請以寶為質於子以假子之邑粟丁氏北鄉再拜入粟不敢受寶質桓公命丁氏曰寡人老矣為子者不知此數終受吾質丁氏歸革築室賦籍藏龜還四年伐孤竹謂丁氏之粟中食三軍五月之食桓公立貢數文行中七千金年龜中四千金黑白之子當千金凡貢制中二齊之壤策也用貢國危出寶國安行流桓公曰何謂流管子對曰物有豫則君失策而民失生矣故善為天下者操於二豫之外桓公曰何謂二豫之外管子對曰萬乘之國不可以無萬金之蓄飾千乘之國不可以無千金之蓄飾百乘之國不可以無百金之蓄飾以此與令進退此之謂乘時山至數第七十六管子輕重九桓公問管子曰梁聚謂寡人曰古者輕賦稅而肥籍斂取下無順於此者矣梁聚之言何如管子對曰梁聚之言非也彼輕賦稅則倉廩虛肥籍斂則械器不奉而諸侯之皮幣不衣倉廩虛則倳賤無祿外皮幣不衣於天下內國倳賤梁聚之言非也君有山山有金以立幣以幣準穀而授祿故國穀斯在上穀賈什倍農夫夜寢蚤起不待見使五穀什倍士半祿而死君農夫夜寢蚤起力作而無止彼善為國者不曰使之使不得不使不曰用之使不得不用故使民無有不得不使者夫梁聚之言非也桓公曰善桓公又問於管子曰有人教我謂之請士曰何不官百能管子對曰何謂百能桓公曰使智者盡其智謀士盡其謀百工盡其巧若此則可以為國乎管子對曰請士之言非也祿肥則士不死幣輕則士簡賞萬物輕則士偷幸三怠在國何數之有彼穀七藏於上三遊於下謀士盡其慮智士盡其知勇士輕其死請士所謂妄言也不通於輕重謂之妄言桓公問於管子曰昔者周人有天下諸侯賓服名教通於天下而奪於其下何數也管子對曰君分壤而貢入市朝同流黃金一策也江陽之珠一策也秦之明山之曾青一策也此謂以寡為多以狹為廣輕重之屬也桓公曰天下之數盡於輕重之屬也管子曰今國穀重什倍而萬物輕大夫謂賈人子為吾運穀而斂財穀之重一也今九為餘穀重而萬物輕若此則國財九在大夫矣國歲反一財物之九者皆倍重而出矣財物在下幣之九在大夫然則幣穀羡在大夫也天子以客行令以時出熟穀之人亡諸侯受而官之連朋而聚與高下萬物以合民用內則大夫自還而不盡忠外則諸侯連朋合與孰穀之人則去亡故天子失其權也桓公曰善桓公又問管子曰終身有天下而勿失為之有道乎管子對曰請勿施於天下獨施之於吾國桓公曰此若言何謂也管子對曰國之廣狹壤之肥墝有數終歲食餘有數彼守國者守穀而已矣曰某縣之壤廣若干某縣之壤狹若干則必積委幣於是縣州里受公錢泰秋國穀去參之一君下令謂郡縣屬大夫里邑皆籍粟入若干穀重一也以藏於上者國穀參分則二分在上矣泰春國穀倍重數也泰夏賦穀以市櫎民皆受上穀以治田土泰秋曰穀之存豫者若干今上斂穀以幣民曰無幣以穀則民之三有歸於上矣重之相因時之化舉無不為國策君用大夫之委以流歸於上君用民以時歸於君藏輕出輕以重數也則彼安有自還之大夫獨委之彼諸侯之穀十使吾國穀二十則諸侯穀歸吾國矣諸侯穀二十吾國穀十則吾國穀歸於諸侯矣故善為天下者謹守重流而天下不吾泄矣彼重之相歸如水之就下吾國歲非凶也以幣藏之故國穀倍重故諸侯之穀至也是藏一分以致諸侯之一分利不奪於天下大夫不得以富侈以重藏輕國常有十國之策也故諸侯服而無止臣從而以忠此以輕重御天下之道也謂之數應桓公問管子曰請問國會管子對曰君失大夫為無伍失民為失下故守大夫以縣之策守一縣以一鄉之策守一鄉以一家之策守家以一人之策桓公曰其會數奈何管子對曰幣準之數一縣必有一縣中田之策一鄉必有一鄉中田之策一家必有一家直人之用故不以時守郡為無與不以時守鄉為無伍桓公曰行此奈何管子對曰王者藏於民霸者藏於大夫殘國亡家藏於策桓公曰何謂藏於民管子曰請棧臺之錢散諸城陽鹿臺之布散諸濟陰君下令於百姓曰民富君無與貧民貧君無與富故賦無錢布府無藏財資藏於民歲豐五穀登五穀大輕穀賈去上歲之分以幣據之穀為君幣為下國幣盡在下幣輕穀重上分上歲之二分在下下歲之二分在上則二歲者四分在上則國穀之一分在下穀三倍重邦布之籍終歲十錢人家受食十畝加十是一家十戶也出於國穀策而藏於幣者也以國幣之分復布百姓四減國穀三在上一在下復策也大夫旅𣩽而封積實而驕上請奪之以會桓公曰何謂奪之以會管子對曰粟之三分在上謂民萌皆受上粟度君藏焉五穀相靡而重為去什三餘以國幣穀準反行大夫無計於重君以幣賦祿什在上君出穀什而去七君斂三上賦七散振不資者仁義也五穀相靡而輕數也以鄉管重而籍國數也出實財散仁義萬物輕數也乘時進退故曰王者乘時聖人乘易桓公曰善桓公問管子曰特命我曰天子三百領泰嗇而散大夫準此而行此如何管子曰非法家也大夫高其壟美其室此奪農事及市庸此非便國之道也民不得以織為縿綃而貍之於地彼善為國者乘時徐疾而已矣謂之國會桓公問管子曰請問爭奪之事何如管子曰以戚始桓公曰何謂用戚始管子對曰君人之主弟兄十人分國為十兄弟五人分國為五三世則昭穆同祖十世則為祏故伏尸滿衍兵決而無止輕重之家復遊於其間故曰毋豫人以壤毋授人以財財終則有始與四時廢起聖人理之以徐疾守之以決塞奪之以輕重行之以仁義故與天壤同數此王者之大轡也桓公問管子曰請問幣乘馬管子對曰始取夫三夫之家方六里而一乘二十七人而奉一乘幣乘馬者方六里田之惡美若干穀之多寡若干穀之貴賤若干凡方六里用幣若干穀之重用幣若干故幣乘馬者布幣於國幣為一國陸地之數謂之幣乘馬桓公曰行幣乘馬之數奈何管子對曰士受資以幣大夫受邑以幣人馬受食以幣則一國之穀資在上幣資在下國穀什倍數也萬物財物去什二策也皮革筋角羽毛竹箭器械財物苟合于國器君用者皆有矩券於上君實鄉州藏焉曰某月某日苟從責者鄉決州決故曰就庸一日而決國策出於穀軌國之策貨幣乘馬者也今刀布藏於官府巧幣萬物輕重皆在賈人彼幣重而萬物輕幣輕而萬物重彼幣輕而穀重幣重而穀輕人君操穀幣準衡而天下可定也此守天下之數也桓公問於管子曰準衡輕重國會吾得聞之矣請問縣數管子對曰狼牡以至於馮會之口龍夏以北至于海莊禽獸羊牛之地也何不以此通國策哉桓公曰何謂通國策管子對曰馮市門一吏書贅直事若其事廋圉牧食之人養視不失折殂者去其都秩與其縣秩大夫不鄉贅合遊者謂之無禮義大夫幽其春秋列民幽其門山之祠馮會龍夏牛羊犧牲月賈十倍異日此出諸禮義籍於無用之地因欄牢策也謂之通桓公問管子曰請問國勢管子對曰有山處之國有泛下多水之國有山地分之國有水泆之國有漏壤之國此國之五勢人君之所憂也山處之國常藏穀三分之一泛下多水之國常操國穀三分之一山地分之國常操國穀十分之三水泉之所傷水泆之國常操十分之二漏壤之國謹下諸侯之五穀與工雕文梓器以下天下之五穀此準時五勢之數也桓公問管子曰今有海內縣諸侯則國勢不用已乎管子對曰今以諸侯為管公州之餘焉以乘四時行欄牢之策以東西南北相被用平而準故曰為諸侯則高下萬物以應諸侯遍有天下則賦幣以守萬物之朝夕調而已利有足則行不滿則有止王者鄉州以時察之故利不相傾縣死其所君守大奉一謂之國簿
