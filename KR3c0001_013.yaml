body:
  text: 短語十心之在體君之位也九竅之有職官之分也心處其道九竅循理嗜欲充盈目不見色耳不聞聲故曰上離其道下失其事毋代馬走使盡其力毋代鳥飛使弊其羽翼毋先物動以觀其則動則失位靜乃自得道不遠而難極也與人並處而難得也虛其欲神將入舍掃除不潔神不留處人皆欲智而莫索其所以智智乎智乎投之海外無自奪求之者不及虛之者夫聖人無求也故能虛虛而無形謂之道化育萬物謂之德君臣父子人間之事謂之義登降揖讓貴賤有等親踈之體謂之禮簡物小未大一道殺僇禁誅謂之法大道可安而不可説真人之言不義不頗不出於口不見於色四海之人又孰知其則天曰虛地曰靜乃不忒潔其宮開其門去私毋言神明若存紛乎其若亂靜之而自治強不能遍立智不能盡謀物固有形形固有名名當謂之聖人故必知不言之言無為之事然後知道之紀殊形異執不與萬物異理故可以為天下始人之可殺以其惡死也其可不利以其好利也是以君子不怵乎好不迫乎惡恬愈無為去智與故其應也非所設也其動也非所取也過在自用罪在變化是故有道之君子其處也若無知其應物也若偶之靜因之道也心之在體君之位也九竅之有職官之分也耳目者視聽之官也心而無與於視聽之事則官得守其分矣夫心有欲者物過而目不見聲至而耳不聞也故曰上離其道下失其事故曰心術者無為而制竅者也故曰君無代馬走無代鳥飛此言不奪能能不與下試也毋先物動者搖者不定躁者不靜言動之不可以觀也位者謂其所立也人主者立於陰陰者靜故曰動則失位陰則能制陽矣靜則能制動矣故曰靜乃自得道在天地之間也其大無外其小無內故曰不遠而難極也虛之與人也無間唯聖人得虛道故曰並處而難得世人之所職者精也去欲則宣宣則靜矣靜則精精則獨立矣獨則明明則神矣神者至貴也故館不辟除則貴人不舍焉故曰不潔則神不處人皆欲知而莫索其所以知其所知彼也其所以知此也不修之此焉能知彼修之此莫能虛矣虛者無藏也故去知則奚求矣無臧則奚設矣無求無設則無慮無慮則反覆虛矣天之道虛其無形虛則不屈無形則無所低𧺴無所低𧺴故偏流萬物而不變德者道之舍物得以生生知得以職道之精故德者得也得也者其謂所得以然也以無為之謂道舍之之謂德故道之與德無間故言之者不別也間之理者謂其所以舍也義者謂各處其宜也禮者因人之情緣義之理而為之節文者也故禮者謂有理也理也者明分以諭義之意也故禮出乎理理出乎義義因乎宜者也法者所以同出不得不然者也故殺僇禁誅以一之也故事督乎法法出乎權權出乎道道也者動不見其形施不見其德萬物皆以得然莫知其極故曰可以安而不可説也真人言至也不宜言應也應也者非吾所設故能無宜也不頗言因也因也者非吾所所顧取故無頗也不出於口不見於色言無形也四海之人孰知其則言深囿也天之道虛地之道靜虛則不屈靜則不變不變則無過故曰不伐潔其宮開其門宮者謂心也心也者智之舍也故曰宮潔之者去好過也門者謂耳目也耳目者所以聞見也物固有形形固有名此言不得過實實不得延名姑形以形以形務名督言正名故曰聖人不言之言應也應也者以其為之人者也執其名務其所以成此應之道也無為之事因也因也者無益無損也以其形因為之名此因之術也名者聖人之所以紀萬物也人者立於強務於善未於能動於故者也聖人無之無之則與物異矣異則虛虛者萬物之始也故曰可以為天下始人迫於惡則失其所好怵於好則忘其所惡非道也故曰不怵乎好不迫乎惡惡不失其理欲不過其情故曰君子恬愈無為去智與故言虛素也其應非所設也其動非所取也此言因也因也者舍己而以物為法者也感而后應非所設也緣理而動非所取也過在自用罪在變化自用則不虛不虛則仵於物矣變化則為生為生則亂矣故道貴因因者因其能者言所用也君子之處也若無知言至虛也其應物也若偶之言時適也若影之象形響之應聲也故物至則應過則舍矣舍矣者言復所於虛也短語十一形不正者德不來中不精者心不治正形飾德萬物畢得翼然自來神莫知其極昭知天下通於四極是故曰無以物亂官毋以官亂心此之謂內德是故意氣定然后反正氣者身之充也行者正之義也充不美則心不得行不正則民不服是故聖人若天然無私覆也若地然無私載也私者亂天下者也凡物載名而來聖人因而財之而天下治實不傷不亂於天下而天下治專於意一於心耳目端知遠之近能專乎能一乎能毋卜筮而知凶吉乎能止乎能已乎能毋問於人而自得之於己乎故曰思之思之不得鬼神教之非鬼神之力也其精氣之極也一物能變曰精一事能變曰智慕募選者所以等事也極變者所以應物也慕選而不亂極變而不煩執一之君子執一而不失能君萬物日月之與同光天地之與同理聖人裁物不為物使心安是國安也心治是國治也治也者心也安也者心也治心在中治言出於口治事加於民故功作而民從則百姓治矣所以操者非刑也所以危者非怒也民人操百姓治道其本至也至不至無非人所而亂凡在有司執制者之制非道也聖人之道若存若亡援而用之歿世不亡與時變而不化應物而不移日用之而不化人能正靜者筋韌而骨強能戴者大圓體乎大方鏡者大清視乎大明正靜不失日新其德昭知天下通於四極全心在中不可匿外見於形容可知於顏色善氣迎人親如弟兄惡氣迎人害於戈兵不言之言聞於雷鼓全心之形明於日月察於父母昔者明王之愛天下故天下可附暴王之惡天下故天下可離故賞之不足以為愛刑之不足以為惡賞者愛之末也刑者惡之末也凡民之生也必以正平所以失之者必以喜樂哀怒節怒莫若樂節樂莫若禮守禮莫若敬外敬而內靜者必反其性豈無利事哉我無利心豈無安處哉我無安心心之中又有心意以先言意然後刑刑然后思思然后知凡心之刑過知先王是故內聚以為原泉之不竭表裏遂通泉之不涸四支堅固能令用之被及四圄是故聖人一言解之上察於天下察於地短語十二建常立首以靖為宗以時為寶以政為儀和則能久非吾儀雖利不為非吾當雖利不行非吾道雖利不取上之隨天其次隨人人不倡不和天不始不隨故其言也不廢其事也不墮原始計實本其所生知其象則索其刑緣其理則知其情索其端則知其名故苞物衆者莫大於天地化物多者莫多於日月民之所急莫急於水火然而天不為一物枉其時明君聖人亦不為一人枉其法天行其所行而萬物被其利聖人亦行其所行而百姓被其利是故萬物均既誇衆矣是以聖人之治也靜身以待之物至而名自治之正名自治之奇身名廢名正法備則聖人無事不可常居也不可廢舍也隨變斷事也知時以為度大者寬小者局物有所餘有所不足兵之出出於人其人入入於身兵之勝從於適德之來從於身故曰祥於鬼者義於人兵不義不可強而驕者損其強弱而驕者亟死亡強而卑者信其強弱而卑者免於罪是故驕之餘卑卑之餘驕道者一人用之不聞有餘天下行之不聞不足此謂道矣小取焉則小得福大取焉則大得福盡行之而天下服殊無取焉則民反其身不免於賊左者出者也右者入者也出者而不傷人入者自傷也不日不月而事以從不卜不筮而謹知吉凶是謂寬乎刑徒居而致名出善之言為善之事事成而顧反無名能者無名從事無事審量出入而觀物所載孰能治無治乎始無始乎終無終乎弱無弱乎故曰美哉岪岪故曰不中有中孰能得夫中之衷乎故曰功成者隳名成者虧故曰孰能棄名與功而還與衆人同孰能棄功與名而還反無成無成有貴其成也有成貴其無成也日極則仄月滿則虧極之徒仄滿之徒虧巨之徒滅孰能亡己乎效夫天地之紀人言善亦勿聽人言惡亦勿聽持而待之空然勿兩之淑然自清無以旁言為事成察而徵之無聽辨萬物歸之美惡乃自見天或維之地或載之天莫之維則天以墜矣地莫之載則地以沉矣夫天不墜地不沉夫或維而載之也夫又況於人人有治之辟之若夫靁鼓之動也夫不能自搖者夫或之夫或者何若然者也視則不見聽則不聞灑乎天下滿不見其塞集於顏色知於肌膚責其往來莫知其時薄乎其方也韕乎其圜也韕韕乎莫得其門故口為聲也耳為聽也目有視也手有指也足有履也事物有所比也當生者生當死者死言有西有東各死其鄉置常立儀能守貞乎常事通道能官人乎故書其惡者言其薄者上聖之人口無虛習也手無虛指也物至而命之耳發於名聲凝於體色此其可諭者也不發於名聲不凝於體色此其不可諭者也及至於至者教存可也教亡可也故曰濟於舟者和於水矣義於人者祥於鬼矣事有適而無適若有適觿解無適而後適解有觿不可解而后解故善舉事者國莫知其解為善乎毋提提為不善乎將陷於刑善不善取信而止矣若左若右正中而已矣縣乎日月無已也愕愕者不以天下為憂剌剌者不以萬物為策孰能棄剌剌而為愕愕乎難言憲術須同而出無益言無損言近可以免故曰知何知乎謀何謀乎審而出者彼自來自知曰稽知人曰濟知苟適可為天下君內固之一可為長久論而用之可以為天下王天之視而精四璧辟而知請壤土而與生能若夫風與波乎唯其所欲適故子而代其父曰義也臣而代其君曰篡也篡何能歌武王是也故曰孰能去辨與巧而還與衆人同道故曰思索精者明益衰德行修者王道狹臥名利者寫生危知周於六合之內者吾知生之有為阻也持而滿之乃其殆也名滿於天下不若其已也名進而身退天之道也滿盛之國不可以仕任滿盛之家不可以嫁子驕倨傲暴之人不可與交道之大如天其廣如地其重如石其輕如羽民之所以知者寡故曰何道之近而莫之與能服也棄近而就遠何以費力也故曰欲愛吾身先知吾情周視六合以考內身以此知象乃知行情既知行情乃知養生左右前後周而復所執儀服象敬迎來者今夫來者必道其道無遷無衍命乃長久和以反中形性相葆一以無二是謂知道將欲服之必一其端而固其所守責其往來莫知其時索之於天與之為期不失其期乃能得之故曰吾語若大明之極大明之明非愛人不豫也同則相從反則相距也吾察反相距吾以故知同從之同也
