body:
  text: 短語十三地者萬物之本原諸生之根菀也美惡賢不肖愚俊之所生也水者地之血氣如䈥脈之通流者也故曰水具材也何以知其然也曰夫水淖弱以清而好灑人之惡仁也視之黑而白精也量之不可使概至滿而止正也唯無不流至平而止義也人皆赴高己獨赴下卑也卑也者道之室王者之器也而水以為都居準也者五量之宗也素也者五色之質也淡也者五味之中也是以水者萬物之準也諸生之淡也韙非得失之質也是以無不滿無不居也集於天地而藏於萬物産於金石集於諸生故曰水神集於草木根得其度華得其數實得其量鳥獸得之形體肥大羽毛豐茂文理明著萬物莫不盡其幾反其常者水之內度適也夫玉之所貴者九德出焉夫玉溫潤以澤仁也鄰以理者知也堅而不蹙義也廉而不劌行也鮮而不垢潔也折而不撓勇也瑕適皆見精也茂華光澤竝通而不相陵容也叩之其音清揚徹遠純而不殽辭也是以人主貴之藏以為寶剖以為符瑞九德出焉人水也男女精氣合而水流形三月如咀咀者何曰五味五味者何曰五藏酸主脾鹹主肺辛主腎苦主肝甘主心五藏已具而後生內脾生隔肺生骨腎生腦肝生革心生肉五內已具而後發為九竅脾發為鼻肝發為目腎發為耳肺發為竅五月而成十月而生生而目視耳聽心慮目之所以視非特山陵之見也察於荒忽耳之所聽非特雷鼓之聞也察於𠴫啾心之所慮非特知於粗粗也察於微眇是以水集於玉而九德出焉凝蹇而為人而九竅五慮出焉此乃其精粗濁蹇能存而不能亡者也伏暗能存而能亡者蓍龜與龍是也龜生於水發之於火於是為萬物先為禍福正龍生於水被五色而游故神欲小則化如蠶蠋欲大則函於天地欲上則凌於雲氣欲下則入於深泉變化無日上下無時謂之神龜與龍伏暗能存而能亡者也或世見或世不見者生蟡與慶忌故涸澤數百歲谷之不徙水之不絶者生慶忌慶忌者其狀若人其長四寸衣黃衣冠黃冠戴黃蓋乘小馬好疾馳以其名呼之可使千里外一日反報此涸澤之精也涸川之精者生於蟡蟡者一頭而兩身其形若蛇其長八尺以其名呼之可使取魚鱉此涸川水之精也是以水之精粗濁蹇能存而不能亡者生人與玉伏暗能存而亡者蓍龜與龍或世見或不見者蟡與慶忌故人皆服之而管子則之人皆有之而管子以之是故具者何也水是也萬物莫不以生唯知其託者能為之正具者水是也故曰水者何也萬物之本原也諸生之宗室也美惡賢不肖愚俊之所産也何以知其然也夫齊之水遒躁而復故其民貪粗而好勇楚之水淖弱而清故其民輕果而敢越之水濁重而洎故其民愚疾而垢秦之水泔最而稽𡌧滯而雜故其民貪戾罔而好事齊晉之水枯旱而運𡌧墆而雜故其民諂諛葆詐巧佞而好利燕之水萃下而弱沉滯而雜故其民愚戇而好貞輕疾而易死宋之水輕徑而清故其民簡易而好正是以聖人之化世也其解在水故水一則人心正水清則民心易民心正則欲不污民心易則行無邪是以聖人之治於世也不人告也不戶說也其樞在水短語十四管子曰令有時無時則必視順天之所以來五漫漫六惛惛孰知之哉唯聖人知四時不知四時乃失國之基不知五穀之故國家乃路故天曰信明地曰信聖四時曰正其王信明聖其臣乃正何以知其王之信明信聖也曰慎使能而善聽信使能之謂明聽信之謂聖信明聖者皆受天賞使不能為惛惛而忘也者皆受天禍是故上見成事而貴功則民事接勞而不謀上見功而賤則為人下者惰為人上者驕是故陰陽者天地之大理也四時者陰陽之大經也刑德者四時之合也刑德合於時則生福詭則生禍然則春夏秋冬將何行東方曰星其時曰春其氣曰風風生木與骨其德喜嬴而發出節時其事號令修除神位謹禱弊梗宗正陽治隄防耕藝樹藝正津梁修溝瀆甃屋行水解怨赦罪通四方然則柔風甘雨乃至百姓乃壽百蟲乃蕃此謂星德星掌發發為風是故春行冬政則雕行秋政則霜行夏政則欲是故春三月以甲乙之日發五政一政曰論幼孤赦有罪二政曰賦爵列授祿位三政曰凍解修溝瀆復亡人四政曰端險阻修封彊正千伯五政曰無殺麑夭毋蹇華絶萼五政苟時春雨乃來南方曰日其時曰夏其氣曰陽陽生人與氣其德施舍修樂其事號令賞賜賦爵受祿順鄉謹修神祀量功賞賢以助陽氣大暑乃至時雨乃降五穀百果乃登此謂日德日掌賞賞為暑夏行春政則風行秋政則水行冬政則落是故夏三月以丙丁之日發五政一政曰求有功發勞力者而舉之二政曰開久積發故屋辟故窖以假貸三政曰令禁扇去笠毋扱免除急漏田廬四政曰求有德賜布施於民者而賞之五政曰令禁罝設禽獸毋殺飛鳥五政苟時夏雨乃至也中央曰土土德實輔四時入出以風兩節土益力土生皮肌膚其德和平用均中正無私實輔四時春嬴育夏養長秋聚收冬閉藏大寒乃極國家乃昌四方乃服此謂歲德歲掌和和為雨西方曰辰其時曰秋其氣曰陰陰生金與甲其德憂哀靜正嚴順居不敢淫佚其事號令毋使民淫暴順旅聚收量民資以畜聚霣彼群幹聚彼群材百物乃收使民毋怠所惡其察所欲必得義信則克此謂辰德辰掌收收為陰秋行春政則榮行夏政則水行冬政則耗是故秋三月以庚辛之日發五政一政曰禁博塞圉小辨鬭譯誋譯忌鬭二政曰毋見五兵之刃三政曰慎旅農趣聚收四政曰補缺塞坼五政曰修牆垣周門閭五攻苟時五穀皆入北方曰月其時曰冬其氣曰寒寒生水與血其德淳越溫恕周密其事號令修禁徙民令靜止地乃不泄斷刑致罰無赦有罪以符陰氣大寒乃至甲兵乃強五穀乃熟國家乃昌四方乃犕此謂月德月掌罰罰為寒冬行春政則泄行夏政則靁行秋政則旱是故冬三月以壬癸之日發五政一政曰論孤獨恤長老二政曰善順陰修神祀賦爵祿授備位三政曰效會計毋發山川之藏四政曰攝姦遁得盜賊者有賞五政曰禁遷徙止流民圉分異五政苟時冬事不過所求必得所惡必伏是故春凋秋榮冬雷夏有霜雪此皆氣之賊也刑德易節失次則賊氣遫至賊氣遬至則國多菑殃是故聖王務時而寄政焉作教而寄武焉作祀而寄德焉此三者聖王所以合於天地之行也日掌陽月掌陰歲掌和陽為德陰為刑和為事是故日食則失德之國惡之月食則失刑之國惡之彗星見則失和之國惡之風與日爭明則失正之國惡之是故聖王日食則修德月食則修刑彗星見則修和風與日爭明則修正此四者聖王所以免於天地之誅也信能行之五穀蕃息六畜殖而甲兵強治積則昌暴虐積則亡道生天地德出賢人道生德德生正正生事是以聖王治天下窮則反終則始德始於春長於夏刑始於秋流於冬刑德不失四時如一刑德離鄉時乃逆行作事不成必有大殃月有三政王事必理以為必長不中者死失理者亡國有四時固執王事四守有所三政執輔短語十五一者本也二者器也三者充也治者四也教者五也守者六也立者七也前者八也終者九也九者然後具五官於六府也五聲於六律也六月日至是故人有六爻六爻所以街天地也天道以九制地理以八制人道以六制以天為父以地為母以開乎萬物以總一統通乎九制六府三充而為明天子修概水土以待乎天堇反五藏以視不親治祀之下以觀地位貨曋神廬合於精氣已合而有常有常而有經審合其聲修十二鍾以律人情人情已得萬物有極然后有德故通乎陽氣所以事天也經緯日月用之於民通乎陰氣所以事地也經緯星曆以視其離通若道然后有行然則神筮不靈神龜不卜黃帝澤參治之至也昔者黃帝得蚩尤而明於天道得大常而察於地利得蒼龍而辨於東方得祝融而辨於南方得大封而辨於西方得后土而辨於北方黃帝得六相而天下治神明之至也蚩尤明乎天道故使為當時大常察乎地利故使為廩者蒼龍辨乎東方故使為工師祝融辨乎南方故使為司徒大封辨於西方故使為司馬后土辨乎北方故使為李是故春者工師也夏者司徒也秋者司馬也冬者李也昔黃帝以其緩急作五聲以政五鍾令其五鍾一曰青鍾大音二曰赤鍾重心三曰黃鍾灑光四曰景鍾昧其明五曰黑鍾隱其常五聲既調然后作立五行以正天時五官以正人位人與天調然后天地之美生日至睹甲子木行御天子出令命左右士師內御總別列爵論賢不肖士吏賦祕賜賞於四境之內發故粟以田數出國衡順山林禁民斬木所以愛草木也然則冰解而凍釋草木區萌贖蟄蟲卵菱春辟勿時苗足本不癘雖鷇不夭麑䴠毋傅速亡傷繈葆時則不凋七十二日而畢睹丙子火行御天子出令命行人內御令掘溝澮津舊塗發臧任君賜賞君子修游馳以發地氣出皮幣命行人修春秋之禮於天下諸侯通天下遇者兼和然則天無疾風草木發奮鬱氣息民不疾而榮華蕃七十二日而畢睹戊子土行御天子出令命左右司徒內御不誅不貞農事為敬大揚惠言寬刑死緩罪人出國司徒令命順民之功力以養五穀君子靜居而農夫修其功力極然則天為粵宛草木養長五穀蕃實秀大六畜犧牲具民足財國富上下親諸侯和七十二日而畢睹庚子金行御天子出令命祝宗選禽獸之禁五穀之先熟者而薦之祖廟與五祀鬼神饗其氣焉君子食其味焉然則涼風至白露下天子出令命左右司馬組甲厲兵合什為伍以修於四境之內諛然告民有事所以待天地之殺斂也然則晝炙陽夕下露地競𡑡五穀鄰熟草木茂實歲農豐年大茂七十二日而畢睹壬子水行御天子出令命左右使人內御其氣足則發而止其氣不足則發撊瀆盜賊數劋竹箭伐檀柘令民出獵禽獸不釋巨少而殺之所以貴天地之所閉藏也然則羽卵者不段毛胎者不殰𣎜婦不銷棄草木根本美七十二日而畢睹甲子木行御天子不賦不賜賞而大斬伐傷君危不然太子危家人夫人死不然則長子死七十二日而畢睹丙子火行御天子敬行急政旱札苗死民厲七十二日而畢睹戊子土行御天子修宮室築臺榭君危外築城郭臣死七十二日而畢睹庚子金行御天子攻山擊石有兵作戰而敗士死喪執政七十二日而畢睹壬子水行御天子決塞動大水王后夫人薨不然則羽卵者段毛胎者殰𣎜婦銷棄草木根本不美七十二日而畢也
