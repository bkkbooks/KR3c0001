body:
  text: 中匡第十九內言二管仲會國用三分二在賓客其一在國管仲懼而復之公曰吾子猶如是乎四鄰賓客入者說出者譽光名滿天下入者不說出者不譽汙名滿天下壤可以為粟木可以為貨粟盡則有生貨散則有聚君人者名之為貴財安可有管仲曰此君之明也公曰民辦軍事矣吾欲誅大國之不道者則可乎對曰不可甲兵未足也請薄刑罰以厚甲兵於是死罪不殺刑罪不罰使以甲兵贖死罪以犀甲一戟刑罪以脅盾一戟過罰以金鈞無所抑而訟者成以束矢公曰甲兵既足矣吾欲誅大國之不道者可乎對曰愛四封之內而后可以惡竟外之不善者安卿大夫之家而后可以危救敵之國賜小國地而后可以誅大國之不道者舉賢良而后可以廢慢法鄙賤之民是故先王必有置也而后必有廢也必有利也而后必有害也桓公曰昔三王者既弒其君今言仁義則必以三王為法度不識其故何也對曰昔者禹平治天下及桀而亂之湯放桀以定禹功也湯平治天下及紂而亂之武王伐紂以定湯功也且善之伐不善也自古至今未有改之君何疑焉公又問曰古之亡國其何失對曰計得地與寶而不計失諸侯計得財委而不計失百姓計見親而不計見棄三者之屬一足以削遍而有者亡矣古之隳國家隕社稷者非故且為之也必少有樂焉不知其陷於惡也桓公謂管仲曰請致仲父其桓公官仲父而將飲之掘新井而柴焉十日齋戒召管仲管仲至公執爵夫人執尊觴三行管仲趨出公怒曰寡人齋戒十日而飲仲父寡人自以為脩矣仲父不告寡人而出其故何也鮑叔隰朋趨而出及管仲於途曰公怒管仲反入倍屏而立公不與言少進中庭公不與言少進傅堂公曰寡人齋戒十日而飲仲父自以為脫於罪矣仲父不告寡人而出未知其故也對曰臣聞之沉於樂者洽於憂厚於味者薄於行慢於朝者緩於政害於國家者危於社稷臣是以敢出也公遽下堂曰寡人非敢自為偷也仲父年長雖寡人亦衰矣吾願一朝安仲父也對曰臣聞壯者無怠老者無偷順天之道必以善終者也三王失之也非一朝之萃君柰何其偷乎管仲走出君以賓客之禮再拜送之明日管仲朝公曰寡人願聞國君之信對曰民愛之鄰國親之天下信之此國君之信公曰善請問信安始而可對曰始於為身中於為國成於為天下公曰請問為身對曰道血氣以求長年長心長德此為身也公曰請問為國對曰遠舉賢人慈愛百姓外存亡國繼絕世起諸孤薄稅斂輕刑罰此為國之大禮也公曰請問為天下對曰法行而不苛刑廉而不赦有司寬而不凌菀濁困滯者法度不亡往行不來而民游世矣此為天下也小匡第二十內言三桓公自莒反于齊使鮑叔牙為宰鮑叔辭曰臣君之庸臣也君有加惠於其臣使臣不凍飢則是君之賜也若必治國家則非臣之所能也其唯管夷吾乎臣之所不如管夷吾者五寬惠愛民臣不如也治國不失秉臣不如也忠信可結於諸侯臣不如也制禮義可法於四方臣不如也介冑執枹立於軍門使百姓皆加勇臣不如也夫管仲民之父母也將欲治其子不可棄其父母公曰管夷吾親射寡人中鉤殆於死今乃用之可乎鮑叔曰彼為其君動也君若宥而反之其為君亦猶是也公曰然則為之柰何鮑叔曰君使人請之魯公曰施伯魯之謀臣也彼知吾將用之必不吾予也鮑叔曰君詔使者曰寡君有不令之臣在君之國願請之以戮群臣魯君必諾且施伯之知夷吾之才必將致魯之政夷吾受之則魯能弱齊矣夷吾不受彼知其將反於齊必殺之公曰然則夷吾受乎鮑叔曰不受也夷吾事君無二心公曰其於寡人猶如是乎對曰非為君也為先君與社稷之故君若欲定宗廟則亟請之不然無及也公乃使鮑叔行成曰公子糺親也請君討之魯人為殺公子糺又曰管仲讎也請受而甘心焉魯君許諾施伯謂魯侯曰勿予非戮之也將用其政也管仲者天下之賢人也大器也在楚則楚得意於天下在晉則晉得意於天下在狄則狄得意於天下今齊求而得之則必長為魯國憂君何不殺而受之其屍魯君曰諾將殺管仲鮑叔進曰殺之齊是戮齊也殺之魯是戮魯也弊邑寡君願生得之以徇於國為群臣僇若不生得是君與寡君賊比也非弊邑之君所請也使臣不能受命於是魯君乃不殺遂生束縛而柙以予齊鮑叔受而哭之三舉施伯從而笑之謂大夫曰管仲必不死夫鮑叔之忎不僇賢人其智稱賢以自成也鮑叔相公子小白先入得國管仲召忽奉公子糺後入與魯以戰能使魯敗功足以得天與失天其人事一也今魯懼殺公子糺召忽囚管仲以予齊鮑叔知無後事必將勤管仲以勞其君顧以顯其功眾必予之有得力死之功猶尚可加也顯生之功將何如是昭德以貳君也鮑叔之知不是失也至於堂阜之上鮑叔祓而浴之三桓公親迎之郊管仲詘纓捷衽使人操斧而立其後公辭斧三然後退之公曰垂纓下衽寡人將見管仲再拜稽首曰應公之賜殺之黃泉死且不朽公遂與歸禮之於廟三酌而問為政焉曰昔先君襄公高臺廣池湛樂飲酒田獵罼弋不聽國政卑聖侮士唯女是崇九妃六嬪陳妾數千食必梁肉衣必文繡而戎士凍飢戎馬待游車之弊戎士待陳妾之餘倡優侏儒在前而賢大夫在後是以國家不日益不月長吾恐宗廟之不掃除社稷之不血食敢問為之柰何管子對曰昔吾先王周昭王穆王世法文武之遠迹以成其名合群叟比校民之有道者設象以為民紀式券以相應比綴以書原本窮末勸之以慶賞糺之以刑罰糞除其顛旄賜予以鎮撫之以為民終始公曰為之柰何管子對曰昔者聖王之治其民也參其國而伍其鄙定民之居成民之事以為民紀謹用其六秉如是而民情可得而百姓可御桓公曰六秉者何也管子曰殺生貴賤貧富此六秉也桓公曰參國柰何管子對曰制國以為二十一鄉商工之鄉六士農之鄉十五公帥十一鄉高子帥五鄉國子帥五鄉參國故為三軍公立三官之臣市立三鄉工立三族澤立三虞山立三衡制五家為軌軌有長十軌為里里有司四里為連連有長十連為鄉鄉有良人五鄉一帥桓公曰五鄙柰何管子對曰制五家為軌軌有長六軌為邑邑有司十邑為卒卒有長十卒為鄉鄉有良人三鄉為屬屬有大夫五屬五大夫武政聽屬文政聽鄉各保而聽毋有淫泆者桓公曰定民之居成民之事柰何管子對曰士農工商四民者國之石民也不可使雜處雜處則其言哤其事亂是故聖王之處士必於閒燕處農必就田壄處工必就官府處商必就市井令夫士群萃而州處間燕則父與父言義子與子言孝其事君者言敬長者言愛幼者言弟旦昔從事於此以教其子弟少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能夫是故士之子常為士令夫農群萃而州處審其四時權節其用備其械器比耒耜芨耞芟及寒擊槀除田以待時乃耕深耕均種疾耰先雨芸耨以待時雨時雨既至挾其槍刈耨鎛以旦暮從事於田壄稅衣就功別苗莠列䟽遬首戴苧蒲身服襏襫沾體塗足暴其髮膚盡其四支之力以疾從事於田野少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能是故農之子常為農樸野而不慝其秀才之能為士者則足賴也故以耕則多粟以仕則多賢是以聖王敬農戚農而不以告其罪五令夫工群萃而州處相良材審其四時辨其功苦權節其用論比計制斷器尚完利相語以事相示以功相陳以巧相高以知旦昔從事於此以教其子弟少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能夫是故工之子常為工令夫商群萃而州處觀凶飢審國變察其四時而監其鄉之貨以知其市之賈負任擔荷服牛輅馬以周四方料多少計貴賤以其所有易其所無買賤鬻貴是以羽旄不求而至竹箭有餘於國奇怪時來珍異物聚旦昔從事於此以教其子弟相語以利相示以時相陳以知賈少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能夫是故商之子常為商相地而衰其政則民不移矣正旅舊則民不惰山澤各以其時至則民不苟陵陸丘阜田疇均則民不惑無奪民時則百姓富犧牲不勞則牛馬育桓公又問曰寡人欲脩政以干時於天下其可乎管子對曰可公曰安始而可管子對曰始於愛民公曰愛民之道奈何管子對曰公修公族家修家族使相連以事相及以祿則民相親矣放舊罪修舊宗立無後則民殖矣省刑罰薄賦斂則民富矣鄉建賢士使教於國則民有禮矣出令不改則民正矣此愛民之道也公曰民富而以親則可以使之乎管子對曰舉財長工以足民用陳力尚賢以勸民知加刑無苛以濟百姓行之無私則足以容眾矣出言必信則令不窮矣此使民之道也桓公曰民居定矣事已成矣吾欲從事於天下諸侯其可乎管子對曰未可民心未吾安公曰安之柰何管子對曰脩舊法擇其善者舉而嚴用之慈於民予無財寬政役敬百姓則國富而民安矣公曰民安矣其可乎管仲對曰未可君若欲正卒伍修甲兵則大國亦將正卒伍修甲兵君有征戰之事則小國諸侯之臣有守圉之備矣然則難以速得意於天下公欲速得意於天下諸侯則事有所隱而政有所寓公曰為之奈何管子對曰作內政而寓軍令焉為高子之里為國子之里為公里三分齊國以為三軍擇其賢民使為里君鄉有行伍卒長則其制令且以田獵因以賞罰則百姓通於軍事矣桓公曰善於是乎管子乃制五家以為軌軌為之長十軌為里里有司四里為連連為之長十連為鄉鄉有良人以為軍令是故五家為軌五人為伍軌長率之十軌為里故五十人為小戎里有司率之四里為連故二百人為卒連長率之十連為鄉故二千人為旅鄉良人率之五鄉一帥故萬人一軍五鄉之帥率之三軍故有中軍之鼓有高子之鼓有國子之鼓春以田曰蒐振旅秋以田曰獮治兵是故卒伍政定於里軍旅政定於郊內教既成令不得遷徙故卒伍之人人與人相保家與家相愛少相居長相游察祀相福死喪相恤禍福相憂居處相樂行作相和哭泣相哀是故夜戰其聲相聞足以無亂晝戰其目相見足以相識驩欣足以相死是故以守則固以戰則勝君有此教士三萬人以橫行於天下誅無道以定周室天下大國之君莫之能圉也正月之朝鄉長復事公親問焉曰於子之鄉有居處為義好學聰明質仁慈孝於父母長弟聞於鄉里者有則以告有而不以告謂之蔽賢其罪五有司已於事而竣公又問焉曰於子之鄉有拳勇股肱之力䈥骨秀出於眾者有則以告有而不以告謂之蔽才其罪五有司已於事而竣公又問焉曰於子之鄉有不慈孝於父母不長弟於鄉里驕躁淫暴不用上令者有則以告有而不以告謂之下比其罪五有司已於事而竣於是乎鄉長退而脩德進賢桓公親見之遂使役之官公令官長期而書伐以告且令選官之賢者而復之曰有人居我官有功休德維順端愨以待時使使民恭敬以勸其稱謗言則足以補官之不善政公宣問其鄉里而有考驗乃召而與之坐省相其質以參其成功成事可立而時設問國家之患而不㝌退而察問其鄉里以觀其所能而無大過登以為上卿之佐名之曰三選高子國子退而脩鄉鄉退而脩連連退而脩里里退而脩軌軌退而脩家是故匹夫有善故可得而舉也匹夫有不善可得而誅也政既成鄉不越長朝不越爵罷士無伍罷女無家士三出妻逐於境外女三嫁入於舂穀是故民皆勉為善士與其為善於鄉不如為善於里與其為善於里不如為善於家是故士莫敢言一朝之便皆有終歲之計莫敢以終歲為議皆有終身之功正月之朝五屬大夫復事於公擇其寡功者而譙之曰列地分民者若一何故獨寡功何以不及人教訓不善政事其不治一再則宥三則不赦公又問焉曰於子之屬有居處為義好學聰明賢仁慈孝於父母長弟聞於鄉里者有則以告有而不以告謂之蔽賢有罪五有司已事而竣公又問焉曰於子之屬有拳勇股肱之力秀出於眾者有則以告有而不以告謂之蔽才其罪五有司已事而竣公又問焉曰於子之屬有不慈孝於父母不長弟於鄉里驕躁淫暴不用上令者有則以告有而不以告者謂之下比其罪五有司已事而竣於是乎五屬大夫退而脩屬屬退而脩連連退而脩鄉鄉退而脩卒卒退而脩邑邑退而脩家是故匹夫有善可得而舉匹夫有不善可得而誅政成國安以守則固以戰則彊封內治百姓親可以出征四方立一霸王矣桓公曰卒伍定矣事已成矣吾欲從事於諸侯其可乎管子對曰未可若軍令則吾既寄諸內政矣夫齊國寡甲兵吾欲輕重罪而移之於甲兵公曰為之柰何管子對曰制重罪入以兵甲犀脅二戟輕罪入蘭盾鞈革二戟小罪入以金鈞分宥薄罪入以半鈞無坐抑而訟獄者正三禁之而不直則入一束矢以罰之美金以鑄戈劍矛戟試諸狗馬惡金以鑄斤斧鉏夷鋸欘試諸木土桓公曰甲兵大足矣吾欲從事於諸侯可乎管仲對曰未可治內者未具也為外者未備也故使鮑叔牙為大諫王子城父為將弦子旗為理甯戚為田隰朋為行曹宿孫處楚商容處宋季友處魯衛開方處衛匽尚處燕審友處晉又游士八十人奉之以車馬衣裘多其資糧財幣足之使出周游於四方以號召收求天下之賢士飾玩好使出周游於四方鬻之諸侯以觀其上下之所貴好擇其沈亂者而先政之公曰外內定矣可乎管子對曰未可鄰國未吾親也公曰親之奈何管子對曰審吾疆埸反其侵地正其封界毋受其貨財而美為皮幣以極聘覜於諸侯以安四鄰則鄰國親我矣桓公曰甲兵大足矣吾欲南伐何主管子對曰以魯為主反其侵地常潛使海於有蔽渠彌於有陼環山於有牢桓公曰吾欲西伐何主管子對曰以衛為主反其侵地臺原姑與柒里使海於有蔽渠彌於有陼環山於有牢桓公曰吾欲北伐何主管子對曰以燕為主反其侵地柴夫吠狗使海於有蔽渠彌於有陼環山於有牢四鄰大親既反其侵地正其封疆地南至于岱陰西至於濟北至於海東至于紀隨地方三百六十里三歲治定四歲教成五歲兵出有教士三萬人革車八百乘諸侯多沈亂不服於天子於是乎桓公東救徐州分吳半存魯陵蔡割越地南據宋鄭征伐楚濟汝水踰方城望文山使貢絲于周室成周反胙於隆嶽荊州諸侯莫不來服中救晉公禽狄王敗胡貉破屠何而騎寇始服北伐山戎制泠支斬孤竹而九夷始聽海濱諸侯莫不來服西征攘白狄之地遂至于西河方舟投柎乘浮濟河至于石枕縣車束馬踰大行與卑耳之谿拘泰夏西服流沙西虞而秦戎始從故兵一出而大功十二故東夷西戎南蠻北狄中國諸侯莫不賓服與諸侯飾牲為載書以誓要于上下庶神然後率天下定周室大朝諸侯於陽穀故兵車之會六乘車之會三九合諸侯一匡天下甲不解壘兵不解翳弢無弓服無矢寢武事行文道以朝天子葵丘之會天子使大夫宰孔致胙於桓公曰余一人有事於文武使宰孔致胙且有後命曰以爾自卑勞實謂爾伯舅毋下拜桓公召管仲而謀管仲對曰為君不君為臣不臣亂之本也桓公曰余乘車之會三兵車之會六九合諸侯一匡天下北至於孤竹山戎穢貉拘泰夏西至流沙西虞南至吳越巴䍧柯𤬅不庾雕題黑齒荊夷之國莫違寡人之命而中國卑我昔三代之受命者其異於此乎管子對曰夫鳳皇鸞鳥不降而鷹隼鴟梟豐庶神不格守龜不兆握粟而筮者屢中時雨甘露不降飄風暴雨數臻五穀不蕃六畜不育而蓬蒿藜𧆀藋竝興夫鳳皇之文前德義後日昌昔人之受命者龍龜假河出圖雒出書地出乘黃今三祥未見有者雖曰受命無乃失諸乎桓公懼出見客曰天威不違顏咫尺小白承天子之命而毋不拜恐顛蹶於下以為天子羞遂下拜登受賞服大路龍旗九游渠門赤旂天子致命於桓公而不受天下諸侯稱順焉桓公憂天下諸侯魯有夫人慶父之亂而二君弒死國絕無後桓公聞之使高子存之男女不淫馬牛選具執玉以見請為關內之侯而桓公不使也狄人攻邢桓公築夷儀以封之男女不淫馬牛選具執玉以見請為關內之侯而桓公不使也狄人攻衛衛人出旅於曹桓公城楚丘封之其畜以散亡故桓公予之繫馬三百匹天下諸侯稱仁焉於是天下之諸侯知桓公之為己勤也是以諸侯之歸之也譬若市人桓公知諸侯之歸己也故使輕其幣而重其禮故使天下諸侯以疲馬犬羊為幣齊以良馬報諸侯以縵帛鹿皮四介以為幣齊以文錦虎豹皮報諸侯之使垂櫜而入載而歸故釣之以愛致之以利結之以信示之以武是故天下小國諸侯既服桓公莫敢之倍而歸之喜其愛而貪其利信其仁而畏其武桓公知天下小國諸侯之多與己也於是又大施惠焉可為憂者為之憂可為謀者為之謀可為動者為之動伐譚萊而不有也諸侯稱仁焉通齊國之魚鹽東萊使關市幾而不正而不稅以為諸侯之利諸侯稱寬焉築蔡鄢陵培夏靈父丘以御戎狄之地所以禁暴於諸侯也中築五鹿鄴蓋與牡丘以衛諸夏之地所以示權於中國也教大成是故天下之於桓公遠國之民望如父母近國之民從如流水故行地茲遠得人彌眾是何也懷其文而畏其武故殺無道定周室天下莫之能圉武事立也定三革偃五兵朝服以濟河而無愓怵惕焉文事勝也是故大國之君慚媿小國諸侯附比是故大國之君事如臣僕小國諸侯驩如父母夫然故大國之君不尊小國諸侯不卑是故大國之君不驕小國諸侯不懾於是列廣地以益狹地損有財以與無財周其君子不失成功周其小人不失成命夫如是居處則順出則有成功不稱動甲兵之事以遂文武之迹於天下桓公能假其群臣之謀以益其智也其相曰夷吾大夫曰甯戚隰朋賓胥無鮑叔牙用此五子者何功度義光德繼法紹於天下以遺後嗣貽孝昭穆大霸天下名聲廣裕不可掩也則唯有明君在上察相在下也初桓公郊迎管子而問焉管仲辭讓然後對以參國伍鄙立五鄉以崇化建五屬以厲武寄兵於政因刑罰備器械加兵無道諸侯以事周室桓公大說於是齋戒十日將相管仲管仲曰斧鉞之人也幸以獲生以屬其腰領臣之祿也若知國政非臣之任也公曰子大夫受政寡人勝任子大夫不受政寡人恐崩管仲許諾再拜而受相三日公曰寡人有大邪三其猶尚可以為國乎對曰臣未得聞公曰寡人不幸而好田晦夜而至禽側田莫不見禽而後反諸侯使者無所致百官有司無所復對曰惡則惡矣然非其急者也公曰寡人不幸而好酒日夜相繼諸侯使者無所致百官有司無所復對曰惡則惡矣然非其急者也公曰寡人有汙行不幸而好色而姑姊有不嫁者對曰惡則惡矣然非其急者也公作色曰此三者且可則惡有不可者矣對曰人君唯僾與不敏為不可僾則亡眾不敏不及事公曰善吾子就舍異日請與吾子圖之對曰時可將與夷吾何待異日乎公曰柰何對曰公子舉為人博聞而知禮好學而辭遜請使游於魯以結交焉公子開方為人巧轉而兌利請使游於衛以結交焉曹孫宿其為人也小廉而荷𢗗足恭而辭給正荊之則也請使往游以結交焉遂立行三使者而後退相三月請論百官公曰諾管仲曰升降揖讓進退閑習辨辭之剛柔臣不如隰朋請立為大行墾草入邑辟土聚粟多眾盡地之利臣不如甯戚請立為大司田平原廣牧車不結轍士不旋踵鼓之而三軍之士視死如歸臣不如王子城父請立為大司馬決獄折中不殺不辜不誣無罪臣不如賓胥無請立為大司理犯君顏色進諫必忠不辟死亡不撓富貴臣不如東郭牙請立以為大諫之官此五子者夷吾一不如然而以易夷吾夷吾不為也君若欲治國彊兵則五子者存矣若欲霸王夷吾在此桓公曰善王言第二十一內言四篇亡
