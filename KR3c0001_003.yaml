body:
  text: 幼官第八經言八若圖人物人物則皇五和時節君服黃色味甘味聽宮聲治和氣用五數飲於黃后之井以倮獸之火爨藏溫儒行歐養坦氣修通凡物開靜形生理處虛守靜人人物物則皇常至命尊賢授德則帝身仁行義服忠用信則王審謀章禮選士利械則霸定生處死謹賢修伍則衆信賞審罰爵材祿能則強計凡付終務本飭末則富明法審數立常備能則治同異分官則安通之以道畜之以惠親之以仁養之以義報之以德結之以信接之以禮和之以樂期之以事攻之以官發之以力威之以誠一舉而上下得終再舉而民無不從三舉而地辟穀成四舉而農佚粟十五舉而務輕金九六舉而潔知事變七舉而外內為用八舉而勝行威立九舉而帝事成形九本搏大人主之守也八分有職卿相之守也七勝備威將軍之守也六紀審密賢人之守也五紀不解庶人之守也動而無不從靜而無不同治亂之本三卑尊之交四富貧之終五盛衰之紀六安危之機七強弱之應八存亡之數九練之以散群傰署凡數財署殺僇以聚財勸勉以遷衆使二分具本發善必審於密執威必明於中此居啚方中春行冬政肅行秋政霜行夏政閹十二地氣發戒春事十二小卯出耕十二天氣下賜與十二義氣至修門閭十二清明發禁十二始卯合男女十二中卯十二下卯三卯同事八舉時節君服青色味酸味聽角聲治燥氣用八數飲於青后之井以羽獸之火爨藏不忍行歐養坦氣修通凡物開靜形生理合內空周外強國為圈弱國為屬動而無不從靜而無不同舉發以禮時禮必得和好不基貴賤無司事變日至此居於圖東方方外夏行春政風行冬政落重則雨雹行秋政水十二小郢至德十二絶氣下下爵賞十二中郢賜與十二中絶收聚十二大暑至盡善十二中暑十二大暑終三暑同事七舉時節君服赤色味苦味聽羽聲用七數飲於赤后之井以毛獸之火爨藏薄純行篤厚坦氣修通凡物開靜形生理定府官明名分而審責於群臣有司則下不乘上賤不乘貴法立數得而無比周之民則上尊而下卑遠近不乖此居於圖南方方外秋行夏政葉行春政華行冬政耗十二期風至戒秋事十二小卯薄百爵十二白露下收聚十二復理賜與十二始節賦事十二始卯合男女十二中卯十二下卯三卯同事九和時節君服白色味辛味聽商聲治濕氣用九數飲於白后之井以介蟲之火爨藏恭敬行搏鋭坦氣修通凡物開靜形生理間男女之畜修鄉閭之什伍量委積之多寡定府官之計數養老弱而勿通信利周而無私此居於圖西方方外冬行秋政霧行夏政雷行春政蒸泄十二始寒盡刑十二小榆賜豫十二中寒收聚十二中榆大收十二寒至靜十二大寒之陰十二大寒終三寒同事六行時節君服黑色味鹹味聽徵聲治陰氣用六數飲於黑后之井以鱗獸之火爨藏慈厚行薄純坦氣修通凡物開靜形生理器成於僇教行於鈔動靜不記行止無量戒四時以別息異出入以兩易明養生以解固審取豫以總之一會諸侯令曰非玄帝之命毋有一日之師役再會諸侯令曰養孤老食常疾收孤寡三會諸侯令曰田租百取五市賦百取二關賦百取一毋乏耕織之器四會諸侯令曰修道路偕度量一稱數藪澤以時禁發之五會諸侯令曰修春秋冬夏之常祭食天壤山川之故祀必以時六會諸侯令曰以爾壤生物共玄官請四輔將以禮上帝七會諸侯令曰官處四體而無禮者流之焉莠命八會諸侯令曰立四義而毋議者尚之于玄官聽于三公九會諸侯令曰以爾封內之財物國之所有為幣九會大命焉出常至千里之外二千里之內諸侯三年而朝習命二年三卿使四輔一年正月朔日令大夫來修受命三公二千里之外三千里之內諸侯五年而會至習命三年名卿請事二年大夫通吉凶十年重適入正禮義五年大夫請受變三千里之外諸侯世一至置大夫以為廷安入共受命焉此居於圖北方方外必得文威武官習勝務時因勝之終無方勝之幾行義勝之理名實勝之急時分勝之事察伐勝之行備具勝之原無象勝之本定獨威勝定計財勝定聞知勝定選士勝定制祿勝定方用勝定綸理勝定死生勝定成敗勝定依奇勝定實虛勝定盛衰勝舉機誠要則敵不量用利至誠則敵不校明名章實則士死節奇舉發不意則士歡用交物因方則械器備因能利備則求必得執務明本則士不偷備具無常無方應也聽於鈔故能聞未極視於新故能見未形思於濬故能知未始發於驚故能至無量動於昌故能得其寶立於謀故能實不可故也器成教守則不遠道里號審教施則不險山河博一純固則獨行而無敵慎號審章則其攻不待權與明必勝則慈者勇器無方則愚者智攻不守則拙者巧數也動慎十號明審九章飾習十器善習五教謹修三官主必常設計必先定求天下之精材論百工之鋭器器成角試否臧收天下之豪傑有天下之稱材説行若風雨發如雷電此居於圖方中旗物尚青兵尚矛刑則交寒害釱器成不守經不知教習不著發不意經不知故莫之能圉發不意故莫之能應莫之能應故全勝而無害莫之能圉故必勝而無敵四機不明不過九日而遊兵驚軍障塞不審不過八日而外賊得間申守不慎不過七日而內有讒謀詭禁不修不過六日而竊盜者起死亡不食不過四日而軍財在敵此居於圖東方方外旗物尚赤兵尚戟刑則燒交疆郊必明其情必明其將必明其政必明其士四者備則以治擊亂以成擊敗數戰則士疲數勝則君驕驕君使疲民則國危至善不戰其次一之大勝者積衆勝無非義者焉可以為大勝大勝無不勝也此居於圖南方方外旗物尚白兵尚劍刑則詔昧斷絶始乎無端卒乎無窮始乎無端道也卒乎無窮德也道不可量德不可數不可量則衆強不能圖不可數則為詐不敢鄉兩者備施動靜有功畜之以道養之以德畜之以道則民和養之以德則民合和合故能習習故能偕偕習以悉莫能傷也此居於圖西方方外旗物尚黑兵尚脅盾刑則遊仰灌流察數而知治審器而識勝明謀而適勝通德而天下定定宗廟育男女官四分則可以立威行德制法儀出號令至善之為兵也非地是求也罰人是君立義而加之以勝至威而實之以德守之而後修勝心焚海內民之所利立之所害除之則民人從立為六千里之侯則大人從使國君得其治則人君從會請命於天地知氣和則生物從計緩急之事則危危而無難明於器械之利則涉難而不變察於先後之理則兵出而不困通於出入之度則深入而不危審於動靜之務則功得而無害也著於取與之分則得地而不執慎於號令之官則舉事而有功此居於圖北方方外幼官圖第九經言九秋行夏政葉行春政華行冬政耗十二期風至戒秋事十二小卯薄百爵十二白露下收聚十二復理賜豫十二始節賦事十二始卯合男女十二中卯十二下卯三卯同事九和時節君服白色味辛味聽商聲治濕氣用九數飲於白后之井以介獸之火爨藏恭敬行搏鋭坦氣修通凡物開靜形生理間男女之畜修鄉里之什伍量委積之多寡定府官之計數養老弱而勿通信利害而無私此居於圖西方方外右西方本圖旗物尚白兵尚劍刑則紹昧斷絶始乎無端卒乎無窮始乎無端道也卒乎無窮德也道不可量德不可數不可量則衆強不能圖不可數則為詐不敢鄉兩者備施動靜有功畜之以道養之以德畜之以道則民和養之以德則民合和合故能習習故能偕偕習以悉莫之能傷也此居於圖西方方外右西方副圖夏行春政風行冬政落重則雨雹行秋政水十二小郢至德十二絶氣下下爵賞十二中郢賜與十二中絶收聚十二大暑至盡善十二中暑十二小暑終三暑同事十舉時節君服赤色味苦味聽羽聲治陽氣用七數飲於赤后之井以毛獸之火爨藏薄純行篤厚坦氣修通凡物開靜形生理定府官明名分而審責於群臣有司則下不乘上賤不乘貴法立數得而無比周之民則上尊而下卑遠近不乖此居於圖南方方外右南方本圖若圖人物則皇五和時節君服黃色味甘味聽宮聲治和氣用五數飲於黃后之井以倮獸之火爨藏溫儒行歐養坦氣修通凡物開靜形生理處虛守靜人物則皇常至命尊賢授德則帝身仁行義服忠用信則王審謀章禮選士利械則霸定生處死謹賢修伍則衆信賞審罰爵材祿能則強計凡付終務本飾末則富明法審數立常備能則治同異分官則安通之以道畜之以惠親之以仁養之以義報之以德結之以信接之以禮和之以樂期之以事攻之以言發之以力威之以誠一舉而上下得終再舉而民無不從三舉而地辟穀成四舉而農佚粟十五舉而務輕金九六舉而潔知事變七舉而內外為用八舉而勝行威立九舉而帝事成形九本搏大人主之守也八分有職卿相之守也七勝備威將軍之守也六紀審密賢人之守也五紀不解庶人之守也治亂之本三卑尊之交四富貧之終五盛衰之紀六安危之機七強弱之應八存亡之數九練之以散群傰署凡數財署殺僇以聚財勸勉以遷衆使二分具本發善必審於密執威必明於中此居圖方中右中方本圖冬行秋政霧行夏政雷行春政蒸泄十二始寒盡刑十二小榆賜豫十二中寒收聚十二中榆大收十二大寒至靜十二大寒之陰十二大寒終三寒同事六行時節君服黑色味鹹味聽徵聲治陰氣用六數飲於黑后之井以鱗獸之火爨藏慈厚行薄純坦氣修通凡物開靜形生理器成於僇教行於鈔動靜不記行止無量戒四時以別息異出入以兩易明養生以解固審取與以總之一會諸侯令曰非玄帝之命毋有一日之師役再會諸侯令曰養孤老食常疾收孤寡三會諸侯令曰田租百取五市賦百取二關賦百取一毋乏耕織之器四會諸侯令曰修道路偕度量一稱數毋征藪澤以時禁發之五會諸侯令曰修春秋冬夏之常祭食天壤山川之故祀必以時六會諸侯令曰以爾壤生物共玄官請四輔將以祀上帝七會諸侯令曰官處四體而無禮者流之焉莠命入會諸侯令曰立四義而無議者尚之于玄官聽於三公九會諸侯令曰以爾封內之財物國之所有為幣九會大令焉出常至千里之外二千里之內諸侯三年而朝習命二年三卿使四輔一年正月朔日令大夫來修受命三公二千里之外三千里之內諸侯五年而會至習命三年名卿請事二年大夫通吉凶十年重適人正禮義五年大夫請變三千里之外諸侯世一至置大夫以為廷安入共受命焉此居於圖北方方外右北方本圖旗物尚赤兵尚戟刑則燒交疆郊必明其情必明其將必明其政必明其士四者備則以治擊亂以成擊敗數戰則士疲數勝則君驕驕君使疲民則危國至善不戰其次一之大勝者積衆勝而無非義者焉可以為大勝大勝無不勝也此居於圖南方方外右南方副圖必得文威武官習勝之務時因勝之終無方勝之幾行義勝之理名實勝之急時分勝之事察伐勝之行備具勝之原無象勝之本定獨威勝定計財勝定知聞勝定選士勝定制祿勝定方用勝定綸理勝定死生勝定成敗勝定依奇勝定實虛勝定盛衰勝舉機誠要則敵不量用利至誠則敵不校明名章實則士死節奇舉發不意則士歡用交物因方則械器備因能利備則求必得執務明本則士不偷備具無常無方應也聽於鈔故能聞無極視於新故能見未形思於濬故能知未始發於驚故能至無量動於昌故能得其寶立於謀故能實不可故也器成教守則不遠道里號審教施則不險山河博一純固則獨行而無敵慎號審章則其攻不待權與明必勝則慈者勇器無方則愚者智攻不守則拙者巧數也動慎十號明審九章飾習十器善習五教謹修三官主必常設計必先定求天下之精材論百工之鋭器器成角試否臧收天下之豪傑有天下之稱材説行若風雨發如雷電此居於圖方中右中方副圖旗物尚黑兵尚脅盾刑則遊仰灌流察數而知治審器而識勝明謀而適勝通德而天下定定宗廟育男女官四分則可以立威行德制法儀出號令至善之為兵也非地是求也罰人是君也立義而加之以勝至威而實之以德守之而後修勝心焚海內民之所利立之所害除之則民人從立為六千里之侯則大人從使國君得其治則人君從會請命於天地知氣和則生物從計緩急之事則危危而無難明於器械之利則涉難而不變察於先後之理則兵出而不困通於出入之度則深入而不危審於動靜之務則功得而無害也著於取與之分則得地而不執慎於號令之官則舉事而有功此居於圖北方方外右北方副圖春行冬政肅行秋政霜行夏政閹十二地氣發戒春事十二小卯出耕十二天氣下賜與十二義氣至修門閭十二清明發禁十二始卯合男女十二中卯十二下卯三卯同事八舉時節君服青色味酸味聽角聲治燥氣用八數飲於青后之井以羽獸之火爨藏不忍行歐養坦氣修通凡物開靜形生理合內空周外強國為圈弱國為屬動而無不從靜而無不同舉發以禮時禮必得和好不基貴賤無司事變日至此居於圖東方方外右東方本圖旗物尚青兵尚矛刑則交寒害釱器成不守經不知教習不著發不意經不知故莫之能圉發不意故莫之能應莫之能應故全勝而無害莫之能圉故必勝而無敵四機不明不過九日而遊兵驚軍障塞不審不過八日而外賊得聞申守不慎不過七日而內有讒謀詭禁不修不過六日而竊盜者起死亡不食不過四日而軍財在敵此居於圖東方方外右東方副圖五輔第十外言一古之聖王所以取明名廣譽厚功大業顯於天下不忘於後世非得人者未之嘗聞暴王之所以失國家危社稷覆宗廟滅於天下非失人者未之嘗聞今有土之君皆處欲安動欲威戰欲勝守欲固大者欲王天下小者欲霸諸侯而不務得人是以小者兵挫而地削大者身死而國亡故曰人不可不務也此天下之極也曰然則得人之道莫如利之利之之道莫如教之以政故善為政者田疇墾而國邑實朝廷間而官府治公法行而私曲止倉廩實而囹圄空賢人進而姦民退其君子上中正而下諂諛其士民貴武勇而賤得利其庶人好耕農而惡飲食於是財用足而飲食薪菜饒是故上必寬裕而有解舍下必聽從而不疾怨上下和同而有禮義故處安而動威戰勝而守固是以一戰而正諸侯不能為政者田疇荒而國邑虛朝廷凶而官府亂公法廢而私曲行倉廩虛而囹圄實賢人退而姦民進其君子上諂諛而下中正其士民貴得利而賤武勇其庶人好飲食而惡耕農於是財用匱而食飲薪菜乏上彌殘苛而無解舍下愈覆鷙而不聽從上下交引而不和同故處不安而動不威戰不勝而守不固是以小者兵挫而地削大者身死而國亡故以此觀之則政不可不慎也德有六興義有七體禮有八經法有五務權有三度所謂六興者何曰辟田疇制壇宅修樹藝勸士民勉稼穡修牆屋此謂厚其生發伏利輸墆積修道途便關市慎將宿此謂輸之以財導水潦利陂溝決潘渚潰泥滯通鬱閉慎津梁此謂遺之以利薄徵斂輕征賦弛刑罰赦罪戾宥小過此謂寬其政養長老慈幼孤恤鰥寡問疾病弔禍喪此謂匡其急衣凍寒食飢渴匡貧窶賑罷露資乏絶此謂賑其窮凡此六者德之興也六者既布則民之所欲無不得矣夫民必得其所欲然后聽上聽上然后政可善為也故曰德不可不興也曰民知德矣而未知義然后明行以導之義義有七體七體者何曰孝悌慈惠以養親戚恭敬忠信以事君上中正比宜以行禮節整齊撙詘以辟刑僇纖嗇省用以備飢饉敦懞純固以備禍亂和協輯睦以備冠戎凡此七者義之體也夫民必知義然后中正中正然后和調和調乃能處安處安然后動威動威乃可以戰勝而守固故曰義不可不行也曰民知義矣而未知禮然后飾八經以導之禮所謂八經者何曰上下有義貴賤有分長幼有等貧富有度凡此八者禮之經也故上下無義則亂貴賤無分則爭長幼無等則倍貧富無度則失上下亂貴賤爭長幼倍貧富失而國不亂者未之嘗聞也是故聖王飭此八禮以導其民八者各得其義則為人君者中正而無私為人臣者忠信而不黨為人父者慈惠以教為人子者孝悌以肅為人兄者寬裕以誨為人弟者比順以敬為人夫者敦懞以固為人妻者勸勉以貞夫然則下不倍上臣不殺君賤不踰貴少不陵長遠不間親新不間舊小不加大淫不破義凡此八者禮之經也夫人必知禮然后恭敬恭敬然后尊讓尊讓然后少長貴賤不相踰越少長貴賤不相踰越故亂不生而患不作故曰禮不可不謹也曰民知禮矣而未知務然后布法以任力任力有五務五務者何曰君擇臣而任官大夫任官辨事官長任事守職士修身功材庶人耕農樹藝君擇臣而任官則事不煩亂大夫任官辨事則舉措時官長任事守職則動作和士修身功材則賢良發庶人耕農樹藝則財用足故曰凡此五者力之務也夫民必知務然后心一心一然后意專心一而意專然后功足觀也故曰力不可不務也曰民知務矣而未知權然后考三度以動之所謂三度者何曰上度之天祥下度之地宜中度之人順此所謂三度故曰天時不祥則有水旱地道不宜則有飢饉人道不順則有禍亂此三者之來也政召之曰審時以舉事以事動民以民動國以國動天下天下動然后功名可成也故民必知權然后舉錯得舉錯得則民和輯民和輯則功名立矣故曰權不可不度也五經既布然后逐姦民詰詐偽屏讒慝而毋聽淫辭毋作淫巧若民有淫行邪性樹為淫辭作為淫巧以上諂君上而下惑百姓移國動衆以害民務者其刑死流故曰凡人君之所以內失百姓外失諸侯兵挫而地削名卑而國虧社稷滅覆身體危殆非生於淫諂者未之嘗聞也何以知其然也曰淫聲諂耳淫觀諂目耳目之所好諂心心之所好傷民民傷而身不危者未之嘗聞也曰實壙虛墾田疇修牆屋則國家富節飲食撙衣服則財用足舉賢良務功勞布德惠則賢人進逐姦人詰詐偽去讒慝則姦人止備飢饉救災害賑罷露則國家定明王之務在於強本事去無用然後民可使富論賢人用有能而民可使治薄稅斂毋苛於民待以忠愛而民可使親三者霸王之事也事有本而仁義其要也今工以巧矣而民不足於備用者其悅在玩好農以勞矣而天下飢者其悅在珍怪女以巧矣而天下寒者其悅在文繡是故博帶梨大袂列文繡染刻鏤削雕琢平關幾而不征市廛而不稅古之良工不勞其知巧以為玩好是故無用之物守法者不生
