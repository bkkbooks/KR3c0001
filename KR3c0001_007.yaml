body:
  text: 大匡第十八內言一齊僖公生公子諸兒公子糾公子小白使鮑叔傅小白鮑叔辭稱疾不出管仲與召忽往見之曰何故不出鮑叔曰先人有言曰知子莫若父知臣莫若君今君知臣之不肖也是以使賤臣傅小白也賤臣知棄矣召忽曰子固辭無出吾權任子以死亡必免子鮑叔曰子如是何不免之有乎管仲曰不可持社稷宗廟者不讓事不廣間將有國者未可知也子其出乎召忽曰不可吾三人者之於齊國也譬之猶鼎之有足也去一焉則必不立矣吾觀小白必不為後矣管仲曰不然也夫國人憎惡糾之母以及糾之身而憐小白之無母也諸兒長而賤事未可知也夫所以定齊國者非此二公子者將無已也小白之為人無小智惕而有大慮非夷吾莫容小白天不幸降禍加殃于齊糾雖得立事將不濟非子定社稷其將誰也召忽曰百歲之後吾君下世犯吾君命而廢吾所立奪吾糾也雖得天下吾不生也兄與我齊國之政也受君令而不改奉所立而不濟是吾義也管仲曰夷吾之為君臣也將承君命奉社稷以持宗廟豈死一糾哉夷吾之所死者社稷破宗廟滅祭祀絶則夷吾死之非此三者則夷吾生夷吾生則齊國利夷吾死則齊國不利鮑叔曰然則奈何管子曰子出奉令則可鮑叔許諾乃出奉令遂傅小白鮑叔謂管仲曰何行管仲曰為人臣者不盡力於君則不親信不親信則言不聽言不聽則社稷不定夫事君者無二心鮑叔許諾僖公之母弟夷仲年生公孫無知有寵於僖公衣服禮秩如適僖公卒以諸兒長得為君是為襄公襄公立后絀無知無知怒公令連稱管至父戍葵丘曰瓜時而往及瓜時而來期戍公問不至請代不許故二人因公孫無知以作亂魯桓公夫人文薑齊女也公將如齊與夫人皆行申俞諫曰不可女有家男有室無相瀆也謂之有禮公不聽遂以文薑會齊侯於濼文薑通於齊侯桓公聞責文薑文薑告齊侯齊侯怒饗公使公子彭生乘魯侯脅之公薨于車豎曼曰賢者死忠以振疑百姓寓焉智者究理而長慮身得免焉今彭生二於君無盡言而諛行以戲我君使我君失親戚之禮今又力成吾君之禍以構二國之怨彭生其得免乎禍理屬焉夫君以怒遂禍不畏惡親開容昏生無醜也豈及彭生而能止之哉魯若有誅必以彭生為説二月魯人告齊曰寡君畏君之威不敢寧居來修舊好禮成而不反無所歸咎請以彭生除之齊人為殺彭生以謝于魯五月襄公田于貝丘見豕從者曰公子彭生也公怒曰公子彭生安敢見射之豕人立而啼公懼墜於車下傷足亡屨反誅屨於徒人費不得也鞭之見血費走而出遇賊於門脅而束之費袒而示之背賊信之使費先入伏公而出鬭死于門中石之紛如死于陛下孟陽代君寢于床賊殺之曰非君也不類見公之足于戶下遂殺公而立公孫無知也鮑叔牙奉公子小白奔莒管夷吾召忽奉公子糾奔魯九年公孫無知虐於雍廩雍廩殺無知也桓公自莒先入魯人伐齊納公子糾戰於乾時管仲射桓公中鉤魯師敗績桓公踐位於是劫魯使魯殺公子糾桓公問於鮑叔曰將何以定社稷鮑叔曰得管仲與召忽則社稷定矣公曰夷吾與召忽吾賊也鮑叔乃告公其故圖公曰然則可得乎鮑叔曰若亟召則可得也不亟不可得也夫魯施伯知夷吾為人之有慧也其謀必將令魯致政於夷吾夷吾受之則彼知能弱齊矣夷吾不受彼知其將反於齊也必將殺之公曰然則夷吾將受魯之政乎其否也鮑叔對曰不受夫夷吾之不死糾也為欲定齊國之社稷也今受魯之政是弱齊也夷吾之事君無二心雖知死必不受也公曰其於我也曾若是乎鮑叔對曰非為君也為先君也其於君不如親糾也糾之不死而況君乎君若欲定齊之社稷則亟迎之公曰恐不及奈何鮑叔曰夫施伯之為人也敏而多畏公若先及恐注怨焉必不殺也公曰諾施伯進對魯君曰管仲有慧其事不濟今在魯君其致魯之政焉若受之則齊可弱也若不受則殺之殺之以説於齊也與同怒尚賢於已君曰諾魯未及致政而齊之使至曰夷吾與召忽也寡人之賊也今在魯寡人願生得之若不得也是君與寡人賊比也魯君問施伯施伯曰君與之臣聞齊君惕而亟驕雖得賢庸必能用之乎及齊君之能用之也管子之事濟也夫管仲天下之大聖也今彼反齊天下皆鄉之豈獨魯乎今若殺之此鮑叔之友也鮑叔因此以作難君必不能待也不如與之魯君乃遂束縛管仲與召忽管仲謂召忽曰子懼乎召忽曰何懼乎吾不蚤死將胥有所定也令既定矣令子相齊之左必令忽相齊之右雖然殺君而用吾身是再辱我也子為生臣忽為死臣忽也知得萬乘之政而死公子糾可謂有死臣矣子生而霸諸侯公子糾可謂有生臣矣死者成行生者成名名不兩立行不虛至子其勉之死生有分矣乃行入齊境自刎而死管仲遂入君子聞之曰召忽之死也賢其生也管仲之生也賢其死也或曰明年襄公逐小白小白走莒十二年襄公薨公子糾踐位國人召小白鮑叔曰胡不行矣小白曰不可夫管仲知召忽強武雖國人召我我猶不得入也鮑叔曰管仲得行其知於國國可謂亂乎召忽強武豈能獨圖我哉小白曰夫雖不得行其知豈且不有焉乎召忽雖不得衆其友豈不足以圖我哉鮑叔對曰夫國之亂也智人不得作內事朋友不能相合摎而國乃可圖也乃命車駕鮑叔御小白乘而出於莒小白曰夫二人者奉君令吾不可以試也乃將下鮑叔履其足曰事之濟也在此時事若不濟老臣死之公子猶之免也乃行至於邑郊鮑叔令車二十乘先十乘後鮑叔乃告小白曰夫國之疑二三子莫忍老臣事之未濟也老臣是以塞道鮑叔乃誓曰事之濟也聽我令事之不濟也免公子者為上死者為下吾以五乘之實距路鮑叔乃為前驅遂入國逐公子糾管仲射小白中鉤管仲與公子糾召忽遂走魯桓公踐位魯伐齊納公子糾而不能桓公元年召管仲管仲至公問曰社稷可定乎管仲對曰君霸王社稷定君不霸王社稷不定公曰吾不敢至於此其大也定社稷而已管仲又請君曰不能管仲辭於君曰君免臣於死臣之幸也然臣之不死糾也為欲定社稷也社稷不定臣祿齊國之政而不死糾也臣不敢乃走出至門公召管仲管仲反公汗出曰勿已其勉霸乎管仲再拜稽首而起曰今日君成霸臣貪承命趨立於相位乃令五官行事異日公告管仲曰欲以諸侯之間無事也小修兵革管仲曰不可百姓病公先與百姓而藏其兵與其厚於兵不如厚於人齊國之社稷未定公未始於人而始於兵外不親於諸侯內不親於民公曰諾政未能有行也二年桓公彌亂又告管仲曰欲繕兵管仲又曰不可公不聽果為兵桓公與宋夫人飲船中夫人蕩船而懼公公怒出之宋受而嫁之蔡侯明年公怒告管仲曰欲伐宋管仲曰不可臣聞內政不修外舉事不濟公不聽果伐宋諸侯興兵而救宋大敗齊師公怒歸告管仲曰請修兵革吾士不練吾兵不實諸侯故敢救吾讎內修兵革管仲曰不可齊國危矣內奪民用士勸於勇亂之本也外犯諸侯民多怨也為義之士不入齊國安得無危鮑叔曰公必用夷吾之言公不聽乃令四封之內修兵關市之征侈之公乃遂用以勇授祿鮑叔謂管仲曰異日者公許子霸今國彌亂子將何如管仲曰吾君惕其智多誨姑少胥其自及也鮑叔曰比其自及也國無闕亡乎管仲曰未也國中之政夷吾尚微為焉亂乎尚可以待外諸侯之佐既無有吾二人者未有敢犯我者明年朝之爭祿相刺裚而刎頸者不絶鮑叔謂管仲曰國死者衆矣毋乃害乎管仲曰安得已然此皆其貪民也夷吾之所患者諸侯之為義者莫肯入齊齊之為義者莫肯仕此夷吾之所患也若夫死者吾安用而愛之公又內修兵三年桓公將伐魯曰魯與寡人近於是其救宋也疾寡人且誅焉管仲曰不可臣聞有土之君不勤於兵不忌於辱不輔其過則社稷安勤於兵忌於辱輔其過則社稷危公不聽興師伐魯造於長勺魯莊公興師逆之大敗之桓公曰吾兵猶尚少吾參圍之安能圉我四年修兵同甲十萬車五千乘謂管仲曰吾士既練吾兵既多寡人欲服魯管仲喟然嘆曰齊國危矣君不競於德而競於兵天下之國帶甲十萬者不鮮矣吾欲發小兵以服大兵內失吾衆諸侯設備吾人設詐國欲無危得已乎公不聽果伐魯魯不敢戰去國五十里而為之關魯請比於關內以從于齊齊亦毋復侵魯桓公許諾魯人請盟曰魯小國也固不帶劍今而帶劍是交兵聞於諸侯君不如已請去兵桓公曰諾乃令從者毋以兵管仲曰不可諸侯加忌於君君如是以退可君果弱魯君諸侯又加貪於君後有事小國彌堅大國設備非齊國之利也桓公不聽管仲又諫曰君必不去魯胡不用兵曹劌之為人也堅強以忌不可以約取也桓公不聽果與之遇莊公自懷劍曹劌亦懷劍踐壇莊公抽劍其懷曰魯之境去國五十里亦無不死而已左椹桓公右自承曰均之死也戮死於君前管仲走君曹劌抽劍當兩階之間曰二君將改圖無有進者管仲曰君與地以汶為竟桓公許諾以汶為竟而歸桓公歸而修於政不修於兵革自圉辟人以過弭師五年宋伐杞桓公謂管仲與鮑叔曰夫宋寡人固欲伐之無若諸侯何夫杞明王之後也今宋伐之豫欲救之其可乎管仲對曰不可臣聞內政之不修外舉義不信君將外舉義以行先之則諸侯可令附桓公曰於此不救後無以伐宋管仲曰諸侯之君不貪於土貪於土必勤於兵勤於兵必病於民民病則多詐夫詐密而後動者勝詐則不信於民夫不信於民則亂內動則危於身是以古之人聞先王之道者不競於兵桓公曰然則奚若管仲對曰以臣則不而令人以重幣使之使之而不可君受而封之桓公問鮑叔曰奚若鮑叔曰公行夷吾之言公乃命曹孫宿使於宋宋不聽果伐杞桓公築緣陵以封之豫車百乘甲一千明年狄人伐邢邢君出致於齊桓公築夷儀以封之豫車百乘卒千人明年狄人伐衛衛君出致於虛桓公且封之隰朋賓胥無諫曰不可絶三國所以亡者以小今君𥷋蘄封亡國國盡若何桓公問管仲曰奚若管仲曰君有行之名安得有其實君其行也公又問鮑叔鮑叔曰君行夷吾之言桓公築楚丘以封之與車五百乘甲五千既以封衛明年桓公問管仲將何行管仲對曰公內修政而勸民可以信於諸侯矣君許諾乃輕稅弛關市之征為賦祿之制既已管仲又請曰問病臣願賞而無罰五年諸侯可令傅公曰諾既行之管仲又請曰諸侯之禮令齊以豹皮往小侯以鹿皮報齊以馬往小侯以犬報桓公許諾行之管仲又請賞於國以及諸侯君曰諾行之管仲賞於國中君賞於諸侯諸侯之君有行事善者以重幣賀之從列士以下有善者衣裳賀之凡諸侯之臣有諫其君而善者以璽問之以信其言公既行之又問管仲曰何行管仲曰隰朋聰明捷給可令為東國賓胥無堅強以良可以為西土衛國之教危傅以利公子開方之為人也慧以給不能久而樂始可遊於衛魯邑之教好邇而訓於禮季友之為人也恭以精博於禮多小信可遊於魯楚國之教巧文以利不好立大義而好立小信蒙孫博於教而文巧於辭不好立大義而好結小信可遊於楚小侯既服大侯既附夫如是則始可以施政矣君曰諾乃遊公子開方於衛遊季友於魯遊蒙孫於楚五年諸侯附狄人伐桓公告諸侯曰請救伐諸侯許諾大侯車二百乘卒二千人小侯車百乘卒千人諸侯皆許諾齊車千乘卒可致緣陵戰於後故敗狄其車甲與貨小侯受之大侯近者以其縣分之不踐其國北州侯莫來桓公遇南州侯於召陵曰狄為無道犯天子令以伐小國以天子之故敬天之命令以救伐北州侯莫至上不聽天子令下無禮諸侯寡人請誅於北州之侯諸侯許諾桓公乃北伐令支下鳧之山斬孤竹遇遏山戎顧問管仲曰將何行管仲對曰君教諸侯為民聚食諸侯之兵不足者君助之發如此則始可以加政矣桓公乃告諸侯必足三年之食安以其餘修兵革兵革不足以引其事告齊齊助之發既行之公又問管仲曰何行管仲對曰君會其君臣父子則可以加政矣公曰會之道奈何曰諸侯無專立妾以為妻毋專殺大臣無國勞毋專豫祿士庶人毋專棄妻毋曲隄毋貯粟毋禁材行此卒歲則始可以罰矣君乃布之於諸侯諸侯許諾受而行之卒歲吳人伐穀桓公告諸侯未遍諸侯之師竭至以待桓公桓公以車千乘會諸侯於竟都師未至吳人逃諸侯皆罷桓公歸問管仲曰將何行管仲曰可以加政矣曰從今以往二年適子不聞孝不聞愛其弟不聞敬老國良三者無一焉可誅也諸侯之臣及國事三年不聞善可罰也君有過大夫不諫士庶人有善而大夫不進可罰也士庶人聞之吏賢孝悌可賞也桓公受而行之近侯莫不請事兵車之會六乘車之會三饗國四十有二年桓公踐位十九年弛關市之征五十而取一賦祿以粟案田而稅二歲而稅一上年什取三中年什取二下年什取一歲飢不稅歲飢弛而稅桓公使鮑叔識君臣之有善者晏子識不仕與耕者之有善者高子識工賈之有善者國子為李隰朋為東國賓胥無為西土弗鄭為宅凡仕者近公不仕與耕者近門工賈近市三十里置遽委焉有司職之凡諸侯欲通吏從行者令一人為負以車若宿者令人養其馬食其委客與有司別契至國入契費義數而不當有罪凡庶人欲通鄉吏不通七日囚士欲通吏不通五日囚貴人子欲通吏不通三日囚凡縣吏進諸侯士而有善觀其能之大小以為之賞有過無罪令鮑叔進大夫勸國家得成而不悔為上舉從政治為次野為原又多不發起訟不驕次之勸國家得成而悔從政雖治而不能野原又多發起訟驕行此三者為下令晏子進貴人之子出不狂處不華而友有少長為上舉得二為次得一為下士處靖敬老與貴交不失禮行此三者為上舉得二為次得一為下耕者農農用力應於父兄事賢多行此三者為上舉得二為次得一為下令高子進工賈應於父兄事長養老承事敬行此三者為上舉得二者為次得一者為下令國子以情斷獄三大夫既已選舉使縣行之管仲進而舉言上而見之於君以卒年君舉管仲告鮑叔曰勸國家不得成而悔從政不治不能野原又多而發訟驕凡三者有罪無赦告晏子曰貴人子處華下交好飲食行此三者有罪無赦士出入無常不敬老而營富行此三者有罪無赦耕者出入不應於父兄用力不農不事賢行此三者有罪無赦告高子曰工賈出入不應父兄承事不敬而違老治危行此三者有罪無赦凡於父兄無過州里稱之吏進之君用之有善無賞有過無罰吏不進廢棄於父兄無過於州里莫稱吏進之君用之善為上賞不善吏有罰君謂國子凡貴賤之義入與父俱出與師俱上與君俱凡三者遇賊不死不知賊則無赦斷獄情與義易義與祿易祿可無斂有罪無赦
