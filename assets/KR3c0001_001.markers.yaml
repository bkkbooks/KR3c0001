  - {type: variant, offset: 1365, length: 332, content: 天覆萬物制寒暑行日月次星辰天之常也治之以理終而復始主牧萬民治天下蒞百官主之常也治之以法終而復始和子孫屬親戚父母之常也治之以義終而復始敦敬忠信臣下之常也以事其主終而復始愛親善養思敬奉教子婦之常也以事其親終而復始故天不失其常則寒暑得其時日月星辰得其序主不失其常則群臣得其義百官守其事父母不失其常則子孫和順親戚相驩臣下不失其常則事無過失而官職政治子婦不失其常則長幼理而親疏和故用常者治失常者亂天未嘗變其所以治也故曰天不變其常地不易其則地生養萬物地之則也治安百姓主之則也教護家事父母之則也正諫死節臣下之則也盡力共養子婦之則也地不易其則故萬物生焉主不易其則故百姓安焉父母不易其則故家事辦焉臣下不易其則故主無過失子婦不易其則故親養備具故用則者安不用則者危地未嘗易其所以安也故曰, SBCK: ''}
