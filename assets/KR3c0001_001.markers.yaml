  - {type: variant, offset: 7442, length: 163, content: 明主內行其法度外行其理義故鄰國親之與國信之有患則鄰國憂之有難則鄰國救之亂主內失其百姓外不信於鄰國國有患則莫之憂也有難則莫之救也外內皆失孤特而無黨故國弱而主辱故曰獨國之君卑而不威自媒之女醜而不信明主之治天下也必用聖人而後天下治婦人之求夫家也必用媒而後家事成故治天下而不用聖人則天下乖亂而民不親也求夫家而不用媒則醜恥而人不信也故曰, SBCK: ''}
