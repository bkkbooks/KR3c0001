  - {type: variant, offset: 11, length: 0, content: '', WYG: 人物則皇言欲候氣聽聲以知凶吉必因夜虚之時守其安静以聽候人物此時人物則皇暇故吉凶之驗不妄五和時節土生數五土氣和則君順時節而布政君服黄色味甘味聽宫聲此土王之時故服黄味甘聽宫也然土雖均王四季而正位在六月也治和氣土主和故治和氣用五數飲於黄后之井中央井也以倮獸之火㸑倮獸謂淺毛之獸虎豹之屬藏温濡藏謂包之在心君之所藏者温和濡緩所以助土氣行敺養謂禽獸之屬能為苗害者時敺逐之所以養嘉穀也坦氣修通坦平也平土政則其氣修通凡物開静形生理常至命凡土王之時所生之物但開通安静則其形自生既循理之常則無殘盡於所賦之命也尊賢授德則帝帝者之臣其實師也故尊賢授德則可為帝也身仁行義服忠用信則王服行審謀章禮選士利械則霸章明定生處死謹賢修伍則衆生者安定之死者處置之斂葬其柩信賞審罰爵材禄能則强有材者爵之有能者禄之計凡付終務本飭末則富凡謂都數也付終謂財日月既終付之後人明法審數立常備能則治常謂五常也備能謂才能之士備有之同異分官則安同異之職分官而治通之以道畜之以惠親之以仁養之以義報之以德結之以信接之以禮和之以樂期之以事攻之以官攻治發之以力威之以誠一舉而上下得終謂初㑹諸侯上下得終其禮自此至九舉說九合諸侯之所致再舉而民無不從三舉而地辟散成成謂諸侯自盟要不事于齊至三㑹則諸侯散其成而朝齊四舉而農佚粟十四㑹之後徭役減省故農人佚樂而粟得十全五舉而務輕金九五㑹之後兵戰既息事務轉輕而金得九分一以供官也六舉而絜知事變絜圍度也胡結反七舉而外内為用外謂諸侯八舉而勝行威立九舉而帝事成形九㑹之後威行海内雖居侯伯帝王之事既以成形九本搏大人主之守也自九本已下管氏但舉其目或有數在於他篇但此書多從散佚無得而知然九本所以搏撃強大故人主守之八分有職卿相之守也七官飾勝備威將軍之守也六紀審密賢人之守也五紀不解庶人之守也動而無不從静而無不同強動弱必從強静弱必同治亂之本三卑尊之交四富貧之終五盛衰之紀六安危之機七強弱之應八存亡之數九練之以散羣傰署傰猶曹也凡上之諸數既已精練然後散之於衆使傰曹署著其名以司之凡數財署數謂國用之數使財者署殺僇以聚財或因亡國或因滅家莫不籍沒其財故曰殺僇以聚財也勸勉以選衆使二分具本使上之傰署財署分知其事各具其名籍之本則財署知聚財傰署知選衆發善必審於密執威必明於中發善謂行賞執威謂行刑此居圖方中此立時之政管氏别五其圖謂之方圖而土位居中春行冬政肅肅寒也冬氣乘之故也行秋政雷春陽秋隂隂乘陽故雷行夏政閹春既陽夏又陽陽氣猥并故掩閉也十二地氣發戒春事自此以下隂陽之數日辰之名于時國異政家殊俗此但齊獨行不及天下且經秦焚書或為煨燼無得而詳焉闕之以待能者十二小夘出耕十二天氣下賜與十二義氣至修門閭十二清明發禁十二始夘合男女十二中夘十二下夘三夘同事謂三夘所用事同他皆倣此八舉時節木成數八木氣舉君則順時節布政君服青色味酸味聽角聲此木王之時故服青味酸聽角治燥氣春多風而旱故治燥氣用八數八亦木成數也飲於青后之井東方井以羽獸之火㸑羽獸南方朱鳥用南方之火故曰羽獸之火藏不忍行敺養坦氣修通凡物開静形生理合内空周外春主仁故所藏者不忍之理合聚於内出空於外強國為圏弱國為屬強國所以禁禦弱國弱國圏然也動而無不從静而無不同強動弱必從強静弱必同舉發以禮時禮必得強國舉發必當以禮時也禮也必得其宜和好不基貴賤無司事變日至鄰國和好不基貴賤之位無司存如此則事變日至無寧居基漸此居於圖東方方外夏行春政風春箕宿多風也行冬政落寒氣肅殺故凋落也重則雨雹其災重則雨雹水寒所致行秋政水秋畢宿多霖雨十二小郢至德十二絶氣下下爵賞十二中郢賜與十二中絶收聚十二大暑至盡善十二中暑十二小暑終三暑同事七舉時節火成數七火氣舉君則順時節而布政君服赤色味苦味此火王之時故服赤味苦也聽羽聲羽北方聲也火王之時不聽徵而聴羽者所以抑盛陽治陽氣用七數七亦火之成數飲於赤后之井南方井也以毛獸之火㸑毛獸西方白虎用西方之火故曰毛獸之火藏薄純盛陽之性失在奢縱故所藏者省薄純素也行篤厚陽性寛和故行篤厚坦氣修通凡物開静形生理物形既生自然修理而長育也定府官明名分而審責於羣臣有司則下不乘上賤不乘貴法立數得而無比周之民則上尊而下卑逺近不乖此居於圖南方方外秋行夏政葉盛陽氣乘之故卉木生葉行春政華少陽氣乘之故卉木更生華行冬政耗盛隂肅殺故虚耗也十二期風至戒秋事十二小夘薄百爵十二白露下收聚十二復理賜與十二始節賦事十二始夘合男女十二中夘十二下夘三夘同事九和時節金成數九金氣和君則順時節而布政君服白色味辛味聽商聲此金王之時故服白味辛聴商治濕氣秋多霖雨水故治濕用九數九亦金之成數飲於白后之井西方井以介蟲之火㸑介蟲北方𤣥武用北方之火故曰介蟲之火藏恭敬金性㢘潔故所藏者恭敬也行搏銳兊金性勁銳時方肅殺故曰以勁銳搏撃所以順殺氣也坦氣修通凡物開静形生理間男女之畜男女之畜有内外之異故須間之也修鄉閭之什伍殺氣方至可以出師征伐故修什伍量委積之多寡定府官之計數養老弱而勿通老少異糧故其養勿通信利周而無私申布秋利既令周徧無得有私此居於圗西方方外冬行秋政霧秋多隂霧行夏政雷盛陽乘盛隂故雷也行春政烝泄少陽乘隂故烝泄也十二始寒盡刑十二小榆賜予十二中寒收聚十二中榆大收十二寒至静十二大寒之隂十二大寒終三寒同事六行時節水成數六水氣行君則順時節而布政也君服黑色味鹹味此水王之時故服黒味鹹聽徵聲不聽羽而聴徴者亦所以抑盛隂也治隂氣不治則盛隂太過太過則治隂氣也用六數六亦水之成數飲於黑后之井北方井也以鱗獸之火㸑鱗獸東方青龍也用東方之火故曰鱗獸之火藏慈厚君人者好生惡殺故於刑殺之時藏於慈厚所以示其不忍也行薄純冬物朴素故行省薄純儉坦氣修通凡物開静形生理器成於僇冬行刑之時故成僇器也教行於鈔鈔末也冬為四時之末嵗之將終也動静不記行止無量記動静則行止可量戒審四時以别息息生也四時生物各有不同故須别之異出入以兩易出入既異又並令無差故曰兩易也明養生以解固固謂䕶恡也生既須養則物不可恡故曰解固審取予以總之又恐所養過時故審取與之多少以総統之一㑹諸侯令曰非𤣥帝之命毋有一日之師役𤣥帝北方之帝齊桓初㑹命諸侯不使非時出師故令曰若非𤣥帝有命之時毋得有一日之師役一日尚不可況多乎再㑹諸侯令曰養孤老食常疾收孤寡三㑹諸侯令曰田租百取五百分取五分市賦百取二關賦百取一毋乏耕織之器四㑹諸侯令曰修道路偕度量一稱數偕同也稱斤兩也數多少也藪澤以時禁發之草木零落然後入山林獺祭魚然後修澤梁也五㑹諸侯令曰修春秋冬夏之常祭食常所祭常所食各有時物也天壤山川之故祀必以時六㑹諸侯令曰以爾壤生物共𤣥官𤣥官主禮天之官也請四輔四輔即三公四輔也所以助祭行禮將以禮上帝七㑹諸侯令曰官處四體而無禮者流之焉莠命官處謂處官也處官位而四體無禮者謂之莠命而流放焉莠命者謂穢亂教命若莠之穢苗也八㑹諸侯令曰立四義而毋議者尚之于𤣥官聽于三公四義者謂無障谷無貯粟無易樹子無以妾為妻諸侯能順命而無異議者則尚之于天子𤣥官聴三公之錫命尚上也九㑹諸侯令曰以爾封内之財物國之所有為幣為幣禮九㑹大命焉出常至謂上九㑹既出大令故天下諸侯常至非此之外則朝聘之數逺近各有差也千里之外二千里之内諸侯三年而朝習命因朝而習教命二年三卿使四輔諸侯三卿使天子四輔以受節制也一年正月朔日令大夫來修受命三公習所受命於三公二千里之外三千里之内諸侯五年而㑹至習命因㑹而至以習命也三年名卿請事二年大夫通吉凶十年重適入正禮義重適謂承重也適諸侯之世子也五年大夫請受變請所變更之教令也三千里之外諸侯世一至道路既逺故世一至置大夫以為廷安其逺國大夫則為置廷館每來於此以安之也入共受命焉入共國所有因以受命此居於圖北方方外必得文威武官習勝之善勝敵者必得文德之威武藝之官與之練習士卒則可以勝之務時因勝之時是也務是因修不逆於理可以得勝也終無方勝之從始至終計出無方者勝幾行義勝之庶幾行義者可以勝理名實勝之整理名實不謬妄可以得勝急時分勝之敗敵所得之物應受分者急分與之可以得勝事察伐勝之伐功行賞之事必察有功不令無功者妄受可以得勝行備具勝之行師用兵必備其攻戰之具可以得勝原無象勝之竒計若神無象可原者勝本定獨威勝用師之本定能獨威者勝定計財勝計謀財用先審定者勝定聞知勝聞知敵謀能審定者勝定選士勝精選士卒能審定者勝定制禄勝制禄亦與有功能審定者勝也定方用勝異方所用各有不同能審定者勝也定綸理勝經綸之理能審定者勝也定死生勝定成敗勝定依竒勝所依竒策能審定者勝定實虚勝定盛衰勝舉機誠要則敵不量發舉兵機誠得其要則敵不能量也用利至誠則敵不校用兵便利又能至誠則敵不敢校也明名章實則士死節明忠義之名章功勞之實士則死節不求茍生竒舉發不意則士歡用竒謀之舉發彼不意則士樂為用交物因方則械器備交質之物因方之有則器械備具也因能利備則求必得因彼所能所利而以備之則所求必得執務明本則士不偷執所營之務明所為之本則士不茍且備具無常無方應也其所備具無有常者所以應敵無方聽於鈔故能聞未極鈔深逺也所聴在於深逺故能聞於極理視於新故能見未形未形者新事将起所視者在新故見未形也思於濬故能知未始末始者事之深濬者所思在深故知未始發於驚故能知無量發舉可驚故敵不能量動於昌故能得其寳舉動昌盛故敵懼而輸寳也立於謀故能實不可故也其所建立皆用深謀故常堅實不復衰故器成教守則不逺道里器用完成教令堅守故欲往則至不憚道里之逺也號審教施則不險山河號令審悉教命施行則赴湯火而不顧豈險難於山河也博一純固則獨行而無敵徳博而一行純而固則仰我如時雨歡我如椒蘭誰能敵之慎號審章則其攻不待慎號令審旗章則攻者争先登豈顧後而相待乎權與明必勝則慈者勇權謀明畧必能勝敵則慈仁者猶致勇奮況惡少哉器無方則愚者智器用無方應卒必備則愚者習而成智況不愚乎攻不守則拙者巧我攻既妙彼不能守則拙者習而成巧況不拙乎數也動慎十號兵既數動必慎十號九章等此有數在他篇明審九章飾習十器善習五官謹修三官必設常主計必先定軍之主將既必有常軍之計謀亦須先定求天下之精材精材可以為軍之器用者論百工之銳器器成角試否臧收天下之豪傑有天下之稱材稱材謂材稱其所用也說行若風雨發如雷電此居於圖方中此中圖之副也旗物尚青木用事故尚青兵尚矛象春物之芒銳刑則交寒害􅎂其行刑戮則於初旦夜盡之交其時尚寒主春人不得已而行刑故離害而􅎂禁􅎂或為鈸器成不守器用既成則敵不能圍守也經不知經法也用兵之法敵不能知也教習不著我之教習敵不能著著猶明著發不意其所舉發出敵不意經不知故莫之能圉發不意故莫之能應莫之能應故全勝而無害莫之能圉故必勝而無敵四機不明不過九日而游兵驚軍四機即上不守不知不著不意也障塞不審不過八日而外賊得間障塞者所以防守要路也由守不慎不過七日而内有讒謀由守所由而防守者詭禁不修不過六日而竊盜者起詭禁所以禁詭常也死亡不食不過四日而軍財在敵死亡者不享食鬼神必怨怒故軍財在敵此居於圖東方方外此東圖之副也旗物尚赤火用事故尚赤兵尚㦸象夏物之森聳刑則燒交疆郊其用刑則於疆郊焚燒而交也必明其一一謂號令不二必明其將必明其政必明其士四者備則以治擊亂以成擊敗數戰則士疲數勝則君驕驕君使疲民則國危至善不戰用兵之善者其惟不戰乎其次一之其次善者雖戰而號令一大勝者積衆積衆然後可以大勝勝無非義者焉可以為大勝所以勝皆大義故成大勝也大勝無不勝也此居於圗南方方外此南圗之副也旗物尚白金用事故尚白兵尚劍象金性之利也刑則紹昩斷絶其用刑則繼晝之昩斷絶而戮之也始乎無端卒乎無窮始乎無端道也卒乎無窮德也道不可量德不可數不可量則衆强不能圗不可數則偽詐不敢鄉兩者備施兩者謂道德也動静有功畜之以道養之以德畜之以道則民和養之以德則民合和合故能習習故能偕偕謂同為其事偕習以悉悉盡也莫之能傷也此居於圖西方方外此西圗之副也旗物尚黑水用事故尚黒兵尚脅盾象時物之閉盾或署之於脅故曰脅盾刑則游仰灌流其用刑則游縱之所使仰藥死而既乃投之於灌流察數而知治審器而識勝明謀而適勝通德而天下定定宗廟育男女宗廟存則男女育也官四分則可以立威行德制法儀出號令擇才授官四面分設至善之為兵也非地是求也罰人是君也至善之兵不求其地所以君可罰人若紂桀之人比屋可誅也立義而加之以勝至威而實之以德守之而後修勝心焚海内既獲敵人之國順而守之然後修其法制如此則強勝之心可以焚灼於海内民之所利立之所害除之則民人從立利除害則人從也立為六千里之侯則大人從既九㑹之後天子加命立為侯伯面各三千里四方相距六千里大人謂天子三公四輔也使國君得其治則人君從㑹國君謂天下同盟諸侯請命於天地知氣和則生物從謂郊祀天地神祇使之合徳則四氣和可知故生物從之計緩急之事則危危而無難緩急之事皆已計定則二者之危無所難緩急之事皆有可危之理故曰危危明於器械之利則涉難而不變察於先後之理則兵出而不困通於出入之度則深入而不危審於動静之務則功得而無害著於取與之分則得地而不執謂不恡執慎於號令之官則舉事而有功此居於圖北方方外此北圗之副也幼官圗第九中方本圗東方副圗中方副圗南方本圗東方本圗南方副圖西方本圖北方本圗西方副圗北方副圖經言九若因處虚守静}
