  - {type: page-break, offset: 4027, content: '', id: KR3c0001_SBCK_003-11a}
  - {type: variant, offset: 4027, length: 0, content: '', WYG: 東方方外右東方本圖旗物尚青兵尚矛刑則交寒害􅎂器成不守經不知教習不著發不意經不知故莫之能圉發不意故莫之能應莫之能應故全勝而無害莫之能圉故必勝而無敵四機不明不過九日而游兵驚軍障塞不審不過八日而外賊得間由守不慎不過七日而内有讒謀詭禁不修不過六日而竊盜者起死亡不食不過四日而軍財在敵此居於圖東方方外右東方副圗夏行春政風行冬政落重則雨雹行秋政水十二小郢至德十二絶氣下下爵賞十二中郢賜與十二中絶收聚十二大暑至盡善十二中暑十二小暑終三暑同事七舉時節君服赤色味苦味聽羽聲治陽氣用七數飲於赤后之井以毛獸之火㸑藏薄純行篤厚坦氣修通凡物開静形生理定府官明名分而審青於羣臣有司則下不乘上賤不乘貴法立數得而無比周之民則上尊而下卑逺近不乖此居於圗南方方外右南方本圖旗物尚赤兵尚㦸刑則燒交疆郊必明其一必明其將必明其政必明其士四者備則以治撃亂以成撃敗數戰則士疲數勝則君驕驕君使疲民則危國至善不戰其次一之大勝者積衆勝而無非義者焉可以為大勝大勝無不勝也此居於圗南方方外右南方副圗秋行夏政葉行春政華行冬政耗十二期風至戒秋事十二小夘薄百爵十二白露下收聚十二復理賜予十二始前節第賦事十二始夘合男女十二中夘十二下夘三夘同事九和時節君服白色味辛味聽商聲治濕氣用九數飲於白后之井以介蟲之火㸑藏恭敬行搏銳坦氣修通凡物開静形生理間男女之畜修鄉里之什伍量委積之多寡定府官之計數養老弱而勿通信利害而無私此居於圗西方方外右西方本圗旗物尚白兵尚劍刑則紹昩斷絶始乎無端卒乎無窮始乎無端道也卒乎無窮德也道不可量德不可數不可量則衆強不能圗不可數則為詐不敢鄉兩者備施動静有功畜之以道養之以德畜之以道則民和養之以德則民合和合故能習習故能偕偕習以悉莫之能傷也此居於圗西方方外右西方副圗冬行秋政霧行夏政雷行春政烝泄十二始寒盡刑十二小榆賜予十二中寒收聚十二中榆大收十二寒至静十二大寒之隂十二大寒終三寒同事六行時節君服黑色味鹹味聽徵聲治隂氣用六數飲于黑后之井以鱗獸之火㸑藏慈厚行薄純坦氣修通凡物開静形生理器成於僇教行於鈔動静不記行止無量戒審四時以别息異出入以兩易明養生以解固審取與以總之一㑹諸侯令曰非𤣥帝之命毋有一日之師役再㑹諸侯令曰養孤老食常疾收孤寡三㑹諸侯令曰田租百取五市賦百取二闗賦百取一毋乏耕織之器四㑹諸侯令曰修道路偕度量一稱數毋征藪澤以時禁發之五㑹諸侯令曰修春秋冬夏之常祭食天壤山川之故祀必以時六㑹諸侯令曰以爾壤生物共𤣥官請四輔將以祀上帝七㑹諸侯令曰官處四體而無禮者流之焉莠命八㑹諸侯令曰立四義而無議者尚之于𤣥官聽于三公九㑹諸侯令曰以爾封内之財物國之所有為幣九㑹大令焉出常至千里之外二千里之内諸侯三年而朝習命二年三卿使四輔一年正月朔日令大夫來修受命三公二千里之外三千里之内諸侯五年而㑹至習命三年名卿請事二年大夫通吉凶七年重適入正禮義五年大夫請變三千里之外諸侯世一至置大夫以為廷安入共受命焉此居於圖北方方外右北方本圗}
