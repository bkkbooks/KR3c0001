  - {type: variant, offset: 11, length: 0, content: '', krp: 人物則皇虚之時守其安靜以聽候人物此言欲候氣聽聲以知凶吉必因夜吉凶之驗不妄時人物則皇暇故五和時節君順時節而布政土生數五土氣和則君服黃色味甘味聽宫聲土雖均王四季而正位在六月也此土王之時故服黃味甘聽宫也然治和氣治和氣土主和故飲於黃后之井井也中央以倮獸之火㸑獸虎豹之屬倮獸謂淺毛之藏温濡之在心藏謂苞儒緩所以助土氣君之所藏者温和行歐養時歐逐之所以養嘉穀也謂禽獸之屬能爲苗害者坦氣修通平坦其氣修通也平土政則凡物開靜形生理常至命安靜則其形自生旣循理之常凡土王之時所生之物但開通所賦之命也則無殘盡於尊賢授德則帝尊賢授德則可爲帝也帝者之臣其實師也故身仁行義服忠用信則王行服審謀章禮選士利械則霸明章定生處死謹賢修伍則衆處置之斂葬其柩生者安定之死者信賞審罰爵材禄能則強者爵有材者禄之之有能計凡付終務本飭末則富日月旣終付之後人凡謂都數也付終謂財明法審數立常備能則治才能之士備有之常謂五常也備能謂同異分官則安分官而治同異之職通之以道畜之以惠親之以仁養之以義報之以德結之以信接之以禮和之以樂期之以事攻之以官治攻發之以力威之以誠一舉而上下得終此至九舉說九合諸侯之所致謂初㑹諸侯上下得終其禮自再舉而民無不從三舉而地辟散成三㑹則諸侯散其成而朝齊成謂諸侯自盟要不事於齊至四舉而農佚粟十農人佚樂而粟得十全四㑹之後徭役減省故五舉而務輕金九戰旣息事務五㑹之後兵全一以供官也轉輕而金得九六舉而絜知事變胡結反絜圍度也七舉而外内爲用謂外侯諸八舉而勝行威立九舉而帝事成形侯伯帝王之事旣以成形九㑹之後威行海内雖居九本搏大人主之守也但此書多從散逸無得而知然九本所以搏撃自九本已下管氏但舉其目或有數在於他篇主守之強大故人八分有職卿相之守也十官飾勝備威將軍之守也六紀審密賢人之守也五紀不解庶人之守也動而無不從静而無不同強靜弱必同強動弱必從治亂之本三卑尊之交四富貧之終五盛衰之紀六安危之機七強弱之應八存亡之數九練之以散群傰署上之諸數旣傰猶曹也凡傰曹署著其名以司之已精練然后散之於衆使凡數財署數使財者署數謂國用之殺僇以聚財莫不籍沒其財故曰或因亡國或因滅家聚財也殺戮以勸勉以遷衆使二分具本其名籍之本則財署知聚財傰署使上之傰署財署分知其事各具衆知遷發善必審於密執威必明於中執威謂行刑發善謂行賞此居啚方中啚謂之方啚而土位居中此立時之政管氏别五其春行冬政肅乘之故也肅寒也冬氣行秋政雷陽春陽故雷秋隂隂乘行夏政閹氣猥併故掩閉也春旣陽夏又陽陽十二地氣發戒春事隂陽之數自此巳下且經秦焚書或爲煨燼無得而詳焉闕之以待能者日辰之名于時國異政家殊俗此但齊獨行不及天下十二小卯出耕十二天氣下賜與十二義氣至修門閭十二淸明發禁十二始母合男女十二中卯十二下卯三卯同事同他皆倣此謂三卯所用事八舉時節君則順時節布政木成數八木氣舉君服靑色味酸味聽角聲服青味酸聽自此木王之時故治慘氣故治燥氣春多風而旱用八數成數也八亦木飲於靑后之井井東方以羽獸之火爨之火故曰羽獸之火羽南方朱鳥用南方藏不忍行歐養坦氣修通凡物開靜形生理合内空周外理合聚於内出空於外春主仁故所藏者不忍之強國爲圈弱國爲屬國弱國圈然也強國所以禁禦弱動而無不從靜而無不同弱必強動弱必同從強靜舉發以禮時禮必得時也禮也必得其冝強國舉發必當以禮和好不基貴賤無司事變日至如此則事變日至無寧居基漸鄰國和好不基貴賤之位無司存此居於圖東方方外夏行春政風多風也春箕宿行冬政落故凋落也寒氣肅殺重則雨雹雹水寒所致其災重則雨行秋政水多霖雨秋畢宿十二小郢至德十二絶氣下下爵賞十二中郢賜與十二中絶收聚十二大暑至盡善十二中暑十二小暑終三暑同事七舉時節則順時節而布政火成數七火氣舉君君服赤色味苦味服赤味苦也此火王之時故聽羽聲徵而聽羽者所以抑盛陽羽北方聲也火王之時不聽用七數之成數七亦火飲於赤后之井井也南方以毛獸之火㸑用西方之火故毛獸西方白虎之火曰毛獸藏薄純所藏者省薄純素也盛陽之性失在奢縱故行篤厚故行篤厚陽性寛和坦氣修通凡物開靜形生理修理而長育也物形旣生自然定府官明名分而審責於羣臣有司則下不乘上賤不乘貴法立數得而無比周之民則上尊而下卑逺近不乖此居於圖南方方外秋行夏政葉故卉木生葉盛陽氣乘之行春政華卉木更生華少陽氣乘之故行冬政耗故虚耗也盛隂肅殺十二期風至戒秋事十二小卯薄百爵十二白露下收聚十二復理賜與十二始節賦事十二始卯合男女十二中卯十二下卯三卯同事九和時節則順時節而布政金成數九金氣和君君服白色味辛味聽商聲服白味辛聽商此金王之時故治濕氣水故治濕秋多霖雨用九數之成數九亦金飲於白后之井井西方以介蟲之火爨方之火故曰介蟲之火介蟲北方玄武也用北藏恭敬性金者恭敬也廉絜故所藏行搏銳以勁銳搏撃所以順殺氣也兊金性勁銳時方肅殺故曰坦氣修通凡物開靜形生理閒男女之畜之異故湏閒之也男女之畜有内外修郷閭之什伍氣殺征伐故修什伍方至可以出師量委積之多寡定府官之計數養老弱而勿通其養勿通老少異粮故信利周而無私周徧無得有私申布秋利旣令此居於圖西方方外冬行秋政霧隂霧秋多行夏政雷隂故雷也盛陽乘盛行春政烝泄隂故烝少陽乘也泄十二始寒盡刑十二小榆賜予十二中寒收聚十二中榆大收十二寒至靜十二大寒之隂十二大寒終三寒同事六行時節則順時節而布政也水成數六水氣行君君服黑色味鹹味故服黒味鹹此水王之時聽徵聲亦所以抑盛隂也不聽羽而聽徴者治隂氣太過則治隂氣也不治則盛隂太過用六數之成數六亦水飲於黑后之井井也北方以鱗獸之火爨方之火故曰鱗獸之火鱗獸東方青龍也用東藏慈厚時藏於慈厚所以示其不忍也若人者好生惡殺故於刑殺之行薄純行省薄純儉冬物朴素故坦氣修通凡物開靜形生理器成於僇故成僇器也冬行刑之時敎行於鈔爲四時之鈔未也冬將終也未嵗之動靜不記行止無量行止可量記動靜則戒審四時以別息生息不同故湏別之也四時生物各有異出入以兩易無差故曰兩易也出入旣異又並令明養生以解固則物不可恡故曰解固固謂䕶恡也生旣湏養審取予以緫之與之多少以揔統之又恐所養過時故審取一㑹諸侯令曰非玄帝之命母有一日之師役齊桓初㑹命諸玄帝北帝之帝時毋得有一日之師役一日尚不可況多乎侯不使非時出師故令曰若非玄帝有命之再㑹諸侯令曰養孤老食常疾收孤寡三㑹諸侯令曰田租百取五五分百分取市賦百取二關賦百取一母乏耕織之器四㑹諸侯令曰修道路偕度量一稱數也數多少也偕同也稱斤兩藪澤以時禁發之入山林獺祭魚草木零落然後澤梁也然后修五㑹諸侯令曰修春秋冬夏之常祭食各有時物也常所祭常所食天壤山川之故祀必以時六㑹諸侯令曰以爾壤生物共玄官天之官也玄官主禮請四輔也所以助祭行禮四輔即三公四輔將以禮上帝七㑹諸侯令曰官處四體而無禮者流之焉莠命體無禮者謂之莠命而流放官處謂處官也處官位而四命若莠之穢苗也焉莠命者謂穢亂敎八㑹諸侯令曰立四義而毋議者尚之于玄官聽于三公順命而無異議者則尚之于天子玄官聽三公之錫命尚四義者謂無障谷無貯粟無易樹子無以妾爲妻諸侯能也上九㑹諸侯令曰以爾封内之財物國之所有爲幣禮爲幣九㑹大命焉出常至非此之外則朝聘之數逺近各有差也謂上九㑹旣出大令故天下諸侯常至千里之外二千里之内諸侯三年而朝習命習敎命因朝而二年三卿使四輔侯諸輔以受節制也三卿使天子四一年正月朔日令大夫來修受命三公於三公習所受命二千里之外三千里之内諸侯五年而㑹至習命以習命也因㑹而至三年名卿請事二年大夫通吉凶十年重適入正禮義也適諸侯之重適謂承重也丗子五年大夫請受變之敎令也請所變更三千里之外諸侯丗一至故丗一至道路旣逺置大夫以爲廷安館每來於此以安之也其逺國大夫則爲置廷入共受命焉因以受命入共國所有此居於圖北方方外必得文威武官習勝者必得善勝敵練習士卒則可以勝之文德之威武藝之官與之務時因勝之逆於理可以得勝也時是也務是因脩不終無方勝之出無方者勝從始至終計幾行義勝之者可以勝庶幾行義理名實勝之謬妄可以得整理名實不勝急時分勝之者急分與之可以得勝敗敵所得之物應受分事察伐勝之必察有功不令伐功行賞之事以得勝無功者妄受行備具勝之戰之具可以得勝行師用兵必備其攻原無象勝之若神竒計原者勝無象可本定獨威勝能獨威者勝用師之本定定計財勝審定者勝計謀財用先定聞知勝審定者勝聞知敵謀能定選士勝審定者勝精選士卒能定制禄勝有功能審制禄亦與勝也定者定方用勝同能審定者勝也異方所用各有不定綸理勝審定者勝也經綸之理能定死生勝定成敗勝定依竒勝審定者勝所依竒策能定實虚勝定盛衰勝舉機誠要則敵不量要則敵不能量也發舉兵機誠得其用利至誠則敵不校誠則敵不敢校也用兵便利又能至明名章實則士死節實士則死節不求茍生明忠義之名章功勞之竒舉發不意則士歡用意則士樂爲用竒謀之舉發彼不交物因方則械器備質交則器械備具也之物因方之有因能利備則求必得備之則所求必得因彼所能所利而以執務明本則士不偷之本則士不茍且執所營之務明所爲備具無常無方應也無有常者其所備具敵無方所以應聽於鈔故能聞未極深逺故能聞於極理鈔深逺也所聽在於視於新故能見未形者在新故見未形也未形者新事将起所視思於濬故能知未始之深濬者末始者事故知未始所思在深發於驚故能至無量敵不能量發舉可驚故動於昌故能得其寶懼而輸寶也舉動昌盛故敵立於謀故能實不可故也深謀故常堅實其所建立皆用衰故不復器成敎守則不逺道里往則至不憚道里之逺也器用完成敎令堅守故欲號審敎施則不險山河火而不顧豈險難於山河也號令審悉敎命施行則赴湯博一純固則獨行而無敵時雨歡我如椒蘭誰能敵之德博而一行純而固則仰我如愼號審章則其攻不待先登豈顧後而相待乎愼號令審旗章則攻者爭權與明必勝則慈者勇能勝敵則慈權謀明略必奮況惡少哉仁者猶致勇器無方則愚者智者習而成智況不愚乎器用無方應卒必備則愚攻不守則拙者巧者習而成巧況不拙乎我攻旣妙彼不能守則拙數也動愼十號動必愼兵旣數因其數在他篇一號九章等此有明審九章飾習十器善習五官謹修三官必設常主計必先定軍之計謀亦湏先定軍之主將旣必有常求天下之精材可以精材器用者爲軍之論百工之銳器器成角試否臧收天下之豪傑有天下之稱材其所用也􅊨稱材謂材稱說行若風雨發如雷電此居於圖方中之副也此中圖旗物尚靑故尚靑木用事兵尚矛之芒銳象春物刑則交寒害􅎂人不得已而行刑故難害而欽敬􅎂或爲鈸其行刑戮則於初旦夜盡之交其時尚寒主春器成不守不能圍守也器用旣成則敵經不知法敵不能知也經法也用兵之敎習不著能著著猶明著我之敎習敵不發不意發出敵其所舉意不經不知故莫之能圉發不意故莫之能應莫之能應故全勝而無害莫之能害故必勝而無敵四機不明不過九日而游兵驚軍知不著不意也四機即上不守不障塞不審不過八日而外賊得閒防守要路也障塞者所以由守不愼不過七日而内有讒謀由而防由守所者守詭禁不脩不過六日而竊盜者起禁詭常也詭禁所以死亡不食不過四日而軍財在敵必怨怒故軍財在敵死亡者不享食鬼神此居於圖東方方外之副也此東圖旗物尚赤故尚赤火用事兵尚㦸之森聳象夏物刑則燒交疆郊用其焚燒而交也刑則於疆郊必明其一令不二一謂號必明其將必明其政必明其士四者備則以治擊亂以成擊敗數戰則士疲數勝則君驕驕君使疲民則國危至善不戰其唯不戰乎用兵之善者其次一之戰而號令一其次善者雖大勝者積衆可以大勝積衆然后勝無非義者焉可以爲大勝義故成大勝所以勝皆大也大勝無不勝也此居於圖南方方外之副也此南圗旗物尚白事故金用白尚兵尚劒之利也象金性刑則詔昩斷絶昩斷絶而戮之也其用刑則繼晝之始乎無端卒乎無窮始乎無端道也卒乎無窮德也道不可量德不可數不可量則衆強不能圖不可數則爲詐不敢郷兩者備施道德也兩者謂動靜有功畜之以道養之以德畜之以道則民和養之以德則民合故能習習故能偕爲其事偕謂同偕習以悉也悉盡莫能傷也此居於圖西方方外之副也此西圖旗物尚黑故尚黒水用事兵尚脅盾之於脅故曰脅盾象時物之閉盾或署刑則游仰灌流仰藥死而旣乃投之於其用刑則游縱之所使流灌察數而知治審器而識勝明謀而適勝通德而天下定定宗廟育男女男女育也宗廟存則官四分則可以立威行德制法儀出號令四面分設擇才授官至善之爲兵也非地是求也罰人是君善至人若紂桀之人比屋可誅也之兵不求其地所以君可罰立義而加之以勝至威而實之以德守之而後脩勝心焚海内制如此則強勝之心可以焚灼於海内旣獲敵人之國順而守之然后修其法民之所利立之所害除之則民人從則人從也立利除害立爲六千里之侯則大人從四方相距六千里大人謂天子三公四輔也旣九㑹之後天子加命立爲侯伯面各三千里使國君得其治則人君從㑹同盟諸侯矣國君謂天下請命於天地知氣和則生物從則四氣和可知故生物從之謂郊祀天地神祇使之合德計緩急之事則危危而無難難緩急之事皆有可危之理故曰危危緩急之事皆已計定則二者之危無所明於器械之利則渉難而不變察於先後之理則兵出而不困通於出入之度則深入而不危審於動靜之務則功得而無害也著於取與之分則得地而不執恡執謂不愼於號令之官則舉事而有功此居於圖北方方外之副也此北圖㓜官圖第九南方副圖中方副圖北方副圖東方本圖中方副圖西方本圖西方副圖南方本圖中方本圖北方本圖經言九秋行夏政葉行春政華行冬政耗十二期風至戒秋事十二小夘薄百爵十二白露下收聚十二復理賜予十二始前節弟賦事十二始卯合男女十二中卯十二下卯三卯同事九和時節君服白色味辛味聽商聲治濕氣用九數飲於白后之井以介蟲之火爨藏恭敬行搏銳坦氣脩通凡物開靜形生理閒男女之畜修郷里之什伍量委積之多寡定府官之計數養老弱而勿通信利害而無私此居於圖西方方外右西方本圖旗物尚白兵尚劒刑則紹昩斷絶始乎無端卒乎無窮始乎無端道也卒乎無窮德也道不可量德不可數不可量則衆強不能圖不可數則爲詐不敢郷兩者備施動靜有功畜之以道養之以德畜之以道則民和養之以德則民合和合故能習習故能偕偕習以悉莫之能傷也此居於圖西方方外右西方副圖夏行春政風行冬政落重則雨雹行秋政水十二小郢至德十二絶氣下下爵賞十二中郢賜與十二中絶收聚十二大暑至盡善十二中暑十二小暑終三暑同事十舉時節君服赤色味苦味聽羽聲治陽氣用七數飲於赤后之井以毛獸之火爨藏薄純行篤厚坦氣修通凡物開靜形生理定府官明名分而審青於群臣有司則下不乘上賤不乘貴法立數得而無比周之民則上尊而下卑逺近不乖此居於圖南方方外右南方本圖若因處虚守静}
