  - {type: variant, offset: 1621, length: 1374, content: 習十器善習五教謹修三官主必常設計必先定求天下之精材論百工之銳器器成角試否臧收天下之豪傑有天下之稱材說行若風雨發如雷電此居於圖方中旗物尚青兵尚矛刑則交寒害釱器成不守經不知教習不著發不意經不知故莫之能圉發不意故莫之能應莫之能應故全勝而無害莫之能圉故必勝而無敵四機不明不過九日而游兵驚軍障塞不審不過八日而外賊得閒申守不慎不過七日而內有讒謀詭禁不脩不過六日而竊盜者起死亡不食不過四日而軍財在敵此居於圖東方方外旗物尚赤兵尚戟刑則燒交疆郊必明其情必明其將必明其政必明其士四者備則以治擊亂以成擊敗數戰則士疲數勝則君驕驕君使疲民則國危至善不戰其次一之大勝者積眾勝無非義者焉可以為大勝大勝無不勝也此居於圖南方方外旗物尚白兵尚劍刑則詔昧斷絕始乎無端卒乎無窮始乎無端道也卒乎無窮德也道不可量德不可數不可量則眾強不能圖不可數則為詐不敢鄉兩者備施動靜有功畜之以道養之以德畜之以道則民和養之以德則民合和合故能習習故能偕偕習以悉莫能傷也此居於圖西方方外旗物尚黑兵尚脅盾刑則游仰灌流察數而知治審器而識勝明謀而適勝通德而天下定定宗廟育男女官四分則可以立威行德制法儀出號令至善之為兵也非地是求也罰人是君立義而加之以勝至威而實之以德守之而後脩勝心焚海內民之所利立之所害除之則民人從立為六千里之侯則大人從使國君得其治則人君從會請命於天地知氣和則生物從計緩急之事則危危而無難明於器械之利則涉難而不變察於先後之理則兵出而不困通於出入之度則深入而不危審於動靜之務則功得而無害也著於取與之分則得地而不執慎於號令之官則舉事而有功此居於圖北方方外幼官圖第九經言九秋行夏政葉行春政華行冬政耗十二期風至戒秋事十二小卯薄百爵十二白露下收聚十二復理賜予十二始節賦事十二始卯合男女十二中卯十二下卯三卯同事九和時節君服白色味辛味聽商聲治濕氣用九數飲於白后之井以介獸之火爨藏恭敬行搏銳坦氣脩通凡物開靜形生理閒男女之畜修鄉里之什伍量委積之多寡定府官之計數養老弱而勿通信利害而無私此居於圖西方方外右西方本圖旗物尚白兵尚劍刑則紹昧斷絕始乎無端卒乎無窮始乎無端道也卒乎無窮德也道不可量德不可數不可量則眾強不能圖不可數則為詐不敢鄉兩者備施動靜有功畜之以道養之以德畜之以道則民和養之以德則民合和合故能習習故能偕偕習以悉莫之能傷也此居於圖西方方外右西方副圖夏行春政風行冬政落重則雨雹行秋政水十二小郢至德十二絕氣下下爵賞十二中郢賜與十二中絕收聚十二大暑至盡善十二中暑十二小暑終三暑同事十舉時節君服赤色味苦味聽羽聲治陽氣用七數飲於赤后之井以毛獸之火爨藏薄純行篤厚坦氣修通凡物開靜形生理定府官明名分而審責於群臣有司則下不乘上賤不乘貴法立數得而無比周之民則上尊而下卑遠近不乖此居於圖南方方外右南方本圖若圖人物則皇五和時節君服黃色味甘味聽宮聲治和氣用五數飲於黃后之井以倮獸之火爨藏溫儒行歐養坦氣修通凡物開靜形生理處虛守靜人物則皇常至命尊賢授德則帝身仁行義服忠用信則王審謀章禮選士利械則霸定生處死謹賢修伍則眾信賞審罰爵材祿能則強計凡付終務本飾末則富明法審數立常備能則治同異分官則安通之以道畜之以惠親之以仁養之以義報之以德結之以信接之以禮和之以樂期之以事攻之以言發之以力威之以誠一舉而上下得終再舉而民無不從三舉而地辟穀成四舉而農佚粟十五舉而務輕金九六舉而絜知事變七舉而內外為用八舉而勝行威立九舉而帝事成形九本搏大人主之守也八分有職卿相之守也七, SBCK: ''}
