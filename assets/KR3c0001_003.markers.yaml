  - {type: variant, offset: 4026, length: 0, content: '', WYG: 圗春行冬政肅行秋政雷行夏政則閹十二地氣發戒春事十二小夘出耕十二天氣下賜與十二義氣至修門閭十二清明發禁十二始夘合男女十二中夘十二下夘三夘同事八舉時節君服青色味酸味聽角聲治燥氣用八數飲於青后之井以羽獸之火㸑藏不忍行敺養坦氣修通凡物開静形生理合内空周外强國為圏弱國為屬動而無不從静而無不同舉發以禮時禮必得和好不基貴賤無司事變日至此居於}
