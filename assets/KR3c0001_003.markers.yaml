  - {type: variant, offset: 672, length: 948, content: 明名分而審責於群臣有司則下不乘上賤不乘貴法立數得而無比周之民則上尊而下卑遠近不乖此居於圖南方方外秋行夏政葉行春政華行冬政秏十二期風至戒秋事十二小卯薄百爵十二白露下收聚十二復理賜與十二始節賦事十二始卯合男女十二中卯十二下卯三卯同事九和時節君服白色味辛味聽商聲治濕氣用九數飲於白后之井以介蟲之火爨藏恭敬行搏銳坦氣修通凡物開靜形生理閒男女之畜修鄉閭之什伍量委積之多寡定府官之計數養老弱而勿通信利周而無私此居於圖西方方外冬行秋政霧行夏政雷行春政烝泄十二始寒盡刑十二小榆賜予十二中寒收聚十二中榆大收十二寒至靜十二大寒之陰十二大寒終三寒同事六行時節君服黑色味鹹味聽徵聲治陰氣用六數飲於黑后之井以鱗獸之火爨藏慈厚行薄純坦氣修通凡物開靜形生理器成於僇教行於鈔動靜不記行止無量戒四時以別息異出入以兩易明養生以解固審取予以總之一會諸侯令曰非玄帝之命毋有一日之師役再會諸侯令曰養孤老食常疾收孤寡三會諸侯令曰田租百取五市賦百取二關賦百取一毋乏耕織之器四會諸侯令曰修道路偕度量一稱數藪澤以時禁發之五會諸侯令曰修春秋冬夏之常祭食天壤山川之故祀必以時六會諸侯令曰以爾壤生物共玄官請四輔將以禮上帝七會諸侯令曰官處四體而無禮者流之焉莠命八會諸侯令曰立四義而毋議者尚之于玄官聽于三公九會諸侯令曰以爾封內之財物國之所有為幣九會大命焉出常至千里之外二千里之內諸侯三年而朝習命二年三卿使四輔一年正月朔日令大夫來修受命三公二千里之外三千里之內諸侯五年而會至習命三年名卿請事二年大夫通吉凶十年重適入正禮義五年大夫請受變三千里之外諸侯世一至置大夫以為廷安入共受命焉此居於圖北方方外必得文威武官習勝務時因勝之終無方勝之幾行義勝之理名實勝之急時分勝之事察伐勝之行備具勝之原無象勝之本定獨威勝定計財勝定聞知勝定選士勝定制祿勝定方用勝定綸理勝定死生勝定成敗勝定依奇勝定實虛勝定盛衰勝舉機誠要則敵不量用利至誠則敵不校明名章實則士死節奇舉發不意則士歡用交物因方則械器備因能利備則求必得執務明本則士不偷備具無常無方應也聽於鈔故能聞未極視於新故能見未形思於濬故能知未始發於驚故能至無量動於昌故能得其寶立於謀故能實不可故也器成教守則不遠道里號審教施則不險山河博一純固則獨行而無敵慎號審章則其攻不待權與明必勝則慈者勇器無方則愚者智攻不守則拙者巧數也動慎十號明審九章, SBCK: ''}
