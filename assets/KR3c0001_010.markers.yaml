  - {type: variant, offset: 4710, length: 234, content: 有司奉命而行事百姓順上而成俗著久而為常犯俗離教者眾共姦之則為上者佚矣天子出令於天下諸侯受令於天子大夫受令於君子受令於父母下聽其上弟聽其兄此至順矣衡石一稱斗斛一量丈尺一綧制戈兵一度書同名車同軌此至正也眾順獨逆眾正獨辟此猶夜有求而得火也姦偽之人無所伏矣此先王之所以一民心也是故天子有善讓德於天諸侯有善慶之於天子大夫有善納之於君民有善本於父慶之於長老此道法之所從來是治本也是故歲一言者君也時省者相也月稽者官也務四支之力修耕農之業以待令者庶人也是故百姓量其力於父兄之閒聽其言於, SBCK: ''}
