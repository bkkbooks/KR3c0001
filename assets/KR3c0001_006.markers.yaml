  - {type: variant, offset: 152, length: 350, content: 危正言直行之士危則人主孤而毋內人主孤而毋內則人臣黨而成群使人主孤而毋內人臣黨而成群者此非人臣之罪也人主之過也民毋重罪過不大也民毋大過上毋赦也上赦小過則民多重罪積之所生也故曰赦出則民不敬惠行則過日益惠赦加於民而囹圄雖實殺戮雖繁姦不勝矣故曰邪莫如蚤禁之凡赦者小利而大害者也故久而不勝其禍毋赦者小害而大利者也故久而不勝其福故赦者犇馬之委轡毋赦者痤疽之砭石也文有三侑武毋一赦惠者多赦者也先易而後難久而不勝其禍法者先難而後易久而不勝其福故惠者民之仇讎也法者民之父母也太上以制制度其次失而能追之雖有過亦不甚矣赦過遺善則民不勵有過不赦有善不遺勵民之道於此乎用之矣故曰明君者事斷者也君有三欲於民三欲不節則上位危三欲者何也一曰求二曰禁三曰令求必欲得禁必欲止令必欲行求多者其得寡禁多者其止寡令多者其行寡求而不得則威日損禁, SBCK: ''}
