  - {type: variant, offset: 1839, length: 225, content: 為藉也東海致比目之魚西海致比翼之鳥然后物有不召而自至者十有五焉今鳳皇麒麟不來嘉穀不生而蓬蒿藜莠茂鴟梟數至而欲封禪毋乃不可乎於是桓公乃止小問第五十一雜篇二桓公問管子曰治而不亂明而不蔽若何管子對曰明分任職則治而不亂明而不蔽矣公曰請問富國柰何管子對曰力地而動於時則國必富矣公又問曰吾欲行廣仁大義以利天下奚為而可管子對曰誅暴禁非存亡繼絕而赦無罪則仁廣而義大矣公曰吾聞之也夫誅暴禁非而赦無罪者必有戰勝之器攻取之數而后能誅暴禁非而赦無罪請問戰勝之器管子對曰選天下, SBCK: 爲}
