  - {type: variant, offset: 1522, length: 0, content: '', SBCK: 爲德也日以照育中央曰土於六月承火之後以土位在中央而􅀉王夏所以與火同章也土火之子故也而統於土德實輔四時入出季與之入出王在四時之以風雨節土益力其生植之力土德雨遍益土生皮肌膚成皮與肌膚土所生木實其德和平用均不載土無而用均也無不生故和中正無私無偏私位居中正實輔四時春嬴育夏養長秋聚收冬閇藏土之所輔成也言上之四時皆大寒乃極國家乃昌四方乃服輔四言土而成歳國昌民服時使均成然後寒極此謂歳德歳之德也言土能成}
  - {type: variant, offset: 1522, length: 0, content: '', krp: 爲德也日以照育中央曰土於六月承火之後以土位在中央而寄王夏所以與火同章也土火之子故也而統於土德實輔四時入出季與之入出王在四時之以風雨節土益力其生植之力土德雨遍益土生皮肌膚成皮與肌膚土所生木實其德和平用均不載土無而用均也無不生故和中正無私無偏私位居中正實輔四時春嬴育夏養長秋聚收冬閇藏土之所輔成也言上之四時皆大寒乃極國家乃昌四方乃服輔四言土而成歳國昌民服時使均成然後寒極此謂歳德歳之德也言土能成}
  - {type: variant, offset: 1523, length: 0, content: '', WYG: 以照育為德也中央曰土土位在中央而寄王於六月承火之後以土火之子故也而統於夏所以與火同章也土德實輔四時入出王在四時之季與之入出以風雨節土益力土德雨遍益其生植之力土生皮肌膚土所生木實成皮與肌膚其德和平用均土無不載無不生故和而用均也中正無私位居中正無偏私實輔四時春嬴育夏養長秋聚收冬閉藏言上之四時皆土之所輔成也大寒乃極國家乃昌四方乃服言土輔四時使均成然後寒極而成嵗國昌民服此謂嵗德言土能成嵗之德也日}
