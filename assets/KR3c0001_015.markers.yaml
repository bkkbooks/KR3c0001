  - {type: variant, offset: 6618, length: 12, content: 凡所謂功者安主上利萬民者, SBCK: 之條故不勞自舉度}
  - {type: variant, offset: 6618, length: 132, content: 凡所謂功者安主上利萬民者也夫破軍殺將戰勝攻取使主無危亡之憂而百姓無死虜之患此軍士之所以為功者也奉主法治竟內使強不凌弱眾不暴寡萬民驩盡其力而奉養其主此吏之所以為功也匡主之過救主之失明理義以道其主主無邪僻之行蔽欺之患此臣之所以為功也故明主之治也明分職而課功勞有功者賞亂, WYG: 設}
