  - {type: variant, offset: 6364, length: 232, content: 其所任官者大則爵尊而祿厚其所任官者小則爵卑而祿薄爵祿者人主之所以使吏治官也亂主之治也處尊位受厚祿養所與佼而不以官為務如此者則官失其能矣故明法曰小臣持祿養佼不以官為事故官失職是故先王之治國也使法擇人不自舉也明主之擇賢人也言勇者試之以軍言智者試之以官試於軍而有功者則舉之試於官而事治者則用之故以戰功之事定勇怯以官職之治定愚智故勇怯愚智之見也如白黑之分亂主則不然聽言而不試故妄言者得用任人而不官故不肖者不困故明主以法案其言而求其實以官任其身而課其功專任法不自舉焉故明法曰, SBCK: ''}
