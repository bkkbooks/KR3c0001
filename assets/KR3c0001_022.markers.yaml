  - {type: variant, offset: 729, length: 0, content: '', SBCK: 既不籍於老男老女又不籍於小男小女乃能以千萬人而諸君謂老男老女也六十已上爲老男五十已上爲老女也一國而三萬人鐡官之利當一國而三萬人焉故能有二國之籍者六千萬人耳當三千萬人者蓋鹽官之利耳鹽官之利旣然則鐵官之利可知也鹽官之利當數猶在此外其常籍人之}
  - {type: variant, offset: 729, length: 0, content: '', WYG: 諸君謂老男老女也六十已上為老男五十已上為老女也既不籍於老男老女又不籍於小男小女乃能以千萬人而當三千萬人者葢鹽官之利耳鹽官之利既然則鐡官之利可知也鹽官之利當一國而三萬人鐡官之利當一國而三萬人焉故能有二國之籍者六千萬人耳其常籍人之數猶在此外}
