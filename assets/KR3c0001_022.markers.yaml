  - {type: variant, offset: 698, length: 0, content: '', SBCK: 乗萬又施其稅數以千萬人如九百萬人之數則所稅之鹽一日百八十鍾十日千八百鍾之國大男大女食鹽者千萬人而稅之鹽一日二百鍾十日二千鍾一月六千鍾也今四百鍾一月五千}
  - {type: variant, offset: 698, length: 0, content: '', WYG: 萬乗之國大男大女食鹽者千萬人而税之鹽一日二百鍾十日二千鍾一月六千鍾也今又施其税數以千萬人如九百萬人之數則所税之鹽一日百八十鍾十日千八百鍾一月五千四百鍾}
