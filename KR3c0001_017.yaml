body:
  text: 七臣七主第五十二雜篇三或以平虛請論七主之道得六過一是以還自鏡以知得失以繩七臣得六過一是呼嗚美哉成事矣申主任勢守數以為常周聽近遠以續明皆要審則法令固賞罰必則下服度不備待而得和則民反素也故主虞而安吏肅而巖民朴而親官無邪吏朝無姦臣下無侵爭世無刑民惠主豐賞厚賜以竭藏赦姦縱過以傷法藏竭則主權衰法傷則姦門闓故曰泰則反敗矣侵主好惡反法以自傷喜決難知以塞明從狙而好小察事無常而法令曳不𠵦則國失勢芒主目伸五色耳常五聲四鄰不計司聲不聽則臣下恣行而國權大傾不𠵦則所惡及身勞主不明分職上下相干臣主同則刑振以豐豐振以刻去之而亂臨之而殆則後世何得振主喜怒無度嚴誅無赦臣下振恐不知所錯則人反其故不𠵦則法數日衰而國失固亡主通人情以質疑故臣下無信盡自治其事則事多多則昏昏則緩急俱植不𠵦則見所不善餘力自失而罰故一人之治亂在其心一國之存亡在其主天下得失道一人出主好本則民好墾草萊主好貨則人賈市主好宮室則工匠巧主好文采則女工靡夫楚王好小腰而美人省食吳王好劍而國士輕死死與不食者天下之所共惡也然而為之者何也從主之所欲也而況愈樂音聲之化乎夫男不田女不緇工技力於無用而欲土地之毛倉庫滿實不可得也土地不毛則人不足人不足則逆氣生逆氣生則令不行然彊敵發而起雖善者不能存何以效其然也曰昔者紂是也誅賢忠近讒賊之士而貴婦人好殺而不勇好富而忘貧馳獵無窮鼓樂無厭瑤臺玉圃不足處馳車千駟不足乘材女樂三千人鍾石絲竹之音不絶百姓罷乏君子無死卒莫有人人有反心遇周武王遂為周氏之禽此營於物而失其情者也愈於淫樂而忘後患者也故設用無度國家踣舉爭不時必受其菑夫倉庫非虛空也商宦非虛壞也法令非虛亂也國家非虛亡也彼時有春秋歲有賑凶政有急緩政有急緩故物有輕重歲有賑凶故民有羡不足時有春秋故穀有貴賤而上不調淫故游商得以什伯其本也百姓之不田貧富之不訾皆用此作城郭不守兵士不用皆道此始夫亡國踣家者非無壤土也其所事者非其功也夫凶歲雷旱非無雨露也其燥濕非其時也亂世煩政非無法令也其所誅賞者非其人也暴主迷君非無心腹也其所取舍非其術也故明主有六務四禁六務者何也一曰節用二曰賢佐三曰法度四曰必誅五曰天時六曰地宜四禁者何也春無殺伐無割大陵倮大衍伐大木斬大山行大火誅大臣收穀賦夏無遏水達名川塞大谷動土功射鳥獸秋毋赦過釋罪緩刑冬無賦爵賞祿傷伐五藏故春政不禁則百長不生夏政不禁則五穀不成秋政不禁則姦邪不勝冬政不禁則地氣不藏四者俱犯則陰陽不和風雨不時大水漂州流邑大風飄屋折樹暴火焚地燋草天冬雷地冬霆草木夏落而秋榮蟄蟲不藏宜死者生宜蟄者鳴苴多螣蟆山多蟲𧓹六畜不蕃民多夭死國貧法亂逆氣下生故曰臺榭相望者亡國之廡也馳車充國者追寇之馬也羽劍珠飾者斬生之斧也文采纂組者燔功之窯也明王知其然故遠而不近也能去此取彼則人主道備矣夫法者所以興功懼暴也律者所以定分止爭也令者所以今人知事也法律政令者吏民規矩繩墨也夫矩不正不可以求方繩不信不可以求直法令者君臣之所共立也權勢者人主之所獨守也故人主失守則危臣吏失守則亂罪決於吏則治權斷於主則威民信其法則親是故明王審法慎權下上有分夫凡私之所起必生於主夫上好本則端正之士在前上好利則毀譽之士在側上多喜善賞不隨其功則士不為用數出重法而不克其罪則姦不為止明王知其然故見必然之政立必勝之罰故民知所必就而知所必去推則往召則來如墜重於高如瀆水於地故法不煩而吏不勞民無犯禁故有百姓無怨於上矣法臣法斷名決無誹譽故君法則主位安臣法則貨賂止而民無姦嗚呼美哉名斷言澤飾臣克親貴以為名恬爵祿以為高好名則無實為高則不御故記曰無實則無勢失轡則馬焉制侵臣事小察以折法令好佼友而行私請故私道行則法度侵刑法繁則姦不禁王嚴誅則先民心諂臣多則造鍾鼓衆飾婦女以惛上故上惛則四鄰不計而司聲直祿是以諂臣貴而法臣賤此之謂微孤愚臣深罪厚罰以為行重賦斂多兌道以為上使身見憎而主受其謗故記稱之曰愚忠讒賊此之謂也姦臣痛言人情以驚主開罪黨以為讎除為讎除則罪不辜罪不辜則與讎居故善言可惡以自信而主失親亂臣自為辭功祿明為下請厚賞居為非母動為善棟以非買名以是傷上而衆人不知此之謂微攻禁藏第五十三雜篇四禁藏於胸脅之內而禍避於萬里之外能以此制彼者唯能以己知人者也夫冬日之不濫非愛冰也夏日之不煬非愛火也為不適於身便於體也夫明王不美宮室非喜小也不聽鍾鼓非惡樂也為其傷於本事而妨於教也故先慎於己而後彼官亦慎內而後外民亦務本而去末居民於其所樂事之於其所利賞之於其所善罰之於其所惡信之於其所餘財功之於其所無誅於下無誅者必誅者也有誅者不必誅者也以有刑至無刑者其法易而民全以無刑至有刑者其刑煩而姦多夫先易者後難先難而後易萬物盡然明王知其然故必誅而不赦必賞而不遷者非喜豫而樂其殺也所以為人致利除害也於以養老長弱完活萬民莫明焉夫不法法則治法者天下之儀也所以決疑而明是非也百姓所縣命也故明王慎之不為親戚故貴易其法吏不敢以長官威嚴危其命民不以珠玉重寶犯其禁故主上視法嚴於親戚吏之舉令敬於師長民之承教重於神寶故法立而不用刑設而不行也夫施功而不鈞位雖高為用者少赦罪而不一德雖厚不譽者多舉事而不時力雖盡其功不成斷刑而不當斬雖多其暴不禁夫公之所加罪雖重下無怨氣私之所加賞雖多士不為歡行法不道衆民不能順舉錯不當衆民不能成不攻不備當命為愚人故聖人之制事也能節宮室適車輿以實藏則國必富位必尊能適衣服去玩好以奉本而用必贍身必安矣能移無益之事無補之費通幣行禮而黨必多交必親矣夫衆人者多營於物而苦其力勞其心故困而不贍大者以失其國小者以危其身凡人之情得所欲則樂逢所惡則憂此貴賤之所同有也近之不能勿欲遠之不能勿忘人情皆然而好惡不同各行所欲而安危異焉然后賢不肖之形見也夫物有多寡而情不能等事有成敗而意不能同行有進退而力不能兩也故立身於中養有節宮室足以避燥濕食飲足以和血氣衣服足以適寒溫禮儀足以別貴賤游虞足以發歡欣棺槨足以朽骨衣衾足以朽肉墳墓足以道記不作無補之功不為無益之事故意定而不營氣情氣情不營則耳目穀衣食足耳目穀衣食足則侵爭不生怨怒無有上下相親兵刃不用矣故適身行義儉約恭敬其唯無福禍亦不來矣驕傲侈泰離度絶理其唯無禍福亦不至矣是故君子上觀絶理者以自恐也下觀不及者以自隱也故曰譽不虛出而患不獨生福不擇家禍不索人此之謂也能以所聞瞻察則事必明矣故凡治亂之情皆道上始故善者圉之以害牽之以利能利害者財多而過寡矣夫凡人之情見利莫能勿就見害莫能勿避其商人通賈倍道兼行夜以續日千里而不遠者利在前也漁人之入海海深萬仞就彼逆流乘危百里宿夜不出者利在水也故利之所在雖千仞之山無所不上深淵之下無所不入焉故善者執利之在而民自美安不推而往不引而來不煩不擾而民自富如鳥之覆卵無形無聲而唯見其成夫為國之本得天之時而為經得人之心而為紀法令為維綱吏為網罟什伍以為行列賞誅為文武繕農具當器械耕農當攻戰推引銚耨以當劍戟被蓑以當鎧襦葅笠以當盾櫓故耕器具則戰器備農事習則功戰巧矣當春三月萩室熯造鑽燧易火抒井易水所以去茲毒也舉春祭塞久禱以魚為牲以蘖為酒相召所以屬親戚也毋殺畜生毋拊卵毋伐木毋夭英毋拊竿所以息百長也賜鰥寡振孤獨貸無種與無賦所以勸弱民發五正赦薄罪出拘民解仇讎所以建時功施生穀也夏賞五德滿爵祿遷官位禮孝弟復賢力所以勸功也秋行五刑誅大罪所以禁淫邪止盜賊冬收五藏最萬物所以內作民也四時事備而民功百倍矣故春仁夏忠秋急冬閉順天之時約地之宜忠人之和故風雨時五穀實草木美多六蓄蕃息國富兵彊民材而令行內無煩擾之政外無彊敵之患也夫動靜順然后和也不失其時然後富不失其法然后治故國不虛富民不虛治不治而昌不亂而亡者自古至今未嘗有也故國多私勇者其兵弱吏多私智者其法亂民多私利者其國貧故德莫若博厚使民死之賞罰莫若成必使民信之夫善牧民者非以城郭也輔之以什司之以伍伍無非其人人無非其里里無非其家故奔亡者無所匿遷徙者無所容不求而約不召而來故民無流亡之意吏無備追之憂故主政可往於民民心可繫於主夫法之制民也猶陶之於埴冶之於金也故審利害之所在民之去就如火之於燥濕水之於高下夫民之所生衣與食也食之所生水與土也所以富民有要食民有率率三十畝而足於卒歲歲兼美惡畝取一石則人有三十石果蓏素食當十石糠粃六畜當十石則人有五十石布帛麻絲旁入奇利未在其中也故國有餘藏民有餘食夫敘鈞者所以多寡也權衡者所以視重輕也戶藉田結者所以知貧富之不訾也故善者必先知其田乃知其人田備然后民可足也凡有天下者以情伐者帝以事伐者王以政伐者霸而謀功者有五一曰視其所愛以分其威一人兩心其內必衰也臣不用其國可危二曰視其陰所憎厚其貨賂得情可深身內情外其國可知三曰聽其淫樂以廣其心遺以竽瑟美人以塞其內遺以諂臣文馬以蔽其外外內蔽塞可以成敗四曰必深親之如與同生陰內辨士使圖其計內勇士使高其氣內人他國使倍其約絶其使拂其意是必互鬭兩國相敵必承其弊五曰深察其謀謹其忠臣睽其所使令內不信使有離意離意不能合必內自賊忠臣已死故政可奪此五者謀功之道也
