front:
  text: 欽定四庫全書子部三
  hash: sha256:92933e9ce51117b53b328c30458f31a1b196bdbf9176a59bcb7216603dfe89ef
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3c0001_WYG_000-1a, image: WYG0729/WYG0729-0001a.png}
body:
  text: 管子法家類提要臣等謹案管子二十四卷舊本題管仲撰劉恕通鑑外紀引𫝊子曰管仲之書過半便是後之好事所加乃説管仲死後事輕重篇尤復鄙俗葉適水心集亦曰管子非一人之筆亦非一時之書以其言毛嬙西施呉王好劍推之當是春秋末年今考其文大抵後人附㑹多于仲之本書其他姑無論即仲卒於桓公之前而篇中處處稱桓公其不出仲手已無疑義矣書中稱經言者九篇稱外言者八篇稱内言者九篇稱短語者十九篇稱區言者五篇稱雜篇者十一篇稱管子解者五篇稱管子輕重者十九篇意其中孰為手撰孰為記其緒言如語録之類孰為述其逸事如家𫝊之類孰為推其意㫖如箋疏之類當時必有分别觀其五篇明題管子解者可以類推必由後人混而一之致滋疑竇耳晁公武讀書志曰劉向所校本八十六篇今亡十篇考李善註陸機猛虎行曰江䆳文釋引管子云夫士懐耿介之心不䕃惡木之枝惡木尚能恥之况與惡人同處今檢管子近亡數篇恐是亡篇之内而䆳見之則唐初已非完本矣明梅士享所刋又復顛倒其篇次如以牧民解附牧民篇下形勢解附形勢篇下之類不一而足彌為竄亂失真此本為萬厯壬午趙用賢所刋稱由宋本翻雕前有紹興己未張嵲後跋云舛脱甚衆頗為是正用賢序又云正其脱誤者逾三萬言則屢經㸃竄已非劉向所校之舊然終愈于他氏所妄更者在近代猶善本也舊有房元齡註晁公武以為尹知章所託然考唐書藝文志元齡註管子不註録而所載有尹知章註管子三十卷則知章本未託名殆後人以知章人㣲元齡名重改題之以炫俗耳案舊唐書知章絳州翼城人神龍初官太常博士睿宗即位拜禮部員外郎轉國子博士有孝經註老子註今並不𫝊惟此注藉元齡之名以存其文淺陋頗不足采然蔡絛鐵圍山叢談載蘇軾蘇轍同入省試有一題軾不得其出處轍以筆一卓而以口吹之軾因悟出管子註則宋時亦採以命題試士矣且古來無他註本明劉績所補注亦僅小有糾正未足相代故仍舊本録之焉乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書子部三管子目録法家類卷一牧民第一形勢第二權修第三立政第四乘馬第五卷二七法第六版法第七卷三幼官第八幼官圗第九五輔第十卷四宙合第十一樞言第十二卷五八觀第十三法禁第十四重令第十五卷六法法第十六兵法第十七卷七大匡第十八卷八中匡第十九小匡第二十王言第二十一卷九霸形第二十二霸言第二十三問第二十四謀失第二十五卷十戒第二十六地圖第二十七叅患第二十八制分第二十九君臣上第三十卷十一君臣下第三十一小稱第三十二四稱第三十三正言第三十四卷十二侈靡第三十五卷十三心術上第三十六心術下第三十七白心第三十八卷十四水地第三十九四時第四十五行第四十一卷十五勢第四十二正第四十三九變第四十四任法第四十五明法第四十六正世第四十七治國第四十八卷十六内業第四十九封禪第五十小問第五十一卷十七七臣七主第五十二禁藏第五十三卷十八入國第五十四九守第五十五桓公問第五十六度地第五十七卷十九地員第五十八弟子職第五十九言昭第六十修身第六十一問霸第六十二牧民解第六十三卷二十形勢解第六十四卷二十一立政九敗解第六十五版法解第六十六明法解第六十七臣乘馬第六十八乘馬數第六十九問乘馬第七十卷二十二事語第七十一海王第七十二國蓄第七十三山國軌第七十四山權數第七十五山至數第七十六卷二十三地數第七十七揆度第七十八國凖第七十九輕重甲第八十卷二十四輕重乙第八十一輕重丙第八十二輕重丁第八十三輕重戊第八十四輕重己第八十五輕重庚第八十六右二十四卷凡八十六篇内十篇闕管子原序管子舊書凡三百八十九篇漢劉向校除其重複定著為八十六篇今亡十篇近世所𫝊往往淆亂至不可讀余行求古善本庶㡬遇之者㡬二十年始得之友人秦汝立氏其大章僅完整而句字復多亂錯乃為正其脱誤者逾三萬言而闕其疑不可考者尚十之二然後管子㡬為全書夫五伯莫盛扵桓公而管仲特為之佐自其事羞稱扵聖門而其言悉見絀以為權謀功利學者鮮能道之及余讀是書而深惟其故然後知王者之法莫備扵周公而善變周公之法者莫精扵管子何者方周之興去隆古沕穆之風未逺而后稷公劉其深仁厚澤又培之扵數百年之乆盖風㑹既啟而文明猶鬱周公起而當制作之任其法制之綢繆文章之繁猥諸所經畫莫不犁然具舉而天下且以鴻龎淳固之俗始嚮利扵憲度著明之後故其法雖宻而其服習者亦能安之而不悖周室既衰諸侯日㝷扵干戈謀臣詧士競出其智力以相勝茍必兢兢扵先王之約束而執不移等則勢有所格而其術必有所窮非救時之宜矣管子固天下才也豈其智不及此乎是故當其謀之扵垂纓下衽之日者不過審舊法擇其善者而從之又其要則在事可以隠令可以寄政使諸侯不吾虞而吾􅍦安國富民以取盈於天下故其書如牧民乘馬㓜官輕重諸篇大抵不離周官以制用而亦不盡局於周官以通其變今攷其説所謂㕘國為三軍者即伍兩卒旅之舊也因罰備器用者即兩造兩劑之遺也選士首以好學慈孝而且及於拳勇股肱亦興賢之故典也鑄幣藉以黄金刀布而並及於魚鹽鍼鐡亦圜府之舊章也他如五勢三准諸説不過積餘藏羨待之於國諸侯不服吾可以戰諸侯賓服吾可以行仁義葢周公之法其樊然結約者要以率民於善仲直師其意不襲其故一更之為截然夷易而作民於戰故其言曰精時者少日而功多又曰吾欲正卒伍修甲兵而大國亦將修之吾有攻伐之器而諸侯有守禦之備是難以速得志此仲之所以立法意也夫白刄捍胷則目不見流矢拔㦸加首則十指不辭斷眀緩急之有所先也使仲當諸侯力政之日必欲舉王制而井田吾民象刑吾法毋招權勇毋𣙜鹽鐡不踰時而國且飽於敵矣安能以區區之齊伸威海岱而成其一匡之績哉昔者蘇軾氏盖論仲之變法而曰王者之兵非以求勝故其法繁而曲霸者之兵求以決勝故其法簡而直然則謂仲之用法異於周公之意則可而謂其法之盡詭於周公則不可故曰古今遞遷道隨時降王霸迭興政由俗革吾以為周公經制之大備葢所以成王道之終管子能變其常而通其窮亦所以基伯道之始夫亦勢之所趨有不得不然者乎雖然非仲之輕於悖周也當太公之治齊五月而報政曰吾因其俗簡其禮至三年而伯禽之報政周公且訾之曰夫政不簡不易民不有近魯終北面而事齊矣意者太公之治有不盡倣於周官而史葢稱其通商賈之策便魚鹽之利人民歸齊齊稱大國葢自太公而齊故以富彊名於列國仲特囙齊之故而修業耳非一無所昉襲而創為之者也世之譚者曰帝降而王王降而霸自仲之説行一變而入於誇詐之習其末極於秦鞅盡去先王之籍而流毒天下遂以管商為功利之首夫商君慘礉少恩卒受惡名於秦而仲之政餙四維固六親其論白心内業不可謂無窺於聖人之道而徒以刀鋸繩民如商君者故雖吾夫子亦且大其功而以如其仁歸之奈何躋鞅於仲也余􅘨夫讀是書者不揆其修政立事之原而徒辱之以權謀功利使管子之所以善用周公者其道不明於天下也故為之梓其書而復論著其大略於篇首云萬厯壬午春三月前史官吴郡趙用賢序管子原序䕶左都水使者光禄大夫臣向言所校讐中管子書三百八十九篇大中大夫卜圭書二十七篇臣富㕘書四十一篇射聲校尉立書十一篇太史書九十六篇凡中外書五百六十四以校除復重四百八十四篇定著八十六篇殺青而書可繕冩也管子者潁上人也名夷吾號仲父少時嘗與鮑叔牙游鮑叔知其賢管子貧困常欺叔牙叔牙終善之鮑叔事齊公子小白管子事公子糾及小白立為桓公子糾死管仲囚鮑叔薦管仲管仲既任政於齊齊桓公以霸九合諸侯一匡天下管仲之謀也故管仲曰吾始困時與鮑叔分財多自予鮑叔不以我為貪知吾貧也嘗為鮑叔謀事而更窮困鮑叔不以我為愚知吾有利有不利也公子糾敗召忽死之吾幽囚受辱鮑叔不以我為無耻知吾不羞小節而恥功名不顯於天下也生我者父母知我者鮑叔鮑叔既進管仲而已下之子孫世禄於齊有封邑者十餘世常為名大夫管子既相以區區之齊在海濱通貨積財富國彊兵與俗同好醜故其書稱曰倉廪實而知禮節衣食足而知榮辱上服度則六親固四維不張國乃滅亡下令猶流水之原令順人心故論卑而易行俗所欲因予之俗所否因去之其為政也善因禍為福轉敗為功貴輕重慎權衡桓公怒少姬南襲蔡管仲因伐楚責包茅不入貢於周室桓公北征山戎管仲因而令燕修召公之政柯之㑹桓公背曹沫之盟管仲因而信之諸侯歸之管仲聘於周不敢受上卿之命以讓髙國是時諸侯為管仲城榖以為之乘邑春秋書之褒賢也管仲富擬公室有三歸反坫齊人不以為侈管子卒齊國遵其政常彊於諸侯孔子曰微管仲吾其被髮左袵矣太史公曰余讀管氏牧民山髙乘馬輕重九府詳哉言之也又曰將順其美匡救其惡故上下能相親愛豈管仲之謂乎九府書民間無有山髙一名形勢凡管子書務富國安民道約言要可以曉合經義向謹第錄上春秋尊王不尊霸與中國不與夷狄始于平王避夷難也是王室遷而微也見于周書文侯之命微王也是王者失賞也費誓善其備夷是諸侯之正也秦誓專征伐是諸侯之失禮也書春秋合體而異世也書以文侯之命終其治也春秋以平王東遷始其微也自東遷六十五年春秋無晉以其亡䕶亂也及其滅中國之國而後見其行事譏失賞也周之微也幸不夷其宗稷齊桓之功也其中國無與加其盛也其夷狄無與抗其力也見于衛詩美其存中國也春秋無與辭何異也存一國之風無其人則衛夷矣全王道之正與之霸是諸侯可專征伐也夫晉之為霸也異齊逺矣桓正文譎夫桓之為正抑夷狄存中國文之為譎陵中國微王室晉之風也無美其美無功其功外無他焉雖國人不與也然而桓之正非王道之正也以文譎而桓正也桓之功非王道之功也以攘狄而存周也無桓周滅有周桓賊桓卒齊衰楚人滅周周之不幸桓之蚤死也故曰周之存桓之功也桓之不幸管仲之蚤死也故曰桓之功管仲之力也自是楚滅諸國而熾矣今得其著書然後知攘狄之功皆逺略也儒譏霸信刑賞豈王者詆民哉霸嚴政令豈王者怠忽哉霸鄉方畧豈王者不先謀哉霸審勞逸豈王者暴師哉霸謹蓄積豈王者使民不足哉亦時夷狄内聘大者畏威小者懐仁功亦至矣不幸名之不正然奈衰世何孔子曰微管仲吾其被髪左袵此其據也時大宋甲申秋九月二十三日楊忱序管子跋余讀管子然後知莊生鼂錯董生之語時出於管子也不獨此耳凡漢書語之雅馴者率多本管子管子天下之竒文也所以著見於天下後世者豈徒其功烈哉及讀心術上下白心内業諸篇則未嘗不廢書而歎益知其功業之所本然後知世之知管子者殊淺也管子書多古字如専作摶忒作貳宥作侑況作兄釋作澤此類甚衆大匡載召忽語曰百歳之後吾君卜世犯吾君命而廢吾所立奪吾糾也雖得天下吾不生也兄與我齊國之政也而注乃謂召忽呼管仲為兄曰澤命不渝而注乃以為澤恩之命甚陋不可徧舉書既雅奥難句而為之注者復繆於訓故益使後人疑惑不能究知世𫝊房𤣥齡所注者非是予求管子書久矣紹興己未乃從人借得之伏而讀者累月始頗窺其義訓然舛脱甚衆其所未解尚十二三用上下文義及㕘以經史訓故頗為是正其訛謬疑者表而發之其所未解者置之不敢以意穿鑿也既又取其間奥於理切於務者抄而藏於家將得善本而卒業焉張嵲跋欽定四庫全書管子卷一唐
