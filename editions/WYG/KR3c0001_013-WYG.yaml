body:
  text: 管子卷十二欽定四庫全書管子卷十三唐房𤣥齡注心術上第三十六短語十心之在體君之位也心之在體當身之中凡身之運為皆心之所使故象君位九竅之有職官之分也九竅則各有職司不能以此代彼若百官之有其分也心處其道九竅循理心之君處常能順道則九竅所司各循理而應也嗜欲充益目不見色耳不聞聲君嗜欲充益動違道則九竅失其由故日有所不見耳有所不聞也故曰上離其道下失其事上順道則下事得毋代馬走使盡其力毋代鳥飛使弊其羽翼毋先物動以觀其則動則失位靜乃自得道不逺而難極也能走者馬也能飛者鳥也今不任鳥馬之飛走而欲以人代之雖盡力弊翼而終竟不能盡以喻君代臣亦然故曰不逺而不得故曰難極也與人竝處而難得也虛其欲神將入舍但能空虚心之嗜欲神則入而舍之掃除不潔神乃留處不潔亦喻情欲人皆欲智而莫索其所以智乎所以智者虛心以循理也智乎智乎投之海外無自奪但能虚心循理其智雖復逺投海外虚心用之他毋從而奪之也求之者不得處之者將欲求之智終不知其處而得之也夫正人無求之也智旣不可得故人亦無從而求之故能虛無虛無無形謂之道化育萬物謂之德君臣父子人間之事謂之義人事各有宜也登降揖讓貴賤有等親疎之體謂之禮簡物小未一道殺僇禁誅謂之法謂簡擇於物未有能與道為一者乃殺戮禁防之此法之用也大道可安而不可說夫道無形無聲者也體神而安之則有理存焉如欲說之無緒可言直人之言不義不顧不出於口不見於色四海之人又孰知其則謂安道之君子雖人言其不義驚然不顧言旣不出於口理又不見於色言理旣絶四海之人誰有能知其則義哉天曰虛地曰靜乃不伐言能體天而虚順地而靜則道德全備故不可伐也潔其宫宫者心之宅猶靈臺也開其門門謂口也開口使順理而言下解中門謂耳目也去私毋言謂無私言神明若存宫潔無私則神存紛乎其若亂靜之而自治雖紛然而亂但靜而順之則自理也强不能徧立智不能盡謀忘强與智然後所謀立能徧而盡物固有形形固有名名當謂之聖人立名當物所以稱聖故必知不言無為之事然後知道之紀道以不言無事為紀殊形異埶不與萬物異理故可以為天下始君人者必殊形異埶與物同理故可以為天下主人之可殺以其惡死也若不惡死雖殺無益其可不利以其好利也若不好利雖不利之亦無懲也是以君子不怵乎好怵止也不止人好利之情下解中作怵不迫乎惡不迫移人惡死之意恬愉無為去智與故其應也非所設也其動也非所取也故事也旣㤀智則事自去過在自用自用不順理則生過罪在變化小聰明變舊章則成罪也是故有道之君其處也若無知寂泊之至其應物也若偶之若符契自然而合也靜因之道也凡此皆虛靜循理之道也心之在體君之位也九竅之有職官之分也此已下上章之解也然非管氏之辭豈有故作難書而復從而解之前脩之制皆不然矣凡此書之解乃有數篇版法勢之屬皆間錯不倫處非其第據此則劉向編授之由曰謂為管氏之辭故使然也今究尋文理觀其體勢一韓非之論而韓有解老之篇疑此解老之類也耳目者視聽之官也心而無與於視聽之事則官得守其分矣夫心有欲者物過而目不見聲至而耳不聞也故曰上離其道下失其事故曰心術者無為而制竅者也心無嗜欲之為故能制於九竅故曰君無代馬走無代鳥飛此言不奪能能不與下誠也君之能不預於下之誠凡為其所能無不誠毋先物動者搖者不定趮者不靜言動之不可以觀也位者謂其所立也人主者立於隂隂者靜靜為躁君故人主立於隂也故曰動則失位失君位也隂則能制陽矣靜則能制動矣君亦能制臣矣故曰靜乃自得道在天地之間也其大無外其小無内所謂大無不包細無不入也故曰不逺而難極也虚之與人也無間虛能貫穿人形故曰無間唯聖人得虛道故曰竝處而難得世人之所職者精也職主也言所稟而生者精也去欲則宣宣則靜矣宣通也去欲則虚自行故通而靜靜則精精則獨立矣獨則明明則神矣神者至貴也故館不辟除則貴人不舍焉故曰不潔則神不處人皆欲知而莫索之其所以知彼也其所以知此也有此然後知彼也不脩之此焉能知彼無此其具則不得知彼脩之此莫能虛矣虛者無藏也此旣脩則彼不能虚誑者無能藏隱故也故曰去知則奚率求矣率循也無知則循理而自求也無臧則奚設矣旣不能隱藏則無䇿謀可以施設也無求無設則無慮無慮則反覆虚矣天之道虛其無形虛則不屈屈竭也無形則無所位􅰎􅰎逆也無所位􅰎故徧流萬物而不變無物與之同故不變德者道之舍物得以生謂道因德以生物故德為道舍生知得以職道之精得其生者生由稟道之精也故德者得也得也者其謂所得以然也得道之精而然以無為之謂道無為自然者道也舍之之謂德道之所舍之謂德也故道之與德無間道德同體而無外内先後之異故曰無間故言之者不别也同體故能不别間之理者謂其所以舍也道德之理可間者則有所舍所以舍之異也義者謂各處其宜也禮者因人之情縁義之理而為之節文者也故禮者謂有理也理也者明分以諭義之意也故禮出乎義義出乎理理因乎宜者也法者所以同出不得不然者也有禮則有法故曰同出也故殺僇禁誅以一之也故事督乎法督察也謂以法察事法出乎權權出乎道權道者事從之而出道也者動不見其形施不見其德萬物皆以得然莫知其極故曰可以安而不可説也莫人言至也人無能言者理之至也不宜言應也有時宜言則應物故應也者非吾所設故能無宜也不顧言因也無所顧思者因舊故因也者非吾所顧故無顧也因舊也非吾所為故無顧不出於口不見於色言無形也四海之人孰知其則言深囿也不知深淺之囿城也天之道虛地之道靜虛則不屈靜則不變不變則無過故曰不伐潔其宫闕其門宫者謂心也心也者智之舍也故曰宫潔之者去好過也去欲好之過也門者謂耳目也耳目者所以聞見也物固有形形固有名此言不得過實實不得延名不得無實虛延其名姑形以形以形務名督言正名姑且也且言形者以其形也故曰聖人不言之言應也言則言彼形耳於我無言應也者以其為之人者也人有所為故聖人得不應執其名務其應所以成之應之道也物旣有名守其名而命合之則所務自成斯應物之道無為之道因也因也者無益無損也損益者生有為以其形因為之名此因之術也見形而後名非因而何名者聖人之所以紀萬物也萬物雖多立名以紀之也人者立於强必强然後有所立也務於善必善然後成人也未於能能未成者習而成之動於故者也凡所運動必循於故致也聖人無之謂無宰物之心也無之則與物異矣物有我無故異也異則虛異於有故虚也虚者萬物之始也有形生於無形也故曰可以為天下始聖人體虚故為天下始也人迫於惡則失其所好迫人於惡故失所好怵於好則㤀其所惡為好所怵故忘其惡非道也二者皆非故曰不怵乎好不迫乎惡惡不失其理欲不過其情故曰君子恬愉無為去智與故言虚素也凡知與言習從虚素生則無邪欲也其應非所設也其動非所取也此言因也因也者舍已而以物舍已而隨物故曰因為法者也感而後應非所設也縁理而動非所取也過在自用罪在變化自用則不虛不虛則仵於物矣變化則為生謂有為於營生為生則亂矣故道貴因因者因其能者言所用也就能而用故曰因也君子之處也若無知言至虚也其應物也若偶之言時適也若影之象形響之應聲也故物至則應過則舍矣舍矣者言復所於虛也心術下第三十七短語十一形不正者德不來有諸内必形於外故德來居中外形自正詩云抑抑威儀惟德之隅中不精者心不治精誠至之謂也中能誠至心事自理正形飾德萬物畢得翼然自來神莫知其極正外形飾内德則下觀而化矣故萬物盡得其理也昭知天下通於四極因物之義可以逆順故能昭知天下自近以及逺通達於四極是故曰無以物亂官貪賄則官亂也毋以官亂心健羨太甚則心亂也此之謂内德官貨兩忘則内德也是故意氣定然後反正無欲則意氣定故能反正也氣者身之充也氣以實身故曰身之充也行者正之義也行不違中正之宜者也充不美則心不得充不美則氣邪故心亂而不自得也行不正則民不服行不正則邪枉故人不服是故聖人若天然無私覆也若地然無私載也私者亂天下者也凡物載名而來聖人因而財之而天下治實不傷因名而財則物宜之不爽故天下之理不傷也不亂於天下而天下治天地以及萬物皆有理存焉直莫之亂則是理矣專於意一於心耳目端知逺之證但專意一心則耳目自端證知逺事也能專乎能一乎能毋卜筮而知凶吉乎惠迪吉從逆凶豈勞卜筮而後知乎能止乎能已乎謂能止於己分能毋問於人而自得之於已乎誠已自通問人致惑故不問而自得也故曰思之思之不得鬼神敎之誠已思而不得必有鬼神來教非鬼神之力也其精氣之極也鬼神雖能敎不精極者令有精極惟思之極則神不得不教豈鬼神能致其力也一氣能變曰精謂専一其氣能變鬼神來教謂之精一事能變曰智能專一其事能變而動之謂智也慕選者所以等事也人之來助或占慕之或選擇之欲令其事齊等也極變者所以應物也物窮則變變而通之我之所由令極於變通之理應物者也慕選而不亂慕選則齊潔故不亂極變而不煩極變以順物宜故不煩也執一之君子執一而不失能君萬物一謂精專也旣精且専故能君萬物也日月之與同光天地之與同理所謂與天地合其徳與日月合其明聖人裁物不為物使聖人者裁斷於物而使物不為裁而使已也心安是國安也聖心安是國安心治是國治也聖心治是國治治也者心也安也者心也理與安一在於心然後國從也治心在於中理心在於適中也治言出於口則無口過治事加於民則無枉事故功作而民從則百姓治矣功成人服非理而何所以操者非刑也所以危者非怒也刑雖能操怒雖能危比之於道猶為末功物不能離道無不操違道必危是無不危也民人操百姓治道其本至也必每人皆操道然後百姓理如此則道為人本豈不至哉至不至無無虚也所謂至者虛之道也非所人而亂非至虛而為天下主必亂凡在有司執制者之利非道也有司執制常棄本逐末滯於刑政非道也聖人之道若存若亡迎之不見其首隨之不見其後故曰若存若亡也援而用之殁世不亾道無形也無形則無盡時故歿世不亡也與時變而不化應物而不移日用之而不化無形則無變移之時人能正靜者筋肕而骨强能靜則和氣全故筋骨肕强也能戴大圓者體乎大方必體大方然後能戴大圓鏡大清者視乎大明必視大明然後能鏡大清正靜不失日新其德正靜者則理順而功立故其德日新昭知天下通於四極旣知天下則逺通四極金心在中不可匿金之為物彌精心之為用彌明故比心於金中茍有如金之心則徵見於外不可隱匿之也外見於形容可知於顔色其見於外或在形容或在顔色善氣迎人親如弟兄惡氣迎人害於戈兵不言之言聞於雷鼓至道之君常言之言則人無不聞故同於雷鼓金心之形明於日月察於父母金心無不耀無不知故明於日月察於父母知子無若於父母故以言焉昔者明王之愛天下故天下可附㬥王之惡天下故天下可離故貨之不足以為愛刑之不足以為惡貨者愛之末也刑者惡之末也愛惡以為心本也故貨刑為末也凡民之生也必以正平正平則能保全其生所以失之者必以喜樂哀怒喜樂哀怒過常則失其主節怒莫若樂節樂莫若禮樂主和故能節怒守禮莫若敬禮者敬而已矣故敬能守禮也外敬而内靜者必反其性外敬則合禮内靜則循察故能反其性豈無利事哉我無利心豈無安處哉我無安心亦旣反性則㤀其利安雖有利事安處蔑不足資也心之中又有心動亂之心中又有靜正之心也意以先言意感而得言意然後形意感其事然後呈形形然後思有形則理可尋故思之也思然後知思然後得理故能知也凡心之形過知失生是故内聚以為原泉之不竭内聚思慮則用之不窮猶泉之有源其可竭哉表裏遂通泉之不涸四支堅固内和則外道表裏無擁故若泉之不涸而四攴堅固也能令用之被服四固但能用此道者則四支堅固被及其身也是故聖人一言解之上察於天下察於地解則無不通物故能窮於上下白心第三十八短語十二建當立凡所建必建其當立者也有以靖為宗靜則思慮審為建事之宗以時為寶建事非時雖盡善不成時為事寳也以政為儀政者所以節制其事故為儀和則能久又必當和同然後能久也非吾儀雖利不為非吾當雖利不行非吾道雖利不取凡此雖曰有利非吾儀也當也道也故皆不為之也上之隨天其次隨人所謂應天順人也人不倡不和人倡而和事無不成也天不始不隨後天而奉天時則舉無不違也故其言也不廢其事也不隨原始計實本其所生知其象則索其形謂君之出言人乃順而不廢其行事則有不隨若此者當原其初始計其理實尋本其所生則其象可知象旣可知則其形可索也緣其理則知其情順理則情自見索其端則知其名索端則名自形故苞物衆者莫大於天地萬物共在天地之中化物多者莫多於日月日陽也月隂也物皆稟隂陽之氣然後化之也民之所急莫急於水火一日無水火則生理或有不全然而天不為一物枉其時冬不為松栢不凋輟其霜雪夏不為薺麥枯死止其雨露也明君聖人亦不為一人枉其法周公不以管蔡之親休其誅放也天行其所行而萬物被其利冬行霜雪夏行雨露故萬物利也聖人亦行其所行而百姓被其利行賞於善人行罰於凶人故天下清而百姓䝉利也是故萬物均旣誇衆矣誇大也天與聖人無私故萬物均䝉其利旣大而且衆也是以聖人之治也静身以待之物至而名自治之循名責實則下無隱情故理正名自治之竒身名廢竒謂邪不正音飢名正法備則聖人無事正名法備則事無闕滯故聖人無事也不可常居也居必有時而遷不可廢舍也廢舍則百度㢮紊也隨變斷事也居變則不壅塞也知時以為度事非其時則不成也大者寛小者局寛則有餘局則不足物有所餘有所不足以有餘補不足則事平理均也兵之出出於人人為兵本其人入入於身兵而有功入其賞賜必反於身兵之勝從於適適和也所謂師克在和也徳之來從於身脩身則徳立也故曰祥於鬼者義於人義於人者則鬼祐之以福祥也兵不義不可兵不義而還自害故不可强而驕者損其强弱而驕者亟死亾違禮而驕無施而可弱而驕者則又其戾焉死之速不亦宜乎强而卑義信其强信音申弱而卑義免於罪是故驕之餘卑於驕有餘則弱弱則卑也卑之餘驕於卑有餘則强强則又驕道者一人用之不聞有餘理纔用於一人天下行之不聞不足無不足於其人此謂道矣多少皆足者道也小取焉則小得福大取焉則大得福盡行之而天下服殊無取焉則民反其身不免於賊殊無取焉則動皆違道故人反背之而賊害也左者出者也左為陽陽主生故為出也右者入者也右為陰陰主死故為入也出者而不傷人入者自傷也出者旣主生則不當傷人違而傷人是還自傷不日不月而事以從但循道而往不計日月事已從而成也不卜不筮而謹知吉凶順道則吉違道則凶豈須卜筮而知乎是謂寛乎形徒居而致名守道者靜黙而已故其身寛間徒然而居能致令名去善之言為善之事事成而顧反無名若能去言善直能為善事其事之成顧反之者黙然無名也能者無名從事無事深能其事者必不求名然其從事安然閒暇若無事然也審量出入而觀物所載謂凡出命令當觀物載之所堪然後當量而出之也孰能法無法乎始無始乎終無終乎弱無弱乎凡此皆謂為而忘之者也故曰美哉岪岪岪岪興起貎謂能為而不為有契於道如此則功美日興故曰美哉岪岪故曰有中有中舉事雖得其中而不為中乃是有中也孰能得夫中之衷乎得於中之損折中者其唯忘中乎故曰功成者隳名成者虧故曰孰能弃名與功而還與衆人同君弃功名則與衆不異同於物者誰能害之也孰能弃功與名而還反無成弃功名則無所成名無成有貴其成也能貴無成乃是成也有成貴其無成也若其貴成乃是無成日極則仄月滿則虧極之徒仄滿之徒虧謂月巨之徒滅謂能立大功也孰能已無己乎效夫天地之紀天地忘形者也能效天地者其唯忘己乎人言善亦勿聽人言惡亦勿聽譽之不勸非之不沮持而待之空然勿兩之淑然自清但無心而待則淑然和美善惡自清也無以旁言為事成察而徵之無聽辨無以旁譽之言以為事成功無聽其利口之辨言悅之也萬物歸之美惡乃自見萬物之歸當順而容之其美之與惡終自顯見也天或維之地或載之天莫之維則天以墜矣地莫之載則地以沈矣夫天不墜地不沈夫或維而載之也夫天張於上地設於下自古及今而不沈墜者必有神靈維載之故又况於人人有治之辟之若夫靁鼓之動也必有以而動也夫不能自搖者夫或之無識之物皆不能自搖有時而動則物搖之也夫或者何若然者也風有時搖動誰使然也視則不見聽則不聞謂風灑乎天下滿風之洒散滿天下也不見其塞風無壅塞時也集於顔色寒者遇風則色惨熱者遇之則清也知於肌膚惟肌膚能覺風責其往來莫知其時責問其往來則不得正時薄乎其方也謂遇方則為方韕乎其圜也韕復貎謂遇圓則為圓也韕韕乎莫得其門雖復圓轉終不見其門也故口為聲也耳為聽也目有視也手有指也足有履也事物有所比也今夫口手目足各有其在非徒然也必精神之比夫事物之動搖則風使之然然求風則不得語神亦不見之也當生者生當死者死或死或生亦神為之主言有西有東各死其鄉雖其所居有東西之異至於各死其鄉則無不均也置常立儀能守貞乎人人理則置之常法立之儀則而勿失者可謂正乎常事通道能官人乎有能守其常事隨時變通不違於道如此者可以官於人故書其惡者言其薄者上聖之人聖通也旣設法以教之立官以主之猶有惡薄而不化者則書而陳之居上者然後化而通之也口無虛習也手無虚指也物至而命之口之習也手之指也終不徒然必以事物之至或以手指之或以口命之耳發於名聲凝於體色此其可諭者也名聲之至耳聽之内流於心外凝結於體色如此者性之敏惠故可以德義告諭也不發於名聲不凝於體色此其不可諭者也不發不凝所謂頑鄙者也故不可告諭也及至於至者敎存可也敎亡可也謂人可誘令至於所欲至如此者存亾教故敎存亦可敎亡亦可也故曰濟於舟者和於水矣水和靜無有波浪則能濟舟義於人者祥其神矣與人理相宜則神與之福祥也事有適而無適事雖有所適可常者若無適然若有適觽解不可解而後解雖時有適潛黙周密人莫知其由然結必待觽而後解觽所以解結也故善舉事者國人莫知其解周密若結故不能知其解為善乎毋提提為不善乎將陷於刑提提謂有所揚舉也欲為善乎則人以我謙退無所舉欲為不善又恐陷於刑罰也善不善取信而止矣善與不善足以為物所信則止矣此言可以為善不善之取也若左若右正中而已矣縣乎日月無已也左陽謂善也右隂謂不善也言處隂陽之中得其正而止若能常得中則名與日月俱懸而無已時也愕愕者不以天下為憂愕愕守正者㤀天下故不憂也刺刺者不以萬物為筴刺刺操求自謂智謀之士能㤀智當操求物理而經營切為䇿也孰能弃刺刺而為愕愕乎智者勞而失惠㤀德者佚而歸之也難言憲術須同而出凡為法術必重難須同衆心然後出之矣無益言無損言近可以免損益之事當潛而為之又曰何謀此慎密之至故曰知何知乎謀何謀乎雖知之常曰何知雖謀之常曰何謀此慎密之至審而出者彼自來審而出者必同於彼故自來自知曰稽自知則能考彼矣知人曰濟知人則能可以濟同不以和濟同也知茍適可為天下周自知能稽知人能濟所謂道也若此可為天下之周慎也内固之一可為長久適可以知内自固之則長久論而用之可以為天下王旣固於心度時論用如此可以為天下王天之視而精旣可王天下則於天道故視天能精之也四璧而知請四璧周禮所謂四珪有邸者也祭天所奠也同邸於璧故曰四璧旣能知天則祭以四璧而祈請其福祥也壤土而與生天旣降福故壤土為之生百榖也能若夫風與波乎唯其所欲適風動波應大小唯所欲適天地之應聖人亦猶是也故子而代其父曰義也臣而代其君曰簒也臣代於君必是簒奪而取也簒何能歌武王是也武王以臣代君則非簒也謂之簒之豈能使紂之衆前歌後舞乎則武王以臣代君於理是也故曰孰能去辯與巧而還與衆人同道武王伐紂所以不為簒者則以紂恃其辯巧自異於物逆天絶理毒流四海故也向能去其辯巧與衆同道何武王之敢窺哉雖欲伐之故得簒名故曰思索精者明益衰德行脩者王道狹思索太精則矜名故王道狹也臥名利者寫生危臥猶息也寫猶除也能息名利則除身之危知周於六合之内者吾知生之有為阻也周其智於六合則神傷蝎故於其生有阻難也持而滿之乃其殆也持滿者善覆故危也名滿於天下不若其已也名滿於天下則華揚而實喪名進而身退天之道也未有能名身俱進者滿盛之國不可以仕任滿盛則敗亡故不可任其仕也滿盛之家不可以嫁子嫁子於滿盛之家則與之俱亡驕倨傲㬥之人不可與交交於驕暴則危亡及己也道之大如天無不覆也其廣如地無不載也其重如石萬人之力不能舉也其輕如羽一人載之不為重民之所以知者寡故曰何道之近而莫之與能服也服行也弃近而就逺何以費力也道近在身不能求之於己而望之於人終無得時故曰費力也故曰欲愛吾身先知吾情知己情則能自保其身君親六合以考内身遍六合之種一一考之於身身皆備之則何須弃身而逺之也以此知象乃知行情於身知象乃知可行之情旣知行情乃知養生知行情則不違理不違理則生全故曰乃知養生左右前後周而復所行身之道或從左右或從前後行之旣周還復本所也執儀服象敬迎來者執常儀行常象將來可行之理敬而迎之今夫來者必道其道上道從也將來之理必道而來從也無遷無衍命乃長久理旣從道而來但遵而行之無遷移無寛衍動而為之則命久長也和以反中形性相葆事旣安和反歸中理如此則形全性順故能相保也一以無貳是謂知道將欲服之必一其端而固其所守固守則道自行責其往來莫知其時若責生之往來則期不定索之於天與之為期求性命之理於天則期時可知也不失其期乃能得之旣不失期則性命之理得也故曰吾語若大明之極若女也大明之極謂天也大明之明非愛人不予也愛惜也非有所隱惜於人而不與之也同則相從反則相距也與天同則從反則距也吾察反相距吾以故知古從之同也察今反則有距故知古之從者以其同也管子卷十三
