body:
  text: 房𤣥齡注牧民第一國頌士經四維五四順六親法經言一凡有地牧民者務在四時四時所以生成萬物也守在倉廪食者人之天也國多財財逺者來地辟舉則民留處舉盡也言地盡闢則人留而安居處也倉廩實則知禮節衣食足則知榮辱上服度則六親固服行也上行禮度則六親各得其所故能感恩而結固之四維張則君令行故省刑之要在禁文巧文巧者刑罰所由生守國之度在飾四維順民之經在明鬼神祗山川鬼神山川皆有尊卑之序故敬明之敬宗廟恭祖舊謂恭承先祖之舊法不務天時則財不生不務地利則倉廪不盈野蕪曠則民乃菅菅當為姦上無量則民乃妄文巧不禁則民乃淫不璋兩原則刑乃繁璋當為章章明也兩原謂妄之原上無量也淫之原不禁文巧也能明此法者刑簡不明鬼神則陋民不悟不悟鬼神有尊卑之異也不祗山川則威令不聞言能登封降禪祗祀山川則威令逺聞不敬宗廟則民乃上校校效也君無所尊人亦效之不恭祖舊則孝悌不備四維不張國乃滅亡右國頌頌容也謂陳為國之形容國有四維一維絶則傾二維絶則危三維絶則覆四維絶則滅傾可正也危可安也覆可起也滅不可復錯也何謂四維一曰禮二曰義三曰㢘四曰恥禮不踰節義不自進自進謂不由薦舉也㢘不蔽惡隠蔽其惡非貞㢘也恥不從枉詭隨邪枉無羞之人故不踰節則上位安不自進則民無巧詐不蔽惡則行自全不從枉則邪事不生右四維政之所興在順民心政之所廢在逆民心民惡憂勞我佚樂之民惡貧賤我富貴之民惡危墜我存安之民惡滅絶我生育之能佚樂之則民為之憂勞君於平康能佚樂人及其危人必為之憂勞下三順皆然能富貴之則民為之貧賤能存安之則民為之危墜能生育之則民為之滅絶故刑罰不足以畏其意殺戮不足以服其心畏意服心在於順其所欲不在刑罰殺戮故刑罰繁而意不恐則令不行矣殺戮衆而心不服則上位危矣故從其四欲則逺者自親行其四惡則近者叛之故知予之為取者政之寳也謂與之生全取其死難也右四順錯國於不傾之地積於不涸之倉涸竭也藏於不竭之府下令於流水之原使民於不爭之官明必死之路開必得之門不為不可成不求不可得不處不可久不行不可復錯國於不傾之地者授有德也積於不涸之倉者務五榖也藏於不竭之府者養桑麻育六畜也下令於流水之原者令順民心也使民於不争之官者使各為其所長也各長其所長則順而恱故不争也明必死之路者嚴刑罰也開必得之門者信慶賞也不為不可成者量民力也不求不可得者不彊民以其所惡也不處不可久者不偷取一世也謂所處可必使百代常行不行不可復者不欺其民也復重也欺民之事不可重行也故授有德則國安務五榖則食足養桑麻育六畜則民富令順民心則威令行使民各為其所長則用備嚴刑罰則民逺邪信慶賞則民輕難量民力則事無不成不彊民以其所惡則詐偽不生不偷取一世則民無怨心不欺其民則下親其上右士經士事也經常也謂陳事之可以常行者也以家為鄉鄉不可為也言有家之親斥以為鄉之疎必生怨故不可為也下三事同此以鄉為國國不可為也以國為天下天下不可為也以家為家一親也以鄉為鄉二親也以國為國三親也以天下為天下四親也毋曰不同生逺者不聽謂家也言有家之親而謂之曰不與汝同家而生用此以相疎逺者必不聽下同毋曰不同鄉逺者不行毋曰不同國逺者不從如地如天何私何親五親也如月如日唯君之節六親也天地日月取其耀臨言人君親下當如天地日月之無私也御民之轡在上之所貴言人從上之所貴若馬之從轡道民之門在上之所先上所先行人必行之其從之若由門矣召民之路在上之所好惡故君求之則臣得之君將求之臣已先索得之也君嗜之則臣食之君好之則臣服之君惡之則臣匿之一法也毋蔽汝惡毋異汝度汝君也賢者將不汝助言室滿室言堂滿堂是謂聖王二法也言堂室事而令滿取其露見不隠也城郭溝渠不足以固守兵甲彊力不足以應敵博地多財不足以有衆言城郭兵甲博地不足以固守應敵有衆其固守應敵有衆更在有道者也惟有道者能備患於未形也故禍不萌三法也天下不患無臣患無君以使之天下不患無財患無人以分之可以分與財者賢人也故知時者可立以為長無私者可置以為政審於時而察於用而能備官者可奉以為君也四法也緩者後於事􅈔於財者失所親信小人者失士五法也右六親五法形執第二自天地以及萬物闗諸人事莫不有形勢焉夫勢必因形而立故形端者勢必直狀危者勢必傾觸類莫不然可以一隅而反經言二山髙而不崩則祈羊至矣淵深而不涸則沈玉極矣極至也山不崩淵不涸興雨之祥故羊玉而祈祭烹羊以祭故曰祈羊天不變其常地不易其則春秋冬夏不更其節古今一也今之天地即古之天地今之四時即古之四時故曰古今一也蛟龍得水而神可立也虎豹得幽而威可載也至德處盛位天下可平載行也風雨無鄉而怨怒不及也鄉方也既無方所故無從而怨怒也貴有以行令賤有以忘卑貴而行令令可行賤而忘卑卑可移夀夭貧富無徒歸也皆有理在焉銜命者君之尊也受辭者名之運也言受君之辭以出命則名必運運行也上無事則民自試試用也抱蜀不言而廟堂既脩抱持也蜀祠器也君人者但抱祠器以身率道雖復静黙不言廟堂之政既以脩理矣鴻鵠鏘鏘唯民歌之感德化也濟濟多士殷民化之紂之失也戒紂之失故化文王飛蓬之問不在所賓燕雀之集道行不顧蓬飛因風動揺不定喻二三之聲問明主所不賓敬燕雀翔集事之常細也故行道之人忽而不顧謂小事非大人所宜知犧牷圭璧不足以饗鬼神鬼神享德不在圭璧主功有素寳幣奚為主能立功可謂有素有素則諸侯不敢犯寳玉幣帛何所為乎羿之道非射也造父之術非馭也奚仲之巧非斵削也羿之射貴其肆武服戎不在其落烏中鵲造父之馭貴其軍容致逺不在轍跡徧天下也奚仲之巧貴其九車以載不在斵削成光鑑也召逺者使無為焉親近者言無事焉唯夜行者獨有也逺使無為所以優逺方也親於近者貴於恩厚不在於虛言夜行謂隂行其德則人不與之争故獨有之也平原之隰奚有於髙言平隰之澤雖有小封不成於髙喻人有大失小善不成其美隰下澤也大山之隈奚有於深隈山曲也言山既大矣雖有小隈不成為深喻人有髙行雖有小過非不肖也訾讆之人勿與任大訾毁賢讆譽惡也如此之人則亂大邦也譕臣者可以逺舉言行莫先謂之譕臣有大言行者可與圖國之逺也顧憂者可與致道顧憂謂忠事勤臣道有如此者可致於道者也其計也速而憂在近者往而勿召也小人之計得之雖速禍敗㝷至則憂及之此人親近推之令去不須召也舉長者可逺見也舉用長利衆皆見之故曰逺見裁大者衆之所比也裁斷也能斷大事衆必比之美人之懷定服而勿厭也欲令人貴美而懷歸者須安定服行道德勿有疲厭必得之事不足賴也必諾之言不足信也言人於事莫為疑動言必得應諾如此虛誕者耳不足賴信也小謹者不大立訾食者不肥體言人無𢎞量但有小謹不能大立也訾惡也惡食之人憂嫌致瘠故不能肥體有無棄之言者必㕘於天地也言無可棄動為法則若天地之無不容載故曰㕘之天地墜岸三仞人之所大難也而猿猱飲焉故曰伐矜好專舉事之禍也猿遇墜岸而能飲喻智者逢禍而能息也不行其野不違其馬馬有識道之性不違馬而自得途喻未經其事問其所經能予而無取者天地之配也天地施生不求所報與而不取可以配天地也怠倦者不及倦怠之人觸塗廢滯故多不及無廣者疑神神者在内不及者在門無得以已及不及疑神不神神雖無形常在於内故曰在内也不及外見故曰在門也在内者將假在門者將待將假謂神將借已也待謂須自厲以待曙戒勿怠後穉逢殃每曙而戒所以戒此日之事以待曙戒戒勿為倦怠也朝忘其事夕失其功邪氣入内正色乃衰君不君則臣不臣父不父則子不子上失其位則下踰其節上下不和令乃不行衣冠不正則賓者不肅進退無儀則政令不行且懷且威則君道備矣莫樂之則莫哀之常能樂人及其有難人必哀之也莫生之則莫死之常能生人及其有危人必死之往者不至來者不極此往情不至則彼來意不極也道之所言者一也而用之者異道之所言其理不二但用之不同其事遂異也有聞道而好為家者一家之人也雖聞道但好理家此但一家之人耳言無廣逺有聞道而好為鄉者一鄉之人也有聞道而好為國者一國之人也有聞道而好為天下者天下之人也此亦仁者見之謂之仁智者見之謂之智也有聞道而好定萬物者天下之配也此則君子體斯道也道往者其人莫來道來者其人莫往道之所設身之化也道者均彼我忘是非故無來住之體然道之所設身必與之化也持滿者與天安危者與人失天之度雖滿必涸上下不和雖安必危能持滿者則與天合能安危者則與人合不合於天雖滿必涸不合於人雖安必危欲王天下而失天之道天下不可得而王也得天之道其事若自然失天之道雖立不安其道既得莫知其為之其功既成莫知其釋之藏之無形天之道也疑今者察之古不知來者視之往萬事之生也異趣而同歸古今一也生棟覆屋怨怒不及弱子下瓦慈母操箠言人以生棟造舍雖至覆屋但自咎而已不敢怨及他人至弱子下瓦所損不多慈母便操箠而怒之喻人主過由已作雖大而吞聲過發他人雖小而振怒也天道之極逺者自親天道平分逺近無二故逺者自親也人事之起近親造怨人事則愛惡相攻故有近親造怨也萬物之於人也無私近也無私逺也動物則有識而無知植物則有生而無識故於人也無私逺近巧者有餘而拙者不足萬物既無私於人故巧者用之有餘拙者用之不足其功順天者天助之其功逆天者天違之天之所助雖小必大天之所違雖成必敗順天者有其功逆天者懷其凶不可復振也烏鳥之狡雖善不親狡謂猜也言烏鳥之性多猜初雖相善後終不親不重之結雖固必解道之用也貴其重也毋與不可毋彊不能毋告不知與不可彊不能告不知謂之勞而無功見與之交幾於不親見謂不忘而恃之也與親與也見哀之役幾於不結役而哀之雖有惻然見而不忘故彼不結也見施之德幾於不報雖有恩施之徳然見而不忘故彼不報也四方所歸心行者也心行能不見則四方歸之獨王之國勞而多禍獨王謂無四鄰之援也獨國之君卑而不威自媒之女醜而不信未之見而親焉可以往矣未見而親親必無終故可往矣久而不忘焉可以來矣日月不明天不易也山髙而不見地不易也日月無不明假令不明是天有雲氣而不易也山髙無不見假令不見是地多險阻不平易也言而不可復者君不言也行而不可再者君不行也謂臣有忠言不可復言者則由君不言故也臣有善行不可再行者則由君不行故也凢言而不可復行而不可再者有國者之大禁也權修第三權者所以知輕重也君人者必知事之輕重然後國可為故須修權經言三萬乘之國兵不可以無主無所主則無所統一也土地博大野不可以無吏無吏則不厲於墾闢百姓殷衆官不可以無長無長則無所禀令也操民之命朝不可以無政地博而國貧者野不辟也民衆而兵弱者民無取也兵無主故無所取則故末產不禁則野不辟賞罰不信則民無取野不辟民無取外不可以應敵内不可以固守故曰有萬乘之號而無千乘之用而求權之無輕不可得也國號萬乘及其兵用不滿於千如此者權必自輕也地辟而國貧者舟輿飾臺榭廣也賞罰信而兵弱者輕用衆使民勞也舟車飾臺榭廣則賦斂厚矣輕用衆使民勞則民力竭矣賦斂厚則下怨上矣民力竭則令不行矣下怨上令不行而求敵之勿謀已不可得也欲為天下者必重用其國欲為其國者必重用其民欲為其民者必重盡其民力重為矜惜之也無以畜之則往而不可止也往謂亡去也無以牧之則處而不可使也人雖留處無畜牧之道故不可使也逺人至而不去則有以畜之也民衆而可一則有以牧之也見其可也喜之有徵徵驗也必有恩錫以驗見喜無空然矣見其不可也惡之有刑賞罰信於其所見雖其所不見其敢為之乎所見之處賞罰既信則所不見懼而從教不敢為非見其可也喜之無徵見其不可也惡之無刑賞罰不信於其所見而求其所不見之為之化不可得也厚愛利足以親之明智禮足以教之上身服以先之服行也凡所欲教人在上必身自行之所以率先於下也審度量以閑之所以防閑其姦偽也鄉置師以說道之然後申之以憲令勸之以慶賞振之以刑罰振整也故百姓皆說為善則暴亂之行無由至矣地之生財有時民之用力有倦而人君之欲無窮以有時與有倦養無窮之君而度量不生於其間度量不生則賦役無限也則上下相疾也上疾下之不供下疾上之無窮是以臣有弑其君子有弑其父者矣故取於民有度用之有止國雖小必安取於民無度用之不止國雖大必危地之不辟者非吾地也民之不牧者非吾民也凡牧民者以其所積者食之不可不審也其積多者其食多其積寡者其食寡無積者不食或有積而不食者則民離上有積多而食寡者則民不力有積寡而食多者則民多詐有無積而徒食者則民偷幸故離上不力多詐偷幸舉事不成應敵不用故曰察能授官班禄賜予使民之機也野與市争民民務本業則野與市争民家與府争貨下務藏積則家與府争貨金與粟争貴所寳惟穀故金與粟争貴鄉與朝争治官各務其職故鄉與朝争治故野不積草農事先也府不積貨藏於民也市不成肆家用足也朝不合衆鄉分治也故野不積草府不積貨市不成肆朝不合衆治之至也人情不二故民情可得而御也審其所好惡則其長短可知也觀其交游則其賢不肖可察也二者不失則民能可得而官也二者謂好惡交游也地之守在城城之守在兵兵之守在人人之守在粟故地不辟則城不固有身不治奚待於人待謂將治之言身既不能自治則無以治人也有人不治奚待於家有家不治奚待於鄉有鄉不治奚待於國有國不治奚待於天下天下者國之本也國者鄉之本也鄉者家之本也家者人之本也人者身之本也身者治之本也故上不好本事則末產不禁末產不禁則民緩於時事而輕地利輕地利而求田野之辟倉廪之實不可得也商賈在朝則貨財上流若桓靈之費官也婦言人事則賞罰不信婦者所以職其蠶織此之不為輒言人事婦人之性險詖故賞罰不信矣男女無别則民無㢘恥貨財上流賞罰不信民無㢘恥而求百姓之安難兵士之死節不可得也朝廷不肅貴賤不明長幼不分度量不審衣服無等上下淩節而求百姓之尊主政令不可得也上好詐謀閒欺閒隔也有所隔礙而欺誑也臣下賦斂競得使民偷壹偷取一時之快則百姓疾怨而求下之親上不可得也有地不務本事本事謂農君國不能壹民而求宗廟社稷之無危不可得也上恃龜筮好用巫毉則鬼神驟祟故功之不立名之不章為之患者三茍功不立名不章必為三患下獨王貧賤日不足是也有獨王者謂無黨也有貧賤者有日不足者有日不足之費也一年之計莫如樹榖十年之計莫如樹木終身之計莫如樹人樹人謂濟而成立之一樹一穫者榖也一樹十穫者木也果木過十年漸就枯悴故曰十穫也一樹百穫者人也人有百年之夀雖使無百年子孫亦有嗣之而報德者故曰百穫也我茍種之如神用之一種百穫近識者莫能測其由故曰如神用也舉事如神唯王之門王者貴神道設教也凡牧民者使士無邪行女無淫事士無邪行教也女無淫事訓也教訓成俗而刑罰省數也所角反凡牧民者欲民之正也欲民之正則微邪不可不禁也微邪者大邪之所生也微邪不禁而求大邪之無傷國不可得也凡牧民者欲民之有禮也欲民之有禮則小禮不可不謹也小禮不謹於國而求百姓之行大禮不可得也凡牧民者欲民之有義也欲民之有義則小義不可不行小義不行於國而求百姓之行大義不可得也凡牧民者欲民之有㢘也欲民之有㢘則小㢘不可不修也小㢘不修於國而求百姓之行大㢘不可得也凡牧民者欲民之有恥也欲民之有恥則小恥不可不飾也小恥不飾於國而求百姓之行大恥不可得也凡牧民者欲民之修小禮行小義飾小廉謹小恥禁微邪此厲民之道也民之修小禮行小義飾小㢘謹小恥禁微邪治之本也凡牧民者欲民之可御也欲民之可御則法不可不審法者將立朝廷者也將立朝廷者則爵服不可不貴也爵服加于不義則民賤其爵服民賤其爵服則人主不尊人主不尊則令不行矣法者將用民力者也將用民力者則禄賞不可不重也禄賞加于無功則民輕其禄賞民輕其禄賞則上無以勸民上無以勸民則令不行矣法者將用民能者也將用民能者則授官不可不審也授官不審則民間其治民間其治則理不上通理不上通則下怨其上下怨其上則令不行矣法者將用民之死命者也用民之死命者則刑罰不可不審刑罰不審則有辟就有辟就則殺不辜而赦有罪殺不辜而赦有罪則國不免於賊臣矣故夫爵服賤祿賞輕民間其治賊臣首難此謂敗國之教也立政第四三本省官四固服制五事九敗首憲七觀首事經言四國之所以治亂者三殺戮刑罰不足用也三謂三本也謂治亂法各有三也國之所以安危者四城郭險阻不足守也四謂四固國之所以富貧者五輕稅租薄賦斂不足恃也五謂五事治國有三本而安國有四固而富國有五事五事五經也自三本已上總其目君之所審者三一曰德不當其位二曰功不當其禄三曰能不當其官此三本者治亂之原也故國有德義未明於朝者則不可加于尊位功力未見于國者則不可授以重禄臨事不信扵民者則不可使任大官故徳厚而位卑者謂之過徳薄而位尊者謂之失寧過於君子而毋失於小人過於君子其為怨淺失於小人其為祸深是故國有徳義未明於朝而處尊位者則良臣不進有功力未見於國而有重禄者則勞臣不勸有臨事不信於民而任大官者則材臣不用三本者審則下不敢求三本者不審則邪臣上通而便辟制威如此則明塞於上而治壅於下正道捐棄而邪事日長三本者審則便辟無威於國道塗無行禽無禽獸之行疏逺無蔽獄孤寡無隠治故曰刑省治寡朝不合衆右三本君之所慎者四一曰大德不至仁不可以授國柄德雖大而仁不至或包藏禍心故不可授國柄二曰見賢不能讓不可與尊位三曰罰避親貴不可使主兵四曰不好本事不務地利而輕賦斂不可與都邑此四務者安危之本也故曰卿相不得衆國之危也大臣不和同國之危也兵主不足畏國之危也民不懷其産國之危也故大德至仁則操國得衆見賢能讓則大臣和同罰不避親貴則威行於鄰敵好本事務地利重賦斂則民懷其産右四固君之所務者五一曰山澤不救於火草木不植成國之貧也二曰溝瀆不遂於隘鄣水不安其藏國之貧也三曰桑麻不植於野五榖不宜其地國之貧也四曰六畜不育於家瓜瓠葷菜百果不備具國之貧也五曰工事競於刻鏤女事繁於文章國之貧也故曰山澤救於火草木植成國之富也溝瀆遂於隘鄣水安其藏國之富也桑麻植於野五榖宜其地國之富也六畜育於家瓜瓠葷菜百果備具國之富也工事無刻鏤女事無文章國之富也右五事分國以為五鄉鄉為之師分鄉以為五州州為之長分州以為十里里為之尉分里以為十游游為之宗十家為什五家為伍什伍皆有長焉築障塞匿匿隠一道路博出入審閭閈慎筦鍵筦藏于里尉置閭有司以時開閉閭有司觀出入者以復于里尉復白凡出入不時衣服不中圏屬羊豕之類也羣徒衆作役也不順於常者閭有司見之復無時若在長家子弟臣妾屬役賓客則里尉以譙于游宗游宗以譙于什伍什伍以譙于長家譙敬而勿復既譙能敬而從命無事可白則是教令行一再則宥三則不赦凡孝弟忠信賢良儁材若在長家子弟臣妾屬役賓客則什伍以復于游宗游宗以復于里尉里尉以復于州長州長以計于鄉師鄉師以著于士師凡過黨其在家屬及于長家其在長家及于什伍之長其在什伍之長及于游宗其在游宗及于里尉其在里尉及于州長其在州長及于鄉師其在鄉師及于士師三月一復六月一計十二月一著凡上賢不過等謂上賢雖才用絶倫無得過其勞鄒使能不兼官罰有罪不獨及罪必有首從及黨與也賞有功不專與孟春之朝君自聽朝論爵賞校官終五日季冬之夕君自聽朝論罰罪刑殺亦終五日正月之朔百吏在朝君乃出令布憲于國五鄉之師五屬大夫皆受憲于太史大朝之日五鄉之師五屬大夫皆身習憲于君前太史既布憲入籍于太府入籍者入取籍於太府也憲籍分于君前五鄉之師出朝遂于鄉官致于鄉屬及于游宗皆受憲憲所以察時令籍所以視功過憲既布乃反致令焉致令于君然後敢就舍憲未布令未致不敢就舍就舍謂之留令死罪不赦五屬大夫皆以行車朝出朝不敢就舍遂行至都之日五屬之都遂於廟致屬吏皆受憲憲既布乃發使者致令以布憲之日蚤晏之時憲既布使者以發然後敢就舍憲未布使者未發不敢就舍就舍謂之留令罪死不赦憲既布有不行憲者謂之不從令罪死不赦考憲而有不合于太府之籍者侈曰專制不足曰虧令罪死不赦首憲嵗朝之憲既布然後可以布憲憲謂月朝之憲右首憲凡將舉事令必先出曰事將為其賞罰之數必先明之立事者謹守令以行賞罰計事致令復賞罰之所加有不合于令之所謂者雖有功利則謂之專制罪死不赦首事既布然後可以舉事右首事修火憲敬山澤林藪積草夫財之所出以時禁發焉使民於宫室之用薪蒸之所積虞師之事也決水潦通溝瀆修障防安水藏使時水雖過度無害于五榖歳雖凶旱有所秎扶門反穫司空之事也相高下視肥墝觀地宜明詔期前後農夫以時鈞修焉使五榖桑麻皆安其處由田之事也行鄉里視宫室觀樹蓺簡六畜以時鈞修焉勸勉百姓使力作毋偷懷樂家室重去鄉里鄉師之事也論百工審時事辨功苦上完利監壹五鄉以時鈞修焉使刻鏤文采毋敢造于鄉工師之事也右省官度爵而制服量禄而用財飲食有量衣服有制宫室有度六畜人徒有數舟車陳器有禁脩生則有軒冕服位榖禄田宅之分死則有棺槨絞衾壙壟之度雖有賢身貴體毋其爵不敢服其服雖有富家多資毋其禄不敢用其財天子服文有章而夫人不敢以燕以饗廟將軍大夫以朝官吏以命士止于帶緣散民不敢服襍采百工商賈不得服長鬈求圓反貂刑餘戮民不敢服絻一本作絲不敢畜連乘車右服制寢兵之說勝則險阻不守言事者競陳寢兵其說見用而得勝則武術必偃雖有險阻不能守矣兼愛之說勝則士卒不戰兼愛之說勝則徐偃弱而行仁宋襄惑而慕古也全生之說勝則㢘恥不立全生之說勝則王孫自奉千金何侯日食一萬私議自貴之說勝則上令不行羣徒比周之說勝則賢不肖不分金玉貨財之說勝則爵服下流觀樂玩好之說勝則姦民在上位觀樂玩好之說勝則費仲以奉竒異而居顯位董賢以柔曼而處朝謁也請謁任舉之說勝則繩墨不正諂䛕飾過之說勝則巧佞者用右九敗期而致使而往百姓舍己以上為心者教之所期也始於不足見終於不可及一人服之萬人從之訓之所期也謂君將行令始獨發於心故不足見終則功成事遂故不可及也未之令而為未之使而往上不加勉而民自盡竭俗之所期也君既盡心於俗所以能期於心也好惡形於心百姓化於下罰未行而民畏恐賞未加而民勸勉誠信之所期也君之好惡纔形於心百姓已化於天下為而無害成而不議得而莫之能争天道之所期也君能奉順天道所以能期於此為之而成求之而得上之所欲小大必舉事之所期也令則行禁則止憲之所及俗之所被被合也謂俗與憲合如百體之從心政之所期也右七觀乘馬第五立國工大數士農商隂陽爵位務市事聖人失時地里經言五凡立國都非於大山之下必於廣川之上高毋近旱而水用足下毋近水而溝防省因天材就地利故城郭不必中規矩道路不必中凖繩右立國無為者帝為而無以為者王為而不貴者霸不自以為所貴則君道也貴而不過度則臣道也右大數地者政之本也政從地生朝者義之理也義因朝起市者貨之凖也市所以凖貨之輕重黄金者用之量也諸侯之地千乘之國者器之制也五者其理可知也為之有道地者政之本也是故地可以正政也地平可以正政地不平均和調則政不可正也不均平和調則地利或幾於息故不可不正也政不正則事不可理也春秋冬夏隂陽之推移也夏秋推陽以生隂冬春推隂以生陽時之短長隂陽之利用也必長短相摩然後成隂陽之用也日夜之易隂陽之化也晝熱夜寒交易其氣此隂陽之化也然則隂陽正矣雖不正有餘不可損不足不可益也假令時有盈縮不正則百六之運數當然也雖有堯湯之聖不能免之故不可損益也天地莫之能損益也天地亦凖隂陽不可損益也然則可以正政者地也故不可不正也正地者其實必正長亦正短赤正小亦正大亦正長短大小盡正正不正則官不理謂天地之正不正官不可得理官不理則事不治事不治則貨不多是故何以知貨之多也曰事治何以知事之治也曰貨多貨多事治則所求於天下者寡矣為之有道右隂陽按此釋地者政之本也朝者義之理也是故爵位正而民不怨民不怨則不亂然後義可理理不正則不可以治而不可不理也故一國之人不可以皆貴皆貴則事不成而國不利也皆貴則無為事者故事不成也為事之不成國之不利也使無貴者則民不能自理也是故辨於爵列之尊卑則知先後之序貴賤之義矣為之有道右爵位按此釋朝者義之理也市者貨之凖也是故百貨賤則百利不得謂不得過常之利也百利不得則百事治百事治則百用節矣是故事者生於慮謀慮則事生也成於務專務則事成也失於傲輕傲則失事也不慮則不生不務則不成不傲則不失故曰市者可以知治亂可以知多寡而不能為多寡為之有道右務市事按此釋市者貨之凖也黄金者用之量也辨於黄金之理則知侈儉知侈儉則百用節矣故儉則傷事侈則傷貨儉則金賤金賤則事不成故傷事侈則金貴金貴則貨賤故傷貨貨盡而後知不足是不知量也事已而後知貨之有餘是不知節也不知量不知節不可謂之有道天下乘馬服牛而任之輕重有制有壹宿之行一宿有定凖則百宿可知也道之逺近有數矣是知諸侯之地千乘之國者所以知地之小大也所以知任之輕重也重而後損之是不知任也輕而後益之是不知器也不知任不知器不可謂之有道地之不可食者山之無木者百而當一涸澤百而當一地之無草木者百而當一樊棘雜處民不得入焉百而當一藪鎌􅅶得入焉九而當一蔓山其木可以為材可以為軸斤斧得入焉九而當一汎山其木可以為棺可以為車斤斧得入焉十而當一流水網罟得入焉五而當一林其木可以為棺可以為車斤斧得入焉五而當一澤網罟得入焉五而當一命之曰地均以實數方六里命之曰暴五暴命之曰部五部命之曰聚聚者有市無市則民乏五聚命之曰某鄉四鄉命之曰方官制也官成而立邑五家而伍十家而連五連而暴五暴而長命之曰某鄉四鄉命之曰都邑制也邑成而制事四聚為一離五離為一制五制為一田二田為一夫三夫為一家事制也事成而制器方六里為一乘之地也一乘者四馬也一馬其甲七其蔽五蔽所以捍車馬四乘其甲二十有八其蔽二十白徒三十人奉車兩器制也方六里一乘之地也方一里九夫之田也黄金一鎰百乘一宿之盡也無金則用其絹季絹三十三三等其下者曰季制當一鎰無絹則用其布經暴布百兩當一鎰一鎰之金食百乘之一宿則所市之地六步一㪷一本作一升命之曰中歳有市無市則民不乏矣方六里名之曰社有邑焉名之曰央亦闗市之賦命出闗市之賦黄金百鎰為一篋其貨一榖籠為十篋其商茍在市者三十人其正月十二月黄金一鎰命之曰正分春曰書比立夏曰月程秋曰大稽與民數得亡三嵗修封五嵗修界十嵗更制經正也十仞見水不大潦大潦一本作大續繼也預貯水也五尺見水不大旱十一仞見水輕征征稅也十分去二三謂去十仞之二三二則去三四謂去十仞之三四四則去四謂去十仭之四五則去半比之于山五尺見水言平地五仞見水同於山五尺見水十分去一四則去三八尺曰仞分九仞則屈每分有二仞二尺去其三則餘有一丈八尺三則去二二則去一三尺而見水比之於澤績曰言地髙則難澇故曰十仞見水不大澇地低則難旱故曰五尺見水不大旱當澇之時若髙亢地十一仞見水則常征十分中免二三分十二仞見水則免三四分十四仞見水則免四分十五仞見水則免五分以其極髙難灌溉可以比於山也當旱之時若汙下地五尺見水則常征十分免四分四尺見水則免三分三尺見水則免二分二尺見水則免一分以其極低易灌溉可以比於澤也十分去一當作十分去四乃字之誤距國門以外窮四竟之内丈夫二犁童五尺一犂以為三日之功正月令農始作服于公田農耕及雪釋耕始焉芸卒焉士聞見博學意察而不為君臣者與功而不與分焉此人學以為君之臣也然以髙尚其事而不為若此者預食農收之功而不受力作之分也賈知賈之貴賤日至於市而不為官賈者與功而不與分焉工治容貌功能日至於市而不為官工者與功而不與分焉不可使而為工則視貨離之實而出夫粟是故智者知之愚者不知不可以教民教民必以有智者巧者能之拙者不能不可以教民教人為工必以巧者欲令愚智之人盡曉知之然後可以教人也非一令而民服之也不可以為大善非夫人能之也不可以為大功是故非誠賈不得食于賈非誠工不得食于工非誠農不得食于農非信士不得立于朝是故官虛而莫敢為之請君有珍車珍甲而莫之敢有君舉事臣不敢誣其所不能君知臣臣亦知君知己也故臣莫敢不竭力俱操其誠以來道曰均地分力使民知時也民乃知時日之蚤晏日月之不足飢寒之至于身也是故夜寢蚤起父子兄弟不忘其功為而不倦民不憚勞苦故不均之為惡也地利不可竭民力不可殫不告之以時而民不知不道之以事而民不為與之分貨則民知得正矣審其分則民盡力矣是故不使而父子兄弟不忘其功右士農工商按此篇言均地立制定賦之法率民盡地力終之以人君出令之事末又言均地分力使民知時為下三節之綱謂之士農工商不知何說聖人之所以為聖人者善分民也善令人知分故名為聖人聖人不能分民則猶百姓也於己不足安得名聖不能令人知分則己尚不足何名為聖人是故有事則用用謂人也無事則歸之於民謂令人退歸而居也唯聖人為善託業於民謂託人以成功業也民之生也辟則愚縱其淫辟則昏愚也閉則類類善也閉其淫辟則自善上為一下為二下之效上必倍之也右聖人按此釋上分力時之處事精矣不可藏而舍也時至則為之不可藏而捨息也故曰今日不為明日亡貨言不為則失時昔之日已往而不來矣言日既往不還來也右失時按此釋上使民知時上地方八十里萬室之國一千室之都四中地方百里萬室之國一千室之都四下地方百二十里萬室之國一千室之都四以上地方八十里與下地方百二十里通於中地方百里右地里按此釋上均地管子卷一欽定四庫全書管子卷二
