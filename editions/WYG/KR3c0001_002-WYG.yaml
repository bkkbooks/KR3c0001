body:
  text: 唐房𤣥齡注七法第六謂則象法化決塞心術計數經言六言是而不能立言非而不能廢謂之是不能立其人而用之謂之非不能廢其人而退之有功而不能賞有罪而不能誅若是而能治民者未之有也是必立非必廢有功必賞有罪必誅若是安治矣未也能此四者可以安治矣而猶未者則以未具下事故是何也曰形勢器械未具猶之不治也形勢器械具四者備治矣四者備謂立是廢非賞功誅罪不能治其民而能彊其兵者未之有也能治民然後能彊兵能治其民矣而不明于為兵之數猶之不可雖能治民而欲彊兵必明於為兵之數然後可不能彊其兵而能必勝敵國者未之有也能彊其兵而不明于勝敵國之理猶之不勝也雖能彊兵其欲勝敵國必須明審其理理之不明猶是不勝也兵不必勝敵國而能正天下者未之有也兵必勝敵國矣而不明正天下之分猶之不可故曰治民有器為兵有數勝敵國有理正天下有分器數理分即下之七法也則象法化決塞心術計數此七法之目也根天地之氣寒暑之和水土之性人民鳥獸草木之生物雖不甚多皆均有焉而未嘗變也謂之則根元也生萬物者天地之元氣也義也名也時也似也類也比也狀也謂之象義者所以合宜也名者所以命事也時者名有所當也似類比狀謂立法者必有所倣傚不徒然也尺寸也繩墨也規矩也衡石也斗斛也角量也謂之法角亦器量之名凡此十二事皆立政者所以為法也漸也順也靡也久也服也習也謂之化漸謂革物當以漸也順也靡也謂物順教而風靡也久也服也習也謂人習服教命之久予奪也險易也利害也難易也開閉也殺生也謂之決塞凡此十二事皆為政者所以決斷而窒塞也實也誠也厚也施也度也恕也謂之心術凡此六者皆自心術生也剛柔也輕重也大小也實虚也逺近也多少也謂之計數凡此十二事必計之以知其數也不明於則而欲出號令明則然後可以出號令猶立朝夕於運均之上擔竿而欲定其末均陶者之輪也立朝夕所以正東西也今均既運則東西不可凖也擔舉也夫欲定末者必先静其本今既舉竿之本其末不定也不明於象而欲論材審用猶絶長以為短續短以為長鶴脛非所斷鳬脛非所續也不明於法而欲治民一衆猶左書而右息之息止也左手為書右手從而止之則無時成書矣不明於化而欲變俗易教猶朝揉輪而夕欲乘車不明於決塞而欲敺衆移民猶使水逆流不明於心術而欲行令於人猶倍招而必拘之物有倍叛而招之者必有以慰恱之令其感服今反拘留之則彼逾叛矣不明於計數而欲舉大事猶無舟檝而欲經於水險也故曰錯儀畫制不知則不可論材審用不知象不可和民一衆不知法不可變俗易教不知化不可敺衆移民不知決塞不可布令必行不知心術不可舉事必成不知計數不可右七法百匿傷上威百百官也言百官皆匿情為私則上威傷姦吏傷官法姦民傷俗教賊盜傷國衆盜賊之人常欲損敗於物也威傷則重在下君威傷則臣反得尊重法傷則貨上流教傷則從令者不輯衆傷則百姓不安其居重在下則令不行貨上流則官徒毁官者既不以德進但以貨成故官徒毁徒事也從令者不輯則百事無功百姓不安其居則輕民處而重民散輕民謂為盜者用盗致富故處重民謂務農者為盜破産故散輕民處重民散則地不辟地不辟則六畜不育六畜不育則國貧而用不足國貧而用不足則兵弱而士不厲兵弱而士不厲厲奮也則戰不勝而守不固戰不勝而守不固則國不安矣故曰常令不審則百匿勝官爵不審則姦吏勝符籍不審則姦民勝刑法不審則盜賊勝國之四經敗人君泄見危謂常令官爵符籍刑法四者為政之經四者既敗則是君泄其事君泄其事則其位危矣人君泄則言實之士不進言實之士不進則國之情偽不竭于上下皆隠實言虚則是國情不竭于上世主所貴者實也所親者戚也所愛者民也所重者爵禄也亡君則不然致所貴非實也致所親非戚也致所愛非民也致所重非爵禄也故不為重寳虧其命故曰令貴於寳重寳而全命則當弃是令貴於寳不為愛親危其社稷故曰社稷戚於親社稷者身之存亡故弃親而存社稷不為愛人枉其法故曰法愛於人法者崇替所由故弃所愛而存其法不為重禄爵分其威故曰威重于爵禄威者人君所以服海内必不得已寧㪚爵禄不可分威也不通此四者則反於無有不達於四者國非其國故曰反於無有故曰治人如治水潦治水潦者必峻其隄防也養人如養六畜養六畜者必致其閑卑堅其羈絆用人如用草木用草木者時入山林輪轅不失其宜樵蘇各得其所居身論道行理則羣臣服教百吏嚴斷莫敢開私焉君之於民其猶居身治之養之用之三者各得其宜論道而行理則無私不服也論功計勞未嘗失法律也便辟左右大族尊貴大臣不得増其功焉疏逺卑賤隠不知之人不忘其勞故有罪者不怨上罪得其人故不怨愛賞者無貪心賞不踰等故息其貪也則列陳之士皆輕其死而安難以要上事賞罰不濫則立功要功之士知其不誣故競而為之本兵之極也為兵之本其極要者在於明賞罰也右四傷百匿為兵之數存乎聚財而財無敵存謂專立意存之君無財士不來故存意於聚財則彼國之財不能敵也存乎論工而工無敵工者所以造軍之器用者也存乎制器而器無敵器謂兵器存乎選士而士無敵存乎政教而政教無敵政教軍中號令存乎服習而服習無敵服便也謂便習武藝存乎徧知天下而徧知天下無敵徧知天下謂徧知其地形險易主將工拙士卒勇怯存乎明於機數而明於機數無敵機者發内而動外為近而成逺不疾而速不行而至見其為之不知其所以為有數存焉於其間故曰機數也故兵未出境而無敵者八是以欲正天下財不蓋天下不能正天下財謂貨財不能葢天下則無以正天下也財葢天下而工不蓋天下不能正天下工蓋天下而器不蓋天下不能正天下財雖葢天下而工與器不能葢則無以正天下餘皆倣此器蓋天下而士不蓋天下不能正天下士蓋天下而教不蓋天下不能正天下教蓋天下而習不蓋天下不能正天下習蓋天下而不徧知天下不能正天下徧知天下而不明於機數不能正天下故明於機數者用兵之勢也大者時也小者計也王者征伐能立大功者在於合天時也至小者捷勝亦在人計謀也王道非廢也而天下莫敢窺者王者之正也大寳之位神器也古今所共傳非有蹔廢而天下莫敢窺窬者以王者當樂推之運應天人之正衡庫者天子之禮也衡者所以平輕重庫者所以藏寳物不令外知者也言王者用心常當凖平天下既知輕重審用於心無令長耳目者所得此則天子之禮然也是故器成卒選則士知勝矣選謂簡其精練徧知天下審御機數則獨行而無敵矣所愛之國而獨利之所惡之國而獨害之則令行禁止是以聖王貴之貴謂貴兵勝一而服百則天下畏之矣立少而觀多則天下懷之矣立少謂興亡國雖少天下共觀之故曰觀多桓公救邢遷衛用此術也或曰觀當為勸罰有罪賞有功則天下從之矣故聚天下之精財論百工之銳器春秋角試以練精銳為右右上也成器不課不用不試不藏兵器雖成未經課試則不用不藏收天下之豪傑有天下之駿雄故舉之如飛鳥動之如雷電發之如風雨莫當其前莫害其後獨出獨入莫敢禁圉成功立事必順於禮義故不禮不勝天下不義不勝人故賢知之君必立於勝地故正天下而莫之敢御也右為兵之數若夫曲制時舉不失天時制雖委曲順天而舉不失天時也毋壙地利其數多少其要必出於計數壙空也天之所覆空地謂山河陂澤所以營作而興利者也必計數其多少之要然後度材而用之故凡攻伐之為道也計必先定于内然後兵出乎境計未定于内而兵出乎境是則戰之自勝攻之自毁也自勝謂自勝於己其敗可知也是故張軍而不能戰圍邑而不能攻得地而不能實三者見一焉則可破毁也故不明于敵人之政不能加也不明敵故未可加兵不明于敵人之情不可約也不明敵情未可約士約誓不明于敵人之將不先軍也不明于敵人之士不先陣也是故以衆撃寡以治撃亂以富擊貧以能撃不能以教卒練士撃敺衆白徒白徒謂不練之卒無武藝故十戰十勝百戰百勝故事無備兵無主則不蚤知既無備無主故敵來攻不能先知之野不辟地無吏則無蓄積官無常下怨上而器械不功功謂堅利朝無政則賞罰不明賞罰不明則民幸生僥倖以偷生也故蚤知敵人如獨行蚤知敵人則有以備之敵人望風自退故曰獨行也有蓄積則久而不匱器械功則伐而不費賞罰明則人不幸人不幸則勇士勸之故兵也者審於地圖謀十官地圗謂敵國險易之形軍之部置十官必伍什則有長故曰十官又須謀得其人也日量蓄積齊勇士徧知天下審御機數兵主之事也故有風雨之行故能不逺道里矣行疾如風雨故不以道里為逺有飛鳥之舉故能不險山河矣輕捷如飛鳥故不以山河為險有雷電之戰故能獨行而無敵矣雷電天之威怒故莫敢為敵有水旱之功故能攻國救邑謂其功可以為彼水旱有金城之守故能定宗廟育男女矣有一體之治故能出號令明憲法矣謂上下同心其猶一體風雨之行者速也飛鳥之舉者輕也雷電之戰者士不齊也懼雷電之威故彼士不齊水旱之功者野不收耕不穫也能令彼有水旱故不得使收穫也金城之守者用貨財設耳目也貨財所以養敢死之士耳目所以聽鄰國之動静令必知之一體之治者去竒說禁雕俗也竒說謂譎誑之言雕俗謂浮偽之俗不逺道里故能威絶域之民不險山河故能服恃固之國獨行無敵故令行而禁止故攻國救邑不恃權與之國故所指必聽雖有權與之國不顧而恃之權與謂權為親與也定宗廟育男女天下莫之能傷然後可以有國制儀法出號令莫不嚮應然後可以治民一衆矣右選陳版法第七選擇政要載之於版以為常法經言七凡將立事立經國之事正彼天植謂順天道以種植必令得其正風雨無違君道不虧則風雨無違也逺近髙下各得其嗣髙下猶多少也謂君之賦稅因其逺近之别以多少之差輕重合宜故可嗣之以常行嗣續也三經既飭君乃有國三經謂上天植風雨髙下也是三者既以飭整故君可以有國也喜無以賞怒無以殺喜以賞怒以殺怨乃起令乃廢驟令不行民心乃外有外叛之心也外之有徒禍乃始牙徒謂黨與也外叛者有黨與禍由是生故曰始牙衆之所忿置不能圗衆忿難犯故必置之誰能圗之舉所美必觀其所終凡人之情靡不有初鮮克有終故須觀之廢所惡必計其所窮蜂蠆有毒故必計其所窮知困獸猶鬬其所終將何為也慶勉敦敬以顯之人有敦敬則慶勉以顯之也富禄有功以勸之人之有功則富禄以勸之爵貴有名以休之賢者有名則爵貴以休之兼愛無遺是謂君心必先順教萬民鄉風上之敦敬有功名之士必爵禄順而與之所以教之急也如此則民鄉風而從化旦暮利之衆乃勝任有功名之士既旦暮得利衆自厲而勝任取人以己成事以質將欲取人必先審己才略能用彼不質謂凖的將欲成事必先立其凖的事不違質然後為善審用財慎施報察稱量故用財不可以嗇用力不可以苦用財嗇則費嗇于用財不以賞賜則立功之士懈怠敵人來侵其費更多嗇恡用力苦則勞民不足令乃辱民不足則令不行故辱也民苦殃令不行施報不得禍乃始昌禍昌不寤民乃自圗謀為叛己正法直度罪殺不赦夫正直之法度罪殺有過終不免赦殺僇必信民畏而懼武威既明令不再行頓卒怠倦以辱之頓卒猶困苦其有怠倦不勤則困苦以辱罰罪有過以懲之殺僇犯禁以振之植固不動倚邪乃恐言執法者必當深植而固守則不可動移若乃頓倚而邪則法亂而身危故可恐也倚革邪化令往民移既能正倚化邪歸於正直如此化出令纔往則民移法天合德天之資始無有私德象地無親地之資生無所親私㕘於日月日月無私耀也伍於四時賞以春夏刑以秋冬恱在施有將恱於下在於施無令有衆在廢私將欲齊衆在於廢私召逺在修近修近則逺者至閉禍在除怨除怨則禍端塞修長在乎任賢任賢則國祚長髙安在乎同利與下同利則髙位安管子卷二
