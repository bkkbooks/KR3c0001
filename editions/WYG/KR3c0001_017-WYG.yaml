body:
  text: 管子卷十七唐房𤣥齡注七臣七主第五十二襍篇三或以平虚請論七主之過謂平意虚心也七主據下唯有六者皆過主能無此六者過則為一是主也過主六是主一故曰七主也得六過一是以還自鏡以知得失得六過則為一是以自鑒得失可知也以繩七臣得六過一是嗚呼美哉成事疾疾美也繩謂彈正也言以六過繩七臣令臣無六過是故為一君臣咸有一德故能成美也申主任勢守數以為常申謂陳用法令周聽近逺以續明逺近之事周而聽之則其明不絶皆要審則法令固賞罰必則下服度事皆得要而詳審則法令固賞罰必而下皆服其法度也不備待而得和則民反素也謂以道德理世之君至仁感物德和自此而至故人皆反於朴素今中主不能然故以為過也惠主豐賞厚賜以竭藏赦姦縱過以傷法藏竭則主權衰法傷則姦門闓故曰泰則反敗矣謂為惠太過故反成敗也侵主好惡反法以自傷越法行事謂之侵所好所惡皆反於法故自傷喜決難知以塞明決難知則理不當故明塞也從狙而好小察狙伺也謂旣任臣有所為必從而伺之事無常而法令申不􅀈則國失勢􅀈古伍字謂偶合也言雖申布法令於事不合法旣不行所以失勢也芒主目伸五色耳常五聲芒謂芒然不曉識之貌伸謂放恣也四鄰不計四鄰與己為隟不計度而知之也司聲不聽司聲之官隨君所好不為聽其理亂之音也則臣下恣行而國權大傾不􅀈則所惡及身所為旣不合理故惡還及身勞主不明分職上下相干言失任臣之理勞而無功故曰勞主臣主同則刑振以豐豐振以刻臣主同勢則俱奮威權故刑罰大振而且豐多刑豐而又妄振非刻而何也去之而亂臨之而殆則後世何得權臣振主君欲去之必為亂任而臨之必危殆旣亂且危敗亡必及故後代無得也振主喜怒無度嚴誅無赦動發威嚴謂之振也臣下振怒不知所錯則人反其故故為先君之理不􅀈則法數日衰而國失固舉措旣不合理故數衰而國失固芒主通人情以質疑故臣下無信盡自治其事則事多旣不自曉故下通人情以問所疑則臣下無所取信皆自任胷臆以理其事人人生事故事多也多則昬昬則緩急俱植植立也旣昬而不明故緩急之事俱可立不􅀈則見所不善所為旣不合理故其所見之事皆不善餘力自失而罰尚有執權餘力已不自責乃遷怒而罰之故主虞而安虞度也主能度冝而行故安但主能度而安則致下數事吏肅而嚴民樸而親官無邪吏朝無姦臣下無侵爭世無刑民凡此皆主虞而安故也故一人之治亂在其心在其心之邪正一國之存亡在其主在其主之智愚天下得失道一人出道從也一人為主也明主得閽主失主好本則民好墾草萊本謂農桑也主好貨則人賈市主好宫室則工匠巧主好文采則女工靡夫楚王好小􅆎而美人省食吳王好劒而國士輕死死與不食者天下之所共惡也然而為之者何也從主之所欲也而况愉樂音聲之化乎夫男不田女不緇緇謂黒繒工技力於無用謂勤力於無用之器物也而欲土地之毛毛謂嘉苗倉庫滿實不可得也土地不毛則人不足人不足則逆氣生不足則怨怒故逆上之氣生逆氣生則令不行然彊敵發而起雖善者不能存謂善為計謀何以効其然也曰昔者桀紂是也誅賢忠近讒賊之士而貴婦人好殺而不勇好富而忘貧馳獵無窮鼓樂無厭瑶臺玉餔不足處玉餔猶玉食馳車千駟不足乘材女樂三千人謂有材能之女樂也鐘石絲竹之音不絶百姓罷乏君子無死言不為君致死卒莫有人人有反心遇周武王遂為周氏之禽為周所禽獲也此營於物而失其情者也物謂臺榭車音所為侈靡者愉於淫樂而忘後患者也故設用無度國家踣踣謂散亡舉亊不時必受其菑夫倉庫非虚空也必侈費無度故空商宦非虚壞也必弃本逐末故壞也法令非虚亂也必上替下陵故亂國家非虚亡也必倒道背理故亡也彼時有春秋嵗有敗凶政有急緩政有急緩故物有輕重政急物輕政緩物重嵗有敗凶故民有義不足嵗旣敗凶雖有義事不足以行其禮時有春秋故榖有貴賤春榖貴秋榖賤而上不調淫故游商得以什伯其本也淫過也謂榖物過於貴賤則上當収散以調之此之不為故游商得什伯之贏以弃其本也百姓之不田貧富之不訾皆用此作訾限也皆從不調淫而作也城郭不守兵士不用皆道此始道從夫亡國踣家者非無壤土也其所事者非其功也夫凶嵗雷旱非無雨露也其燥濕非其時也亂世煩政非無法令也其所誅賞者非其人也暴主迷君非無心腹也其所取舍非其術也故明主有六務四禁六務者何也一曰節用二曰賢佐三曰法度四曰必誅五曰天時六曰地宜四禁者何也春無殺伐無割大陵割謂掘徙之也倮大衍倮謂焚燒令蕩然俱盡伐大木斬大山行大火誅大臣収榖賦凡此春之禁也夏無遏水達名川謂偃塞小水合大水塞大谷動土功射鳥獸凡此夏之禁秋無赦過釋罪緩刑冬無賦爵賞禄傷伐五榖五榖之藏故春政不禁則百長不生夏政不禁則五榖不成秋政不禁則姦邪不勝冬政不禁則地氣不藏四者俱犯則隂陽不和風雨不時大水漂州流邑漂流謂滿溢於隄防故漂流城邑大風漂屋折樹火暴焚地燋草旱甚則草燋天冬雷地冬霆霆震草木夏落而秋榮蟄蟲不藏宜死者生宜蟄者鳴苴多螣蟇苴謂草之翳薈山多蟲􅀢􅀢即蚉六畜不蕃民多夭死國貧法亂逆氣下生故曰臺榭相望者亡國之廡也馳車充國者追寇之馬也追猶召也言馳車所以召寇羽劒珠飾者斬生之斧也文采纂組者燔功之窑也明王知其然故逺而不近也能去此取彼則人主道備矣此謂珠飾等物彼謂節用愛民夫法者所以興功懼暴也律者所以定分止爭也令者所以令人知事也法律政令者吏民規矩繩墨也夫矩不正不可以求方繩不信音申不可以求直法令者君臣之所共立也權勢者人主之所獨守也故人主失守則危臣吏失守則亂罪決於吏則治有罪者吏必能決決之故理權斷於主則威民信其法則親是故明王審法愼權下上有分下愼罰上執權各有其分也夫凡私之所起必生於主主不好本則私生夫上好本則端正之士在前本謂道德之政上好利則毁譽之士在側好利則傾巧故毁譽之士在側上多喜善賞不隨其功則士不為用雖曰好善及其有功則不能賞故曰士不為用數出重法而不克其罪則姦不為止克為勝伏明王知其然故見必然之政立必勝之罰故民知所必就而知所必去推則往召則來如墜重於髙如瀆水於地以譬招來之易也故法不煩而吏不勞民無犯禁故有百姓無怨於上上亦法臣法言亦為臣立法斷名決無誹譽依名而斷決則理當而事愜故無誹譽故君法則主位安臣法則貨賂止而民無姦嗚呼美哉名斷言澤依名而斷則其言順而澤飾臣克親貴以為名虚名求實之飾克勝也謂不求親貴以自克勝特此為名恬爵禄以為髙佯弃爵禄以自安恬以此為髙好名則無實美名外揚内實必䘮為髙則不御恬爵禄者君不能御也故記曰無實則無勢勢必以實生失轡則馬焉制制馬必以轡制臣必以禄侵臣亊小察以折法令枉法行事謂之侵好佼反而行私請佼謂佷詐也背理為反故私道行則法度侵不侵法度則無以成其私刑法繁則姦不禁主嚴誅則失民心亂臣多造鐘鼔衆飾婦女以惽上故上惽則隟不計而司聲直禄上既惽暗雖有危亡之隟不能計度而知之其司聲之官直得禄而已不憂其職務也是以諂臣貴而法臣賤此之謂微孤諂貴法賤則危亡日至故其君衰微而孤獨愚臣深罪厚罰以為行深文入罪厚致其罰此愚臣之行重賦斂多兊道以為上兊恱也謂多賦斂以恱道於君使身見憎而主受其謗厚罰多斂人必憎之故記稱之曰愚忠讒賊此之謂也愚臣雖有忠於主乃比之讒賊姦臣痛言人情以驚主痛甚極之辭開罪黨以為讎開引罪黨上聞於君與之為讎除讎則罪不辜彼但讎耳未必皆有罪今而除之則罪不辜之人也罪不辜則與讎居旣殺不辜則人皆讎已故所與居者莫非讎也故善言可惡以自信而主失親好言可惡之事以告於君此求君之信己也君果信之則失其所親也亂臣自為辭功禄明為下請厚賞己有功當得禄則佯辭之以為名其下未必當賞則明然為之請以求衆心也居為非母動為善棟其居也與衆非者為母其動也與佯為善者為棟梁也以非買名以是傷上其所以買名者用非道雖曰為之必傷於上而衆人不知之謂微攻言為偽善漸攻於君禁藏第五十三襍篇四禁藏於胷脅之内而禍避於萬里之外能以此制彼者唯能以已知人者也言度己以察彼則無隠情故姦謀藏於胷脅姦藏禍息故逺避於萬里之外彼不能興姦生禍則我能制之凢此皆以已知人故也夫冬日之不濫非愛冰也濫謂泛冰於水以求寒所謂濫漿夏日之不煬非愛火也為不適於身便於體也冬之水夏之火皆於身體不適便夫明王不美宫室非喜小也不聽鐘鼔非惡樂也為其傷於本事而妨於教也美宫室聽鐘鼔則傷事而妨教故先慎於己而後彼官亦慎内而後外内則本務外則末業君慎之則臣効民亦務本而去末官慎之則民効也居民於其所樂居其所樂則敦土而不遷事之於其所利事其所利則不勸而自勵賞之於其所善賞其所善則皆悦而立功罰之於其所惡罰其所惡則忌慎而無犯信之於其所餘財君人者莫不有餘財期賞而必故曰信功之於其所無誅必勝殘息誅然後可以為成功於下無誅者必誅者也有罪必誅故能息所謂以刑止刑以殺止殺也有誅者不必誅者也有罪不必誅故誅不息也以有刑至無刑者其法易而民全刑兹無赦人不敢犯故曰以有刑至無刑若此者其法簡易而民完全以無刑至有刑者其刑煩而姦多緩誅宥死人則輕而犯之故曰無刑至有刑若此者其刑繁漫而姦人多夫先易者後難無刑至有刑故曰先易而後難先難而後易有刑至無刑故曰先難而後易萬物盡然皆同之於用法明王知其然故必誅而不赦必賞而不遷者非喜予而樂其殺也所以為人致利除害也賞不遷非喜與誅不赦非樂殺然必其誅賞則為人致利除害故也於以養老長弱完活萬民莫明焉言養老活人無明於必誅賞夫不法法則治言不法者必以法正之故治法者天下之儀也儀謂表也所以决疑而明是非也百姓所縣命也刑罰一差人無所措手足故曰縣命故明王愼之不為親戚故貴易其法故謂恩舊吏不敢以長官威嚴危其命危謂毁敗民不以珠玉重寳犯其禁所謂君無欲焉雖賞之不竊故主上視法嚴於親戚不為親戚易法故法嚴吏之舉令敬於師長不為師長危令故令敬也民之承教重於神寳不為重寳犯禁故教重夫寳有靈故曰神寶故法立而不用刑設而不行也無犯之人則無所用其刑法夫施功而不鈞位雖髙為用者少施功謂施恩於有功者施恩不均則有功者怨故雖有髙位人不為用赦罪而不一德雖厚不譽者多赦罪不一則毒流不辜雖有厚德人誰譽之舉事而不時力雖盡其功不成方冬植禾雖勤似后稷不能成其嘉苗刑賞不當斷斬雖多其暴不禁夫公之所加罪雖重下無怨氣私之所加賞雖多士不為歡行法不道衆民不能順有道之人必順於道舉錯不當衆民不能成衆尚不成况無衆乎不攻不備夫設備者必防攻也當今為愚人故聖人之制事也能節宫室適車輿以實藏不費於宫室車與則庫藏自實也則國必富位必尊能適衣服去玩好以奉本木謂農桑而用必贍身必安矣能移無益之事無補之費通幣行禮而黨必多交必親矣移無益無補之費而行禮故黨多交親也夫衆人多營於物而苦其力勞其心故困而不贍營物過分故勞而不贍大者以失其國小者以危其身凡人之情得所欲則樂逢所惡則憂此貴賤之所同有也近之不能勿欲謂所好之物逺之不能勿忘人情皆然而好惡不同各行所欲各以所欲行之而安危異焉適理而欲則安背理而欲則危然後賢不肖之形見也夫物有多寡而情不能等賢者欲寡不肖者欲多也事有成敗而意不能同賢者意多成不肖者意多敗也行有進退而力不能兩也賢者能進不肖者唯退也故立身於中謂多寡成敗進退之中也養有節宫室足以避燥濕食飲足以和血氣衣服足以適寒温禮儀足以别貴賤游虞足以發歡欣棺槨足以朽骨衣衾足以朽肉墳墓足以道記道識其處各有記也不作無補之功雖曰有功於身無補不為無益之事故意定而不營氣情氣情不營則耳目榖穀善也謂聰明不虧衣食足耳目榖衣食足則侵爭不生怨怒無有上下相親兵刃不用矣故適身行義儉約恭敬其唯無福禍亦不來矣禍福兩無乃善之至驕傲侈泰離度絶理其唯無禍福亦不至矣禍福兩有乃禍之至是故君子上觀絕理者以自恐也觀絶理者致禍故恐下觀不及者以自隱也隱度也度己有不及之事當效之也故曰譽不虚出必出於行善而患不獨生必生於為惡福不擇家雖賤家行善福亦來矣禍不索人雖貴人行惡禍亦至矣此之謂也凡此欲令修己以致福無恃貴以招禍能以所聞瞻察則事必明矣謂耳所聞目所瞻皆能審察其是非如此則無事不明矣故凡治亂之情皆道上始道從也事明則理反是則亂也故善者圉之以害牽之以利有害則圉有利則牽能利害者財多而過寡矣利害由己則避害而取利取利則財多避害故遇寡矣夫凡人之情見利莫能勿就見害莫能勿避其商人通賈倍道兼行夜以續日千里而不逺者利在前也疾至則得利故速行而不倦也漁人之入海海深萬仞就彼逆流謂海潮起則水逆流乘危百里宿夜不出者利在水也故利之所在雖千仞之山無所不上深源之下無所不入焉故善者勢利之在而民自美安勢利在身則人美而安之不推而往不引而來不煩不擾而民自富凡此皆勢利之所致如鳥之覆卵無形無聲而唯見其成夫勢利致人若鳥之覆卵焉雖無形聲俄見其成也夫為國之本得天之時而為經經所以本之也得人之心而為紀紀所以總之也法令為維綱維綱所以張也吏為網罟網罟所以苞之什伍以為行列行列所以關具之也賞誅為文武賞則文誅則武繕農具當器械農其旣繕則器械可修也耕農當攻戰耕農之不怠若攻戰之不退也推引銚耨以當劎㦸用銚耨者必推引之若劒㦸撃刺被蓑以當鎧鑐蓑雨衣被著之所以禦雨露若武備之有鎧鑐著甲周身若褐炙故曰鑐葅笠以當盾櫓取葅澤草以為笠若武備之有盾櫓也故耕器具則戰器備其耕器則備戰用也農事習則功戰巧矣習農則當功戰當春三月萩室熯造熯謂以火乾也三月之時陽氣盛發易生温疫楸木鬱臭以辟毒氣故燒之於新造之室以禳祓也鑚燧易火杼井易水所以去兹毒也四時易火至春則取榆柳之火春時之井又當復杼之以易其水凡此皆去時滋長之毒舉春祭塞久禱以魚為牲以蘖為酒相召久禱而永報者當享塞之相召謂因此時召親賓所以屬親戚也毋殺畜生毋拊卵拊謂擊剥之也毋伐木毋夭英英謂草木之初生也毋拊竿竽笋之初生也所息百長也所以息生百物之長賜鰥寡振孤獨貸無種與無賦所以勸弱民謂勸勉貧弱之人也發五正正謂五官正也赦薄罪出拘民解仇讎仇讎者和讎令反去所以建時功施生榖也謂及時立農功施力為生榖凡此皆春令夏賞五德五德謂五常之德滿爵禄遷官位禮孝弟復賢力所以勸功也賢而有功賞復除之此皆夏令秋行五刑誅大罪所以禁淫邪止盜賊凡此皆秋令冬収五藏五榖之藏最萬物最聚所以内作民也凡此皆冬令四時事備而民功百倍矣於四時事皆備故人有百倍之功故春仁夏忠秋急冬閉生者仁也長者忠也収當急也藏當閉也順天之時約地之宜忠人之和忠猶稱也事稱人理則和故風雨時五榖實草木美多六畜蕃息國富兵彊民材而令行人多材藝而順上命故令行也内無煩擾之政外無彊敵之患也夫動静順然後和也不失其時然後富不失其法然後治故國不虚富必不失財然後富也民不虚治必不失法然後治不治而昌不亂而亡者自古至今未嘗有也昌必國理亡必國亂反是者古今所未有故國多私勇者其兵弱私勇則怯於公戰故弱吏多私智者其法亂私智則營已而背公故多亂民多私利者其國貧私則利積於家故國貧故德莫若博厚使民死之博厚則感人深故死之也賞罰莫若必成使民信之夫善牧民者非以城郭也輔之以什司之以伍謂什長伍長伍無非其人雖伍長亦選能者為之也人無非其里謂無客寄里無非其家言不離居他人家故奔亡者無所匿遷徙者無所容有什伍司之不容他寄也不求而約不召而來亡徙無所容匿故不求召而自來故民無流亡之意吏無備追之憂人説不亡何所備而追之故主政可往於民民心可繋於主謂繋屬於主夫法之制民也猶陶之於埴冶之於金也人之從法若埴金之從陶冶也故審利害之所在民之去就如火之於燥濕水之於髙下火水之就燥下猶人之就利夫民之所生衣與食也食之所生水與土也所以富民有要食民有率率三十畝而足於卒歳歳兼美惡畝取一石則人有三十石果蓏素食當十石果蓏不以火化而食故曰素食糠粃六畜當十石則人有五十石布帛麻絲旁入奇利未在其中也奇餘言不在五十石之中也故國有餘藏民有餘食毎年人有五十石故藏皆餘也夫叙鈞者所以多寡也叙鈞謂叙比其均平權衡者所以視重輕也戸籍田結者所以知貧富之不訾也謂毎戸置籍毎田結其多少則貧富不依訾限者可知也故善者必先知其田乃知其人田多則人多田少則人少田備然後民可足也凡有天下者以情伐者帝謂深知敵之内情而伐者帝也以事伐者王見其於事有失而伐者王以政伐者霸見其政有失而伐者霸而謀有功者五謂計謀可以成功一曰視其所愛以分其威令敵國之所愛者各權則其威分也一人兩心其内必衰也威分則毎人各懷二心心二則力不齊故内衰也臣不用其國可危臣旣不為君用力故其國可危二曰視其隂所憎厚其貨賂得情可深視敵所憎者多與賂令以國情告已故深得其情身内情外其國可知謂所憎者身在國内情乃告外其國可知也三曰聽其淫樂以廣其心使之聽淫樂心廣於嗜欲遺以竽瑟美人以塞其内躭於竽瑟美女則心惑亂故其内閉塞也遺以諂臣文馬以蔽其外耳惑於諂臣目惑於文馬則耳目喪矣故其外蔽也外内蔽塞可以成敗内外蔽塞則理擁而見惑故莫不敗四曰必深親之如典之同生典常也若常與之同生也隂内辯士使圖其計私俠辯士令與敵國圖計内勇士使髙其氣彼得勇士則恃而氣髙也内人他國使倍其約絶其使拂其意更納人於他國令背絶使兩國之意相違也是必士鬭兩國相敵必承其弊亦旣相疑其士必鬬兩國敵則小傷大國以承其弊乃有一舉兩獲之功也五曰深察其謀欲知其謀得失也謹其忠臣欲知其臣之用不揆其所使欲知其所使賢不肖令内不信使有離意内旣不信相疑則使其君臣之意絶離氣不能令必内自賊君臣意離别不可使令旣不命則自相殘殺忠臣已死故政可奪人之云亡邦國殄瘁故其政可奪此五者謀功之道也管子卷十七
