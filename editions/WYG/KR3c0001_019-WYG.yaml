body:
  text: 管子卷十九唐房𤣥齡注地員第五十八地員者土地髙下水泉深淺各有其位襍篇九夫管仲之匡天下也其施七尺施者大尺之名也其長十尺瀆田悉徙瀆田謂穿溝瀆而漑田悉徙謂其地毎年皆須更易也五種無不宜其立后而手實謂立君以主之手常握此地之實數也其木宜蚖菕與杜松蚖菕二木名也其草宜楚棘見是土也命之曰五施五七三十五尺而至於泉謂其地深五施毎施七尺故五七三十五而至於泉也呼音中角謂此地號呼之聲其音中角其水倉其民彊赤壚歴彊肥歴疎也彊堅也五種無不宜其麻白其布黄其草宜白茅與雚其木宜赤棠見是土也命之曰四施四七二十八尺而至於泉呼音中商其水白而甘其民壽黃唐無宜也唐虛脆也唯宜黍秫也宜縣澤常宜縣注而澤行廧音牆落土旣虚脆不堪版築故為行廧及籬落也地潤數毁難以立邑置廧其地遇潤則數頽毁故不可立邑置廧也其草宜黍秫與茅其木宜櫄擾桑櫄木名擾柔又曰柔桑也見是土也命之曰三施三七二十一尺而至於泉呼音中宫其泉黃而糗流徙謂水糗糒之氣其泉居地中而流故曰流徙也斥埴宜大菽與麥其草宜萯雚其木宜杞杞木名也見是土也命之曰再施二七十四尺而至於泉呼音中羽其泉鹹水流徙黒埴宜稻麥其草宜苹蓨苹蓨草名也其木宜白棠見是土也命之曰一施七尺而至於泉呼音中徴其水黒而苦凢聽徴如負猪豕覺而駭凡聽羽如鳴馬在野凡聽宫如牛鳴窌中凡聽商如離羣羊凡聽角如雉登木以鳴音疾以清凡將起五音凡首凡首謂音之總先也先主一而三之四開以合九九一而三之即四也以是四開合於五音九也又九九之為八十一也以是生黃鍾小素之首以成宫素本宫八十一數生黃鍾之宫而為五音之本三分而益之以一為百有八為徴黄鍾之數本八十一益以三分之一二十七通前為百有八是為徴之數不無有三分而去其乘適足以是生商不無有卽有也乘亦三分之一也三分百八而去一餘七十二是商之數也有三分而復於其所以是成羽三分七十二而益其一分二十四合為九十六是羽之數有三分去其乘適足以是成角三分九十六去其一分餘六十四是角之數墳延者六施六七四十二尺而至於泉墳延地名下皆此類陜之芳七施七七四十九尺而至於泉祀陜八施七八五十六尺而至於泉杜陵九施七九六十三尺而至於泉延陵十施七十尺而至於泉環陵十一施七十七尺而至於泉蔓山十二施八十四尺而至於泉付山十三施九十一尺而至於泉付山白徒十四施九十八尺而至於泉中陵十五施百五尺而至於泉青山十六施百一十二尺而至於泉青龍之所居庚泥不可得泉庚續其處旣有青龍居又沙泥相續故不可得泉也赤壤􅭍山十七施百一十九尺而至於泉其下清商不可得泉清商神恠之名􅴵山白壤十八施百二十六尺而至於泉其下駢石不可得泉言有石駢密故不可得泉徙山十九施百三十三尺而至於泉其下有灰壤不可得泉髙陵土山二十施百四十尺而至於泉山之上命之曰縣泉其地不乾其草如茅與走如茅走皆草名其木乃樠樠木名鑿之二尺乃至於泉山之上命曰復吕其草魚膓與蕕其木乃柳鑿之三尺而至於泉山之上命之曰泉英其草蘄白昌其木乃楊鑿之五尺而至於泉山之材材猶旁也其草兢與薔音嗇草名其木乃格鑿之二七十四尺而至於泉山之側其草葍與蔞其木乃品榆鑿之三七二十一尺而至於泉凡草土之道各有榖造謂此地生某草宜某榖造成也或髙或下各有草土葉下於􅡿葉亦草名唯生葉無莖在􅡿之下􅡿即鬱也莊周所謂鬱西也􅡿下於莧莧下於蒲蒲下於葦葦下於雚雚下於蔞蔞下於荓荓下於蕭蕭下於薜薜下於萑萑下於茅凡彼草物有十二衰衰謂草上下相重次也各有所歸謂短者生於髙者之下九州之土為九十物毎州有常而物有次羣土之長是唯五粟五粟之物或赤或青或白或黒或黄五粟五章五粟之狀淖而不肕剛而不觳觳薄不濘車輪濘泥不汚手足其種大重細重白莖白秀無不宜也五粟之土若在陵在山在隫在衍其隂其陽盡宜桐柞莫不秀長其榆其柳其檿其桑其柘其櫟其槐其楊羣木蕃滋數大條直以長其澤則多魚牧則宜牛羊其地其樊俱宜竹箭藻龜楢檀五臭生之薜荔白芷蘪蕪椒連五臭所校校謂馨烈之鋭寡疾難老士女皆好其民工巧其泉黄白其人夷姤夷平也姤好也言均善也五粟之土乾而不挌挌謂堅禦也湛而不澤無髙下葆澤以處言常潤也是謂粟土粟土之次曰五沃五沃之物或赤或青或黄或白或黒五沃五物各有異則五沃之狀剽怸槖土蟲易全處剽堅也怸密也槖土謂其土多竅穴若槖多竅故蟲處之易全怸剽不白下乃以澤旣堅密故常潤濕而不乾白此乃葆澤之地也其種大苗細苗赨音形莖黒秀箭長赨卽赤也箭長謂若箭竹之長也五沃之土若在丘在山在陵在岡若在陬陵之陽其左其右宜彼羣木桐柞枎櫄及彼白梓其梅其杏其桃其李其秀生莖起其棘其棠其槐其楊其榆其桑其杞其枋羣禾數大條直以長其隂則生之楂棃其陽則安樹之五麻若髙若下不擇疇所其麻大者如箭如葦大長以美其細者如雚如蒸欲有與各大者不類欲有施與則以麻之大而類也小者則治揣而藏之若衆練絲言細麻旣治揣而藏故若練絲五臭疇生疇隴也謂為隴而種也蓮與蘪蕪藁本白芷其澤則多魚牧則宜牛羊其泉白青其人堅勁寡有疥騷終無痟酲痟首疾也酲酒病也五沃之土乾而不斥斥潟鹵湛而不澤無髙下葆澤以處是謂沃土沃土之次曰五位五位之物五色襍英各有異章五位之狀不塥不灰塥謂堅不相著青怸以菭音苔及謂色青而細密和菭以相及也其種大葦無細葦無赨莖白秀五位之土若在岡在陵在隫在衍在丘在山皆宜竹箭求黽求黽亦竹類也楢檀其山之淺有蘢與斥蘢斥並古草名羣木安逐條長數大安和易逐競長數謂速長其桑其松其杞其茸茸木名種木胥容榆桃柳楝音煉羣藥安生薑與桔梗小辛大蒙大蒙藥名其山之梟梟猶顛也多桔符榆其山之末有箭與苑其山之旁有彼黄䖟及彼白昌山藜葦芒羣藥安聚以圉民殃其林其漉其槐其楝其柞其榖羣木安逐鳥獸安施施謂有以為生旣有麋麃又且多鹿其泉青黒其人輕直省事少食言其性亷省事少食無髙下葆澤以處是謂位土位土之次曰五蘟五蘟之狀黒土黒菭菭地衣也青怵以肥芬然若灰芬然壤起貌其種櫑葛赨莖黄秀恚目恚目謂殻實怒開也其葉若苑苑謂藴結以蓄殖果木不若三土三土謂五粟五沃五位以十分之二言於三土十分巳不如其二分餘倣此是謂蘟土蘟土之次曰五壤五壤之狀芬然若澤若屯土言其土得澤則墳起為堆故曰屯土也其種大水腸細水腸赨莖黄秀以慈忍水旱無不宜也忍耐蓄殖果木不若三土以十分之二是謂壤土壤土之次曰五浮五浮之狀捍然如米捍堅貌其上屑碎如米以葆澤不離不坼其種蘟忍蘟忍草名蘟忍葉如雚葉以長狐茸草之狀若狐也黃莖黒莖黒秀其粟大無不宜也蓄殖果木不如三土以十分之二凡上土三十物種十二物中土曰五怸五怸之狀廪然如壏壏猶彊也潤濕以處其種大稷細稷赨莖黃秀慈忍水旱細粟如麻其繁美若麻也蓄殖果木不若三土以十分之三怸土之次曰五纑音盧五纑之狀彊力剛堅其種大邯鄲細邯鄲草名莖葉如枎櫄枎櫄亦草名其粟大言其粒大蓄殖果木不若三土以十分之三纑土之次曰五壏五壏之狀芬焉若糠以肥謂其地色黄而虚其種大荔細荔青莖黄秀蓄殖果木不若三土以十分之三壏土之次曰五剽五剽之狀華然如芬以脤謂其地色青紫若脤然也其種大秬細秬秬黒黍黒莖青秀蓄殖果木不若三土以十分之四剽土之次曰五沙五沙之狀粟焉如屑塵厲言其地粟碎故若屑塵之厲厲踊起也其種大萯細萯萯草名白莖青秀以蔓蓄殖果木不如三土以十分之四沙土之次曰五塥五塥之狀累然如僕累僕附也言其地附著而重累也不忍水旱其種大樛杞細樛杞木名黒莖黒秀蓄殖果木不若三土以十分之四凡中土三十物種十二物下土曰五猶五猶之狀如糞其種大華細華草名白莖黒秀蓄殖果木不如三土以十分之五猶土之次曰五𢎞五𢎞之狀如䑕肝其種青梁黒莖黒秀蓄殖果木不如三土以十分之五𢎞土之次曰五殖五殖之狀甚澤以疏離坼以臞塉其種鴈膳草名黒實朱跗黄實跗花足也蓄殖果木不如三土以十分之六五殖之次曰五觳五觳之狀婁婁然婁婁疏也不忍水旱其種大菽細菽多白實蓄殖果木不如三土以十分之六觳土之次曰五鳬五鳬之狀堅而不骼雖堅不同骨之骼也其種陵稻陵稻謂陸生稻黒鵝馬夫皆草名也蓄殖果木不如三土以十分之七鳬土之次曰五桀五桀之狀甚鹹以苦其物為下其種白稻長狹謂稻之形長而狹也蓄殖果木不如三土以十分之七凡下土三十物其種十二物凡土物九十其種三十六弟子職第五十九襍篇十先生施教弟子是則温恭自虚必虚其心然後有所容也所受是極極謂盡其本原見善從之聞義則服温柔孝悌毋驕恃力驕而恃力則羝羊觸藩志毋虚邪虚謂虚偽行必正直游居有常必就有徳顔色整齊中心必式式法夙興夜寐衣帯必飾朝益暮習小心翼翼一此不解是謂學則少者之事夜寐蚤作旣拚盥潄掃席前曰拚盥潔手潄滌口執事有恪攝衣共盥謂供先生之盥器也先生乃作沃盥徹盥謂旣盥而徹盥器也汎拚正席汎拚謂汎水而拚之先生乃坐出入恭敬如見賓客危坐鄉師顔色毋怍怍謂變其容貌受業之紀必由長始先從長者教也一周則然其餘則否謂始教一周則從長始一周之外則不然始誦必作其次則已始誦而作以敬事端也至於次誦則不然凡言與行思中以為紀思合中和以為綱紀古之將興者必由此始必先中和然後可興後至就席狹坐則起狹坐之人見後至者則當起若有賓客弟子駿作迅起也對客無讓應且遂行趨進受命受先生命所求雖不在必以反命求雖不得必當反白反坐復業若有所疑捧手問之師出皆起至於食時先生將食弟子饌饋饋謂選具其食攝衽盥潄跪坐而饋置醬錯食陳膳毋悖凡置彼食鳥獸魚鼈必先菜羮先菜後肉食之次也羮胾中别胾謂肉而細切胾在醬前逺胾近醬食之便也其設要方其陳設食器要令成方也飯是為卒旣飯而食則卒也左酒右醬左酒右醬隂陽也告具而退捧手而立三飯二叶三飯食必二毁叶也左執虚豆右執挾匕匕者所以載鼎實故曰挾匕也周還而貳貳謂再益唯嗛之視食盡日嗛同嗛以齒齒類也謂食者則以其所盡之類而進周則有始柄尺不跪是謂貳紀豆有柄長尺則立而進之此是再益之綱紀也先生巳食弟子乃徹趨走進潄拚前斂祭旣食畢掃席前并搜斂所祭也先生有命弟子乃食以齒相要坐必盡席所謂食坐盡前飯必捧擥羮不以手當以挾也亦有據膝毋有隱肘隱肘則大伏也旣食乃飽循咡覆手咡口也覆手而循之所以拭其不潔也振衽掃席謂振其底衽以拂席之汚已食者作摳衣而降旋而鄉席各徹其餽如於賓客賓客食畢亦自徹也旣徹并器乃還而立并謂藏去也凡拚之道實水于盤次用泛灑攘臂袂及肘恐濕其袂且不便於事也堂上則播灑室中握手堂上寛故播散而灑室中隘故握手為掬以灑執箕膺揲厥中有帚揲舌也旣灑水將掃之故執箕以舌自當置帚於箕中也入戸而立其儀不忒執帚下箕倚於戸側謂倚箕於戸側也凡拚之紀必由奥始西南隅也俯仰磬折拚毋有徹徹動也不得觸動他物也拚前而退謂從前掃而却退也聚於戸内謂聚其所掃之穢壤於戸内也坐板排之板穢時以手排之也以葉適已適已猶向巳也實帚於箕先生若作乃興而辭以拚未畢故辭之令止也坐執而立坐執謂獨坐執箕也遂出弃之旣拚反立是協是稽協合也稽考也謂合考書義也暮食復禮謂復朝之禮也昬將舉火執燭隅坐錯總之法横於坐所總設燭之束也櫛之逺近乃承厥火櫛謂燭盡察其將盡之逺近乃更以燭承取火也居句如矩句謂著燭處言居燭於句如前燭之法矩法也蒸間容蒸然者處下蒸細薪者蒸之間必令容蒸然燭者必處下以焚也捧椀以為緒緒然燭燼也椀所以貯緒也右手執燭左手正櫛有墮代燭燒燭者有墮即令其次代之也交坐毋倍尊者乃取厥櫛遂出是去先生將息弟子皆起敬奉枕席問所何趾俶衽則請有常則否俶始也變其衽席則當問其所趾若有常處則不請也先生旣息各就其友相切相磋各長其儀周則復始是謂弟子之紀言昭第六十亡襍篇十一脩身第六十一亡襍篇十二問覇第六十二亡襍篇十三牧民解第六十三亡管子解一管子卷十九
