body:
  text: 入國第五十四九守第五十五桓公問第五十六度地第五十七入國第五十四入而行化謂始有國雜篇五入國四旬五行九惠之敎方行而施九惠之敎旬即巡也謂四面五一曰老老禮養老者以養老之二曰慈㓜三曰恤􅀌四曰養疾五曰合獨六曰問疾七曰通窮八曰振困九曰接絶所謂老老者凡國都皆有掌老老之官謂置掌年七十巳上一子無征之征役不預國三月有饋肉之肉謂官饋八十巳上二子無征月有饋肉九十以上盡家無征日有酒肉死上共棺椁勸子弟精膳食問所欲求所􅄝其所以耆欲而供也問老者何所欲求訪此之謂老老所謂慈㓜者凡國都皆有掌㓜士民有子子有㓜弱不勝飬爲累者自養故爲累勝堪也謂不堪有三㓜者無婦征四㓜者盡家無征五㓜又子之葆敎母葆今之受二人之食人之食官給二能事而后止事然後止其養㓜者漸長能自管此之謂慈㓜所謂恤􅀌者凡國都皆有掌􅀌士人死子􅀌㓜無父母所養所養之親也旣無父母又無不能自生者屬之其郷黨知識故人養一􅀌者一子無征養二􅀌者二子無征養三􅀌者盡家無征掌􅀌數行問之必知其食飲飢寒身之膌胜而哀憐之瘦膌肥也也胜此之謂恤􅀌所謂養疾者凡國都皆有掌養疾聾盲喑啞跛躄徧枯握遞而不甲者謂之握遞遞著也謂而子相拱著不耐自生者上收而養之疾與療疾旣養之又官而衣食之之衣食謂官給殊身而后止身而後止其養殊猶離也疾離此之謂養疾所謂合獨者凡國都皆有掌媒丈夫無妻曰鰥婦人無夫曰寡取鰥寡而合和之予田宅而家室之三年然后事之謂事職役也供國之此之謂合獨所謂問疾者凡國都皆有掌病士人有病者掌病以上令問之九十以上日一問八十巳上二日一問七十以上三日一問衆庶五日一問疾甚者以告上身問之掌病行於國中以問病爲事此之謂問病所謂通窮者凡國都皆有通窮若有窮夫婦無居處窮賔客絶粮食居其郷黨以聞者有賞不以聞者有罰此之謂通窮所謂振困者歳凶庸人訾厲厲病也訾疾也多死喪㢮刑罰赦有罪散倉粟以食之此之謂振困所謂接絶者士民死上事死戰事使其知識故人受資於上謂資用財而祠之此之謂接絶也九守第五十五主因主位主則主明主㕘主聽督名主賞主問雜篇六安徐而靜徐而又靜黙人居位當安柔節先定定巳然後可定人以和柔爲節先能虚心平意以待湏臣之諫􅀃湏亦待也虚其心平其意以待右主位當如此人主居位目貴明耳貴聦心貴智以天下之目視則無不見也以天下之耳聽則無不聞也以天下之心慮則無不知也輻湊並進則明不塞矣者爲之聽智者爲之謀輻湊並進不亦冝乎故曰明不可塞言聖人不自用其聦明思慮而任之天下故明者爲之視聽聦右主明下耳目視聽之主明在於用天聽之術曰勿望而距勿望而許望風則有所距有所許也聽言之術必湏審察不可許之則失守距之則􅐬塞之故或失守或􅐬塞既未審察輒有距而許髙山仰之不可極也深淵度之不可測也當如髙山深淵不可極而側之不審察者常爲彼所知故戒之神明之德正靜其極也正且靜如此者其有窮極矣旣如山淵則其德配神明而右主聽用賞者貴誠用刑者貴必刑賞信必於耳目之所見則其所不見莫不闇化矣誠暢乎天地通於神明見姦僞也通神明故旣暢天地能見之有姦僞必右主賞一曰天之二曰地之三曰人之必問於賢者而後行之言三才之道幽䆳深遠四曰上下左右前後之宜故湏問之凡此皆有逆順熒惑其處安在星所在也又湏知法右主問心不爲九竅九竅治九竅自治心任九竅君不爲五官五官治五官自治之君任五官故爲善者君予之賞爲非者君予之罰君因其所以來因而予之則不勞矣賞何勞之有自來而又得聖人因之故能掌之皆屬巳故能主之掌主也因來而賞物因之修理故能長乆右主因人主不可不周密也周謂謹人主不周則羣臣下亂故臣下交爭而亂不周則泄其機事也寂乎其無端也當如是愼密者外内不通安知所怨不泄故無怨外内不通則事􅀜閈不開善否無原與不善不得知其原哉旣不開其􅀜閈故善之右主周一曰長目二曰飛耳三曰樹明明知千里之外隱微之中曰動姦姦動則變更矣姦旣動矣自然變更姦在隱微其理將動右主叅脩名而督實按實而定名名實相生反相爲情名實當則治不當則亂名生於實實生於德德生於理理生於智智生於當右督名桓公問第五十六雜篇七齊桓公問管子曰吾念有而勿失得而勿忘爲之有道乎對曰勿創勿作時至而隨母以私好惡害公正察民所惡以自爲戒巳行之非人有所惡黃帝立明臺之議者上觀於賢也堯有衢室之問者下聽於人也舜有告善之旌而主不蔽也禹立建鼓於朝而備訊唉驚問也訊問也唉湯有緫街之庭以觀人誹也武王有靈臺之復而賢者進也白也復謂此古聖帝明王所以有而勿失得而勿忘者也桓公曰吾欲效而爲之其名云何對曰名曰嘖室之議言語讙嘖謂議論者曰法􅂤而易行刑審而不犯事約而易從求寡而易足人有非上之所過謂之正士之可謂正士見上有過而非内於嘖室之議爲嘖室之議納正士之言著有司執事者咸以厥事奉職而不忘爲此嘖室之事也請以東郭牙爲之此人能以正事爭於君前者也桓公曰善度地第五十七雜篇八昔者桓公問管仲曰寡人請問度地形而爲國者其何如而可管仲對曰夷吾之所聞能爲霸王者蓋天子聖人也故聖人之處國者必於不傾之地復壯者謂之不傾言其處深厚岡原而擇地形之肥饒者郷山左右經水若澤山右及縁之澤然後建其國都或在山左或向内爲落渠之冩因大川而注焉之渠以注於大川謂於都内更爲洛水乃以其天材地之所生利養其人以育六畜因天時而植者也天材謂五榖之屬天下之人皆歸其德而惠其義順惠乃別制斷之制之斷之乃分别其地州者謂之術者爲之術地數充爲州不滿術者謂之里者謂之里不成術而餘故百家爲里里十爲術術十爲州州十爲都都十爲霸國不如霸國者國也諸侯之國也不成於霸國者以奉天子以奉天子也霸國率諸侯天子有萬諸侯也其中有公侯伯子男焉天子中而處此謂因天之固不傾故曰因之所處之地自然歸地之利内爲之城城外爲之郭郭外爲之土閬隍閬謂地髙則溝之下則堤之命之曰金城樹以荆􅁄上相穯著者所以爲固也利條相鈎連也穡鈎也謂荆􅁄歳脩増而母已時脩増而無巳福及孫子此謂人命萬丗無窮之利人君之葆守也國都謹置君所保全而守繕脩城郭此人臣服之以盡忠於君君體有之以臨天下故能爲天下之民先也此宰之任則臣之義也之政者也宰謂執君故善爲國者必先除其五害人乃終身無患害而孝慈焉桓公曰願聞五害之􅀃管仲對曰水一害也旱一害也風霧雹霜一害也厲一害也蟲一害也病也厲疾此謂五害五害之屬水最爲大五害已除人乃可治桓公曰願聞水害管仲對曰水有大小又有逺近水之出於山而流入於海者命曰經水水之經言爲衆水別於他水他水謂從别爲沱分流􅀂江入於大水及海者命曰枝水之枝言爲山之溝一有水一母水者命曰谷水水之出於他水溝流於大水及海者命曰川水岀地而不流者命曰淵水此五水者因其利而往之可也䟽引以漑灌謂因地之勢因而扼之可也而塞之亦可也扼塞也恐其泛溢而不乆常有危殆矣没居人故危殆也謂卒有暴溢或能漂桓公曰水可扼而使東西南北及髙乎管仲對曰可夫水之性以髙走下則疾至於􅞎石浮於石謂能漂而下向髙即留而不行故髙其上領瓴之尺有十分之三里滿四十九者水可走也令水上髙必大爲瓴甋私空其中使前後相受以尺爲分上謂水從來處髙之者欲注下取勢也瓴謂瓴甋也言欲閒之毎里滿此九如此則水可走上矣毎領而有十尺即長一丈也分之於三乃迂其道而逺之以勢行之也謂行曲其勢而以行水下曲水道逺張水之性行至曲必留退滿則後推前流而却退其謂水至處必推前水令去處旣滿則後水地下則平行地髙即控水頓挫而却控謂頓也言杜曲則擣毁曲則衝而觸有所毁傷杜猶衝也擣觸也言水行至杜曲激則躍躍則􅀝後相排也􅀝排也謂前􅀝則環環則中空􅀂環之中所謂齊前後相排則圖流生中則涵則相涵激也圎流無所通涵則塞塞則移移則控控也塞亦空則水妄行水妄行則傷人傷人則困困則輕法輕法則難治難治則不孝不孝則不臣矣故五害之屬傷殺之􅀋禍福同矣知備此五者人君天地矣地合其德所謂與天桓公曰請問備五害之道管子對曰請除五害之􅀃以水爲始請爲置水官令習水者爲吏大夫大夫佐各一人率部校長官佐各財足禄稟財謂其乃取水左右各一人使爲都匠水工之都匠爲水工令之行水道城郭堤川溝池官府寺舎及州中當繕治者給卒財足者財其粮用也卒謂所當治水令曰常以秋歳末之時閱其民省視閱謂案家人比地定什伍口數口之數當受地若干案人比地有十口五别男女大小其不爲用者輒免之役者則免之謂其㓜小不在有錮病不可作者疾之之數有以賙恤著其名於疾者也之可省作者半事之省視作者取其半功謂疾者雖不任伇可以并行以定甲士當􅀍兵之數上其都甲士而􅀍兵之數旣而上其名籍於國都也因力伇之際并行視之強壯者預定之以爲都以臨下視有餘不足之處輒下水官水官亦以甲士當被兵之數於水官水官旣得甲士還以備兵數也都旣臨下視其兵不足之處即甲士下之與三老里有司伍長行里因父母案行閱具備水之器因其家之父母與之閱其備水之器謂水官與三老五長等行視其里以冬無事之時籠臿板築各什六六具下準此謂什人共貯土車什一雨輂什二輂車故曰雨輂所以禦雨食器兩具兩具毎人人有之錮藏里中以給喪器貯器當錮謂人旣有給凶喪之用藏於里中兼得後常令水官吏與都匠因三老里有司伍長案行之常以朔日始出閱具之取完堅補􅁦乆去苦惡弊而乆有其器旣補除去之苦惡者常以冬少事之時令甲士以更次益薪積之水旁州大夫將之唯母後時無得後時謂將領之其積薪也以事之巳畢然後益薪已畢也農事旣其作土也以事未起未起謂春事天地和調日有長乆以此觀之其利百倍故常以母事具器母事用之水常可制而使母敗此謂素有備而豫具者也桓公曰當何時作之管子曰春三月天地乾燥水糾列之時也山川涸落天氣下地氣上萬物交通故事巳新事未起草木荑生可食寒暑調日夜分分之後夜日益短晝日益長利以作土功之事土乃益剛令甲士作堤大水之旁大其下小其上隨水而行地有不生草者必爲之囊大者爲之堤小者爲之防夾水四道禾稼不傷歳埤増之樹以荆􅁄以固其地雜之以栢楊以備決水民得其饒是謂流膏令下貧守之往往而爲界可以母敗當夏三月天地氣壯大暑至萬物榮華利以疾􅘥殺草薉使令不欲擾命曰不長不利作土功之事放農焉利皆耗十分之五土功不成當秋三月山川百泉踊降雨下山水出海路距雨露屬天地湊汐利以疾作收斂母留一日把百日餔民母男女皆行於野不利作土功之事濡濕日生土弱難成利耗什分之六土工之事亦不立當冬三月天地閉藏暑雨止大寒起萬物實熟利以塡塞空郄繕邊城塗郭術平度量正權衡虚牢獄實廥倉君修樂與神明相望凡一年之事畢矣舉有功賞賢罰有罪遷有司之吏而第之不利作土功之事利耗什分之七土剛不立晝日益短而夜日益長利以作室不利以作堂四時以得四害皆服桓公曰寡人悖不知四害之服奈何管仲對曰冬作土功發地藏則夏多暴雨秋霖不止春不收枯骨朽脊伐枯木而去之則夏旱至矣夏有大露原煙噎下百草人釆食之傷人人多疾病而不止民乃恐殆君令五官之吏與三老里有司伍長行里順之令之家起火爲温其田及宫中皆蓋井母令毒下及食器將飲傷人有下蟲傷禾稼凡天菑害之下也君子謹避之故不八九死也大寒大暑大風大雨其至不時者此謂四刑或遇以死或遇以生君子避之是亦傷人故吏者所以敎順也三老里有司伍長者所以爲率也五者巳具民無願者願其畢也故常以冬日順三老里有司伍長以冬賞罰使各應其賞而服其罰五者不可害則君之法犯矣此示民而易見故民不比也桓公曰凡一年之中十二月作土功有時則爲之非其時而敗將何以待之管仲對曰常令水官之吏冬時行堤防可治者章而上之都都以春少事作之巳作之後常案行堤有毀作大雨各葆其所可治者趣治以徒􅈻給大雨堤防可衣者衣之衝水可据者据之終歳以母敗爲固此謂備之常時禍何從來所以然者獨水蒙壤自塞而行者江河之謂也歳髙其堤所以不沒也春冬取土於中秋夏取土於外濁水入之不能爲敗桓公善仲父之語寡人畢矣然則寡人何事乎哉亟爲寡人敎側臣管子卷第十八
