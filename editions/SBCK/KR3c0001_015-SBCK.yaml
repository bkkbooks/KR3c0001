body:
  text: 勢第四十二正第四十三九變第四十四任法第四十五明法第四十六正丗第四十七治國第四十八勢第四十二短語戰而懼水此謂澹滅必爲水所澹而滅亡也方戰之時懼致水禍此小事不從大事不吉小大未見其福也苟懼水禍則事無戰而懼險此謂迷中知所從故曰迷中言在迷惑方戰之時懼有險礙進退莫中之分其師衆人旣迷芒必其將亡之道力是以減其師衆矣又況迷惑芒人旣迷惑不知所從則無所用其此二事皆滅亡之道也然乎􅀂是者必亡其衆凡動靜者比於死靜者則靜者勝矣故我近於此近也用師之道我動而敵也死亡動作者比於醜我必無功故近於醜我先動敵反作應者動信者比於距彼能自我旣動者近於見距也中以敵我如此動詘者比於避服者近於見避我旣動而彼屈夫靜與作時以爲主人時以爲客貴得度其失度者則爲客也靜作得度則爲主人知靜之修居而自利修則居然自􅀗其利也旣多智而又安靜二者能知作之從毎動有功如此者動必有功也知其所作常能從理故曰無爲者帝其此之謂矣然如此者帝王之道也言無心於爲任理之自逆節萌生天地未形先爲之政其事乃不成繆受其刑雖萌芽而生然天地言將與簒殺凶逆之節乃違之故其事不成則被誅戮受其刑罪也寂泊不見徴應無從巳之形此則先天而政天天因人聖人因天天而天所謂先而奉天時不違後天天時不作勿爲客者乃爲客矣不因天時而動人事不起勿爲始因不謂先事爲始人事而起可慕和其衆以修天地之從人先生之天地刑之聖人成之則與天同極人先生是心天地又見其修意有從順之形聖人則發將建大事必慕和其衆天地旣巳從但當修天之意謂與天同極也動而成如此者可正靜不爭動作不貳素質不留無所留者全其素質與地同極謂與地同極也能行正靜巳下可未得天極則隱於德則隱而修德也未得與天同極巳得天極則致其力湯之升陑武王牧野是也巳同極則當致力而成之􅀂旣成其功順守其從人不能代逆取順守者也則人何能代之乎從順也功成矣則以順理守之所謂成功之道嬴縮爲寶縮嬴止則止其道乃者故以爲寶猶行藏也所謂時行則行時母亡天極究數而止則止而勿爲但盡天之數事􅀂未成母改其形母失其始始事終有成也形謂常形也中常修靜民觀時待令而起其時待天命令然後起而應也言事未成之時但安靜其人謹􅃸故曰脩隂陽之從而道天地之常也道從嬴嬴縮縮因而爲當重言之殷勤其事也必行藏順時然後事當死死生生因天地之形隱顯必因天地之形死生猶隱顯也聖人天地之形聖人成之則無不成也因天地之形小取者小利大取者大利大小無不利但能法則盡行之者有天下大唯堯則之所謂唯天爲故賢者誠信以仁之慈惠以愛之端政象不敢以先人以下物常執謙中靜不留無所留著中心安静裕德無求無求於人道德饒􅁉形於女色而不先求者女之容色静其所處者柔安靜樂能柔安静樂雖復隱處常行德而不爭以待天下之濆作也讓不與物爭濆動亂也雖復爲政行德常能謙故賢者安徐正靜柔節先定節然後有所先定謙柔之也興爲行於不敢與我爭勇則人不能而立於不能我爭功則人莫與守弱節而堅處之堅明以自處也守柔弱之節而故不犯天時不亂民功所犯亂也謙順故無秉時養人時之持四養其人政以順先德後刑刑以秋冬賞以春夏順於天微度人人之所冝以合之旣順於天又㣲度善周者明不能見也此者雖有明察之人不能盡矣善於周周則極也萬物無所至如善明者周不能蔽也人不能自隱蔽必爲善明者所知也善於明明則極也如此者則雖善周之大明勝大周則民無大周也無能爲大周也明勝大周則人大周勝大明則民無大明也人無能爲大周勝大明則大明濁在君也明凡此皆欲大周大周之先可以奮信德在物之先則可以振起而奮信振起貌言旣有大周之事有大明之祖可以代天下可代天下無道取其位而君之也有大明之德可以爲物祖如此則索而不得求之招揺之下欲索之則不得􅀂求之招揺之下順時而取則可也招揺之星隨斗杓順時而建者也天下者神器直獸厭走而有伏網罟人不敢以直道取天下者恐有大禍故也獸所以憎厭其走者恐前有伏網罟故聖一偃一側不然不得文設武伏如其不然則天位不可得也􅅯側猶􅀝伏也聖人之取天下必權正大丈三曽而貴義與德大武三曽而偃武與力其徳義大武三曽則武道行大文三曽則文道行也故能成其武力也故能偃正第四十三短語十七制斷五刑各當其名罪人不怨不怨也服罪故善人不驚曰刑故不刑當所謂刑也驚如此者正之姦正也所以勝服之不能也所以服勝之姦邪所以勝飾之身也修飾必嚴其令而民則之曰政之如此者政也令嚴則人侔法如四時之不貣如星辰之不變如宵如晝如隂如陽皆有其常宵晝隂陽如日月之明曰法常不變法之用守愛之生之養之成之利民不得以爲德也利雖及人不天下親之曰德恩萬物德用之之親無德無怨無好無惡萬物崇一隂陽同度曰道不二者道之用刑以弊之政以命之法以遏之德以養之養而成物待德道以明之非也明是刑以弊之母失民命人命不失也刑斷合理故令之以終其欲明之母徑以終人行令所道不從邪徑也之欲使之明識正遏之以絶其志意母使民幸使人有非分之幸也用法正人之志意不養之以化其惡必自身始人惡化身惡盡則明之以察其生必修其理故以明察之恐有不修理致刑其民庸心以蔽斷則濫及不辜庸用也不用心以致政其民服信以聽信聽理於人服用也謂用誠致德其民和平以靜以致和靜君德及人致道其民付而不爭任而不交爭人􅀍道則相付罪人當名曰刑刑之謂也罪當其名出令時當曰正時之謂也令當於正當故不改曰法法之謂也不改當故愛民無私曰德德之謂也君愛無私㑹民所聚曰道冝道之謂也聚謂衆所冝也能令衆立常行政能服信乎信服常立則政行中和愼敬能曰新乎其德日新也苟能和敬則正衡一靜能守愼乎愼則政乎而静一衡平也言但能守廢私立公能舉人乎則能舉人也伹公而無私臨政官民能後其身乎臨政官人也後其身則能能服信政此謂正紀者正之紀能行信正能服曰新此謂行理謂行之理也能行日新可守愼正名僞詐自止詐息也能愼則舉人無私臣德咸道臣德皆合於道也無私則不妄舉故能後其身上佐天子能上佐天子也後身則先公故九變第四十四變有九謂人之情短語十八凡民之所以守戰至死而不德其上者有數以至焉雖復至死或守或戰存焉於其閒故能至此也不敢恃之以德於上則有數曰大者親戚墳墓之所在也也一變田宅富厚足居也變二不然則州縣郷黨與宗族足懷樂也變三不然則上之敎訓習俗慈愛之於民也厚無所往而得之皆在於人君之恩厚人之致死四變無所他往故得不然則山林澤谷之利足生也變五不然則地形險阻易守而難攻也變六不然則罰嚴而可畏也不然則賞明而足勸也變七不然則有深怨於敵人也變八不然則有厚功於上也戰而不德於君九變功厚則禄多故亦自爲此民之所以守戰至死而不德其上者也今恃不信之人而求以智用不守之民而欲以固將不戰之卒而幸以勝此兵之三闇也任法第四十五區言一聖君任法而不任智任數而不任􅀃任公而不任私任大道而不任小物小事小物然後身佚而天下治失君則不然舎法而任智故民舎事而好譽舎數而任􅀃故民舎實而好言舎公而好私故民離法而妄行舎大道而任小物故上勞煩百姓迷惑而國家不治聖君則不然守道要處佚樂馳騁弋獵鍾鼔竽瑟宫中之樂無禁圉也安性故不禁禦之也宫中之樂所以恱體不思不慮不憂不圖無所慮圖也但任法數故利身體便形軀養壽命垂拱而天下治任伹壽命長而天下自理也法數則事􅂤故身不勞是故人主有能用其道者數公正大道道則謂上法不事心不勞意不動力而土地自辟囷倉自實蓄積自多甲兵自彊羣臣無詐僞百官無姦邪竒術技藝之人莫敢髙言孟行以過其情以遇其主矣妄姦言妄行以待其主也孟大也遇待也不敢以謬昔者堯之治天下也猶埴巳埏也音羶埏和也唯陶之所以爲猶金之在鑪恣冶之所以鑄其民引之而來推之而往使之而成禁之而止故堯之治也善明法禁之令而巳矣黃帝之治天下也其民不引而來不推而往不使而成不禁而止有爲而黃帝無爲比黃帝之於堯則堯故黃帝之治也置法而不變使民安其法者也所謂仁義禮樂者皆出於法仁義生法行順此先聖之所以一民者也一於民也法所以齊周書曰國法有法也有國者法不一則有國者不祥亂故不祥法不一則民不道法則不祥從道國更立法以典民則祥法以主於人則國理故祥也更攺也典主也言能觀冝攺羣臣不用禮義敎訓則不祥百官伏事者離法而治則不祥也服行故曰法者不可恒也變故不恒法敝則當存亡治亂之所從出法違則亂亡法順則存治聖君所以爲天下大儀也之儀表也君爲天下君臣上下貴賤皆發焉法於君莫不取行也臣發故曰法古之法也必師古立法者丗無請謁任舉之人人則無請謁之任保也以法取舉保無閒識博學辨􅀃之士􅀃之人不敢閒亂識事也閒雜亂也法行則博學辨無偉服無竒行者令止息者畏法故也偉服竒行皆過越法制皆囊於法以事其主也謂人皆斂藏囊者所以斂藏之上事其主過行以順於故明王之所恒者二一曰明法而固守之二曰禁民私而收使之斂而使之謂以法收此二者主之所恒也則政亂廢此二者夫法者上之所以一民使下也私者下之所以侵法亂主也故聖君置儀設法而固守之然故諶杵習士聞識博學之人不可亂也毁碎於杵所以之士聞識謂多聞廣識君守法堅故此等莫能亂也物者也謂姦詐之人僞託於誠以毀君法習士謂習法衆彊富貴私勇者不能侵也信近親愛者不能離也違也離猶珍恠竒物不能惑也萬物百事非在法之中者不能動也正法爲恠僻珍恠竒物比故法者天下之至道也於法者道無越聖君之實用也國之實用法爲理今天下則不然皆有善法而不能守也然故諶杵習士聞識博學之士能以其智亂法惑上衆彊富貴私勇者能以其威犯法侵陵於君也謂侵陵鄰國諸侯能以其權置子立相君之子援立國相鄰國恃權能廢置天臣能以其私附百姓百姓使附也謂用私恩誘翦公財以禄私士以禄私士謂翦公財守法故也此皆以君不凡如是而求法之行國之治不可得也國不可得理也謂從失法之後聖君則不然卿相不得翦其私羣臣不得辟其所親愛聖君赤明其法而固守之羣臣修通輻湊君如輻之湊也謂各得自通於以事其主百姓輯睦聽令道法以從其事也道從故曰有生法有守法有法於法夫生法者君也故曰生法君始制法守法者臣也法而行臣則守法於法者民也君之法人則法君臣上下貴賤皆從法此謂爲大治故主有三術主危主也謂上主中夫愛人不私賞也惡人不私罰也置儀設法以度量斷者上主也愛人而私賞之惡人而私罰之倍大臣離左右專以其心斷者中主也臣有所愛而爲私賞之有所惡而爲私罰之故而私賞罰也爲大臣愛惡之倍其公法損其正心敎之正謂損政專聽其大臣者危主也故爲人主者不重愛人不重惡人重愛曰失德重惡曰失威皆在於臣故曰失也君隨臣愛惡則威德威德皆失則主危也故明王之所操者六生之殺之富之貧之貴之賤之此六柄者主之所操也主之所處者四一曰文二曰武三曰威四曰德此四位者主之所處也藉人以其所操命曰奪柄藉人以其所處命曰失位奪柄失位而求令之行不可得也後欲求令行不可得旣至於奪柄失位之法不平令不全是亦奪柄失位之道也得而保故曰奪柄失位之道法不平令不全則柄位不可故有爲枉法有爲毁令此聖君之所以自禁也君則能禁止之言有枉法毀令聖故貴不能威富不能禄賤不能事近不能親美不能淫也見下文也此五辜解植固而不動竒邪乃恐則敗亡旋及故恐竒音羈所立堅則不可動􅀂竒邪竒革而邪化令往而民移徃而人巳移心而從善也君之竒邪能有革化則令纔故聖君失度量置儀法君聖置儀法以攺也見有失度量則如天地之堅尊勝堅謂如列星之固天星有虧敗也自古至今不見如日月之明燿臨無私如四時之信來必以時寒暑之氣然故令往而民從之之四事故今君能苞上從也往人而失君則不然法立而還廢之令出而後反之枉法而從私毀令而不全是貴能威之富能禄之賤能事之近能親之美能淫之也此五者不禁於身自禁止也君身不能是以羣臣百姓人挾其私而幸其主分之恩妄希非彼幸而得之則主日侵則主日見侵也臣得不當得之恩彼幸而不得則怨日産怨毒日生也􅀂不得所幸則夫日侵而産怨此失君之所愼也凡爲主而不得用其法不能其意顧臣而行所行凡有其臣而爲之也不敢自専顧望離法而聽貴臣法亦聽從之貴臣雖有離此所謂貴而威之也威於君也言貴臣能富人用金王事主而來焉來事主也謂以金王主離法而聽之此所謂富而禄之也禄於君也言富人能賤人以服約卑敬悲色告愬其主服隱約也服約謂屈主因離法而聽之所謂賤而事之也諂君聽之言賤人善近者以偪近親愛有求其主主因離法而聽之此所謂近而親之也要君則君從言近者恃親以美者以巧言令色請其主主因離法而聽之此所謂美而淫之也動於君故君亦聽之言美者能以言色淫治丗則不然不知親䟽逺近貴賤美惡以度量斷之其殺戮人者不怨也故不怨也殺當其罪其賞賜人不德也不德於君也以功受賞故以法制行之如天地之無私也是以官無私論士無私議民無私􅀃皆虚其匈以聽其上懼貌匈恐上以公正論以法制斷故任天下而不重也􅂤故不重也法制行則事今亂君則不然有私視也故有不見也有私聽也故有不聞也有私慮也故有不知也有不見聞知也凡私則不周故夫私者壅蔽失位之道也上舎公法而聽私􅀃故羣臣百姓皆設私立方以敎於國道術也方謂異羣黨比周以立其私請謁任舉以亂公法人用其心以幸於上上無度量以禁之是以私􅀃日益而公法日損國之不治從此産矣夫君臣者天地之位也民者衆物之象也各立其所職以待君令羣臣百姓安得各用其心而立私乎故遵主令而行之雖有傷敗無罰已致故無罰也遵令而行敗非非主令而行之雖有功利罪死不赦故罪死失令有功法所然故下之事上也如響之應聲也臣之事主也如影之從形也故上令而下應主行而臣從此治之道也夫非主令而行有功利因賞之是敎妄舉也以妄爲舉措也賞不從令是敎主令而行之有傷敗而罰之是使民慮利害而離法也羣臣百姓人慮利害而以其私心舉措則法制毀而令不行矣明法第四十六區言二所謂治國者主道明也法明故國治主道明則公所謂亂國者臣術勝也術臣立故國亂勝則私事夫尊君卑臣非計親也以執勝也非欲使親君也但令令尊君卑臣者其計勝也君執其百官識非惠也刑罰必也又知刑罰必行無妄求免罪也必令百官識非公之惠而不敢受故君臣共道則亂故曰共道臣行君事專授則失心而專之亦爲失也􅀂君有所授與不合衆夫國有四亡令求不出謂之滅無所禀故滅求不出令則下出而道留謂之擁道中故曰擁而留止下情求不上通謂之塞隔絶故曰塞也求不上通則與君下情上而道止謂之侵右所止此則臣侵上事也下情雖欲上通中道爲左故夫滅侵塞擁之所生從法之不立也是故先王之治國也不淫意於法之外也淫遊不爲惠於法之内也成私惠也不屈法以動無非法者所以禁過而外私也也外遺威不兩錯爲兩置臣行君威政不二門爲二門也臣出政是以法治國則舉錯而巳法理國言能以之無不行但舉而置是故有法度之制者不可巧以詐僞則詐僞何施非法度不聽有權衡之稱者不可欺以輕重輕重立見也以權衡稱之有㝷丈之數者不可差以長短今主釋法以譽進能則臣離上而下比周矣下所以比周於譽求以黨舉官則民務交而不求用矣官何須求用交合則自進是故官之失其治也是主以譽爲賞以毀爲罰也則官自然失理以毀譽爲賞罰然則喜賞惡罰之人離公道而行私術矣用就公道而求乎行私術自然得賞安比周以相爲匿是事皆匿而不行也比周者凡有公是之忘主死交以進其譽故交衆者譽多其譽自進爲交友致死外内朋黨雖有大姦其蔽主多矣是以忠臣死於非罪忠臣非罪而死朋黨共毀之故而邪臣起於非功邪臣非功而起朋黨共譽之故所死者非罪所起者非功也然則爲人臣者重私而輕公矣利公而私則得而輕公矣致禍故重私十至私人之門父私爲朋黨者也私人之門謂所與不一至於庭君庭謂之百慮其家不一圖國公故也重私輕屬數雖衆非以尊君也衆多無不黨私所屬之數雖曰君也故非尊百官雖具非以任國也不任國事各務私故此之謂國無人國無人者非朝臣之衰也家與家務於相益不務尊君也大臣務相貴而不任國小臣持禄養交不以官爲事故官失其能失能官各人同也則與無是故先王之治國也使法擇人不自舉也使法量功不自度也之條故不勞自舉度也設法者自著擇人量功故能匿而不可蔽故不可隱蔽也苟有材法自擇敗而不可飾也之故不可虚飾也無功而敗法自量譽者不能進而不能進也無材雖譽之而誹者不能退也而不能退也有功雖誹之然則君臣之閒明別各明白而分別也謂賢不肖有功者明別則易治也濫故易治也明别則無僞主雖不身下爲爲其事謂不身而守法爲之可也爲之不勞身也但守法則法自正丗第四十七區言三古之欲正丗調天下者必先觀國政料事務察民俗本治亂之所生知得失之所在然後從事爲從故法可立而治可行夫萬民不和國家不安失非在上則過在下今使人君行逆不修道誅殺不以理重賦斂得民財急使令罷民力人力疲也使令急故財竭則不能母侵奪以共上稅也人財竭則侵奪力罷則不能母墮倪謂疲墮倪傲也從也而傲民巳侵奪墮倪因以法隨而誅之則是誅罰重而亂愈起夫民勞苦困不足則􅂤禁而輕罪如此則失在上失在上而上不變則萬民無所託其命今人主輕刑政寛百姓薄賦斂緩使令然民淫躁行私而不從制飾智任詐負力而爭則是過在下過在下人君不廉而變也亷察則暴人不勝邪亂不止暴人不勝邪亂不止則君人者勢傷而威日衰矣故爲人君者莫貴於勝所謂勝者法立令行之謂勝法立令行故羣臣奉法守職百官有常法不繁匿萬民敦慤反本而儉力嗇而謂廉也勤力故賞必足以使從善也謂使人威必足以勝姦邪也謂勝合然後下從故古之所謂明君者非一君也明君故曰非一五帝三王俱曰其設賞有薄有厚其立禁有輕有重迹行不必同非故相反也皆隨時而變因俗而動夫民躁而行僻則賞不可以不厚禁不可以不重而僻旣躁誘之重禁以威之則難化須厚賞以故聖人設厚賞非侈也立重禁非戾也賞薄則民不利禁輕則邪人不畏設人之所不利欲以使則民不盡力立人之所不畏欲以禁則邪人不止是故陳法出令而民不從故賞不足勸則士民不爲用刑罰不足畏則暴人輕犯禁民者服於威殺然后從見利然后用被治然后正得所安然后靜者也夫盜賊不勝邪亂不止彊劫弱衆暴寡此天下之所憂萬民之所患也憂患不除則民不安其居民不安其居則民望絶於上矣夫利莫大於治害莫大於亂夫五帝三王所以成功立名顯於後丗者以爲天下致利除害也事行不必同所務一也於理也莫不務夫民貪行躁而誅罰輕罪過不發不發舉也有罪過者則是長淫亂而便邪僻也有愛人之心而實合於傷民多反傷人也輕刑以愛人姦此二者不可不察也與傷人二者謂愛夫盜賊不勝則良民危所害故危良人爲盜法禁不立則姦邪繁故事莫急於當務事每則理也當其務治莫貴於得齊非人也齊謂無制民急則民迫民迫則窘窘則民失其所葆爲生者也葆謂所恃緩則縱縱則淫淫則行私行私則離公離公則難用故治之所以不立者齊不得也非人也謂上有齊不得則治難行故治民之齊不可不察也聖人者明於治亂之道習於人事之終始者也其治人民也期於利民而止則止而物至於利人也理故其位齊也不慕古不留今常不變留謂守與時變與俗化夫君人之道莫貴於勝勝故君道立故君道立也勝則無不服君道立然後下從下從故敎可立而化可成也夫民不心服體從則不可以禮義之文敎也君人者不可以不察也治國第四十八區言四凡治國之道必先富民民富則易治也民貧則難治也奚以知其然也民富則安郷重家安郷重家則敬上畏罪敬上畏罪則易治也民貧則危郷輕家其所居也危謂不安危郷輕家則敢陵上犯禁凌上犯禁則難治也故治國常富而亂國必貧是以善爲國者必先富民然后治之昔者七十九代之君法制不一號令不同然俱王天下者何也必國富而粟多也夫富國多粟生於農故先王貴之凡爲國之急者必先禁末作文巧未作文巧禁則民無所游食民無所游食則必農務農謂必民事農則田墾田墾則粟多粟多則國富國富者兵彊兵彊者戰勝戰勝者地廣是以先王知衆民彊兵廣地富國之必生於粟也故禁末作止竒巧而利農事今爲末作竒巧者一日作而五日食共五日之食也言取一日之利可農夫終歳之作不足以自食也然則民舎夲事而事末作捨本事而事末作則田荒而國貧矣凡農者月不足而歳有餘者也而上徴暴急無時稅不謂徭時以則民倍貸以給上之徴矣一還二也倍貸謂貸耕耨者有時而澤不必足不足也謂雨澤則民倍貸以取庸矣不能還其倍價者則計所倍而澤不足則歳凶富者倍貸於貧矣取庸秋糴以五春粜以束是又倍貸也春出粜便收其束矣此亦謂富者秋時以五糴之至束十疋也倍貸之􅀋也故以上之徴而倍取於民者四足二秋糴春粜三也下謂上無時之徴一也澤不之徴四也足􅀜市府庫􅀜市之租府庫之徴粟什一厮輿之事此四時亦當一倍貸矣亦用粟之什一計四時常有所故亦當一倍貸之府庫謂府之庫新有徴稅言人供􅀜市府庫之徴夫以一民養四主四倍貸也四主則上故逃徙者刑刑罰謂有而上不能止者粟少而民無積也常山之東河汝之閒蚤生而晚殺五榖之所蕃孰也四種而五穫謂五榖皆宜而有所穫四種謂四時皆種五穫中年􅅿二石一夫爲粟二百石今也倉􅅒虚而民無積農夫以粥子者上無術以均之也故先王使農士商工四民交能易作善於農工雖農亦通交能易作謂雖士亦業也於士終歳之利無道相過也其利無從相過之也道從也四人均能故是以民作一而得均作故日一也四人交能易民作一則田墾姦巧不生田墾則粟多粟多則國富姦巧不生則民治富而治此王之道也不生粟之國亡粟生而死者霸人有不生而致死者也霸者或不能廣積粟故粟生而不死者王其生無復致死者也王者積粟旣多故人保粟也者民之所歸也粟也者財之所歸也人歸之有粟則粟也者地之所歸也入地歸降者也積粟旣多或有粟多則天下之物盡至矣故舜一徙成邑貳徙成都參徙成國舜非嚴刑罰重禁令而民歸之矣去者必害而去者謂背舜從者必利也先王者善爲民除害興利故天下之民歸之所謂興利者利農事也所謂除害者禁害農事也農事勝則入粟多入粟多則國富國富則安郷重家安郷重家則雖變俗易習攺謂常習易其歐衆移民至於殺之而民不惡也此務粟之功也上不利農則粟少粟少則人貧人貧則輕家輕家則易去易去則上令不能必行上令不能必行則禁不能必止禁不能必止則戰不必勝守不必固矣夫令不必行禁不必止戰不必勝守不必固命之曰􅀉生之君不能長乆謂蹔􅀉爲生此由不利農少粟之害也粟者王之夲事也人主之大務有人之塗其塗因粟也謂保有其人治國之道也管子卷第十五
