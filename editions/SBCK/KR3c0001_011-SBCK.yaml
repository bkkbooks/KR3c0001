body:
  text: 君臣下第三十一小稱第三十二四稱第三十三正言第三十四君臣下第三十一短語五古者未有君臣上下之别未有夫婦妃匹之合獸處羣居以力相征居力强者征於弱也若野獸之處以羣而於是智者詐愚強者凌弱老幼孤獨不得其所故智者假衆力以禁强虐而暴人止聖王也智者即為民興利除害正民之德邪德正人之而民師之者也師智是故道術德行出於賢人德行者也賢人知道術其從義理兆形於民心則民反道矣故莫不從道術旣出事始見於人心則人無不道矣義而順理理之極則無姦僻之名物處違是非之分則賞罰行矣是非者自分矣是非旣分故行賞罸以當其功過也人旣反道故以正其善惡之物處其背理之違則為上下設民生體而國都立矣賤之禮故國都立也上下旣設人則生其貴是故國之所以為國者民體以為國方乃為國貴賤成禮君之所以為君者賞罰以為君君不足貴無賞罰則致賞則匱巳則匱賞而不致罰則虐節則虐罰而無財匱而令虐所以失其民也是故明君審居處之教而民可使故可使人從教居治戰勝守固者也處居勝守則固旣治戰則夫賞重則上不給也多故不給也賞重則費用罰虐則下不信也虐令足故不信也則人無所措手是故明君飾食飲弔傷之禮傷謂喪祭也飲食謂享燕而物厲之者也物親也禮行則是故厲之以八政範之八政八政謂洪旌之以衣服表貴賤也衣服所以富之以國裹苞裹而藏也裹謂財貨所貴之以王禁常者之可貴也禁令行然後知則民親君可用也民用則天下可致也天下道其道則至則天下至君得君道不道其道則不至也夫水波而上盡其搖而復下其勢固然者也而上旣盡言水波湧勢喻人懷德而來畏威不去者也其勢還復搖動歸下而止此自然之故德之以懷也威之以畏也則天下歸之矣有道之國發號出令而夫婦盡歸親於上矣布法出憲而賢人列士盡功能於上矣千里之内束布之罰布謂錢也束謂帛也令出錢帛也古者罰刑或一􅅿之賦盡可知也聽故無不知賢人為之視治斧鉞者不敢讓刑罪敢不讓刑也讓猶拒也當其治軒冕者不敢讓賞故不讓也賞當其功墳然若一父之子若一家之實義禮明也從父家之從長如此者禮義明故也墳順貎或刑賞之莫敢違逆若子之夫下不戴其上臣不戴其君則賢人不來則賢人隱上下不交賢人不來則百姓不用所歸故百姓不用也百姓無賢人則不知百姓不用則天下不至無邦將何至哉百姓不用則天下故曰德侵則君危不危何待君德見侵論侵則有功者危不明故有功者危論議侵理則功過令侵則官危行故官危也令侵則法不刑侵則百姓危戮故百姓危也刑侵則無辜受而明君者審禁淫侵者也上無淫侵之論則下無兾幸之心矣為人君者倍道弃法而好行私謂之亂為人臣者變故易常而巧官以諂上謂之騰亂至則虐駕於君騰謂凌騰至則北故敗降北騰至則摧四者有一至敗敵人謀之之四危也四者則上則故施舍優猶以濟亂則百姓恱舍罪罰二言施恩厚濟亂故百姓恱之也者優厚雖非用法猶能選賢遂材而禮孝弟則姦偽止達遂要淫明設而守固固而守之明設上四法昔者聖王本厚民生審知禍福之所生是故愼小事微違非索辯以根之辯得其根而止之也謂有違非必尋索分然則躁作姦邪偽詐之人不敢試也以嘗君不敢為非此禮正民之道也者用制禮正人也此道以古者有二言牆有耳伏冦在側牆有耳者微謀外泄之謂也伏冦在側者沈疑得民之道也微謀之泄也狡婦襲主之請而資游慝也謂所請旣從外資游説為姦慝者也襲入也謂狡人妖蠱人主遂行請謁沈疑之者得民者也前貴而後賤者為之驅也然賤者必思貴常伺君以興禍故所驅役之人前得貴寵今忽淪賤冦也謂之伏明君在上便僻不能食其意意故曰不能食其意也便僻者不能諂君以得刑罰亟近也故刑罰數也旣不能得君意大臣不能侵其勢君之勢不能侵比黨者誅明也黨者誅之君明故比為人君者能逺讒諂廢比黨淫悖行食之徒食行食游無爵列於朝者此止詐拘姦厚國存身之道也為人上者制羣臣百姓通中央之人和也左右與君和之也中央之人謂君之左右是以中央之人臣主之叅閒叅㑹其事者也左右之人在臣主之制令之布於民也必由中央之人中央之人以緩爲急急可以取威乃爲急故能取威也君雖曰緩左右行之以急爲緩緩可以惠民之爲緩故能惠人君雖日急左右行威惠遷於下則爲人上者危矣賢不肖之知於上必由中央之人財力之貢於上必由中央之人能易賢不肖而可威之賢故曰易賢不肖也實賢謂之不肖實不肖謂黨於下有能以民之財力上陷其主而可以爲勞於下上以陷主用人財力以爲勞即於下兼上下以環其私下之利皆用遶身故曰環其私也上則擅君之柄下則用人材力上爵制而不可加則爲人上者危矣制不能加也勢旣凌君故爵先其君以善者侵其賞而奪之實者也之賞奪君之富實也先君行善則是侵君先其君以惡者侵其刑而奪之威者也訛言於外者脅其君者也衆如此者欲脅君也假􅀃妖妄之言以惑鬱令而不出者幽其君者也出行者將欲幽君也鬱塞也君之令而不四者一作而上下不知也則國之危可坐而待也神聖者王仁智者君武勇者長此天之道人之情也天道人情通者質寵者從此數之因也貴之者可以為從謂臣也言臣主數因此通而立也質主也能通於天道人情者可以為主其不能通但寵是故始於患者不與其事親其事者不規其道事令人為之而不自預此謂君也言初始謀慮而憂患者乃行其是以為人上者患而不勞也百姓勞而不患也君臣上下之分素謂上患而不勞也有謀慮之患無别則禮制立矣是故以人役上其身供上之役也人謂百姓百姓勞以力役明其明而理職位謂臣勤力役用以刑役心心以出法制也刑法也君則役此物之理也心道進退不故進退也心則度量可而刑道滔赶設法有當不故有合或也滔謂充也赶謂迪巡曲也進退者主制以主為制令君心進退所滔赶者主勞主勞者方主制者圓主得制者君臣之道方有圓也其事必有圓者運運者通通則和而無礙通者必暢故和之也圓謂君道也圓而不滯必運方者執執者固固則信不舍則固固而不妄則信也方謂臣道也方而有常故執而君以利和則利也君道和臣以節信守節臣則則上下無邪矣故曰君人者制仁臣人者守信此言上下之禮也君之在國都也若心之在身體也道德定於上則百姓化於下矣戒心形於内成形於内戒慎之心則容貎動於外矣正也者所以明其德後德明必正然知得諸己知得諸民從其理也妄如此者從理故也於己旣不失於人必不知失諸民退而脩諸己反其本也失有如此者反其本也於人必脩己自責所求於己者多故德行立脩業故德行立也求己多者必進德所求於人者少故民輕給之斂故人輕於給也求人少者必薄賦故君人者上注臣人者下注上注者紀天時務民力紀要天時務全人力也上注謂注意於上天故下注者發地利足財用也發興地利足於財用也下注謂注意於下地故故能飾大義審時節上以禮神明下以義輔佐者皆得其冝所用輔佐明君之道能據法而不阿上以匡主之過下以振民之病者忠臣之所行也明君在上忠臣佐之則齊民以政刑牽於衣食之利生故人皆以養其形而牽像於君明臣忠則國理國理則人重利也衣食之故愿而易使愚而易塞用法止也塞止也易君子食於道小人食於力分民故曰分民也食道力不同威無勢也無所立後有所立必有勢然事無為也無所生後有所生必有為然若此則國平而姦省矣邪惡之人復無所立生君子小人旣食於道力而姦省故國平君子食於道則義審而禮明無所食也義不審則義審而禮明則倫等不踰雖有偏卒之大夫不敢有幸心則上無危矣旣國獨出伏罪而怨不敢有幸亂心明禮義倫等不踰雖有大夫偏齊民食於力作本作本者衆農以聽命是以明君立世民之制於上猶草木之制於時也得時然草木必也後故民赶則流之行則流通之人太迂曲不民流通則迂之則迂屈之人太流蕩決之則行塞之則止雖有明君能決之又能塞之決之則君子行於禮塞之則小人篤於農君子行於禮則上尊而民順小民篤於農則財厚而備足上尊而民順財厚而備足四者備體而成體謂備具頃時而王不難矣四肢六道身之體也道謂上有四竅下四肢謂手足也六竅也有二四正五官國之體也官謂五行之官也四正謂君臣父子五四肢不通六道不達曰失四正不正五官不官曰亂是故國君聘妻於異姓設為姪娣命婦宫女盡有法制所以治其内也明男女之别昭嫌疑之節所以防其姦也是以中外不通讒慝不生婦言不及官中之事而諸臣子弟無宫中之交此先王所以明德圉姦昭公威私也明妾寵設不以逐子傷義子不令逐而廢之故明立正嫡設其貴寵義也不傷禮私愛驩勢不竝倫超異可也餘子之勢終不得與之並倫也嫡子者所以傳重也故禮許私愛雖驩之爵位雖尊禮無不行異必須行之以禮也言嫡子爵位雖復尊選為都佼冒之以衣服旌之以章旗所以重其威也美衣麗服覆習之章表旗幟旌異所立之嫡必選其都雅佼好者又以重嫡子之威也之凡此皆所以然則兄弟無閒郄讒人不敢作矣和故讒人無所嫡威重則兄弟故矣作其故其立相也陳功而加之以德論勞而昭之以法叅伍相德而周舉之尊勢而明信之於此四者㕘驗伍偶相與俱得其其謂國相則功德兩蒹勞法獲美用之尊勢而明信之也事旣周然後舉用之旣是以下之人無諫死之誋如流故無諫死之君明相賢必從説也忌而聚立者無鬱怨之心得其所故無怨望也聚立謂天下會同也若如此則國平而亂曰黨偏相凌故亂也黨偏則强弱大臣亂曰稱述而不相讓則亂也各稱述其德已之長中民亂曰讋諄恐諄質則亂謂以智詐讋小民亂曰財匱財匱故亂賦税重則財匱生薄義息故薄也財不供則禮讋諄生慢迷恐之此其慢也不重淳質而讋稱稱述黨偏妬紛生變弑主能為大變也此二者或生簒君故正名稽疑刑殺亟近則内定矣妻妾之疑不正正嫡庶之名稽如此則黨偏妬芬之變息故内定者之黨數取其偪近者而刑殺之順大臣以功順中民以行順小民以務務農也順用其則國豐矣順故國豐也三者各稱其所審天時有冝也天時各物地生以輯民力禁淫務鏤淫務繡文刻勸農功以職其無事令得職也無事者皆則小民治矣上稽之以數考其定數以命之也謂上欲有所徵發必下十伍以徵什伍名以徵之也旣得其定數下其近其罪伏以固其意罪以權伏之所以固供者之意日期旣近尚有不供者則加之鄉樹之師以遂其學師以遂之也每鄉必立之官之以其能及年而舉則士反行矣者則授之以舉而有材能考察之如此則皆反其行矣官旣有年矣則舉其功過而稱德度功勸其所能若稽之以衆風若任以社稷之任能順而考之或使之莅衆以立風化其材能尤高者旣稱其德又度其功則其材能不可不知矣旣知其稷之任者也或授之以社若此則士反於情矣故士反於情也有能必任之以職小稱第三十二則當權而改之稱舉也小舉其過短語六管子曰身不善之患毋患人莫己知無患人不知己也言但患身之不善耳丹青在山民知而取之美珠在淵民知而取之故雖在山泉而藏人猶知丹青與珠各有可用之性懷善而不知乎而取之況在於人是以我有過為而民毋過命而名之無有過而妄我身有過為人必知也命者民之觀也察矣不可遁逃不可以遁逃有過必知故以為不善故我有善則立譽我我有過則立毁我當民之毁譽也則莫歸問於家矣家則左右佞媚者善掩其過而飾其非也人旣毁譽則己之善惡審矣故不復問家問故先王畏民之民過善故畏之毁譽必當其操名從人無不强也使之延譽故强也謂君自行善持名操名去人無不弱也去人善可稱故弱也君既行惡即是持名雖有天子諸侯民皆操名而去之則捐其地而走矣聞人共畏之故弃其地而走也皆持其名而去於人則過惡日故先王畏民則弃之無善名畏人走故在於身者孰為利氣與目為利者所以獨見其運為功用莫氣也者所以生全其形目也為利也大焉故最聖人得利而託焉故民重而名遂託而行善則譽滿天聖人之聖精而又神而名遂也下故人重我亦託焉聖人託可好我託可惡我託可惡以來美名又可得乎惡用此招來美名其可得乎我雖託氣濁而不神所行皆可愛且不能為我能也不得美名況於惡之乎託氣既濁雖令人愛猶毛嬙西施天下之美人也盛怨氣於面不能以為可好好喻聖人外見其惡亦不得美名嬙施雖美而面有怨氣亦不能為可我且惡面而盛怨氣焉怨氣見於面惡言出於口去惡充人者皆以所往去於充惡事以求美名又可得乎皆行惡必無美之名也喻人君既内無聖徳外甚矣百姓之惡人之有餘忌也更有餘忌惡人不善是以長者斷之短者續之滿者洫之虛者實之短虚者人之所好故或續之或實之也洫虚也長滿者人所忌故或斷之或虚之管子曰善罪身者民不得罪也人不罪之也成湯罪己故不能罪身者民罪之故人罪之桀紂罪人故稱身之過者强也是謙受益也稱身之過即治身之節者惠也理身節故曰惠懐智之人然後不以不善歸人者仁也於人如此者仁也不以不善之事歸之故明王有過則反之於身有善則歸之於民有過則反之身則身懼懼而脩徳也過反於身則有善而歸之民則民喜故喜也民得善往喜民人喜也善往則來懼身懼身也過來則此明王之所以治民也今夫桀紂不然有善則反之於身有過則歸之於民歸之於民則民怒反之於身則身驕往怒民來驕身此其所以失身也故明王懼聲以感耳而感則心不敢念非人以惡聲懼己耳聞懼氣以感目而感則身不敢造惡人以惡氣懼己目見以此二者有天下矣可毋慎乎匠人有以感斤欘故繩可得料也羿有以感弓矢故彀可得中也造父有以感轡筴故遬獸可及逺道可致深得其妙有應於心者也彀謂射質棲皮者也感謂天下者無常亂無常治不善人在則亂善人在則治在於旣善所以感之也理在於君人者内旣盡也天下所以於人也外盡善之管子曰修恭遜敬愛辭讓除怨無爭以相逆也迎逆等以相迎接也也謂用此恭遜則不失於人矣有何失乎遜以接人嘗試多怨爭利相為不遜則不得其身不得況於人乎苟爲不遜身尚大哉恭遜敬愛之道吉事可以入察凶事可以居喪大以理天下而不益也愛足以理天直用恭遜敬須益下更不小以治一人而不損也之􅂊可足耳亦不須損也雖復一身用恭遜敬愛理甞試往之中國諸夏蠻夷之國以及禽獸昆蟲皆待此而爲治亂遜敬有恭之則亂也愛則理無澤之身則榮去之身則辱在身則榮去身則辱也恭遜敬愛身之粉澤也故審行之身毋怠雖夷貉之民可化而使之愛以恭遜敬愛化之可使夷貉之人殘戾凶暴茍愛生審去之身雖兄弟父母可化而使之惡恭遜敬愛化之可令生惡父母兄弟恩情結固苟無故之身者使之愛惡遜敬愛則愛無之則惡之是也同是此身有恭名者使之榮辱是同愛則榮無之則辱也此身之名有恭遜敬此其變名物也如天如地愛惡榮辱名物之善惡言恭遜敬愛可以變化生殺也如天地之故先王曰道變化也道者貴作管仲有病桓公往問之曰仲父之病病矣若不可諱而不起此病也仲父亦將何以詔寡人管仲對曰微君之命臣也故臣且謁之告之也謁謂有所雖然君猶不能行也以此言抑之恐其不從故公曰仲父命寡人東寡人東令寡人西寡人西仲父之命於寡人寡人敢不從乎管仲攝衣冠起對曰臣願君之逺易牙竪刁堂巫公子開方夫易牙以調和事公公曰惟烝嬰兒之未嘗於是烝其首子而獻之公人情非不愛其子也於子之不愛將何有於公公喜官而妬竪刁自刑而爲公治内人情非不愛其身也於身之不愛將何有於公公子開方事公十五年不歸視其親齊衛之閒不容數日之行臣聞之務爲不久必發揚之也務時為事久蓋虛不長上三士皆務為蓋虛者其覆蓋虚妄不得長掩謂彰露也姦情終當其生不長者其死必不終必將改復本情未有能終為意也其所行之行所長之性其至於死耳必將復其不忠言三士之忠皆為忠桓公曰善管仲死已葬公憎四子者廢之官逐堂巫而苛病起兵苛之病起兵妄征伐無使療之也苛煩躁也巫善今旣逐之而公有煩逐易牙而味不至逐竪刁而宫中亂逐公子開方而朝不治桓公曰嗟聖人固有悖乎闕故以管仲為悖四子旣逐而有四乃復四子者處朞年四子作難圍公一室不得出圍之故不得出也置公一室之中而有一婦人遂從竇入得至公所公曰吾飢而欲食渴而欲飲不可得其故何也婦人對曰易牙竪刁堂巫公子開方四人分齊國塗十日不通矣固國之道旣有兵難不得通也塗行伐十日公子開方以書社七百下衛矣共置社謂以社數書於古者群居二十五家則社降下於衛者也䇿謂用此七百之書食將不得矣故不給之食作亂欲公之死公曰嗟兹乎聖人之言長乎哉見者逺言其所死者無知則已若有知吾何面目以見仲父於地下乃援素幭以裹首而絶覆軫也幭所以死十一日蟲出於户乃知桓公之死也葬以楊門之扇以掩屍也謂用門扇桓公之所以身死十一日蟲出戸而不收者以不終用賢也桓公管仲鮑叔牙􅇞戚四人飲飲酣桓公謂鮑叔牙曰闔不起為寡人壽乎尊奉令増壽者酒祝鮑叔牙奉杯而起曰使公毋忘出如莒時也使管子毋忘束縛在魯也使􅇞戚毋忘飯牛車下也桓公辟席再拜曰寡人與二大夫能無忘夫子之言則國之社稷必不危矣四稱第三十三道之臣無道之臣以戒桓公謂稱有道之君無道之君有短語七桓公問於管子曰寡人幼弱惛愚不通諸侯四鄰之義仲父不當盡語我昔者有道之君乎吾亦鑒焉管子對曰夷吾之所能與所不能盡在君所矣君胡有辱令君無所隠藏今何勞言已能不盡皆之於使已言之乎辱君令而令危桓公又問曰仲父寡人幼弱惛愚不通四鄰諸侯之義仲父不當盡告我昔者有道之君乎吾亦鑒焉管子對曰夷吾聞之於徐伯曰昔者有道之君敬其山川宗廟社稷及至先故之大臣收聚以忠而大富之以忠誠收聚而賙恤之令其大先故之臣謂祖考時舊臣也今也富固其武臣宣用其力聖人在前貞廉在側競稱於義上下皆飾形正明察四時不貸民亦不憂五穀蕃殖外内均和諸侯臣伏國家安寧不用兵革受其幣帛以懷其德昭受其今以為法式或以制令來告者則君受之以為法式乎鄰國以幣帛來聘當取之以懷來有德其此亦可謂昔者有道之君也桓公曰善哉桓公曰仲父旣已語我昔者有道之君矣不當盡語我昔者無道之君乎吾亦鑒焉管子對曰今若君之美好而宣通也旣官職美道又何以聞惡為旣美言君何須聞於惡事乎以此抑桓公欲觀其意也好宣通官又合於美道脩而行之自可為理桓公曰是何言邪以繬緣繬吾何以知其美也以素緣素吾何以知其善也仲父已語我其善而不語我其惡吾豈知善之為善也管子對曰夷吾聞之於徐伯曰昔者無道之君大其宫室髙其臺榭良臣不使讒賊是舍於其旁與之近也舍止也謂止讒賊有家不治借人為圖其家借他人言自不能理也圖政令不善墨墨若夜之甚也其言昏闇辟若野獸無所朝處恣意為野獸各故無朝處也生不相統屬不脩天道不鑒四方有家不治辟若生狂其性不分狂惑者失也善惡衆所怨詛之也詛祝希不滅亡進其諛優繁其鍾鼔流於博塞戲其工瞽誅其良臣敖其婦女為敖從也唯與婦女獠獵畢弋暴遇諸父父惟以凶暴其所接遇諸馳騁無度戲樂笑語式政旣輮刑罰則烈其言至於刑罰惟益酷烈法式之政旣已輮曲内削其民以爲攻伐為伐功也反以削生辟猶漏釜豈能無竭滿故必有竭也漏釡則江海不能此亦可謂昔者無道之君矣桓公曰善哉桓公曰仲父旣已語我昔者有道之君與昔者無道之君矣仲父不當盡語我昔者有道之臣乎吾以鑒焉管子對曰夷吾聞之徐伯曰昔者有道之臣委質為臣不賔事左右也賔敬君知則仕不知則已若有事必圖國家徧其發揮有必能於國家良臣皆私其所普徧之也及其發又循其祖德辯其順逆推育賢人讒慝不作事君有義使下有禮貴賤相親若兄若弟忠於國家上下得體居處則思義語言則謀謨動作則事居國則富處軍則克臨難據事雖死不悔近君為拂逺君為輔義以與交廉以與處臨官則治酒食則慈不謗其君不諱其辭君若有過進諫不疑君若有憂則臣服之也服行此亦可謂昔者有道之臣矣桓公曰善哉桓公曰仲父旣以語我昔者有道之臣矣不當盡語我昔者無道之臣乎吾亦鑒焉管子對曰夷吾聞之於徐伯曰昔者無道之臣委質為臣賔事左右執説以進不蘄亡已説以進執事佞無求於去也於君直擬全生遂進不退而不知退所謂知進假寵鬻貴寵必能鬻其貴假因也因君之尊其貨賄卑其爵位位伹尊其貨賄而已不令人未必能貴其爵進曰輔之退曰不可於進而私議則曰君不可輔君則言己能為輔弼退以敗其君皆曰非我乃更推過於君云此非我由斯之人不肖故君有敗不仁羣處以攻賢者羣處常有陷賢之見小人所戄者君子故其見賢若貨無敬恭之其見賢人若求貨然心反欲規利見賤若過蕭然不顧若行者之過其見賤人無矜恤之心貪於貨賄競於酒食不與善人唯其所事己與之交也人有曲而事倨敖不恭不友善士讒賊與鬭不彌人爭鬭無彌縫之心其人見爭則恣令唯趣人詔向而順之言其佞設人有制命不問可不則湛湎於酒行義不從也從順不脩先故變易國常擅創為令迷惑其君生奪之政於死後乎生猶奪政況保貴寵矜則保依而貴重懼寵而矜夸者遷損善士而損弃之善士則遷改捕援貨人者唯財貨之人其所捕追而援引入則乗等出則黨駢貨其至其出也又用黨而駢並賄之人與之同國則同乗而等貨賄相入酒食相親俱亂其君君若有過各奉其身過於君也奉身自㓗推此亦謂昔者無道之臣桓公曰善哉正言第三十四短語八闕管子卷第十一
