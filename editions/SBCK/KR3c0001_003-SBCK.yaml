  text: 管子卷第三唐司空房􅀇齡注
  hash: sha256:cb120419b771b99df89d21abad1d9dce2931621187e67d05c93ab0ec5eb79559
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3c0001_SBCK_003-1a}
body:
  text: 㓜官第八㓜官圖第九五輔第十㓜官第八輔官齊政之法㓜始也陳從始經言八若因夜虚守靜人物人物則皇虚之時守其安靜以聽􅀱人物此言欲􅀱氣聽聲以知凶吉必因夜吉凶之驗不妄時人物則皇暇故五和時節君順時節而布政土生數五土氣和則君服黃色味甘味聽宫聲土雖均王四季而正位在六月也此土王之時故服黃味甘聽宫也然治和氣治和氣土主和故飲於黃后之井井也中央以倮獸之火㸑獸虎豹之屬倮獸謂淺毛之藏温濡之在心藏謂苞儒緩所以助土氣君之所藏者温和行歐養時歐逐之所以養嘉穀也謂禽獸之屬能爲苗害者坦氣修通平坦其氣修通也平土政則凡物開靜形生理常至命安靜則其形自生旣循理之常凡土王之時所生之物但開通所賦之命也則無殘盡於尊賢授德則帝尊賢授德則可爲帝也帝者之臣其實師也故身仁行義服忠用信則王行服審謀章禮選士利械則霸明章定生處死謹賢修伍則衆處置之斂葬其柩生者安定之死者信賞審罰爵材禄能則強者爵有材者禄之之有能計凡付終務本飭末則富日月旣終付之後人凡謂都數也付終謂財明法審數立常備能則治才能之士備有之常謂五常也備能謂同異分官則安分官而治同異之職通之以道畜之以惠親之以仁養之以義報之以德結之以信接之以禮和之以樂期之以事攻之以官治攻發之以力威之以誠一舉而上下得終此至九舉􅀃九合諸侯之所致謂初㑹諸侯上下得終其禮自再舉而民無不從三舉而地辟散成三㑹則諸侯散其成而朝齊成謂諸侯自盟要不事於齊至四舉而農佚粟十農人佚樂而粟得十全四㑹之後徭役減省故五舉而務輕金九戰旣息事務五㑹之後兵全一以供官也轉輕而金得九六舉而絜知事變胡結反絜圍度也七舉而外内爲用謂外侯諸八舉而勝行威立九舉而帝事成形侯伯帝王之事旣以成形九㑹之後威行海内雖居九本搏大人主之守也但此書多從散逸無得而知然九本所以搏撃自九本已下管氏但舉其目或有數在於他篇主守之強大故人八分有職卿相之守也十官飾勝備威將軍之守也六紀審密賢人之守也五紀不解庶人之守也動而無不從静而無不同強靜弱必同強動弱必從治亂之本三卑尊之交四富貧之終五盛衰之紀六安危之機七強弱之應八存亡之數九練之以散群傰署上之諸數旣傰猶曹也凡傰曹署著其名以司之已精練然后散之於衆使凡數財署數使財者署數謂國用之殺僇以聚財莫不籍沒其財故曰或因亡國或因滅家聚財也殺戮以勸勉以遷衆使二分具本其名籍之本則財署知聚財傰署使上之傰署財署分知其事各具衆知遷發善必審於密執威必明於中執威謂行刑發善謂行賞此居啚方中啚謂之方啚而土位居中此立時之政管氏别五其春行冬政肅乘之故也肅寒也冬氣行秋政雷陽春陽故雷秋隂隂乘行夏政閹氣猥併故掩閉也春旣陽夏又陽陽十二地氣發戒春事隂陽之數自此巳下且經秦焚書或爲煨燼無得而詳焉闕之以待能者日辰之名于時國異政家殊俗此但齊獨行不及天下十二小卯出耕十二天氣下賜與十二義氣至修門閭十二淸明發禁十二始母合男女十二中卯十二下卯三卯同事同他皆倣此謂三卯所用事八舉時節君則順時節布政木成數八木氣舉君服靑色味酸味聽角聲服青味酸聽自此木王之時故治􅏫氣故治燥氣春多風而旱用八數成數也八亦木飲於靑后之井井東方以羽獸之火爨之火故曰羽獸之火羽南方朱鳥用南方藏不忍行歐養坦氣修通凡物開靜形生理合内空周外理合聚於内出空於外春主仁故所藏者不忍之強國爲圈弱國爲屬國弱國圈然也強國所以禁禦弱動而無不從靜而無不同弱必強動弱必同從強靜舉發以禮時禮必得時也禮也必得其冝強國舉發必當以禮和好不基貴賤無司事變日至如此則事變日至無寧居基漸鄰國和好不基貴賤之位無司存此居於圖東方方外夏行春政風多風也春箕宿行冬政落故凋落也寒氣肅殺重則雨雹雹水寒所致其災重則雨行秋政水多霖雨秋畢宿十二小郢至德十二絶氣下下爵賞十二中郢賜與十二中絶收聚十二大暑至盡善十二中暑十二小暑終三暑同事七舉時節則順時節而布政火成數七火氣舉君君服赤色味苦味服赤味苦也此火王之時故聽羽聲徵而聽羽者所以抑盛陽羽北方聲也火王之時不聽用七數之成數七亦火飲於赤后之井井也南方以毛獸之火㸑用西方之火故毛獸西方白虎之火曰毛獸藏薄純所藏者省薄純素也盛陽之性失在奢縱故行篤厚故行篤厚陽性寛和坦氣修通凡物開靜形生理修理而長育也物形旣生自然定府官明名分而審責於羣臣有司則下不乘上賤不乘貴法立數得而無比周之民則上尊而下卑逺近不乖此居於圖南方方外秋行夏政葉故卉木生葉盛陽氣乘之行春政華卉木更生華少陽氣乘之故行冬政耗故虚耗也盛隂肅殺十二期風至戒秋事十二小卯薄百爵十二白露下收聚十二復理賜與十二始節賦事十二始卯合男女十二中卯十二下卯三卯同事九和時節則順時節而布政金成數九金氣和君君服白色味辛味聽商聲服白味辛聽商此金王之時故治濕氣水故治濕秋多霖雨用九數之成數九亦金飲於白后之井井西方以介蟲之火爨方之火故曰介蟲之火介蟲北方􅀇武也用北藏恭敬性金者恭敬也廉絜故所藏行搏銳以勁銳搏撃所以順殺氣也兊金性勁銳時方肅殺故曰坦氣修通凡物開靜形生理閒男女之畜之異故湏閒之也男女之畜有内外修郷閭之什伍氣殺征伐故修什伍方至可以出師量委積之多寡定府官之計數養老弱而勿通其養勿通老少異粮故信利周而無私周徧無得有私申布秋利旣令此居於圖西方方外冬行秋政霧隂霧秋多行夏政雷隂故雷也盛陽乘盛行春政烝泄隂故烝少陽乘也泄十二始寒盡刑十二小榆賜予十二中寒收聚十二中榆大收十二寒至靜十二大寒之隂十二大寒終三寒同事六行時節則順時節而布政也水成數六水氣行君君服黑色味鹹味故服黒味鹹此水王之時聽徵聲亦所以抑盛隂也不聽羽而聽徴者治隂氣太過則治隂氣也不治則盛隂太過用六數之成數六亦水飲於黑后之井井也北方以鱗獸之火爨方之火故曰鱗獸之火鱗獸東方青龍也用東藏慈厚時藏於慈厚所以示其不忍也若人者好生惡殺故於刑殺之行薄純行省薄純儉冬物朴素故坦氣修通凡物開靜形生理器成於僇故成僇器也冬行刑之時敎行於鈔爲四時之鈔未也冬將終也未嵗之動靜不記行止無量行止可量記動靜則戒審四時以別息生息不同故湏別之也四時生物各有異出入以兩易無差故曰兩易也出入旣異又並令明養生以解固則物不可恡故曰解固固謂䕶恡也生旣湏養審取予以緫之與之多少以揔統之又恐所養過時故審取一㑹諸侯令曰非􅀇帝之命母有一日之師役齊桓初㑹命諸􅀇帝北帝之帝時毋得有一日之師役一日尚不可況多乎侯不使非時出師故令曰若非􅀇帝有命之再㑹諸侯令曰養􅀌老食常疾收􅀌寡三㑹諸侯令曰田租百取五五分百分取市賦百取二􅀜賦百取一母乏耕織之器四㑹諸侯令曰修道路偕度量一稱數也數多少也偕同也稱斤兩藪澤以時禁發之入山林􅆩祭魚草木零落然後澤梁也然后修五㑹諸侯令曰修春秋冬夏之常祭食各有時物也常所祭常所食天壤山川之故祀必以時六㑹諸侯令曰以爾壤生物共􅀇官天之官也􅀇官主禮請四輔也所以助祭行禮四輔即三公四輔將以禮上帝七㑹諸侯令曰官處四體而無禮者流之焉莠命體無禮者謂之莠命而流放官處謂處官也處官位而四命若莠之穢苗也焉莠命者謂穢亂敎八㑹諸侯令曰立四義而毋議者尚之于􅀇官聽于三公順命而無異議者則尚之于天子􅀇官聽三公之錫命尚四義者謂無障谷無貯粟無易樹子無以妾爲妻諸侯能也上九㑹諸侯令曰以爾封内之財物國之所有爲幣禮爲幣九㑹大命焉出常至非此之外則朝聘之數逺近各有差也謂上九㑹旣出大令故天下諸侯常至千里之外二千里之内諸侯三年而朝習命習敎命因朝而二年三卿使四輔侯諸輔以受節制也三卿使天子四一年正月朔日令大夫來修受命三公於三公習所受命二千里之外三千里之内諸侯五年而㑹至習命以習命也因㑹而至三年名卿請事二年大夫通吉凶十年重適入正禮義也適諸侯之重適謂承重也丗子五年大夫請受變之敎令也請所變更三千里之外諸侯丗一至故丗一至道路旣逺置大夫以爲廷安館每來於此以安之也其逺國大夫則爲置廷入共受命焉因以受命入共國所有此居於圖北方方外必得文威武官習勝者必得善勝敵練習士卒則可以勝之文德之威武藝之官與之務時因勝之逆於理可以得勝也時是也務是因脩不終無方勝之出無方者勝從始至終計幾行義勝之者可以勝庶幾行義理名實勝之謬妄可以得整理名實不勝急時分勝之者急分與之可以得勝敗敵所得之物應受分事察伐勝之必察有功不令伐功行賞之事以得勝無功者妄受行備具勝之戰之具可以得勝行師用兵必備其攻原無象勝之若神竒計原者勝無象可本定獨威勝能獨威者勝用師之本定定計財勝審定者勝計謀財用先定聞知勝審定者勝聞知敵謀能定選士勝審定者勝精選士卒能定制禄勝有功能審制禄亦與勝也定者定方用勝同能審定者勝也異方所用各有不定綸理勝審定者勝也經綸之理能定死生勝定成敗勝定依竒勝審定者勝所依竒策能定實虚勝定盛衰勝舉機誠要則敵不量要則敵不能量也發舉兵機誠得其用利至誠則敵不校誠則敵不敢校也用兵便利又能至明名章實則士死節實士則死節不求茍生明忠義之名章功勞之竒舉發不意則士歡用意則士樂爲用竒謀之舉發彼不交物因方則械器備質交則器械備具也之物因方之有因能利備則求必得備之則所求必得因彼所能所利而以執務明本則士不偷之本則士不茍且執所營之務明所爲備具無常無方應也無有常者其所備具敵無方所以應聽於鈔故能聞未極深逺故能聞於極理鈔深逺也所聽在於視於新故能見未形者在新故見未形也未形者新事将起所視思於濬故能知未始之深濬者末始者事故知未始所思在深發於驚故能至無量敵不能量發舉可驚故動於昌故能得其寶懼而輸寶也舉動昌盛故敵立於謀故能實不可故也深謀故常堅實其所建立皆用衰故不復器成敎守則不逺道里往則至不憚道里之逺也器用完成敎令堅守故欲號審敎施則不險山河火而不顧豈險難於山河也號令審悉敎命施行則赴湯博一純固則獨行而無敵時雨歡我如椒蘭誰能敵之德博而一行純而固則仰我如愼號審章則其攻不待先登豈顧後而相待乎愼號令審旗章則攻者爭權與明必勝則慈者勇能勝敵則慈權謀明略必奮況惡少哉仁者猶致勇器無方則愚者智者習而成智況不愚乎器用無方應卒必備則愚攻不守則拙者巧者習而成巧況不拙乎我攻旣妙彼不能守則拙數也動愼十號動必愼兵旣數因其數在他篇一號九章等此有明審九章飾習十器善習五官謹修三官必設常主計必先定軍之計謀亦湏先定軍之主將旣必有常求天下之精材可以精材器用者爲軍之論百工之銳器器成角試否臧收天下之豪傑有天下之稱材其所用也􅊨稱材謂材稱􅀃行若風雨發如雷電此居於圖方中之副也此中圖旗物尚靑故尚靑木用事兵尚矛之芒銳象春物刑則交寒害􅎂人不得已而行刑故難害而欽敬􅎂或爲鈸其行刑戮則於初旦夜盡之交其時尚寒主春器成不守不能圍守也器用旣成則敵經不知法敵不能知也經法也用兵之敎習不著能著著猶明著我之敎習敵不發不意發出敵其所舉意不經不知故莫之能圉發不意故莫之能應莫之能應故全勝而無害莫之能害故必勝而無敵四機不明不過九日而游兵驚軍知不著不意也四機即上不守不障塞不審不過八日而外賊得閒防守要路也障塞者所以由守不愼不過七日而内有讒謀由而防由守所者守詭禁不脩不過六日而竊盜者起禁詭常也詭禁所以死亡不食不過四日而軍財在敵必怨怒故軍財在敵死亡者不享食􅀑神此居於圖東方方外之副也此東圖旗物尚赤故尚赤火用事兵尚㦸之森聳象夏物刑則燒交疆郊用其焚燒而交也刑則於疆郊必明其一令不二一謂號必明其將必明其政必明其士四者備則以治擊亂以成擊敗數戰則士疲數勝則君驕驕君使疲民則國危至善不戰其唯不戰乎用兵之善者其次一之戰而號令一其次善者雖大勝者積衆可以大勝積衆然后勝無非義者焉可以爲大勝義故成大勝所以勝皆大也大勝無不勝也此居於圖南方方外之副也此南圗旗物尚白事故金用白尚兵尚劒之利也象金性刑則詔昩斷絶昩斷絶而戮之也其用刑則繼晝之始乎無端卒乎無窮始乎無端道也卒乎無窮德也道不可量德不可數不可量則衆強不能圖不可數則爲詐不敢郷兩者備施道德也兩者謂動靜有功畜之以道養之以德畜之以道則民和養之以德則民合故能習習故能偕爲其事偕謂同偕習以悉也悉盡莫能傷也此居於圖西方方外之副也此西圖旗物尚黑故尚黒水用事兵尚脅盾之於脅故曰脅盾象時物之閉盾或署刑則游仰灌流仰藥死而旣乃投之於其用刑則游縱之所使流灌察數而知治審器而識勝明謀而適勝通德而天下定定宗廟育男女男女育也宗廟存則官四分則可以立威行德制法儀出號令四面分設擇才授官至善之爲兵也非地是求也罰人是君善至人若紂桀之人比屋可誅也之兵不求其地所以君可罰立義而加之以勝至威而實之以德守之而後脩勝心焚海内制如此則強勝之心可以焚灼於海内旣獲敵人之國順而守之然后修其法民之所利立之所害除之則民人從則人從也立利除害立爲六千里之侯則大人從四方相距六千里大人謂天子三公四輔也旣九㑹之後天子加命立爲侯伯面各三千里使國君得其治則人君從㑹同盟諸侯矣國君謂天下請命於天地知氣和則生物從則四氣和可知故生物從之謂郊祀天地神祇使之合德計緩急之事則危危而無難難緩急之事皆有可危之理故曰危危緩急之事皆已計定則二者之危無所明於器械之利則渉難而不變察於先後之理則兵出而不困通於出入之度則深入而不危審於動靜之務則功得而無害也著於取與之分則得地而不執恡執謂不愼於號令之官則舉事而有功此居於圖北方方外之副也此北圖㓜官圖第九南方副圖中方副圖北方副圖東方本圖中方副圖西方本圖西方副圖南方本圖中方本圖北方本圖經言九秋行夏政葉行春政華行冬政耗十二期風至戒秋事十二小夘薄百爵十二白露下收聚十二復理賜予十二始前節弟賦事十二始卯合男女十二中卯十二下卯三卯同事九和時節君服白色味辛味聽商聲治濕氣用九數飲於白后之井以介蟲之火爨藏恭敬行搏銳坦氣脩通凡物開靜形生理閒男女之畜修郷里之什伍量委積之多寡定府官之計數養老弱而勿通信利害而無私此居於圖西方方外右西方本圖旗物尚白兵尚劒刑則紹昩斷絶始乎無端卒乎無窮始乎無端道也卒乎無窮德也道不可量德不可數不可量則衆強不能圖不可數則爲詐不敢郷兩者備施動靜有功畜之以道養之以德畜之以道則民和養之以德則民合和合故能習習故能偕偕習以悉莫之能傷也此居於圖西方方外右西方副圖夏行春政風行冬政落重則雨雹行秋政水十二小郢至德十二絶氣下下爵賞十二中郢賜與十二中絶收聚十二大暑至盡善十二中暑十二小暑終三暑同事十舉時節君服赤色味苦味聽羽聲治陽氣用七數飲於赤后之井以毛獸之火爨藏薄純行篤厚坦氣修通凡物開靜形生理定府官明名分而審青於群臣有司則下不乘上賤不乘貴法立數得而無比周之民則上尊而下卑逺近不乖此居於圖南方方外右南方本圖若因處虚守静人物則皇五和時節君服黃色味甘味聽宫聲治和氣用五數飲於黃后之井以倮獸之火爨藏温儒行歐養坦氣修通凡物開靜形生理常至命尊賢授德則帝身仁行義服忠用信則王審謀章禮選士利械則霸定生處死謹賢修伍則衆信賞審罰爵材禄能則強計凡付終務本飾末則富明法審數立常備能則治同異分官則安通之以道畜之以惠親之以仁養之以義報之以德結之以信接之以禮和之以樂期之以事攻之以官發之以力威之以誠一舉而上下得終再舉而民無不從三舉而地辟散成四舉而農佚粟十五舉而務輕金九六舉而絜知事變七舉而内外爲用八舉而勝行威立九舉而帝事成形九本搏大人主之守也八分有職卿相之守也七官飾勝備威將軍之守也六紀審密賢人之守也五紀不解庶人之守也治亂之本三卑尊之交四富貧之終五盛衰之紀六安危之機七強弱之應八存亡之數九練之以散群傰署凡數財署殺僇以聚財勸勉以遷衆使二分具本發善必審於密執威必明於中此居圖方中右中方本圖冬行秋政霧行夏政雷行春政烝泄十二始寒盡刑十二小榆賜予十二中寒收聚十二中榆大收十二寒至靜十二大寒之隂十二大寒終三寒同事六行時節君服黑色味鹹味聽徵聲治隂氣用六數飲於黑后之井以鱗獸之火爨藏慈厚行薄純坦氣修通凡物開靜形生理器成於僇敎行於鈔動靜不記行止無量戒審四時以别息異出入以兩易明養生以解固審取與以緫之一㑹諸侯令曰非􅀇帝之命毋有一日之師役再㑹諸侯令曰養􅀌老食常疾收􅀌寡三㑹諸侯令曰田租百取五市賦百取二􅀜賦百取一母乏耕織之器四㑹諸侯令曰修道路偕度量一稱數母征藪澤以時禁發之五㑹諸侯令曰修春秋冬夏之常祭食天壤山川之故祀必以時六㑹諸侯令曰以爾壤生物共􅀇官請四輔將以祀上帝七㑹諸侯令曰官處四體而無禮者流之焉莠命入㑹諸侯令曰立四義而無議者尚之于􅀇官聽於三公九㑹諸侯令曰以爾封内之財物國之所有爲幣九㑹大令焉出常至千里之外二千里之内諸侯三年而朝習命三年三卿使四輔一年正月朔日令大夫來修受命三公二千里之外三千里之内諸侯五年而㑹至習命三年名卿請事二年大夫通吉凶七年重適人正禮義五年大夫請變三千里之外諸侯丗一至置大夫以爲廷安入共受命焉此居於圖北方方外右北方本圖旗物尚赤兵尚㦸刑則燒交疆郊必明其一必明其將必明其政必明其士四者備則以治撃亂以成撃敗數戰則士疲數勝則君驕驕君使疲民則危國至善不戰其次一之大勝者積衆勝而無非義者焉可以爲大勝大勝無不勝也此居於圖南方方外右南方副圖必得文威武官習勝之務時因勝之終無方勝之幾行義勝之理名實勝之急時分勝之事察伐勝之行備具勝之原無象勝之本定獨威勝定計財勝定知聞勝定選士勝定制禄勝定方用勝定綸理勝定死生勝定成敗勝定依竒勝定實虚勝定盛衰勝舉機誠要則敵不量用利至誠則敵不校明名章實則士死節竒舉發不意則士歡用交物因方則械器備因能利備則求必得執務明本則士不偷備具無常無方應也聽於鈔故能聞無極視於新故能見未形思於濬故能知未始發於驚故能至無量動於昌故能得其寶立於謀故能實不可故也器成敎守則不逺道里號審教施則不險山河博一純固則獨行而無敵愼號審章則其攻不待權與明必勝則慈者勇器無方則愚者智攻不守則拙者巧數也動愼十號明審九章飾習十器善習五官謹修三官必設常主計必先定求天下之精材論百工之銳器器成角試否臧收天下之豪傑有天下之稱材􅀃行若風雨發如雷電此居於圖方中右中方副圖旗物尚黑兵尚脅盾刑則游仰灌流察數而知治審器而識勝明謀而適勝通德而天下定定宗廟育男女官四分則可以立威行德制法儀出號令至善之爲兵也非地是求也罰人是君也立義而加之以勝至威而實之以德守之而後修勝心焚海内民之所利立之所害除之則民人從立爲六千里之侯則大人從使國君得其治則人君從㑹請命於天地知氣和則生物從計緩急之事則危危而無難明於器械之利則涉難而不變察於先後之理則兵出而不困通於出入之度則深入而不危審於動靜之務則功得而無害也著於取與之分則得地而不執愼於號令之官則舉事而有功此居於圖北方方外右北方副圖春行冬政肅行秋政雷行夏政則閹十二地氣發戒春事十二小卯出耕十二天氣下賜與十二義氣至修門閭十二淸明發禁十二始卯合男女十二中卯十二下卯三卯同事八舉時節君服靑色味酸味聽角聲治燥氣用八數飲於靑后之井以羽獸之火爨藏不忍行歐養坦氣修通凡物開靜形生理合内空周外強國爲圈弱國爲屬動而無不從靜而無不同舉發以禮時禮必得和好不基貴賤無司事變日至此居於圖東方方外右東方本圖旗物尚靑兵尚矛刑則交寒害􅎂器成不守經不知敎習不著發不意經不知故莫之能圉發不意故莫之能應莫之能應故全勝而無害莫之能圉故必勝而無敵四機不明不過九日而游兵驚軍障塞不審不過八日而外賊得聞由守不愼不過七日而内有讒謀詭禁不修不過六日而竊盜者起死亡不食不過四日而軍財在敵此居於圖東方方外右東方副圖五輔第十此五者可以輔弼國政也謂六興七體八經五務三度外言一古之聖王所以取明名廣譽厚功大業顯於天下不忘於後丗非得人者未之甞聞時功業流後丗者則未甞聞不得於人而能使名譽顯當暴王之所以失國家危社稷覆宗廟滅於天下非失人者未之甞聞人而能不失於者亦未甞聞使失國覆宗今有土之君皆處欲安動欲威戰欲勝守欲固大者欲王天下小者欲霸諸侯下欲小利則霸諸侯也言諸侯欲大利則王天而不務得人是以小者兵挫而地削大者身死而國亡禍小則地削大則國旣不務得人故必致亡故曰人不可不務也之於人當務得此天下之極也曰然則得人之道莫如利之利之之道莫如敎之以政故善爲政者田疇墾而國邑實朝廷閒而官府治公法行而私曲止倉廩實而囹圄空賢人進而姧民退其君子上中正而下諂諛其士民貴武勇而賤得利之利也賤茍得其庶人好耕農而惡飲食之飲食惡費用於是財用足財用足好耕農故而飲食薪菜饒薪菜饒省費用則是故上必寛裕而有解舎舎免也解放也下必聽從而不疾怨上下和同而有禮義故處安而動威戰勝而守固是以一戰而正諸侯不能爲政者田疇荒而國邑虚朝廷兇故兇小人競而官府亂法故亂小人用公法廢而私曲行倉廪虚而囹圄實賢人退而姦民進其君子上諂諛而下中正其士民貴得利而賤武勇其庶人好飲食而惡耕農於是財用匱而食飲薪菜乏上彌殘苟故殘賊苟且也居上位者小人而無解舎下愈覆鷙而不聽從舎故下伺察而懐疑鷙勅吏反覆察也鷙疑也上旣賊茍而不上下交引而不和同覆二俱不得故不和同也上引下以供御下引上以恩故處不安而動不威戰不勝而守不固是以小者兵挫而地削大者身死而國亡故以此觀之則政不可不愼也徳有六興義有七體禮有八經法有五務權有三度所謂六興者何曰辟田疇利壇宅基壇堂修樹蓺勸士民勉稼穡修牆屋此謂厚其生厚養其生也上六者可以發伏利伏者發而用之利人之事積乆隱輸墆積積也墆貯修道途便􅀜市􅀜市皆謂所置便也令要愼將宿必愼止宿將送貨則此謂輸之以財曰輸財所以納財於民上五者皆生財之術故導水潦利陂溝決潘渚決之令通潘音翻潘溢也決潘溢者䟽潰泥滯潰決之令通也泥塗爲滯者亦通鬱閉潰冇遏塞者鬱閉亦謂川愼津梁此謂遺之以利以遺利於民上之六者所薄徵斂輕征賦㢮刑罰赦罪戾宥小過此謂寛其政以寛裕其政上之五者所養長老慈㓜􅀌恤鰥寡問疾病弔禍喪此謂匡其急以救民之急上之五者所衣凍寒食飢渇匡貧窶賑罷露有以振救之疾憊裸露者資乏絶此謂賑其窮振民之窮乏上之五者所以凡此六者德之興也六者旣布則民之所欲無不得矣夫民必得其所欲然后聽上聽上然后政可善爲也故曰德不可不興也曰民知德矣而未知義然后明行以導之義七義行即義有七體七體者何曰孝悌慈惠以養親戚恭敬忠信以事君上中正比冝以行禮節正而又合冝也比合也行旣中整齊撙詘以辟刑僇節而卑屈也撙節也言自纎嗇省用以備飢饉旣細又恡故財纎細也嗇恡也也用省敦懞純固以備禍亂莫江反懞厚也音和協輯睦以備冠戎凡此七者義之體也夫民必知義然后中正中正然后和調和調乃能處安處安然后動威動威乃可以戰勝而守固故曰義不可不行也曰民知義矣而未知禮然后飾八經以導之禮所謂八經者何曰上下有義貴賤有分長㓜有等貧富有度凡此八者禮之經也故上下無義則亂貴賤無分則爭長㓜無等則倍戾也倍乖貧富無度則失節制失其上下亂貴賤爭長㓜倍貧富失而國不亂者未之甞聞也是故聖王飭此八禮以導其民八者各得其義則爲人君者中正而無私爲人臣者忠信而不黨爲人父者慈惠以敎爲人子者孝悌以肅爲人兄者寛裕以誨爲人弟者比順以敬和比爲人夫者敦懞以固爲人妻者勸勉以貞夫然則下不倍上臣不殺君賤不踰貴少不陵長逺不閒親新不間舊小不加大􅁋不破義凡此八者禮之經也夫人必知禮然后恭敬恭敬然后尊讓尊讓然后少長貴賤不相踰越少長貴賤不相踰越故亂不生而患不作故曰禮不可不謹也曰民知禮矣而未知務然后布法以任力任力有五務五務者何曰君擇臣而任官大夫任官辯事所任之事也辯明也能明官長任事守職士修身功材身必於藝能有功材謂藝能士旣脩也庶人耕農樹蓺君擇臣而任官則事不煩亂大夫任官辯事則舉措時官長任事守職則動作和士修身功材則賢良發庶人耕農樹蓺則財用足故曰凡此五者力之務也夫民必知務然后心一心一然后意專心一而意專然后功足觀也故曰力不可不務也曰民知務矣而未知權然后考三度以動之所謂三度者何曰上度之天祥下度之地冝中度之人順此所謂三度故曰天時不祥則有水旱地道不冝則有飢饉人道不順則有禍亂此三者之來也政召之曰審時以舉事時也得其時則事可成時則天祥地冝人順之以事動民民可動事成則以民動國國可動民昌則以國動天下下可動也國強則天天下動然后功名可成也故民必知權然后舉錯得知三度權謂能舉錯得則民和輯民和輯則功名立矣故曰權不可不度也故曰五經旣布然后逐姦民詰詐僞屏讒慝而毋聽􅁋辭毋作􅁋巧若民有􅁋行邪性樹爲􅁋辭作爲淫巧以上謟君上而下惑百姓移國動衆以害民務者其刑死流小罪流大罪死故曰凡人君之所以内失百姓外失諸侯兵挫而地削名卑而國虧社稷滅覆身體危殆非生於謟淫者未之甞聞也何以知其然也曰􅁋聲謟耳淫觀謟目耳目之所好謟心心之所好傷民民傷而身不危者未之甞聞也曰實壙虚墾田疇修􅘘屋則國家富節飲食撙衣服則財用足舉賢良務功勞布德惠則賢人進逐姧人詰詐僞去讒慝則姧人止修飢饉救災害賑罷露則國家定明王之務在於強本事去無用然後民可使富無用謂末作也本事謂農桑也論賢人用有能而民可使治薄稅斂毋茍於民取於民謂無茍待以忠愛而民可使親三者霸王之事也事有本而仁義其要也今工以巧矣而民不足於備用者其恱在玩好末作故備用不足君恱玩好則民務農以勞矣而天下飢者其恱在珍怪方丈陳於前故農勞而不免於飢方丈陳前則役用廣女以巧矣而天下寒者其恱在文繡工傷成天下寒君恱文繡則女是故博帶梨狹也梨割也梨博帶以就大袂列以從小列大袂文繡染爲純色染文繡刻鏤削爲純素削刻鏤雕􅅣采􅅣爲采雕慢純􅀜幾而不征常而不征賊也幾察也但使察非市䣑而不稅籍知其數不稅斂䣑市中置物處但古之良工不勞其知巧以爲玩好是故無用之物守法者不失得而誅之無所漏失也或爲無用物守法者必管子卷第三傰朋音
