body:
  text: 事語第七十一海王第七十二國蓄第七十三山國軓第七十四山權數第七十五山至數第七十六事語第七十一管子輕重四桓公問管子曰事之至數可聞乎管子對曰何謂至數桓公曰秦奢敎我曰帷蓋不脩衣服不衆則女事不泰俎豆之禮不致牲諸侯太牢大夫少牢不若此則六畜不育非髙其臺榭美其宫室則羣材不散此言何如管子曰非數也桓公曰何謂非數管子對曰此定壤之數也彼天子之制壤方千里齊諸侯方百里負海子七十里男五十里若胷臂之相使也故准徐疾贏不足雖在下也不爲君憂彼壤狹而欲舉與大國爭者農夫寒耕暑芸力歸於上女勤於緝績徽織功歸於府者非怨民心傷民意也非有積蓄不可以用人非有積財無以勸下泰奢之數不可用於危隘之國桓公曰善桓公又問管子曰佚田謂寡人曰善者用非其有使非其人何不因諸侯權以制天下管子對曰佚田之言非也彼善爲國者壤辟舉則民留處倉廩實則知禮節且無委致圍城肥致衝夫不定内不可以持天下佚田之言非也管子曰歳藏一十年而十也歳藏二五年而十也􅂖十而守五綈素滿之五在上故視歳而藏縣時積歳國有十年之蓄冨勝貧勇勝怯智勝愚微勝不微有義勝無義練士勝歐衆凡十勝者盡有之故發如風雨動如雷霆獨出獨入莫之能禁止不待權與故佚田之言非也桓公曰善海王第七十二管子輕重五桓公問於管子曰吾欲藉於臺雉何如管子對曰此毁成也吾欲藉於樹木管子對曰此伐生也吾欲藉於六畜管子對曰此殺生也吾欲藉於人何如管子對曰此隱情也桓公曰然則吾何以爲國管子對曰唯官山海爲可耳桓公曰何謂官山海管子對曰海王之國謹正鹽筴之利而王其業海王言以負海桓公曰何謂正鹽筴也正税管子對曰十口之家十人食鹽百口之家百人食鹽終月大男食鹽五􅂛少半劣薄也少半猶大女食鹽三􅂛少半吾子食鹽二􅂛少半男小女也吾子謂小此其大曆也數曆鹽百􅂛而釜十鹽鹽七十六斤十二兩十九銖二纍爲釜當米六斗四􅂛二兩七銖一黍十分之一爲􅂛當米六合四勺也百􅂛之今鹽之重􅂛加分彊釡五十也合爲彊而取之則一釡之鹽得五十合而爲之彊分彊半彊也今使鹽官稅其鹽之重每一斗加半􅂛加一彊釡百也􅂛加二彊釡二百也鍾二千爲鍾當米六斛四斗是十釡之鹽七百六十八斤十鍾二萬百鍾二十萬千鍾二百萬萬乗之國人數開口千萬也大數舉其男大女之所食鹽也而言之也開口謂大禺筴之商日二百萬大男大女食鹽者之口數而立禺讀爲偶偶對也商計也對其計二百萬合爲二百鍾筴以計所稅之鹽一日十日二千萬一月六千萬萬乗之正九百萬也乗萬又施其稅數以千萬人如九百萬人之數則所稅之鹽一日百八十鍾十日千八百鍾之國大男大女食鹽者千萬人而稅之鹽一日二百鍾十日二千鍾一月六千鍾也今四百鍾一月五千月人三十錢之籍爲錢三千萬其錢計一月每人人籍錢三十又變其五千四百鍾之鹽而籍比其常籍則當一國而有三千萬人矣凡千萬人爲錢三萬萬矣以籍之數而今吾非籍之諸君吾子而有二國之籍者六千萬既不籍於老男老女又不籍於小男小女乃能以千萬人而諸君謂老男老女也六十已上爲老男五十已上爲老女也一國而三萬人鐡官之利當一國而三萬人焉故能有二國之籍者六千萬人耳當三千萬人者蓋鹽官之利耳鹽官之利旣然則鐵官之利可知也鹽官之利當數猶在此外其常籍人之使君施令曰吾將籍於諸君吾子則必囂號今夫給之鹽筴則百倍歸於上人無以避此者數也今鐵官之數曰一女必有一鍼一刀若其事立然後若猶耕者必有一耒一耜一銚若其事立銚羊昭反大鋤謂之行服連作器人挽者輦名所以載軺反羊昭輂反居玉者駕馬大車必有一斤一鋸一錐一鑿若其事立不爾而成事者天下無有今鍼之重加一也三十鍼一人之籍之則一女之籍得三十鍼也矣鍼之重每十分加一分爲彊而取刀之重加六五六三十五刀一人之籍也五六爲三十也則一女之籍得五刀刀之重每十分加六分以爲彊而取之耜鐵之重加七三耜鐵一人之籍也而取之則一農之籍得三耜鐵也耜鐵之重每十分加七分以爲彊其餘輕重皆准此而行其加彌多其器彌重然則􅘏臂勝升音事無不服藉者桓公曰然則國無山海不王乎管子曰因人之山海假之名有海之國亦雖無山而假名有山雖無海而假名有海則讎鹽於吾國於吾國爲集耳彼國有鹽而糴釡十五吾受而官出之以百取之所以來之也旣得彼鹽則令吾國鹽官又出而受取也假令彼鹽平價釡當十錢者吾又加五錢而百錢也糶之釡以我未與其本事也事本鹽也與用也本受人之事以重相推謂加五以重推推猶度也錢之類也此人用之數也皆爲我用之彼人所有而國蓄第七十三管子輕重六國有十年之蓄而民不足於食皆以其技能望君之禄也君有山海之金而民不罪於用是皆以其事業交接於君上也故人君挾其食守其用據有餘而制不足故民無不累於上也五榖食米民之司命也黄金刀幣民之通施也故善者執其通施以御其司命故民力可得而盡也夫民者信親而死利海内皆然民予則喜奪則怒民情皆然先王知其然故見予之形不見奪之理不可使知之與可使由之故民愛可洽於上也也洽通租籍者曰租籍在工商所以彊反其兩求也租稅者所慮而請也猶計也請求也在農曰租稅慮王霸之君去其所以彊求廢其所慮而請故天下樂從也利出於一孔者利慶賞威刑皆是凡言利者不必貨其國無敵出二孔者其兵不詘屈窮也詘與屈同出三孔者不可以舉兵出四孔者其國必亡先王知其然故塞民之養羊向反養利也隘其利途故予之在君奪之在君貧之在君富之在君故民之戴上如日月親君若父母凡將爲國不通於輕重不可爲籠以守民不能調通民利不可以語制爲大治是故萬乗之國有萬金之賈千乗之國有千金之賈然者何也國多失利則臣不盡其忠士不盡其死矣歳有凶穰故􅂖有貴賤令有緩急故物有輕重然而人君不能治故使蓄賈游市乗民之不給百倍其本分地若一彊者能守分財若一智者能收智者有什倍人之功取什以一愚者有不賡本之事也音庚賡猶償然而人君不能調故民有相百倍之生也夫民富則不可以禄使也貧則不可以罰威也法令之不行萬民之不治貧富之不齊也且君引錣丁劣反錣籌也量用耕田發草上得其數矣民人所食人有若干歩畒之數矣計本量委也委積則足矣然而民有飢餓不食者何也􅂖有所藏也懇之數君悉知言一國之内耕人乏於食者謂豪富之家收藏其穀故凡人計口授田家族多少足以自給而人君鑄錢立幣民庶之通施也財物通交有無使人之所求各得其欲錢幣無補於飢寒之用人君所立以均制人有若干百千之數矣然而人事不及用不足者何也利有所并藏也人之所有多少各民事謂常費也言藏財貨專擅其利是故人常費不給以致匱乏隨其分而自足君上不能均調其事則豪富并然則人君非能散積聚鈞羨也餘不足分并財利而調民事也則君雖彊本趣耕務農本謂爲促趣讀而自爲鑄幣而無已乃今使民下相役耳惡能以爲治乎而與人徒使豪富侵奪貧弱終不能致理也惡音烏言人君若不能權其利門制其輕重雖鑄幣無限極歳適美則市糶無予而狗彘食人食歳適凶則市糴釡十繦而道有餓民然則豈壤力固不足而食固不贍也哉夫往歳之糶賤狗彘食人食故來歳之民不足也物適賤則半力而無予民事不償其本物適貴則什倍而不可得民失其用然則豈財物固寡而本委不足也哉夫民利之時失而物利之不平也故善者委施於民之所不足操事於民之所有餘夫民有餘則輕之故人君斂之以輕民不足則重之故人君散之以重斂積之以輕散行之以重故君必有什倍之利而財之櫎反古莫可得而平也凡輕重之大利以重射輕以賤泄平萬物之滿虚隨財准平而不變衡絶則重見人君知其然故守之以准平使萬室之都必有萬鍾之藏藏繦千萬使千室之都必有千鍾之藏藏繦百萬春以奉耕夏以奉芸耒耜械器鍾饟粮食畢取贍於君故大賈蓄家不得豪奪吾民矣然則何君養其本謹也春賦以斂繒帛夏貸以收秋實之約收其繒帛也方夏農蓋方春蠶家闕乏而賦與約取其􅂖實也人闕乏亦賦與之是故民無廢事而國無失利也則豪商冨人不得擅人之所乏君悉與之利其凡五􅂖者萬物之主也􅂖貴則萬物必賤􅂖賤則萬物必貴兩者爲敵則不俱平故人君御􅂖物之秩相勝而操事於其不平之閒俱平所以人君視兩事之委積可彼此相勝輕重於其閒秩積也食爲人天故五穀之要可與萬物爲敵其價常不不散也則國利故萬民無籍而國利歸於君也夫以室廡籍謂之毀成是使人毁壞廬室小曰室大曰廡音武以六畜籍謂之止生人不競牧養也畜許救反是使以田畒籍謂之禁耕耕稼也是止其以正人籍謂之離情也離情謂離心也正數之人若丁壯以正户籍謂之養贏至浮浪爲大賈蓄家之所役屬増其利耳贏謂大賈畜家也正數之户既避其籍則五者不可畢用故王者徧行而不盡也故天子籍於幣諸侯籍於食中歳之􅂖糶石十錢大男食四石月有四十之籍大女食三石月有三十之籍吾子食二石月有二十之籍歳凶􅂖貴糴石二十錢則大男有八十之籍大女有六十之籍吾子有四十之籍合平歳每石稅十錢凶歳稅二十者非必稅其人謂於操事輕重之閒約收其六十爲大男五十爲大女吾子謂小男小女也按古之石准今之三斗三升三也利是人君非發號令收穡而戸籍也彼人君守其本委謹而男女諸君吾子無不服籍者也人君不用下令稅斂於人但嚴守利嗇斂也委所委積之物也謹嚴也言無所逃其稅也途輕重在我則一人廩食十人得餘十人廩食百人得餘百人廩食千人得餘夫物多則賤寡則貴散則輕聚則重人君知其然故視國之羡不足而御其財物􅂖賤則以幣予食布帛賤則以幣予衣視物之輕重而御之以准故貴賤可調而君得其利前有萬乗之國而後有千乗之國謂之抵國前有千乗之國而後有萬乗之國謂之距國壤正方四面受敵謂之衢國以百乗衢處謂之託食之君千乗衢處壤削少半萬乗衢處壤削太半何謂百乗衢處託食之君也夫以百乗衢處危懾圍阻千乗萬乗之閒夫國之君不相中舉兵而相攻必以爲杆格蔽圉之用有功利不得鄉大臣死於外分壤而功列陳係纍獲虜分賞而禄是壤地盡於功賞而稅臧彈於繼孤也是特名羅於爲君耳無壤之有號有百乗之守而實無尺壤之用故謂託食之君然則大國内款小國用盡何以及此曰百乗之國官賦䡄符乗四時之朝夕御之以輕重之准然后百乗可及也千乗之國封天財之所殖械器之所出財物之所生視歳之滿虚而輕重其禄然后千乗可足也萬乗之國守歳之滿虚乗民之緩急正其號令而御其大准然后萬乗可資也玉起於禺虞音氏金起於汝漢珠起於赤野東西南北距周七千八百里水絶壤斷舟車不能通先王爲其途之逺其至之難故託用於其重以珠玉爲上幣以黃金爲中幣以刀布爲下幣三幣握之則非有補於煖也食之則非有補於飽也先王以守財物以御民事而平天下也今人君籍求於民令曰十日而具則財物之賈什去一令曰八日而具則財物之賈什去二令曰五日而具則財物之賈什去半朝令而夕具則財物之賈什去九先王知其然故不求於萬民而籍於號令也山國䡄第七十四管子輕重七桓公問管子曰請問官國䡄管子對曰田有䡄人有䡄用有䡄郷有䡄人事有䡄幣有䡄縣有䡄國有䡄不通於䡄數而欲爲國不可桓公曰行䡄數奈何對曰某郷田若干人事之准若干􅂖重若干曰某縣之人若干田若干幣若干而中用􅂖重若干而中幣終歳度人食其餘若干曰某郷女勝事者終歳績其功業若干以功業直時而櫎反古莫之終歳人已衣被之後餘衣若干别群䡄相壤冝桓公曰何謂别群䡄相壤冝管子對曰有莞蒲之壤有竹前檀柘之壤有汜下漸澤之壤有水潦魚鼈之壤今四壤之數君皆善官而守之則籍於財物不籍於人畒十鼓之壤君不以䡄守則民且守之民有過移長力不以本爲得此君失也桓公曰䡄意安出管子對曰不隂據其䡄皆下制其上桓公曰此若言何謂也管子對曰某郷田若干食者若干某郷之女事若干餘衣若干謹行州里曰田若干人若干人衆田不度食若干曰田若干餘食若干必得䡄程此調之泰䡄也然后調立環乗之幣田䡄之有餘於其人食者謹置公幣焉大家衆小家寡山田閒田曰終歳其食不足於其人若干則置公幣焉以滿其准重歳豊年五􅂖登謂髙田之萌曰吾所􅀉幣於子者若干郷􅂖之櫎若干請爲子什減三􅂖爲上幣爲下髙田撫閒田山不被􅂖十倍山田以君􅀉幣振其不贍未淫失也髙田以時撫於主上坐長加十也女貢織帛苟合于國奉者皆置而劵之以郷櫎市准曰上無幣有􅂖以􅂖准幣環􅂖而應筴國奉決􅂖反准賦䡄幣􅂖廩重有加十謂大家委貲家曰上且脩游人出若干幣謂鄰縣曰有實者皆勿左右不贍則且爲人馬假其食民鄰縣四面皆櫎􅂖坐長而十倍上下令曰貲家假幣皆以􅂖准幣直幣而庚之􅂖爲下幣爲上百都百縣䡄據􅂖坐長十倍環􅂖而應假幣國幣之九在上一在下幣重而萬物輕斂萬物應之以幣幣在下萬物皆在上萬物重十倍府官以市櫎出萬物隆而止國軓布於未形據其已成乗令而進退無求於民謂之國䡄桓公問於管子曰不籍而贍國爲之有道乎管子對曰䡄守其時有官天財何求於民桓公曰何謂官天財管子對曰泰春民之功䌛反與招泰夏民之令之所止令之所發所禁發謂山澤之泰秋民令之所止令之所發泰冬民令之所止令之所發此皆民所以時守也此物之髙下之時也此民之所以相并兼之時也君守諸四務桓公曰何謂四務管子對曰泰春民之且所用者君已廪之矣泰夏民之且所用者君已廩之矣泰秋民之且所用者君已廪之矣泰冬民之且所用者君械種饟粮食必取要焉則豪人大賈不得擅其利廪藏也言四時人之所要皆先備之所謂耒耜器已廪之矣泰春功布日春縑衣夏單衣捍寵纍箕勝籯屑若干日之功用人若干無貲之家皆假之械器勝籯屑公衣功已而歸公衣折劵故力出於民而用出於上春十日不害耕事夏十日不害芸事秋十日不害斂實冬二十日不害除田此之謂時作桓公曰善吾欲立䡄官爲之柰何管子對曰鹽鐵之筴足以立䡄官桓公曰奈何管子對曰龍夏之地布黄金九千以幣貲金巨家以金小家以幣周岐山至於崢丘之西塞丘者山邑之田也布幣稱貧冨而調之周壽陵而東至少沙者中田也據之以幣巨家以金小家以幣三壤已撫而國􅂖再什倍梁渭陽􅃈之牛馬滿齊衍請􅇌之顛齒量其髙壯曰國爲師旅戰車毆就斂子之牛馬上無幣請以􅂖視市擴而庚子牛馬爲上粟二家二家散其粟反准牛馬歸於上管子曰請立貲於民有田倍之内母有其外外皆爲貲壤被鞍之馬千乗齊之戰車之具具於此無求於民此去丘邑之籍也國􅂖之朝夕在上山林廪械器之髙下在上春秋冬夏之輕重在上行田疇田中有木者謂之􅂖賊宫中四榮樹其餘曰害女功宫室械器非山無所仰然后君立三等之租於山曰握以下者爲柴楂把以上者爲室奉三圍以上爲棺槨之奉柴楂之租若干室奉之租若干棺槨之租若干管子曰鹽鐵撫䡄􅂖一廪十君常操九民衣食而繇下安無怨咎去其田賦以租其山巨家重葬其親者服重租小家菲葬其親者服小租巨家美脩其宫室者服重租小家爲室廬者服小租上立䡄於國民之貧富如加之以繩謂之國䡄山權數第七十五管子輕重八桓公問管子曰請問權數管子對曰天以時爲權地以財爲權人以力爲權君以令爲權失天之權則人地之權亡桓公曰何爲夫天之權則人地之權亡管子對曰湯七年旱禹五年水民之無􅕷賣子者湯以莊山之金鑄幣而贖民之無􅕷賣子者禹以歴山之金鑄幣而贖民之無􅕷賣子者故天權失人地之權皆失也故王者歳守十分之叅三年與少半成歳三十一年而藏十一年與少半藏叅之一不足以傷民而農夫敬事力作故天毁埊字古地凶旱水泆民無入於溝壑乞請者也此守時以待天權之道也桓公曰善吾欲行三權之數爲之奈何管子對曰梁山之陽綪反千見絤夜石之幣天下無有管子曰以守國􅂖歳守一分以行五年國􅂖之重什倍異日管子曰請立幣國銅以二年之粟顧之立黔落力重與天下調彼重則見射輕則見泄故與天下調泄者失權也見射者失筴也不備天權下相求備准下隂相隷此刑罰之所起而亂之之夲也故平則不平民富則不如貧委積則虚矣此三權之失也巳桓公曰守三權之數奈何管子對曰大豊則藏分阨亦藏分桓公曰阨者所以益也何以藏分管子對曰隘則易益也一可以爲十十可以爲百以阨守豊阨之准數一上十豊之筴數十去九則吾九爲餘於數筴豊則三權皆在君此之謂國權桓公問於管子曰請問國制管子對曰國無制地有量桓公曰何謂國無制地有量管子對曰髙田十石閒田五石庸田三石其餘皆屬諸荒田地量百畒一夫之力也粟賈一粟賈十粟賈三十粟賈百其在流筴者百畒從中千畒之筴也然則百乗從千乗也千乗從萬乗也故地無量國無筴桓公曰善今欲爲大國大國欲爲天下不通權筴其無能者矣桓公曰今行權奈何管子對曰君通於廣狹之數不以狹畏廣通於輕重之數不以少畏多此國筴之大者也桓公曰善蓋天下視海内長譽而無止爲之有道乎管子對曰有曰䡄守其數准平其流動於未形而守事已成物一也而十是九爲用徐疾之數輕重之筴也一可以爲十十可以爲百引十之半而藏四以五操事在君之決塞桓公曰何謂決塞管子曰君不髙仁則問不相被君不髙慈孝則民􅂤其親而輕過此亂之至也則君請以國筴十分之一者樹表置髙郷之孝子聘之幣孝子兄弟衆寡不與師旅之事樹表置髙而髙仁慈孝財散而輕乗輕而守之以筴則十之五有在上運五如行事如日月之終復此長有天下之道謂之准道桓公問於管子曰請問敎數管子對曰民之能明於農事者置之黃金一斤直食八石民之能蕃育六畜者置之黃金一斤直食八石民之能樹藝者置之黃金一斤直食八石民之能樹􅀲瓠葷菜百果使蕃袬者置之黃金一斤直食八石民之能己民疾病者置之黃金一斤直食八石民之知時曰歳且阨曰某榖不登曰某榖豐者置之黃金一斤直食八石民之通於蠶桑使蠶不疾病者皆置之黃金一斤直食八石謹聽其言而藏之官使師旅之事無所與此國筴之者也國用相靡而足相因揲而然後置四限髙下令之徐疾􅇌屏萬物守之以筴有五官技桓公曰何謂五官技管子曰詩者所以記物也時者所以記歳也春秋者所以記成敗也行者道民之利害也易者所以守凶吉成敗也卜者卜凶吉利害也民之能此者皆一馬之田一金之衣此使君不迷妄之數也六家者即見其時使豫先蚤閑之日受之故君無失時無失筴萬物興豐無失利逺占得失以爲末敎詩記人無失辭行殫道無失義易守禍福凶吉不相亂此謂君㨀文與柄同筆永反􅀃桓公問於管子曰權棅之數吾已得聞之矣守國之固奈何曰能皆已官時皆已官得失之數萬物之終始君皆已官之矣其餘皆以數行桓公曰何謂以數行管子對曰􅂖者民之司命也智者民之輔也民智而君愚下富而君貧下貧而君富此之謂事名二國機徐疾而已矣君道度法而已矣人心禁繆而已矣桓公曰何謂度法何謂禁繆管子對曰度法者量人力而舉功禁繆者非往而戒來故禍不萌通而民無患咎桓公曰請聞心禁管子對曰晉有臣不忠於其君慮殺其主謂之公過諸公過之家母使得事君此晉之過失也齊之公過坐立長差惡惡乎來刑善善乎來榮戒也此之謂國戒桓公問管子曰輕重准施之矣筴盡於此乎管子曰未也將御神用寶桓公曰何謂御神用寶管子對曰北郭有掘闕而得􅀛者至泉曰闕求月反掘穿也求物反穿地此檢數百里之地也爲用者其數可比檢猶比也以此􅀛之地百里桓公曰何謂得􅀛百里之地管子對曰北郭之得􅀛者令過之平盤之中之也平盤者大盤也今力呈反過之猶置君請起十乗之使百金之提也使色吏反起發也提裝命北郭得􅀛之家曰賜若服中大夫中大夫若汝也也齊爵曰東海之子類於􅀛之子耳東海之子者海神之子也東海之子其狀類􅀛假言此􅀛東海託舎於若􅀉居也託舎猶賜若大夫之服以終而身也而若勞若以百金也勞賜之􅀛爲無貲無貲也無貲無價也之是也是􅀛至寶而而藏諸泰臺臺也泰臺髙一日而亹之以四牛立寶曰無貲號曰無貲立􅀛爲寶還四年伐孤竹後四年還四年丁氏之家粟所謂丁惠也丁氏齊之冨人可食三軍之師行五月行五月經五月食音嗣下以意取召丁氏而命之曰吾有無貲之寶於此吾今將有大事請以寶爲質於子皆同音致下以假子之邑粟粟也即家丁氏北郷再拜入粟不敢受寶質桓公命丁氏曰寡人老矣爲子者不知此數終受吾質丁氏歸革築室賦籍藏􅀛籍席也才夜反革更也賦敷也還四年伐孤竹謂丁氏之粟中食三軍五月之食桓公立貢數文行中七年􅀛中四千金黑白之子當千金凡貢制中二齊之壤筴也用貢國危出寶國安行流桓公曰何謂流管子對曰物有豫則君失筴而民失生矣故善爲天下者操於二豫之外桓公曰何謂二豫之外管子對曰萬乗之國不可以無萬金之蓄飾千乗之國不可以無千金之蓄飾百乗之國不可以無百金之蓄飾以此與令進退此之謂乗時山至數第七十六管子輕重九桓公問管子曰梁聚謂寡人曰古者輕賦稅而􅏂籍斂取下無順於此者矣梁聚之言何如管子對曰梁聚之言非也彼輕賦稅則倉廩虚􅏂籍斂則械器不奉而諸侯之皮幣不衣倉廩虚則倳賤無禄外皮幣不衣於天下内國倳賤梁聚之言非也君有山山有金以立幣以幣准􅂖而授禄故國􅂖斯在上􅂖賈什倍農夫夜寢蚤起不待見使五􅂖什倍士半禄而死君農夫夜寢蚤起力作而無止彼善爲國者不曰使之使不衍得不使不曰貧之使不得不用故使民無有不得不使者夫梁聚之言非也桓公曰善桓公又問於管子曰有人敎我謂之請士曰何不官百能管子對曰何謂百能桓公曰使智者盡其智謀士盡其謀百工盡其巧若此則可以爲國乎管子對曰請士之言非也禄􅏂則士不死幣輕則士􅂤賞萬物輕則士偷幸三怠在國何數之有彼􅂖十藏於上三游於下謀士盡其慮智士盡其知勇士輕其死請士所謂妄言也不通於輕重謂之妄言桓公問於管子曰昔者周人有天下諸侯賔服名敎通於天下而奪於其下何數也管子對曰君分壤而貢入市朝同流黄金一筴也江陽之珠一筴也秦之明山之曾青一筴也此謂以寡爲多以狹爲廣䡄出之屬也桓公曰天下之數盡於䡄出之屬也合國􅂖重什倍而萬物輕大夫謂賈之子爲吾運􅂖而斂財􅂖之重一也今九爲餘􅂖重而萬物輕若此則國財九在大夫矣國歳反一財物之九者皆倍重而出矣財物在下幣之九在大夫然則幣􅂖羨在大夫也天子以客行令以時出熟􅂖之人亡諸侯受而官之連朋而聚與髙下萬物以合民用内則大夫自還而不盡忠外則諸侯連朋合與孰􅂖之人則去亡故天子失其權也桓公曰善桓公又問管子曰終身有天下而勿失爲之有道乎管子對曰請勿施於天下獨施之於吾國桓公曰此若言何謂也管子對曰國之廣狹壤之肥墝有數終歳食餘有數彼守國者守􅂖而已矣曰某縣之壤廣若于某縣之壤狹若干􅏂墝人之國之廣狹君素皆知之所食多少其數則必積委幣室之邑必有萬鍾之藏藏繦千萬千室委蓄也各於縣州軍蓄積錢幣所謂萬之藏藏繦百萬之邑必有千鍾於是縣州里受公錢委之幣公錢即積泰秋國􅂖去參之一丘吕反去減也君下令謂郡縣屬大夫里邑皆籍粟入若干􅂖重一也以藏於上者以収藏之一其􅂖價國􅂖參分則二分在上矣於縣邑當言先貯幣二捨一下熟中分之盖出於此令言去三之一者納中熟爲准耳秋時下令收糴也則魏李悝行平糴之法上熟糴三捨一中熟糴泰春國􅂖倍重數也泰夏賦􅂖以市櫎反古莫民皆受上􅂖以治田土泰秋田􅂖之存子者若干今上歛􅂖以幣民曰無幣以􅂖則民之三有歸於上矣幣雖設此令本意收其􅂖入旣無幣請輸􅂖故歸言當春􅂖貴之時計其價以􅂖賦與人秋則斂其上於重之相因時之化舉無不爲國筴時之化舉若秋時􅂖賤收􅂖也重之相因若春時􅂖貴與􅂖也不以術權之因時之輕重無君用大夫之委以流歸於上君用民以時歸於君藏輕出輕以重數也則彼安有自還之大夫獨委之彼諸侯之􅂖十使吾國􅂖二十則諸侯􅂖歸吾國矣諸侯􅂖二十吾國􅂖十則吾國􅂖歸於諸侯矣故善爲天下者謹守重流價不使流散重流謂嚴守􅂖而天下不吾􅂥矣􅂖不散出􅂥散也吾彼重之相歸如水之就下吾國歳非凶也以幣藏之故國􅂖倍重故諸侯之􅂖至也是藏一分以致諸侯之一分利不奪於天下大夫不得以富侈以重藏輕國常有十國之筴也故諸侯服而無止臣櫎從而以忠此以輕重御天下之道也謂之數應桓公問管子曰請問國㑹管子對曰君失大夫爲無伍失民爲失下故守大夫以縣之筴守一縣以一郷之筴守一鄊以一家之筴守家以一人之筴桓公曰其㑹數奈何管子對曰幣准之數一縣必有一縣中田之筴一郷必有一郷中田之筴一家必有一家直人之用故不以時守郡爲無與不以時守郷爲無伍桓公曰行此奈何管子對曰王者藏於民霸者藏於大夫殘國亡家藏於篋桓公曰何謂藏於民請散棧臺之錢散諸城陽鹿臺之布散諸濟隂君下令於百姓曰民富君無與貧民貧君無與富故賦無錢布府無藏財貲藏於民歳豐五􅂖登五􅂖大輕􅂖賈去上歳之分以幣據之􅂖爲君幣爲下國幣盡在下幣輕􅂖重上分上歳之二分在下下歳之二分在上則二歳者四分在上則國􅂖之一分在下􅂖三倍重􅀖布之籍終歳十錢人家受食十畒加十是一家十戸也出於國􅂖筴而藏於幣者也以國幣之分復布百姓四減國􅂖三在上一在下復筴也大夫旅而封積實而驕上請奪之以㑹桓公曰何謂奪之以㑹管子對曰粟之三分在上謂民萌皆受上粟度君藏焉五􅂖相靡而重去什三爲餘以國幣􅂖准反行大夫無什於重君以幣賦禄什在上君出􅂖什而去七君歛三上賦七散振不資者仁義也五􅂖相靡而輕數也以郷完重而籍國數也出實財散仁義萬物輕數也乗時進退故曰王者乗時聖人乗易桓公曰善桓公問管子曰特命我曰天子三百領泰嗇而散大夫准此而行此如何管子曰非法家也大夫髙其壟美其室此奪農事及市庸此非便國之道也民不得以織爲縿綃而貍之於地彼善爲國者乗時徐疾而已矣謂之國㑹桓公問管子曰請問爭奪之事何如管子曰以戚始桓公曰何謂用戚始管子對曰君人之主弟兄十人分國爲十兄弟五人分國爲五三世則昭穆同祖十世則爲祏故伏尸滿衍兵決而無止輕重之家復游於其閒故曰母予人以壤母授人以財財終則有始與四時廢起聖人理之以徐疾守之以決塞奪之以輕重行之以仁義故與天壤同數此王者之大轡也桓公問管子曰請問幣乗馬管子對曰始取夫三大夫之家方六里而一乗二十七人而奉一乗幣乗馬者方六里田之惡美若干􅂖之多寡若干􅂖之貴賤若干凡方六里用幣若干􅂖之重用幣若干故幣乗馬者布幣於國幣爲一國陸地之數謂之幣乗馬桓公曰行幣乗馬之數奈何謂篋乗馬者即臣乗馬所爲篋而洩重射輕臣猶實也篋者以幣管子對曰士受資以幣大夫受邑以幣人馬受食以幣則一國之􅂖貲在上幣貲在下國􅂖什倍數也萬物財物去什二筴也皮革筋角羽毛竹箭器械財物苟合于國器君用者皆有矩劵於上常劵矩劵君實郷州藏焉制用家爲州齊雖霸國尚用周制萬二千五百郷二千五百家爲曰某月某日苟從責者爲債責讀郷決州決故曰就庸一日而決國筴出於􅂖䡄國之筴貨幣乗馬者也在下故􅂖倍重其有皮革之類堪於所用者所在郷州有其數若今貲價也言應合受公家之所給皆與之幣則􅂖之價君上權之其幣類者則與其准納如要功庸者令就役一日除其簿書耳此蓋君上一切權官曹簿帳人有負公家之債若耒耜種粮之類者官司如要器用若皮革之利門則與奪貧富悉由號令然可易爲理也之也詳輕重之本㫖摧抑富商兼并之家隘塞今刀布藏於官府巧幣萬物輕重皆在賈之彼幣重而萬物輕幣輕而萬物重彼􅂖重而􅂖輕人君操􅂖幣金衡而天下可定也此守天下之數也桓公問於管子曰准衡輕重國㑹吾得聞之矣請問縣數管子對曰狼牡以至於馮㑹之日龍夏以北至于海莊禽獸羊牛之地也何不以此通國筴哉桓公曰何謂通國筴管子對曰馮市門一吏書贅直事若其事唐圉牧食之人養視不失扞殂者去其都秩與其縣秩大夫不郷贅合游者謂之無禮義大夫幽其春秋列民幽其門山之祠馮㑹龍夏牛羊犧牲月賈十倍異日此出諸禮義籍於無用之地因捫牢筴也謂之通桓公問管子曰請問國勢管子對曰有山處之國有汜下多水之國有山地分之國有水泆之國有漏壤之國此國之五勢人君之所憂也山處之國常藏􅂖三分之一汜下多水之國常操國􅂖三分之一山地分之國常操國􅂖十分之三水泉之所傷水泆之國常操十分之二漏壤之國謹下諸侯之五􅂖與工雕文梓器以下天下之五􅂖此准時五勢之數也桓公問管子曰今有海内縣諸侯則國勢不用已乎管子對曰今以諸侯爲䇡公州之飾焉以乗四時行捫牢之筴以東西南北相彼用平而准故曰爲諸侯則髙下萬物以應諸侯徧有天下則賦幣以守萬物之朝夕調而已利有足則行不滿則有止王者郷州以時察之故利不相傾縣死其所君守大奉一謂之國簿管子卷第二十二
