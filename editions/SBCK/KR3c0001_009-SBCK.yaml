body:
  text: 霸形第二十二霸言第二十三問第二十四謀失第二十五霸形第二十二之形容陳霸言内言五桓公在位管仲隰朋見立有閒有貳鴻飛而過之桓公嘆曰仲父今彼鴻鵠有時而南有時而北有時而往有時而來四方無逺所欲至而至焉非唯有羽翼之故是以能通其意於天下乎管仲隰朋不對桓公曰二子何故不對管子對曰君有霸王之心而夷吾非霸王之臣也是以不敢對桓公曰仲父胡為然盍不當言寡人其有鄉乎寡人有所歸向何不陳當言令寡人之有仲父也猶飛鴻之有羽翼也若濟大水有舟楫也仲父不一言敎寡人寡人之有耳將安聞道而得度哉至於霸王哉言何以自度得管子對曰君若將欲霸王舉大事乎則必從其本事矣桓公變躬遷席拱手而問曰敢問何謂其本管子對曰齊國百姓公之本也人甚憂飢而稅斂重人甚懼死而刑政險人甚傷勞而上舉事不時公輕其稅斂則人不憂飢緩其刑政則人不懼死舉事以時則人不傷勞桓公曰寡人聞仲父之言此三者聞命矣不敢擅也將薦之先君先君而後行所謂以神道設敎者也不敢專擅自發此命將進之宗廟告於是令百官有司削方墨筆欲書其所定令也方謂版牘也凡此明日皆朝於太廟之門朝定令於百吏百吏之令也因朝廟而定使稅者百一鍾而取一鍾假令百石孤㓜不刑澤梁時縱不設禁放人入􅀜譏而不征市書而不賦其名籍書謂錄近者示之以忠信逺者示之以禮義行此數年而民歸之如流水此其後宋伐杞狄伐邢衛桓公不救祼體紉􅇩稱疾猶紉若有所痛患也摩也自摩其胷召管仲曰寡人有千嵗之食而無百嵗之夀今有疾病姑樂乎管子曰諾於是令之縣鍾磬之榬以嚴飾之于元反榬所陳歌舞竽瑟之樂日殺數十牛者數旬羣臣進諫曰宋伐杞狄伐邢衛君不可不救桓公曰寡人有千嵗之食而無百嵗之夀今又疾病姑樂乎且彼非伐寡人之國也伐鄰國也子無事焉宋已取相狄已拔邢衛矣桓公起行筍虡之閒管子從至大鍾之西桓公南面而立管仲北鄉對之大鍾鳴桓公視管子曰樂夫仲父管子對曰此臣之所謂哀非樂也臣聞之古者之言樂於鍾磬之閒者不如此言脫於口而令行乎天下也脫出游鍾磬之閒而無四面兵革之憂今君之事言脫於口令不得行於天下在鍾磬之閒而有四面兵革之憂此臣之所謂哀非樂也桓公曰善於是伐鍾磬之縣斷也伐謂斫併歌舞之樂也併除宫中虚無人掌守之不令人桓公曰寡人以伐鍾磬之縣併歌舞之樂矣請問所始於國將爲何行管子對曰宋伐􅂎狄伐邢衞而君之不救也臣請以慶是故慶之以不救爲臣聞之諸侯爭於彊者勿與分於彊是分於彊若救三國今君何不定三君之處哉定其居處也三君旣失國當於是桓公曰諾因命以車百乗卒千人以縁陵封􅂎車百乗卒千人以夷儀封邢車五百乗卒五千人以楚丘封衞桓公曰寡人以定三君之居處矣今又將何行管子對曰臣聞諸侯貪於利勿與分於利君何不發虎豹之皮文錦以使諸侯令諸侯以縵帛鹿皮報桓公曰諾於是以虎豹皮文錦使諸侯諸侯以縵帛鹿皮報則令固始行於天下矣此其後楚人攻宋鄭燒􅌊熯焚鄭地使城壞者不得復築也屋之燒者不得復葺也令其人有喪雌雄之偶失男女居室如烏䑕處穴要宋田夾塞兩川使水不得東流川築堤而壅塞之故水楚人又􅃒取宋田夾兩川蓋睢汴也不得東流兩東山之西水深滅垝嗇也垝敗四百里而後可田也楚欲吞宋鄭而畏齊曰思人衆兵彊能害己者必齊也於是乎楚王號令於國中曰寡人之所明於人君者莫如桓公所賢於人臣者莫如管仲明其君而賢其臣寡人願事之臣為明賢既以其君事之故願誰能為我交齊者寡人不愛封侯之君焉於是楚國之賢士皆抱其重寳幣帛以事齊桓公之左右無不受重寳幣帛者於是桓公召管仲曰寡人聞之善人者人亦善之今楚王之善寡人一甚矣寡人不善將拂於道之是違於道也拂違也若不報善仲父何不遂交楚哉管子對曰不可楚人攻宋鄭燒􅌊熯焚鄭地使城壞者不得復築也屋之燒者不得復葺也令人有喪雌雄居室如鳥鼠處穴要宋田夾塞兩川使水不得東流東山之西水深滅垝四百里而后可田也楚欲吞宋鄭思人衆兵彊而能害己者必齊也是欲以文克齊服故曰以文克齊以寳幣賂齊而齊自而以武取宋鄭也楚取宋鄭而不止禁是失宋鄭也禁之則是又不信於楚也知失於内兵困於外非善舉也桓公曰善然則若何管子對曰請興兵而南存宋鄭而令曰無攻楚言與楚王遇日遇冬㑹至於遇上而以鄭城與宋水為請楚若許則是我以文令也楚若不許則遂以武令焉桓公曰善於是遂興兵而南存宋鄭與楚王遇於召陵之上而令於遇上曰母貯粟毋曲隄無擅廢適子無置妾以為妻因以鄭城與宋水為請於楚楚人不許遂退七十里而舎使軍人城鄭南之地立百代城焉無敢毁者也取其雖百代而曰自此而北至於河者鄭自城之而楚不敢隳也東發宋田夾兩川使永復東流而楚不敢塞也遂南伐及踰方城濟於汝水望汶山江水所從出汶音岷岷山南致楚越之君而西伐秦北伐狄東存晉公於南晉之南故曰東存自伐秦而遂存晉於北伐孤竹還存燕公兵車之會六乗車之會三九合諸侯反位已霸修鍾磬而復樂管子曰此臣之所謂樂也霸言第二十三以成霸道謂此言足内言六霸王之形象天則地則地義謂象天明化人易代移風俗謂美敎化創制天下更始與之等列諸侯各得其冝列爵惟五賔屬四海以恩屬之賔禮四夷時匡天下而正之時一㑹大國小之曲國正之彊國弱之重國輕之亂國并之揔其威權幷亂所以暴王殘之僇其罪卑其列維其民然后王之滅之於國則戮其首其王之匈暴者則残維持其人衆罪卑其爵列夫豐國之謂霸國者霸也但自豐其兼正之國之謂王國者王兼能正他夫王者有所獨明徳共者不取也道同者不王也者必有獨見大能王天下共彼道與我同則不取而且不王之明羣物之所不違若彼徳與我夫爭天下者以威易危暴王之常也王之常也非霸王之道也若以兵威易彼危亂此固暴君人者有道道也有常霸王者有時遇必後霸王其時然國修而鄰國無道霸王之資也亂侮亡故曰資也我修而彼暴可以取夫國之存也鄰國有焉以為安故曰鄰國有焉雖存而國小弱必事鄰國國之亡也鄰國有焉而取之因其亡鄰國有事鄰國得焉而敗績故鄰國得焉鄰國有征伐之事因鄰國有事鄰國亡焉而多獲遂亡鄰國或有征伐之事大勝天下有事則聖王利也然後有非常之必有非常之事人國危則聖人知矣明故先知懷獨見之夫先王所以王者資鄰國之舉不當也我無因為功舉事皆當則舉而不當此鄰敵之所以得意也以資我不當所意也故得夫欲用天下之權者必先布徳諸侯求無權其可得乎諸侯懐徳而歸欲是故先王有所取有所與之必姑興之所謂將欲取有所詘有所信屈以求伸也所謂尺蠖之然後能用天下之權能用天下之權妙於前四事故夫兵幸於權權幸於地幸兵於得地幸猶勝也在於有權權從在故諸侯之得地利者權從之失地利者權去之夫爭天下者必先爭人邦本人惟明大數者得人審小計者失人得天下之衆者王得其半者霸是故聖王卑禮以下天也夫明王之所輕者馬與玉其所重者政與軍若失主不然輕與人政而重予人馬輕予人軍而重予人玉重宫門之營而輕四竟之守所以削也夫權者神聖之所資也獨明者天下之利器也獨斷者微密之營壘也而即定故曰營壘謂獨斷可以自營此三者聖人之所則也聖人畏微而愚人畏明曰畏微愚人近火方知熱聖人能知吉凶之先見故故曰畏明也履氷乃知寒聖人之憎惡也内愚人之憎惡也外姦謀故憎惡内聖人知心胷之懼故憎惡外也愚人兵在頸方聖人將動必知愚人至危易辭愚者至危不知禍聖人之動必闇知然後湯武之師起也之將至尚有慢易之辭聖人能輔時不能違時其事不能違時而立聖人能因時來輔成則無湯武之功功不有桀紂之暴知者善謀不如當時精時者日少而功多夫謀無主則困事無備則廢是以聖王務具其備而慎守其時以備待時以時興事時至而舉兵絶堅而攻國堅利故能攻國其兵超絶而又破大而制地大本而小摽末小則難崩摽末也本大而埊近而攻逺近故能攻所全之地之有闗中河内也逺而有歸若高光以大牽小以彊使弱以衆致寡徳利百姓威振天下令行諸侯而不拂近無不服逺無不聽夫明王爲天下正理也成天下之功也修正理而動故能案彊助弱也按抑圉暴止貪存亡定危繼絶世此天下之所載也爲天下所載徳義如此故諸侯之所與也也與親百姓之所利也是故天下王之以爲王天下樂推知蓋天下繼最一世續亡能其繼敗之功也成天下材振四海王之佐也千乗之國可得其守諸侯可得而臣天下可得而有也萬乗之國失其守國非其國也天下皆理已獨亂國非其國也諸侯皆令者之令皆從霸已獨孤國非其國也鄰國皆險已獨易無守禦之備也易平易不牢固謂國非其國也此三者亡國之徴也夫國大而政小者國從其政國從其政小政䠞國故國小而政大者國益大故國益大大政開國大而不爲者復小日損故復小大而不爲則彊而不理者復弱紀亂故復弱也彊而不理則綱衆而不理者復寡人散故復寡衆而不理則貴而無禮者復賤奪故復賤也貴而無禮則位重而凌節者復輕威喪故復輕重而凌節則富而驕肆者復貧竭故復貧也富而驕肆則財故觀國者觀君化主君為觀軍者觀將兵本將為觀備者觀野則國不侵野有障塞其君如明而非明也而内外明暗其將如賢而非賢也内愚外賢而其人如耕者而非耕也鹵莽雖耕而三守既失國非其國也既失謂是而非三守謂明賢耕地大而不為命曰土滿功狹也謂土廣而人衆而不理命曰人滿而政少謂人多兵威而不止命曰武滿知進而不知退也所謂亢之為言也三滿而不止國非其國也敗亡立至三滿不止地大而不耕非其地也則無所獲地大不耕卿貴而不臣非其卿也敵也謂卿大夫卿貴不臣化為人衆而不親非其人也欲亡者也人衆不親夫無土而欲富者憂猶縁木而無土欲富故憂求魚無徳而欲王者危進而却行故危無徳而王猶欲施薄而求厚者孤求厚施薄應故孤人必不夫上夾而下苴狹故為下所苞苴苞裹也上旣國小而都大者弑簒弑之禍此二者常有主尊臣卑上威下敬令行人服理之至也使天下兩天子天下不可理也一國而兩君一國不可理也一家而兩父一家不可理也必爭亂之本也凡此所謂兩推夫令不高不行不搏不聽高不聚而聽之搏聚也君命不堯舜之人非生而理也而理化之桀紂之人非生而亂也而亂效之故理亂在上也夫霸王之所始也以人為本本理則國固本亂則國危故上明則下敬政平則人安士敎和則兵勝敵使能則百事理親仁則上不危任賢則諸侯服霸王之形之形容説霸王徳義勝之智謀勝之兵戰勝之地形勝之動作勝之故王之故可以王有此五勝夫善用國者因其大國之重以其勢小之因彊國之權以其勢弱之因重國之形以其勢輕之有時而衰盈者有時而息故因其衰凡大彊重皆國之盈盛者也然盛者者弱之重者輕之息之勢大者小之彊弱國衆合彊以攻弱以圖霸國雖彊適可圖霸謂時彊國衆多吾彊國少合小以攻大以圖王攻彊大之􅀦如此者可以圖王謂時彊國既少我則合衆聚小以彊國衆而言王勢者愚人之智也之時非言王彊國少而施霸道者敗事之謀也之時非施霸夫神聖視天下之形知動靜之時視先後之稱知禍福之門彊國衆先舉者危後舉者利爲彊者所圖故彊國衆先舉必危彊國少先舉者王後舉者亡戰國衆後舉可以霸戰國少先舉可以王夫王者之心方而不最未爲其最心雖方直列不讓賢爵位雖列賢後不讓賢不齒弟擇衆弟又非選衆而舉也雖稱爲賢無􅄖劣齒是貪大物也寳之位有大物謂大利而無得位之實也此數者是定貪大位之是以王之形大也小數得不可以夫先王之爭天下也以方心以爭天下也心方而最故可其立之也以整齊故可立也整齊而之其理之也以平易故可理平而易之立政出令用人道合人心政令須施爵禄用地道而無私地道平舉大事用天道可以舉大事心應天時然後是故先王之伐也伐逆不伐順伐險不伐易伐過不伐及過者伐其太四封之内以正使之使之以正無怨則人諸侯之會以權致之不敢不來以權致之則近而不服者以地患之其地侵削服則自逺而不聽者以刑危之征之興師以一而伐之武也伐之此其武也守一不移興師服而舍之文也以徳此其文也既服舍之綏之文武具滿徳也可以滿其徳唯文武諸功夫輕重彊弱之形諸侯合則彊孤則弱􅂹之材而百馬伐之􅂹必罷矣彊最一伐而天下共之國必弱矣彊國得之也以收小其失之也以恃彊小國得之也以制節節故得制度合其失之也以離彊則乖離彊故失節者也夫國小大有謀彊弱有形服近而彊逺國故曰彊逺謂用彊兵威逺王國之形也合小以攻大敵國之形也以負海攻負海攻蠻夷蠻謂以蠻夷固故曰負海夷負海以為中國之形也折節事彊以避罪小國之形也自古以至今未嘗有能先作難違時易形以立功名者無有有此言無事常先作難違時易形無不敗者也夫欲臣伐君湯武之於桀以臣伐君若也紂正四海者不可以兵獨攻而取也下事謂當兼必先定謀慮便地形利權稱親與國視時而動王者之術也夫先王之伐也舉之必義用之必暴加於􅁀亂其用師必相形而知可亡之形謂相其亂量力而知攻攻得而知時是故先王之伐也必先戰而后攻先攻而后取地故善攻者料衆以攻衆衆然後攻餘倣此量吾衆寡可敵彼料食以攻食料備以攻備以衆攻衆衆存不攻能亡之故不攻彼衆存則我不以食攻食食存不攻以備攻備備存不攻釋實而攻虚而避之知其實釋堅而攻膬釋難而攻易夫摶國不在敦古之冝搏聚也在於合今時理世不在善攻權宜在於霸王不在成曲大體在於全夫舉失而國危刑過而權倒權柄倒錯刑罰過理則謀易而禍反禍必反來謀事數易計得而彊信申音功得而名從權重而令行固其數也理也數猶夫爭彊之國必先爭謀爭刑爭權三爭先此爭彊然後令人主一喜一怒者謀也謀失則怒謀得則喜令國一輕一重者刑也喜刑則輕怒刑則重令兵一進一退者權也權輕則退權重則進故精於謀則人主之願可得而令可行也精於刑則大國之地可奪彊國之兵可圉也精於權則天下之兵可齊諸侯之君可朝也夫神聖視天下之刑知世之所謀知兵之所攻知地之所歸知令之所加矣夫兵攻所憎而利之此鄰國之所不親也國而以攻得兵攻所憎之國必怨而不親為利徳義不施鄰權動所惡而實寡歸者彊而徳義之實少為人其威權能動移所惡已不能至覇王也所歸如此但彊而擅破一國彊在後世者王􅀓之後世如此者王也今能專破一國常守其彊擅破一國彊在鄰國者亡鄰國得之如此者亡也既破一國不能守彊令問第二十四當察問者謂為國所内言七凡立朝廷問有本紀有根本綱紀所問之事必爵授有徳則大臣興義祿予有功則士輕死節上帥士以人之所戴則上下和者皆人之所戴上帥其士所為下和仰故上授事以能則人上功事故人上功有能然後得審刑當罪則人不易訟其罪故人不交相訟易猶交也所刑皆當無亂社稷宗廟則人有所宗其正則人知所社稷宗廟各得宗毋遺老忘親則大臣不怨令不遺忘故不怨大臣非國老則君親舉知人急則衆不亂行此道也以示人則人不復行此道急謂困艱也舉困難之事國有常經人知終始此霸王之術也所歸如此者霸王之術也國有常經則人知終始之然後問事事先大功則勞臣恱先問大功政自小始微而至著為政先小從問死事之孤其未有田宅者有乎則給未有死王事之子孫與之死事孤謂問少仕而未勝甲兵者幾何人預有所凖知其數則問死事之寡其餼廪何如餼餼生食廪米粟之屬寡謂其妻餼廪言給其問國之有功大者何官之吏也知其材之所當問何官之吏欲問州之大夫也何里之士也知其風俗所問何州里欲尚好今吏亦何以明之矣其優賞厚薄問吏所明欲知問刑論有常以行不可改也今其事之久留也何若可改易者也今乃久留其事將如之何罪既論決國有常科當奉而行之此不問五官有度制官都其有常斷今事之稽也何待者也五官既各有官都謂揔攝諸司稽其事而不行將何待乎制度官都復自有常斷今乃問獨夫寡婦孤寡疾病者幾何人也有所廪餼知其人數當問國之棄人何族之子弟也四裔者也問知其族欲棄人謂有過不齒投之收也有所問鄉之良家其所牧養者幾何人矣者牧養謂其人不能自良家謂善營生以致富養之數欲有所復除也存良家全活之知其所問邑之貧人債而食者幾何家富者出息以債而食謂從欲有所矜免也供食知其家數問理園圃而食者幾何家人之開田而耕者幾何家士之身耕者幾何家問鄉之貧人何族之别也而别或從知從何族所收恤也公族當有問宗子之牧昆弟者以貧從昆弟者幾何家從昆弟以貧故者各有㡬家也以求養者與之從餘子仕而有田邑今入者幾何人其稅者謂收入子弟以孝聞於鄉里者幾何人餘子父母存不養而出離者幾何人在分居者出離謂父母士之有田而不使者幾何人吏惡何事其吏不惡此不使謂不用何事等當惡士之有田而不耕者幾何人身何事身爲何事既不耕此人君臣有位而未有田者幾何人外人之來從而未有田宅者幾何家國子弟之游于外者幾何人貧士之受責於大夫者幾何人夫貴者有幾人貧士無資而被大官賤行書身士以家臣自代者幾何人官乃賤其人居家臣自代亦須知其數也自行文書身任士職輒以官承吏之無田餼而徒理事者幾何人餼而空理事承吏謂攝官無羣臣有位事官大夫者幾何人乃左官於大夫羣臣自有位事外人來游在大夫之家者幾何人外國人外人謂鄉子弟力田為人率者幾何人又能率人既自力田國子弟之無上事衣食不節率子弟不田弋獵者幾何人弟不田農但弋獵既無上事乃率子男女不整齊亂鄉子弟者有乎禮交者謂不以問人之貸粟米有别劵者幾何家分契也别劵謂問國之伏利其可應人之急者幾何所也銀山及溝瀆可決而溉灌者伏利謂貨利隱蔽不見若銅人之所害於鄉里者何物也者害何物人之為害問士之有田宅身在陳列者幾何人餘子之勝甲兵有行伍者幾何人問男女有巧伎能利備用者幾何人器之用能利備處女操工事者幾何人謂綺繡之屬也能操女工之事冗國所開口而食者幾何人直開口仰食言其不農作問一民有幾年之食也問兵車之計幾何乗也牽家馬軛家車者幾何乗有馬軛家車牽家馬言直配以成乗言直有車相處士修行足以教人可使帥衆莅百姓者幾何人士之急難可使者幾何人急難使者謂士之可以工之巧出足以利軍伍處可以修城郭補守備者幾何人軍居處則可以修城補備也其人既有技巧出用則能利城粟軍粮其可以行幾何年也粮謂出軍之粮二者可經幾年行由經也城粟謂守城之粟軍吏之急難可使者幾何人大夫䟽器畫也䟽謂飾甲兵兵車旌旗鼓鐃帷幕帥車之載幾何乗車蓋載謂其䟽藏器以藏者䟽畫而可弓弩之張以張者弓弩之可衣夾鋏夾謂其衣也鋏兩刃鈹也衣鈎􅁌之造以挽􅁌鈎􅁌所戈㦸之緊堅彊者緊謂其其厲何若用何如其淬厲可其冝修而不修者故何視修者於故物何比視比也其器物冝而造修之官出器處器之具冝起而未起者何待貯庫而為備者起謂其材所出器謂可出用之器處器謂起用者也經日月可鄉師車輜造脩之具其繕何若蔽可以重載者輜謂車之有防工尹伐材用毋於三時羣材乃植而造器定冬皃良備用必足官之長工尹工堅故不可伐材其伐材必以冬也三時謂春夏秋此時木方生植不人有餘兵詭陳之行以慎國常戰方伍當愼而聽命遵國之常令也有餘兵不用且詭而陳之以為行時簡稽帥馬牛之肥膌其老而死者皆舉之至於馬牛肥膌及老而死者皆舉之以知其數也軍之統帥常時簡選稽考之以知其能不而有黜陟其就山藪林澤食薦者幾何美者薦草之出入死生之會幾何其數會謂合若夫城郭之厚薄溝壑之淺深門閭之尊卑冝脩而不脩者上必幾之必察知之幾察也君守備之伍器物不失其具滛雨而各有處藏物器敗故當有藏處遇雨不藏必致髙問兵官之吏國之豪士其急難足以先後者幾何人數相導前後曰先後詩曰予曰有先後官吏國豪有急難可令之先後者當知其夫兵事者危物也不時而勝不義而得未為福也然後為福必合於時義失謀而敗國之危也愼謀乃保國問所以敎選人者何事何事欲知其勤且觀其其敎人及選人者問以也材用問執官都者其位事幾何年矣及執事并建立之年數執官都之職者問其官位所辟草萊有益於家邑者幾何矣所封表以益人之生利者何物也封表以示之問知是何物也謂其事業最可以益人者遂所築城郭脩牆閉絶通道阨闕深防溝以益人之地守者何所也而為妨礙者絶塞之阨闕空之牆閉謂築牆有所遮閉雖通路以省其功費故曰益地守處亦當絶之凡此守地者所所捕盜賊除人害者幾何矣制地君曰理國之道地徳為首法地以為政故曰地德為首當制地之時君為此言故言曰君臣之禮高下地有禮也君臣之父子之親承父子之親也高地下覆下地上覆育萬人生焉故曰覆育萬人百貨出於地人得以官府之藏彊兵保國城郭之險外應四極府已下非地則無所容居四極謂國之四鄙也自官具取之地故曰具取之地凡此皆因地而成而市者天地之財具也不入海於市求而得求天地之財不登山地之財具之故曰天而萬人之所和而利也因市交易而得利和謂交易也萬人正是道也合道之言市正理民荒無苛人盡地之職一保其國地之職自然齊一而保國也欲理荒人無得苛虐但使盡各主異位毋使讒人亂普而徳營九軍之親主之無使讒人交亂普廢自君以下其位既異當各軍之親自營也其徳如此則九􅀜者諸侯之陬隧也之道也謂陬隅而外財之門戶也因之而入他國之財萬人之道行也出入謂因此明道以重告之再重而告之當明道路之令征於􅀜者勿征於市謂行商征於闗征於市者勿征於􅀜謂坐賈征於市虚車勿索其煩擾索虚車益徒負勿入勿令入其征徒負貨既寡故以來逺人以來逺人關政如此可十六道同皆置關並同此令齊國凡有十六道身外事謹則聽其名外事既謹而從令則謂出入於關者身之之眞僞也當聽其名視其名視其色視其色之是非旣知其名又須是其事稽其德色又須旣知其考合其德也是正其事以以觀其外其外以校量之旣知其德又觀則無敦於權人以困貌德校察行則困厚姦非因而不生故曰以困貌德敦猶厚也校察如此則權詐之人無以成其厚國則不惑行之職也無國此掌行者之職姦人所以不惑凡問於邊吏曰小利害信小怒傷義邊信傷德故傷德也邊人失信厚和構四國以順貌德之來皆以誠信故曰以順貌徳敦厚而和可以構結四國四國后鄉四極四極而撫安之旣結四國然後向令守法之官日行行邊鄙與關塞又令守法之官日度必明失經常制度無得失於經常其巡行之時必明其謀失第二十五管子卷第九􅌊反而恱
