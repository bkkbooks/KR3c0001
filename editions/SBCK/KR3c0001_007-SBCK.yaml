  text: 管子卷第七
  hash: sha256:c39f2ea62686c6f0693a115e132e0089a2b8c9e777ccc4788dc964dc97278c58
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3c0001_SBCK_007-1a}
body:
  text: 大匡第十八大匡第十八事匡君謂以大内言一齊僖公生公子諸兒公子糺公子小白使鮑叔傅小白鮑叔辭稱疾不出管仲與召忽往見之曰何故不出鮑叔曰先人有言曰知子莫若父知臣莫若君今君知臣之不肖也是以使賤臣傅小白也肖而賤故難為之傅也鮑叔以小白年㓜又不賤臣知棄矣召忽曰子固辭無出吾權任子以死亡必免子疾困至於死亡此可以免子之身任保也君若有疑我當保子以鮑叔曰子如是何不免之有乎免也言必管仲曰不可言非以召忽持社稷宗廟者不讓事不廣閒讓難事而廣求閑安社稷宗廟至重故不可將有國者未可知也可的知其人於三公子未子其出乎召忽曰可吾三人者之於齊國也譬之猶鼎之有足也去一焉則必不立矣異其出處言三人不可吾觀小白必不爲後矣管仲曰不然也夫國人憎惡糺之母以及糺之身而憐小白之無母也諸兒長而賤事未可知也夫所以定齊國者非此二公子者將無己也既不能定齊國而又不立小二公子謂諸兒子糺言二子謂小白必得立矣白即是將更無所用小白之爲人無小智惕而有大慮能惕懼而有言雖無小智慮大非夷吾莫容小白俗人故非夷吾莫能客小白既無小智必乖迕於天不幸降禍加殃于齊糺雖得立事將不濟非子定社稷其將誰也小白輔小白而糺既不濟次在而誰子謂召忽定社稷者非子召忽曰百歳之後吾君卜世犯吾君命而廢吾所立奪吾糺也雖得天下吾不生也也君命謂僖公之命使立子糺吾君卜世謂僖公之子小白等我當致死今而奪焉兄與我齊國之政也受君令而不改奉所立而不濟是吾義也而立子糺不改其所奉更有所立不濟而死是爲臣之義也召忽稱管仲爲兄與我齊國之政謂使知政也今受君令管仲曰夷吾之爲君臣也義與召忽異言已立君臣之將承君命奉社稷以持宗廟豈死一糺哉致死不死於一糺言當爲宗廟社稷夷吾之所死者社稷破宗廟滅祭祀絶則夷吾死之非此三者則夷吾生夷吾生則齊國利夷吾死則齊國不利鮑叔曰然則奈何管子曰子出奉令則可有所依故曰可子出奉令則小白鮑叔許諾乃出奉令遂傅小白鮑叔謂管仲曰何行當何所行問其事君管仲曰爲人臣者不盡力於君則不親信親信不為君不親信則言不聽言不聽則社稷不定夫事君者無二心之所行此事君鮑叔許諾僖公之母弟夷仲年生公孫無知有寵於僖公衣服禮秩如適與適子同言無知之寵僖公卒以諸兒長得為君是爲襄公襄公立后絀無知無知怒公令連稱管至父戍葵丘曰爪時而往及爪時而來期戌公問不至請代不許故二人因公孫無知以作亂魯桓公夫人文姜齊女也公將如齊與夫人皆行桓公公謂申俞諌曰不可大夫也申俞魯女有家男有室男有妻之室女有夫之家無相瀆也謂之有禮公不聽遂以文姜㑹齊侯於濼文姜通於齊侯桓公聞責文姜文姜告齊侯齊侯怒饗公使公子彭生乗魯侯脅之拉其脅而殺之乗謂扶公升車公薨于車竪曼曰大夫也竪曼齊賢者死忠以振疑百姓寓焉義以救當時之疑故振救也賢者死於忠焉寓寄託也百姓有所託智者究理而長慮身得免焉又長故免於危亡智者既盡理而謀慮今彭生二於君從之於昬故曰二不以正道輔君而無盡言而䛕行以戲我君使我君失親戚之禮命其妹故曰失親戚之禮命無盡言謂不忠諫襄公通又力成吾君之禍以構二國之怨故曰力成吾君之禍恃其多力拉殺魯君彭生其得免乎禍理屬焉敗禍於彭生之理屬夫君以怒遂禍則遂成其禍君怒魯桓彭生不畏惡親聞容昬生無醜也此昬愚之生於不識其類故曰昬生無醜醜類也君而通妹是謂惡親不畏此事逺聞而容忍之然豈及彭生而能止之哉能之今而成禍故當誅之及如也禍由彭生則彭生力魯若有誅必以彭生爲說二月魯人告齊曰寡君畏君之威不敢寧居來脩舊好禮成而不反無所歸死請以彭生除之齊人為殺彭生以謝于魯五月襄公田于貝丘見豕彘從者曰公子彭生也公怒曰公子彭生安敢見射之豕人立而啼公懼墜於車下傷足亡屨反誅屨於徒人費不得也責誅鞭之見血費走而出遇賊於門脅而束之費祖而示之背賊信之使費先入伏公而出鬭死于門中石之紛如死于階下孟陽代君寢于牀賊殺之曰非君也不類見公之足于户下遂殺公而立公孫無知也鮑叔牙奉公子小白奔莒管夷吾召忽奉公子糺奔魯九年公孫無知虐於雍廩雍廩殺無知也桓公自莒先入魯人伐齊納公子糺戰於乾時管仲射桓公中鈎魯師敗績桓公踐位於是刼魯使魯殺公子糺兵脅之刼謂興桓公問於鮑叔曰將何以定社稷鮑叔曰得管仲與召忽則社稷定矣公曰夷吾與召忽吾賊也鮑叔乃告公其故圖叔傅小白將立之故圖謂管仲本使鮑公曰然則可得乎鮑叔曰若亟召則可得也不亟不可得也夫魯施伯知夷吾為人之有慧也其謀必將令魯致政於夷吾夷吾受之則彼知能弱齊矣夷吾不受彼知其將反於齊也必將殺之不旣其將為魯害故殺之受魯政而反於齊恐公曰然則夷吾將受魯之政乎其否也鮑叔對曰不受夫夷吾之不死糺也為欲定齊國之社稷也今受魯之政是弱齊也夷吾之事君無二心雖知死必不受也桓公君謂公曰其於我也曽若是乎二心如是乎曽則也則能無鮑叔對曰非為君也為先君也其於君不如親糺也多於小白也言管仲親糺糺之不死而況君乎䟽則可知親尚不死君若欲定齊之社稷則亟迎之齊社稷故須急管仲旣志在定之迎公曰恐不及奈何鮑叔曰夫施伯之為人也敏而多畏念慮深多畏則公若先反恐注怨焉必不殺也之齊必注怨故不敢若先反管仲而施伯殺公曰諾叔之從鮑也言施伯進對魯君曰管仲有急其事不濟今在魯君其致魯之政焉不濟故來在魯可因此事而致政有急難之事與小白爭國其事既若受之則齊可弱矣若不受則殺之殺之以說於齊也與同怒尚賢於己仲反齊為施伯恐管怒如此猶賢於不殺也害欲殺之有若與齊同君曰諾魯未及致政而齊之使至曰夷吾與召忽也寡人之賊也今在魯寡人願生得之若不得也是君與寡人賊比也魯君問施伯施伯曰君與之臣聞齊君惕而亟驕雖得賢庸必能用之乎何也庸猶及齊君之能用之也管子之事濟也之管子之事必濟矣及猶就也就令能用夫管仲天下之大聖也今彼反齊天下皆鄉之豈獨魯乎今若殺之此鮑叔之友也鮑叔因此以作難君必不能待也不能待待猶擬齊國强鮑叔賢故不如與之魯君乃遂束縛管仲與召忽管仲謂召忽曰子懼乎召忽曰何懼乎吾不蚤死將咠有所定也待咠令既定矣已定齊謂小白令子相齊之左必令忽相齊之右雖然殺君而用吾身是再辱我也謂君也子子為生臣忽為死臣死則顯忠義生則定社稷忽也知得萬乗之政而死公子糺可謂有死臣矣子生而霸諸侯公子糺可謂有生臣矣死者成行義之行死成忠生者成名稷之名生定社名不兩立可又成死名旣成生名不行不虚至乃謂之行也必致身受命子其勉之死生有分矣乃行入齊境自刎而死管仲遂入君子聞之曰召忽之死也賢其生也之生召忽諸侯不能霸管仲之生也賢其死也成九合之功管仲之死不或曰明年聞異說故集書者更公立之明年也言或曰明年襄襄公逐小白小白走莒三年襄公薨公子糺踐位國人召小白鮑叔曰胡不行矣小白曰不可夫管仲知召忽强武雖國人召我我猶不得入也鮑叔曰管仲得行其知於國國可謂亂乎不亂今亂是不得行其智管仲得行其智於國國則召忽强武豈能獨圖我哉不與召忽圖我國人既召小白則小白曰夫雖不得行其知豈且不有焉乎不得言無智直是智不行召忽雖不得衆其反豈不足以圖我哉衆若反獨能召忽雖不得我圖鮑叔對曰夫國之亂也智人不得作内事則其國理智人作内事朋友不能相合摎而國乃可圖也合則黨與弱故乃可圖摎交入也朋友不能相交乃命車駕鮑叔御小白乗而出於莒小白曰夫二人者奉君令吾不可以試也則致死拒我故不可試也二人謂管仲召忽奉君令乃將下鮑叔履其足曰事之濟也在此時事若不濟老臣死之公子猶之免也濟則已致死公鮑叔言事若不得免脫子猶可乃行至於邑郊鮑叔令車二十乗先十乗後鮑叔欲與二十乗先後令衛公子之入國十乗鮑叔乃告小白曰夫國之疑二三子莫忍老臣三二老臣故相從中心實疑子謂從小白者不忍違事之未濟也老臣是以塞道以二十乗先以事未濟故道行塞鮑叔乃誓曰事之濟也聽我令事之不濟也免公子者為上死者為下吾以五乗之實距路先行距路不令子糺之黨得鮑叔於前二十乗更將五乗白及小鮑叔乃為前驅遂入國逐公子糺管仲射小白中鈎管仲與公子糺召忽遂走魯桓公踐位魯伐齊納公子糺而不能桓公二年踐位方得踐位入國二年召管仲管仲至公問曰社稷可定乎管仲對曰君霸王社稷定君不霸王社稷不定公曰吾不敢至於此其大也定社稷而巳管仲又請君曰不能管仲辭於君曰君免臣於死臣之幸也然臣之不死糺也為欲定社稷也社稷不定臣禄齊國之政而不死糺也臣不敢室食齊政旣不死糺則不敢言將致死之禄而不定社稷臣乃走出至門公召管仲管仲反公汗出勿巳其勉霸乎我將勉力而求霸也必欲令霸王而不巳管仲再拜稽首而起曰今日君成霸臣貪承命趨立於相位承命故趨立相位君旣許霸臣貪於乃令五官行事異日公告管仲曰欲以諸侯之閒無事也小脩兵革管仲曰不可百姓病公先與百姓而藏其兵之而兵事且可藏百姓困病當先賦與與其厚於兵不如厚於人自强人厚兵齊國之社稷未定公未始於人而始於兵外不親於諸侯内不親於民公曰諾政未能有行也二年桓公彌亂之言故彌亂不盡行夷吾又告管仲曰欲繕兵管仲又曰不可公不聽果爲兵桓公與宋夫人飲舡中夫人蕩舡而懼公公怒出之宋受而嫁之蔡侯明年公怒告管仲曰欲伐宋管仲曰不可臣聞内政不脩外舉事不濟公不聽果伐宋諸侯興兵而救宋大敗齊師公怒歸告管仲曰請脩革吾士不練吾兵不實諸侯故敢救吾讎内脩兵管仲曰不可齊國危矣内奪民用士勸於勇外亂之本也士所勸者唯勇則輕敵故脩兵則用廢故曰奪人用之本也為外亂外犯諸侯民多怨也故為人所怨外犯必多殘害爲義之士不入齊國義士不歸也君為不義故安得無危鮑叔曰公必用夷吾之言公不聽乃令四封之内脩兵關市之征侈之謂重其稅賦侈謂過常也公乃遂用以勇授禄與之禄士勇則鮑叔謂管仲曰異日者公許子霸今國彌亂子將何如管仲曰吾君惕其智多誨試誨之也智多則可姑少胥其自及也自能及道胥待也待其鮑叔曰比其自及也國無闕亡乎管仲曰未也國中之政夷吾尚微爲焉亂乎尚可以待至亂可待君自國政微為則未及外諸侯之佐既無有吾二人者未有敢犯我者無有如我二諸侯之佐旣敢犯我人故不明年朝之爭禄相刺裚計子而刎頸者不絶斷之也裚謂掣鮑叔謂管仲曰國死者衆矣毋乃害乎管仲曰安得已然此皆其貪民也未能自為害也貪人爭禄自殘亦夷吾之所患者諸侯之爲義者莫肯入齊齊之為義者莫肯仕此夷吾之所患也不歸亂亡立至有義之士内外患也故可若夫死者吾安用而愛之吾何能惜之貪人自相殺傷公又内脩兵三年桓公將伐魯曰魯與寡人近相隣謂國於是其救宋也疾謂疾侯至先諸寡人且誅焉管仲曰不可臣聞有土之君不勤於兵不忌於辱不輔其過則社稷安勤於兵忌於辱輔其過則社稷危公不聽興師伐魯造於長勺魯莊公興師逆之大敗之桓公曰吾兵猶尚少吾參圍之安能圉我之則何能圉我吾以三倍之兵圍四年脩兵同甲十萬堅齊等同甲謂完車五千乗謂管仲曰吾士既練吾兵既多寡人欲服魯管仲喟然嘆曰齊國危矣君不競於徳而競於兵逺不當競於兵也人君當以徳義服天下之國帶甲十萬者不鮮矣吾欲發小兵以服大兵故曰以小兵而服大兵也欲以齊國服諸矦而致霸王内失吾衆則衆疲而散謂數摇動之諸侯設備故設備數見侵伐吾人設詐詐以繼之力不足則國欲無危得已乎公不聽果伐魯魯不敢戰去國五十里而為之關立更為之闗國界而魯請比於關内以從于齊齊亦母復侵魯齊供其㣲求魯請從服於之闗内比於齊桓公許諾魯人請盟曰魯小國也固不帶劒今而帶劒是交兵聞於諸侯君不如己不如止而不盟也若以交兵聞於諸侯請去兵桓公曰諾乃令從者毋以兵管仲曰不可諸侯加忌於君君如是以退可君今請不盟從此即退可也忌怨也諸侯欲以結盟致怨於君果弱魯君諸侯又加貪於君又以貪名加君若果弱魯諸侯後有事小國彌堅大國設備名故皆設備既有貪忌之非齊國之利也桓公不聽管仲又諌曰君必不去魯胡不用兵曹劌之爲人也堅强以忌不可以約取也取信也不可以盟桓公不聽果與之遇莊公自懐劒曹劌亦懐劒踐壇莊公抽劔其懐曰魯之境去國五十里亦無不死而已左椹桓公右自承曰均之死也戮死於君前魯境亦死今殺君亦死同是死也將殺君次自殺左手舉劔將椹桓公且以右手自承而言曰齊迫戮死於君前故曰均之死也管仲走君曹劌抽劒當兩階之閒曰二君將改圖無有進者欲改先者之所圖今不當有進者也拔劒當階所以拒管仲言魯齊二君將管仲曰君與地以汶爲竟桓公許諾以汶為竟而歸桓公歸而脩於政不脩於兵革自圉辟人以過弭師其人以先者之過故弭息其師旣不脩其兵革故出入自圉辟五年宋伐􅂎桓公謂管仲與鮑叔曰夫宋寡人固欲伐之無若諸侯何救宋何無若諸侯夫􅂎明王之後也之後杞夏今宋伐之予欲救之其可乎管仲對曰不可臣聞内政之不脩外舉義不信君將外舉義以行先之先之以内行則諸侯可令附桓公曰於此不救後無以伐宋無辭以伐宋今不救杞後管仲曰諸侯之君不貪於土貪於土必勤於兵勤於兵必病於民民病則多詐夫詐密而後動者勝靜密詐則不信於民夫不信於民則亂内動則危於身是以古之人聞先王之道者不􅔡於兵􅔡之則危兵者凶器桓公曰然則奚若管仲對曰以臣則不不與君同以臣之意則而令人以重幣使之令罷杞兵以重幣使宋使之而不可從令謂宋不君受而封之而建封之受􅂎告命桓公問鮑叔曰奚若鮑叔曰公行夷吾之言公乃命曹孫宿使於宋宋不聽果伐􅂎伐􅂎宋果桓公築縁陵以封之杞城縁陵予車百乗甲一千􅂎也謂與明年狄人伐邢邢君出致於齊以告急致命於齊桓公築夷儀以封之邢城夷儀予車百乗卒千人明年狄人伐衛衛君出致於虚謂升彼虚矣虚地名詩所楚矣以望桓公且封之隰朋賔胥無諌曰不可三國所以亡者絶以小然矣不當封也小國之亡理則今君蘄封亡國國盡若何亡國其若之何國之車盡於封桓公問管仲曰奚若管仲曰君有行之名安得有其實之名則當既有行封得有其富實乎虚國而為之安君其行也公又問鮑叔鮑叔曰君行夷吾之言桓公築楚丘以封之與車三百乗甲五千既以封衛明年桓公問管仲將何行行之政也更問以所管仲對曰公内脩政而勸民可以信於諸侯矣君許諾乃輕稅㢮關市之征爲賦禄之制旣已上事謂已行管仲又請曰問病臣當慰問之臣有病者君願賞而無罰五年諸侯可令傅令諸侯親附行此五年可公曰諾旣行之管仲又請曰諸侯之禮聘之禮請諸侯交令齊以豹皮往小侯以鹿皮報齊以馬往小侯以犬報善下小國則取小國往重報輕所謂大國桓公許諾行之管仲又請賞於國以及諸侯君曰諾行之管仲賞於國中君賞於諸侯諸侯之君有行事善者以重幣賀之從列士以下有善者衣裳賀之謂齊列士以衣裳賀之之列士管仲自凡諸侯之臣有諌其君而善者以璽問之以信其言驗其所諌之言為善謂桓公以璽問之以信公既行之又問管仲曰何行管仲曰隰朋聦明捷給可令爲東國國令隰朋理之東國謂自齊東之賔胥無堅强以良可以爲西土無之國與士交兵西土齊西之土令胥衛國之敎危傅以利髙危且相謂其教旣以利成俗傅以利謂公子開方之爲人也慧以給不能久而樂始可游於衛故曰樂始使此人游於衛誘動之令歸於齊也其人性輕率不能持久所謂靡不有初鮮克有終魯邑之教好邇而訓於禮飾㒵故曰好邇邇近也既訓學於禮禮者所以季友之爲人也恭以精博於糧多小信可游於魯多委積博於糧謂楚國之教巧文以利不好立大義而好立小信䝉孫博於教而文巧於辭不好立大義而好結小信可游於楚小侯既服大侯既附三人於三國所以附大侯厚往輕報所以服小侯游夫如是則始可以施政矣君曰諾乃游公子開方於衛游季友於魯游䝉孫於楚五年諸侯附狄人伐伐齊謂入桓公告諸侯曰請救伐諸侯許諾大侯車二百乗卒二千人小侯車百乗卒千人諸侯皆許諾齊車千乗卒可致縁陵今有狄難故致之先者使卒戍縁陵戰於後故敗狄地名後故其車甲與貨小侯受之及貨盡與小侯謂敗狄所得車甲大侯近者以其縣分之不踐其國之終不踐其國以侵之近齊之大侯則以齊縣分北州侯莫來之州即幽州營州等謂不來救齊北州謂北桓公遇南州侯於召陵於召陵也謂伐楚盟曰狄爲無道犯天子令以伐小國自謂小國齊以天子之故敬天之命令以救伐天命救齊伐狄言諸侯以敬順北州侯莫至上不聽天子令下無禮諸侯寡人請誅於北州之侯諸侯許諾桓公乃北伐令支國名令支下鳬之山斬孤竹斬其君孤竹國名遇山戎顧問管仲曰將何行管仲對曰君教諸侯爲民聚食諸侯之兵不足者君助之發如此則始可以加政矣然後可以加之政也既使諸侯足食足兵桓公乃告諸侯必足三年之食安然後可安有三年食以其餘脩兵革兵革不足以引其事告齊齊助之發者以告齊齊當發卒以助之也諸侯兵之不足當引其事之闕旣行之公又問管仲曰何行管仲對曰君㑹其君臣父子臣父子之冝㑹謂考合其君則可以加政矣公曰㑹之道奈何曰諸侯無專立妾以爲妻毋專殺大臣無國勞毋專予禄不得專予禄於國無勞者士庶人毋專棄妻毋曲隄無障所謂也谷毋貯粟毋禁材與人共之也山澤之材當行此卒歳則始可以罰矣終嵗行之可以加刑罰而有不從者君乃布之於諸侯諸侯許諾受而行之卒嵗呉人伐穀後以封管仲穀齊之下都桓公告諸侯未徧諸侯之師竭至以待桓公其盡來竭至言桓公以車千乗㑹諸侯於竟都師未至呉人逃尚未至而齊都之師逃也吳人諸侯皆罷桓公歸問管仲曰將何行管仲曰可以加政矣故可以加之政諸侯服從如此曰從今以往二年適子不聞孝不聞愛其弟不聞敬老國良之賢良也其老者國三者無一焉可誅也况無三乎無一尚可誅諸侯之臣及國事三年不聞善可罰也聞善則不賢也故可罰及國事預知國政三年不君有過大夫不諫士庶人有善而大夫不進可罰也士庶人聞之吏賢孝悌可賞也之於吏則可賞也士庶人有賢孝悌聞桓公受而行之近侯莫不請事請齊徴賦之事近齊之諸侯皆兵車之㑹六興兵有所伐兵車之㑹謂乗車之㑹三之㑹乗車人之㑹也謂結好息饗國四十有二年桓公踐位十九年㢮關市之征賦征也五十而取一五十之一取其貨賄賦禄以粟案田而稅塉而稅之案知其壤二歳而稅一一稅之率二歳而上年什取三中年什取二下年什取一歳飢不稅揔飢故不稅歳飢謂時歳歳飢㢮而稅飢者故㢮飢而稅不飢此歳飢謂有飢者有不桓公使鮑叔識志音君臣之有善者晏子識不仕與耕者之有善者仕不未仕者謂餘子髙子識工賈之有善者國子爲李官也李獄隰朋爲東國賔胥無爲西土弗鄭爲宅除宫室爲宅掌脩凡仕者近公有公仕者故近公事職務不仕與耕者近門田野故近於外門不仕與耕者當出入工賈近市三十里驕行此三者為下令晏子進貴人之子仲之先晏子平出不仕樂道深不仕則處不華無過失不華則而友有少長則遵禮經友有少長為上舉故為上全此三者得二為次之二也得二三得一為下士處靖敬皃靖卑敬老與貴敬貴近於君敬老近於親交不失禮行此三者爲上舉得二爲次得一為下耕者農農用力不惰勤而應於父兄義孝且事賢多故能多擇善而從行此三者爲上舉得二爲次得一為下令髙子進工賈應於父兄事長養老承事敬而從之也承奉君敬行此三者為上舉得二者爲次得一者為下令國子以情斷獄貴得其情定罪罰者三大夫既已選舉使縣行之鮑叔晏子三大夫謂子髙管仲進而舉言上而見之於君國子主斷獄故不在三大夫之數見三大夫所選舉者此言選舉者以卒年君舉所進者君舉用之也卒年謂終年如此管仲管仲告鮑叔曰勸國家不得成而悔從政不治不能野原又多而發告發言相訟驕而驕既訟凡三者有罪無赦告晏子曰貴人子處華下下則淫泆處華屋之交好飲食嗜歛食則道情薄重交好則挾朋黨行此三者有罪無赦士出入無常不敬老而營富行此三者有罪無赦耕者出入不應於父兄用力不農不事賢行此三者有罪無赦告國子曰工賈出入不應父兄承事不敬而違老治危險也危傾行此三者有罪無赦凡於父兄無過州里稱之吏進之君用之里吏進此人君必用之無過於父兄見稱於州有善無賞有過無罰吏不進廉意則茍免而已故不進廉意也有善不能賞有過不能罰吏於父兄無過於州里莫稱吏進之君用之善為上賞不善吏有罰於父兄雖無過人善則吏受上賞不善則吏當罰而州里不稱吏進此人君承用之其君謂國子凡貴賤之義入與父俱子賤也父貴而出與師俱資賤也師貴而上與君俱臣賤君貴而凡三者遇賊不死不知賊則無赦此三者遇之而不能死有賊而又不知則不臣不子也言人於此三者所在當致死所謂在三如一今賊將害赦也故無斷獄情與義易義與禄易所以興禮義今犯罪者非以乖凡㫁獄者所以止罪邪止罪邪姦偽易禄也僻易義則以易禄可無斂有可無赦歛其禄然今所有罪必無赦之也姦偽易禄者既當罰其罪可無
