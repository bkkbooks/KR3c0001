body:
  text: 中匡第十九小匡第二十王言第二十一中匡第十九内言二管仲會國用三分二在賔客賔客二以供其一在國管仲懼而復之費太半故白之復白也以賔客之公曰吾子猶如是乎義為急務尚懼而白之乎以吾子為賢當以供賔之四鄰賔客入者說出者譽出必為延譽也入見禮而恱者光名滿天下入者不說出者不譽汙名滿天下壤可以爲粟生粟播壤則木可以爲貨器則貨破木成粟盡則有生貨散則有聚君人者名之爲貴財安可有故不可有有財則失名管仲曰此君之明也公曰民辦軍事矣則可乎對曰不可甲兵未足也請薄刑罰以厚甲兵於是死罪不殺刑罪不罰使以甲兵贖兵以贖之也有罪使出甲死罪以犀甲一㦸刑罰以脅盾一㦸也既脅盾出一㦸也出盾又令過罰以金金以贖之過誤致罰出軍無所計而訟者成以束矢計不束矢以平其罪成平也於軍事而以私訟者令出公曰甲兵既足矣吾欲誅大國之不道者可乎對曰愛四封之内而后可以惡竟外之不善者四封之内先施愛於惡竟外之不善則士致死故可以安卿大夫之家而后可以危救敵之國則大臣盡力卿大夫家安敵之國故以危救賜小國地而后可以誅大國之不道者舉賢良而后可以廢慢法鄙賤之民是故先王必有置也而后必有廢也必有利也而后必有害也桓公曰昔三王者旣弑其君今言仁義則必以三王爲法度不識其故何也對曰昔者禹平治天下及桀而亂之湯放桀以定禹功也湯平治天下及紂而亂之武王伐紂以定湯功也且善之伐不善也自古至今未有改之君何疑焉公又問曰古之亡國其何失對曰計得地與寳而不計失諸侯計得財委而不計失百姓計見親而不計見棄三者之屬一足以削遍而有者亡矣古之隳國家隕社稷者非故且爲之也必少有樂焉不知其䧟於惡也桓公謂管仲曰請致仲父尊事管仲故以仲父之號致之仲父者尊老有徳之稱桓公欲公與管仲父而將飲之以尊顯之行飲酒禮掘新井而柴焉欲以㓗清示敬之新井而又柴蓋之十日齋戒召管仲管仲至公執爵夫人執尊觴三行管仲趨出公怒曰寡人齋戒十日而飲仲父寡人自以爲脩矣仲父不告寡人而出其故何也出所以怒謂不辭而鮑叔隰朋趨而出及管仲於途曰公怒管仲反入倍屏而立公不與言少進中庭公不與言少進傅堂公曰寡人齋戒十日而飲仲父自以爲脱於罪矣仲父不告寡人而出未知其故也對曰臣聞之沉於樂者洽於憂憂博樂過則厚於味者薄於行慢於朝者緩於政害於國家者危於社稷臣是以敢出也公遽下堂曰寡人非敢自爲脩也仲父年長雖寡人亦衰矣吾願一朝安仲父也一朝樂飲而為安言俱至於衰老故欲對曰臣聞壯者無怠老者無偷順天之道必以善終者也三王失之也非一朝之萃非一朝萃集也其所由來者漸矣君柰何其偷乎管仲走出君以賔客之禮再拜送之明日管仲朝公曰寡人願聞國君之信對曰民愛之鄰國親之天下信之此國君之信公曰善請問信安始而可對曰始於爲身中於爲國成於爲天下公曰請問爲身對曰道血氣以求長年長心長徳長徳謂恩施廣也長心謂謀慮逺也此爲身也公曰請問爲國對曰逺舉賢人慈愛百姓外存亡國繼絶世起諸孤事者子孫孤謂死王薄稅斂輕刑罰此爲國之大禮也法行而不苛刑廉而不赦有司寛而不凌􅑏獨不虐菀濁困滯皆法度不亡也有如此者皆以法度加之不令有所失亡也鬱濁謂穢塞不潔清者也困滯謂疲羸微隱者往行不來而民游世矣而退而人以此自得行於世也其行法度者但往行而進不却來此爲天下也小匡第二十内言三桓公自莒反于齊使鮑叔牙爲宰鮑叔辭曰臣君之庸臣也君有加惠於其臣使臣不凍飢則是君之賜也若必治國家則非臣之所能也其唯管夷吾乎臣之所不如管夷吾者五寛惠愛民臣不如也治國不失秉臣不如也國柄者賞罰之紀要也秉柄也柄所操以作事忠信可結於諸侯臣不如也制禮義可法於四方臣不如也介胄執枹立於軍門使百姓皆加勇臣不如也鼓槌抱擊夫管仲民之父母也將欲治其子不可棄其父母公曰管夷吾親射寡人中鈎殆於死今乃用之可乎鮑叔曰彼爲其君動也君若宥而反之其爲君亦猶是也公曰然則爲之柰何鮑叔曰君使人請之魯公曰施伯魯之謀臣也彼知吾將用之必不吾予也鮑叔曰君詔使者曰寡君有不令之臣在君之國願徇於國爲羣臣僇誡羣臣戮之以若不生得是君與寡君賊比也吾賊言親非弊邑之君所謂也使臣不能受命於是魯君乃不殺遂生束縛而柙以予齊檻柙鮑叔受而哭之三舉哀其將死也三舉其聲偽施伯從而笑之偽也笑其謂大夫曰管仲必不死夫鮑叔之忍不僇賢人多言不僇賢人所容忍必其智稱賢以自成也也稱舉鮑叔相公子小白先入得國人心得國管仲召忽奉公子糺後入與魯以戰能使魯敗齊戰能使與魯師與齊克也魯敗而功足以得天與失天其人事一也魯而勝齊是其功也故於齊管仲本圖將立小白今能敗至於能成人事則一為得天於魯為失天今魯懼殺公子糺召忽囚管仲以予齊鮑叔知無後事無禍難之事也既得管仲則知後必將勤管仲以勞其君魯勝齊之意以必探管仲本敗慰勞其君也成其功勤而願以顯其功衆必予之之功如此衆必與之與許也願君試用管仲以顯其定齊有得力死之功猶尚可加也顯生之功將何如是功但一時之事耳假令管仲力死成霸以顯其本謀之功何善如之乎言不可加也猶尚可加況不恥垢辱忍而生全齊將得之而昭徳以貳君也之徳以為言昭管仲副貳君之鮑叔之知不是失也此圖必不失也以鮑叔之智能及至於堂阜之上地名堂阜鮑叔祓而浴之三凶邪之氣祓謂除其桓公親迎之郊管仲詘纓捷衽將示戮就使人操斧而立其後斧鉞之誅也操斧者將受公辭斧三然後退之斧者退操公曰垂䙬下衽寡人將見管仲再拜稽首曰應公之賜殺之黄泉死且不朽恩不朽況生之乎言君賜之死尚感公遂與歸禮之於廟三酌而問為政焉曰昔先君襄公高臺廣池湛樂飲酒田獵罼弋不聽國政卑聖侮士唯女是崇九妃六嬪天子九嬪諸侯六也九妃謂諸侯所娶九女陳妾數千食必粱肉衣必文繡而戎士凍飢戎馬待游車之弊弊然游車戎車後以為戎士待陳妾之餘後以食戎士陳妾食餘然倡優侏儒在前而賢大夫在後是以國家不日益不月長吾恐宗廟之不掃除社稷之不血食敢問為之柰何管子對曰昔吾先王周昭王穆王世法文武之逺迹以成其名合羣國比校民之有道者設象以為民紀之設法象而為人紀校試其人有道者與式美以相應比綴以書原本窮末書之簡䇿故能原其本窮其末無不錯綜也其所用美事必令始終相應然後次比緝綴勸之以慶賞糺之以刑罰糞除其顛旄兵士言能務農息兵故糞其顛而除其旄顛謂髙之頂人或不墾闢旄者所以誓勒賜予以鎭撫之以爲民終始公曰為之柰何管子對曰昔者聖王之治其民也參其國而伍其鄙定民之居成民之事以為民紀謹用其六秉如是而民情可得而百姓可御桓公曰六秉者何也管子曰殺生貴賤貧富此六秉也桓公曰叅國柰何管子對曰制國以爲二十一鄉商工之鄉六士農之鄉十五公帥十一鄉高子帥五鄉國子帥五鄉叅國故爲三軍公立三官之臣之官也謂三軍市立三鄉工立三族澤立三虞山立三衡毎皆置具官自三鄉已下制五家為䡄䡄有長十䡄為里里有司四里為連連有長十連為鄉鄉有良人三鄉一帥桓公曰五鄙柰何管子對曰制五家為䡄䡄有長六䡄為邑邑有司十邑為率率有長十率為鄉鄉有良人三鄉爲屬屬有帥五屬一大夫武政聽屬者聴於屬以武為政文政聽鄉各保而聽各自保之鄉屬之聽母有滛泆者桓公曰定民之居成民之事柰何管子對曰士農工商四民者國之石民也國之四者也故曰石也本猶柱之石不可使雜處雜處則其言哤其事亂也哤亂是故聖王之處士必於閒燕則謀議審處士閑燕處農必就田壄處工必就官府處商必就市井井之制故曰市井立市必四方若造今夫士羣萃而州處間燕羣萃共處毎州之士校之處閒燕謂學則父與父言義子與子言孝其事君者言敬長者言愛㓜者言弟旦昔從事於此朝夕也旦昔猶以教其子弟少而習焉其心安焉不見異物而遷焉其所當習者異物謂異事非是故其父兄之教不肅而成其子弟之學不勞而能夫是故士之子常為士今夫農羣萃而州處審其四時權節量其莭之早晚於四時中又權具備其械器用謂田器械器皆比耒耜穀芨執之以隨耒耜之後重治其闕遺芨音棰比偶其耒耜及榖芨榖芨小於耒耜一人及寒擊槀除田以待時乃耕者修除其田以待春之耕也冬寒之月即擊去其草之槀深耕均種疾耰復種耰謂當疾耰之既已均種先雨芸耨以待時雨時雨既至挾其槍刈耨鎛曰挾在掖鎡䥓也鎛鉏也槍樁也刈鎌也耨以旦暮從事於田壄稅衣就功役便事而省費脱其常服以就功别苗莠列䟽遬䟽者當均列之遬宻也謂苗之首戴苧蒲與蒲以為笠苧蔣也編苧身服襏襫可以任苦著者也襏襫謂麤堅之衣沾體塗足暴其髪膚盡其四支之力以疾從事於田野少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能是故農之子常爲農樸野而不慝而野不為姦慝農人之子朴質其秀才之能為士者則足頼也而知之不習而成者也故其賢足可頼也農人之子有秀異之材可為士者即所謂生故以耕則多粟以士則多賢是以聖王敬畏戚農有司見之而不以告其罪五有司巳於事而竣故聖王敬畏農而戚近之以農民能致粟又秀材生焉今夫工羣萃而州處相良材審其四時辨其功苦苦謂濫惡功謂堅美權節其用論比計制斷器尚完利貴於完利裁斷為器相語以事相示以功相陳以巧相高以知事用之事相高以其能知器旦昔從事於此以教其子弟少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能夫是故工之子常為工今夫商羣萃而州處觀凶飢審國變察其四時而監其鄉之貨也監視以知其市之賈負任擔荷服牛輅馬以周四方料多少計貴賤以其所有易其所無買賤鬻貴是以羽旄不求而至竹箭有餘於國竒怪時來珍異物聚旦昔從事於此以教其子弟相語以利相示以時相陳以知賈相與陳説賈知物價少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能夫是故商之子常爲商相地而衰其政則民不移矣其政則人安其相地沃塉以差差也音楚危反沃塉而不移襄正旅舊則民不惰舊貫則禀今而不惰國之軍旅正之以從山澤各以其時至則民不茍入山澤也茍謂非時陵陸丘井田疇均則民不惑無奪民時則百姓富犧牲不勞則牛馬育謂之勞注過用桓公又問曰寡人欲脩政以干時於天下其可乎天下諸侯脩時見之㑹干求也時時見曰㑹欲求管子對曰可公曰安始而可管子對曰始於愛民公曰愛民之道奈何管子對曰公修公族家修家族使相連以事相及以祿則民相親矣以祿則恩情生故有親也相連以事則人慣狎相及放舊罪修舊宗立無後則民殖矣立無後則繼絶世故人殖殖生也放舊罪則全人命修舊宗則收散親省刑罰薄賦斂則民富矣鄉建賢士使教於國則民有禮矣出令不改則民正矣此愛民之道也公曰民富而以親則可以使之乎管子對曰舉財長工以止民用民則慕而不費用矣工能積財舉而長之陳力尚賢以勸民知上之民則勸而賢能陳力而崇矣學智加刑無苛以濟百姓行之無私則足以容衆矣出言必信則令不窮矣此使民之道也桓公曰民居定矣事已成矣吾欲從事於天下諸侯其可乎㑹事欲從管子對曰未可民心未吾安公曰安之柰何管子對曰脩舊法擇其善者舉而嚴用之慈於民予無財當施與之貧無財者寛政役敬百姓則國富而民安矣公曰民安矣其可乎管仲對曰未可君若欲正卒伍修甲兵則大國亦將正卒伍修甲兵君有征戰之事則小國諸侯之臣有守圉之備矣然則難以速得意於天下公欲速得意於天下諸侯則事有所隱而政有所寓軍政寓之田獵故曰政有所寓不顯習其兵事故曰事有所隱公曰為之奈何管子對曰作内政而寓軍令焉為高子之里為國子之里為公里三分齊國以為三軍擇其賢民使為里君賢者為君毎里皆使鄉有行伍卒長則其制令且以田獵因以賞罰之功過因田獵罰行賞則百姓通於軍事矣桓公曰善於是乎管子乃制五家以爲䡄䡄爲之長十䡄爲里里有司四里爲連連爲之長十連爲郷郷有良人以爲軍令是故五家爲䡄五人爲伍䡄長率之十䡄爲里故五十人爲小戎里有司率之四里爲連故二百人爲卒連長率之十連爲郷故二千人爲旅郷良人率之五郷一師故萬人一軍五郷之師率之三軍故有中軍之鼓則公中軍卒也之里有高子之鼓有國子之鼓春以田曰蒐振旅而且整旅因寓軍政秋以田曰獮治兵因治兵順殺氣是故卒伍政定於里軍旅政定於郊内敎旣成令不得遷徙故卒伍之人人與人相保家與家相愛少相居長相游祭祀相福死喪相恤禍福相憂居處相樂行作相和哭泣相哀是故夜戰其聲相聞足以無亂晝戰其目相見足以相識驩欣足以相死是故以守則固以戰則勝君有此敎士三萬人以横行於天下敎習之士敎士謂先誅無道以定周室天下大國之君莫之能圉也正月之朝鄉長復事也復白公親問焉曰於子之鄉有居處為義好學聦明質仁慈孝於父母長弟聞於鄉里者有則以告有而不以告謂之蔽賢其罪五五刑而定其罰謂其罪當入於有司已於事而竣事而竣退既畢於上公又問焉曰於子之鄉有拳勇股肱之力䈥骨秀出於衆者有則以告有而不以告謂之蔽才其罪五有司已於事而竣公又問焉曰於子之鄉有不慈孝於父母不長弟於鄉里驕躁滛暴不用上令者有則以告有而不以告謂之下比比而掩蓋之下與有罪者其罪五有司已於事而竣於是乎鄉長退而脩徳進賢明公親見之遂使役之官所以歴試其材能謂授之官而役之公令官長期而書伐以告也伐功且令選官之賢者而復之曰有人居我官有功休徳維順端慤以待時使可用之時也以慤善待時待使民恭敬以勸其稱秉言則足以補官之不善政可以補不善之政謂此人所稱柄之言公宣問其鄉里而有考驗也遍宣遍其所行皆有事驗問其鄉里之人以考乃召而與之坐省相其質以叅其成功成事質體以叅驗其所成功之事也既有考驗召而與坐更省視其可立而時設問國家之患而不肉人其深淺不直相其骨肉而已肉者所謂皮相也既可將立之又時設問國家之患以知智謀之退而察問其鄉里以觀其所能而無大過登以為上卿之佐夫之佐為卿大名之曰三選大夫所選名此人曰三高子國子退而脩鄉脩於鄉鮑叔在朝故不言朝事既畢二大夫又如前退鄉退而脩連連退而脩里里退而脩䡄䡄退而脩家是故匹夫有善故可得而舉也匹夫有不善可得而誅也政旣成鄉不越長朝不越爵罷士無伍罷人不義之衆恥以為伍也罷謂乏於徳義者周禮所謂罷女無家恥娶之故無家罷女猶罷士衆士三出妻逐於境外為政者之所忌故逐於境外也三出妻所謂士也岡極二三其徳女三嫁入於舂穀順者也故入於舂穀三見出而嫁是不貞是故民皆勉為善士與其為善於鄉不如為善於里與其為善於里不如為善於家居家治理可移於官家善則鄉善矣所謂是故士莫敢言一朝之便皆有終歲之計莫敢以終嵗為議皆有終身之功無茍且脩政則人正月之朝五屬大夫復事於公擇其寡功者而譙之曰列地分民者若一何故獨寡功何以不及人教訓不善政事其不治一再則宥三則不赦公又問焉曰於子之屬有居處為義好學聦明賢仁慈孝於父母長弟聞於鄉里者有則以告有而不以告謂之蔽賢其罪五有司已事而竣公又問焉曰於子之屬有拳勇股肱之力秀出於衆者有則以告有而不以告謂之蔽才其罪五有司已事而竣公又問焉曰於子之屬有不慈孝於父母不長弟於鄉里驕躁滛暴不用上令者有則以告有而不以告者謂之下比其罪五有司已事而竣於是乎五屬大夫退而脩屬屬退而脩連連退而脩鄉鄉退而脩卒卒退而脩邑邑退而脩家是故匹夫有善可得而舉匹夫有不善可得而誅政成國安以守則固以戰則彊封内治百姓親可以出征四方立一霸王矣王之功也可謂一霸桓公曰卒伍定矣事已成矣吾欲從事於諸侯其可乎管子對曰未可若軍令則吾既寄諸内政矣夫齊國寡甲兵吾欲輕重罪而移之於甲兵公曰為之柰何管子對曰制重罪入以兵甲犀脅二㦸輕罪入蘭盾鞈革二㦸也鞈革重革當心著蘭即所謂蘭錡兵架禦矢之所以小罪入以金鈞曰鈞三十金分宥薄罪入以半鈞分其首犯而寛分宥謂從坐者之宥無坐抑而訟獄者正三禁之而不直則入一束矢以罰之禁之三日得其不直者則令入束矢也謂其人自無所坐而被抑屈為訟者正當美金以鑄戈劒矛㦸試諸狗馬惡金以鑄斤斧鉏夷鋸􅠁試諸木土􅠁钁類也夷鋤類也鋸桓公曰甲兵大足矣吾欲從事於諸侯可乎管仲對曰未可治内者未具也為外者未備也故使鮑叔牙為大諫正君所以諫王子城父為將􅁌子旗為理官理獄􅇞戚為田上理内已下理外敎以農事自此已隰朋為行以通使諸侯行謂行人也所曹宿孫處楚商容處宋季勞處魯徐開封處衛匽尚處燕審友處晉者所以諷動之令歸齊也令此諸賢各處諸侯之國又游士八千人奉之以車馬衣裘多其資粮財幣足之使出周游於四方以號召收求天下之賢士飾玩好使出周游於四方鬻之諸侯以觀其上下之所貴好擇其沈亂者而先政之正也以政公曰外内定矣可乎管子對曰未可鄰國未吾親也公曰親之奈何管子對曰審吾疆場反其侵地正其封界毋受其貨財而美為皮幣以極聘頫於諸侯也頫見以安四鄰則鄰國親我矣桓公曰甲兵大足矣吾欲南伐何主征伐之主也謂以何國為管子對曰以魯為主反其侵地常潛地名常潛使海於有弊於海使有弊盡也或遇水灾敎令泄渠彌於有陼彌亘於河渚後敎之穿渠綱山於有牢以為綱紀而有牢固敎之立國城必依山桓公曰吾欲西伐何主管子對曰以衛為主反其侵地􅁻臺原姑與㭍里地皆名使海於有弊渠彌於有陼綱山於有牢桓公曰吾欲北伐何主管子對曰以燕為主反其侵地柴夫吠狗名也亦地使海於有弊渠彌於有陼綱山於有牢四鄰大親既反其侵地正其封疆地南至于岱隂之北謂岱山西至於濟北至於海東至于紀隨地名紀隨地方三百六十里三歲治定四嵗教成五歲兵出有敎士三萬人革車八百乗諸侯多沈亂不服於天子於是乎桓公東救徐州分吳半之半分吳地存魯蔡陵地名蔡陵割越地南據宋鄭之國以為親援也既割越地又據宋鄭征伐楚濟汝水渡汝水伐楚時踰方地之地謂方城望文山也楚山使貢絲于周室絲者也堪為琴瑟絃使貢楚絲即所謂檿成周反胙於隆嶽太嶽之後故言隆嶽周室有事歸胙於齊齊荆州諸侯莫不來服中救晉公禽狄王敗胡貉破屠何之先也屠何東胡而騎寇始服騎為寇北狄以北伐山戎制泠支斬孤竹而九夷始聽海濵諸侯莫不來服西征攘白狄之地遂至于西河之西河謂龍門方舟投柎乗浮濟河至于石沈地名石沈縣車束馬踰大行與卑耳之貉拘秦夏秦夏之不服者與卑耳之貉共拘西服流沙西虞國名西虞而秦戎始從故兵一出而大功十二下有十二也自救徐州已故東夷西戎南蠻北狄中國諸侯莫不賔服與諸侯飾牲為載書辭載之於䇿書謂要盟之以誓要于上下薦神誓又以其牲薦之於神謂以上下之神祇為盟然後率天下定周室大朝諸侯於陽榖故兵車之㑹六乗車之㑹三九合諸侯一匡天下甲不解壘兵不解翳之屬不解甲於壘不翳所以蔽兵謂脅盾言不用也解兵於翳弢無弓服無矢矢亦言不用也弢弓衣也無弓無寢武事行文道以朝天子葵丘之會天子使大夫宰孔致胙於桓公曰余一人之命有事於文武武王之廟也有祭事於文王使宰孔致胙且有後命曰以爾自見有者圖書乗黄也三祥謂􅀛龍雖曰受命無乃失諸乎桓公懼出見客曰天威不違顔咫尺小白承天子之命而毋不拜恐顛蹶於下以為天子羞遂下拜登受賞服大路龍旗九游渠門赤旂旗名渠門天子致胙於桓公而不受天下諸侯稱順焉桓公憂天下諸侯魯有夫人慶父之亂而二君弑死公夫人姜慶父通莊又弑閔公氏弑子般國絶無後桓公聞之使高子存之男女不淫雜也淫亂馬牛選具具凡欲以貢齊也選擇其善者以成執玉以見請為關内之侯内之侯請為齊關而桓公不使也狄人攻邢桓公築夷儀以封之男女不淫馬牛選具執玉以見請為關内之侯而桓公不使也狄人攻衛衛人出旅於曹居曹也旅客也客桓公城楚丘封之其畜以散亡故桓公予之繫馬三百匹養之言其良也謂馬在閑廏繫天下諸侯稱仁焉於是天下之諸侯知桓公之為已勤也是以諸侯之歸之也譬若市人桓公知諸侯之歸己也故使輕其幣而重其禮故使天下諸侯以疲馬犬羊為幣瘦也疲謂齊以良馬報諸侯以縷帛布鹿皮四分以為幣其鹿皮謂四分齊以文錦虎豹皮報諸侯之使垂櫜而入攟反丘粉載而歸也攟收拾也垂櫜言其空故鈞之以愛致之以利結之以信示之以武是故天下小國諸侯既服桓公莫敢之倍而歸之喜其愛而貪其利信其仁而畏其武桓公知天下小國諸侯之多與己也於是又大施忠焉可為憂者為之憂可為謀者為之謀可為動者為之動伐譚萊而不有也諸侯稱仁焉通齊國之魚鹽東萊鹽於諸侯自東萊通魚使關市幾而不正壥而不稅非而不正稅㡬察也察其姦以為諸侯之利諸侯稱寛焉築蔡鄢陵培夏靈父丘名皆邑以衛戎狄之地所以禁暴於諸侯也築五鹿中牟鄴蓋與社丘以衛諸夏之地所以示勸於中國也敎大成是故天下之於桓公逺國之民望如父母近國之民從如流水故行地兹逺得人彌衆是何也懷其文而畏其武故殺無道定周室天下莫之能圉武事立也定三革革甲曰三革車馬人皆有偃五兵朝服以濟河而無􅇶愓焉河以與西諸侯盟也謂乗車之㑹朝服濟文事勝也是故大國之君慙媿小國諸侯附比是故大國之君事如臣僕小國諸侯驩如父母夫然故大國之君不尊加其尊禮不以國大小國諸侯不卑而卑其敬不以國小是故大國之君不驕小國諸侯不懾於是列廣地以益狹地損有財以與無財周其君子不失成功用故不失成功也周給君子得其力周其小人不失成命歸故不失成命也周給小人懷德而夫如是居處則順出則有成功不稱動甲兵之事以遂文武之近於天下也大國畏威事如臣僕武功立也旣以朝服濟河故不稱甲兵文德成桓公能假其羣臣之謀以益其智也其相曰夷吾大夫曰􅇞戚隰朋賔胥無鮑叔牙用此五子者何功而不成言何功度義光徳繼法紹終以遺後嗣貽孝昭穆大霸天下名聲廣裕不可掩也則唯有明君在上察相在下也初桓公郊迎管子而問焉管仲辭讓然後對以叅國伍鄙立五鄉以崇化建五屬以厲武寄兵於政因罰備器械加兵無道諸侯以事周室桓公大説於是齋戒十日將相管仲管仲曰斧鉞之人也幸以獲生以屬其􅆎領連也屬綴臣之祿也若知國政非臣之任也公曰子大夫受政寡人勝任輔我我則勝言子受政而任也君之子大夫不受政寡人恐崩管仲許諾再拜而受相三日公曰寡人有大邪三其猶尚可以為國乎對曰臣未得聞公曰寡人不幸而好田晦夜而至禽側已至禽之側畔也言夙興晦夜之時田莫不見禽而後反多獲而後反其田必見禽諸侯使者無致百官有司無所復故使者不既專於田不得白事得致命有司對曰惡則惡矣然非其急者也公曰寡人不幸而好酒日夜相繼諸侯使者無所致百官有司無所復對曰惡則惡矣然非其急者也公曰寡人有汙行不幸而好色而姑姉有不嫁者對曰惡則惡矣然非其急者也公作色曰此三者且可則惡有不可者矣更有不可於此者此三者尚以為可豈對曰人君唯僾與不敏為不可隨不斷優謂倭僾則亡衆不敏不及事公曰善吾子就舎異日請與吾子圖之對曰時可將與夷吾何待異日乎言可不可待他日之時正與夷吾公曰奈何對曰公子舉為人博聞而知禮好學而辭遜請使游於魯以結交焉公子開方為人巧轉而兊利請使游於衛以結交焉曹孫宿其為人也小廉而苛􅏸苛密音逝所慣習也􅏸習也言多足恭而辭結人定交結其辭能與正荆之則也荆俗同使之游荆言此人立行正與上二人亦然必得其歡心請使往游以結交焉遂立行三使者而後退使行使三後退出然相三月請論百官公曰諾管仲曰升降揖讓進退閑習辨辭之剛柔臣不如隰朋請立為大行使之官大行大墾草入邑辟土聚粟多衆盡地之利臣不如􅇞戚請立為大司田平原廣牧牧之地廣逺可車不結轍士不旋踵鼔之而三軍之士視死如歸臣不如王子城父請立為大司馬決獄折中不殺不辜不誣無罪臣不如賔骨無請立為大司理犯君顔色進諫必忠不辟死亡不撓富貴臣不如東郭牙請立以為大諫之官此五子者夷吾一不如不如其一於五子各然而以易夷吾夷吾不為也能易夷吾以五子之吾所不能之徳則夷君若欲治國彊兵則五子者存矣若欲霸王夷吾在此桓公曰善王言第二十一内言四管子卷第八鞈反革甲􅠁反陟六
