body:
  text: 水地第三十九四時第四十五行第四十一水地第三十九短語十三地者萬物之本原諸生之根菀也城也􅁐囿美惡賢不肖愚俊之所生也於地謂生水者地之血氣如䈥脉之通流者也其潤澤􅀂氣以水言材美具備流地上若脉也支持於地若筋分故曰水具材也美具備言水材何以知其然也曰夫水淖弱以淸而好洒人之惡仁也垢穢也淖和也惡視之黒而白精也色雖視其白如者精也黒及揮􅀭之則量之不可使槪至滿而止正也之況注於器滿則止以意量之則不多少此者正也不可加剰如唯無不流至平而止義也止不可増高如此者義也方圎邪曲無所不流平則人皆赴高已獨赴下卑也卑也者道之室王者之器也爲室王道以卑器也以卑爲而水以爲都居居於下卑也都聚也水聚準也者五量之宗也爲下水可爲五量之宗也準五量取則焉故素也者五色之質也色不得不成故爲五色質也無色謂之素水雖無色五淡也者五味之中也得不平也故爲五味中也無味謂之淡水雖無味五味不是以水者萬物之準也故曰準也萬物取平焉諸生之淡也中故曰淡也能濟諸生以過違非得失之質也水生焉故爲得失之質得亦自水生焉失亦自是以無不滿無不居也集於天地而亦有河雨從天降於天地漢故水集而藏於萬物皆含液也動植之物産於金石穴或有溜泉焉揀金於水山石之集於諸生得水而長之諸合生􅀋皆故曰水神其所故謂之神也莫不有水焉不知集於草木根得其度之度得其生華得其數落之數得其榮實得其量熟之量得其有鳥獸得之形體肥大羽毛豐􅌗文理明著萬物莫不盡其幾以適有也幾謂從無反其常者之常數也常謂長旨水之内度適也潤之度也内度謂潛夫玉之所貴者九德出焉夫玉温潤以澤仁也鄰以理者知也理各自通如此智也鄰近也玉文相適近堅而不蹙義也如此義也蹙屈聚也廉而不劌行也鮮而不垢絜也折而不撓勇也瑕適皆見精也精純故不掩瑕適瑕適玉病也以其茂華光澤竝通而不相陵容也叩之其音淸搏徹逺純而不殺辭也子之辭象古君也是以人主貴之藏以爲寶剖以爲符瑞九德出焉寶而藏之人主所以徳之故爲符瑞九人水也男女精氣合而水流形布成形也隂陽交感流三月如咀咀者何曰五味五味者何胚渾初凝􅀋口所嚼食也咀咀口和嚼之謂三月之曰五藏於五藏五味出也酸酸主脾鹹主肺辛主腎苦主肝甘主心五藏巳具而後生肉脾生隔上也隔在脾肺生骨腎生腦肝生革膚也革皮心生肉五肉巳具而後發爲九竅脾發爲鼻肝發爲目腎發爲耳肺發爲竅五月而成十月而生生而目視耳聽心慮目之所以視非特山陵之見也察於荒忽耳之所聽非特雷鼓之聞也察於淑湫心之所慮非特知於麤粗也察於微眇故脩要之精思是言精妙之精也理脩要是以水集於玉而九德出焉凝蹇而爲人言精液蹇停也爲人也凝停則而九竅五慮出焉􅈹口心也五慮謂耳目此乃其精也是身之精也言九竅五慮麤濁蹇能存而不能亡者也但能存而不能亡也謂人之稟氣麤濁而蹇伏闇能存而能亡者􅆱􅀛與龍是也㝠故能存亡而爲變化也言􅀛龍稟氣微妙悠逺而暗􅀛生於水發之於火火鑽灼之謂􅁲者以於是爲萬物先爲禍福正􅀛謂於萬物識禍福之正也得水火之靈故先知龍生於水被五色而游故神之靈故神得水不側欲小則化如蠶蠋中蟲蠋雚欲大則藏於天下覆天下言能隱欲上則凌於雲氣也尚上欲下則入於深泉變化無日不期於日隨時而變上下無時謂之神􅀛與龍伏闇能存而能亡者也或世見水不絶之也謂下谷不徙或丗不見者有時而絶謂涸川水生蟡與慶忌不見生蟡也丗見生慶忌丗故涸澤數百歳谷之不徙水之不絶者生慶忌谷不徙而水不絶也謂涸澤之中有谷有水慶忌者其狀若人其長四寸衣黄衣冠黃冠戴黃蓋乗小馬好疾馳以其名呼之可使千里外一日反報此涸澤之精也涸川之精者生於蟡蟡者一頭而兩身其形若虵其長八尺以其名而運􅙹墆而雜旱謂其水􅃤澁而無光也齊􅀳謂齊之西而晉之東枯故其民謟䛕葆詐巧佞而好利詐以其􅙹雜故巧佞而好利以其運故謟䛕以其枯旱故葆燕之水萃下而弱沉滯而雜故其民愚戇而好貞輕疾而易死雜故輕疾而易死也沉故愚戇而好貞萃宋之水輕勁而淸故其民閒易而好正故好正也輕故易清勁是以聖人之化丗也其解在水正甞水而知言解人之邪故水一則人心正不雜一謂水淸則民心易一則欲不汚欲不汚穢人心旣一故民心易則行無邪無邪也易直則是以聖人之治於丗也不人告也不户􅀃也其樞在水也言欲轉化樞主運轉者故曰其樞在水也於人伹則水之理四時第四十短語十四管子曰令有時必有其時王者命令無時則必視順天之所以來而察之視謂觀攺革以順尺道之來也􅀂不得時則必觀察其所致五漫漫六惽惽孰知之哉惽惽微暗皃漫漫曠逺皃時其理微暗旣侵亘惽故知之者少也五謂每時之時五政其理曠六謂隂陽四唯聖人知四時不知四時乃失國之基不知五榖之故國家乃路其常居路謂失故天曰信明地曰信聖而行之者曰明曰聖也言能信順天地之道則四時曰正令日正也順行四時之其王信明聖其臣乃正賢材故正也君明聖則能用何以知其王之信明信聖也曰愼使能而善聽信之賢材之人謂能聽信使能之謂明則爲明也使任賢能聽信之謂聖其事所以爲聖旣聽其言又信信明聖者皆受天賞天福也信明者使不能爲惽使旣以爲惽不能所惽而忘也者皆受天禍理故授天殃也惽忘則動皆違是故上見成事而貴功則民事接勞而不謀上能以恩接人事故雖下勞不謀謂君見下有成則能貴賞其功是事也上報其上見功而賤則爲人下者直故肆直也恃其功勞爲人上者驕恤不驕悖故也下功則以是故隂陽者天地之大理也陽爲生成天地用隂四時者隂陽之大徑也時之閒爲緯也隂陽更用於四刑德者四時之合也刑合於秋冬德合於春夏刑德合於時則生福詭則生禍然則春夏秋冬將何行東方曰星方東爲星星亦不定於隂陽也隂陽之氣和雜之時故其時曰春蠢而生也春蠢也時物其氣曰風而隂陽動風也竅爲風生木與骨骨亦木之􅀋也木爲風而發暢其德喜嬴而發出節言春德出生也發生之節也喜恱長嬴爲時其事號令修除神位謹禱弊梗通而有弊敗梗梗塞也時方開以通道之塞者則禱神宗正陽正陽爲宗春陽事故以治隄防春預修隄防夏多水潦故於耕芸樹藝正津梁梁也謂正橋修溝瀆甃屋行水漑灌依次行而用甃者修屋壞時方解怨赦罪通四方發生之氣凡此皆助然則柔風甘雨乃至也柔和百姓乃壽百蟲乃蕃此謂星德爲德也星以和星者掌發爲風以風發生掌主也主是故春行冬政則雕之故雕落也肅殺之氣乗行秋政則霜時也秋霜降行夏政則欲是故春三月以甲乙之日發五政之三時也甲乙統春一政曰論㓜􅀌舎有罪二政曰賦爵列授禄位也列次三政曰凍解修溝瀆復亡人者還復之人之逃亡四政曰端險阻之使端平也路有險阻理修封彊正千伯阡陌也千伯即五政曰無殺麑夭母蹇華絶芋經冬不死不絶之也蹇拔也芋之屬其根五政苟時春雨乃來南方曰日故爲日也南方太陽其時曰夏物皆假大大夏假也謂時其氣曰陽氣也夏之陽生人與氣故爲火氣也陽爲鬱熱㪣蒸其德施舎修樂罪修樂謂作樂以修施舎謂施爵禄舎通也輔其事號令賞賜賦爵受禄順郷土俗之冝也順郷謂不違謹修神祀量功賞賢以動陽氣恩賞以助之也陽氣主仁故行九暑乃至夏之暑也九暑謂九時雨乃降五榖百果乃登此謂日德爲德也日以照育中央曰土於六月承火之後以土位在中央而􅀉王夏所以與火同章也土火之子故也而統於土德實輔四時入出季與之入出王在四時之以風雨節土益力其生植之力土德雨遍益土生皮肌膚成皮與肌膚土所生木實其德和平用均不載土無而用均也無不生故和中正無私無偏私位居中正實輔四時春嬴育夏養長秋聚收冬閇藏土之所輔成也言上之四時皆大寒乃極國家乃昌四方乃服輔四言土而成歳國昌民服時使均成然後寒極此謂歳德歳之德也言土能成日掌賞賞爲暑熱熱故得賞則暑爲歳掌和和爲雨交故爲雨和則隂陽夏行春政則風春故風主行秋政則水行冬政則落故凋落也霜氣肅殺是故夏三月以丙丁之日發五政一政曰求有功發勞力者而舉之二政曰開久墳開通之也久墳瘞之處發故屋辟故􅐎以假貸也辟開三政曰令禁扇去笠不欲令人禦禁扇去笠者之氣盛陽母扱免欲人惡惡陽之氣也禁扱衽免祖者亦不除急漏田廬欲人惡盛陽之氣也田中之廬欲漏之不四政曰求有德賜布施於民者而賞之五政曰令禁罝設禽獸取禽獸也謂設罝以母殺飛鳥五政苟時夏雨乃至也西方曰辰月交辰星適中故爲辰㑹也秋隂陽其時曰秋成熟揫斂之秋揫也時物其氣曰隂氣也秋之隂生金與甲生金爲􅀲甲也隂氣疑結堅實故其德憂哀静正嚴順憐爲德靜正隂之性也秋氣棲惻故以憂恤哀順時而爲之也嚴順謂德雖嚴然居不敢􅁋佚敢爲􅁋逸過失也順秋氣而靜居不其事號令母使民􅁋暴順旅聚收旅聚而收之也謂順時理軍量民資以畜聚賞彼羣幹有衆當賞之武幹人聚彼羣材之材當收聚之材謂可以充兵器百物乃收使民母怠斂出師時云收無懈怠故聚裝人所惡其察所欲必得之則得其所欲也察所惡之方而伐我信則克誠信我旣免敵故能此謂辰德姦邪爲德也辰以收斂殺辰掌收收爲隂藏故爲隂收聚冬閇秋行春政則榮榮也春發行夏政則水水潦也夏多行行冬政則耗損耗也冬肅殺是故秋三月以庚辛之日發五政一政曰禁博塞邪故禁之博塞長姦圉小辯鬭譯誋疾忌爲鬭訟者皆當禁圉之也小辯則利口覆國及譯傳言語相二政曰母見五兵之刄藏五兵之刄也時或出師掩襲故三政曰愼旅農趣聚收四政曰補缺塞坼營農師旅故令補塞缺坼也當愼收之秋方􅐬藏五政曰修牆垣周門閭閇藏之氣亦所以助五攻苟時五榖皆入北方曰月故爲月也北方太隂其時曰冬萬物於中也冬中也謂藏收其氣曰寒氣也冬之寒生水與血血亦水之􅀋寒釋則水流其德淳越温怒周宻凋落唯根冬時花葉令散施爲德雖復隂怒當節之以温周密者衆隂之􅐬藏也幹存焉故以淳質爲德越散也冬旣閇藏時則入於恡嗇故其事號令修禁徙民令靜止私徙令爲靜止也時方休息故禁人地乃不泄竝不泄也冬令行故斷刑致罰無赦有罪以符隂氣刑致罪以符之隂氣主殺故斷大寒乃至甲兵乃強五榖乃熟國家乃昌四方乃備此謂月德罪爲德也月以􅐬藏罰月掌罰罰爲寒故爲寒也罰則殺物冬行春政則泄發泄也春陽氣行夏政則靁雹行夏雷行秋政則旱旱早也謂冬氣是故春凋秋榮冬雷夏有霜雪此皆氣之賊也爲賊害也氣反時則刑德易節失次則賊氣遫至賊氣遫至則國多菑殃是故聖王務時而􅀉政焉而立政謂順時作敎而􅀉武焉敎因武也而習作祀而􅀉德焉德則神歆也謂設祭以顯此三者聖王所以合於天地之行也此三者而巳天地之行唯日掌陽月掌隂星掌和陽爲德隂爲刑和爲事是故日食則失德之國惡之月食則失刑之國惡之彗星見則失和之國惡之各以其所􅀋而興惡也失則當受罰故其所失風與日爭明則失生之國惡之悴矣此失生德也故失生之國惡也日惡風且熱旱災成矣方生之物皆枯是故聖王日食則修德月食則修刑彗星見則修和風與日爭明則修生此四者聖王所以免於天地之誅也信能行之五榖蕃息六畜殖而甲兵強治積則昌暴虐積則亡是故冬三月以壬癸之日發五政一政曰論􅀌獨恤長老二政曰善順隂修神祀賦爵禄授備位三政日効會計母發山川之藏藏在山者川藏謂山藏謂銅銀之屬在川者也珠玉之屬藏四政曰攝姧遁得盜賊者有賞五政曰禁遷徙止流民圉分異離居者分異謂五政苟時冬事不過所求必得所惡必伏道生天地生天地也道者自然能德出賢人爲故能生賢也德者賢人所修道生德成徳也法道則德生正理自正德脩則正生事事幹正直則是以聖王治天下窮則反終則始德始於春長於夏刑始於秋流於冬而休息也謂刑於冬刑德不失四時如一成故如一皆順時而刑德離郷時乃逆行也鄉方作事不成必有大殃月有三政故曰三政也月三旬政異王事必理以爲必長之理然後可以長乆王者行事必順三政不中者死失理者亡則死違失其理必敗亡中猶合也不合三政者國有四時固執王事以輔行王事固執四時之政四守有所令得其所謂守四時三政執輔輔行巳德也執三月之政五行第四十一短語十五一者夲也桑也本農二者器也桑之具也器所以理農三者充也稱夲與器也充謂人力能治者四也治以理之也人旣務本設敎者五也以禮義敎之人旣奉法則守者六也則設官以守之人旣奉法從敎立者七也之則能立事旣設官以守前者八也可與前王比隆旣能立功立事終者九也前王比旣能與道之終也隆可謂王十者然後具五官於六府也分掌六府也立五行之官五聲於六律也於六律也謂播五聲六月日至隂生至六爲冬至陽生至六爲夏至是故人有六多陽之多也隂陽至六爲純陽之純以生故曰人有六多至六爲純隂之多也稟隂六多所以街天地也隂多也街猶陽天道以九制制天所以君長之也九老陽之數以老陽地理以八制制地欲其生息也人少隂之數以少隂人道以六制者六隂陽之氣以生故以制人兼三材之數人禀天也以天爲父以地爲母以開乎萬物以生萬物父母開通以緫一統統萬物也緫持其本以通乎九制六府三充而爲明天子九制巳下可言能揔一統天子謂明修槩水上以待乎天堇修以槩自平上待天誠也堇誠也言天子能以中正自反五藏以視不親視知何者不親也又親反察於五藏以治祀之下以觀地位於其所祭之下理於祭祀之時之尊卑也觀知地位貨曋神廬合於精氣祭神廬之時或薦珍貨雖巳奠於神廬謂廟祠也日所次隅曰曋言者所以招合􅀑神精氣之道也地復以日次隅之所以爲精祥也如此巳合而有常則風雨得其常也神旣合聚而饗祐有常而有經而常經不失也風雨有常百貨成審合其聲修十二鍾以律人情失不然後十二鍾以播其音音之髙下皆法人情律法也其經則庶讀咸通故可審合理丗之聲以成安樂之音人情巳得萬物有極然后有德於物理可謂有德也得人情則物理極極故通乎陽氣所以事天也經緯日月用之於民又經緯日月之時􅃸使人用之也天氣以積陽成德故通陽氣然後能事天通乎隂氣所以事地也經緯星曆以視其離能事地又經緯星曆之節氣視地以積隂成體故通隂氣然後絶也知其離通若道然后有行道然後所行不失也言能通上隂陽天地之然則神筮不靈神􅀛衍不卜不當故􅀛筮不能爲卜兆旣通天地之道則所行無黃帝澤叅治之至也澤以得萬靈之情可謂理之至也黃帝雖通天地之道不使叅問曰昔者黃帝得蚩尤而明於天道得大常而察於地利得奢龍而辯於東方得祝融而辯於南方得大封而辯於西方得后土而辯於北方黃帝得六相而天地治神明至蚩尤明乎天道故使爲當時之所當也謂知天時大常察乎地利故使爲廩者廩以給人也廩給也謂開奢龍辨乎東方故使爲土師司空也土師即祝融辨乎南方故使爲司徒使務農也謂主徒衆大封辨於西方故使爲司馬以出征主兵馬后土辨乎北方故使爲李取使象水李獄官也也平之是故春者土師也夏者司徒也秋者司馬也冬者李也昔黃帝以其緩急作五聲急作五聲也調政理之緩以政五鍾令其五鍾一曰靑鍾大音方鍾名大音東二曰赤鍾重心三曰黃鍾洒光四曰景鍾昧其明五曰黒鍾隱其常鍾名其義則未聞自大音重心巳下皆五聲旣調然后作立五行以正天時五官以正人位人與天調然后天地之美生泉之􅀋也美謂甘露醴日至睹甲子木行御子用木行御時也謂春日旣至睹甲天子出令命左右士師内御之官也謂内侍緫別列爵列之爵也謂緫别等論賢不肖士吏肖當有所黜陟也論士吏之賢與不賦秘賜而賦賜之也秘藏之物出賞於四境之内發故粟以田數用陳粟給人使得務農故粟陳也以田數多少出國衡順山林禁民斬木所以愛草木也然則水解而凍釋草木區萌而生也萌牙區别贖蟄蟲􅆑菱也皆早春而生也贖猶去也􅆑鳬菱芡春辟勿時得不及時也春當耕闢無苗足本生之苗當以足猶擁也春其本土擁不癘雖鷇隨母食者癘殺也雖不夭麑䴠母傅速言夭傷之麑鹿子也亡傷繈葆無得傷損也繈褓之孾孩時則不凋繁􅌗而不凋枯也􅀂能行上事春則七十二日而畢九十春當季月十八日屬土位故也日而今七十二日而畢者則睹丙子火行御天子出令命行人内御之官也行人行使令掘溝澮津舊塗處當設其津梁也舊塗謂先時濟水發臧任君賜賞用之即以充君之賞賜也任委也藏中委積物當發君子修游馳以發地氣戯馳馬也游馳謂游出皮幣命行人修春秋之禮於天下諸侯通天下遇者兼和秋春問之禮二時聘然則天無疾風草木發奮鬱氣息氣止息也謂鬱蒸之民不疾而榮華蕃七十二日而畢睹戊子土行御天子出令命左右司徒内御理夏政也命司徒御不誅不貞無所誅戮無責正以助養氣也貞正也太陽用事時方長育故農事爲敬順而敬之也夏時農事尤盛大􅀭惠言惠之事也言大舉仁寛刑死緩罪人養氣也皆所以助出國司徒令命順民之功力以養五􅂖君子之靜居故靜居以隂氣方生也遵而農夫修其功力極然則天爲粤宛厚順不逆時氣也粤厚也宛順也天爲草木養長五榖蕃實秀大六畜犧牲具民足財國富上下親諸侯和七十二日而畢睹庚子金行御天子出令命祝宗選禽獸之禁養擬供祭祀也禁謂牢囿圃所五榖之先熟者黍稷也先熟則而薦之祖廟與五祀戸竈中霤五祀謂門行􅀑神饗其氣焉君子食其味焉然則凉風至白露下天子出令命左右司馬衍組甲厲兵組貫甲也組甲謂以合什爲伍之長爲伍謂立什人以修於四境之内䛕然告民有事所以待天地之殺斂也伐不服象天地殺斂也䛕恱順皃有事謂出師以然則晝炙陽夕下露地競環露而潤之隂陽更生故地氣交競而炙實環炙實皃方秋之時晝則暴炙夕則下寒五榖鄰熟氣足故緊熟鄰緊也隂陽草木􅌗實歳農豐年大􅌗七十二日而畢睹壬子水行御天子出令命左右使人内御其氣足則發而止之氣足則發令休止也使人御理冬政其閇藏其氣不足則發撊瀆盜賊足則􅏌防盜賊以助其閇藏之氣也􅏌謂庶禁也羣聚之謂其閇藏之氣不數劋竹箭箭以爲失也言数劋削竹伐檀柘以爲弓也伐檀柘所令民出獵禽獸不釋巨少而殺之所以貴天地之所閇藏也獵取禽以助也貴天地閇藏故收然則羽􅆑者不叚散不成叚謂離毛胎者不􅢥敗清也􅢥謂胎􅤟婦不銷棄古􅤟謂散壞也孕字銷弃草木根本美皆順冬閇藏之政所致也􅐬藏實堅則根本美凡此七十二日而畢睹甲子木行御天子不賦不賜賞而大斬伐傷政所致災禍也此巳下言逆時君危不殺太子危家人夫人死子危而家人夫人有死禍也􅀂君雖危而不見殺則又大不然則長子死死則長子死如無家人夫人七十二日而畢七十二日也逆氣亦畢於睹丙子火行御天子敬行急政旱札苗死民厲而乃急故有旱札疫之災也札夭死也厲疫死時當寛緩七十二日而畢睹戌子土行御天子修宫室築臺榭君危事而修土方用君有危亡之禍宫室以動亂之故外築城郭臣死危故其臣死築城郭動土七十二日而畢月而得士土王在六季得十八故也十二日者則每睹庚子金行御天子攻山擊石有兵作戰而敗士死喪執政石故致兵器之禍也時方收斂而乃攻山擊七十二日而畢睹壬子水行御天子決塞動大水王后夫人薨不然則羽􅆑者叚毛胎者􅢥􅤟婦銷棄草木根本不美七十二日而畢也管子卷第十四
