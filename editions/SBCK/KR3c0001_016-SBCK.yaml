body:
  text: 内業四十九封禪五十小問五十一内業四十九區言五凡物之精此則爲生也得此則爲生精謂神之至靈者下生五榖上爲列星流於天地之閒謂之􅀑神藏於胷中謂之聖人是故民氣者則人氣謂上之精也杲乎如登於天皃也杲眀杳乎如入於淵淖切女敎乎如在於海淵也淖汋卒乎如在於已如在於已也人有氣則存故是故此氣也不可止以力氣愈去以力止而可安以德氣自來也静心念德不可呼以聲而可迎以音克諧氣自來也調其宫商使之敬守勿失是謂成德德自成不失氣德成而智出自生也德成智萬物果得安物以智得冝物皆凡心之刑安心之法也刑法也謂得自充自盈而無虧也充盈謂完自生自成毎生心生成謂得安心法故也必有所成凡此皆其所以失之必以憂樂喜怒欲利亂於心則失矣此六者過常以能去憂樂喜怒欲利心乃反濟守其所而能濟成也􅀂能去六者則心反彼心之情利安以寧之所利也安寧者心勿煩勿亂和乃自成心和自成􅀂無煩亂折折乎如在於側忽忽乎如將不得及其求之則忽忽然而不得折折明㒵言心明察若在其側渺渺乎如窮無極逺如欲窮之則無其極渺渺㣲逺㒵言心之微此稽不逺日用其德之則日有所用也常以此考心不逺夫道者所以充形也虚者皆道自形内而而人不能固反以利欲塞也人不能固守其虚其往不復其來不舎不復雖其有來無處可舎旣有利欲之心則道往而謀乎莫聞其音則不聞其音今謀欲㝷於道卒乎乃在於心㝠㝠乎不見其形之方寸虚道之君乎㝷至於極則近於心心􅁋􅁋乎與我俱生道故曰與我俱生也􅁋􅁋増進皃有生則有不見其形不聞其聲而序其成謂之道無雖成故謂之道也形聲常依序而凡道無所善心安愛唯愛心安也言道無他善心靜氣理道乃可止氣自調理若靜心則止也故道來彼道不逺民得以産在人故不逺也人得之所生則道彼道不離民因以知道常在而不離人旣因道而知則是故卒乎其如可與索似可與索推㝷其終眇眇乎其如窮生其度則失其生安心之法智過一物能化謂之神一事能變謂之智無心於物事一謂無也謂以爲神智也而物事自化變化不易氣變不易智惟執一之君子能爲此乎易其氣智也苟執一故能不執一不失能君萬物心者主也無心爲有君子使物不爲物使而物不能使也無心故能使物得一之理治心在於中心自治矣苟得中則治言出於口治事加於人狂事則無然則天下治矣一言得而天下服一言定而天下聽公之謂也之謂理心形不正德不來中不靜心不治正形攝德天仁地義則􅁋然而自至地之義則德􅁋然自至􅁋進㒵也言欲正形攝德但能則天之仁法神明之極照乎知明之極理照智者神萬物中義守不忒則無差忒􅀂常守中不以物亂官則官貪物亂不以官亂心心亂也貪官則是謂中得中心自得也能忘官貨則有神自在身則神中得身也自在一徃一來莫之能思往來不能思也神不測者也故失之必亂得之必治也謂神敬除其舍精將自來精想思之想思之除謂有則寧念治之則心自治寧静思念嚴容畏敬精將至定精至而定也但能嚴敬則得之而勿捨耳目不􅁋心無他圖取目不􅁋心無他慮也旣得精守之而勿捨則正心在中萬物得度舉故萬物得度也心在中而正則無過道滿天下普在民所民不能知也不能自知耳言人皆有道但一言之解上察於天下極於地蟠滿九州地而中滿於九州蟠委地也􅀂能解道之一言則能察天極何謂解之在於心安於心安解道者在我心治官乃治我心安官乃安皆從心生也言官之治安治之者心也安之者心也無不由心治之與安心以藏心於心也言心亦藏心之中又有心馬心中又有心以心藏心故彼心之心藏之心謂心中所音以先言故音先言言從音生音然后形然后有音也見形然后言是言也有形則言然后使故有所使令有言則出命使然后治不治必亂理故亂使而違亂乃死至故死也亂則凶禍精存自生其外安榮長生至於外形静精存於中則自然茂也而榮内藏以爲泉原窮竭􅀂水之泉内藏於精則無浩然和平以爲氣淵然和平則言精旣浩爲氣淵能生氣故淵之不涸四體乃固涸故四體固也生氣之淵不有竭泉之不竭九竅遂通故九竅通也藏精之泉不竭乃能窮天地被四海畢天地德􅀍四海體固竅通故能壽中無惑意外無邪菑惑意則邪菑自銷也邪菑生於惑意故内無心全於中形全於外外皃中全則不逢天菑不遇人害禍不全者也天菑人害能謂之聖人人能正靜皮膚􅁉寛耳目聦明荕信而骨強耳目自聦明荕骨自中強伹能正静則皮膚自裕寛乃能戴大圜也天而履大方也地鑒於大淸也道視於大眀也日月敬愼無忒日新其德徧知天下窮於四極敬發其充道也充謂是謂内得故内得也發行於道然而不反此生之忒道則生有差謬也忒差也􅀂不反守於凡道必周必密愼不泄周密則必寛必舒博而密寛舒則必堅必固精不解堅固則守善勿舎善自成勿舎則逐淫澤薄津澤浮薄竟逐淫邪旣知其極反於道德反德知極自隆則常道全心在中不可蔽匿形於外也有諸内必和於形容容晬也心和者見於膚色體澤􅊨内暢者善氣迎人親於弟兄惡氣迎人害於戎兵不言之聲疾於雷鼓速不崇朝而遍天下故疾於雷鼔也謂全心以德感物者也德者不疾而心氣之形明於日月察於父母不知􅀂明於日月察於父母也􅊨全心之氣發形於外則無不耀無賞不足以勸善非本爲善慕賞乃善刑不足以懲過非本無過畏刑懲過氣意得而天下服善者此誠善也故天下服􅀂不慕賞不畏刑意氣内得心意定而天下聽故天下聽也心意定則理明搏氣如神萬物備存也結聚絶搏謂結聚如神而物備存矣氣則無所不變化故能搏乎能一乎自一也搏結則能無卜筮而知吉凶乎凶吉須卜筮而知也在於逆順故不能止乎能巳乎諸已也謂正而求能勿求諸人而之已乎者惑求人者明自得思之思之又重思之再三思上也求已者必須思之而不通􅀑神將通之再􅀂致􅀑神爲通之也三思之而不通則或非􅀑神之力也精氣之極也神自見其力蓋由思之言今能致􅀑神者非􅀑之極也不巳精氣四體旣正血氣旣靜一意搏心耳目不淫雖逺􅀂近旣言淫過事雖逺大可以近速而成也體正氣静意一心搏耳目之用不有思索生知其知自生近而遇思索慢易生憂輕易踈慢故生憂必致凶禍暴傲生怨必多故生怨也殘暴傲虐傷害憂鬱生疾通暢故生疾也憂恚鬱塞懷不疾困乃死謂彌留而死旣疾而困可思之而不捨内困外薄於内形骸薄於外也思欲不捨則五藏困不蚤爲圖生將巽舎生將巽遁其舎而至於死期也旣巳内困外薄尚不圖之如此則食莫􅀂無飽善閉塞飽食者思莫􅀂勿致多困竭致思者節適之齊彼將自至常莫過中則生將自至齊中也言能節食適思凡人之生也天出其精於天也言稟精地出其形養成其形地出衣食以合此以爲人合言以成人天地精氣和乃生成其生也二氣和乃不和不生察和之道其精不見其徴不醜見至於徴驗又不知其􅀋也醜􅀋也言欲察和則其不可平正擅匈論治在心此以長壽􅀋雖可和之精適理又不離心如此則可以益筭而長壽也知見但能平而正則和氣獨擅於匈中論其忿怒之失度乃爲之圖怒過􅀂忿而去之度則常圖節其五欲去其二凶爲害故曰二凶喜怒過度皆能不喜不怒平正擅匈旣乎且正獨擅於匈中也不喜不怒可謂和也故能凡人之生也必以平正所以失之必以喜怒憂患是故止怒莫􅀂詩慰故能止怒詩有清風之去憂莫􅀂樂節樂莫􅀂禮守禮莫􅀂敬守敬莫􅀂靜内靜外敬能反其性性將大定凡食之道大充傷而形不臧過於飽大充謂大攝骨枯而血沍於飽酒胃大攝謂過而凝沍血銷減充攝之閒此謂和成則和暢而有所成也閒猶中也充攝得中精之所舎而知之所生舎於和成言精智生飢飽之失度乃爲之圖合於度圖之令飽則疾動疾動飽而氣銷則食飢則廣思則忘其飢飢而廣思老則長慮則遺其老老而長慮飽不疾動氣不通於四末四支四末飢不廣思飽而不廢也廢止老不長慮困乃遬竭困而速竭令老則益大心而敢又能勇敢心旣浩大寛氣而廣而廣有所容當寛舒其氣其形安而不移固故不移形安則志能守一而棄萬苛能棄萬苛也守一則惡煩故見利不誘見害不懼寛舒而仁獨樂其身是謂雲氣意行似天之行氣似天之布雲也能調其氣故比於雲意凡人之生也必以其歡和故生也歡則志氣憂則失紀怒則失端則失其端憂怒過常紀憂悲喜怒道乃無處故道無所處憂怒則害道愛慾靜之遇亂正之愛慾謂􅀂廢亂則當正之則當靜之􅀂遇勿引勿推福將自歸任平而往福則自歸也去而勿引來而勿推伹彼道自來可藉與謀之謀則意動而理盡藉因也因其自來而與靜則得之躁則失之靈氣在心一來一逝躁則逝靜則來其細無内其大無外所以失之以躁爲害心能執靜道將自定得道之人理丞而屯泄匈中無敗屯聚泄散故謂腠理丞連無敗匈中節欲之道萬物不害物無害也能節欲則封禪第五十書所載管子言以補之元篇亡今以司馬遷封禪桓公旣霸㑹諸侯於葵丘而欲封禪管仲曰古者封泰山禪梁父者七十二家而夷吾所記者十有二焉昔無懷氏王者古之羲前在佚封泰山禪云云梁父東云云山在虙羲封泰山禪云云神農封泰山禪云云炎帝封泰山禪云云黃帝封泰山禪亭亭在牟隂亭亭山顓頊封泰山禪云云帝俈封泰山禪云云堯封泰山禪云云舜封泰山禪云云禹封泰山禪㑹稽湯封泰山禪云云周成王封泰山禪社首在鉅平南十三里山名在博縣或云皆受命然後得封禪桓公曰寡人北伐山戎過􅀌竹西伐大夏涉流沙束馬懸車上卑耳之山也卑耳即齊語所謂辟耳將上山纏束其馬懸鉤其車南伐至召陵登熊耳山以望江漢兵車之㑹三而乗車之㑹六九合諸侯一匡天下諸侯莫違我昔三代受命亦何以異乎於是管仲睹桓公不可窮以辭因設之以事曰古之封禪鄗上之黍北里之禾鄗上北里皆地名鄗上山也鄗音臛所以爲盛江淮之閒一茅三脊靈茅所謂所以爲之豪傑致天下之精材來天下之良工則有戰勝之器矣公曰攻取之數何如管子對曰毀其備散其積奪之食則無固城矣其城不固此謂攻也毀備奪食則無以守故公曰然則取之􅀂何其土謂取管子對曰假而禮之借之恩假謂假厚而勿欺之以德厚謂重則天下之士至矣公曰致天下之精材􅀂何爲軍之器用也精材謂美材可管子對曰五而六之九而十之不可爲數酬之十常令貴其一分不可爲定數如此則天下精材可致也欲致精材者必當貴其價故他處直五我酬之六他處直九我公曰來工􅀂何管子對曰三倍不逺千里工人不以千里爲逺皆至矣酬工匠之庸直常三倍他處則桓公曰吾巳知戰勝之器攻取之數矣請問行軍襲邑舉錯而知先後不失地利􅀂何管子對曰用貨察圖察彼國圖則不失地利也用貨爲反閒則知其先後公曰野戰必勝􅀂何管子對曰以竒以勝敵也竒謂權譎公曰吾欲徧知天下􅀂何管子對曰小以吾不識則天下不足識也見齊其所不􅀂能博聞多識天下亦無人能識之也識則知天下遍矣吾之所公曰守戰逺見有患於此二者預見其患矣爲國者必入守出戰今吾夫民不必死則不可與出乎守戰之難死然後可出也守戰之難必致不必信則不可恃而外知視聽故知外事也人必誠信然後爲君夫恃不死之民而求以守戰恃不信之人而求以外知此兵之三闇也戰闇外闇故曰三闇苟不死不信則守闇使民必死必信􅀂何管子對曰明三夲公曰何謂三本管子對曰三夲者一曰固二曰尊三曰質公曰何謂也管子對曰故國父母墳墓之所在固也墳墓則其心固人旣戀本而哀田宅爵禄尊也妻子質也三者備然后大其威厲其意則民必死而不我欺也則信也不我欺桓公問治民於管子管子對曰凡牧民者必知其疾苦也疾謂患而憂之以德勿懼以罪勿止以力止而不來煩力役則愼此四者足以治民也桓公曰寡人睹其善也何以爲寡也之理國恐其太少謂四言雖善然以管仲對曰夫寡非有國者之患也不在寡少也患在不能行昔者天子中立地方千里四言者該焉何爲其寡也備千里之化不爲少該備也謂四言足以夫牧民不知师其疾則民疾嫌之也疾謂憎不憂以德則民多怨懼之以罪則民多詐避罪也設詐以止之以力則徃者不反役之苦創其力來者鷙距聞其役煩則疑鷙疑也距止也也而止故聖王之牧民也不在其多也桓公曰善勿巳如是又何以行之已更有何事以行此四言也其事旣善雖然不伹如是而管仲對曰質信極忠主能得信質主也謂忠也又極嚴以有禮愼此四者所以行之也桓公曰請聞其􅀃管仲對曰信也者民信之忠也者民懷之嚴也者民畏之禮也者民美之語曰澤命不渝信也渝變如此者信也謂恩澤之命不有非其所欲勿施於人仁也於人也仁者忠堅中外正嚴也質信以讓禮也讓如此者禮也主行於信又能遜桓公曰善哉牧民何先管仲對曰有時先事有時先政有時先德有時先怒飄風􅁀雨不爲人害涸旱不爲民患百川道川百從故道之流皆年榖熟糴貸賤禽獸與人聚食民食獸食人之食年穀熟則禽民不疾疫當此時也民富且驕牧民者厚收善歳以充倉廩謂有善歳年禁藪澤此謂先之以事隨之以刑敬之以禮樂以振其􅁋禮樂者振正也人􅁋放所以正此謂先之以政飄風暴雨爲民害涸旱爲民患年榖不熟歳􅏇糴貸貴民疾疫當此時也民貧且罷牧民者發倉廩山林藪澤以共其財後之以事先之以恕以振其罷此謂先之以德其收之也不奪民財歳也謂善其施之也不失有德年也謂凶冨上而足下此聖王之至事也桓公曰善桓公問管仲曰寡人欲霸以二三子之功既得霸矣今吾有欲王其可乎管仲對曰公甞召易牙而問焉以實封故推令問易牙管仲知桓公不可王難鮑叔至公又問焉鮑叔對曰公當召賔胥無而問焉賔胥無趨而進公又問焉賔胥無對曰古之王者其君豊其臣敎制臣故可以王也君豊臣敎則君能今君之臣豊於君也言德豊公遵遁繆然逺二三子遂徐行而進皆流遁繆妄之事言公之所遵行者而漸以取進耳欲王天下於米何無所比可謂逺於二三子見當遂公曰昔者大王賢王季賢文王賢武王賢武王伐殷克之七年而崩周公且輔成王而治天下僅能制於四海之内矣今寡人之子不􅀂寡人寡人不􅀂二三子以此觀之則吾不王必矣桓公曰我欲勝民服於民言欲勝爲之奈何管仲對曰此非人君之言也之不可直用刑勝也人君之言當仁以化勝民爲易夫勝民之爲道非天下之大道也君欲勝民則使有司䟽獄而謁有罪者償有罪者則償之也謂䟽録獄囚謁告數省而嚴誅嚴其誅罪數省有過􅀂此則民勝矣雖然勝民之爲道非天下之大道也使民畏公而不見親故也嚴刑禍亟及於身身戮望夷二丗嚴刑雖能不乆不可久安雖能勝人則人持莫之弑也危哉弑謂殺親也持謂見刼執也君之國岋乎桓公觀於厩問厩吏曰厩何事最難厩吏未對管仲對曰夷吾甞爲圉人矣馬者圉養傅馬棧最難馬所立木也謂編次之棧先傅曲木曲木又求曲木次還須曲木求其􅀋編棧者先附曲木其曲木巳傅直木母所施矣棧敗矣喻小人用即君子退也旣用曲木又施直木則失其􅀋而先傅直木直木又求直木直木巳傅曲木亦無所施矣則小人退喻君子用桓公謂管仲曰吾欲伐大國之不服者奈何管仲對曰先愛四封之内然后可以惡竟外之不善者可以惡竟外之不善者四封之内見愛則人致死先定卿大夫之家然后可以危鄰之敵國國強故可以危鄰國卿大夫之家旣定則是故先王必有置也然后有廢也後廢他國也已國有置然必有利也然后有害也利能以害他國也已國然後可桓公踐位令釁社塞禱於社曰釁社殺生以血澆落祝鳬已疪獻胙名也胙祭肉也祝祝史鳬疪其祝曰除君苛疾煩苛之疾祝令除君與􅀂之多虚而少實而非實如此者亦祝去之也􅀂似也謂君之材能多似有桓公不􅀃瞋目而視祝鳬已疪祝鳬已疪授酒而祭之曰又與君之􅀂賢亦當去之謂君似賢桓公怒將誅之而未也以復管仲告也復猶管仲於是知桓公之可以霸也之惡君怒祝史誣君也故知可與霸也而將誅之是心務善桓公乗馬虎望見之而伏桓公問管仲曰今者寡人乗馬虎望見寡人而不敢行其故何也管仲對曰意者君乗駮馬而洀桓迎日而馳乎盤字洀古公曰然管仲對曰此駮象也駮食虎豹故虎疑焉楚伐莒莒君使人求救於齊桓公將救之管仲曰君勿救也公曰其故何也管仲對曰臣與其使者言三辱其君顔色不變變則無羞耻也辱其君而色不臣使官無滿其禮三皆不滿足三加其禮強其使者爭之以死之則爭之以死是不智不識不滿之意纔激強莒君小人也君勿救知其君小人也其使不賢故桓公果不救而莒亡桓公放春三月觀於野故曰放春春物放發桓公曰何物可比於君子之德乎隰朋對曰夫粟内甲以處中有卷城外有兵刄外而卷􅀂城苗之繊芒在種粟者甲在内而處葉居兵刄外有未敢自恃自命曰粟故自名曰粟粟則謹促之名也粟之物用雖如此然不敢自恃此其可比於君子之德乎管仲曰苗始其少也眴眴目揺也胡絹切乎何其孺子也則柔順故似孺子也眴眴柔順㒵榖苗始至其壯也莊莊乎何其士也大莊莊矜直莊謂苗轉長也㒵至其成也由由乎玆免何其君子也免謂益有謹勵由由恱也實㒵兹天下得之則安爲命人以榖不得則危故命之曰禾人之性命以其和調此其可比於君子之德矣桓公曰善桓公北伐􅀌竹未至卑耳之谿十里闟然止瞠然視瞠驚視㒵闟住立㒵援弓將射引而未敢發也謂左右曰見是前人乎左右對曰不見也公曰事其不濟乎寡人大惑今者寡人見人長尺而人物具焉冠右祛衣走馬前疾事其不濟乎寡人大惑豈有人􅀂此者乎管仲對曰臣聞登山之神有俞兒者長尺而人物具焉霸王之君興而登山神見且走馬前疾道也袪衣示前有水也右袪衣示從右方渉也至卑耳之谿有賛水者引渡謂賛者水曰從左方渉其深及冠從右方渉其深至膝􅀂右渉其大濟桓公立拜管仲於馬前曰仲父之聖至􅀂此寡人之抵罪也乆矣是寡人當有罪乆矣抵當也不知仲父之聖管仲對曰夷吾聞之聖人先知無形今巳有形而後知之臣非聖也善承敎也人之法善承古桓公使管仲求􅇞戚􅇞戚應之曰浩浩乎管仲不知至中食而慮之婢子曰公何慮管仲曰非婢子之所知也婢子曰公其母少少母賤賤昔者吳干戰迆也干江邊未齓不得入軍門齒也齓毀國子擿其齒遂入爲干國多戰國子功多也戰功曰多言於干百里徯秦國之飯牛者也穆公舉而相之遂霸諸侯由是觀之賤豈可賤少豈可少哉管仲曰然公使我求􅇞戚􅇞戚應我曰浩浩乎吾不識婢子曰詩有之浩浩者水育育者魚中喻時人皆得配偶以居其室家寗戚水浩浩然盛大魚育育然相與而遊其陳此詩以見意有伉儷之思故未有室家而安召我居疋與之爲居乎也言誰當召我授之配􅇞子其欲室乎桓公與管仲闔門而謀伐莒未發也而巳聞於國其故何也管仲曰國必有聖人桓公曰然夫之役者有執席食以視上者必彼是邪私因上視所以察君也必是人者知吾謀也桓公與管仲謀時役人於前乃有執席而食於是乃令之復役母復相代不令相代彼亦知􅀂覺已必當來也時執麻而食者代人入役因得察君今少焉東郭郵至桓公令儐者延而上賔客者也儐謂賛引與之分級而上禮待之公以客謂使之就賔階也故與之分級而上問焉曰子言伐莒者乎東郭郵曰然臣也桓公曰寡人不言伐莒而子言伐莒其故何也東郭郵對曰臣聞之君子善謀而小人善意度之也善以意臣意之也桓公曰子奚以意之東郭郵曰夫欣然喜樂者鍾鼓之色也夫淵然淸靜者縗絰之色也漻然豐滿盛故其皃豐滿心在兵武形氣而手足拇動者外形中勇足拇動也必應故手兵甲之色也日者臣視二君之在臺上也口開而不闔是言莒也口相對即知其言莒莒字兩口故二君開舉手而指勢當莒也且臣觀小國諸侯之不服者唯莒於是於是知之唯莒不服臣故曰伐莒桓公曰善哉以微射明此之謂乎知伐國之明也言以形色之微子其坐寡人與子同之伐同謀也莒之客或欲見於齊桓公請仕上官授禄千鍾公以告管仲曰君予之客聞之曰臣不仕矣公曰何故對曰臣聞取人以人者然後取人以人之言其去人也亦用人吾不仕矣管子卷第十六
