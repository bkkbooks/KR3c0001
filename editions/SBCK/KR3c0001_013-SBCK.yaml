body:
  text: 心術上第三十六心術下第三十七白心第三十八心術上第三十六短語十心之在體君之位也運爲皆心之所使故象君位心之在體當身之中凡身之九竅之有職官之分也代彼若百官之有其分也九竅則各有職司不能以此心處其道九竅循理道則九竅所司各心之君處常能順應也循理而嗜欲充益目不見色耳不聞聲其由故目有所不見耳有所不君嗜欲充益動達道則九竅失也聞故曰上離其道下失其事下事得上順道則母代馬走使盡其力母代鳥飛使􅁦其羽翼母先物動以觀其則動則失位靜乃自得道不逺而難極也代之雖盡力􅁦翼而終竟不能盡以喻君代臣亦然故曰能走者馬也能飛者鳥也今不任鳥馬之飛走而欲以人故曰難極也不逺而不得與人並處而難得也虚其欲神將入舎欲神則入而舎之但能空虚心之嗜掃除不絜神乃留處喻情欲不絜亦人皆欲智而莫索其所以智乎以所以循理也智者虚心智乎智乎投之海外無自奪復逺投海外虚心用之但能虚心循理其智雖奪之也他母從而求之者不得處之者知其處而得之也將欲求之智終不夫正人無求之也亦無從而求之智旣不可得故人故能虚無虚無無形謂之道化育萬物謂之德君臣父子人間之事謂之義有冝也人事各登降揖讓貴賤有等親踈之體謂之禮􅂤物小未一道殺僇禁誅謂之法物未有能謂簡擇於禁防之此法之用也與道爲一者乃殺勠大道可安而不可􅀃之則有理存焉如欲􅀃之無緒夫道無形無聲者也體神而安言可直人之言不義不顧不出於口不見於色四海之人又孰知其則理又不見於色言理旣絕四海之人誰有能知其則義哉謂安道之君子雖人言其不義驚然不顧言旣不出於口天曰虚地曰靜乃不伐則道德全備故不可伐也言能體天而虚順地而靜絜其宫猶靈臺也宫者心之宅開其門謂門下解中門謂耳目也口也開口使順理而言去私母言私言謂無神明若存則神存宫㓗無私紛乎其若亂靜之而自治而順之則自理也雖紛然而亂但靜強不能徧立智不能盡謀強忘立能逼而盡與智然後所謀物固有形形固有名名當謂之聖人所以稱聖立名當物故必知不言無爲之事然後知道之紀無事爲紀道以不言殊形異執不與萬物異理故可以爲天下同理故可以爲天下主君人者必殊形異執與物人之可殺以其惡死也雖殺無益􅀂不惡死其可不利以其好利也利之亦無懲也􅀂不好利雖不是以君子不怵乎好之情下解中作怵怵止也不止人好利不迫乎惡惡死之意不迫移人恬愉無爲去智與故其應也非所設也其動也非所取也智則事自去故事也旣忘過在自用理則生過自用不順罪在變化章則成罪也小聦明變舊是故有道之君其處也􅀂無知之至寂泊其應物也􅀂偶之然而合也􅀂符契自靜因之道也循理之道也凡此皆虚靜心之在體君之位也九竅之有職官之分也管氏之辭豈有故作難書此巳下上章之解也然非錯不倫處非其第據此則劉向偏授之由曰謂爲管氏之辭故使然也今究而復從而解之前之循制皆不然矣凡此書之解乃有數篇版法勢之屬皆間韓有解老之篇疑此解老之􅀋也㝷文理觀其體勢一韓非之論而耳目者視聽之官也心而無與於視聽之事則官得守其分矣夫心有欲者物過而目不見聲至而耳不聞也故曰上離其道下失其事故曰心術者無爲而制竅者也故能制於九竅心無􅄝欲之爲故曰君無代馬走無代鳥飛此言不奪能能不與下誠也凡爲其所能無不誠君之能不預於下之誠母先物動者揺者不定趮者不靜言動之不可以觀也位者謂其所立也人主者立於隂隂者靜主立於隂也靜爲躁君故人故曰動則失位位也失君隂則能制陽矣靜則能制動矣制臣矣君亦能故曰靜乃自得道在天地之閒也其大無外其小無内細無不入也所謂大無不苞故曰不逺而難極也虚之與人也無閒形故曰無閒虚能貫穿人唯聖人得虚道故曰並處而難得丗人之所職者精也而生者精也職主也言所禀去欲則宣宣則靜矣欲則虚自宣通也去而靜行故通靜則精精則獨立矣獨則明明則神矣神者至貴也故館不辟除則貴人不􅃕焉故曰不㓗則神不處人皆欲知而莫索之其所以知彼也其所以知此也知彼也有此然後不脩之此焉能知彼不往知彼無此其具則脩之此莫能虚矣虚者無藏也能虚誑者無能此旣脩則彼不故也藏隱故曰去知則奚率求矣循理而自求也率循也無知則無臧則奚設矣不旣謀可以施設也能隱藏則無䇿無求無設則無慮無慮則反覆虚矣天之道虚其無形虚則不屈也屈竭無形則無所位􅰎也􅰎逆無所位􅰎故偏流萬物而不變同故不變無物與之德者道之舎物得以生物故德爲道舎謂道因德以生生知得以職道之精稟道之精也得其生者主由故德者得也得也者其謂所得以然也精而然得道之以無爲之謂道者道也無爲自然舎之之謂德所舎道之德也之謂故道之與德無閒先後之異故曰無閒道德同體而無外内故言之者不別也體同不別故能閒之理者謂其所以舎也所舎所以舎之異也道德之理可間者則有義者謂各處其冝也禮者因人之情縁義之理而爲之節文者也故禮者謂有理也理也者明分以諭義之意也故禮出乎義義出乎理理因乎冝者也法者所以同出不得不然者也法故曰同有禮則有也出故殺僇禁誅以一之也故事督乎法以法察事督察也謂法出乎權權出乎道從之而出權道者事道也者動不見其形施不見其德萬物皆以得然莫知其極故曰可以安而不可􅀃也莫人言至也者理之至人無能言也不冝言應也則應物故有時冝言應也者非吾所設故能無冝也不顧言因也者因舊故無所顧思因也者非吾所所顧故無顧也爲故無顧因舊也非吾所不出於口不見於色言無形也四海之人孰知其則言深囿也知不囿城也深淺之天之道虚地之道靜虚則不屈靜則不變不變則無過故曰不伐㓗其宫闕其門宫者謂心也心也者智之舎也故曰宫㓗之者去好過也之過也去欲好門者謂耳目也耳目者所以聞見也物固有形形固有名此言不得過實實不得延名虚延其名不得無實姑形以形以形務名督言正名者以其形也姑且也且言形故曰聖人不言之言應也耳於我無言言則言彼形應也者以其爲之人者也爲故聖人有所不應人得執其名務其應所以成之應之道也合之則所務自成斯應物旣有名守其名而命能者言所用也故曰因也就能而用君子之處也若無知言至虚也其應物也􅀂偶之言時適也若影之象形響之應聲也故物至則應過則舎矣舎矣者言復所於虚也心術下第三十七短語十一形不正者德不來形自正詩云抑抑威儀惟德之隅有諸内必形於外故德來居中外中不精者心不治能誠至心事自理精誠至之謂也中正形飾德萬物畢得翼然自來神莫知其極矣故萬物盡得其理也正外形飾内德則下觀而化昭知天下通於四極故能昭知天下自近因物之義可以逆順達於四極以及逺通是故曰無以物亂官官亂也貪賄則母以官亂心則心亂也徤羡太甚此之謂内德則内德也官貨兩忘是故意氣定然后反正故能反正也無欲則意氣定氣者身之充也曰身之充也氣以實身故行者正之義也之冝者也行不違中正充不美則心不得心亂而不自得也充不美則氣邪故行不正則民不服枉故人不服行不正則邪是故聖人若天然無私覆也􅀂地然無私載也私者亂天下者也凡物載名而來聖人因而財之而天下治實不傷爽故天下之理不傷也因名而財則物冝之不不亂於天下而天下治焉直莫之亂則自理矣天地以及萬物皆有理存專於意一於心耳目端知逺之證自端證知逺事也伹專意一心則耳目能專乎能一乎能母卜筮而知凶吉乎勞􅁲筮而後知乎惠迪吉從逆凶豈能止乎能巳乎於巳分謂能止能母問於人而自得之於已乎故不問而自得也誠巳自通問人致惑故曰思之思之不得􅀑神敎之必有􅀑神來教誠已思而不得非􅀑神之力也其精氣之極也者令有精極則神不􅀑神雖能敎不精極致其力我也得不敎豈􅀑神能一氣能變曰精鬼神來敎謂之精謂專一其氣能變一事能變曰智而動之謂智也能專一其事能變慕選者所以等事也擇之欲令其事齊等也人之來助或占慕之或選極變者所以應物也今極於變通之理應物者也物窮則變變而通之我之所由慕選而不亂選慕故不亂則齊㓗極變而不煩冝故不煩也極變以順物執一之君子執一而不失能君萬物專故能君萬物也一謂精專也旣精且日月之與同光天地之與同理謂所與日月合其明與天地合其德聖人裁物不爲物使物不爲裁而使已也聖人者裁斷於物而使心安是國安也是國安聖心安心治是國治也是國治聖心治治也者心也安也者心也心然後國從也理與安一在於治心在中中適也理心在於治言出於口口過則無治事加於民枉事則無故功作而民從則百姓治矣非理而何功成人服所以操者非刑也所以危者非怒也不能離道無不操違道必危是無不危也刑雖能操怒雖能危比之於道猶爲末功物民人操百姓治道其本至也如此則道爲人本豈不至哉必每人皆操道然後百姓理至不至無也所無虚之道也謂至者虚非所人而亂天下主必亂非至虚而爲凡在有司執制者之利非道也滯於刑政非道也有司執制常棄本逐求聖人之道􅀂存􅀂亡之不見其後故曰迎之不見其首隨亡也􅀂存􅀂援而用之殁丗不亡盡時故殁丗不亡也道無形也無形則無與時變而不化應物而不移日用之而不化變移之時無形則無人能正靜者筋肕而骨強故筋骨肕強也能靜則和氣全能戴大圎者體乎大方後能戴大圎必體大方然鏡大淸者視乎大明後能鏡大淸必視大明然正靜不失日新其德功立故其德日新正靜者則理順而昭知天下通於四極逺通四極旣知天下則金心在中不可匿彌精心之金之爲物之心則徴見於外不可隱匿之也爲用彌明故比心於金中苟有如金外見於形容可知於顔色於外其見或在顔色或在形容善氣迎人親如弟兄惡氣迎人害於戈兵不言之言聞於雷鼓人無不聞故同於雷鼓至道之君常言之言則金心之形明於日月察於父母於父母知子無􅀂於父母故以言焉金心無不耀無不知故明於日月察昔者明王之愛天下故天下可附暴王之惡天下故天下可離故貨之不足以爲愛刑之不足以爲惡貨者愛之末也刑者惡之末也故貨刑爲末也愛惡以爲心夲也凡民之生也必以正乎保全其生正乎則能所以失之者必以喜樂哀怒哀怒喜樂失其主過常則節怒莫􅀂樂節樂莫若禮能節怒樂主和故守禮莫􅀂敬故敬能守禮也禮者敬而巳矣外敬而内靜者必反其性循察故能反其性外敬則合禮内靜則豈無利事哉我無利心豈無安處哉我無安心有利事安處蔑不足資也亦旣反性則忘其利安雖心之中又有心有靜正之心也動亂之心中又意以先言得言意感而意然後刑事然後意感其形呈形然后思㝷故思之也有形則理可思然后知故能知也思然後得理凡心之形過知失生是故内聚以爲原泉之不竭猶泉之有源其可竭哉内聚思慮則用之不窮表裏遂通泉之不涸四支堅固泉之不涸而四支堅固也内和則外道表裏無擁故􅀂能令用之被服四固支堅固􅀍及其身也伹能用此道者則四是故聖人一言解之上察於天下察於地故能窮於上下解則無不通物白心第三十八短語十二建當立其當立者也凡所建必建有以靖爲宗爲建事之宗靜則思慮審以時爲寶非時䢖事時爲事寶也雖盡善不成以政爲儀其事故爲儀政者所以節制和則能乆然後能乆也又必當和同非吾儀雖利不爲非吾當雖利不行非吾道雖利不取利非吾儀也凡此雖曰有皆不爲之也當也道也故上之隨天其次隨人順人也所謂應天人不倡不和無不成也人倡而和事天不始不隨則舉無不違也後天而奉天則故其言也不廢其事也不隨原始計實夲其所生知其象則索其形事則有不隨􅀂此者當原其初始謂君之出言人乃順而不廢其行可知象旣可知則其形可索也計其理實㝷夲其所生則其象縁其理則知其情情自見順理則索其端則知其名名自形索端則故苞物衆者莫大於天地天地之中萬物共在化物多者莫多於日月隂陽之氣然後化之也日陽也月隂也物皆稟民之所急莫急於水火生理或有不全一日無水火則然而天不爲一物枉其時不爲薺麥枯死止其雨露也冬不爲松栢不凋輟其霜雪夏明君聖人亦不爲一人枉其法親休其誅放也周公不以管蔡之天行其所行而萬物被其利露故萬物利也冬行霜雪夏行雨聖人亦行其所行而百姓被其利故天下清而百姓蒙利也行賞於善人行罰於凶人是故萬物均旣誇衆矣人無私故萬物誇大也天與聖大而且衆也均蒙其利旣是以聖人之治也静身以待之物至而名自治之下無隱情故理循名責實則正名自治之竒身名廢正音飢竒謂邪不名正法備則聖人無事闕滯故聖人無事也正名法備則事無不可常居也時而遷居必有不可廢舎也度㢮紊也廢舎則百隨變斷事也擁塞也居變則不知時以爲度則不成也事非其時大者寛小者局則寛則不足有餘局物有所餘有所不足則事平理均也以有餘補不足兵之出出於人兵本人爲其人入入於身賞賜必反於身兵而有功入其兵之勝從於適師克在和也適和也所謂德之來從於身德立也脩身則故曰祥於􅀑者義於人祐之以福祥也義於人者則􅀑兵不義不可自害故不可兵不義而還強而驕者損其強弱而驕者亟死亡而驕違禮其戻焉死之速不亦冝乎無施而可弱而驕者則又強而卑義信其強申信音弱而卑義免於罪是故驕之餘卑弱弱則卑也於驕有餘則卑之餘驕強強則天驕於卑有餘則道者一人用之不聞有餘於一人理纔用天下行之不聞不足於其人無不足此謂道矣者道也多少昔足小取焉則小得福大取焉則大得福盡行之而天下服殊無取焉則民反其身不免於賊故人反背之而賊害也殊無取焉則動皆違道左者出者也生故爲出也左爲陽陽主右者入者也死故爲入也右爲隂隂主出者而不傷人入者自傷也人違而傷人是還自傷出者旣主生則不當傷不日不月而事以從不計日月事伹循道而往成也巳從而不卜不筮而謹知吉凶豈須卜筮後知乎順道則吉違道則凶是謂寛乎形徒居而致名寛閑徒然而居能致令名守道者靜黙而巳故其身去善之言爲善之事事成而顧反無名之成顧反之者黙然無名也􅀂能去言善直能爲善事其事能者無口從事無事從事安然閑暇􅀂無事然也深能其事者必不求名然其審量出入而觀物所載當觀物載之謂凡出命今量而出之也所堪然後當孰能法無法乎始無始乎終無終乎弱無弱乎而忘之者也凡北皆謂爲故曰美哉岪岪道如此則功美日興故曰美哉岪岪岪岪興起㒵謂能爲而不爲有契於故曰有中有中爲中乃是有中也舉事雖得其中而不孰能得夫中之衷乎􅂢折中者得於中之中乎其唯忘故曰功成者隳名成者虧故曰孰能棄名與功而還與衆人同於物者誰能害之者也君棄功名則與衆不異同孰能棄功與名而還反無成無所成名棄功名則無成有貴其成也乃是成也能貴無成有成貴其無成也乃是無成若其貴成日極則仄月滿則虧極之徒仄滿之徒虧月謂巨之徒滅大功也謂能立孰能已無已乎効夫天地之紀地者其唯忘己乎天地忘形者也能効天人言善亦勿聽人言惡亦勿聽非之不沮譽之不勸持而待之空然勿兩之淑然自淸和美善惡自清也但無心而待則淑然無以旁言爲事成察而徴之無聽辯無聽其利口之辯言恱之也無以旁譽之言則以爲事成功萬物歸之美惡乃自見歸當順萬物之惡終自顯見也而客之其美之與天或維之地或載之天莫之維則天以墜矣地莫之載則地以沉矣夫天不墜地不沉夫或維而載之也夫不沉墜者必有神靈維載之故天張於上地設於下自古及今而又況於人人有治之辟之􅀂夫靁鼓之動也而動也必有以夫不能自揺者夫或之有時而動則物揺之也無識之物皆不能自揺夫或者何若然者也誰使然也風有時揺動視則不見聽則不聞風謂洒乎天下滿滿天下也風之酒散不見其塞塞時也風無擁集於顔色熱者遇之則淸也寒者遇風則色􅃤知於肌膚能覺風惟肌膚責其往來莫知其時則不得正時責問其往來薄乎其方也則爲方謂遇方韕乎其圜也圎則爲圜也韕復皃謂遇韕韕乎莫得其門不見其門也雖復圎轉終故口爲聲也耳爲聽也目有視也手有指也足有履也事物有所比也徒然也必精神之比夫事物今夫口手目足各有其在非則不得語神亦不見之也之動揺則風使之然然求風當生者生當死者死神爲之主或死或生亦言有西有東各死其郷於各死其郷則無不均也雖其所居有東西之異至置常立儀能守貞乎儀則而勿失者可謂正乎人人理則置之常法立之常事通道能官人乎變通不違於道如此有能守其常事隨時官於人者可以故書其惡者言其薄者上聖之人立宦以主之猶有惡薄聖通也旣設法以敎之上者然後化而通之也而不化者則書而陳之居口無虚習也手無虚指也物至而命之事物之至或以手指之或以口命之口之習也手之指也終不徒然必以耳發於名聲凝於體色此其可諭者也色如此者性之敏惠故可以德義告諭也名聲之至耳能之内流於心外凝結於體不發於名聲不凝於體色此其不可諭者也者也故不可告諭也不發不凝所謂頑鄙及至於至者敎存可也敎亡可也存亡敎故敎存亦可敎亡亦可也謂人可誘令至於所欲至如此者故曰濟於舟者和於水矣和水則能濟舟靜無有波浪義於人者祥其神矣神與之福祥也與人理相冝則事有適而無適常者􅀂無適然事雖有所適可若有適觽解不可解而后解人莫知其由然結必雖時有適潛黙周密所以解結也待觽而後解觽故善舉事者國莫知其解不能知其解周密若結故爲善乎母提提爲不善乎將䧟於刑以我謙退無所舉欲爲不善又恐䧟提提謂有所楊舉也欲爲善乎則人罰也於刑善不善取信而止矣矣此言可以爲善不善之取也善與不善足以爲物所信則止若左若右正中而巳矣縣乎日月無巳也中得其正而止􅀂能常得中則名與日月左陽謂善也右隂謂不善也言處隂陽之巳時也俱懸而無愕愕者不以天下爲憂天下故不憂也愕愕守正者忘剌剌者不以萬物爲筴當操求物理而經營切爲䇿也剌剌操求自謂智謀之士能忘智孰能棄剌剌而爲愕愕乎德者佚而歸之也智者勞而失惠忘難言憲術須同而出同衆心然後出之矣凡爲法術必重難須無益言無損言近可以免又曰何謀此慎密之至損益之事當潜而爲之故曰知何知乎謀何謀乎常曰何謀此愼宻之至雖知之常曰何知雖謀之審而出者彼自來於彼故自來審而出者必同自知曰稽考彼矣自知則能知人曰濟同不以和濟同也知人則能可以濟知茍適可爲天下周稽知人自知能可爲天下之周愼也能濟所謂適也􅀂此内固之一可爲長乆固之則長久適可以知内自論而用之可以爲天下王如此可以爲天下王旣固於心度時論用天之視而精道故視天能精之也旣可王天下則於天四璧而知請故曰四璧旣能知天則祭以四璧而祈請其福祥也四璧周禮所謂四珪有邸者也祭天所奠也固邸於璧壤土而與生爲之生百榖也天旣降福故壤土能若夫風與波乎唯其所欲適所欲適天地之應風動波應大小唯洒是也聖人亦故子而代其父曰義也臣而代其君曰簒也簒奪而取也臣代於君必是簒何能歌武王是也之衆前歌後舞乎則武王以臣代君於理是也而武王以臣代君則非簒也謂之簒之豈能使紂故曰孰能去辯與巧而還與衆人同道恃其辯巧自異於物逆天絶理毒武王伐紂所以不爲簒者則以紂何武王之敢窺哉雖欲伐之故得簒名流四海故也向能去其辯巧與衆同道故曰思索精者明益衰德行脩者王道狹名故王道狹也思索太精則矜臥名利者寫生危息名利則除身之危臥猶息也寫猶除也能知周於六合之内者吾知生之有爲阻也竭故於其生有阻難也周其智於六合則神傷持而滿之乃其殆也覆故危也持滿者善名滿於天下不􅀂其巳也天下則名滿於實喪花􅀭而名進而身退天之道也身俱進者未有能名滿盛之國不可以仕仼不可任其仕也滿盛則敗亡故滿盛之家不可以嫁子家則與之俱亡嫁子於滿盛之驕倨傲暴之人不可與交危亡及巳也交於驕暴則道之大如天覆也無不其廣如地載也無不其重如石不能舉也萬人之力其輕如羽不爲重一人載之民之所以知者寡故曰何道之近而莫之與能服也也服行棄近而就逺何以費力也能求之於巳道近在身不得時故曰費力也而望之於人終無故曰欲愛吾身先知吾情自保其身知巳情則能君親六合以考内身皆備之則何須棄身而逺之也遍六合之種一一考之於身身以此知象乃知行情知象於身行之情乃知可旣知行情乃知養生則生全故曰乃知養生知行情則不違理不違理左右前後周而復所後行之旣周還復本所也行身之道或從左右或從前執儀服象敬迎來者常象將來執常儀行敬而迎之可行之理今夫來者必道其道理必道而來從也上道從也將來之無遷無衍命乃長乆無寛衍勸而爲之則命乆長也理旣從道而來伹遵而行之無遷移和以反中形性相葆中理如此則形事旣安和反理能相保也全性順故一以無貳是謂知道將欲服之必其端而固其所守守固自行則道責其往來莫知其時來則其不定􅀂貴生之往索之於天與之爲期命之求性時可知也理於天則期不失其期乃能得之命之理得也旣不失其則性故曰吾語􅀂大明之極之極謂大也若女也大明大明之明非愛人不矛也於人而不與之也愛惜也非有所隱情同則相從反則相距也取則距也與天同則從吾察反相距吾以故知古從之同也古之從者以其同也察今反則有距故知管子卷第十三
