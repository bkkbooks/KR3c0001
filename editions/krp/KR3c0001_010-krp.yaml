body:
  text: 戒第二十六地圖第二十七叅患第二十八制分第二十九君臣上第三十戒第二十六戒桓公所以陳内言九桓公將東游問於管仲曰我游猶軸轉斛猶軸之轉載斛石言我之游必有所濟南至琅邪司馬曰亦先王之游已何謂也令之為先王之游公未春游而南行故司馬正問管仲達其意故管仲對曰先王之游也春出原農事之不本者謂之游本務當原察之原察也農事不依秋出補人之不足者謂之夕不足者當補之秋為西成尚有夫師行而糧食其民者謂之亡糧食如此者必亡師行無成功空費從樂而不反者謂之荒先王有游夕之業於人無荒亡之行於身桓公退再拜命曰寳法也可寳也謂其法管仲復於桓公曰無翼而飛者聲也應故曰無翼而飛出言門庭千里必無根而固者情也如其情也故曰無根而固同舟而濟胡越不患異心無方而富者生也無方而富也莫知生所在故曰無方也生全則萬方輻湊生盡則鴻毛不振故曰公亦固情謹聲以嚴尊生嚴為防禁以尊其生言當固物情謹聲敎此謂道之榮道而光榮謂此三者順桓公退再拜請若此言也若順管仲復於桓公曰任之重者莫如身不舉故曰重任萬事萬行非身塗之畏者莫如口之主故可畏也樞機之發榮辱期而逺者莫如年寡故曰逺期也殤子日聞期頤實以重任行畏塗至逺期唯君子乃能矣桓公退再拜之曰夫子數以此言者敎寡人管仲對曰滋味動静生之養也好惡喜怒哀樂生之變也聦明當物生之徳也故曰當物非禮勿視聽是故聖人齊滋味而時動静其生所以養御正六氣之變即好惡喜怒哀樂所以循其變也六氣禁止聲色之淫其徳所以成邪行亡乎體違言不存口口言必順體無邪行静然定生聖也如此者聖也欲靜則生定仁從中出義從外作義因事斷故曰外作仁自心生故曰中出仁故不以天下為利義故不以天下為名利則非仁義也若以天下為名仁故不代王之王者非仁也不以道輔君而代義故七十而致政冒者耳非義也老而不致政貪是故聖人上徳而下功尊道而賤物名利物謂事之道徳當身故不以物惑利之物能惑哉身茍有道徳豈名是故身在草茅之中而無懾意何懼之有道徳為量南面聽天下而無驕色何驕之有神器儻來如此而后可以為天下王所以謂徳者不動而疾不動而疾徳必冥通故不相告而知以知天下不出戸牖不為而成無不為無為而不召而至是徳也應同氣同聲相可謂至徳也相求如此者故天不動四時云下而萬物化四時云下故萬物化云天常無為故曰不動然皃也運動君不動政令陳下而萬功成令陳列而下故萬物成也君亦常無為故曰不動然政心不動使四枝耳目而萬物情目自心使萬物莫不得其情也心亦當無為故曰不動然四枝耳寡交多親謂之知人交寡而親多以其知人故能寡事成功謂之知用能事寡而功以其知用故成聞一言以貫萬物謂之知道一言而得物貫也以其知道故能聞多言而不當不如其寡也良人不以多言為賢故曰狗不以善吠為博學而不自反必有邪而不博學衍者故必有邪行反修於其身心曼孝弟者仁之祖也故為仁祖仁從孝弟生忠信者交之慶也能慶交友之善有忠信之心故内不考孝弟仁言不外不正忠信友言不澤其四經而誦學者是亡其身者也經流澤徒為誦學者即四經可以亡身也四經謂詩書禮樂既無孝弟忠信空使四桓公明日弋在廩多集焉故於此弋也廩所以盛米粟禽鳥或管仲隰朋朝公望二子㢮弓脫釬杆弦釬所以而迎之曰今夫鴻鵠春北而秋南而不失其時夫唯有羽翼以通其意於天下乎今孤之不得意於天下非皆二子之憂也翼所以當憂二子不能為羽桓公再言二子不對桓公曰孤既言矣二子何不對乎管仲對曰今夫人患勞而上使不時人患飢而上重斂焉人患死而上急刑焉如此而又近有色容親冶而逺有徳俊踈賢雖鴻鵠之有翼濟大水之有舟楫也其將若君何不聽雖讜言空設故曰其將若君何不飛雖羽翼無益不濟雖舟楫徒施桓公蹵然逡遁管仲曰昔先王之理人也蓋人有患勞而上使之以時則人不患勞也人患飢而上薄斂焉則人不患飢矣人患死而上寛刑焉則人不患死矣如此而近有德而逺有色則四封之内視君其猶父母邪四方之外歸君其猶流水乎公輟射援綏而乗自御管仲爲左隰朋叅乗朔月三日進二子於里官里尉也里官謂令里官進二子將旌别而用之齊國之法舉賢必自里尉始故再拜頓首曰孤之聞二子之言也耳加聦而視加明於孤不敢獨聽之薦之先祖以薦祖廟謂陳其所言管仲隰朋再拜頓首曰如君之王也可以王也君能如此此非臣之言也君之敎也後成敎故曰君之敎此雖臣言必君用之然於是管仲與桓公盟誓為令曰老弱勿刑叅宥而后弊即周禮三宥一曰不識二曰過悮三曰悼耄也老弱犯罪者無即刑之必三寛宥而後斷罪三宥關幾而不正市正而不布而正之不必分錢布謂錢也即其物而山林梁澤以時禁發而不正也豺祭獸然後入山林獺祭魚然後入澤梁草封澤鹽者之歸之也譬若市人其處既多鹽故歸者譬若市人言不設禁也草封澤謂澤多草刈積成封可用煑鹽者也三年敎人四年選賢以爲長五年始興車踐乗遂南伐楚門傅施城謂附至其下施城楚城名北伐山戎出冬䓗與戎叔布之天下故其物布天下戎叔胡豆山戎有冬䓗戎叔今伐之果三匡天子而九合諸侯桓公外舎而不鼎饋不以鼎饋食言其外舍謂出宿於外盛也饌不中婦諸子謂宫人盍不出從乎君將有行之號君將有行中婦諸子内官盍何不也何不出乎宫人皆出從公怒曰孰謂我有行者宫人曰賤妾聞之中婦諸子公召中婦諸子曰女焉聞吾有行也對曰妾人聞之君外舍而不鼎饋非有内憂必有外患今君外舍而不鼎饋君非有内憂也妾是以知君之將有行也公曰善此非吾所與女及也而言乃至焉乃能至於此謂能知我謀也言我本不與汝及此謀今汝言吾是以語女吾欲致諸侯而不至為之奈何至今欲令其至如何乎我欲諸侯之至而乃不中婦諸子曰自妾之身之不為人持接也之中未嘗得出與人相持為猶與也言妾身在深宫對而接未嘗得人之布織也意者更容不審邪事又不得外人之宫中既少織絍之知以止君之行也故言更當容我思其不審之事布織言此者既昧於人事不當訪以軍謀蓋託不明日管仲朝公告人不知也大仁也哉其朋乎五十室言其事大而且易顯此皆自有主握持也或有舉齊國之幣持與路旁之家合於天地之無不容載故曰大仁哉其朋乎也司朋能不干預而强知此所謂於國有所不知政公又問曰不幸而失仲父也二三大夫者其猶能以國寧乎管仲對曰君請矍巳乎懼而問未止也矍已謂有所驚鮑叔牙之為人也好直賔咠無之爲人也好善寗戚之為人也能事孫在之為人也善言公曰此四子者其孰能一人之上也寡人并而臣之則其不以國寧何也四言今吾併得臣之國尚不寜何也子皆有超絶之材無人能過其上對曰鮑叔之為人好直而不能以國詘屈其直也不能為國以賔胥無之爲人也好善而不能以國詘寗戚之為人能事而不能以足息聚不能知足而息也寗戚善於農植貪於積孫在之為人善言而不能以信黙皆矜能太過不能與時屈申故國不寧也其所陳言既見信用尚不能黙凡此四子臣聞之消息盈虚與百姓詘信然后能以國寧勿已者朋其可乎朋之爲人也動必量力舉必量技言終喟然而歎曰天之生朋以為夷吾舌也其身死舌焉得生哉理齊政故哀歎也以先知未言朋亦將隨已早亡不得久以稱聖也然夷吾所管仲曰夫江黃之國近於楚為臣死乎必臣於楚豈為二國既近於楚死乎也齊臣而君必歸之楚而寄之楚不得為私而齊猶有望以二國歸楚若寄託然則君不歸楚必私之私之而不救也則不可救之則亂自此始矣國二國有楚既私二救彼不臣則構怨矣故曰亂自此始難齊必不救一為不救則不可救此桓公曰諾管仲又言曰東郭有狗嘊嘊旦暮欲齧我猳而不使也今夫易牙子之不能愛將安能愛君君必去之公曰諾枷謂以木連狗取聲為義即國家也言易東郭之狗喻易牙言其人殘忍同於狗矣不當使必須去之也牙終能亡國滅家此管子又言曰北郭有狗嘊嘊旦暮欲齧我猳而不使也今夫竪刁其身之不愛焉能愛君君必去之公曰諾管子又言曰西郭有狗嘊嘊旦暮欲齧我猳而不使也今夫衛公子開方去其千乗之太子而臣事君是所願也得於君者是將欲過其千乗也望不只千乗也其意必得齊國然後稱所開方在衛當嗣君之位今弃而事齊則所也望君必去之桓公曰諾管子遂卒卒十月隰朋亦卒桓公去易牙豎刁衞公子開方五味不至於是乎復反易牙官中亂復反豎刁利言卑辭不在側復反衞公子開方桓公内不量力外不量交而力伐四鄰公薨六子皆求立易牙與衞公子内與豎刁因共殺羣吏而立公子無虧故公死七日不斂九月不葬孝公犇宋宋襄公率諸侯以伐齊戰于甗大敗齊師殺公子無虧立孝公而還襄公立十三年桓公立四十二年地圖第二十七短語一凡兵主者必先審知地圖轘轅之險氏東南有轘轅道是也謂路形若轅而又轘曲緱濫車之水能泛車其水深渺名山通谷經川川也謂常陵陸丘阜之所在苴草林木蒲葦之所茂茂能有所覆藏苴草謂其草深道里之逺近城郭之大小名邑廢邑困殖之地殖謂壤田可播殖者也困謂其地墝埆不可種藝必盡知之主所當知凡此皆兵地形之出入相錯者盡藏之藴在心藏謂苞然后可以行軍襲邑舉錯知先後不失地利此地圖之常也人之衆寡士之精麤器之功苦盡知之此乃知形者也之形形謂兵知形不如知能知能不如知意故主兵必叅具者也主明相知將能之謂參具能三明智之叅具者合故謂故將出令發士期有日數矣宿定所征伐之國先也宿猶使羣臣大吏父兄便辟左右不能議成敗人主之任也敗明王事之成其臣不能議獨斷於心故論功勞行賞罰不敢蔽賢隱賢能不敢蔽有私行用貨財供給軍之求索求若竇嬰李牧之為也言相室或用私財供軍所使百吏肅敬不敢解怠行邪以待君之令相室之任也繕器械選練士爲敎服士服習設敎令使連什伍鈎連有所統屬使其什伍各相徧知天下審御機數此兵主之事也㕘患第二十八詳强弱之中自致於無患也太强亦有患太弱亦有患必叅短語二凡人主者猛毅則伐懦弱則殺猛毅者何也輕誅殺人之謂猛毅懦弱者何也重誅殺人之謂懦弱此皆有失彼此凡輕誅者殺不辜而重誅者失有罪故上殺不辜則道正者不安上失有罪則行邪者不變道正者不安則才能之人去亡行邪者不變則羣臣朋黨才能之人去亡則冝有外難亡必構能士去有外難也鄰來伐故羣臣朋黨則冝有内亂殺常因是生故有内亂也羣臣朋黨則狗變為虎簒故曰猛毅者伐懦弱者殺也君之所以卑尊國之所以安危者莫要於兵故誅暴國必以兵禁辟民必以刑然則兵者外以誅暴内以禁邪故兵者尊主安國之經也不可廢也若夫世主則不然外不以兵而欲誅暴則地必虧矣内侵故地虧無兵誅暴暴必内不以刑而欲禁邪則國必亂矣上侵故國亂無刑禁邪邪必故凡用兵之計三驚當一至如此者三可當師之一至敵國驚謂耀威示武能驚敵使懼三至當一軍當一軍之用師之三至可三軍當一戰成一戰之功軍之三用可故一期之師十年之蓄積殫十年之蓄積師行一期能盡一戰之費累代之功盡盡累代之功傾國一戰能今交刃接兵而后利之則戰之自勝者也空耗雖未被敵勝先已自勝交刃接兵必卒喪刃折貨財攻城圍邑主人易子而食之析骸而爨之則攻之自拔者也力竭財殫士喪城雖未攻先主人食子爨骸攻者必智窮主之師非善計者已自拔凡此皆庸是以聖人小征而大匡不失天時不空地利用日維夢其數不出於計得地利用吉日襲吉夢其數從何而生皆出小征謂誅暴國大匡謂正天下既合天時又謀也於計故計必先定而兵出於竟計未定而兵出於竟則戰之自敗攻之自毁者也得衆而不得其心則與獨行者同實其心不得獨行同實也則叛亡至故與兵不完利與無操者同實甲不堅密與俴者同實單衣者俴謂無甲弩不可以及逺與短兵同實射而不能中與無矢者同實中而不能入與無鏃者同實將徒人與俴者同實雖衆無兵甲則與單人同也徒人謂無兵甲者俴單也人短兵待逺矢與坐而待死者同實矢逺則坐而受死也至短兵不能應故凡兵有大論必先論其器論其士論其將論其主故曰器濫惡不利者以其士予人也士不可用者以其將予人也將不知兵者以其主予人也主不積務於兵者以其國予人也故一器成往夫具而天下無戰心成敢往之夫又具則天一器謂師之器其器既心與戰也下不敢生二器成驚夫具而天下無守城驚敵之夫又具則天下不二器謂軍之器其器既成而禦也敢守城三器成游夫具而天下無聚衆游務之夫又具則天下之衆三器謂一國之器其器既成散也懼而自所謂無戰心者知戰必不勝故曰無戰心所謂無守城者知城必拔故曰無守城所謂無聚衆者知衆必散故曰無聚衆制分第二十九短語三凡兵之所以先爭而爭為者謂下事謂欲用兵所當先聖人賢士不為愛尊爵人賢有聖之而不愛惜也士則以尊爵加道術知能不為愛官職以官職加之有道術智能則巧伎勇力不為愛重祿聦耳明目不為愛金財故伯夷叔齊非於死之日而後有名也其前行多修矣故死後有名由前行多修武王非於甲子之朝而後勝也其前政多善矣子之朝一戰大勝由前政多善故甲故小征千里徧知之者今既舉衆而征己國與敵國皆當知之故徧知千里小征謂以諸侯之衆有所征古者諸侯大國有五百里築堵之墙十人之聚日五閒之者猶日五候之況戎事之大可以不徧知哉閒謂私候之假令築一堵之墙或十人聚作主大征徧知天下子以天下為家故徧知天下也大征謂以天下之衆有所征伐天日一閒之散金財用聦明也或散金財有所慕賞或用聦明度其不虞也夫動衆當令主者日一閒候之其閒候之也故善用兵者無溝壘而有耳目耳目視聽逺溝壘防禦小兵不呼儆不茍聚不妄行不强進呼儆則敵人戒茍聚則衆不用若周幽之偽烽也無事徒聚衆必不用妄行則羣卒困强進則銳士挫故凡用兵者攻堅則軔既堅則軔而難入軔牢固之名也所攻乗則神脆繣然瓦解故若神謂虚脆也所乗既攻堅則者堅則以士卒堅强故也所攻雖堅能令脆者乗則堅者瑕則以士卒脆弱故所乗雖脆却為堅者故堅其堅者其者弱卒攻脆謂强卒攻堅屠牛坦朝解九牛而刀可以莫鐵削也莫猶則刃游閒也故刀不虧刃游理閒故天道不行屈不足道之不行必屈竭而不足用兵者必順天道若及天從人事荒亂以十破百亂故十可破百敵國人事既荒且器備不行以半擊倍此雖半可以擊彼之倍敵國器備不可施行故故軍爭者不行於完城池行其城池彼則知而備之也行謂先覘之也欲以軍爭而有道者不行於無君恐知而有備覘彼無君亦故莫知其將至也所以不知其將至既不先覘以濳襲至而不可圍莫知其將去也知其將去楚幕有烏之比不可圍者必潜而遁故不去而不可止敵人雖衆不能止雖衆何能止去既不可止待治者所道富也治而未必富也當然未必能富有所待而治其道必知冨之事然後能富富者所道强也而富未必强也而未必能强也富者其道當强必知强之數然後能强强者所道勝也而强未必勝也必知勝之理然後能勝勝者所道制也而勝未必制也必知制之分然後能制是故治國有器富國有事强國有數勝國有理制天下有分君臣上第三十短語四爲人君者修官上之道而不言其中之道而已至於官中之事則君在衆官之上但修此官上所言也有司存非爲人臣者比官中之事而不言其外言官外則為越職比謂校次之也若君道不明則受令者疑權度不一則修義者惑民有疑惑貳豫之心而上不能匡則百姓之與閒能正故其所與為多礙而不通也閒謂隔礙不通也人心有疑君不猶掲表而令之止也表又令止之是亦不一也故以況人心之疑也掲舉也表謂以木為標有所告示也既使舉於是故能象其道於國家加之於百姓而足以飾官化下者明君也本道而立法象法也謂能能上盡言於主下致力於民而足以修義從令者忠臣也上惠其道下敦其業上下相希以為法也言相希准若望叅表則邪者可知也以㕘驗曲直叅表謂立表所吏嗇夫任事束群吏之官吏嗇夫謂檢之比也也若督郵人嗇夫任敎束百姓之官人嗇夫亦謂檢敎在百姓論在不撓姓有謂百不撓法以行私不從敎論其罪罰賞在信誠體之以君臣其誠也以守戰信罰既賞可以守城出可以野戰也必君臣合體莫不至誠故入如此則人嗇夫之事究矣吏嗇夫盡有訾程事律謂毎事據律而行也訾限也程准也事律論法辟衡權斗斛文劾不以私論而以事爲正已下皆據事以爲正不曲從其私也辟刑也文劾言據文而舉劾謂論法刑如此則吏嗇夫之事究矣人嗇夫成敎吏嗇夫成律之後則雖有敦慤忠信者不得善也忠信故無有獨得善者也人嗇夫之敎旣成則人皆而戲豫怠傲者不得敗也敢爲非雖有豫怠不得爲敗也吏嗇夫之律旣成人皆懼法不如此則人君之事究矣是故爲人君者因其業夫之業也謂因人嗇乗其事夫之事謂乗吏嗇而稽之以度法度考此又以國之者二有善者賞之以列爵之尊田地之厚而民不慕也故不善者善自應賞横慕不敢有過者罰之以廢亡之辱僇死之刑而民不疾也罰故人過自應疾怒不敢殺生不違而民莫遺其親者其理則人知主徳之有常不輕為或罰而殺之或賞而生之皆不違遺其親也去就故人不此唯上有明法而下有常事也天有常象不改其貞懸象著明地有常形不改其静山澤通氣人有常禮子其儀不易尊君父卑臣一設而不更此謂三常兼而一之人君之道也官故曰兼而一之人君無官兼統衆分而職之司存各有人臣之事也君失其道無以有其國臣失其事無以有其位然則上之畜下不妄而下之事上不虚矣上之畜下不妄所出法則制度者明也下之事上不虚則循義從令者審也上明下審上下同徳代相序也下審更相序代更也謂上明君不失其威下不曠其産而莫相徳也上各有所恃故不相徳君以威覆下下以産供是以上之人務徳而下之人守節義禮成形於上而善下通於民則百姓上歸親於主而下盡力於農矣故曰君明相信五官肅士廉農愚商工愿則上下體其體也上下各得而外内别也民性因而三族制也族三外有别故此三族各得其制也謂農商工也言因士上下有體内夫為人君者廕徳於人者也者君廕人以徳為人臣者仰生於上者也君而生臣者仰為人上者量功而食之以足以食之各得足也量其功之多少制祿為人臣者受任而處之以敎必設敎受任者布政有均民足於産則國家豐矣以勞授祿則民不幸生者必有勞功不儌倖而偷生也得祿人則致死以立刑罰不頗則下無怨心名正分明則民不惑於道人於道不惑也刑名職分明則道也者上之所以導民也是故道徳出於君君出徳從制令傅於相相傅令因事業程於官業程於君也官各以其事百姓之力也胥令而動者也動則所舉不妄胥視也視令而是故君人也者無貴如其言無所禀令故言最貴也君以言制下無言則下人臣也者無愛如其力其力最可愛也臣則宣力事君故言下力上力上於君也君言下於臣臣而臣主之道畢矣是故主畫之相守之别其所畫謂分相則守而行之也授事君既盡其事相畫之官守之官畫之民役之役力以行其事官既畫之人則則又有符節印璽典法筴籍以相揆也法䇿籍所以示之制也凡此符節印璽所以示其信也典是非故曰以相揆也可以考其真偽定其此明公道而滅姦偽之術也論材量能謀徳而舉之後舉用之謀知其徳然上之道也專意一心守職而不勞事為勞不以職苦下之事也為人君者下及官中之事則有司不任事則君奪臣下及官中之不任也職故有司爲人臣者上共專於上則人主失威今乃專上之權故主臣當上供從君之命威失是故有道之君正其徳以莅民而不言智能聦明智能聦明者下之職也所以用智能聦明者上之道也智能聦明謂用下之上之人明其道下之人守其職上下之分不同任而復合為一體為君肱故曰一體元首臣為股是故知善人君也故可以為人君也知善則謀慮深逺身善人役也善身故為人役也則材能可任君身善則不公矣故不公人也君身善則智淺人君不公常惠於賞而不忍於刑故惠賞而不忍刑也不公則不識理之正是國無法也治國無法則民朋黨而下比飾巧以成其私法制有常則民不散而上合竭情以納其忠是以不言智能而順事治國患解大臣之任也不言於聦明而善人舉姦偽誅視聽者衆也是以為人君者坐萬物之原而官諸生之職者也職也生謂知學之士也謂授諸生之官而任之以選賢論材而待之以法舉而得其人坐而收其福不可勝收也故不可勝收得人則福多官不勝任犇走而奉其敗事不可勝救也則敗廣不勝任勝救故不可而國未嘗乏於勝任之士上之明適不足以知之是以明君審知勝任之臣者也故曰主道得賢材遂百姓治治亂在主而已矣故曰主身者正徳之本也官治者耳目之制也制而後用故曰官者耳目之制官稟君命而後行若耳目待上身立而民化徳正而官治治官化民其要在上是故君子不求於民德而已立身正是以上及下之事謂之矯事則偽有餘而實不足也及猶預也矯偽也上預下下及上之事謂之勝權勝君故也下預上事則威爲上而矯悖也為下而勝逆也國家有悖逆反迕之行背迕有土主民者失其紀也是故别交正分之謂理正君臣之分别上下之交順理而不失之謂道道徳定而民有軌矣有道之君者善明設法而不以私防者也而無道之君既已設法則舍法而行私者也為人上者釋法而行私則爲人臣者援私以為公公道不違則是私道不違者也曰不違公道更是不違私道也臣之所以為公者乃是私也名行公道而託其私焉寖久而不知姦心得無積乎積也故言姦心豈復無積乎既久行私而不知則是姦心之姦心之積也其大者有侵偪殺上之禍其小者有比周内爭之亂此其所以然者由主徳不立而國無常法也主徳不立則婦人能食其意充口故曰婦人能食其意君意委曲隨於女謁若食之國無常法則大臣敢侵其勢大臣假於女之能以規主情意以規度主之情也假因也因女之能食主婦人嬖寵假於男之知以援外權智以引其外權則何為而不成也婦人既得君之嬖寵又因大臣之於是乎外夫人而危太子故夫人被外太子見危女寵既隆又挾太臣之助兵亂内作以召外冦此危君之徴也是故有道之君上有五官以牧其民則衆不敢踰軌而行矣下有五橫以揆其官則有司不敢離法而使矣也五官各有其横曰五横横謂糺察之官得入人罪者朝有定度衡儀以尊主位正衡衣服緷絻盡有法度衮冕字緷絻古則君體法而立矣依也體猶君據法而出令君臣之義而官論其徳能而待之其徳能以待君命謂百吏之官各論大夫比官中之事不言其外而相為常具以給之之法制也具論衆官相緫要者無相統百吏之要常官所以緫官謀士量實義美匡請所疑也又當量實冝其有美士事也官各謀其職事必陳而請之也善者用匡於所疑而君發其明府之法瑞以稽之官曹也立府必有府謂百吏所居之者珪璧之屬也又必合其瑞以考之也明法故曰明府之法瑞君所與臣為信立三階之上南面而受要之君謂百吏之目也路寢前有三階要是以上有餘日故有餘日上唯受要而官勝其任故能勝任各理其職時令不淫而百姓肅給而供上言其敬唯此上有法制下有分職也道者誠人之姓也非在人也人之所從出故非在人姓生也言道立人之生而聖王明君善知而道之者也道理故言而相告也道猶言也聖王善知是故治民有常道而生財有常法道也者萬物之要也爲人君者執要而待之則下雖有姦偽之心不敢殺也殺君不敢夫道者虚設應故曰虛設道無形而善其人在則通其人亡則塞者也非兹是無以理人非兹是無以生財兹前是道是謂民治財育其福歸於上是以知明君之重道法而輕其國也理國家故重道而輕國得道之眞以理身緒餘以故君一國者其道君之也故君一國道可爲君王天下者其道王之也王天下道可王故大王天下小君一國其道臨之也國與天下也其道足以臨是以其所欲者能得諸民則順之令得君之所欲人其所惡者能除諸民順之而除君之所惡亦所欲者能得諸民故賢材遂所惡者能除諸民故姦僞省如冶之於金陶之於埴制在工也由君若廢置之由工也金埴之是故將與之惠厚不能供厚之意財不能供謂欲與人雖有惠將殺之嚴威不能振嚴威銷縮不能振起也謂欲殺人以致其理然而嚴威不能振惠厚不能供聲實有閒也聲實間礙故不供不振也或有聲無實或有實無聲有善者不留其賞故民不私其利私利何爲善必得賞有過者不宿其罰故民不疾其威得其過則人宿猶停也罰疾怨也不疾其威威罰之制無踰於民之故不踰於人也因人所欲罰而罰則人歸親於上矣如天雨然澤下尺生上尺澤下降苗上引猶君恩下流人心上就也澤從上降潤有一尺則苗從下生上引一尺是以官人不官事人不事獨立而無稽者人主之位也人之官君者與之地臣下莫得而稽之如此者人主之位也而不自官授人之事而不自事獨立於無過先王之在天下也民比之神明之徳先王善牧之於民者也夫民别而聽之則愚則各信其别而聽之之發故愚一方暗莫合而聽之則聖芻蕘之言賢聖不能易故聖也合而聽之則得失相輔可不相齊雖有湯武之徳復合於市人之言是以明君順人心安情性而發於衆心之所聚所歸湊聚謂同是以令出而不稽也稽留刑設而不用法故無人不犯刑所用先王善與民為一體心故言一體以百姓心為與民為一體則是以國守國以民守民也萬人同一心一國同一意然則民不便為非矣利故不便為非則失雖有明君百步之外聽而不聞所極耳聽有閒之堵牆窺而不見也視目窮有所而名爲明君者君善用其臣臣善納其忠也能善納則何君能善用臣耳目不擁非明而何也聼而不聞何視而不見信以繼信善以傳善君善而臣傳之君信而臣繼之是以四海之内可得而治是以明君之舉其下也盡知其短長知其所不能益若任之以事不君之舉臣亦猶是也夫任人以事者必擇其可賢人之臣其主也盡知短長與身力之所不至其身力所不至也謂知君之短長及若量能而授官授天臣之擇事亦猶是也人官者亦擇其可不上以此畜下而畜之擇其可畜下以此事上而事之擇其可事上下交期於正欲求不正其可得乎君有賢臣臣有令主則百姓男女皆與治焉則百姓君臣正淫僻也無自為管子卷第十俴俴馳孔甚音踐詩云
