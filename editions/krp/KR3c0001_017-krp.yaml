body:
  text: 七臣七主第五十二禁臧第五十三七臣七主第五十二雜篇三或以平虚請論七主之過能無此六者過則爲一是主也過主六是主謂平意虚心也七主據下唯有六者皆過主七主也一故曰得六過一是以還自鏡以知得失自鑒得失可知也得六過則爲一是以以繩七臣得六過一是呼嗚美哉成事疾六臣令臣無六過是故爲一君臣疾美也繩謂彈正也言以六過繩能成美也咸有一德故申主任勢守數以爲常用法令申謂陳周聽近逺以續明之則其明不絶逺近之事周而聽皆要審則法令固賞罰必則下服度要而詳事皆得而下皆服其法度也審則法令固賞罰必不備待而得和則民反素也至仁感物得和自此謂以道德理丗之君巾主不能然故以爲過也而至故人皆反於朴素今惠主豐賞厚賜以竭藏赦姦縱過以傷法藏竭則主權衰法傷則姦門闓故曰泰則反敗矣過故反成謂爲惠太也敗侵主好惡反法以自傷所惡皆反於法故自傷越法行事謂之侵所好喜決難知以塞明當故明塞也決難知則理不從狙而好小察所爲必從而伺之狙伺也謂旣任臣有事無常而法令申不􅴢則國失勢於事不合法旣不行所以失勢也􅴢古伍字謂偶合也言雖申布法令芒主目伸五色耳常五聲之貌伸謂放恣也芒謂芒然不曉識四鄰不計計度而知之也四鄰與巳爲隟不司聲不聽爲聽其理亂之音也司聲之官隨君所好不則臣下恣行而國權大傾不􅴢則所惡及身故惡還及身所爲旣不合理勞主不明分職上下相干勞而無功故曰言失任臣之理主勞臣主同則刑振以豐豐振以刻振而且豐多刑豐而又妄振非刻臣主同勢則俱奮威權故刑罰大也而何去之而亂臨之而殆則後丗何得而臨之必危殆旣亂且危敗亡權臣振主君欲去之必爲亂任代無得也必及故後振主喜怒無度嚴誅無赦謂之振也動發威嚴臣下振怒不知所錯則人反其故君之理故謂先不􅴢則法數日衰而國失固理故數衰而舉措旣不合固國失芒主通人情以質疑故臣下無信盡自治其事則事多信皆自任胷臆以理其事人人生事故事多也旣不自曉故下通人情以問所疑則臣下無所取多則昬昬則緩急俱植故緩急之事俱可立植立也旣昬而不明不􅴢則見所不善所見之事皆不善所爲旣不合理故其餘力自失而罰自責乃遷怒而罰之尚有執權餘力巳不故主虞而安但主能度而安則致下數事虞度也主能度宜而行故安吏肅而嚴民樸而親官無邪吏朝無姦臣下無侵爭丗無刑民而安故也凡此皆主虞故一人之治亂在其心之邪正在其心一國之存亡在其主其在智愚主之天下得失道一人出也明主得閽主失道從也一人爲主主好夲則民好墾草萊桑也夲謂農主好貨則人賈市主好宫室則工匠巧主好文釆則女工靡夫楚王好小腰而美人省食吳王好劔而國士輕死死與不食者天下之所共惡也然而爲之者何也從主之所欲也而況愉樂音聲之化乎夫男不田女不緇黒繒緇謂工技力於無用用之器物也謂勤力於無而欲土地之毛嘉苗毛謂倉庫滿實不可得也土地不毛則人不足人不足則逆氣生逆上之氣生不足則怨怒故逆氣生則令不行然彊敵發而起雖善者不能存計謀謂善爲何以効其然也曰昔者桀紂是也誅賢忠近讒賊之士而貴婦人好殺而不勇好富而忘貧馳獵無窮鼓樂無厭瑶臺玉餔不足處玉食玉餔猶馳車千駟不足乗材女樂三千人之女樂也謂有材能鍾石絲竹之音不絶百姓罷乏君子無死君致死言不爲卒莫有人人有反心遇周武王遂爲周氏之禽禽獲也爲周所此營於物而失其情者也車馬以所物謂臺榭靡者爲侈愉於淫樂而忘後患者也故設用無度國家踣散亡踣謂舉爭不時必受其菑夫倉庫非虚空也度故空必侈費無商䆠非虚壞也未故壞也必弃本逐法令非虚亂也陵故亂必上替下國家非虚亡也理故亡也必倒道背彼時有春秋歳有敗凶政有急緩政有急緩故物有輕重急政緩物重物輕政歳有敗凶故民有義不足事不足以行其禮歳旣敗凶雖有義時有春秋故榖有貴賤秋榖賤春榖貴而上不調淫故游商得以什伯其本也此之不爲故游商得什百之贏以弃其夲也淫過也謂榖物過於貴賤則上當收散以調之百姓之不田貧富之不訾皆用此作調淫而作也訾限也皆從不城郭不守兵士不用皆道此始從道夫亡國踣家者非無壤土也其所事者非其功也夫凶歳雷旱非無雨露也其燥濕非其時也亂丗煩政非無法令也其所誅賞者非其人也暴主迷君非無心腹也其所取舎非其術也故明主有六務四禁六務者何也一曰節用二曰賢佐三曰法度四曰必誅五曰天時六曰地冝四禁者何也春無殺伐無割大陵徙之也割謂掘倮大衍蕩然俱盡倮謂焚燒令伐大木斬大山行大火誅大臣收榖賦之禁也凡此春夏無遏水達名川水合大水謂偃塞小塞大谷動土功射鳥獸之禁凡此夏秋母赦過釋罪緩刑冬無賦爵賞禄傷伐五藏之藏五榖故春政不禁則百長不生夏政不禁則五榖不成秋政不禁則姦邪不勝冬政不禁則地氣不藏四者俱犯則隂陽不和風雨不時大水漂州流邑防故漂流城邑漂流謂滿溢於堤大風漂屋折樹火暴焚地燋草草燋旱甚則天冬雷地冬霆震霆草木夏落而秋榮蟄蟲不藏冝死者生冝蟄者鳴苴多螣蟇之翳薈苴謂草山多蟲蚉即六畜不蕃民多夭死國貧法亂逆氣下生故曰臺榭相望者亡國之廡也馳車充國者追㓂之馬也也言馳追猶召召㓂車所以羽劔珠飾者斬生之斧也文釆簒組者燔功之窑也明王知其然故逺而不近也能去此取彼則人主道備矣飾等物此謂珠用愛民彼謂節夫法者所以興功懼暴也律者所以定分止爭也令者所以令人知事也法律政令者吏民規矩繩墨也夫矩不正不可以求方繩不信申音不可以求直法令者君臣之所共立也權勢者人主之所獨守也故人主失守則危臣吏失守則亂罪決於吏則治決決之故理有罪者吏必能權斷於主則威民信其法則親是故明王審法愼權下上有分各有其分也下愼罰上執權夫凡私之所起必生於主則私生主不好本夫上好本則端正之士在前德之政本謂道上好利則毀譽之士在側毀譽之士在側好利則傾巧故上多喜善賞不隨其功則士不爲用不能賞故曰士不爲用雖曰好善及其有功則數出重法而不克其罪則姦不爲止勝伏克謂明王知其然故見必然之政立必勝之罰故民知所必就而知所必去推則往召則來如墜重於髙如瀆水於地之易也以譬招來故法不煩而吏不勞民無犯禁故有百姓無怨於上上亦法臣法臣立法言亦爲斷名決無誹譽而事愜故無誹譽依名而斷决則理當故君法則主位安臣法則貨賂止而民無姦嗚呼美哉名斷言澤其言順而澤依名而斷則飾臣克親貴以爲名求親貴以自克勝持此爲名虚名求實之飾克勝也謂不恬爵禄以爲髙安恬以此爲髙任弃爵禄以自好名則無實内實必喪美名外揚爲髙則不御爵恬能御也禄者君不故記曰無實則無勢實生勢必以失轡則馬焉制轡制臣必制馬必以禄以侵臣事小察以折法令謂之侵枉法行事好佼反而行私請詐也背佼謂佷反理爲故私道行則法度侵無以成其私不侵法度則刑法繁則姦不禁王嚴誅則先民心亂臣多則造鍾鼓衆飾婦女以惽上故上惽則隟不計而司聲直禄其司聲之官直得禄而巳不憂其職務也上既惽暗雖有危亡之隟不能計度而知之是以諂臣貴而法臣賤此之謂微孤故其君衰微而孤獨謟貴法賤則危亡日至愚臣深罪厚罰以爲行罰此愚臣之行深文入罪厚致其重賦斂多兊道以爲上賦斂以恱道兊恱也謂多君於使身見憎而主受其謗人必憎之厚罰多斂故記稱之曰愚忠讒賊此之謂也主乃比之讒賊愚臣雖有損於姦臣痛言人情以驚主之辭痛甚極開罪黨以爲讎於君與之爲讎開引罪黨上聞除讎則罪不辜而除之則罪不辜之人也彼伹讎耳未必皆有罪今罪不辜則與讎居故所與居者莫非讎也旣殺不辜則人皆讎已故善言可惡以自信而主失親信巳也君果信之則失其所親也好言可惡之事以告於君此求君之亂臣自爲辭功禄明爲下請厚賞未必當賞則明然爲之請以求志心也巳有功當得禄則佯辭之以爲以其下居爲非母動爲善棟居其以佯爲善者之棟梁也也與衆犯者爲母其動以非買名以是傷上雖曰爲之必傷於上其所以買名者用非道而衆人不知之謂微攻漸攻於君言爲僞善禁藏第五十三雜篇四禁藏於胷脅之内而禍避於萬里之外能以此制彼者唯能以巳知人者也於萬里之外彼不能興姦生禍則我能制之凡此皆以巳知人言度巳以察彼則無隱情故姦謀藏於胷脅姦藏禍息故逺避也故夫冬日之不濫非愛冰也求寒所謂濫漿濫謂泛冰於水以夏日之不煬非愛火也爲不適於身便於體也於身體不適便冬之冰夏之火皆夫明王不美宫室非喜小也不聽鍾鼔非惡樂也爲其傷於本事而妨於敎也宫美傷事而妨敎室聽鍾鼔則故先愼於巳而後彼官亦愼内而後外末業君愼之則内則本務外則効臣民亦務本而去未主効也官愼之則居民於其所樂敦土而不遷居其所樂則事之於其所利不勸而自勵事其所利則賞之於其所善皆恱而立功賞其所善則罰之於其所惡忌愼而無犯罰其所惡則信之於其所餘財期賞而必故曰信君人者莫不有餘財功之於其所無誅後可以爲成功必勝殘息誅然於下無誅者必誅者也謂以刑止刑以殺止有罪必誅故能息所也殺有誅者不必誅者也故誅不息也有罪不必誅以有刑至無刑者其法易而民全無刑若此者其法簡易而民完全刑兹無赦人不敢犯故曰以有刑至以無刑至有刑者其刑煩而姦多至有刑若此者其刑繁漫而姦人多緩誅宥死人則輕而犯之故曰無刑夫先易者後難刑故曰先無刑至有後難易而先難而後易曰先難而後易有刑至無刑故萬物盡然於用法皆同之明王知其然故必誅而不赦必賞而不遷者非喜予而樂其殺也所以爲人致利除害也必其誅賞則爲人致利除害故也賞不遷非喜與誅不赦非樂殺然於以養老長弱完活萬民莫明焉明於必誅賞言養老活人無夫不法法則治法正之故治言不法者必以法者天下之儀也表也儀謂所以決疑而明是非也百姓所縣命也措手足故曰縣命刑罰一差人無所故明王愼之不爲親戚故貴易其法恩舊故謂吏不敢以長官威嚴危其命毁敗危謂民不以珠玉重寶犯其禁謂所賞之不竊君無欲焉雖故主上視法嚴於親戚法故法嚴不爲親戚易吏之舉令敬於師長令故令敬也不爲師長危民之承敎重於神寶夫寶有靈故曰神寶不爲重寶犯禁故敎重故法立而不用刑設而不行也所用其刑法無犯之人則無夫施功而不鈞位雖髙爲用者少有功者怨故雖有髙位人不爲用施功謂施恩於有功者施恩不鈞則赦罪而不一德雖厚不譽者多雖有厚德人誰譽之赦罪不一則毒流不辜舉事而不時力雖盡其功不成稷不能成以嘉苗方冬植禾雖勤似后刑賞不當斷斬雖多其暴不禁夫公之所加罪雖重下無怨氣私之所加賞雖多士不爲歡行法不道衆民不能順必順於道有道之人舉錯不當衆民不能成況無衆乎衆尚不成不攻不備必防攻也夫設備者當今爲愚人故聖人之制事也能節宫室適車輿以實藏則庫藏自實也不費於宫室車與則國必富位必尊能適衣服去玩好以奉夲農桑木謂而用必贍身必安矣能移無益之事無𥙷之費通幣行禮而黨必多交必親矣行禮故黨多交親也移無益無𥙷之費而夫衆人者多營於物而苦其力勞其心故困而不贍勞而不賤營物過分故大者以失其國小者以危其身凡人之情得所欲則樂逢所惡則憂此貴賤之所同有也近之不能勿欲之物謂所好逺之不能勿忘人情皆然而好惡不同各行所欲欲行之各以所而安危異焉背理而欲則危適理而欲則安然后賢不肖之形見也夫物有多寡而情不能等肖者欲多也賢者欲寡不事有成敗而意不能同肖者意多敗也賢者意多成不行有進退而力不能兩也肖者唯退也賢者能進不故立身於中進退之中也謂多寡成敗養有節宫室足以避燥濕食飲足以和血氣衣服足以適寒温禮儀足以别貴賤游虞足以發歡欣棺槨足以朽骨衣衾足以朽肉墳墓足以道記各有記也道識其處不作無補之功於身無𥙷雖曰有功不爲無益之事故意定而不營氣情氣情不營則耳目榖聦明不虧穀善也謂衣食足耳目榖衣食足則侵爭不生怨怒無有上下相親兵刄不用矣故適身行義儉約恭敬其唯無福禍亦不來矣乃善之至禍福兩來驕傲侈泰離度絶理其唯無禍福亦不至矣乃禍之至禍福兩有是故君子上觀絶理者以自恐也致禍故恐觀絶理者下觀不及者以自隱也及之事當故之也隱度也度巳有不故曰譽不虚出行善必出於而患不獨生爲惡必生於福不擇家福亦來矣雖賤家行善禍不索人禍亦至矣雖貴人行惡此之謂也福無恃貴以招禍凡此欲令脩巳以致能以所聞瞻察則事必明矣其是非如此則無事不明矣謂耳所聞目所贍則能審察故凡治亂之情皆道上始理反是則亂也道從也事明肘故善者圉之以害牽之以利有利則牽有害則圉能利害者財多而過寡矣利則財多避害故過寡矣利害由巳則避害而取利取夫凡人之情見利莫能勿就見害莫能勿避其商人通賈倍道兼行夜以續日千里而不逺者利在前也速行而不倦也疾至則得利故漁人之入海海深萬仭就彼逆流則水逆流謂海潮起乗危百里宿夜不出者利在水也故利之所在雖千仭之山無所不上深源之下無所不入焉故善者勢利之在而民自美安人美而安之勢利在身則不推而往不引而來不煩不擾而民自富利之所致凡此皆勢如鳥之覆卯無形無聲而唯見其成焉雖無形聲俄見其成也夫勢利致人若鳥之覆卯夫爲國之本得天之時而爲經本之也經所以得人之心而爲紀紀之也則所以法令爲維綱以張也維綱所吏爲網罟以苞之網罟所什伍以爲行列聞其之也行列所以賞誅爲文武誅則武賞則文繕農具當器械器械可脩也農具旣繕則耕農當攻戰攻戰之不退也耕農之不怠若推引銚耨以當劔㦸銚用若劔㦸擊剌耨者必推引之𬒳蓑以當鎧鑐有鎧鑐著卑周身若褐炙故曰鑐蓑雨衣𬒳著之所懼雨露若武備之葅笠以當盾櫓武備之有盾櫓也取葅澤草以爲苙若故耕器具則戰器備備戰用也具耕器則農事習則功戰巧矣當功戰習農則當春三月萩室熯造三月之時陽氣熯謂以火乾也氣故燒之於新造之室以禳祓盛發易主温疫楸木鬰臭以辟毒鑚燧易火杼井易水所以去兹毒也當復杼之以易其水凡此皆去時滋長之毒四時易火至春則取榆柳之火春時之井又舉春祭塞乆禱以魚爲牲以蘖爲酒相召相召謂因此時召親賔乆禱而未報者當享塞之所以屬親戚也母殺畜生毋拊卯剥之也拊胃擊母伐木母夭英之初生也英爲草木母拊竿之初竽笋也生所以息百長也百物之長所以生息賜鰥寡振孤獨貸無種與無賦所以勸弱民弱之人也謂勸勉貧發五正官正也正謂五赦薄罪出抅民解仇讎讎令反去仇讎者和所以建時功施生榖也爲生榖凡此皆春今謂及時立農功施力夏賞五德常之德五德謂五滿爵禄遷官位禮孝弟復賢力所以勸功也而賢之此皆夏令有功賞復除秋行五刑誅大罪所以禁淫邪止盜賊秋令凡此皆冬收五藏之藏五榖最萬物聚最所以内作民也冬作凡此皆四時事備而民功百倍矣人有百倍之功於四時事皆備故故春仁夏忠秋急冬閉忠也收當急也生者仁也長者前也藏當順天之時約地之冝忠人之和稱人理則和忠猶稱一事故風雨時五榖實草木美多六畜蕃息國富兵彊民材而令行順上命故令人多材藝而也行内無煩擾之政外無彊敵之患也夫動靜順然后和也不失其時然後富不失其法然后治故國不虚富然後富也必不失財民不虚治然後治必不失法不治而昌不亂而亡者自古至今未甞有也國亂反是者古昌必國理亡必未有令所故國多私勇者其兵弱公戰故兵弱私勇則怯於吏多私智者其法亂背公故多亂私智則營巳而民多私利者其國貧於家故國貧私則利積之故德莫若博厚使民死之深故死之也博厚則感人賞罰莫若必成使民信之夫善牧民者非以城郭也輔之以什司之以伍伍長謂什長伍無非其人能者爲之也雖伍長亦選人無非其里客寄謂無里無非其家人家其非之言不離居他故奔亡者無所匿遷徙者無所容不容他寄也有什伍司之不求而約不召而來不求召而自來亡徙無所容匿故故民無流亡之意吏無備追之憂所備而追之人說不亡何故主政可往於民民心可繋於主於主謂繋屬夫法之制民也猶陶之於埴冶之於金也金之從陶冶也人之從法若埴故審利害之所在民之去就如火之於燥濕水之於髙下猶人之就利火水之就燥下夫民之所生衣與食也食之所生水與土也所以富民有要食民有率率三十畒而足於卒歳歳兼美惡畒取一石則人有三十石果蓏素食當十石化而食故曰果蓏不以火食素糠粃六畜當十石則人有五十石布帛麻絲旁入竒利未在其中也十石之中也苛餘言不在五故國有餘藏民有餘食石故藏皆經也毎年人有五十夫敘鈞者所以多寡也比其鈞平敘鈞謂敘權衡者所以視重輕也戸藉田結者所以知貧富之不訾也則貧富不依訾限者可知也謂毎戸置藉毎田結其多少故善者必先知其田乃知其人田少則人少田多則人多田備然后民可足也凡有天下者以情伐者帝情而伐者帝也謂深知敵之内以事伐者王失而伐者王見其於事有以政伐者霸而伐者霸見其政有失而謀有功者五以成功謂計謀可一曰視其所愛以分其威各權則其威分也今敵國之所愛者一人兩心其内必衰也二則力不齊故内衰也威分則毎人各懷二心心臣不用其國可危力故其國可危臣旣不爲君用二曰視其隂所憎厚其貨賂得情可深國情告巳故深得其情視敵所憎者多與賂令以身内情外其國可知國内情乃告外謂所憎者身在知也其國可三曰聽其淫樂以廣其心心廣於嗜欲使之聽淫樂遺以竽瑟美人以塞其内惑亂故其内閉塞也躭於竽瑟美女則心遺以諂臣文馬以蔽其外目惑於文馬耳惑於諂臣故其外蔽也則耳目喪矣外内蔽塞可以成敗惑故之敗之莫不閉内外蔽塞則理擁而見四曰必深親之如典之同生與之同生也典常也若常隂内辯士使圖其計與敵國圖計私俠辯士令内勇士使髙其氣恃而氣髙也彼得勇士則内人他國使倍其約絶其使拂其意使兩國之意相違也更納人於他國今背絕是必士鬪兩國相敵必承其弊其士必鬪亦旣相疑弊乃有一舉兩獲之功也兩國敵則小傷大國以承其五曰深察其謀得失也欲知其謀謹其忠臣其臣欲知不之用揆其所使使賢不肖欲知其所令内不信使有離意使其君臣之意絶内旣不信相疑則離氣不能令必内自賊旣不命則自相殘殺君臣意離别不可使令忠臣巳死故政可奪瘁故其政可奪人之云亡邦國殄此五者謀功之道也管子卷第十七
