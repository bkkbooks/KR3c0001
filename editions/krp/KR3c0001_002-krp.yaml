front:
  text: 管子卷第二唐司空房玄齡
  hash: sha256:b8eb8f1c6fddadead4211e72266680a8d7f2dd9758d23420f9bbecac28b9fb32
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3c0001_SBCK_002-1a}
body:
  text: 七法第版法第七七法第六塞心術計數謂則象法化決爲兵之數還陳四傷百匿經言六言是而不能立言非而不能廢之非不能廢其人而退之謂之是不能立其人而用之謂有功而不能賞有罪而不能誅若是而能治民者未之有也是必立非必廢有功必賞有罪必誅若是安治矣未也安治矣而猶未能此四者可以具下事故者則以未是何也曰形勢器械未具猶之不治也形勢器械具四者備治矣廢非賞功誅罪四者備謂立是不能治其民而能彊其兵者未之有也后能彊兵能治民然能治其民矣而不明于爲兵之數猶之不可能雖於爲兵之數然後可治民而欲彊兵必明不能彊其兵而能必勝敵國者未之有也能彊其兵而不明于勝敵國之理猶之不勝也勝敵國必須明雖能彊兵其欲明猶是不勝也審其理理之不兵不必勝敵國而能正天下者未之有也兵必勝敵國矣而不明正天下之分猶之不可故曰治民有器爲兵有數勝敵國有理正天下有分下之七法也器數理分即則象法化決塞心術計數之目也此七法根天地之氣寒暑之和水土之性人民鳥獸草木之生物雖不甚多皆均有焉而未甞變也謂之則也生根元之元氣也萬物者天地義也名也時也似也類也比也狀也謂之象以合冝義者所類比狀謂立法者必有所倣傚不徒然也也名者所以命事也時者名有所當也似尺寸也繩墨也規矩也衡石也斗斛也角量也謂之法事皆立政者所以爲法也角亦器量之名凡此十二漸也順也靡也久也服也習也謂之化風靡也久也服也習也謂人服習敎命之久漸謂革物當以漸也順也靡也謂物順敎而予奪也險易也利害也難易也開閉也殺生也謂之決塞此凡以決斷而窒塞也十二事皆爲政者所實也誠也厚也施也度也恕也謂之心術此凡心術生也六者皆自剛柔也輕重也大小也實虚也逺近也多少也謂之計數之以知其數也凡此十二事必計不明於則而欲出號令以出號令明則然後可猶立朝夕於運均之上檐竿而欲定其末也今均旣運則東西不可凖也檐舉均陶者之輪也立朝夕所以正東西今旣舉竿之本其末不定也也夫欲定末者必先靜其本不明於象而欲論材審用猶絶長以爲短續短以爲長脛非所續也鶴脛非所斷鳬不明於法而欲治民一衆猶左書而右息之而止之則無時成書矣息止也左手爲書右手從不明於化而欲變俗易敎猶朝揉輪而夕欲乗車不明於決塞而欲歐衆移民猶使水逆流不明於心術而欲行令於人猶倍招而必拘之招之者必有物有倍叛而反拘留之則彼逾叛矣以慰恱之令其感服今不明於計數而欲舉大事猶無舟檝而欲經於水險也故曰錯儀畫制不知則不可論材審用不知象不可和民一衆不知法不可變俗易敎不知化不可􅛷衆移民不知決塞不可布令必行不知心術不可舉事必成不知計數不可右四傷百匿傷上威匿情爲私則上威傷百百官也言百官皆姦吏傷官法姦民傷俗敎賊盜傷國衆損敗於物也盜賊之人常欲衆傷則重在下及得尊重君威傷則臣法傷則貨上流敎傷則從令者不輯衆傷則百姓不安其居重在下則令不行貨上流則官徒毁貨成故官徒毁徒事也官者旣不以德進但以從令者不輯則百事無功百姓不安其居則輕民處而重民散盗致富故處重民輕民謂爲盜者用盜破産故散謂務農者爲輕民處重民散則地不辟地不辟則六畜不育六畜不育則國貧而用不足國貧而用不足則兵弱而士不厲兵弱而士不厲也厲奮則戰不勝而守不固戰不勝而守不固則國不安矣故曰常令不審則百匿勝官爵不審則姦吏勝符籍不審則姦民勝刑法不審則盜賊勝國之四經敗人君泄見危旣敗則是君泄其事君泄其事則其位危矣謂常令官爵符籍刑法四者爲政之經四者人君泄則言實之士不進言實之士不進則國之情僞不竭于上則是國情不竭下皆隠實言虚上於丗主所貴者實也所親者戚也所愛者民也所重者爵禄也亡君則不然致所貴非實也致所親非戚也致所愛非民也致所重非爵禄也故不爲重寶虧其命故曰令貴於寶寶重是令貴於寶而全命則當弃不爲愛親危其社稷故曰社稷戚於親之存亡故社稷者身存社稷弃親而不爲愛人枉其法故曰法愛於人弃所愛而存其法法者崇替所由故不爲重禄爵分其威故曰威重於爵禄已寧散爵禄不可分威也威者人君以服海内必不得不通此四者則反於無有國故曰反於無有不達於四者國非其故曰治人如治水潦峻其隄防也治水潦者必養人如養六畜閑卑堅其羈絆養六畜者必致其用人如用草木草用其冝樵蘇各得其所木者時入山林輪轅不失居身論道行理則群臣服敎百吏嚴斷莫敢開私焉各各得冝論道而行理則無私不服也君之於民其猶居身治之養之用之三者論功計勞未甞失法律也便辟左右大族尊貴大臣不得増其功焉䟽逺卑賤隱不知之人不忘其勞故有罪者不怨上故不怨罪得其人愛賞者無貪心息其貪也賞不踰等故則列陳之士皆輕其死而安難以要上事知其不誣故競而爲之賞罰不濫則立功要功之士本兵之極也者在於明賞罰也爲兵之本其極要右百匿爲兵之數存乎聚財而財無敵存意於聚財則彼國之財不能敵也存謂專立意存之君無財士不來故存乎論工而工無敵之器用者也工者所以造軍存乎制器而器無敵兵器器謂存乎選士而士無敵存乎政敎而政敎無敵中號令政敎軍存乎服習而服習無敵便習武藝服便也謂存乎徧知天下而徧知天下無敵下謂徧徧知天將工拙士卒勇怯知其地形險易主存乎明於機數而明於機數無敵外爲近而成逺機者發内而動所以爲有數存焉於其閒故曰機數也不疾而速不行而至見其爲之不知其故兵未出境而無敵者八是以欲正天下財不蓋天下不能正天下下則無以正天下也財謂貨財不能蓋天財蓋天下而工不蓋天下不能正天下工蓋天下而器不蓋天下不能正天下蓋則無以正天下餘皆放此財雖蓋天下而工與器不能器蓋天下而士不蓋天下不能正天下士蓋天下而敎不蓋天下不能正天下敎蓋天下而習不蓋天下不能正天下習蓋天下而不徧知天下不能正天下徧知天下而不明於機數不能正天下故明於機數者用兵之勢也大者時也小者計也合天時也至小者捷勝亦在王之征伐能立大功者在於謀也人計王道非廢也而天下莫敢窺者王者之正也器也古今所大寳之位神以王者當樂推之運應天人之正共傳非有蹔廢而天下莫敢窺窬者衡庫者天子之禮也平輕重庫衡者所以知輕重審用於心無令長耳目者所得此則天子之禮然也者所以藏寳物不令外知者也言王者用心常當凖平天下旣是故器成卒選則士知勝矣其精練選謂簡徧知天下審御機數則獨行而無敵矣所愛之國而獨利之所惡之國而獨害之則令行禁止是以聖王貴之貴兵貴謂勝一而服百則天下畏之矣立少而觀多則天下懷之矣桓公救邢遷衛用此術也或曰觀當爲勸立少謂興亡國雖少天下共觀之故曰觀多罰有罪賞有功則天下從之矣故聚天下之精財論百工之銳器春秋角試以練精銳爲右也右上成器不課不用不試不臧試則不用不臧兵器雖成未經課收天下之豪傑有天下之駿雄故舉之如飛鳥動之如雷電發之如風雨莫當其前莫害其後獨出獨入莫敢禁圉成功立事必順於理義故不理不勝天下不義不勝人故賢知之君必立於勝地故正天下而莫之敢御也右爲兵之數若夫曲制時舉不失天時舉不失天時也制雖委曲順天而母壙地利其數多少其要必出於計數興利者也必計數其多少之要然後度材而用之壙空也天之所覆空地謂山河陂澤所以營作而故凡攻伐之爲道也計必先定于内然後兵出乎境計未定於内而兵出乎境是則戰之自勝攻之自毁也己其敗可知也自勝謂自勝於是故張軍而不能戰圍邑而不能攻得地而不能實三者見一焉則可破毁也故不明于敵人之政不能加也未可加兵不明敵故不明于敵人之情不可約也可約士約誓不明敵情未不明于敵人之將不先軍也不明于敵人之士不先陣也是故以衆撃寡以治撃亂以富擊貧以能撃不能以敎卒練士撃􅛷衆白徒之卒無武藝白徒謂不練故十戰十勝百戰百勝故事無備兵無主則不蚤知來攻不能先知之旣無備無主故敵野不辟地無吏則無蓄積官無常下怨上而器械不功堅利功謂朝無政則賞罰不明賞罰不明則民幸生偷生也僥倖以故蚤知敵人如獨行人望風自退故曰獨行也蚤知敵人則有以備之敵有蓄積則乆而不匱器械功則伐而不費賞罰明則人不幸人不幸則勇士勸之故兵也者審於地啚謀十官伍什則有長故曰十官又須謀得其人也地啚謂敵國險易之形軍之部置十官必日量蓄積齊勇士徧知天下審御機數兵主之事也故有風雨之行故能不逺道里矣不以道里爲逺行疾如風雨故有飛鳥之舉故能不險山河矣如飛輕捷山河爲險鳥故不以有雷電之戰故能獨行而無敵矣故莫敢爲敵雷電天之威怒有水旱之功故能攻國救邑爲彼水旱謂其功可以有金城之守故能定宗廟育男女矣有一體之治故能出號令明憲法矣其猶一體謂上下同心風雨之行者速也飛鳥之舉者輕也雷電之戰者士不齊也故彼士不齊懼雷電之威水旱之功者野不收耕不穫也不得使收穫也能令彼有水旱故金城之守者用貨財設耳目也以聽鄰國之動静令必知之貨財所以養敢死之士耳目所一體之治者去竒說禁雕俗也雕俗謂浮僞之俗竒說謂譎誑之言不逺道里故能威絶域之民不險山河故能服恃固之國獨行無敵故令行而禁止故攻國救邑不恃權與之國故所指必聽而恃之權與謂權爲雖有權與之國不顧也親與定宗廟育男女天下莫之能傷然后可以有國制儀法出号令莫不嚮應然后可以治民一衆矣右選陳版法第七於版以爲常法選擇政要載之經言七凡將立事之事立經國正彼天植植必令得其正謂順天道以種風雨無違風雨無違也君道不虧則逺近髙下各得其嗣多少之差輕重合宜故可嗣之以常行嗣續也髙下猶多少也謂君之賦稅因其逺近之别以三經旣飭君乃有國者旣以飭整故君可以有國也三經謂上天植風雨髙下也是三喜無以賞怒無以殺喜以賞怒以殺怨乃起令乃廢驟令不行民心乃外之心也有外叛外之有徒禍乃始牙與禍由是生故曰始牙徒謂黨與也外叛者有黨衆之所忿置不能圖置之誰能圖之衆忿難犯故必舉所美必觀其所終有初鮮克有終凡人之情靡不觀之故須廢所惡必計其所窮困獸猶鬬其所終將何爲也蜂蠆有毒故必計其所窮知慶勉敦敬以顯之勉以顯之也人有敦敬則慶冨禄有功以勸之冨貴以勸之人之有功則爵貴有名以休之爵貴以休之賢者有名則兼愛無遺謂君心先順敎萬民郷風之上以敎之急也如此則民向風而從化敦敬有功名之士必爵禄順而與之所旦暮利之衆乃勝任士旣旦暮有功名之厲而勝任得利衆自取人以已成事以質謂凖的將欲成事必先立其凖的事不將欲取人必先審巳才略能用彼不質后爲善違質然審用財愼施報察稱量故用財不可以嗇用力不可以苦用財嗇則費懈怠敵人來侵其費更多嗇恡嗇於用財不以賞賜則立功之士用力苦則勞民不足令乃辱不行故辱也民不足則令民苦殃令不行施報不得禍乃始昌禍昌不寤民乃自啚叛巳謀爲正法直度罪殺不赦殺有過終不免赦夫正直之法度罪殺僇必信民畏而懼武威旣明令不再行頓卒怠倦以辱之卒頓不勤則困苦以辱猶困苦其有怠倦罰罪宥過以懲之殺僇犯禁以振之植固不動倚邪乃恐若乃頓倚而邪則法亂而身危故可恐也言執法者必當深植而固守則不可動移倚革邪化令往民移如此化出令纔往則民移旣能正倚化邪歸於正直法天合德無有私德天之資始象地無親無所私親地之資生叅於日月私耀也日月無佐於四時刑以秋冬賞以春夏恱在施有恱將施無令有於下在於衆在廢私在於廢私將欲齊衆召逺在修近逺者至修近則閉禍在除怨禍端塞除怨則修長在乎任賢國祚長任賢則安髙在乎同利則髙位安與下同利管子卷第二
