body:
  text: 侈靡三十五侈靡第三十五短語九問曰古之時與今之時同乎曰同所易故曰同天地四時旣無其人同乎不同乎曰不同而今浮故不同也古淳而今澆古質可與政其誅政誅其不法以復古言今雖不同古可爲俈堯之時混吾之美在下其道非獨出人也時比屋可封美俱在俈帝俈也言二帝之人之道脩古而巳混同也下其能若此亦言非有出山不同而用掞澤不弊而養足木曰童山無草也弊竭耕以自養以其餘應良天子故平食須天下半有時而賦曰以其自養之餘應天子之良牛馬之牧不相及不相及也各自足則人民之俗不相知往來故不相知人至老死不相不出百里而來足來者所求足故也行者不出百里而故卿而不理靜也其事以人靜故雖立公卿不理其獄一踦腓一踦屨而當死屨以恥之可以當死刑諸侯犯罪者令著一隻今周公斷滿稽斷首滿稽斷足滿稽而死民不服非人性也敝也謂時所今周公罪滿者又亦從而考之凡此欲以爲慎審也罪定者死之然人尚不服其罪用法也稽考也罪滿而斷則從而考之首滿其罪者亦從而考之應斷足所乎時爽故也豈人性之然地重人載毁敝而養不足事末作而民興之今地利載生也以養有不足人既惰於本業故競起而事未作既重人之生植榖物君則從而毁奪弊盡之所是以下名而上實也下謂用而實皆歸於上也但有農作之名不得自聖人者省諸本而游諸樂之於富壽之域則聖人察人之本游爲然也俈堯以前大昬也博夜也大昬者則以博爲夜事故也夜謂暗昧之行也令人主至於問曰興時化若何其理若何也謂度時興化莫善於侈靡飢不可食寒不可衣然時共貴之君若侈靡謂珠玉之用也管氏以爲珠玉者度時興化莫若重珠玉以爲侈靡不重不重則强者守之以招人故賤有實敬無用則人可刑也榖帛可有實謂之若此則人之賢不肖可刑也貴而賤之無用謂珠玉可賤而敬故賤粟米而如敬珠玉好禮樂而如賤事業本之始也常人貴之賢人賤之今則賢者之好禮樂如常人言粟常人賤之賢者貴之如常人之敬珠玉未業可謂務本之始貴未業若此者珠者隂之陽也故勝火之陽以向日則火烽故勝火珠生於水而有光鍳故爲隂玉者隂之隂也故勝水之隂以向月則水流故爲水玉之生於山而藏於山故爲隂其化如神能致水言珠玉如神也火故曰故天子臧珠玉諸侯臧金石大夫畜狗馬百姓臧布帛不然則强者能守之智者能牧之賤所貴而貴所賤貴而賤粟米可賤而貴之之珠玉可不然鰥寡獨老不與得焉均之始也積於强智雖務鰥寡君不貴而藏之則利以賑貧乏故為均之始獨無所與之今藏之者所政與教孰急誘以感心用一者何先也政者立法以齊物教者訓管子曰夫政教相似而殊方若夫教者摽然若秋雲之逺動人心之悲悲心喻教者憂人之不令見其戚容人亦為之傷悼之摽髙舉㒵秋雲凄慘有愁悴之容高置且逺能生人之藹然若夏之靜雲乃及人之體然若謞之靜起油然含潤將降其澤及人之藹油潤㒵然和順㒵夏雲之静喻教者洒之温辭而强梁者感服之體去除熱氣而和順雖有謞躁之人恬動人意以怨蕩蕩若流水若秋教者搖自怨而蕩搖則從教若流水也雲之動人意人意旣動則自怨而蕩使人思之人所生往教之始也身必備之之則生其善心教人之始必備此二者然後可也也教者若夏雲之順適故其人使人思之人旣可思辟之若秋雲之始見賢者不肖者化焉起而潤悦之則天下之賢與不肖無不化焉教者旣若秋雲始見而哀憐之又若夏雲之敬而待之愛而使之若樊神山祭之後使尊衛其君若樊落神山設祭旣後聖化人則敬而來待愛之而者也而祈福賢者少不肖者多使其賢不肖惡得不化而使之則不得賢與不肖皆敎也不化今夫政則少則故於為政少用為則也即皆從教則人無所犯若夫成形之徵者也去則少可使人乎能去則而使人斯太平之先兆也欲成太平之形以知其徵驗者全用貧與富何如而可之中適問貧富曰甚富不可使故不可使甚富則驕甚貧不知恥故不知恥也甚貧則濫竊水平而不流無源則遬竭停水無源必速竭平而不流謂水也雲平而雨不甚無委雲雲則遬已雨必遬已上二事為下有比例平雲少雨又無委雲以助之其政平而無威則不行為政此則為本也者威以愛而無親則流其愛流漫賢智不盡力但行汎愛無所偏親則親左有用無用則辟之若相為有兆怨用者不為用者譬猶亦有中不凡此但為怨兆而以雖曰當有所親而用親之理僻左則有為用者不為益也親之無上短下長無度而用則危本不稱役用之不以度如此者或或復上得短而下持長其曰危本不稱也能懷怨以敗國故而祀譚次祖犯詛渝盟傷言事延及次祖更有犯譚近也國敗絶祀之言之罪詛渝盟傷敬祖禰尊始也之始也祖禰人齊約之信論行也齊要束之信詛盟欲為整行也所以論尊天地之理所以論威也為政者所取則故威不可弛之也天地以秋冬肅殺雷震電耀為威薄德之君之府囊也薄之君皆囊而藏之故有敗亡之禍凡尊始論行論威為政者所當行德必因成刑而論於人此政衍也可以王乎政所行也遵而勿失故可以王也必因王事之成刑論考於人事此為請問用之若何何如也問用政必辨於天地之道然后功名可以殖恩威之序故天地有尊卑以立功名也明之然後可辯於地利而民可冨通於侈靡而士可戚珠玉以賞戚親也貴可親也士故士君親自好事政之事謂好為强以立斷以斷是非强立其志仁以好任恱以所謂用使人君壽以政年以順年之四時今也君以所壽考由為政百姓不夭厲疾也厲發六畜遮育五榖遮熟兼也遮猶然後民力可得用全可用也人俱冨而力鄰國之君俱不賢然后得王而制難以王矣若俱賢則不可得俱賢若何之問曰忽然易卿而移立仁賢黜不肖忽然易事而化取新去故而變而足以成名故成名革當而承弊而民勸之能名故勸勉者也承先代之弊而成慈種而民冨種故人冨流慈以勉應言待感與物俱長天順人者也故與物俱長之也應物而後言待感而後動所謂應故日月之明月齊其明所謂與日應風雨而種君禮不失故也風時雨若則以天之所覆地之所載斯民之良也苞天地首出君人者德踰故曰人之良庶物有生莫能不有而醜天地非天子之事也天地之化此非天子不有上事而又醜惡事之民變而不能變是梲反之稅之傅革外革而内不革也今人變而梲柱也革皮也梲之附革則不革之類故取喻焉君不能變亦外革而内有革而不能革不可服輕君之心故不服也可革而不革則人有民死信故在信也人無信不立諸侯死化化則利竭故死變通之以盡利不請問諸侯之化弊也而無益者弊謂久行弊也者家也以家習不革言國之弊則家也者以因人之所重而行之則當革也非人所重吾君長來獵君長虎豹之皮皮故來獵君好虎豹用功力之君上金玉幣幣故用功力君上用金玉爲好戰之君上甲兵甲兵之本必先於田宅充甲兵之賦有田宅然可以今吾君戰則請行民之所重飲食者也侈樂者也民之所願也足其所欲贍其所願則能用之耳於人君之然後可用也必足欲贍願今使衣皮而冠角食野草飲野水孰能用之乏於衣言士既不能用也食則君之傷心者不可以致功則傷心矣傷心則無聊而茍且故不致謂冨者奢靡而有餘貧者窘悴而不足功故嘗至味而罷至樂及食至味而罷之謂冨者先奏至樂而雕夘然后瀹反以灼之雕橑反力道然后㸑之橑薪也皆冨爲也丹沙之穴不塞則商賈不處丹趨故不處也穴而求利冨者靡之貧者為之則重并貧者而為之也冨者所以得成此侈靡此百姓之怠生百振而食非獨自為也冨者之靡冨成此至味亦以百姓振起之故百姓既為冨者所兼則怠於作業故能生此能自為乎也豈富者為之畜化用當變化冨者之用也今欲為此畜貧冨之法其臣者予而奪之臣謂先少與而後多奪之也冨者今欲化之使貧或使而輟之用然後成其功既使之多所費徒以而冨之與利而或空言其物終之也今得冨且取父繫而伏之伏而破産以贖父也或加父罪而繫之子必予虚爵而驕之空或此人令有所貴用也與爵名而無其位以驕收其春秋之時而消之之利今則官自收而消冨者先貯物以射春秋也有雜禮我而居之若此者順其意而居之或有費用財物雜禮於我時舉其强者以譽之聲譽或令有所統率冨而又强則為之作强而可使服事服事事必成服行也强者辯以辨辭辯明其有辯繁辭者則令智以招請招來而請謁也冨而多智則使廉以摽人使為人摽式冨而清廉則堅强以乗六廣其德以輕上位其德又可以分其上之任故位輕者也君能堅意强力以乗上之六者可以廣不能使之而流徙此謂國亡之郄移而徙之斯亡國之郄也若不能使任上之六者乃流故法而守常法得謂古故而不革也其法者則守常尊禮而變俗則當變之流遁之俗上信而賤文用故賤之文虛而寡好縁而好駔必亂故棄之喻姦人之雄亦亂國當絶子㓪反縁即捐也駔馬之壯健者怯惡者此謂成國之法也為國者反民性然后可以與民戚亡若能反之然後有成可與之親戚親也反者冥也順其性欲必敗也民欲佚而教以勞難則有功勞致於冦民欲生而教以死則有功也死致於寇難勞教定而國冨故也積財死敎定而威行其鋒故威行也致死則莫敢當聖人者隂陽理陽之理言法隂故平外而險中内發陽於外此則含隂於故信其情者傷其神美其質者傷其文神滅也精盛則化之美者應其名故化美也實應其名變其美者應其時故變美也事應其時不能兆其端者菑及之常失於幾故災及之也來事之端不知其兆者故縁地之利也縁順承從天之指順天之意也指意也當承辱舉其死以舉事則死也辱猶逆也逆地天開國閇辱言則辱可閉也若能開國以納善知其縁地之利者所以參天地之吉綱也能參天地之吉綱知能順地之利則承從天之指者動必明辱舉其死者與其失人同與失人同也逆天舉事故公事則道必行其道必行也公事則無擁故開其國門者玩之以善言開國以納之也有善言可玩故奈其斝辱報斝爵祭神以謝過耳亦旣有辱當奈之何唯有知神次者操犧牲與其珪璧以執其斝及珪璧執斝爵以禱神而謝逆常令巫祝知神之次秩者操牲罪也舉之家小害以小勝大因此小損以勝大災祭祀之費家雖有小損貟其中辰其外謝過旣以從無失外事之時也辰時也又當貟中心無所專固有善則而復畏强長其虚當長其謙虛之心而其有强大於巳者則之也敬畏而物正以視其中情信又當視其中情以驗之其於物也雖見外正猶未可公曰國門則塞百姓誰衍敖胡以備之可放敖者事至於此如何救而可謂冦有至國門以塞百姓警衞而誰擇天下之所宥之所疾者謂王不天下擇鬼之所當福助者也謂爲神所擇人天之所戴人所謂爲者也戴仰而亟付其身此所以安之也之雖有冦賊無若我何故安得此三德之人付其身而任强與短而立齊國之若何以攻齊國若之何禦之此亦公問之辭謂寇賊旣持强弓又執短兵列陣而立髙予之名而舉之則歡恱也高舉其名重予之官而危之不避危亡也與之重官則因責其能以隨之猶傶則踈之母使人圖之無所顧望啓寵納侮使人圖之也責知其能隨而任之則自課厲而猶踈則數之母使人曲之之無使人見怨隂謀曲求已隙者也因不寵任而踈巳者則數加恩意以恱此所以爲之也强與短立之冦也撫人若此可以禦上大有臣甚大將反爲害旣臣且甚大謂大臣冨有故將反為害甚大則逼君吾欲優患除害將小能察大為之奈何寛優此患言我且欲大欲為此事如何亦公之問辭也漸除其害每見其小能則察知其潭根之母伐壁若大樹深根不可伐大潭深也此以大樹喻惡也未可卒誅臣根黨盤亦固事之毋入無得入同其惡也旣未能誅且固事之深􅹶之毋涸其深情􅹶謂探使涸竭也常令見之無不儀之毋助無得助為之也儀善也彼為不善章明之毋滅善令人皆當發明不昧滅也知之無使生榮之毋失此其可誅之時必不得失之謂生簒殺之心若草木之生榮十言者不勝此一善不如此一言也謂令他事有十言之雖凶必吉凶也惡稔易誅吉也忍而客之屈而事之故平以滿無事而揔以待有事而為之若何積其財以無事之時收積至時散其積揔謂收積也故使國家從故平安之時滿也而用積者立餘食而侈美車馬而馳多酒醴而靡財者富而侈積謂富而積散因其散而收之食美車多醴財有所千嵗毋出食此謂本事財無使他外則富者之雖復千嵗常令自食其之此積之本財可得而收縣人有主於人必有所主主於財縣謂繫屬也言欲繋屬人此治用則於官取之官旣積財人器用也以理其然而不治積之市積之於市使高價得其利也謂不取官財以理其用翻乃一人積之下一人積之上此謂利無常一分下亦積一分可謂利無常也財旣入市則公私共積之上雖積百姓無寶以利為首以利為寳之首百姓無他寶唯一上一下唯利所處則從而歸之也利積多者百姓利然后能通通然后成國則國亡也無利而不通利靜而不化觀其所出從而移之不變故也觀而移變之利而以不化者則由所出視其不可使因以為民等不可使謂其人等謂率而齊之者使之率興利之人而齊之也非有文武之材又不任作役若此擇其好名因使長民名者則擇之使其有好虛譽之者之長為興利好而不已是以為國紀彌積故為國紀好名不已則乃功未成者不可以獨名則無獨與之名積財之功未成事未道者不可以言名成功然后可以獨名人有名衆共言此事道然後可以言名然後可以承致酢名然後可以至於旣有獨名又有言酢報也承君之先其士者之為自犯自先之是為自犯其過也人有士行當推以為先今反後其民者之為自贍後之是自為其贍不憂國也人能興利亦當先之充國今乃輕國位者國必敗散居之心故輕國位則有也國敗踈貴戚者謀將泄顧之意故謀泄踈貴戚則有外毋仕異國之人是為經而仕之其心異此所有國之經也異國之人所謂非我族類者也今毋數變易是為敗成而無功故曰敗數變易則事繁成大臣得罪勿出封外是為漏情母數據大臣之家而飲酒是為使國大消不兩盛故臣强則國消也飲酒於臣家則威權移焉物三堯在臧於縣返於連比若是者必從是亡乎終亦不能守其物亡必不返於連比之雖使三堯在臧但懸其物而不散施之是敗而亡乎即之也臣臣旣得之自用樹福則國從辟之若尊譚未勝其本亡流而下未能勝其本此位旣不可得自然流而下者也譚延也雖堯守藏不施必亡猶如尊位將反而不平令茍下不治下者必凡始理令雖下而不理者也先能平令今旣不平高下者不足以相待上必不待之也自處其高欲下待此謂殺事立而壞何也兵逺而畏何也如此者何也即以德不素積故也此謂弑君之事其事旣立而後壞民已聚而散何也無道故人不歸輟安而危何也皆謂簒弑神不祐故也功成而不信者殆兵强而無義者殘不謹於附近而欲來逺者兵不信逺者欲來後逺而來信也必謹於附近然略近臣合於其逺者立於逺則合之若此者則可以立略禮為不繁也言於近則略之功亡國之起毁國之族則兵逺而不畏者若此則兵皆逃逺無兵則先自踈國之宗族漸以至三不畏也威息故國小而脩大仁而不利猶有爭名者累哉是也小好脩逺不量國之是以猶與他國爭名是者必相累而惕大雖復行仁不遇其利不如小好脩逺樂聚之力以兼人之强以待其害雖聚必散以禦危害如是者先雖聚後必散好自勉以聚力欲兼他人之强用此大王不恃衆而自恃百姓自聚供而後利之成而無害岐杖䇿而往百姓曰仁君也不可大王亶父為狄所攻乃去豳之恃但自恃其德故百姓隨而聚之供其所須而利之遂至於成功而無危害失扶老携㓜而從之一年成邑二年成都三年五倍其初言大王雖有衆不也者踈戚而好外企以仁而謀泄賤寡而好大此所以危己親好言自疎賤且寡好為迂大凡此皆危敗之道也交外人雖企慕於仁而所謀多泄漏旣衆而約要束也謂與衆為實取而言讓於言更成遜讓謂實取危彼物行隂而言陽在言更成顯陽於行實為隂密利人之有禍因謂生利禍而言人之無患言乃為無患人雖實禍於吾欲獨有是若何也問獨有之何凡此獨君之事下公問之辭如自衆而約已是故之時陳財之道可以行今也利散而民察必放之身然後行放下人則察而知之置之於身勿令下知然後可以行放管氏言此乃古之陳設致財之道亦可行求於今然利散言也置之公曰謂何行之問所以長喪以其時增長叛吾喪之禮使人皆黯也吾喪者毁厝之息謂敗也黯之重送葬以起身財習為精厲庶事不怠故能起身之財重送葬則費用廣憍慢則不及事由人一親往一親來所以合親也親無絶特故曰合親謂一親往死一親來生此謂衆約葬可以起財故人皆親教之重而謹祭立鬼神之祠使人祭之每大陵深谿皆有靈焉皆以能别以為食數示重本也故曰以能别為食數凡此皆重人本之事也人之大小皆各有材能多者食衆能少者食寡故地廣千里者禄重而祭尊其君無餘餘地與飼也言不脩祭以地與他一者從而艾之艾謂減削也言脩從謂次當受封者則削減其地與次受封之君者也祭之君受地與他同故曰若一者君始者君者也謂始為艾若一者從乎殺與于殺若一者而殺之彼或自取與受而殺之彼自取與于始封者令言始受封之君本既無地故取先受君者彼或不與從地均若一也與先受封者從者艾艾若一者從于殺與于殺若一者從無封始王事者上王者國之地與先者均齊若一則止也言從者先無封令始王事故父取他上事霸者生功言重本命以生立其功凡此皆為重本也言諸侯旣受地分則上事霸主隨政是為十禺分免而不爭言先人而自後也他國來分明勸勉而與之不敢交爭如此者所以先陳禺猶區也十禺謂十里之地每里為一禺故曰十禺若取其後他人自官禮之司禮各有私享言國官昭穆之離之别也離謂次位先後功器事之治各定其先後之差也功有大小器有精麤尊鬼而守享祭之禮也尊鬼謂謹其故戰事之任髙功而下死本事各令死其本事也戰士雖有髙下之殊食功而省利勸臣無功則臣勸也飼其有功省其上義而不能與小利不可顧小利而移止上當操大義而主斷五官者人爭其職然後君聞故君名聞於天下官爭理職則國治祭之時上賢者也為儀而已非能有所益謂助祭之時賢者居上故君臣掌故使臣攝之事亦無曠故曰君臣掌也祭者掌禮以行事所用其智謀或君有君臣掌則上下均能臣上下均者也行君事故曰此以知上賢無益也其亡兹適庸臣亦能行君之事無祭祀之時非不上賢但適故曰無益旣不賢則動皆違理故兹適於危損於令主人雖云上賢而不用其智謀與祭時上賢者亡不能用之也謂空上之而已而役賢者昌成故國昌役賢則功上義以禁暴不冝故禁暴也義者所以除去尊祖以敬祖所以敬始封之君也祖始也尊立祖廟聚宗以朝殺示不輕為主也宗以朝於君而有謂聚會也小之封為主之重者也親踈之殺凡此載祭明置明而置之欲人不知也載行也言公將為行祭至高子聞之以告中寢諸子寢諸子諸侯諸子之居中寢者高子齊大夫聞君之將行故告中中寢諸子告寡人舍朝不鼎饋食今不然故致怪之常禮退朝常鼎饋而中寢諸子告宫中女子曰公將有行故不送公送公也言何故不公言無行女安聞之曰聞之中寢諸子索中寢諸子而問之寡人無行女安聞之吾聞之先人諸侯舍於朝不鼎饋者非有外事必有内憂公曰吾不欲與汝及若不若此言也欲與汝論女言至焉不得毋與女及若言盡理至謂吾欲致諸侯諸侯不至若何哉女子不辯於致諸侯不明於致諸侯之理婦人無豫於外政故自吾不為汙殺之事人布職不可得而衣所以伏逺而來近今旣為人雖織汙殺言然人必有所訐殺染戮者此者欲桓公訐威以伏其侯也不為己用故有布不得而衣言故雖有聖人惡用之威聖人亦可能用人者寡也后不用服三家即其事也之堯為疋夫不能能摩故道新道定國家然后化時乎事也故道摩謂新其以成新道定國安家然後可以化時也謂先王之典刑新道謂度時而制法言能故道國貧而貪鄙冨苴美於朝市國之邑必苞苴財貨好遺朝以市權利也言國朝貧而邊鄙冨饒若此者邊鄙國冨而鄙貧莫盡如市知盡入於市以市人不虛取故鄙人不虚與故也國富財故冨鄙輸貨故貧其取半反也其物莫市也者勸也勸者所以起本勸而不怠故能起本也善農者能多致市利則自善而末事起不侈本事不得立農事不給故本事不得立侈謂饒多也末事不饒多選賢舉能不可得惡得伐不服用伐欲待賢能不損用必百夫無長衍可臨也之長無人為之若無賢雖百夫千乗有道不可修也千雖不可脩營而伐之也乗之國有道以用之則夫紂在上惡得伐不得神怒之雖其旅若林莫紂在上位萬人讎之鬼有伐而不得者也不倒干自伐故無鈞則戰守則攻野戰城守則固而攻之言伐紂者力鈞則與之百蓋無築千聚無社謂之陋一舉而取天下有一事之時也雖有聚之夫言紂人苟且一舉取天下而有之此萬代一時之事也不立一社以統之如此者爲政之陋也故武王萬諸侯鈞萬民無聽使雖必不聽此言三者貴萬諸侯鈞引於人人上位不能爲功更制其能王乎功不更共制之若居上位不獨立其能王也此者必不縁故脩法以政治道則約殺子吾君故取夷吾謂替共謀要殺君子之不當立者吾君所以取夷吾爲替者爲有此道也子君之子也其能制縁順故常脩理法制爲政不違於道若此者可公曰何若取夷吾也問何以獨對曰以同同故取也以其德智其日乆臨可立而待鬼神不明立而待其享祭鬼神之禮又不能明也謂君子不當立者雖乆臨其位危亡可囊橐之食無報明厚德也遺人不求其報所以明厚德也此論桓公之隱雖以囊橐之食沉浮示輕財也所以示輕財也不得其報其散施於人不顧其沉曰祭川曰沉浮也曰沉得報曰浮或先立象而定期則民從之人則率服皆順從也先立法象與人定期故爲禱神祈福祥謂先人禱朝縷綿明輕財而重名賞賜賞與所明是輕財而縷帛也言每於朝置綿以者也重名公曰同臨所謂同者其以先後智渝者也者能先後於君所謂臣德同君詩所謂予曰有先後者也其遇危難則智謀變而通之鈞同財爭依則説則恱而爭依於已假令財與人鈞同人十則從服則服而從之若財十倍多彼萬則化成功而不能識變化而無不如意若財萬倍多彼則觀者莫能識之故可以成功而而民期然后成形而更名則臨矣相與樂推然後成言人心期以為主人則臨之以為君矣形於以名前所服之請問為邊若何禦邊境問所以防對曰夫邊日變不可以常知觀也當應機而動故不可以常智觀邊者兩國交爭宼敵伺郄日有變民未始變而是變是為自亂輒為變此謂先時也更益其亂故曰是為自亂也未變者應機未發且當循常而伺之今人未當變而請問諸邊而參其亂任之以事因其謀亂然後以事任之因其所謀而用之諸邊則四邊也謂參驗知其委變之問之辭也此已上公方百里之地樹表相望者丈夫走禍婦人備食之國自謂百里冦賊之禍丈夫則走而奔命婦人則備食以終之也國都至邊境每於高顯之處樹立其表使遞相望其有内外相備寇以外拒外故曰相備也防内内備食以給春秋一日敗曰千金稱本而動要此二時而有戰春秋種穫尤為農為國者必當稱本而動也敗但經一日敗費千金故候人不可重也唯交於上能必於邊之辭使重之唯有能與上交必定邊境之辭至國不易者其可重也候人謂謁候之來入國者候人入國或伺我虚實覘我動靜不可行人可不有私不有私所以為内因也無私則意成故能為國内成事者也行人使人也若何而可唯不有私耳使能者有主矣而内事所主者欲成内國之事使人出境必有所主其萬世之國必有萬世之實成萬世之國也無萬世之實不能必因天地之道以動者也天地之道順無使其内使其外失外情也應内而外使其小毋使其大棄其國寶大臣國之寶也今應小而大失事之冝曰棄國寶也非理使之故使其大貴一與而聖稱其寶使其小可以為道使謂則舉輒有成能立聖人之功謂稱其寶矣其大臣當尊之一與其事必無轉移知此能則專専則佚事必専専則使得其能於佚樂也功成故椽能踰則椽於踰因梯而後能若不因梯直欲踰之則不能踰椽猶梯也謂鑿椽以為梯凡欲蹈越高逺必必有良臣賢佐然後事遂而名立也矣然則踰因梯而踰矣此喻成功能宫則不守而不散四國也能有四宫謂防禦之國宫直欲守之其衆必散也國之宫則不有宼難若無衆能伯不然將見對必能為之長若不能長伯長也謂材能之主衆以兩雄兩雄者之道也之豪倰之人將來對己君子者勉於糺人者也糺察人不為人所糺君子者德民之稱故但非見糺者也故輕者輕重者重前後不慈凡君臣所以能相慈輕謂臣人重謂君也輕重自在重或前或後不相交接否之謂也何慈之有乎者輕能事重重能制輕然後慈惠之心油然生矣今輕自在凡輕者操實也必操君實也臣須君食故以輕則可使則可使也輕而操實重不可起輕則輕不可雖重無實用起重有齊重以為國不過為國重者則限輕以為死可以致死以道使輕毋全祿貧國而用不足人𣪚故國逾貧而用逾不足也欲全其祿不以與下則賢去而毋全賞好德惡亡使常所使者乃常人若此者敗亡之道雖曰好徳全賞而不與雖曰惡亡請問先合於天下而無私怨樂推故无私怨也謂與天下合同人皆犯强而無私害私害謂貢楚苞茅之北也雖犯於强乃以公義故無為之若何對曰國雖强令必忠以義强必徳之也令忠以義雖國雖弱令必敬以哀弱不免也令敬以哀雖强弱不犯則人欲聽矣則人違之犯雖輕弱先人而自後而無以為仁也禮何仁之為也先人自後大國之加功於人而勿得求於報也施功而不所槖者逺矣者當而逺之槖貨而匱民所爭者外矣當遣之外也交爭無禮者明無私交則無内怨偏故内怨起之私交則不公而與大則勝國故得勝能親與大私交衆則怨殺夷吾也私交使君恐衆怨而殺之者夷吾之由故如以予人財者不如無奪時如以予人食者不如君之社主近於危道為已用如此則過利不可法故民流神不可法故事之其法不知神亦不得所謂隂陽不測之者也神之所在故畏敬事之天地不可留故動化故從新息故能生成不已天施地化日夜不新然亦循故之四時周而復始而所易之也以天地變不可留停故動化其故以就其是故得天者高而不崩得謂保其尊高而不崩壞者也天變化日新之理故能常得人者卑而不可勝故雖卑不可勝得人則衆歸之是故聖人重之天也謂重人君重之君也謂重故至貞生至信至生則至信生而貞正也謂正心也應之言往至絞生無其實則至絞已言生而應絞謂急言私己今空以言往而至自有道信至言正生則然故曰至自有道往則絞來皆有因而不務以文勝情情彌虚也以文勝情不務以多勝少是少多不能勝之能正衆非故不動則望有廧則望者如墙焉君子儼然不動旬身行身行必令均旬均也君子直平正法制度量王者典器也常器也理國之執故義道畏變也守故君人執躁之人妄有所變也義以尊於道者畏輕天地若夫神之動化變者也天地之極也能若地之極理善莫大焉祀神而動化變流弊天能與化起而王用則不可以道山也神化而若能隨常道格之其冨饒取類於山也起王有天下其所運用則不可以仁者善用智者善用非其人則與神往矣此者可謂通靈合契與神往來也非其人尚能用之則明無不用如衣食之於人也不可以一日違也或幾乎不全也一日違衣食生理親戚可以時大也之以結其恩意謂時大聚㑹是故聖人萬民艱處而立焉其上常有戰兢之心畏難之也人者難靜而易擾故聖人處立人死則易云其為亂故易云也死者無所為不憂生則難合也無防或生姦謀故難合生者有利欲之心合而故一為賞再為常三為固然則人以為常謂至此時必當有賞頻三為之謂一時行其賜人則欣頼以為賞頻再為之然無懷愧之心則以為理固當其小行之則俗也以為俗無過厚之恩也若小行其賞則人習之久之則禮義而懷恩此禮義之正者也久而一行厚賞則人荷徳故無使下當上必行之承當君上必行之無使下人每至時也賞然后移商人於國非用人也市故商人皆移來入國也下旣不希上賞則専意於不擇鄉而處不擇君而使不擇鄉又不擇君商人常隨利往來故出則從利入則不守出國商人恇怯而茍免不為君城守也唯從利焉其入國遇冦難則國之山林也則而利之亦有利於國猶山商人雖不為國用而取其利也林也則當容受市塵之所及二依其本今使工商二族依之以為市則衆聚喧囂尤多塵埃物之冝也本此亦處故上侈而下靡故上侈下靡得商賈之利而君臣相上下故依之章得商工之用之儀著上下相親則君臣之財不私藏故不私藏財相親則情公然則貪動枳而得食矣多枳塞其幸者但得貪食而已無餘利也枳棘者所為擁塞也農人貪商賈而動者則徙邑移市亦為數一此亦為費數而得一耳也其有田邑之人今移於市問曰多賢可云理可言不問多賢之封曰魚鼈之不食咡者不出其淵樹木之勝霜雪者不聽於天是不聽於天霜雪不能殺也士能自治者不從聖人從聖人而求之也能自理者則有餘不豈云哉雖聖人不能自理則外何可云者能致自斯之夷吾之聞之也不欲强能已勿强引之也材能之士心不慕不服智而不牧服則勿養之士之材智上不若旬虛期於月津若出於一明然則可以虚矣日旣至津然後出一明矣如此虛而任數理足自明人但虚懷接物布一月日期津明潤㒵君人之道當若每旬之虛而在數自期於來亦猶是也賢才自至故阨其道而薄其所予則士云矣服之至人所與則薄士之道藝則能阨而自來其理可言也而少之如此則必不擇人而予之謂之好人不擇人而取之謂之好利謂多所愛所愛遇人則與無所簡擇可謂審此兩者以為處行則云矣謂不兩者此以為處身之行則其理可云矣擇取與不擇而取寧不擇而與用不方之政不可以為國謂邪也不方之政曲靜之言不可以為道也靜謀節時於政與時往矣時所施政教與時凡為節度當合於往俱不動以為道齊以為行整肅然以此為行也守正不動以為道齊避世之道不可以進取無所能故不可進取茍避世則晦明藏用若陽者進謀幾者應感者欲進而顯明其事唯應所感也為謀幾理之動再殺則齊文王再駕伐崇武王再駕伐紂也一殺尚有參差必再殺然後可齊然後運可請也帝位也陽者進謀已下公問之辭也旣齊則天下服故請問歷數之運將陟對曰夫運謀者天地之虛滿也合離也離乃理之不可已者也春夏為合秋冬為虛言歷運之謀崇替相因若天地之有滿虛合春秋冬夏之勝也而成嵗有道之伐無道亦猶是也若無春秋冬夏之變則不能相勝然有知强弱之所尤然後應諸侯取交絶於衆若然諸侯之可以取天下之交尤殊絶也謂應運而王者必有智而强殊故知安危國之所存以時事天以天事神禮事也謂以神以神事鬼享鬼也謂依時而故國無罪而君壽而民不殺智運謀而雜櫜刃焉以成之故曰雜櫜韜也雖用智運謀亦須威其滿為感故滿也感則物應其虛為亡故虚也亡則物散滿虛之合有時而為實實也滿時為時而為動動散也虛時為地陽時貸物精氣以長養也地在陽時假貸萬其冬厚則也備之天之變氣應之以正守正以應之也天見災變之氣唯且夫天地精氣有五不必為沮不能必則為沮敗也謂五行之時也其時之氣其亟而反其重陔動毁之進退即此數之難得者也去者或發動而有所毁傷者或有乍退者凡此皆災敗其為沮敗也或纔有形而違反者或遲重滯凝久而不而知之者之數難得此形之時變也形有變也謂嵗年之沮平氣之陽若如辭靜沮敗言欲形聲如辭言之靜者平和之陽氣黙至而無餘氣之濳然而動愛氣之濳然而哀胡得而治動之動難知者也故曰胡得而治動自沮平已下公問之辭災之餘氣濳然發動愛怜之氣已濳然而哀則氣候對曰得之衰時位而觀之立分位而觀察之得其沮氣衰敗之時佁美然后有煇得其美理然後佁深思皃謂深皃煇然也情魂恱而脩之心其殺以相待禳之其凶殺之至必有以待之旣知災氣之所召則脩德於心以故有滿虛哀樂之氣也而樂或虛而哀也當察災而德禳或滿故書之帝八神農不與存為其無位不能相用問運之合滿安臧帝堯舜書之所記三王夏殷周易之所序五帝謂伏羲神農黃氣又不公問自今之後運之合滿何所藏隱可得知之乎然於八帝之中神農所存事迹獨少則以不為位以觀災處二十嵗而可廣十二嵗而聶廣百嵗傷神寧德義可廣又十二嵗代將亂而管氏對曰從今之後二十嵗天下安下分崩鬼神之祀絶矣攝其廣又百嵗之後天周鄭之禮移矣俗變也禮移則則周律之廢矣之周壞矣法則則中國之草木有移於不通之野者穡之地荆棘生焉故草時旣戰爭廢於農事稼不通之野之屬移變於然則人君聲服變矣則聲服俱變聲謂樂聲衆亂則臣有依駟之祿養駟馬反其受祿又以稱之依稱也代衰則臣富故臣多婦人為政鐵之重反抺金后為政鐵君㓜則母不重鐵反旅陳於金而玩之者也者所以為兵器當重之謂下而悲識而聲好下曲食好醎苦而悲者食謂聲之下婦人之所好多醎苦之味者則人君日退亟人之退衰也豈不亟急哉旣使婦人為政則百度昬則谿陵山谷之神之祭更應國之稱號亦更矣國之稱號亦更矣市朝旣變後聖更改也國衰則神之祀改其所應祭其號國旣作故改視之亦變而取節今變矣旌麾之屬目視觀之風氣古之祭有時而星氣之和者也或祭星以祈風有時而星熺有祭明星者熺星之明或有時而熰此旱熱甚而祭熰熱甚也祭謂有時而朐歳祈福而祭之也朐逺也或逺而為來䑕應廣之實隂陽之數也凡此皆䑕憂也而祭之調隂陽為物也君之憂人故廣為祈福祥華若落之名祭之號也若花落之莅物益其言祭時為物作美號輝光是故天子之為國圖具其樹物也
