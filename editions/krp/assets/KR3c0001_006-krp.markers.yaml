  - {type: variant, offset: 312, length: 0, content: '', WYG: 危所謂君不密則失臣正言直行之士危則人主孤而毋内䇿謀毋自入也人主孤而毋内則人臣黨而成羣君子道消則小人道長也使人主孤而毋内人臣黨而成羣者此非人臣之罪也人主之過也君不密之過民毋重罪過不大也有大過然後有重罪民毋大過上毋赦也不赦則懼而修徳上赦小過則民多重罪積之所生也所謂積小以成髙大故曰赦出則民不敬有罪不誅則安用敬惠行則過日益恃恩不恭非過而何惠赦加於民而囹圄雖實殺戮雖繁姦不勝矣造姦以待赦也故曰邪莫如蚤禁之無使滋蔓蔓難圖也赦過遺善則民不勵善即恵也有過不赦有善不遺勵民之道於此乎用之矣故曰明君者事斷者也君有三欲於民三欲不節則上位危三欲者何也一曰求二曰禁三曰令求必欲得禁必欲止令必欲行求多者其得寡無厭則難供故其得寡禁多者其止寡法令滋章盜賊多有令多者其行寡再三則瀆故其行寡求而不得則威日損獨唱莫和非損而何禁}
