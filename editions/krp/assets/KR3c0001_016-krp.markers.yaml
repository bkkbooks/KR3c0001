  - {type: voice, offset: 701, length: 12, name: note, id: n35}
  - {type: variant, offset: 704, length: 0, content: '', WYG: 隂陽不測者也故命之曰道天主正平分四時天之正也地主平均生萬物地之平也人主安靜無為而無不為人之安靜也春秋冬夏天之時也山陵川谷地之枝也為地之枝條也喜怒取予人之謀也四者謀之用也是故聖人與時變而不化時自變耳聖本不化從物而不移物遷而從之聖本不移能正能靜然後能定必正靜然後定也定心在中耳目聰明四枝堅固心苟定於中則耳目自聰明四枝自堅固者也可以為精舍心者精之所舍精也者氣之精者也氣之尤精者為之精氣道乃生氣得道能有生生乃思生則有心故思也思乃知思則知生也知乃止矣成智則理足故止也凡心之形過知}
