  - {type: variant, offset: 701, length: 2, content: 其度, WYG: 也事之所失以敗所得以成也凡道無根無莖無葉無榮道非如卉木而有根莖花葉也萬物以生萬物以成命之曰道無根莖而能生無花葉而能成}
