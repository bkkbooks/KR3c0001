  - {type: variant, offset: 700, length: 0, content: '', WYG: 無所及欲窮之則眇眇然無所彼道之情惡音與聲音聲者所以亂道故惡之也修心靜音道乃可得道也者口之所不能言也目之所不能視也耳之所不能聽也所以修心而正形也雖不可以言語視聽用之修心則外形自正也人之所失以死所得以}
