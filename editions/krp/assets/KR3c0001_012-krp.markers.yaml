  - {type: variant, offset: 9081, length: 0, content: '', WYG: 毋奪其事不奪其事則各安其業食無不足也此謂無外内之患事故也財食足則外内之患忘也君臣之際也君臣非有骨肉之親但以禮義相接也禮義者人}
  - {type: variant, offset: 9083, length: 0, content: '', WYG: 神也禮義在則君尊臣卑萬人以寧故曰神且君臣之屬也以義相屬親戚之愛性也相親相愛性也使君親之察同索屬故也索求也君親之於臣子同求其愛敬矣故事也臣雖屬君當以事親之故事君使人君不安者屬際也使君不安其位者則臣但以義際君無愛敬故也不可不謹也臣無愛敬或化為仇敵故不可不謹之也賢不可威威賢則邦國殄瘁能不可留材能當引用之不可留之於彼身杜事之於前易也水鼎之汨也姦凶之事先其未然而杜塞之則甚易猶水之在鼎以烹之食事亦不擾也人聚之壤地之美也由是地美故人聚之也人死之若江湖之大也人所以為君致死者則君量若湖水之大無不容納故也求珠貝者不令也君之於人有所簡擇若求珠貝之為也人必去而不令之逐神而逺熱交觶者不處兄遺利君之於人也使敬之若逐神長之若逺熱其逐神者交觶祭祀不敢留處其逺熱也雖有兄弟之親亦遺利而去君之尊嚴莫與大誰敢窺覦之哉夫事左謂人君行事不得正中國之人觀危國過君而弋其能者豈不幾於危}
