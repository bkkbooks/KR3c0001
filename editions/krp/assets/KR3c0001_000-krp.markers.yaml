  - {type: variant, offset: 5, length: 0, content: '', WYG: 精時者少日而功多又曰吾欲正卒伍修甲兵而大國亦將修之吾有攻伐之器而諸侯有守禦之備是難以速得志此仲之所以立法意也夫白刄捍胷則目不見流矢拔㦸加首則十指不辭斷眀緩急之有所先也使仲當諸侯力政之日必欲舉王制而井田吾民象刑吾法毋招權勇毋𣙜鹽鐡不踰時而國且飽於敵矣安能以區區之齊伸威海岱而成其一匡之績哉昔者蘇軾氏盖論仲之變法而曰王者之兵非以求勝故其法繁而曲霸者之兵求以決勝故其法簡而直然則謂仲之用法異於周公之意則可而謂其法之盡詭於周公則不可故曰古今遞遷道隨時降王霸迭興政由俗革吾以為周公經制之大備葢所以成王道之終管子能變其常而通其窮亦所以基伯道之始夫亦勢之所趨有不得不然者乎雖然非仲之輕於悖周也當太公之治齊五月而報政曰吾因其俗簡其禮至三年而伯禽之報政周公且訾之曰夫政不簡不易民不有近魯終北面而事齊矣意者太公之治有不盡倣於周官而史葢稱其通商賈之策便魚鹽之利人民歸齊齊稱大國葢自太公而齊故以富彊名於列國仲特囙齊之故而修業耳非一無所昉襲而創為之者也世之譚者曰帝降而王王降而霸自仲之説行一變而入於誇詐之習其末極於秦鞅盡去先王之籍而流毒天下遂以管商為功利之首夫商君慘礉少恩卒受惡名於秦而仲之政餙四維固六親其論白心内業不可謂無窺於聖人之道而徒以刀鋸繩民如商君者故雖吾夫子亦且大其功而以如其仁歸之奈何躋鞅於仲也余􅘨夫讀是書者不揆其修政立事之原而徒辱之以權謀功利使管子之所以善用周公者其道不明於天下也故為之梓其書而復論著其大略於篇首云萬厯壬午春三月前史官吴郡趙用賢序管子原序䕶左都水使者光禄大夫臣向言所校讐中管子書三百八十九篇大中大夫卜圭書二十七篇臣富㕘書四十一篇射聲校尉立書十一篇太史書九十六篇凡中外書五百六十四以校除復重四百八十四篇定著八十六篇殺青而書可繕冩也管子者潁上人也名夷吾號仲父少時嘗與鮑叔牙游鮑叔知其賢管子貧困常欺叔牙叔牙終善之鮑叔事齊公子小白管子事公子糾及小白立為桓公子糾死管仲囚鮑叔薦管仲管仲既任政於齊齊桓公以霸九合諸侯一匡天下管仲之謀也故管仲曰吾始困時與鮑叔分財多自予鮑叔不以我為貪知吾貧也嘗為鮑叔謀事而更窮困鮑叔不以我為愚知吾有利有不利也公子糾敗召忽死之吾幽囚受辱鮑叔不以我為無耻知吾不羞小節而恥功名不顯於天下也生我者父母知我者鮑叔鮑叔既進管仲而已下之子孫世禄於齊有封邑者十餘世常為名大夫管子既相以區區之齊在海濱通貨積財富國彊兵與俗同好醜故其書稱曰倉廪實而知禮節衣食足而知榮辱上服度則六親固四維不張國乃滅亡下令猶流水之原令順人心故論卑而易行俗所欲因予之俗所否因去之其為政也善因禍為福轉敗為功貴輕重慎權衡桓公怒少姬南襲蔡管仲因伐楚責包茅不入貢於周室桓公北征山戎管仲因而令燕修召公之政柯之㑹桓公背曹沫之盟管仲因而信之諸侯歸之管仲聘於周不敢受上卿之命以讓髙國是時諸侯為管仲城榖以為之乘邑春秋書之褒賢也管仲富擬公室有三歸反坫齊人不以為侈管子卒齊國遵其政常彊於諸侯孔子曰微管仲吾其被髮左袵矣太史公曰余讀管氏牧民山髙乘馬輕重九府詳哉言之也又曰將順其美匡救其惡故上下能相親愛豈管仲之謂乎九府書民間無有山髙一名形勢凡管子書務富國安民道約言要可以曉合經義向謹第錄上}
