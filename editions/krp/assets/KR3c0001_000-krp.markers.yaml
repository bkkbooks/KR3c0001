  - {type: variant, offset: 2, length: 0, content: '', WYG: 法家類提要臣等謹案管子二十四卷舊本題管仲撰劉恕通鑑外紀引𫝊子曰管仲之書過半便是後之好事所加乃説管仲死後事輕重篇尤復鄙俗葉適水心集亦曰管子非一人之筆亦非一時之書以其言毛嬙西施呉王好劍推之當是春秋末年今考其文大抵後人附㑹多于仲之本書其他姑無論即仲卒於桓公之前而篇中處處稱桓公其不出仲手已無疑義矣書中稱經言者九篇稱外言者八篇稱内言者九篇稱短語者十九篇稱區言者五篇稱雜篇者十一篇稱管子解者五篇稱管子輕重者十九篇意其中孰為手撰孰為記其緒言如語録之類孰為述其逸事如家𫝊之類孰為推其意㫖如箋疏之類當時必有分别觀其五篇明題管子解者可以類推必由後人混而一之致滋疑竇耳晁公武讀書志曰劉向所校本八十六篇今亡十篇考李善註陸機猛虎行曰江䆳文釋引管子云夫士懐耿介之心不䕃惡木之枝惡木尚能恥之况與惡人同處今檢管子近亡數篇恐是亡篇之内而䆳見之則唐初已非完本矣明梅士享所刋又復顛倒其篇次如以牧民解附牧民篇下形勢解附形勢篇下之類不一而足彌為竄亂失真此本為萬厯壬午趙用賢所刋稱由宋本翻雕前有紹興己未張嵲後跋云舛脱甚衆頗為是正用賢}
