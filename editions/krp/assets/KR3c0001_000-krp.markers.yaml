  - {type: variant, offset: 3, length: 3, content: 楊忱撰, WYG: 又云正其脱誤者逾三萬言則屢經㸃竄已非劉向所校之舊然終愈于他氏所妄更者在近代猶善本也舊有房元齡註晁公武以為尹知章所託然考唐書藝文志元齡註管子不註録而所載有尹知章註管子三十卷則知章本未託名殆後人以知章人㣲元齡名重改題之以炫俗耳案舊唐書知章絳州翼城人神龍初官太常博士睿宗即位拜禮部員外郎轉國子博士有孝經註老子註今並不𫝊惟此注藉元齡之名以存其文淺陋頗不足采然蔡絛鐵圍山叢談載蘇軾蘇轍同入省試有一題軾不得其出處轍以筆一卓而以口吹之軾因悟出管子註則宋時亦採以命題試士矣且古來無他註本明劉績所補注亦僅小有糾正未足相代故仍舊本録之焉乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書子部三管子目録法家類卷一牧民第一形勢第二權修第三立政第四乘馬第五卷二七法第六版法第七卷三幼官第八幼官圗第九五輔第十卷四宙合第十一樞言第十二卷五八觀第十三法禁第十四重令第十五卷六法法第十六兵法第十七卷七大匡第十八卷八中匡第十九小匡第二十王言第二十一卷九霸形第二十二霸言第二十三問第二十四謀失第二十五卷十戒第二十六地圖第二十七叅患第二十八制分第二十九君臣上第三十卷十一君臣下第三十一小稱第三十二四稱第三十三正言第三十四卷十二侈靡第三十五卷十三心術上第三十六心術下第三十七白心第三十八卷十四水地第三十九四時第四十五行第四十一卷十五勢第四十二正第四十三九變第四十四任法第四十五明法第四十六正世第四十七治國第四十八卷十六内業第四十九封禪第五十小問第五十一卷十七七臣七主第五十二禁藏第五十三卷十八入國第五十四九守第五十五桓公問第五十六度地第五十七卷十九地員第五十八弟子職第五十九言昭第六十修身第六十一問霸第六十二牧民解第六十三卷二十形勢解第六十四卷二十一立政九敗解第六十五版法解第六十六明法解第六十七臣乘馬第六十八乘馬數第六十九問乘馬第七十卷二十二事語第七十一海王第七十二國蓄第七十三山國軌第七十四山權數第七十五山至數第七十六卷二十三地數第七十七揆度第七十八國凖第七十九輕重甲第八十卷二十四輕重乙第八十一輕重丙第八十二輕重丁第八十三輕重戊第八十四輕重己第八十五輕重庚第八十六右二十四卷凡八十六篇内十篇闕管子原}
