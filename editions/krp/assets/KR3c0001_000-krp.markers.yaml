  - {type: line-break, offset: 3, content: '', id: KR3c0001_SBCK_000-1a03}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 管子舊書凡三百八十九篇漢劉向校除其重複定著為八十六篇今亡十篇近世所𫝊往往淆亂至不可讀余行求古善本庶㡬遇之者㡬二十年始得之友人秦汝立氏其大章僅完整而句字復多亂錯乃為正其脱誤者逾三萬言而闕其疑不可考者尚十之二然後管子㡬為全書夫五伯莫盛扵桓公而管仲特為之佐自其事羞稱扵聖門而其言悉見絀以為權謀功利學者鮮能道之及余讀是書而深惟其故然後知王者之法莫備扵周公而善變周公之法者莫精扵管子何者方周之興去隆古沕穆之風未逺而后稷公劉其深仁厚澤又培之扵數百年之乆盖風㑹既啟而文明猶鬱周公起而當制作之任其法制之綢繆文章之繁猥諸所經畫莫不犁然具舉而天下且以鴻龎淳固之俗始嚮利扵憲度著明之後故其法雖宻而其服習者亦能安之而不悖周室既衰諸侯日㝷扵干戈謀臣詧士競出其智力以相勝茍必兢兢扵先王之約束而執不移等則勢有所格而其術必有所窮非救時之宜矣管子固天下才也豈其智不及此乎是故當其謀之扵垂纓下衽之日者不過審舊法擇其善者而從之又其要則在事可以隠令可以寄政使諸侯不吾虞而吾􅍦安國富民以取盈於天下故其書如牧民乘馬㓜官輕重諸篇大抵不離周官以制用而亦不盡局於周官以通其變今攷其説所謂㕘國為三軍者即伍兩卒旅之舊也因罰備器用者即兩造兩劑之遺也選士首以好學慈孝而且及於拳勇股肱亦興賢之故典也鑄幣藉以黄金刀布而並及於魚鹽鍼鐡亦圜府之舊章也他如五勢三准諸説不過積餘藏羨待之於國諸侯不服吾可以戰諸侯賓服吾可以行仁義葢周公之法其樊然結約者要以率民於善仲直師其意不襲其故一更之為截然夷易而作民於戰故其言}
