  - {type: variant, offset: 2839, length: 0, content: '', WYG: 虗如是而君不為變不改常而更化然則攘奪竊盜殘賊進取之人起矣内者廷無良臣豪傑不安其位兵士不用積勞之人不懷其祿故也囷倉空虗民偷處而不事積聚故也而外有彊敵之憂則國居而自毁矣居然自致滅毁故曰計敵與量上意察國本觀民産之所有餘不足而存亡之國可知也故以此八者觀人主之國而人主毋所匿其情矣法禁第十四外言五法制不議則民不相私君出法制下不敢議則人奉公不相與為私刑殺毋赦則民不偷於為善有過必誅則善惡明故不為茍且之善爵禄毋假則下不亂其上爵必有徳禄必有功不妄假人則人知君我者必賢徳故不亂於上三者藏於官則為法施於國則成俗其餘不彊而治矣三者謂法刑爵也藏於官謂下不得擅其用如此則法施俗成自斯之外雖不勉彊莫不從理矣君壹置其儀則百官守其法上明陳其制則下皆㑹其度矣君之置其儀也不一則下之倍法而立私理者必多矣是以人用其}
