  - {type: variant, offset: 1078, length: 0, content: '', WYG: 佚别男女則通亂隔要謂遮止之也言能止淫佚别男女則雖先通亂令能隔阨也貴賤有義倫等不踰則有功者勸國有常式故法不隱則下無怨心隱謂伏而不行此五者興德匡過存國定民之道也夫君人者有大過臣人者有大罪國所有也國之所有也民所君也民者己之所君有國君民而使民所惡制之此一過也言民惡君之制已此亦君之過民有三務不布其民非其民也三務謂春夏秋務農人不務三則餒餓成變故民非其民也民非其民則不可以守戰此君人者二過也夫臣人者受君高爵重祿治大官倍其官遺其事穆君之色穆猶恱也從其欲阿而勝之阿曲也巧言令色委曲從君至於動也剛漸以勝之其終或至於簒殺故曰阿而勝之也此臣人之大罪也君有過而不改謂之倒臣當罪而不誅謂之亂君為倒君臣為亂臣國家之衰也可坐而待之是故有道之君者執本相執要大夫執法以牧其羣臣羣臣盡智竭力以役其上謂給上之役也四守者得則治易則亂故不可不}
