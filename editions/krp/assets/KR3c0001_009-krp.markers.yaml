  - {type: variant, offset: 2493, length: 0, content: '', WYG: 下之賢而王之均分以釣天下之衆而臣之既王有地均分其祿用此以引天下之衆故可得而臣之也故貴為天子富有天下而伐不謂貪者其大計存也得地均分可以臣彼地自利彼於我何貪此其大計也以天下之財利天下之人以明威之振利天下之人還用天下之財於我無所减削更可以明威權之振所謂惠而不費者也合天下之權以遂徳之行結諸侯之親合天下之權皆令在已權總則徳遂徳遂則親成也以姦佞之罪刑天下之心所謂懲一而勸百因天下之威以廣明王之伐明天下所欲亾而亾之則明王之伐自廣攻逆亂之國賞有功之勞封賢聖之徳明一人之行而百姓定矣賞加一人而天下勸罰加一人而天下畏故曰明一人之行而百姓定矣夫先王取天下也術非術則無以取天下也術乎大徳哉物利之謂也術可以取天下故曰大徳然術之所歸在於令物得利也夫使國常無患而名利竝至者神聖也神聖則多所感致國在危亡而能夀者明聖也明聖則不失事機是故先王之所師者神聖也其所賞者明聖也賞謂樂翫也夫一言而夀國用其言故夀也不聴而國亡若此者大聖之言}
