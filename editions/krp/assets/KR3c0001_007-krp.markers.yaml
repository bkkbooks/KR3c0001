  - {type: variant, offset: 6805, length: 0, content: '', WYG: 置遽委焉有司職之遽今之郵驛也委謂當有儲擬以供過者立官以主之從諸侯欲通謂從諸侯欲通於齊吏從行者令一人為負以車其吏從行而來者遽之有司當令一人以車為負載其行裝若宿者令人養其馬食其委其客若宿即以所委食之客與有司别契别契謂分别其契以知真偽也至國八契自郊至國八契則二百五十里之郊地相距為五百里此周之大國也費義數而不當有罪義謂供客之禮徒費義數而於事不當者罪之凡庶人欲通鄉吏不通七日囚庶人有所陳訴通於君鄉吏抑而不通事經七日者則囚其吏鞠劾其所以也出欲通吏不通五日囚出謂欲適他國䝿人子欲通吏不通三日囚凡縣吏進諸侯士而有善觀其能之大小以為之賞有過無罪賞雖過能亦不罪也令鮑叔進大夫勸國家升進大夫令之勉營國家之事得之成而不悔為上舉得此大夫故冇成功終然允當無有可悔如此者舉善之上從政治為次所進大夫從政而能理者次上成功也野為原又多不發起訟不驕次之所進大夫有能勸勉農人開闢荒野皆為原田又教之和通不相告發雖有起而訟者莫不恭恪不為驕傲此又其次也勸國家得之成而悔從政雖治而不能野原又多發起訟}
