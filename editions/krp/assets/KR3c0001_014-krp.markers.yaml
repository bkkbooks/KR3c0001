  - {type: variant, offset: 1381, length: 0, content: '', WYG: 呼之可以取魚鼈此涸川水之精也是以水之精麤濁蹇能存而不能亡者生人與玉伏闇能存而能亡者蓍龜與龍或世見或不見者蟡與慶忌故人皆服之謂服用水而管子則之言管子獨能知水法則也人皆有之莫不有水而管子以之以用也言管子獨能用水也是故具者何也水是也言水無理不具也萬物莫不以生得水以生唯知其託者能為之正具者水是也託依也能知水理之所依者能正於萬物故理之具者水也故曰水者何也萬物之本原也諸生之宗室也美惡賢不肖愚俊之所產也何以知其然也夫齊之水道躁而復故其民貪麤而好勇以水道迴復故令人貪以其躁速故令人麤勇也楚之水淖弱而清故其民輕果而賊以其淖弱故輕佚清則明察故人果賊也越之水濁重而洎故其民愚疾而垢洎浸也濁重故愚浸則多所漸入故疾垢也秦之水泔最而稽􅙹滯而雜最絶也稽停留也謂秦水絶甘而味停留又泥􅙹沈滯與水相雜也故其民貪戾㒺而好事以其泔而稽故貪戾以其滯雜故誣而好事齊晉之水枯旱}
