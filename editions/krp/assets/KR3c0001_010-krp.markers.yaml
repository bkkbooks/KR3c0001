  - {type: variant, offset: 7936, length: 0, content: '', WYG: 有司奉命而行事百姓順上而成俗著久而為常著明而且久積習而為常也犯俗離敎者衆共姦之衆以離敎為姦而罪之也則為上者佚矣天子出令於天下諸侯受令於天子大夫受令於君子受令於父母下聴其上弟聴其兄此至順矣衡石一稱斗斛一量丈尺一綧制所謂同律度量衡也綧古准字准節律度量也謂丈尺各有准限也戈兵一度書同名車同軌此至正也從順獨逆從正獨辟此猶夜有求而得火也衆皆從順而有獨逆者衆皆從正而有獨辟者必為順正者所伏也姦偽之人無所伏矣此先王之所以一民心也是故天子有善讓徳於天諸侯有善慶之於天子諸侯有善讓於天子而慶也大夫有善納之於君民有善本於父慶之於長老此道法之所從來是治本也道法以讓為主是故歲一言者君也謂正嵗之朝布之縣象時省者相也月稽者官也務四支之力修耕農之業以待令者庶人也是故百姓量其力於父兄之間聴其言於}
