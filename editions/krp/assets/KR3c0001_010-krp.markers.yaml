  - {type: variant, offset: 2186, length: 0, content: '', WYG: 之管仲曰此聖人之言也君必行也謂中婦諸子止君不行此合聖人之言也令君行之管仲寢疾桓公往問之曰仲父之疾甚矣若不可諱也不幸而不起此疾彼政我將安移之管仲未對桓公曰鮑叔之為人何如管仲對曰鮑叔君子也千乘之國不以其道予之不受也雖與千乗之國不以其道彼必不受雖然不可以為政其為人也好善而惡惡已甚已猶太也言憎惡惡人太甚見一惡終身不㤀桓公曰然則孰可管仲對曰隰朋可朋之為人好上識而下問好上識謂好知逺大之事臣聞之以徳予人者謂之仁以財予人者謂之良以善勝人者未有能服人者也以善勝人人亦生勝己之心故不服以善養人者未有不服人者也於國有所不知政於家有所不知事必則朋乎若皆知之則事鍾於己將不勝任而敗朋能有所不知故可以移政且朋之為人也居其家不㤀公門居公門不忘其家事君不二其心亦不忘其身舉齊國之幣握路家五十室其}
