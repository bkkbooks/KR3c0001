  - {type: variant, offset: 6911, length: 0, content: '', WYG: 卑勞以爾自卑而勞弊實謂爾伯舅毋下拜桓公召管仲而謀管仲對曰為君不君君命臣無下拜是不君也為臣不臣臣承命而不讓是不臣也亂之本也桓公曰余乘車之會三兵車之會六九合諸侯一匡天下北至於孤竹山戎穢貉拘秦夏西至流沙西虞南至吳越巴䍧牱􅀈不庾雕題黑齒皆南夷之國號也荆夷之國莫違寡人之命而中國卑我中國之人不尊崇樂推使居臣位是卑我也昔三代之受命者其異於此乎管子對曰夫鳳皇鸞鳥不降而鷹隼鴟梟豐庶神不格庻神不至則未歆其祭享守龜不兆守龜國之守龜不兆謂不以信誠告之握粟而筮者屢中長者不告而短者告是徳之不至𫝊曰龜長筮短詩曰握粟出卜時雨甘露不降飄風暴雨數臻五穀不蕃六畜不育而蓬蒿藜􅀢徙弔反竝興夫鳳皇之文前徳義後日昌前包徳義後有日昌明先徳義乃可以日昌也昔人之受命者龍龜假假至也河出圖雒出書地出乘黄乘黄神馬也坤利牝馬之貞故從地出若漢之渥洼神馬之比今三祥未}
