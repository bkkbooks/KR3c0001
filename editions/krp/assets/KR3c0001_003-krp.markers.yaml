  - {type: variant, offset: 4547, length: 803, content: 靜有功畜之以道養之以德畜之以道則民和養之以德則民合故能習習故能偕爲其事偕謂同偕習以悉也悉盡莫能傷也此居於圖西方方外之副也此西圖旗物尚黑故尚黒水用事兵尚脅盾之於脅故曰脅盾象時物之閉盾或署刑則游仰灌流仰藥死而旣乃投之於其用刑則游縱之所使流灌察數而知治審器而識勝明謀而適勝通德而天下定定宗廟育男女男女育也宗廟存則官四分則可以立威行德制法儀出號令四面分設擇才授官至善之爲兵也非地是求也罰人是君善至人若紂桀之人比屋可誅也之兵不求其地所以君可罰立義而加之以勝至威而實之以德守之而後脩勝心焚海内制如此則強勝之心可以焚灼於海内旣獲敵人之國順而守之然后修其法民之所利立之所害除之則民人從則人從也立利除害立爲六千里之侯則大人從四方相距六千里大人謂天子三公四輔也旣九㑹之後天子加命立爲侯伯面各三千里使國君得其治則人君從㑹同盟諸侯矣國君謂天下請命於天地知氣和則生物從則四氣和可知故生物從之謂郊祀天地神祇使之合德計緩急之事則危危而無難難緩急之事皆有可危之理故曰危危緩急之事皆已計定則二者之危無所明於器械之利則渉難而不變察於先後之理則兵出而不困通於出入之度則深入而不危審於動靜之務則功得而無害也著於取與之分則得地而不執恡執謂不愼於號令之官則舉事而有功此居於圖北方方外之副也此北圖㓜官圖第九南方副圖中方副圖北方副圖東方本圖中方副圖西方本圖西方副圖南方本圖中方本圖北方本圖經言九秋行夏政葉行春政華行冬政耗十二期風至戒秋事十二小夘薄百爵十二白露下收聚十二復理賜予十二始前節弟賦事十二始卯合男女十二中卯十二下卯三卯同事九和時節君服白色味辛味聽商聲治濕氣用九數飲於白后之井以介蟲之火爨藏恭敬行搏銳坦氣脩通凡物開靜形生理閒男女之畜修郷里之什伍量委積之多寡定府官之計數養老弱而勿通信利害而無私此居於圖西方方外右西方本圖旗物尚白兵尚劒刑則紹昩斷絶始乎無端卒乎無窮始乎無端道也卒乎無窮德也道不可量德不可數不可量則衆強不能圖不可數則爲詐不敢郷兩者備施動靜, WYG: 静}
