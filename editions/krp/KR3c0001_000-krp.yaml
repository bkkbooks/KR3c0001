  text: 管子序
  hash: sha256:544826718fd660d304daac4e31dbfab241e72d8eed542526a097cfdd6f4ba1d0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3c0001_SBCK_000-1a}
body:
  text: 楊忱撰序曰春秋尊王不尊霸與中國不與夷狄始于平王避夷難也是王室遷而微也見于周書文侯之命微王也是王者朱賞也費誓善其備夷是諸侯之正也秦誓專征伐是諸侯之失禮也書春秋合體而異丗也書以文侯之命終其治也春秋以平王東遷始其微也自東遷六十五年春秋無晉以其亡護亂也及其滅中國之國而後見其行事譏失賞也周之微也幸不夷其宗禝齊桓之功也其中國無與加其盛也其夷狄無與抗其力也見于衛詩美其存中國也春秋無與辭何異也存一國之風無其人則衛夷矣全王道之正與之霸是諸侯可專征伐也夫晉之爲霸也異齊逺矣桓正文譎夫桓之爲正押夷狄存中國文之爲譎陵中國微王室晉之風也無美其美無功其功外無他焉雖國人不與也然而桓之正非王道之正也以文譎而桓正也桓之功非王道之功也以攘狄而存周也無桓周滅有周桓賊桓卒齊衰楚人滅周周之不幸桓之早死也故曰周之存桓之功也桓之不幸管仲之早死也故曰桓之功管仲之力也自是楚滅諸國而熾矣今得其著書然後知攘狄之功皆逺略也儒譏霸信刑賞豈王者詆民哉霸嚴政令豈王者怠忽哉霸郷方略豈王者不先謀哉霸審勞佚豈王者暴師哉霸謹畜積豈王者使民不足哉亦時夷狄内聘大者畏威小者懷仁功亦至矣不幸名之不正然奈衰丗何孔子曰微管仲吾其𬒳髪左在此其據也時大宋甲申秋九月二十三日序管子目錄第一牧民第一形勢第二權脩第三立政第四乗馬第五第二七法第六版法第七第三㓜官第八㓜官圖第九五輔第十第四宙合第十一樞言第十二第五八觀第十三法禁第十四重令第十五第六法法第十六兵法第十七第七大匡第十八第八中匡第十九小匡第二十王言第二十一第九霸形第二十二霸言第二十三問第二十四謀失第二十五第十戒第二十六地圖第二十七叅患第二十八制分第二十九君臣上第三十第十一君臣下第三十一小稱第三十二四稱第三十三正言第三十四第十二侈靡第三十五第十三心術上第三十六心術下第三十七白心第三十八第十四水地第三十九四時第四十五行第四十一第十五勢第四十二正第四十三九變第四十四任法第四十五明法第四十六正丗第四十七治國第四十八第十六内業第四十九封禪第五十小問第五十一第十七七臣七主第五十二禁藏第五十三第十八入國第五十四九守第五十五桓公問第五十六度地第五十七第十九地貟第五十八第子職第五十九言昭第六十脩身第六十一問霸第六十二牧民解第六十三第二十形勢解第六十四第二十一立政九敗解第六十五版法解第六十六明法解第六十七巨乗馬第六十八乗馬數第六十九問乗馬第七十第二十二事語第七十一海王第七十二國蓄第七十三山國軓第七十四山權數第七十五山至數第七十六第二十三地數第七十七揆度第七十八國準第七十九輕重甲第八十第二十四輕重乙第八十一輕重丙第八十二輕重丁第八十三輕重戊第八十四輕重已第八十五輕重庚第八十六右二十四卷凡八十六篇内十篇護左都水使者光禄大夫臣向言所校讎中管子耆三百八十九篇太中大夫卜圭書二十七篇臣富叅書四十一篇射聲校尉立書十一篇太史書九十六篇凡中外書五百六十四以校除復重四百八十四篇定著八十六篇殺青而書可繕寫也管子者潁上人也名夷吾號仲父少時甞與鮑叔牙游鮑叔知其賢管子貧困常欺叔牙叔牙終善之鮑叔事齊公子小白管子事公子糾及小白立爲桓公子糾死管仲囚鮑叔薦管仲管仲旣任政於齊齊桓公以霸九合諸侯一匡天下管仲之謀也故管仲曰吾始困時與鮑叔分財多自子鮑叔不以我爲貪知吾貧也甞爲鮑叔謀事而更窮困鮑叔不以我爲愚知吾有利有不利也公子糾敗召忽死之吾幽囚受辱鮑叔不以我爲無恥知吾不羞小節而恥功名不顯於天下也生我者父母知我者鮑叔鮑叔旣進管仲而已下之子孫丗禄於齊有封邑者十餘丗常爲名大夫管子旣相以區區之齊在海濵通貨積財富國彊兵與俗同好醜故其書稱曰倉廪實而知禮節衣食足而知榮辱上服度則六親固四維不張國乃滅亡下令猶流水之原令順人心故論卑而易行俗所欲因子之俗所否因去之其爲政也善因禍爲楅轉敗爲功貴輕重愼權衡桓公怒少姫南襲蔡管仲因伐楚責包茅不入貢於周室桓公北征山戎管仲因而令燕脩召公之政柯之會桓公背曹沫之盟管仲因而信之諸侯歸之管仲聘於周不敢受上卿之命以讓髙國是時諸侯爲管仲城穀以爲之乘邑春秋書之襃賢也管仲富擬公室有三歸反坫齊人不以爲侈管子卒齊國遵其政常彊於諸侯孔子日微管仲吾其被髮左衽矣太史公曰余讀管讀管子張嵲巨山余讀管子然後知莊生􅏯錯董生之語時岀於管子也不獨此耳凡漢書語之雅馴者率多本管子管子天下之竒文也所以著見於天下後世者豈徒其功烈哉及讀心術白心上下内業諸篇則未甞不廢書而歎益知其功業之所本然後知世之知管子者殊淺也管子書多古字如專作摶忒作貣宥作侑況作兄釋作澤此類甚衆大匡載召忽語曰百歳之後吾君下世犯吾命而廢吾所立奪吾糾也雖得天下吾不生也兄與我齊國之政也而注乃謂召忽呼管仲爲兄曰澤命不渝而注乃以爲澤恩之命甚陋不可徧舉書旣雅奥難句而爲之注者復繆於訓故益使後人疑惑不能究知世傳房玄齡所注恐非是予求管子書乆矣紹興己未乃從人借得之後而讀者累月始頗窺其義訓然舛脫甚衆其所未解尚十二三用上下文義及叅以經史刑政頗爲改正其訛謬疑者表而發之其所未解者置之不敢以意穿鑿也旣又取其閒奥於理切於務者抄而藏於家將得善本而卒業焉刻始完好無闕豈非快事取對頋氏小字本高岀一籌當是勅先所據以校劉績之本者也後錢唐友人來詢之知嘉興所見者即此鈔本其不肯明言在書肆者恐余捷足先淂孰知已有代購之人為為始始終之俾作两美之合㦲嘉慶丙寅立冬後一日士礼居重裝并記蕘翁黄丕烈戊辰正月从瞿氏叚得此本与海寍唐耑甫常孰張純卿同校一過于趙刻本之上解記此戴望峜于冶城山書局
