body:
  text: 宙合第十一樞言第十二宙合第十一通往古又合來今無不苞羅也古往今來曰宙也所陳之道既外言二左操五音右執五味舉目第一懷繩與准鉤多備規軸減溜大成是唯時德之節舉目第二春采生秋采蓏夏處隂冬處陽舉目第三大賢之德長明乃哲哲乃明奮乃苓明哲乃大行舉目第四毒而無怒怨而無言欲而無謀舉目第五大揆度儀若覺卧若晦明若敖之在堯也舉目第六毋訪于佞毋蓄于諂毋育于凶毋監于讒不正廣其荒舉目第七不用其區區鳥飛准繩舉目第八讂反火縣充末衡易政利民舉目第九母犯其凶毋邇其求而逺其憂髙爲其居危顚莫之救舉目第十可淺可深可浮可沈可曲可直可言可黙十第目一舉天不一時地不一利人不一事可正而視定而履深而迹十第目二舉夫天地一險一易若鼓之有揨反宅耕擿反丁歴擋反丁用則撃天地萬物之橐宙合有橐天地舉目第十三左操五音右執五味此言君臣之分也故曰君臣之分也左陽君道右隂臣道君出令佚故立于左佚凡右爲用事君但出令故曰而右勞故左佚臣任力勞故立于右故曰勞臣則任力夫五音不同聲而能調此言君之所出令無妄也雖各有别君則盡能裁之故所出無妄五音雖有不同樂師盡能調之喻百度而無所不順順而令行政成奉之則政成君出令皆順五味不同物而能和此言臣之所任力無妄也臣守任之而無妄也五味宰夫能和之百職而無所不得得而力務財多務而財必多也臣能任職得冝故君出令正其國而無齊其欲常隨其欲民欲旣異之也而敎一其愛而無獨與是獨與則是愛不一毋獨與是也正臣其愛冝一率土周之無所王施而無私則海内來賔矣臣任力同其忠而無爭其利不失其事而無有其名分敬而無妬則夫婦和勉矣君失音則風律必流蕩散流謂流則亂敗臣離味則百姓不養故百姓不養也臣離味百職曠百姓不養則衆散亡君臣各能其分則國寧矣故名之曰不德懷繩與准鉤多備規軸減溜大成是唯時德之節夫繩扶撥以爲正准壊險以爲平而後以爲平也准必壊舊髙峻鉤入枉而出直則就枉取工人用鉤也直此言聖君賢佐之制舉也之法用鉤也言制以舉賢博而不失因以備能而無遺鳴狗盗無所不取皆有所長故能備之所舉旣博則枉直咸盡故無所失雖雞國猶是國也民猶是民也桀紂以亂亡湯武以治昌人桀紂以之亡亂之故也湯武以之昌治之湯之國人亦桀之國人武之國人亦紂之國也故章道以敎明法以期民之興善也如化湯武之功是也之昌湯武興善亦章明也敎化明也人之多備規軸者成軸也備故多備方主嚴剛圓主柔和今規者正圓器軸者轉規大小悉須恩引物也用規者欲施夫成軸之多也其處大也不究其入小也不塞也大究窮物施冝故有大小也軸用大處小用小故因猶迹求履之憲也憲法也擬迹而求履法履法可迹者履之所出善者恩之所生心善心可生也得施恩而求善夫焉有不適善無不適也以恩驅善故適善備也僊也是以無乏人君善旣備順何所乏哉則求者無不善也僊輕順貌旣皆適善能備以恩爲善者輕順故諭敎者取辟焉爲規拒也辟法也取天淯陽無計量地化生無法崖萬物物生不可計量地以淯古育字天以陽氣育生畔君之恩法天地之厚廣也隂化無物不化故乃法以制崖所謂是而無非非而無是須順物當順亦旣行恩又而非之不得有是也而是之不得有非當順是非有必交來苟信是以有不可先規之之有矣非則不可掩故先以恩意令悉改也是非旣有必使二者俱來得以驗之是旣信必有不可識慮之然將卒而不戒防慮之如其事將終即必當隂備待之不可戒告於彼也不可識謂其非謀隠伏意在不測或苞藏禍心故必有以故聖人博聞多見畜道以待物無不容也以道待物物物至而對形曲均存矣配對如此則均平皆在於恩而無遺失也也物至矣以多少之恩配大小之形減盡也溜發也言徧環畢莫不備得故曰減溜大成盡善君敎不偏減順園圓之周無不備得也減溜盡發君旣均施以恩故物盡發於善亦旣成功之術必有巨獲大成大獲巨大也功必周於德審於時時德之遇事之㑹也若合符然故曰是唯時德之節合符契則何功而不成也徳旣周時又審二者遇㑹若春采生秋采蓏夏處隂冬處陽此言聖人之動靜開闔詘信浧反弋逞儒取與之必因於時也時則動不時則靜是以古之士有意而未可陽也故愁其治言含愁而藏之也方殷未可明論有意濟丗時亂隂愁而藏之故曰理代之言賢人之處亂丗也知道之不可行則沈抑以辟罰靜黙以侔免也侔取辟之也猶夏之就凊反七性冬之就温焉可以無及於寒暑之菑矣也喻賢者不避亂丗更怊刑譴何榮之可得夏不就清冬不就温更以寒暑致災終無益哉非爲畏死而不忠也忠哉但以無益而徒死也賢人之避亂丗豈畏死而不夫強言以爲僇而功澤不加刑僇矣何功澤之加哉時非所言必致刑僇旣進傷爲人君嚴之義而遇臣進加其嚴酷也傷人君因此益退害爲人臣者之生因此轉更偷生也退而不遇害而人臣其爲不利彌甚嚴酷臣益偷生不利彌甚也不避亂丗而遇害則君益其故退身不舎端脩業不息版也版牘以待淸明息其版籍所以俟亂丗清明候風雲以舉翼也賢者雖復退身終不捨其端操不息修業亦不故微子不與於紂之難而封於宋以爲殷主先祖不滅後丗不絶故曰大賢之德長賢人之德業可乆可大則明乃哲哲乃明奮乃苓明哲乃大行此言擅美主盛自奮也以琅湯湯音瑒琅音浪凌轢人人之敗也常自此是故聖人著之簡筴傳以告後進曰奮盛苓落也盛而不落者未之有也故有道者不平其稱不滿其量不依其樂不致其度滿量依樂致度者所以晦其明有道者則湯武也所以不平稱爵尊即肅士祿豐則務施功大而不伐業明而不矜夫名實之相怨久矣是故絶而無交鄰之好杜賔客之交惡其名實之聞也有名有實必爲人怨其來久所以絶四惠者知其不可兩守乃取一焉故安而無憂從此而息所以安然而無憂也名實不可兩守故但存其一怨毒而無怒此言止忿速濟沒法也毒怨恨續赴其行毒之法沒而不用今不毒者隂爲賊害從而怒之彼知其所以行忿速濟斷沒法也爲怒者所以止此怨而無言言不可不愼也言不周密反傷其身以泄其恨隂懐他計反被傷身也言怨怒但可藏之在心不言之口故曰欲而無謀言謀不可以泄謀泄菑極泄泄謀災必至故曰災極至旣欲其事方始圗之無使謀夫行忿速遂沒法賊發言輕謀泄菑必及於身故曰毒而無怒怨而無言欲而無謀大揆度儀若覺卧若晦明則問之賢若覺而卧聽若從晦而視明可言人君材質雖不慧但大揆度儀法有疑大也以成言淵色以自詰也靜默以審慮依賢可用也晤當淵寂君有所末所不晤依賢以問之故其爲可用也其色以自窮詰靜黙其神以審思慮有仁良旣明通於可不利害之理循發蒙也則通晤循而用之其蒙自發明也問於仁良其事旣明見利害之理故曰若覺卧若晦明若敖之在堯也聖人在上賢人在下位動而履規矩常自禮法竟以改邪敖堯子丹朱慢而不恭故曰敖敖在堯時雖凡下材但以后書曰無若丹朱敖爲明故賔虞朝讓徳羣毋訪于佞言毋用佞人也用佞人則私多行毋蓄于諂言毋聽諂聽諂則欺上母育于凶言毋使暴使暴則傷民毋監于讒言毋聽讒聽讒則失士夫行私欺上傷民失士此四者用所以害君義失正也夫爲君上者旣失其義正而倚以爲名譽爲臣者不忠而邪以趨爵禄亂俗敗丗以偷安懐樂雖廣其威可須也故曰不正廣其荒是以古之人阻其路塞其遂守而物修故著之簡筴傳以告後丗人曰其爲怨也深是以威盡焉不用其區區者虚也人而無良焉故曰虚也凡堅解而不動陼隄而不行其於時必失失則廢而不濟失植之正而不􅍝不可賢也植而無能不可善也所賢美於聖人者以其與變隨化也淵泉而不盡微約而流施是以德之流潤澤均加于萬物故曰聖人叅于天地鳥飛准繩此言大人之義也大人之義權而合道鳥飛准繩曲以爲直夫鳥之飛也必還山集谷不還山則困不集谷則死山與谷之處也不必正直而還山集谷曲則曲矣而名繩焉以爲鳥起於北意南而至于南起於南意北而至于北茍大意得不以小缺爲傷隨山谷而曲飛茍鳥意將集南北亦是也苟得合義之大致不以反經小過而爲傷也遂南北之大意不以曲飛小缺爲傷聖人行權亦猶故聖人美而著之鳥美之簡筴也飛之事著曰千里之路不可扶以繩路必窮也繩直千里萬家之都不可平以准居必塞也平准萬家言大人之行不必以先帝常義立之謂賢變道必守常違也躓故爲上者之論其下也理也議欲不可以失此術也權道此術讂逺也火縣反充言心也心欲忠未衡言耳目也耳目欲端中正者治之本也耳司聽聽必順聞聞審謂之聦且審故謂之聰耳之所聞旣順目司視視必順見見察謂之明視曰明目之順心司慮慮必順言言得謂之知所慮心之故謂之智旣順且得聦明以知則博博而不惛所以易政也者旣博故事無過聦也明也智也三作樂易先古政舉乃得中可制禮政易民利利乃勸勸則告以禮樂告之民旣勸勉故可聽不愼不審不聦不審不聦則繆視不察不明不察不明則過慮不得不知不得不知則昬繆過以惛則憂憂則所以伎苛伎苛所以險政政險民害害乃怨怨則凶故曰讂充未衡言易政利民也毋犯其凶言中正以蓄愼也毋邇其求言上之敗常貪於金玉馬女而吝愛於粟米貨財也厚藉斂于百姓則萬民懟怨逺其憂言上之亡其國也常邇其樂立優美而外淫于馳騁田獵内縱于美色淫聲下乃解怠惰失百吏皆失其端則煩亂以亡其國家矣髙爲其居危顚莫之救此言尊髙滿大而好矜人以麗主盛處賢而自予雄也以賢自許以爲英言君王豪盛處已許也雄予故盛必失而雄必敗夫上旣主盛處賢以操士民國家煩亂萬民心怨此其必亡也猶自萬仞之山播而入深淵其死而不振也必故曰毋邇其求而逺其憂髙爲其居危顚莫之救也可淺可深可沈可浮可曲可直可言可黙此言指意要功之謂也之指意要必得此然可以成功凡此淺深曲直諸事皆可詳之言天不一時各有其時春夏秋冬地不一利各有其利五土十地人不一事各有其事士農工商是以著業不得不多人之名位不得不殊事業及其名位豈得不多而殊乎天時地利猶有不一況於人之所著方明者察于事故不官也官主于物而旁通于道不可專一故云不主一物功用無方旁通方謂法術言法術通明之士察於天地知也於道道也者通乎無上詳乎無窮運乎諸生道而生諸物由是故辯于一言察于一治攻于一事者可以曲說而不可以廣舉寡言者唯可以示一曲之說未足以廣苞也能之人但辯一言察一理攻一事如此聖人由此知言之不可兼也故博爲之治而計其意而復計度所言之意以告喻之也知一言不可兼羣言故博爲理衆言知事之不可兼也故名爲之說而況其功每事皆立名而爲之說又恐又知一事不足以兼衆事故況而曉告之未明其功故比嵗有春秋冬夏月有上下中旬日有朝暮夜有昏晨半星半見也星半隱辰序各有其司故曰天不一時各舉天此以上出常見半至於次序有司以爲法也時不一半星辰序言其星長晝隱夜山陵岑巖淵泉閎流泉踰瀷之流也瀷奏漏而不盡薄承瀷而不滿盡至溪谷小旣停薄隨至而泄泉逾而前瀷隨而後欲其流不不滿之流也雖承瀷而常髙下肥墝物有所冝故曰地不一利地利不一也此以上略言郷有俗國有法食飲不同味衣服異采丗用器械䂓矩繩准稱量數度品有所成故曰人不一事之事不一也此以上舉人此各事之儀其詳不可盡也略舉之故其詳不盡也此天地人三者之儀但可正而視言察美惡審别良苦不可以不審操分不雜故政治不悔定而履言處其位行其路爲其事則民守其職而不亂故葆統而好終深而迹言明墨章書道德有常則後丗人人修理而不迷故名聲不息夫天地一險一易若鼓之有楟爲響楟當擿擋則擊地否泰應德而至險易猶否泰夫天擊而鳴者也猶鼓之含響應言苟有唱之必有和之和之不差因以盡天地之道而不差應擊爲響象天地應德爲否泰也唱則擊也小則小和大則大和故曰和象景不爲曲物直響不爲惡聲美天道福善禍淫隨事而至也物曲則影曲聲惡則響惡亦況是以聖人明乎物之性者必以其類來也積善餘慶積惡餘殃惡聲往則惡響來猶故君子繩繩乎愼其所先天地萬物之橐也應之則善在先應在後如橐之成物也故曰天地萬物之橐君子知善惡必報繩繩戒愼先天地以類善天地萬物從而宙合有橐天地地行善故橐天地也宙合之道敎以先天天地苴反子餘萬物故曰萬物之橐之中故爲橐也苴裹萬物在天地宙合之意上通於天之上下泉於地之下外出於四海之外合絡天地以爲一裹地下包絡天地爲一裹也宙合廣積善以通天上入散之至于無閒不可名而山觀猶不可得其名若山然也宙合之裹故散其終上能無偷是大之無外小之無内故曰有橐天地其義不傳故其義不可妄傳也茍非其人道不虚行一典品之不極一薄然而典品無治也常行則不有窮若乃輕薄不典常也宙合之道專一而能矣常品之人不能重理也能崇重則此道或幾乎息多内則富時出則當而聖人之道貴富以當奚謂當本乎無妄之治運乎無方之事應變不失之謂當變無不至無有應當本錯不敢忿錯而不用者則以變不至也當謂行賞以當功當功所以不敢忿怒也故雖不用物故言而名之曰宙合名名曰宙合也㝷古遺言之立樞言第十二而發口變而無主者也其用若樞故曰樞言樞者居中以運外動而不窮者也言則慮心外言三管子曰道之在天者日也以顯功莫大焉故謂之道也日者萬物由之以煦萬象由之其在人者心也以斷云爲莫大焉故謂之道心者萬物由之以慮萬理由之故曰有氣則生無氣則死以生成日與心氣者道之用也尤冝重也爲功而生成以氣爲言此言有名則治無名則亂治者以其名旣物故實稱其名則治名重其實則亂生成須立法以治之在於名實相副樞言曰愛之利之益之安之四者道之出故曰道之出也四者從道而生帝王者用之而天下治矣帝王者審所先所後先民與地則得矣先此二者則無所不得也民者君之地君者民之天先貴與驕則失矣亡先此二者則無所不失矣貴而不巳則驕驕而不已則是故先王愼貴在所先所後人主不可以不愼貴不可以不愼民不可以不愼富愼貴在舉賢愼民在置官愼富在務地故人主之卑尊輕重在此三者不可不愼忽三則卑以輕愼三則尊以重國有寶有器有用城郭險阻蓄藏寶也蓄藏積民無飢故爲寳也城郭完險阻脩則冦盜息聖智器也二者可操以成事故聖無不通智無遺䇿器曰珠玉末用也費多而益少故爲末用也珠玉者飢不可食寒不可衣先王重其寶器而輕其用故能爲天下生而不死者二與器謂寳立而不立者四立而重珠玉人君雖欲自四謂喜怒惡欲則不令得立者喜也者怒也者欲也者惡也者天下之敗也而賢者寶之爲善者非善也珠玉也非善此故善無以爲也故先王貴善蓄藏貴善王主積于民足無不霸主積于將戰士奮卒勇衰主積于貴人驕益其亡主積于婦女珠玉亡也速其故先王愼其所積疾之疾之萬物之師也爲之爲之萬物之時也強之強之萬物之脂也凡國有三制有制人者有爲人之所制者有不能制人人亦不能制者何以知其然德盛義尊而不好加名於人者人亦加加名于人也之人衆兵強而不以其國造難生患人亦患難之患難于人者天下有大事而好以其國後益也謙受如此者制人者也在人上下人者德不盛義不尊而好加名于人人不衆兵不強而好以其國造難生患恃與國幸名利推譲每輒幸其名利也言恃黨與之國又不爲如此者人之所制也反陵之息陵人者人之比侯伐鄭人進亦進人退亦退人勞亦勞人佚亦佚進退勞佚與人相胥之俱進退勞佚也胥視也常視人與如此者不能制人人亦不能制也愛人甚而不能利也生其怨心愛甚不利憎人甚而不能害也生其賊心憎甚不害故先王貴當憎必害愛必利貴周則周也深密不測周者不出于口不見于色一龍一蛇爲蛇喻人行藏一則爲龍一則一日五化之謂周故曰五化行藏五變故先王不以一過二衆所驚也以少喻多先王不獨舉不擅功人之所疾獨舉擅功先王不約束不結紐約束則解得而解有束故可結紐則絶得而絶有紐故可故親不在約束結紐心生也相親從先王不貨交心有親踈貨交則人不列地心有向背列地則人以爲天下天下不可改也改也改謂分别親踈向背是其而可以鞭菙使也改而以若乃不無思不服鞭菙威之則時也利也出爲之也得天時下盡地利先王有所出爲必上餘目不明餘耳不聦其明耳聽有餘不用其聦也苟非時利雖目視有餘不用是以能繼天子之容時利而已天子之容官職亦然利也亦時時者得天義者得人利也義即旣時且義故能得天與人先王不以勇猛爲邊竟則邊竟安邊竟安則鄰國親鄰國親則舉當矣人故相憎也人之心悍故爲之法法出于禮禮出于治治禮道也萬物待治禮而后定凡萬物隂陽兩生而參視先王因其參而愼所入所出以卑爲卑卑不可得以尊爲尊尊不可得桀舜是也先王之所以最重也得之必生失之必死者何也唯無得之堯舜禹湯文武孝己斯待以成天下必待以生故先王重之一日不食比歳歉三日不食比歳飢五日不食比歳荒七日不食無國土十日不食無疇類盡死矣先王貴誠信誠信者天下之結也固天下之心也信誠者所以結賢大夫不恃宗室士不恃外權坦坦之利不以功坦坦之備不爲用者故不能立功而成用也坦坦謂平平非有超而異故存國家定社稷在卒謀之閒耳聖人用其心沌沌乎博而圜豚豚乎莫得其門圜豚豚乎莫得而一本作沌乎博而也聞紛紛乎若亂絲遺遺乎若有從治故曰欲知者知之欲利者利之欲勇者勇之欲貴者貴之彼欲貴我貴之人謂我有禮彼欲勇我勇之人謂我恭彼欲利我和之人謂我仁彼欲知我知之人謂我慜戒之戒之微而異之旣順欲穫失時無所收人心不同其猶面焉令動作必思之無令人識之卒來者必備之信之者仁也不可欺者智也旣智且仁是謂成人賤固事貴不肖固事賢貴之所以能成其貴者以其貴而事賤也賢之所以能成其賢者以其賢而事不肖也惡者美之充也卑者尊之充也賤者貴之充也故先王貴之天以時使地以材使人以德使鬼神以祥使禽獸以力使所謂德者先之之謂也故德莫如先應適莫如後先王用一隂二陽者霸盡以陽者王以一陽二隂者削盡以隂者亡量之不以少多稱之不以輕重度之不以短長不審此三者不可舉大事能戒乎能勑乎能隱而伏乎能而稷乎能而麥乎春不生而夏無得乎衆人之用其心也愛者憎之始也德者怨之本也唯賢者不然先王事以合交德以合人二者不合則無成矣無親矣凡國之亡也以其長者也人之自失也以其所長者也故善游者死于梁也善射者死于中野命屬于食治屬于事無善事而有善治者自古及今未甞之有衆勝寡疾勝徐勇勝怯智勝愚善勝惡有義勝無義有天道勝無天道凡此七勝者貴衆用之終身者衆矣人主好佚欲亡其身失其國者殆其德不足以懐其民者殆明其刑而賤其士者殆諸侯假之威久而不知極已者殆身彌老不知敬其適子者殆蓄藏積陳朽腐不以與人者殆凡人之名三有治也者有恥也者有事也者事之名二正之察之五者而天下治矣名正則治名倚則亂無名則死故先王貴名先王取天下逺者以禮近者以體體禮者所以取天下逺近者所以殊天下之際日益之而患少者惟忠日損之而患多者惟欲多忠少欲智也爲人臣者之廣道也爲人臣者非有功勞于國也家富而國貧爲人臣者之大罪也爲人臣者非有功勞于國也爵尊而主卑爲人臣者之大罪也無功勞于國而貴富者其唯尚賢乎衆人之用其心也愛者憎之始也而憎愛盡德者怨之本也怨生德竭而其事親也妻子具則孝衰矣其事君也有好業家室富足則行衰矣爵禄滿則忠衰矣唯賢者不然始有卒賢者有故先王不滿也人主操逆人臣操順先王重榮辱榮辱在爲天下無私愛也無私憎也爲善者有福爲不善者有禍禍福在爲故先王重爲明賞不費明刑不暴賞罰明則德之至者也故先王貴明天道大而帝王者用愛惡愛惡天下可祕愛惡重閉必固釡鼓滿則人概之人滿則天概之故先王不滿也先王之書心之敬執也而衆人不知也故有事事也毋事亦事也吾畏事不欲爲事吾畏言不欲爲言故行年六十而老吃也管子卷第四
