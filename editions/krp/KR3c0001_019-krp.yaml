body:
  text: 地貟第五十八弟子職第五十九地貟第五十八泉深淺各有其位貟地也土地髙下水雜篇九夫管仲之匡天下也其施七尺也其長十尺施者大尺之名瀆田悉徙穿溝瀆瀆田謂毎年皆須更易也而漑田悉徙謂其地五種無不冝其立后而手實手常握此地之謂立君以主之也實數其木冝蚖菕與杜松木名也蚖菕二其草冝楚棘見是土也命之曰五施五七三十五尺而至於泉故五七三十五而至於泉也謂其地深五施毎施七尺呼音中角聲其音中角謂此地號呼之其水倉其民彊赤壚歷彊肥也彊歷踈也堅五種無不冝其麻白其布黃其草冝白茅與雚其木冝赤棠見是土也命之曰四施四七二十八尺而至於泉呼音中商其水白而甘其民壽黃唐無冝也脆也唐虚唯冝黍秫也冝縣澤注而澤常冝縣行廧牆音落故爲行廧及籬落也土旣虚脆不堪板築地潤數毀難以立邑置廧故不可立邑置廧也其地遇潤則數頺毀其草冝黍秫與茅其木冝􆀾擾桑木櫄曰柔桑也名擾柔又見是土也命之曰三施三七二十一尺而至於泉呼音中宫其泉黃而糗流徙地中而流故曰沫徙也謂水糗糒之氣其泉居斥埴冝大菽與麥其草冝萯雚其木冝杞名也杞木見是土也命之曰再施二七十四尺而至於泉呼音中羽其泉鹹水流徙黒埴冝稻麥其草冝苹蓨名也苹蓨草其木冝白棠見是土也命之曰一施七尺而至於泉呼音中徴其水黒而苦凡聽徴如負猪豕覺而駭凡聽羽如鳴馬在野凡聽宫如牛鳴窌中凡聽商如離羣羊凡聽角如雉登木以鳴音疾以淸凡將起五音凡首之揔先也凡首謂音先主一而三之四開以合九九而一音九也又凡九之爲八十一也三之即四也以是四開合於五以是生黃鍾小素之首以成宫八十一素本宫而爲五音之本數生黃鍾之宫三分而益之以一爲百有八爲徴益以三分之一二十七黃鍾之數本八十一是爲徴之數通前爲百有入不無有三分而去其乗適足以是生商也乗亦三分不無有即有餘七十二是商之數也之一也三分百八而去一有三分而復於其所以是成羽而益其一分三分七十二十六是羽之數二十四合爲九有三分去其乗適足以是成角餘六十四是角之數三分九十六去其一分墳延者六施六七四十二尺而至於泉下皆此類墳延地名陜之芳七施七七四十九尺而至於泉祀陜八施七八五十六尺而至於泉杜陵九施七九六十三尺而至於泉延陵十施七十尺而至於泉環陵十一施七十七尺而至於泉蔓山十二施八十四尺而至於泉付山十三施九十一尺而至於泉付山白徒十四施九十八尺而至於泉中陵十五施百五尺而至於泉靑山十六施百一十二尺而至於泉靑龍之所居庚泥不可得泉靑龍居又沙泥庚續其處旣有可得泉也相續故不赤壤􅭍山十七施百一十九尺而至於泉其下靑商不可得泉恠之名靑商神􅴵山白壤十八施百二十六尺而至於泉其下駢石不可得泉故不可得泉言有石駢密徒山十九施百三十三尺而至於泉其下有灰壤不可得泉髙陵土山二十施百四十尺而至於泉山之上命之曰縣泉其地不乾其草如茅與走皆草名如茅走其木乃樠名樠木鑿之二尺乃至於泉山之上命曰復吕其草魚膓與蕕其木乃柳鑿之三尺而至於泉山之上命之曰泉英其草蘄白昌其木乃楊鑿之五尺而至於泉山之材旁也材猶其草兢與薔草名音嗇其木乃格鑿之二七十四尺而至於泉山之側其草葍與蔞其木乃品榆鑿之三七二十一尺而至於泉凡草土之道各有榖造冝某榖造成也謂此地生某草或髙或下各有草土葉下於􅡿下􅡿即鬱也莊周所謂鬱西也葉亦草名唯生葉無莖在􅡿之􅡿下於莧莧下於蒲蒲下於葦葦下於雚雚下於蔞蔞下於荓荓下於蕭蕭下於薜薜下於萑萑下於茅凡彼草物有十二衰上下相衰謂草也重次各有所歸髙者之下謂短者生於九州之土爲九十物每州有常而物有次羣土之長是唯五粟五粟之物或赤或靑或白或黒或黃五粟五章五粟之狀淖而不肕剛而不觳薄觳不濘車輪泥濘不汙手足其種大重細重白莖白秀無不冝也五粟之土若在陵在山在隫在衍其隂其陽盡冝桐柞莫不秀長其榆其柳其檿其桑其柘其櫟其槐其楊羣木蕃滋數大條直以長其澤則多魚牧則冝牛羊其地其樊俱冝竹箭藻龜楢檀五臭生之薜荔白芷蘪蕪椒連五臭所校烈之銳校謂馨寡疾難老士女皆好其民工巧其泉黄白其人夷姤也言均善也夷平也姤好五粟之土乾而不挌禦也挌謂堅湛而不澤無髙下葆澤以處潤也言常是謂粟土粟土之次曰五沃五沃之物或赤或靑或黃或白或黒五沃五物各有異則五沃之狀剽怸槖土蟲易全處謂其土多竅穴若槖剽堅也怸密也槖土處之易全多竅故蟲怸剽不白下乃以澤乾白此乃葆澤之地也旣堅密故常潤濕而不其種大苗細苗赨形音莖黒秀箭長若箭竹之長也赨即赤也箭長謂五沃之土若在丘在山在陵在岡若在陬陵之陽其左其右冝彼羣木桐柞枎櫄及彼白梓其梅其杏其桃其李其秀生莖起其棘其棠其槐其楊其榆其桑其杞其枋羣木數大條直以長其隂則生之楂蔾其陽則安樹之五麻若髙若下不擇疇所其麻大者如箭如葦大長以美其細者如雚如蒸欲有與各大者不類與則以欲有施而類也麻之大小者則治揣而藏之若衆練絲而藏故若練絲言細麻旣治揣五臭疇生隴而種也疇隴也謂爲蓮與蘪蕪藁本白芷其澤則多魚牧則冝牛羊其泉白靑其人堅勁寡有疥騷終無痟酲酲酒病也痟首疾也五沃之土乾而不斥鹵斥舄湛而不澤無髙下葆澤以處是謂沃土沃土之次曰五位五位之物五色雜英各有異章五位之狀不塥不灰不相著搹謂堅靑怸以菭苔音及和菭以相及也謂色青而細密其種大葦無細葦無赨莖白秀五位之土若在岡在陵在隫在衍在丘在山皆冝竹箭求黽竹類也求黽亦楢檀其山之淺有蘢與斥古草名蘢斥並羣木安逐條長數大長數謂速長安和易逐競其桑其松其𣏌其茸名茸木種木胥容榆桃柳棟煉音羣藥安生薑與桔梗小辛大蒙藥名大蒙其山之梟顚也梟猶多桔符榆其山之末有箭與苑其山之旁有彼黃䖟及彼白昌山蔾葦芒羣藥安聚以圉民殃其林其漉其槐其楝其柞其榖羣木安逐鳥獸安施以爲生施謂有旣有麋麃又且多鹿其泉靑黒其人輕直省事少食省事少食言其性麋無髙下葆澤以處是謂位土位土之次曰五蘟五蘟之狀黒土黒菭衣也菭地靑怵以肥芬然若灰起貌芥然壤其種櫑葛赨莖黄秀恚目殻實怒恚目謂也開其葉若苑藴結苑謂以蓄殖果木不若三土五沃五位三土謂五粟以十分之二如其二分餘放此言於三土十分巳不是謂蘟土蘟土之次曰五壤五壤之狀芬然若澤若屯土爲堆故曰屯土也言其土得澤則墳起其種大水腸細水腸赨莖黃秀以慈忍水旱無不冝也耐忍蓄殖果木不若土以十分之二是謂壤土壤土之次曰五浮五浮之狀捍然如米土屑碎如捍堅貌其米以葆澤不離不坼其種忍蘟草名忍蘟忍葉如雚葉以長狐茸若狐也草之狀黃莖黒莖黒秀其粟大無不冝也蓄殖果木不如三土以十分之二凡上土三十物種十二物中土曰五怸五怸五狀廩焉如壏彊也壏猶潤濕以處其種大稷細稷赨莖黃秀慈忍水旱細粟如麻若麻也其繁美蓄殖果木不若三土以十分之三怸土之次曰五纑盧音五纑之狀彊力剛堅其種大邯鄲細邯鄲名草莖葉如枎櫄草名枝􆀾亦其粟大粒大言其蓄殖果木不若三土以十分之三纑土之次曰五壏五壏之狀芬焉若糠以肥其謂而虚地色黃其種大荔細荔靑莖黃秀蓄殖果木不若三土以十分之三壏土之次曰五剽五剽之狀華然如芬以脤紫若脤然也謂其地色青其種大秬細秬黍秬黒黒莖青秀蓄殖果木不若三土以十分之四剽土之次曰五沙五沙之狀粟焉如屑塵厲屑塵之厲厲踊起言其地粟碎故若也其種大萯細萯名萯草白莖青秀以蔓蓄殖果木不如三土以十分之四沙土之次曰五塥五塥之狀累然如僕累地附著而重僕附也言其也累不忍水旱其種大樛𣏌細樛𣏌名水黒莖黒秀蓄殖果木不若三土以十分之四凡中土三十物種十二物下土曰五猶五猶之狀如糞其種大華細華名草白莖黒秀蓄殖果木不如三土以十分之五猶土之次曰五􅧀五􅧀之狀如䑕肝其種青梁黒莖黒秀蓄殖果木不如三土以十分之五􅧀土之次曰五殖五殖之狀甚澤以䟽離坼以臞塉其種鴈膳名草黒實朱跗黃實足也跗花蓄殖果木不如三土以十分之六五殖之次曰五觳五觳之狀婁婁然疏也婁婁不忍水旱其種大菽細菽多白實蓄殖果木不如三土以十分之六觳土之次曰五鳬五鳬之狀堅而不骼骨之骼也雖堅不同其種陵稻陸生稻陵稻謂黒鵝馬夫名也皆草蓄殖果木不如三土以十分之七鳬土之次曰五桀五桀之狀甚鹹以苦其物爲下其種白稻長狹長而狹也謂稻之形蓄殖果木不如三土以十分之七凡下土三十物其種十二物凡土物九十其種三十六弟子職第五十九雜篇十先生施敎弟子是則温恭自虚後有所容也必虚其心然所受是極盡其極謂原本見善從之聞義則服温柔孝悌母驕恃力羝羊觸藩驕而恃力則志母虚邪虚僞虚謂行必正直游居有常必就有德顔色整齊中心必式法式夙興夜寐衣帶必飾朝益暮習小心翼翼一此不解是謂學則少者之事夜寐蚤作旣拚盥漱絜手漱滌口掃席前曰拚盥執事有恪攝衣共盥之盥器也謂供先生先生乃作沃盥徹盥徹盥器也謂旣盥而汎拚正席水而拚之汎拚謂汎先生乃坐出入恭敬如見賔客危坐郷師顔色母怍其容㒵怍謂變受業之紀必由長始者敎也先從長一周則然其餘則否一周則謂始敎之外則不然從長始一周始誦必作其次則巳也至於次誦則不然始誦而作以敬事端凡言與行思中以爲紀以爲綱紀思合中和古之將興者必由此始然後可興必先中和後至就席狹坐則起至者則當起狹坐之人見後若有賔客弟子駿作也迅起對客無讓不足故敬心對客而讓則有應且遂行趨進受命生命受先所求雖不在必以反命必當反白求雖不得反坐復業若有所疑捧手問之師出皆起至於食時先生將食弟子饌饋具在食饋謂選攝衽盥漱跪坐而饋置醬錯食陳膳母悖凡置彼食鳥獸魚鼈必先菜羹食之次也先某後肉羹胾中別而細切胾謂肉胾在醬前食之便也逺胾近醬其設要方要令成方也其陳設食器飯是爲卒則卒也旣飯而食左酒右醬隂陽也左酒右醬告具而退捧手而立三飯二斗二毁斗也三飯食必左執虚豆右執挾匕者匕故曰挾匕也所以載鼎實周還而貳再益貳謂唯嗛之視日嗛食盡同嗛以齒也謂齒類盡之類而進食者則以其所周則有始柄尺不跪是謂貳紀此巳是再益之綱紀也豆有柄長尺則立而進之先生巳食弟子乃徹趨走進漱拚前板祭并搜斂所祭也旣食畢掃席前先生有命弟子乃食以齒相要坐必盡席坐盡前所謂食飯必捧􅒆羹不以手挾也當以亦有據膝母有隱肘大伏也隱肘則旣食乃飽循咡覆手口咡以拭其不絜也覆手而循之所振衽掃席以拂席之汙謂振其底衽巳食者作摳衣而降旋而郷席各徹其餽如於賔客亦自徹也賔客食畢旣徹并器乃還而立謂并也藏去凡拚之道實水于盤泛灑次用攘臂袂及肘不便於事也恐濕其袂且堂上則播灑室中握手中隘故握手爲掬以滿堂上寛故播散而灑室執箕膺揲厥中有帚箕以舌自當置帚於箕中也揲舌也旣灑水將掃之故執入戸而立其儀不貸執帚下箕倚千戸側戸側也謂倚箕於凡拚之紀必由奥始隅也西南俯仰磬折拚母有徹也不徹動他物也得觸動拚前而退而却退也謂從前掃聚於戸内穢壤於戸内也謂聚其戸所掃之坐板排之手排之也板穢時以以葉適已向已也適已猶實帚于箕先生若作乃興而辭辭之令止也以拚未畢故坐執而立坐執箕也坐執謂獨遂出弃之旣拚反立是協是稽謂合考書義也協合也稽考也暮食復禮之禮也謂復朝昬將舉火執燭隅坐錯揔之法橫于坐所之束也揔設燭櫛之逺近乃承厥火逺近乃更以燭承取火也櫛謂燭盡察其將盡之居句如矩句如前燭之法矩法也句謂著燭處言居燭於蒸閒容蒸然者處下蒸之閒必蒸細薪著必處下以焚也令容蒸然燭者捧椀以爲緒捥所以貯緒也緒然燭燼也右手執燭左手正櫛有墮代燭令其次代之也燒燭者有墮即交坐母倍尊者乃取厥櫛遂出是去先生將息弟子皆起敬奉枕席問所何趾俶衽則請有常則否趾若有常處則不請也廢其枉席則當問其所先生旣息各就其友相切相磋各長其儀周則復始是謂第子之紀言昭第六十亡雜篇十一脩身第六十一亡雜篇十二問霸第六十二亡雜篇十三牧民解第六十三亡管子解一管子卷第十九
