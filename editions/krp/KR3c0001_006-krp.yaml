body:
  text: 法法第十六兵法第十七法法第十六外言七不法法則事毋常下故事無常不設法以法法不法則令不行之冝故令不行雖復設法不得法令而不行則令不法也法而不行則脩令者不審也冝而猶法旣得者未審之故也不行則以脩令審而不行則賞罰輕也則以上輕於賞罰也脩令者旣審而猶不行重而不行則賞罰不信也以雖賞罰而不信也賞罰旣重而猶不行則信而不行則不以身先之也以身不先自行其法也賞罰旣信而猶不行則故曰禁勝於身禁也身從則令行於民矣聞賢而不舉殆不聞所以有殆聞賢不舉不若聞善而不索殆見能而不使殆親人而不固殆同謀而離殆危人而不能殆不若不危危人不能廢人而復起殆發其宿嫌旣廢更起或可而不爲殆多生後悔可爲而不爲足而不施殆怨疾必生足而不施幾而不密殆則害成幾事不密人主不周密則正言直行之士而不止則刑罰侮非侮而何愈禁愈犯令而不行則下凌上非凌而何不禀其命故未有能多求而多得者也未有能多禁而多止者也未有能多令而多行者也故曰上苛則下不聽下不聽而彊以刑罰則爲人上者衆謀矣爲人上而衆謀之雖欲毋危不可得也號令巳出又易之禮義巳行又止之度量巳制又遷之刑法巳錯又移之如是則慶賞雖重民不勸也殺戮雖繁民不畏也故曰上無固植志植下有疑心國無常經民力必竭數也而曰不竭者此非理之言也數理也國無常經人力必竭明君在上位民毋敢立私議自貴者自恃爲貴也立私議者必國毋怪嚴毋雜俗毋異禮士毋私議嚴肅而無雜俗國不作竒恠則皆公議有常禮士倨傲易令錯儀畫制作議者盡誅謂别置儀畫制謂易令謂變令錯儀盡以法誅之更畫制凡此故彊者折銳者挫堅者破引之以繩墨繩之以誅僇故萬民之心皆服而從上推之而往引之而來彼下有立其私議自貴分爭而退者則令自此不行矣誅從此之後令不立議分爭退而不行復故曰私議立則主道卑矣況主倨傲易令錯儀畫制變易風俗詭服殊說猶立傲易風俗而猶有立者乎立私說尚能卑主況其倨上不行君令下不合於郷里變更自爲易國之成俗者命之曰不牧之民行君令於上不成俗故曰不牧之民言其不可養也於下不合郷里但率意自爲易國之不牧之民繩之外也繩之外誅使賢者食於能鬭士食於功賢者食於能則上尊而民從鬭士食於功則卒輕患而傲敵上尊而民從卒輕患而傲敵二者設於國則天下治而主安矣凡赦者小利而大害者也習而易犯法故曰大害也苟恱衆心故曰小利人則故乆而不勝其禍君故曰不勝其禍犯法漸廣轉欲危毋赦者小害而大利者也創而修徳故曰大人初不恱故曰小害也利故乆而不勝其福可致故曰不勝其福也家正而天下定則太平故赦者犇馬之委轡佚也必也覆毋赦者痤癤也徂禾切睢之礦石也瘳也疾可爵不尊禄不重者不與圖難犯危以其道爲未可以求之也重禄旣與之尊爵重禄其可以其道未可求故不與尊爵犯危也與之圖難是故先王制軒冕足以著貴賤不求其美設爵禄所以守其服不求其觀也使君子食於道小人食於力君子食於道則上尊而民順小人食於力則財厚而養足上尊而民順財厚而養足四者備體則足上尊時而王不難矣也相文有三侑也侑寛武毋一赦惠者多赦者也先易而後難乆而不勝其禍法者先難而後易乆而不勝其福故惠者民之仇讎也故爲仇讎也惠者生其禍法者民之父母也故爲父母也法者生其福太上以制制度其次失而能追之悔也能追雖有過亦不甚矣明君制宗廟足以設賔祀不求其美爲宫室臺榭足以避燥濕寒暑不求其大爲雕文刻鏤足以辯貴賤不求其觀故農夫不失其時百工不失其功商無廢利民無游日之日無關閉財無砥墆積也墆乆故曰儉其道乎令未布而民或爲之而賞從之則是上妄予也先時者也當刑未布而爲所謂妄與也而賞故曰上妄予則功臣怨功臣怨而愚民操事於妄作愚民操事於妄作則大亂之本也令未布而罰及之令而罰所謂不則是上妄誅也上妄誅則民輕生民輕生則暴人興爲暴亂輕生故曹黨起而亂賊作矣令巳布而賞不從則是使民不勸勉不行制不死節民不勸勉不行制不死節則戰不勝而守不固戰不勝而守不固則國不安矣令巳布而罰不及則是敎民不聽民不聽則彊者立彊者立則主位危矣故曰憲律制度必法道號令必著明賞罰必信密此正民之經也凡大國之君尊小國之君卑大國之君所以尊者何也曰爲之用者衆也小國之君所以卑者何也曰爲之用者寡也然則爲之用者衆則尊爲之用者寡則卑則人主安能不欲民之衆爲己用也使民衆爲己用柰何曰法立令行則民之用者衆矣法不立令不行則民之用者寡矣故法之所立令之所行者多而所廢者寡則民不誹議民不誹議則聽從矣法之所立令之所行與其所廢者鈞則國毋常經國毋常經則民妄行矣法之所立令之所行者寡而所廢者多則民不聽民不聽則暴人起而姦邪作矣計上之所以愛民者爲用之愛之也爲愛民之故不難毁法虧令則是失所謂愛民矣夫以愛民用民則民之不用明矣廢法而用之則人不可用也夫用人者當以法令以愛人夫至用民者殺之危之勞之飢之渴之用民者將致之此極也而民毋可與慮害己者善至必致此極則姦者不敢爲非善者恱而從命欲求可與謀害己者其可得哉也夫善用人者必以法其不從法甚者危殺之其次勞苦飢渇之將欲用之明王在上道法行於國民皆舎所好而行所惡所惡者公義也所好者私欲也故善用民者軒冕不下儗而斧鉞不上因有所許不因上有私不以私寵下妾以軒冕有所誅戮也憾妄以斧鉞如是則賢者勸而暴人止賢者勸而暴人止則功名立其後矣蹈白刃受矢后入水火以聽上令上令盡行禁盡止引而使之民不敢轉其力避也轉猶推而戰之民不敢愛其死不敢轉其力然后有功不敢愛其死然後無敵進無敵退有功是以三軍之衆皆得保其首領父母妻子完安於内故民未甞可與慮始而可與樂成功是故仁者知者有道者不與大慮始衆也大猶國無以小與不幸而削亡者必主與大臣之德行失於身也官職法制政敎失於國也諸侯之謀慮失於外也故地削而國危矣其削亡也則以臣主有失故也言國無以小與不幸而削亡者國無以大與幸而有功名者必主與大臣之德行得於身也官職法制政敎得於國也諸侯之謀慮得於外也然后功立而名成與幸而有功言國無以大以臣主有得名故也名者其有功名也則然則國何可無道人何可無求得道而導之得賢而使之將有所大期於興利除害期於興利除害莫急於身而君獨甚傷也必先令之失今君獨立無與則是有害故甚可先身無害而有利然後可以及物由先令之失也傷所以然者則人主失令而蔽所蔽塞也失令則爲下已蔽而刦已刦而弑凡人君之所以爲君者勢也故人君失勢則臣制之矣勢在下則君制於臣矣勢在上則臣制於君矣故君臣之易位勢在下也在臣期年臣雖不忠君不能奪也忠而不能奪無如之何也臣得勢期年君雖知其不在子期年子雖不孝父不能服也之何亦無如故春秋之記公之凡例春秋即周國史也而諸侯之臣有弑其君子有弑其父者矣故曰堂上逺於百里堂下逺於千里門廷逺於萬里今步者一日百里之情通矣堂上有事十日而君不聞而君遂十日不聞其事適在堂上耳此所謂逺於百里也步者十日千里之情通矣堂下有事一月而君不聞此所謂逺於千里也步者百日萬里之情通矣門廷有事期年而君不聞此所謂逺於萬里也故請入而不出謂之滅旣入而不臣有情告於下其事遂消滅也出此則左右不爲通出而不入謂之絶不爲通於上其事遂斷絶也其事旣出而不入此則左右入而不至謂之侵此則左右侵君事故也其事旣入不得至於君出而道止謂之壅而止此則左右其事旣出中道故也壅君事滅絶侵擁之君者非杜其門而守其戸也爲政之有所不行也非由杜門守戸也政之不行自致侵擁故曰令重於寳社稷先於親戚法重於民威權貴於爵禄故不爲重寶輕號令不爲親戚後社稷不爲愛民枉法律不爲爵禄分威權故曰勢非所以予人也當與人故君専之凡此上事其勢不政者正也正也者所以正定萬物之命也之命萬物而定由正是故聖人精德立中以生正其正自生也徳精而不過明正以治國故正者所以止過而逮不及也止之不及者令逮之正者中立故過者令過與不及也皆非正也中立正在於非正則傷國一也傷國一也過猶不及故勇而不義傷兵故傷兵也不及於勇仁而不法傷正故傷正不及於仁故軍之敗也生於不義冝故軍敗不義則失法之侵也生於不正故法侵也不正則入邪故言有辯而非務者則非要務也言辯而浮誕行有難而非善者故非正善也行難而詭恠故言必中務不茍爲辯行必思善不苟爲難規矩者方圜之正也雖有巧目利手不如拙規矩之正方圜也故巧者能生規矩不能廢規矩而正方圜雖聖人能生法不能廢法而治國故雖有明智髙行倍法而治是廢規矩而正方圜也一曰故曰一曰管氏稱古言凡人君之德行威嚴非獨能盡賢於人也亦須納賢而自輔故曰能自得師者王人君之德行雖當威嚴旣不能事事盡賢曰人君也故從而貴之不敢論其德行之髙卑其是非即從而貴之豈敢更論其髙人曰此人君也謂其道備徳成不察乎卑有故爲其殺生急於司命也則軒冕塞路故急於司命也乘人君之勢怒則伏尸流血喜富人貧人使人相畜也可使以富畜貧亦可人君富人亦可貧人亦貴人賤人使人相臣也亦可貴人以貴臣賤亦可賤人亦可使人人主操此六者以畜其臣富貴貧賤六者謂生殺人臣亦望此六者以事其君此六者以臨下人臣事君亦望操君臣之㑹六者謂之謀合皆欲謀操君臣所以相者六六者在臣期年臣不忠君不能奪在子期年子不孝父不能奪故春秋之記臣有弑其君子有弑其父者得此六者而君父不智也是君父之不智也令臣子得此六者六者在臣則主蔽矣主蔽者失其令也故曰令入而不出謂之蔽令出而不入謂之壅令出而不行謂之牽左右牽於令入而不至謂之瑕故曰瑕君臣相間牽瑕蔽壅之事君者非敢杜其門而守其戸也爲令之有所不行也此其所以然者由賢人不至而忠臣不用也故人主不可以不愼其令令者人主之大寶也一曰賢人不至謂之蔽忠臣不用謂之塞令而不行謂之障禁而不止謂之逆蔽塞障逆之君者不敢杜其門而守其戸也爲賢者之不至令之不行也凡民從上也不從口之所言從情之所好者也上好勇則民輕死上好仁則民輕財故上之所好民必甚焉是故明君知民之必以上爲心也故置法以自治立儀以自正也故上不行則民不從彼民不服法死制則國必亂矣是以有道之君行法脩制先民服也行法以率人服行也先自凡論人有要各有綱要論人才行矜物之人無大士焉謙以接物大士不矜彼矜者滿也滿者虛也損者也所謂滿招滿虚在物在物爲制也制之在物旣滿而虚則矜者細之屬也人之類自矜者小凡論人而逺古者無髙士焉考古道也髙士必順旣不知古而易其功者無智士焉士智謹功也必知古而徳行成於身而逺古卑人也事無資遇時而簡其業者愚士也遇有道之時其業必見簡弃如此者可謂愚士徳行雖日成而乃逺古卑人則是事無資禀若釣名之人無賢士焉實而成名賢士必脩釣利之君無王主焉義而取利王主必度賢人之行其身也忘其有名也王主之行其道也忘其成功也賢人之行王主之道其所不能已也而後動不能己明君公國一民以聽於丗之君賢明一其民人之心必公誠於國以忠臣直進以論其能道而求進忠臣必直明君不以禄爵私所愛是與唯賢忠臣不誣能以干爵禄必禄也量能而君不私國臣不誣能行此道者雖未大治正民之經也成正民之經治雖未大足今以誣能之臣事私國之君而能濟功名者古今無之誣能之人易知也之人誣能可知起下文也功名所以不濟易臣度之先王者自稱也臣管氏舜之有天下也禹爲司空契爲司徒臯陶爲李作此李官古治獄之官后稷爲田此四士者天下之賢人也猶尚精一德一事也謂各精以事其君今誣能之人服事任官皆兼四賢之能自此觀之功名之不立亦易知也文也結上故列尊禄重無以不受也與其位也德不足以勢利官大無以不從也利官大直以勢必從之故每舉以此事君此所謂誣能簒利之臣者也丗無公國之君則無直進之士無論能之主則無成功之臣昔者三代之相授也安得二天下而殺之今之天下即古之天下豈有二天下而行三代無能授於有能桀紂失之湯武得之殺哉其刑貧民傷財莫大於兵危國憂主莫速於兵此四患者明矣古今莫之能廢也兵當廢而不廢則古今惑也當廢也五材兵有四患則之理難明故惑也並用則不當廢廢興此二者不廢而欲廢之則亦惑也不廢旣不廢二者謂廢興則亦惑也矣乆欲廢之此二者傷國一也則費財憂主亦傷國也故曰一也廢之則冦來無以禦則傷國也不廢黃帝唐虞帝之隆也資有天下制在一人王臣故曰制在一人資用也率土之賔莫非當此之時也兵不廢今徳不及三帝天下不順皆服不須用兵三帝之時天下而求廢兵不亦難乎故明君知所擅知所患國治而民務積此所謂擅也於國而治民務積聚也擅専也君之所専爲在動與靜此所患也則患生也動靜失冝是故明君審其所擅以備其所患也猛毅之君不免於外難懦弱之君不免於内亂猛毅之君者輕誅輕誅之流道正者不安誅輕正之士不安則乖正故道道正者不安則材能之臣去亡矣彼智者知吾情僞爲敵謀我則外難自是至矣知我情必爲敵謀我所以外難至也智者則道正之士從此亡之敵國旣故曰猛毅之君不免於外難懦弱之君者重誅誅罰難爲重誅之過行邪者不革行邪者乆而不革則羣臣比周羣臣比周則蔽美揚惡揚君惡蔽君美蔽美揚惡則内亂自是起矣故曰懦弱之君不免於内亂明君不爲親戚危其社稷社稷戚於親不爲君欲變其令令尊於君不爲重寳分其威威貴於寳不爲愛民虧其法法愛於民兵法第十七外言八明一者皇察道者帝通德者王以生者也德者物由以成者也夫皇一者氣質未分至一者也道者物由者也其實則一也帝王道隨丗立名謀得兵勝者霸兵必勝故霸所謀必得用故夫兵雖非備道至徳也然而所以輔王成霸則未備於德則未至然用之上可以輔兵者不祥之器不得已而用之故於道以成霸王下可今代之用兵者不然不知兵權者也知兵權則失輕重之節權者所以知輕重旣不故舉兵之日而境内貧日費千金行師十萬戰不必勝勝則多死死者已多雖今得勝得地而國敗且死所以國敗雖復得地旣貧此四者用兵之禍者也勝多死國敗也四者謂内貧不四禍其國而無不危矣則何爲而不危矣一舉兵而國四禍大度之書曰度之書謂大陳法舉兵之日而境内不貧戰而必勝勝而不死得地而國不敗爲此四者若何勝不死不敗也四者謂不貧得舉兵之日而境内不貧者計數得也戰而必勝者法度審也勝而不死者敎器備利而敵不敢校也得地而國不敗者因其民因其民則號制有發也因彼而發號令制度敎器備利則有制也能備利有制則法度審則有守也法度審有所守則計數得則有明也計數得有明則治衆有數有數存焉自治其軍勝敵有理有理存焉勝於敵國察數而知理審器而識勝敵可勝也器備利則明理而勝敵於明理也勝敵者在定宗廟宗廟定冦寜則遂男女男女遂人安則官四分分官以守之旣定且寜則四則可以定威德制法儀出號令然後可以一衆治民兵無主則不蚤知敵人懐茍且兵無主則知敵故不能野無吏則無蓄積本業故無蓄積野無田吏則人惰官無常則下怨上常則官無故下怨上徵賦不節器械不巧則朝無定見凌故朝無定器械不巧則冦敵賞罰不明則民輕其産聊生故輕其産賞罰不明則人無故曰早知敵則獨行有蓄積則乆而不匱器械巧則伐而不費賞罰明則勇士勸也三官不繆五敎不亂九章著明則危危而無害窮窮而無難重有其事危危窮窮皆故能致逺以數縱彊以制有制則強可縱有數則逺可致三官一曰鼓鼓所以任也令之俶裝也任猶載也謂所以起也所以進也二曰金金所以坐也所以退也所以免也三曰旗旗所以立兵也所以利兵也所以偃兵也此之謂三官有三令而兵法治也五敎一曰敎其目以形色之旗色五尚青夏尚赤之類之旗各有所當若春二曰敎其身以號令之數之數謂坐起三曰敎其足以進退之度四曰敎其手以長短之利逺用長近用短也長兵短兵各有所利五曰敎其心以賞罰之誠士乃自厲貪賞畏罰五敎各習而士負以勇矣也恃負恃而勇也其便習九章一曰舉日章則畫行二曰舉月章則夜行三曰舉龍章則行水四曰舉虎章則行林五曰舉鳥章則行陂六曰舉蛇章則行澤七曰舉鵲章則行陸八曰舉狼章則行山九曰舉􆄆章則載食而駕則載其所食而駕行矣􆄆韜也謂韜其章而舉之九章旣定而動靜不過三官五敎九章始乎無端卒乎無窮不意彼不能測知也無端無窮者出敵始乎無端者道也卒乎無窮者德也道不可量德不可數也故不可量則衆彊不能圖不可數則僞詐不敢嚮兩者備施則動靜有功徑乎不知指故敵不知徑謂卒然直發乎不意徑乎不知故莫之能禦也發乎不意故莫之能應也故全勝而無害因便而敎准利而行敎無常故無常也敎旣因便行無常亦無常也行旣凖利故兩乃備施動乃有功敎與行兩者謂器成敎施追亡逐遁若飄風擊剌若雷電絶地不守固可恃故不守謂孤絶之地無險恃固不拔多費而無功也拔恃固之守必中處而無敵令行而不留避而不能敵有令必行而不留也用兵之道常能處可否之中則彼逺器成敎施散之無方聚之不可計敎器備利進退若雷電而無所疑匱也匱竭一氣專定則傍通而不疑且定故不疑精一其氣専而厲士利械則涉難而不匱利故不匱士旣厲械又進無所疑退無所匱敵乃爲用服從而爲己用旣無疑匱敵乃凌山阮不待鈎梯故也習山歷水谷不須舟檝謂凌歷而度習水故也歷徑於絶地攻於恃固獨出獨入而莫之能止隟故見其寳不獨入而莫之能止選精勇與俱浮厥寳玉必獨入也故曰不寳不獨見俱見之與精勇故莫之能斂旱之災故取之不嫌也寳玉所以禮神使無水無名之至盡至能盡獲而不匱也其取寳玉也潜伏不名盡而不意故不能疑神玉皆非旣盡寳疑度謂之爲神彼所意故不能畜之以道則民和養之以德則民合和合故能諧諧故能輯諧輯以悉莫之能傷輯故敵不能傷也我之軍士悉以諧定一至行二要縱三權施四敎發五機設六行論七數守八應審九器章十號言其數無得而知也自一至已下管氏不故能全勝大勝大勝謂遍服諸國全勝謂全我而勝彼無守也故能守勝故能常守其勝也無守謂不守一數數戰則士罷數勝則君驕夫以驕君使罷民則國安得無危故至善不戰以徳服之其次一之不驕雖勝破大勝彊一之至也能破大勝彊也不以勝爲勝故亂之不以變變計也亂敵不設乘之不以詭敵乘詭故不以勝之不以詐以詐謀勝敵不一之實也一之實也凡此皆至近則用實逺則施號號謂十力不可量彊不可度氣不可極德不可測一之原也本原其一彼不能知也凡此皆我守衆若時雨寡若飄風一之終也雨之漸用寡貴機速用衆貴詳審故若時一爲本故能終致此道故若飄風之卒至此亦以利適器之至也其器得冝之至兵刃利而適者用敵敎之盡也者則敎練之盡士卒用命而適不能致器者不能利適不能盡敎者不能用敵則不服豈能用之哉器旣不利敎又不盡敵不能用敵者窮則反侵故窮也旣不能用敵敵不能致器者困以應敵故困也旣不能致器則無逺用兵則可以必勝絶其反顧之兵逺用所以必勝心故出入異塗則傷其敵迷而失道故爲敵所傷也出入異塗或有所傷也有深入危之則士自脩之死地故士自脩以求生也深入敵國其處又危所謂置士自脩則同心同力善者之爲兵也使敵若據虚畏懼居常若搏景所獲繫無無設無形焉無不可以成也向皆無故不可以成功也無䇿可以設無形可以㝷所無形無爲焉無不可以化也可以無形無故不可以變化也覩無計可以爲所在皆此之謂道矣詰者道之謂無形迹可㝷若亡而存若後而先威不足以命之存若後者而乃先今以威武命之去之逺矣魯用兵者體道以爲變化者也故若亡者而乃管子卷第六
