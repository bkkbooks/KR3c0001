body:
  text: 八觀第十三法禁第十四重令第十五八觀第十三外言四大城不可以不完郭周不可以外通里域不可以橫通謂從横通通也旁而閭閈不可以毋闔也闔扉宫垣關閉不可以不脩故大城不完則亂賊之人謀郭周外通則姦遁踰越者作里域橫通則攘奪竊盜者不止閭閈無闔外内交通則男女無别宫垣不備關閉不固雖有良貨不能守也故形勢不得爲非則姦邪之人慤愿邪之人無從生心而變爲慤愿禁禦周固形勢不得爲非則姦禁罰威嚴則簡慢之人整齊憲令著明則蠻夷之人不敢犯賞慶信必則有功者勸敎訓習俗者衆則君民化變而不自知也善猶入芝蘭之室不知習俗而善不知善之爲芳也芳之爲是故明君在上位刑省罰寡非可刑而不刑非可罪而不罪也明君者閉其門塞其塗弇其迹使民母由接於淫非之地匿如此則自然端直欲接淫非之地其路無由也旣閉出非之門又塞生過之塗成罪之迹莫不掩是以民之道正行善也若性然故罪罰寡而民以治矣行其田野視其耕芸計其農事而飢飽之國可以知也其耕之不深芸之不謹地冝不任草田多穢耕者不必肥荒者不必墝以人猥計其野少計其野之廣狹也猥衆也以人衆之多草田多而辟田少者雖不水旱飢國之野也若是而民寡則不足以守其地若是而民衆則國貧民飢以此過水旱則衆散而不收彼民不足以守者其城不固民飢者不可以使戰衆散而不收則國爲丘墟故曰有地君國而不務耕芸寄生之君也故曰行其田野視其耕芸計其農事而飢飽之國可知也行其山澤觀其桑麻計其六畜之産而貧富之國可知也夫山澤廣大則草木易多也壤地肥饒則桑麻易殖也薦反子見草多衍則六畜易繁也曰麋鹿食薦薦茂草也莊周山澤雖廣草木毋禁壤地雖肥桑麻毋數薦草雖多六畜有征賦征閉貨之門也出若閉無貨可然門故曰時貨不遂金玉雖多帛畜産也時貨謂穀謂之貧國也故曰行其山澤觀其桑麻計其六畜之産而貧富之國可知也入國邑視宫室觀車馬衣服而侈儉之國可知也夫國城大而田野淺狹者其野不足以養其民城域大而人民寡者其民不足以守其城宫營大而室屋寡者其室不足以實其宫室屋衆而人徒寡者其人不足以處其室囷倉寡而臺榭繁者其藏不足以共其費以供臺榭之費囷倉所藏不足故曰主上無積而宫室美氓家無積而衣服脩民家也氓家謂乘車者飾觀望步行者雜文采本資少而末用多者榖帛本資謂侈國之俗也國侈則用費用費則民貧民貧則姦智生姦智生則邪巧作故姦邪之所生生於匱不足匱不足之所生生於侈侈之所生生於毋度故曰審度量節衣服儉財用禁侈泰爲國之急也不通於若計者度量以下若計謂密不可使用國故曰入國邑視宫室觀車馬衣服而侈儉之國可知也課凶饑計師役觀臺榭量國費而實虚之國可知也凡田野萬家之衆可食之地方五十里可以爲足矣萬家以下則就山澤可矣以就山澤逐便利萬家以下其人少可萬家以上則去山澤可矣人多則去山萬家以上其山澤有禁也澤就原陸而彼野悉辟而民無積者國地小而食地淺也田半墾而民有餘食而粟米多者國地大而食地博也國地大而野不辟者君好貨而臣好利者也農功故其野不辟君臣好貨利則妨辟地廣而民不足者上賦重流其藏者也藏流散也上賦重則人故曰粟行於三百里重賦之或逺人來籴也則粟賤故人逺行而則國毋一年之積粟行於四百里則國毋二年之積粟行於五百里則衆有飢色其稼亡三之一者命曰小凶凶災故也故謂小凶也三分常稼而亡其一時有小凶三年而大凶故曰大凶也比三年不熟大凶則衆有大遺苞矣濟但苞裹升斗以相遺也時旣大凶無復畜積雖相振什一之師什三毋事則稼亡三之一十三而税無事於舊稼亡三之一也師法也十一而稅周禮之通法今乃稼亡三之一而非有故蓋積也則道有損瘠矣道行之人有毁損羸瘠者也旣已亡三之一又無故積則什一之師三年不解非有餘食也則民有鬻子矣而不餘則以遇嵗凶故也所以人有旣師十一三年而不解此當有餘食者鬻子故曰山林雖近草木雖美宫室必有度禁發必有時是何也曰大木不可獨伐也大木不可獨舉也大木不可獨運也大木不可加之薄墻之上宫室須有度禁發須有時也凡此必資衆力則妨農事故故曰山林雖廣草木雖美禁發必有時國雖充盈金玉雖多宫室必有度江海雖廣池澤雖博魚鼈雖多罔罟必有正大之正多少小舩網不可一財而成也然後成必多財非私草木愛魚鼈也惡廢民於生榖也故曰先王之禁山澤之作者博民於生榖也彼民非榖不食榖非地不生地非民不動生穀物動謂發民非作力毋以致財天下之所生生於用力生各由用力也天下所以存其用力之所生生於勞身是故主上用財毋巳是民用力毋休也已則用力不休也財從力生故用財不故曰臺榭相望者其上下相怨也下怨上多稅上怨下不供民毋餘積者其禁不必止飢民故禁不止也貧則爲盜賊衆有遺苞者其戰不必勝屈故戰不勝戰士飢則力道有損瘠者其守不必固至故守不固也損瘠則死期將故令不必行禁不必止戰不必勝守不必固則危亡隨其後矣故曰課凶飢計師役觀臺榭量國費實虚之國可知也入州里觀習俗聽民之所以化其上矣故人莫不化上君斯作矣人胥効而治亂之國可知也州里不鬲鬲也無限閭閈不設出入毋時早晏不禁則攘奪竊盜攻擊殘賊之民毋自勝矣則盗賊無從而勝自從也旣不設備食谷水巷鑿井汲者生其婬放谷水巷井則出場圃接易得交通鄰家子女樹木茂易爲婬非者宫墻毁壊門戸不閉外内交通則男女之别毋自正矣郷毋長游宗也什長游里毋士舎置舎使尉居焉士謂里尉每里當時無㑹同同所以結恩好也郷里每時當有㑹喪蒸不聚祭名蒸冬禁罰不嚴則齒長輯睦毋自生矣當以齒也郷里長弟故昬禮不謹則民不脩廉論賢不郷舉則士不及行貨財行於國則法令毁於官請謁得於上則黨與成於下郷官毋法制百姓羣徒不從此亡國弑君之所自生也故曰入州里觀習俗聽民之所以化其上者而治亂之國可知也入朝廷觀左右本求朝之臣朝之得失謂原本㝷求論上下之所貴賤者而彊弱之國可知也功多爲上禄賞爲下則積勞之臣不務盡力衆二及行禄賞翻在衆下故不務盡力也戰功曰多謂積勞之臣論其功多則居於治行爲上爵列爲下則豪桀材臣不務竭能便辟左右不論功能而有爵禄則百姓疾怨非上賤爵輕禄非但疾怨又非上輕賤爵祿也左右不論能而有爵禄則百姓金玉貨財商賈之人不論而在爵禄在爵禄之位也不論志行使之則上令輕法制毁權重之人不論才能而得尊位則民倍本行而求外勢彼積勞之人不務盡力則兵士不戰矣豪桀材人不務竭能則内治不别矣百姓疾怨非上賤爵輕禄則上毋以勸衆矣上令輕法制毁則君毋以使臣臣毋以事君矣民倍本行而求外勢則國之情僞竭在敵國矣僞盡在於敵矣竭盡也人旣倍本求外則國之情故曰入朝廷觀左右本朝之臣論上下之所貴賤者而彊弱之國可知也置法出令臨衆用民計其威嚴寛惠行於其民與不行於其民可知也法虚立而害䟽逺不行親近故曰虚立也謂其立法但能害䟽逺而令一布而不聽者存是令不行不聽者存賤爵禄而毋功者富有功者貧也無功者富則然則衆必輕令而上位危之心故上位危輕令則有無君故曰良田不在戰士三年而兵弱則士無戰志故兵弱也良田所以賞戰士不賞賞罰不信五年而破上賣官爵十年而亡倍人倫而禽獸行十年而滅戰不勝弱也地四削入諸侯𬒳也離本國徙都邑亡也有者異姓滅也人則宗廟滅也有其國者異姓之故曰置法出令臨衆用民計威嚴寛惠而行於其民不行於其民可知也計敵與量上意察國本觀民産之所有餘不足而存亡之國可知也敵國彊而與國弱諫臣死而諛臣尊私情行而公法毁然則與國不恃其親恃己以爲親也謂黨與之國不而敵國不畏其彊國不畏寇敵之彊也己以爲豪傑不安其位而積勞之人不懷其禄恱商販而不務本貨則民偷處而不事積聚豪傑不安其位則良臣出積勞之人不懷其禄則兵士不用民偷處而不事積聚則囷倉空私廢上之制而道其所聞其所聞兾遂其私欲旣廢上之制故競道故下與官列法而上與君分威國家之危必自此始矣權臣列亦分也下謂庶人上謂昔者聖王之治其民也不然廢上之法制者必負以恥必被之以恥辱也負猶被也廢法制者財厚博惠以私親於民者正經而自正矣經以示之其人自正矣臣厚財而作福則正禮亂國之道易國之常賜賞恣於己者聖王之禁也臣爲君事故須禁之也賜賞者人君所獨用也聖王旣殁受之者衰不徳嗣君君人而不能知立君之道以爲國本則大臣之贅下而射人心者必多矣之事也今臣爲之故曰贅越職行恩曰贅福下者君人心必使歸己也臣之作福所邀射君不能審立其法以爲下制則百姓之立私理而徑於利者必衆矣以趣疾也徑謂邪行昔者聖王之治人也不貴其人博學也欲其人之和同以聽今也姦人之雄也博學而不聽今泰誓曰紂有臣億萬人亦有億萬之心武王有臣三千而一心故紂以億萬之心亡武王以一心存故有國之君苟不能同人心一國威齊士義通上之治以爲下法則雖有廣地衆民猶不能以爲安也君失其道則大臣比權重權與相比重者以相舉於國小臣必循利以相就也故舉國之士以爲亡黨之黨也爲叛亡行公道以爲私惠樹私也費公以進則相推於君退則相譽於民各便其身而忘社稷以廣其居博也容受聚徒威羣威衆蓄黨以上以蔽君下以索民附已求人此皆弱君亂國之道也故國之危也擅國權以深索於民者聖王之禁也其身毋任於上者聖王之禁也進則受禄於君退則藏禄於室毋事治職但力事屬私者但屬意於私其所勉力事務王官私君事去之君事則去之也王之官私事則營非其人而人私行者聖王之禁也爲私行所以禁之也臣旣非其人故其人但脩行則不以親爲本敬也簡孝治事則不以官爲主譽也邀虛舉毋能進毋功者聖王之禁也交人則以爲已賜之以爲巳之恩賜臣或下交於人恃舉人則以爲己勞以爲己之功勞爲國舉賢恃之仕人則與分其禄者禄與共分也薦人令仕得聖王之禁也交於利通而獲於貧窮業則農桑廢故獲於貧窮臣所與交通者皆貨利末輕取於其民而重致於其君上致於君僞飾成重下取於人輕然不難削上以附下枉法以求於民者君公法求人私恱也削上威用附下成恩枉聖王之禁也用不稱其人家富於其列其禄甚寡而資財甚多者而資財多則以枉法取於人故也列業也臣有用少而家業富禄寡聖王之禁也拂丗以爲行非上以爲名常反上之法制以成羣於國者朋黨亦所謂姦人之雄也拂丗非上反違法制以結連聖王之禁也飾於貧窮而發於勤勞權於貧賤於勤勞可以致勢而權於貧窮也内富而外飾於貧窮内逸而外發身無職事家無常姓列上下之閒議言爲民者聖王之禁也常生自列於上下之間其有姓生也身旣無職事家又無純粹之道故聖王禁之也言議每輒爲人以求名譽非壹士以爲亡資脩田以爲亡本飱濟士每以壺脩營田業以爲亡去之本也以爲亡去之資若趙孟之爲又則生之養私不死其生雖亡而不死也旣有所備預則私養然後失矯以深與上爲市者示以去就之形而要之故曰與上爲市自恃其備然後君失必矯其有不從則聖王之禁也審飾小節以示民譽也釣虗時言大事以動上不測也示君以逺交以踰羣假爵以臨朝者假髙爵威臨本朝也逺交四鄰以越羣黨虗聖王之禁也卑身雜處儔類不簡隱行辟倚行以避所依也倚依也自隱其側入迎逺挺出而迎逺側身而入國遁上而遁民者隱行避倚所以遁民卑身雜處所以遁上聖王之禁也詭俗異禮大言法行爲大使人遵行也言譽以爲法難其所爲而髙自錯者也錯置聖王之禁也守委閒居博分以致衆博分其財以致衆守其委積以閑居勤身遂行說人以貨財以遂其行勤勞其身以恱於人施其貨財濟人以買譽以買其聲譽濟施人貨財所其身甚靜而使人求者而靜人求之多財故聖王之禁也行辟而堅言詭而辯術非而博順惡而澤者潤飾之令有光澤所順習者惡事善聖王之禁也以朋黨爲友以蔽惡爲仁黨朋蔽用此爲仁有惡相爲㒚以數變爲智以重斂爲忠以遂忿爲勇者聖王之禁也固國之本其身務往於上深附於諸侯者臣無境外之交每國自有其本有異託外深附於諸侯今雖身務歸於上而心聖王之禁也聖王之身治丗之時德行必有所是道義必有所明故士莫敢詭俗異禮以自見於國莫敢布惠緩行脩上下之交以和親於民謂之緩行從容養民故莫敢超等踰官漁利蘇功以取順其君少搆多謂之蘇功蘇生息也飾詐以釣君利謂之漁利因聖王之治民也進則使無由得其所利退則使無由避其所害必使反乎安其位樂其羣務其職榮其名而后止矣止而循常也能如上事則故踰其官而離其羣者必使有害不能其事而失其職者必使有恥是故聖王之敎民也以仁錯之以恥使之脩其能致其所成而止故曰絶而定僻絕邪靜而治安而尊舉錯而不變者聖王之道也重令第十五外言六凡君國之重器莫重於令令重則君尊君尊則國安令輕則君卑君卑則國危故安國在乎尊君尊君在乎行令行令在乎嚴罰罰嚴令行則百吏皆恐罰不嚴令不行則百吏皆喜故明君察於治民之本本莫要於令故曰虧令者死益令者死殺無赦増益令者不行令者死留令者死故留之令當行而不從令者死五者死而無赦惟令是視赦此五死也設令者必不故曰令重而下恐爲上者不明令出雖自上而論可與不可者在下可否必與下論而後定如不明之君雖日出令至於君何令之爲此者臣反制夫倍上令以爲威則行恣於已以爲私百吏奚不喜之有令而喜不亦冝乎倍公則得成私虧且夫令出雖自上而論可與不可者在下是威下繫於民也是威下繫也可否定於下則威下繫於民而求上之毋危不可得也上危也下彊則令出而留者無罪則是敎民不敬也言王也留者不誅是敎不敬如絲其出如綸所謂敬令出而不行者毋罪行之者有罪是皆敎民不聽也之不聽上敎之然也不行無罪行之反誅人令出而論可與不可者在官是威下分也百官則是威下分也官謂百官可否定於益損者毋罪則是敎民邪途也不罪人爲邪途上敎之然也益謂增令者損謂虧令者二者如此則巧佞之人將以成私爲交比周之人將以此阿黨取與貪利之人將以此收貨聚財懦弱之人將以此阿貴事富便辟伐矜之人將以此買譽成名下得縁隙而成姦也凡此皆上開其隙則故令一出示民邪途五衢則五衢塞生之則五衢開五衢謂上之五死也死之而求上之毋危下之毋亂不可得也故也五衢開菽粟不足末生不禁民必有飢餓之色業爲生者也末生謂以末而工以雕文刻鏤相稺也謂之逆有飢色不穉驕也人文相驕故謂之逆息末以殺之反以雕布帛不足衣服毋度民必有凍寒之傷而女以美衣錦繡綦組相稺也謂之逆萬乘藏兵之國卒不能野戰應敵社稷必有危亡之患而士以毋分役相稺也謂之逆反以無分役相驕故謂之逆社稷有危人人皆當效死今爵人不論能禄人不論功則士無爲行制死節不論功故不爲死節也爵不論能故不爲行制禄而羣臣必通外請謁取權道行事便辟以貴富以得貴富謟事便辟爲榮華以相穉也謂之逆爲榮華而相驕故以爲逆不義富貴志士所以耻反以朝有經臣國以經俗民有經産也經常何謂朝之經臣察身能而受官不誣於上謂之誣上無能受官謹於法令以治不阿黨從私撓法阿黨謂之竭能盡力而不尚得苟得不貴犯難離患而不辭死授命致身受禄不過其功求多也不以少服位不侈其能居大也不以小不以毋實虚受者後受禄有功勞而朝之經臣也何謂國之經俗所好惡不違於上欲也從君所貴賤不逆於令制也遵法毋上拂之事也拂違毋下比之説毋侈泰之養適也節而毋踰等之服度也禮而謹於鄉里之行悌也信而而不逆於本朝之事者令也行君國之經俗也何謂民之經産畜長樹蓺畜産也畜長謂務時殖穀力農墾草禁止末事者民之經産也故曰朝不貴經臣則便辟得進毋功虚取姦邪得行毋能上通則大臣不和好事小人臣下不順上令難行則應難不捷不一人心倉廩空虚財用不足則國毋以固守則逃人飢也散三者見一焉則敵國制之矣況兼有乎見一尚制故國不虚重兵不虚勝民不虚用令不虚行凡國之重也必待兵之勝也而國乃重凡兵之勝也必待民之用也而兵乃勝凡民之用也必待令之行也而民乃用凡令之行也必待近者之勝也而令乃行令乃得行先勝服近習故禁不勝於親貴罰不行於便辟法禁不誅於嚴重而害於䟽逺慶賞不施於卑賤而求令之必行不可得也能不通於官受禄賞不當於功號令逆於民心動靜詭於時變有功不必賞有罪不必誅令焉不必行禁焉不必止在上位無以使下而求民之必用不可得也將帥不嚴威民心不專一陳士不死制卒士不輕敵而求兵之必勝不可得也内守不能完外攻不能服野戰不能制敵侵伐不能威四鄰而求國之重不可得也德不加於弱小威不信於強大征伐不能服天下而求霸諸侯不可得也威有與兩立立威者下亦有兵有與分爭諸侯出征伐有自德不能懷逺國令不能一諸侯而求王天下不可得也地大國富人衆兵彊此霸王之本也然而與危亡爲鄰矣天道之數人心之變道數終人心變易故也所以與危亡爲鄰則以天天道之數至則反則反於上終於下者盛則衰月盈則蝕日中則昃人心之變有餘則驕必謙不足者驕則緩怠夫驕者驕諸侯驕諸侯者諸侯失於外諸侯叛天子驕則緩怠者民亂於内始故民亂緩怠必輕於諸侯失於外民亂於内天道也怠驕内此天之道者必失外亂此危亡之時也若夫地雖大而不并兼不攘奪人雖衆不緩怠不傲下國雖富不侈泰不縱欲兵雖彊不輕侮諸侯動衆用兵必爲天下政理此正天下之本而霸王之主也凡先王治國之器三攻而毁之者六明王能勝其攻故不益於三者而自有國正天下即勝能自有其國兼正天下明王雖勝攻於三器亦不加益亂王不能勝其攻故亦不損於三者而自有天下而亡更不滅此三者縱有天下之亂王旣不能勝攻三器自毁滅亡也大而遂三器者何也曰號令也斧鉞也禄賞也六攻者何也曰親也貴也貨也色也巧侫也玩好也三器之用何也曰非號令毋以使下非斧鉞毋以威衆非禄賞毋以勸民六攻之敗何也器者謂何也言六攻能敗三曰雖不聽而可以得存者貴也謂親雖犯禁而可以得免者色也謂貨雖毋功而可以得富者玩好也謂巧侫凡國有不聽而可以得存者則號令不足以使下有犯禁而可以得免者則斧鉞不足以威衆有毋功而可以得富者則禄賞不足以勸民號令不足以使下斧鉞不足以威衆禄賞不足以勸民若此則民毋爲自用故人不自用其力也旣有罪不誅有功不賞民毋爲自用則戰不勝戰不勝而守不固守不固則敵國制之矣然則先王將若之何曰不爲六者變更於號令不爲六者疑錯於斧鉞不爲六者益損於禄賞若此則逺近一心逺近一心則衆寡同力衆寡同力則戰可以必勝而守可以必固非以并兼攘奪也以爲天下政治也此正天下之道也管子卷第五
