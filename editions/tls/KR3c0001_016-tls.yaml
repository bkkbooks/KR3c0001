body:
  text: 管子卷第十六內業四十九區言五凡物之精比則為生下生五穀上為列星流於天地之閒謂之鬼神藏於胸中謂之聖人是故此氣杲乎如登於天杳乎如入於淵淖乎如在於海卒乎如在於己是故此氣也不可止以力而可安以德不可呼以聲而可迎以音敬守勿失是謂成德德成而智出萬物畢得凡心之刑自充自盈自生自成其所以失之必以憂樂喜怒欲利能去憂樂喜怒欲利心乃反濟彼心之情利安以寧勿煩勿亂和乃自成折折乎如在於側忽忽乎如將不得渺渺乎如窮無極此稽不遠日用其德夫道者所以充形也而人不能固其往不復其來不舍謀乎莫聞其音卒乎乃在於心冥冥乎不見其形淫淫乎與我俱生不見其形不聞其聲而序其成謂之道凡道無所善心安愛心靜氣理道乃可止彼道不遠民得以產彼道不離民因以知是故卒乎其如可與索眇眇乎其如窮無所彼道之情惡音與聲脩心靜音道乃可得道也者口之所不能言也目之所不能視也耳之所不能聽也所以脩心而正形也人之所失以死所得以生也事之所失以敗所得以成也凡道無根無莖無葉無榮萬物以生萬物以成命之曰道天主正地主平人主安靜春秋冬夏天之時也山陵川谷地之材也喜怒取予人之謀也是故聖人與時變而不化從物而不移能正能靜然后能定定心在中耳目聰明四枝堅固可以為精舍精也者氣之精者也氣道乃生生乃思思乃知知乃止矣凡心之形過知失生一物能化謂之神一事能變謂之智化不易氣變不易智惟執一之君子能為此乎執一不失能君萬物君子使物不為物使得一之理治心在於中治言出於口治事加於人然則天下治矣一言得而天下服一言定而天下聽此之謂也形不正德不來中不靜心不治正形攝德天仁地義則淫然而自至神明之極照乎知萬物中守不忒不以物亂官不以官亂心是謂中得有神自在身一往一來莫之能思失之必亂得之必治敬除其舍精將自來精想思之寧念治之嚴容畏敬精將至定得之而勿捨耳目不淫心無他圖正心在中萬物得度道滿天下普在民所民不能知也一言之解上察於天下極於地蟠滿九州何謂解之在於心治我心治官乃治我心安官乃安治之者心也安之者心也心以藏心心之中又有心焉彼心之心意以先言意然后形形然后言言然后使使然后治不治必亂亂乃死精存自生其外安榮內藏以為泉原浩然和平以為氣淵淵之不涸四體乃固泉之不竭九竅遂通乃能窮天地被四海中無惑意外無邪菑心全於中形全於外不逢天菑不遇人害謂之聖人人能正靜皮膚裕寬耳目聰明筋信而骨強乃能戴大圜而履大方鑒於大清視於大明敬慎無忒日新其德徧知天下窮於四極敬發其充是謂內得然而不反此生之忒凡道必周必密必寬必舒必堅必固守善勿舍逐淫澤薄既知其極反於道德全心在中不可蔽匿知於形容見於膚色善氣迎人親於弟兄惡氣迎人害於戎兵不言之聲疾於雷鼓心氣之形明於日月察於父母賞不足以勸善刑不足以懲過氣意得而天下服心意定而天下聽摶氣如神萬物備存能摶乎能一乎能無卜筮而知吉凶乎能止乎能已乎能勿求諸人而得之己乎思之思之又重思之思之而不通鬼神將通之非鬼神之力也精氣之極也四體既正血氣既靜一意摶心耳目不淫雖遠若近思索生知慢易生憂暴傲生怨憂鬱生疾疾困乃死思之而不捨內困外薄不蚤為圖生將巽舍食莫若無飽思莫若勿致節適之齊彼將自至凡人之生也天出其精地出其形合此以為人和乃生不和不生察和之道其情不見其徵不醜平正擅匈論治在心此以長壽忿怒之失度乃為之圖節其五欲去其二凶不喜不怒平正擅匈凡人之生也必以平正所以失之必以喜怒憂患是故止怒莫若詩去憂莫若樂節樂莫若禮守禮莫若敬守敬莫若靜內靜外敬能反其性性將大定凡食之道大充傷而形不臧大攝骨枯而血沍充攝之閒此謂和成精之所舍而知之所生飢飽之失度乃為之圖飽則疾動飢則廣思老則長慮飽不疾動氣不通於四末飢不廣思飽而不廢老不長慮困乃遬竭大心而敞寬氣而廣其形安而不移能守一而棄萬苛見利不誘見害不懼寬舒而仁獨樂其身是謂雲氣意行似天凡人之生也必以其歡憂則失紀怒則失端憂悲喜怒道乃無處愛慾靜之遇亂正之勿引勿推福將自歸彼道自來可藉與謀靜則得之躁則失之靈氣在心一來一逝其細無內其大無外所以失之以躁為害心能執靜道將自定得道之人理丞而毛泄匈中無敗節欲之道萬物不害封禪第五十桓公既霸會諸侯於葵丘而欲封禪管仲曰古者封泰山禪梁父者七十二家而夷吾所記者十有二焉昔無懷氏封泰山禪云云虙羲封泰山禪云云神農封泰山禪云云炎帝封泰山禪云云黃帝封泰山禪亭亭顓頊封泰山禪云云帝俈封泰山禪云云堯封泰山禪云云舜封泰山禪云云禹封泰山禪會稽湯封泰山禪云云周成王封泰山禪社首皆受命然後得封禪桓公曰寡人北伐山戎過孤竹西伐大夏涉流沙束馬縣車上卑耳之山南伐至召陵登熊耳山以望江漢兵車之會三而乘車之會六九合諸侯一匡天下諸侯莫違我昔三代受命亦何以異乎於是管仲睹桓公不可窮以辭因設之以事曰古之封禪鄗上之黍北里之禾所以為盛江淮之閒一茅三脊所以為藉也東海致比目之魚西海致比翼之鳥然后物有不召而自至者十有五焉今鳳皇麒麟不來嘉穀不生而蓬蒿藜莠茂鴟梟數至而欲封禪毋乃不可乎於是桓公乃止小問第五十一雜篇二桓公問管子曰治而不亂明而不蔽若何管子對曰明分任職則治而不亂明而不蔽矣公曰請問富國柰何管子對曰力地而動於時則國必富矣公又問曰吾欲行廣仁大義以利天下奚為而可管子對曰誅暴禁非存亡繼絕而赦無罪則仁廣而義大矣公曰吾聞之也夫誅暴禁非而赦無罪者必有戰勝之器攻取之數而后能誅暴禁非而赦無罪請問戰勝之器管子對曰選天下之豪傑致天下之精材來天下之良工則有戰勝之器矣公曰攻取之數何如管子對曰毀其備散其積奪之食則無固城矣公曰然則取士若何管子對曰假而禮之厚而勿欺則天下之士至矣公曰致天下之精材若何管子對曰五而六之九而十之不可為數公曰來工若何管子對曰三倍不遠千里桓公曰吾已知戰勝之器攻取之數矣請問行軍襲邑舉錯而知先後不失地利若何管子對曰用貨察圖公曰野戰必勝若何管子對曰以奇公曰吾欲徧知天下若何管子對曰小以吾不識則天下不足識也公曰守戰遠見有患夫民不必死則不可與出乎守戰之難不必信則不可恃而外知夫恃不死之民而求以守戰恃不信之人而求以外知此兵之三闇也使民必死必信若何管子對曰明三本公曰何謂三本管子對曰三本者一曰固二曰尊三曰質公曰何謂也管子對曰故國父母墳墓之所在固也田宅爵祿尊也妻子質也三者備然后大其威厲其意則民必死而不我欺也桓公問治民於管子管子對曰凡牧民者必知其疾而憂之以德勿懼以罪勿止以力慎此四者足以治民也桓公曰寡人睹其善也何以為寡也管仲對曰夫寡非有國者之患也昔者天子中立地方千里四言者該焉何為其寡也夫牧民不知其疾則民疾不憂以德則民多怨懼之以罪則民多詐止之以力則往者不反來者騺距故聖王之牧民也不在其多也桓公曰善勿已如是又何以行之管仲對曰質信極仁嚴以有禮慎此四者所以行之也桓公曰請聞其說管仲對曰信也者民信之仁也者民懷之嚴也者民畏之禮也者民美之語曰澤命不渝信也非其所欲勿施於人仁也堅中外正嚴也質信以讓禮也桓公曰善哉牧民何先管仲對曰有時先政有時先德飄風暴雨不為人害涸旱不為民患百川道年穀熟糴貸賤禽獸與人聚食民食民不疾疫當此時也民富且驕牧民者厚收善歲以充倉廩禁藪澤此謂先之以事隨之以刑敬之以禮樂以振其淫此謂先之以政飄風暴雨為民害涸旱為民患年穀不熟歲飢糴貸貴民疾疫當此時也民貧且罷牧民者發倉廩山林藪澤以共其財後之以事先之以恕以振其罷此謂先之以德其收之也不奪民財其施之也不失有德富上而足下此聖王之至事也桓公曰善桓公問管仲曰寡人欲霸以二三子之功既得霸矣今吾有欲王其可乎管仲對曰公嘗召易牙而問焉鮑叔至公又問焉鮑叔對曰公當召賓胥無而問焉賓胥無趨而進公又問焉賓胥無對曰古之王者其君豐其臣殺今君之臣豐公遵遁繆然遠立三子遂徐行而進公曰昔者大王賢王季賢文王賢武王賢武王伐殷克之七年而崩周公且輔成王而治天下僅能制於四海之內矣今寡人之子不若寡人寡人不若二三子以此觀之則吾不王必矣桓公曰我欲勝民為之奈何管仲對曰此非人君之言也勝民為易夫勝民之為道非天下之大道也君欲勝民則使有司䟽獄而謁有罪者償數省而嚴誅則若此民勝矣雖然勝民之為道非天下之大道也使民畏公而不見親禍亟及於身雖能不久則人持莫之弒也危哉君之國岋乎桓公觀於廄問廄吏曰廄何事最難廄吏未對管仲對曰夷吾嘗為圉人矣傅馬棧最難先傅曲木曲木又求曲木曲木已傅直木毋所施矣先傅直木直木又求直木直木已傅曲木亦無所施矣桓公謂管仲曰吾欲伐大國之不服者奈何管仲對曰先愛四封之內然后可以惡竟外之不善者先定卿大夫之家然后可以危鄰之敵國是故先王必有置也然后有廢也必有利也然后有害也桓公踐位令釁社塞禱祝鳧已疪獻胙祝曰除君苛疾與若之多虛而少實桓公不說瞋目而視祝鳧已疪祝鳧已疪授酒而祭之曰又與君之若賢桓公怒將誅之而未也以復管仲管仲於是知桓公之可以霸也桓公乘馬虎望見之而伏桓公問管仲曰今者寡人乘馬虎望見寡人而不敢行其故何也管仲對曰意者君乘駁馬而洀桓迎日而馳乎公曰然管仲對曰此駮象也駮食虎豹故虎疑焉楚伐莒莒君使人求救於齊桓公將救之管仲曰君勿救也公曰其故何也管仲對曰臣與其使者言三辱其君顏色不變臣使官無滿其禮三強其使者爭之以死莒君小人也君勿救桓公果不救而莒亡桓公放春三月觀於野桓公曰何物可比於君子之德乎隰朋對曰夫粟內甲以處中有卷城外有兵刃未敢自恃自命曰粟此其可比於君子之德乎管仲曰苗始其少也眴眴乎何其孺子也至其壯也莊莊乎何其士也至其成也由由乎茲免何其君子也天下得之則安不得則危故命之曰禾此其可比於君子之德矣桓公曰善桓公北伐孤竹未至卑耳之谿十里闟然止瞠然視援弓將射引而未敢發也謂左右曰見是前人乎左右對曰不見也公曰事其不濟乎寡人大惑今者寡人見人長尺而人物具焉冠右袪衣走馬前疾事其不濟乎寡人大惑豈有人若此者乎管仲對曰臣聞登山之神有俞兒者長尺而人物具焉霸王之君興而登山神見且走馬前疾道也袪衣示前有水也右袪衣示從右方涉也至卑耳之谿有贊水者曰從左方涉其深及冠從右方涉其深至膝若右涉其大濟桓公立拜管仲於馬前曰仲父之聖至若此寡人之抵罪也久矣管仲對曰夷吾聞之聖人先知無形今已有形而後知之臣非聖也善承教也桓公使管仲求甯戚甯戚應之曰浩浩乎管仲不知至中食而慮之婢子曰公何慮管仲曰非婢子之所知也婢子曰公其毋少少毋賤賤昔者吳干戰未齓不得入軍門國子擿其齒遂入為干國多百里徯秦國之飯牛者也穆公舉而相之遂霸諸侯由是觀之賤豈可賤少豈可少哉管仲曰然公使我求甯戚甯戚應我曰浩浩乎吾不識婢子曰詩有之浩浩者水育育者魚未有室家而安召我居甯子其欲室乎桓公與管仲闔門而謀伐莒未發也而已聞於國其故何也管仲曰管仲曰國必有聖人桓公曰然夫之役者有執席食以視上者必彼是邪於是乃令之復役毋復相代少焉東郭郵至桓公令儐者延而上與之分級而立問焉曰子言伐莒者乎東郭郵曰然臣也桓公曰寡人不言伐莒而子言伐莒其故何也東郭郵對曰臣聞之君子善謀而小人善意臣意之也桓公曰子奚以意之東郭郵曰夫欣然喜樂者鍾鼓之色也夫淵然清靜者縗絰之色也漻然豐滿而手足拇動者兵甲之色也日者臣視二君之在臺上也口開而不闔是言莒也舉手而指勢當莒也且臣觀小國諸侯之不服者唯莒於是臣故曰伐莒桓公曰善哉以微射明此之謂乎子其坐寡人與子同之客或欲見於齊桓公請仕上官授祿千鍾公以告管仲曰君予之客聞之曰臣不仕矣公曰何故對曰臣聞取人以人者其去人也亦用人吾不仕矣
