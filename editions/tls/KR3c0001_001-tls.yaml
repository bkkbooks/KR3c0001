body:
  text: 管子卷第一牧民第一經言一凡有地牧民者務在四時守在倉廩國多財則遠者來地辟舉則民留處倉廩實則知禮節衣食足則知榮辱上服度則六親固四維張則君令行故省刑之要在禁文巧守國之度在飾四維順民之經在明鬼神秪山川敬宗廟恭祖舊不務天時則財不生不務地利則倉廩不盈野蕪曠則民乃荒上無量則民乃妄文巧不禁則民乃淫不障兩原則刑乃繁不明鬼神則陋民不悟不祗山川則威令不聞不敬宗廟則民乃上校不恭祖舊則孝悌不備四維不張國乃滅亡右國頌國有四維一維絕則傾二維絕則危三維絕則覆四維絕則滅傾可正也危可安也覆可起也滅不可復錯也何謂四維一曰禮二曰義三曰廉四曰恥禮不踰節義不自進廉不蔽惡恥不從枉故不踰節則上位安不自進則民無巧詐不蔽惡則行自全不從枉則邪事不生右四維政之所行在順民心政之所廢在逆民心民惡憂勞我佚樂之民惡貧賤我富貴之民惡危墜我存安之民惡滅絕我生育之能佚樂之則民為之憂勞能富貴之則民為之貧賤能存安之則民為之危墜能生育之則民為之滅絕故刑罰不足以畏其意殺戮不足以服其心故刑罰繁而意不恐則令不行矣殺戮眾而心不服則上位危矣故從其四欲則遠者自親行其四惡則近者叛之故知予之為取者政之寶也右四順錯國於不傾之地積於不涸之倉藏於不竭之府下令於流水之原使民於不爭之官明必死之路開必得之門不為不可成不求不可得不處不可久不行不可復錯國於不傾之地者授有德也積於不涸之倉者務五穀也藏於不竭之府者養桑麻育六畜也下令於流水之原者令順民心也使民於不爭之官者使各為其所長也明必死之路者嚴刑罰也開必得之門者信慶賞也不為不可成者量民力也不求不可得者不彊民以其所惡也不處不可久者不偷取一世也不行不可復者不欺其民也故授有德則國安務五穀則食足養桑麻育六畜則民富令順民心則威令行使民各為其所長則用備嚴刑罰則民遠邪信慶賞則民輕難量民力則事無不成不彊民以其所惡則詐偽不生不偷取一世則民無怨心不欺其民則下親其上右十一經以家為鄉鄉不可為也以鄉為國國不可為也以國為天下天下不可為也以家為家以鄉為鄉以國為國以天下為天下毋曰不同生遠者不聽毋曰不同鄉遠者不行毋曰不同國遠者不從如地如天何私何親如月如日唯君之節御民之轡在上之所貴道民之門在上之所先召民之路在上之所好惡故君求之則臣得之君嗜之則臣食之君好之則臣服之君惡之則臣匿之毋蔽汝惡毋異汝度賢者將不汝助言室滿室言堂滿堂是謂聖王城郭溝渠不足以固守兵甲彊力不足以應敵博地多財不足以有眾唯有道者能備患於未形也故禍不萌天下不患無臣患無君以使之天下不患無財患無人以分之故知時者可立以為長無私者可置以為政審於時而察於用而能備官者可奉以為君也緩者後於事𠫤於財者失所親信小人者失士右六親五法形勢第二經言二山者物之髙者也惠者主之髙行也慈者父母之髙行也忠者臣下之髙行也孝者子婦之髙行也故山髙而不崩則祈羊至主惠而不解則民奉養父母慈而不解則子婦順臣下忠而不解則爵禄至子婦孝而不解則美名附故節髙而不解則所欲得矣解則不得故曰山高而不崩則祈羊至矣淵深而不涸則沈王極矣淵者眾物之所生也能深而不涸則沈玉至主者人之所仰而生也能寬裕純厚而不苛忮則民人附父母者子婦之所受教也能慈仁教訓而不失理則子婦孝臣下者主之所用也能盡力事上則當於主子婦者親之所以安也能孝弟順親則當於親故淵涸而無水則沈玉不至主苛而無厚則萬民不附父母暴而無恩則子婦不親臣下隨而不忠則卑辱困窮子婦不安親則禍憂至故淵不涸則所欲者至涸則不至故曰淵深而不涸則沈玉極天不變其常天覆萬物制寒暑行日月次星辰天之常也治之以理終而復始主牧萬民治天下蒞百官主之常也治之以法終而復始和子孫屬親戚父母之常也治之以義終而復始敦敬忠信臣下之常也以事其主終而復始愛親善養思敬奉教子婦之常也以事其親終而復始故天不失其常則寒暑得其時日月星辰得其序主不失其常則群臣得其義百官守其事父母不失其常則子孫和順親戚相驩臣下不失其常則事無過失而官職政治子婦不失其常則長幼理而親疏和故用常者治失常者亂天未嘗變其所以治也故曰天不變其常地不易其則地生養萬物地之則也治安百姓主之則也教護家事父母之則也正諫死節臣下之則也盡力共養子婦之則也地不易其則故萬物生焉主不易其則故百姓安焉父母不易其則故家事辦焉臣下不易其則故主無過失子婦不易其則故親養備具故用則者安不用則者危地未嘗易其所以安也故曰地不易其則春秋冬夏不更其節古今一也春者陽氣始上故萬物生夏者陽氣畢上故萬物長秋者陰氣始下故萬物收冬者陰氣畢下故萬物藏故春夏生長秋冬收藏四時之節也賞賜刑罰主之節也四時未嘗不生殺也主未嘗不賞罰也故曰春秋冬夏不更其節也天覆萬物而制之地載萬物而養之四時生長萬物而收藏之古以至今不更其道故曰古今一也蛟龍得水而神可立也蛟龍水蟲之神者也乘於水則神立失於水則神廢人主天下之有威者也得民則威立失民則威廢蛟龍待得水而後立其神人主待得民而後成其威故曰蛟龍得水而神可立也虎豹得幽而威可載也虎豹獸之猛者也居深林廣澤之中則人畏其威而載之人主天下之有勢者也深居則人畏其勢故虎豹去其幽而近於人則人得之而易其威人主去其門而迫於民則民輕之而傲其勢故曰虎豹託幽而威可載也風雨無鄉而怨怒不及也風漂物者也風之所漂不避貴賤美惡雨濡物者也雨之所墮不避小大強弱風雨至公而無私所行無常鄉人雖遇漂濡而莫之怨也故曰風雨無鄉而怨怒不及也貴有以行令賤有以忘卑人主之所以令則行禁則止者必令於民之所好而禁於民之所惡也民之情莫不欲生而惡死莫不欲利而惡害故上令於生利人則令行禁於殺害人則禁止令之所以行者必民樂其政也而令乃行故曰貴有以行令也人主之所以使下盡力而親上者必為天下致利除害也故德澤加於天下惠施厚於萬物父子得以安群生得以育故萬民驩盡其力而樂為上用入則務本疾作以實倉廩出則盡節死敵以安社稷雖勞苦卑辱而不敢告也此賤人之所以亡其卑也故曰賤有以亡卑也壽夭貧富無徒歸也起居時飲食節寒暑適則身利而壽命益起居不時飲食不節寒暑不適則形體累而壽命損人惰而侈則貧力而儉則富夫物莫虛至必有以也故曰壽夭貧富無徒歸也銜命者君之尊也法立而民樂之令出而民銜之法令之合於民心如符節之相得也則主尊顯故曰銜令者君之尊也受辭者名之運也上無事則民自試明主之治天下也靜其民而不擾佚其民而不勞不擾則民自循不勞則民自試故曰上無事而民自試抱蜀不言而廟堂既脩人主立其度量陳其分職明其法式以莅其民而不以言先之則民循正所謂抱蜀者祠器也故曰抱蜀不言而廟堂既修鴻鵠鏘鏘唯民歌之將將檻鵠貌之美者也貌美故民歌之德義者行之美者也德義美故民樂之民之所歌樂者美行德義也而明主檻鵠有之故曰鴻鵠將將維民歌之濟濟多士殷民化之濟濟者誠莊事斷也多士者多長者也周文王誠莊事斷故國治其群臣明理以佐主故主明主明而國治竟內被其利澤殷民舉首而望文王願為文王臣故曰濟濟多士殷民化之紂之失也紂之為主也勞民力奪民財危民死冤暴之令加於百姓憯毒之使施於天下故大臣不親小民疾怨天下叛之而願為文王臣者紂自取之也故曰紂之失也飛蓬之間不在所賓無儀法程式蜚揺而無所定謂之蜚蓬之問蜚蓬之問明主不聽也無度之言明主不許也故曰蜚蓬之問不在所賔燕雀之集道行不顧道行則君臣親父子安諸生育故明主之務務在行道不顧小物燕爵物之小者也故曰燕爵之集道行不顧犧牷圭璧不足以享鬼神明主之動靜得理義號令順民心誅殺當其罪賞賜當其功故雖不用犧牲珪璧禱於鬼神鬼神助之天地與之舉事而有福亂主之動作失義理號令逆民心誅殺不當其罪賞賜不當其功故雖用犧牲珪璧禱於鬼神鬼神不助天地不與舉事而有禍故曰犧牲珪璧不足以享鬼神主功有素寶幣奚為主之所以為功者富強也故國富兵強則諸侯服其政鄰敵畏其威雖不用寶幣事諸侯諸侯不敢犯也主之所以為罪者貧弱也故國貧兵弱戰則不勝守則不固雖出名器重寶以事鄰敵不免於死亡之患故曰主功有素寶幣奚為羿之道非射也羿古之善射者也調和其弓矢而堅守之其操弓也審其高下有必中之道故能多發而多中明主猶羿也平和其法審其廢置而堅守之有必治之道故能多舉而多當道者羿之所以必中也主之所以必治也射者弓弦發矢也故曰羿之道非射也造父之術非馭也造父善馭馬者也善視其馬節其飲食度量馬力審其足走故能取遠道而馬不罷明主猶造父也善治其民度量其力審其技能故立功而民不困傷故術者造父之所以取遠道也主之所以立功名也馭者操轡也故曰造父之術非馭也奚仲之巧非斲削也奚仲之為車器也方圜曲直皆中規矩鉤繩故機旋相得用之牢利成器堅固明主猶奚仲也言辭動作皆中術數故眾理相當上下相親巧者奚仲之所以為器也主之所以為治也斲削者斤刀也故曰奚仲之巧非斲削也召遠者使無為焉親近者言無事焉唯夜行者獨有也民利之則來害之則去民之從利也如水之走下於四方無擇也故欲來民者先起其利雖不召而民自至設其所惡雖召之而民不來也故曰召遠者使無為焉蒞民如父母則民親愛之道之純厚遇之有實雖不言曰吾親民而民親矣蒞民如仇讎則民疏之道之不厚遇之無實詐偽並起雖言曰吾親民民不親也故曰親近者言無事焉明主之使遠者來而近者親也為之在心所謂夜行者心行也能心行德則天下莫能與之爭矣故曰唯夜行者獨有之乎平原之陘奚有於高為主而賊為父母而暴為臣下而不忠為子婦而不孝四者人之大失也大失在身雖有小善不得為賢所謂平原者下澤也雖有小封不得為髙故曰平原之隰奚有於髙大山之隈奚有於深為主而惠為父母而慈為臣下而忠為子婦而孝四者人之高行也高行在身雖有小過不為不肖所謂大山者山之高者也雖有小隈不以為深故曰大山之隈奚有於深訾讆之人勿與任大毀訾賢者之謂訾推譽不肖之謂讆訾讆之人得用則人主之明蔽而毀譽之言起任之大事則事不成而禍患至故曰訾讆之人勿與任大譕巨者可與遠舉顧憂者可與致道其計也速而憂在近者往而勿召也明主之慮事也為天下計者謂之譕臣譕臣則海内被其澤澤布於天下後世享其功乆逺而利愈多故曰譕臣者可與逺舉聖人擇可言而後言擇可行而後行偷得利而後有害偷得樂而後有憂者聖人不為也故聖人擇言必顧其累擇行必顧其憂故曰顧憂者可與致道小人者枉道而取容適主意而偷說備利而偷得如此者其得之雖速禍患之至亦急故聖人去而不用也故曰其計也速而憂在近者往而勿召也舉長者可遠見也舉一而為天下長利者謂之舉長舉長則被其利者眾而德義之所見遠故曰舉長者可遠見也裁大者眾之所比也天之裁大故能兼覆萬物地之裁大故能兼載萬物人主之裁大故容物多而衆人得比焉故曰裁大者衆之所比也欲人之懷定服而勿厭也貴富尊顯民歸樂之人主莫不欲也故欲民之懷樂己者必服道德而勿厭也而民懷樂之故曰美人之懷定服而勿厭也必得之事不足賴也聖人之求事也先論其理義計其可否故義則求之不義則止可則求之不可則止故其所得事者常為身寶小人之求事也不論其理義不計其可否不義亦求之不可亦求之故其所得事者未嘗為賴也故曰必得之事不足賴也必諾之言不足信也聖人之諾己也先論其理義計其可否義則諾不義則已可則諾不可則已故其諾未嘗不信也小人不義亦諾不可亦諾言而必諾故其諾未必信也故曰必諾之言不足信也小謹者不大立謹於一家則立於一家謹於一鄉則立於一鄉謹於一國則立於一國謹於天下則立於天下是故其所謹者小則其所立亦小其所謹者大則其所立亦大故曰小謹者不大立訾食者不肥體海不辭水故能成其大山不辭土石故能成其高明主不厭人故能成其眾士不厭學故能成其聖飺者多所惡也諫者所以安主也食者所以肥體也主惡諫則不安人飺食不肥故曰飺食者不肥體也有無棄之言者必參於天地也言而語道德忠信孝弟者此言無棄者天公平而無私故美惡莫不覆地公平而無私故小大莫不載無棄之言公平而無私故賢不肖莫不用故無棄之言者參伍於天地之無私也故曰有無棄之言者必參之於天地矣墜岸三仞人之所大難也而猿猱飲焉明主之官物也任其所長不任其所短故事無不成而功無不立亂主不知物之各有所長所短也而責必備夫慮事定物辯明禮義人之所長而蝚蝯之所短也緣高出險蝚蝯之所長而人之所短也以蝚蝯之所長責人故其令廢而責不塞故曰墜岸三仞人之所大難也而蝚蝯飲焉故曰伐矜好專舉事之禍也明主之舉事也任聖人之慮用眾人之力而不自與焉故事成而福生亂主自智也而不因聖人之慮矜奮自功而不因眾人之力專用己而不聽正諫故事敗而禍生故曰伐矜好專舉事之禍也不行其野不違其馬馬者所乘以行野也故雖不行於野其養食馬也未嘗解惰也民者所以守戰也故雖不守戰其治養民也未嘗解惰也故曰不行其野不違其馬能予而無取者天地之配也天生四時地生萬財以養萬物而無取焉明主配天地者也教民以時勸之以耕織以厚民養而不伐其功不私其利故曰能予而無取者天地之配也怠倦者不及解惰簡慢以之事主則不忠以之事父母則不孝以之起事則不成故曰怠倦者不及也無廣者疑神神者在內不及者在門在內者將假在門者將待曙戒勿怠後稺逢殃朝忘其事夕失其功以規矩為方圜則成以尺寸量長短則得以法數治民則安故事不廣於理者其成若神故曰無廣者疑神事主而不盡力則有刑事父母而不盡力則不親受業問學而不加務則不成故朝不勉力務進夕無見功故曰朝忘其事夕失其功邪氣入內正色乃衰中情信誠則名譽美矣修行謹敬則尊顯附矣中無情實則名聲惡矣修行慢易則污辱生矣故曰邪氣襲內正色乃衰也君不君則臣不臣為人君而不明君臣之義以正其臣則臣不知為臣之理以事其主矣故曰君不君則臣不臣父不父則子不子為人父而不明父子之義以教其子而整齊之則子不知為人子之道以事其父矣故曰父不父則子不子上失其位則下踰其節上下不和令乃不行君臣親上下和萬民輯故主有令則民行之上有禁則民不犯君臣不親上下不和萬民不輯故令則不行禁則不止故曰上下不和令乃不行衣冠不正則賓者不肅言辭信動作莊衣冠正則臣下肅言辭慢動作虧衣冠惰則臣下輕之故曰衣冠不正則賓者不肅進退無儀則政令不行儀者萬物之程式也法度者萬民之儀表也禮義者尊卑之儀表也故動有儀則令行無儀則令不行故曰進退無儀則政令不行且懷且威則君道備矣人主者溫良寬厚則民愛之整齊嚴莊則民畏之故民愛之則親畏之則用夫民親而為用主之所急也故曰且懷且威則君道備矣莫樂之則莫哀之莫生之則莫死之人主能安其民則民事其主如事其父母故主有憂則憂之有難則死之主視民如土則民不為用主有憂則不憂有難則不死故曰莫樂之則莫哀之莫生之則莫死之往者不至來者不極民之所以守戰至死而不衰者上之所以加施於民者厚也故上施厚則民之報上亦厚上施薄則民之報上亦薄故薄施而厚責君不能得之於臣父不能得之於子故曰往者不至來者不極道之所言者一也而用之者異道者扶持眾物使得生育而各終其性命者也故或以治鄉或以治國或以治天下故曰道之所言者一也而用之者異有聞道而好為家者一家之人也有聞道而好為鄉者一鄉之人也聞道而以治一鄉親其父子順其兄弟正其習俗使民樂其上安其土為一鄉主幹者鄉之人也故曰有聞道而好為鄉者一鄉之人也有聞道而好為國者一國之人也有聞道而好為天下者天下之人也有聞道而好定萬物者天地之配也道往者其人莫來道來者其人莫往民之從有道也如飢之先食也如寒之先衣也如暑之先陰也故有道則民歸之無道則民去之故曰道往者其人莫來道來者其人莫往道之所設身之化也道者所以變化身而之正理者也故道在身則言自順行自正事君自忠事父自孝遇人自理故曰道之所設身之所化也持滿者與天安危者與人天之道滿而不溢盛而不衰明主法象天道故貴而不驕富而不奢行理而不惰故能長守貴富久有天下而不失也故曰持滿者與天明主救天下之禍安天下之危者也夫救禍安危者必待萬民之為用也而後能為之故曰安危者與人失天之度雖滿必涸地大國富民眾兵強此盛滿之國也雖已盛滿無德厚以安之無度數以治之則國非其國而民無其民也故曰失天之度雖滿必涸上下不和雖安必危臣不親其主百姓不信其吏上下離而不和故雖自安必且危之故曰上下不和雖安必危欲王天下而失天之道天下不可得而王也主有天道以禦其民則民一心而奉其上故能貴富而久王天下失天之道則民離叛而不聽從故主危而不得久王天下故曰欲王天下而失天之道天下不可得而王也得天之道其事若自然失天之道雖立不安其道既得莫知其為之其功既成莫知其澤之藏之無刑天之道也人主務學術數務行正理則化變日進至於大功而愚人不知也亂主淫佚邪枉日為無道至於滅亡而不自知也故曰莫知其為之其功既成莫知其舍之也藏之而無形疑今者察之古不知來者視之往古者三王五伯皆人主之利天之道也故身貴顯而子孫被其澤桀紂幽厲皆人主之害天下者也故身困傷而子孫䝉其禍故曰疑今者察之古不知來者視之往萬事之生也異趣而同歸古今一也神農教耕生穀以致民利禹身決瀆斬高橋下以致民利湯武征伐無道誅殺暴亂以致民利故明王之動作雖異其利民同也故曰萬事之任也異起而同歸古今一也生棟覆屋怨怒不及弱子下瓦慈母操箠棟生橈不勝任則屋覆而人不怨者其理然也弱子慈母之所愛也不以其理下瓦則慈母笞之故其以理動者雖覆屋不為怨不以其理動者下瓦必笞故曰生棟覆屋怨怒不及弱子下瓦慈母操箠天道之極遠者自親人事之起近親造怨行天道出公理則遠者自親廢天道行私為則子母相怨故曰天道之極遠者自親人事之起近親造怨萬物之於人也無私近也無私遠也巧者有餘而拙者不足古者武王地方不過百里戰卒之眾不過萬人然能戰勝攻取立為天子而世謂之聖王者知為之之術也桀紂貴為天子富有海內地方甚大戰卒甚眾而身死國亡為天下僇者不知為之之術也故能為之則小可為大賤可為貴不能為之則雖為天子人猶奪之也故曰巧者有餘而拙者不足也其功順天者天助之其功逆天者天圍之天之所助雖小必大天之所圍雖成必敗古者武王天之所助也故雖地小而民少猶之為天子也桀紂天之所違也故雖地大民眾猶之困辱而死亡也故曰天之所助雖小必大天之所違雖大必削順天者有其功逆天者懷其凶不可復振也烏鳥之狡雖善不親與人交多軸偽無情實偷取一切謂之烏集之交烏集之交初雖相驩後必相咄故曰烏集之交雖善不親不重之結雖固必解道之用也貴其重也聖人之與人約結也上觀其事君也內觀其事親也必有可知之理然後約結約結而不襲於理後必相倍故曰不重之結雖固必解道之用也貴其重也毋與不可明主與聖人謀故其謀得與之舉事故其事成亂主與不肖者謀故其計失與之舉事故其事敗夫計失而事敗此與不可之罪故曰毋與不可毋彊不能明主度量人力之所能為而後使焉故令於人之所能為則令行使於人之所能為則事成亂主不量人力令於人之所不能為故其令廢使於人之所不能為故其事敗夫令出而廢舉事而敗此強不能之罪也故曰毋強不能毋告不知狂惑之人告之以君臣之義父子之理貴賤之分不信聖人之言也而反害傷之故聖人不告也故曰毋告不知與不可彊不能告不知謂之勞而無功與不肖者舉事則事敗使於人之所不能為則令廢告狂惑之人則身害故曰與不可強不能告不知謂之勞而無功見與之友幾於不親見愛之交幾於不結見施之德幾於不報四方所歸心行者也常以言翹明其與人也其愛人也其有德於人也以此為友則不親以此為交則不結以此為有德於人則不報故曰見與之友幾於不親見愛之交幾於不結見施之德幾於不報四方之所歸心行者也獨王之國勞而多禍明主不用其智而任聖人之智不用其力而任眾人之力故以聖人之智思慮者無不知也以眾人之力起事者無不成也能自去而因天下之智力起則身逸而福多亂主獨用其智而不任聖人之智獨用其力而不任眾人之力故其身勞而禍多故曰獨任之國勞而多禍獨國之君卑而不威明主內行其法度外行其理義故鄰國親之與國信之有患則鄰國憂之有難則鄰國救之亂主內失其百姓外不信於鄰國國有患則莫之憂也有難則莫之救也外內皆失孤特而無黨故國弱而主辱故曰獨國之君卑而不威自媒之女醜而不信明主之治天下也必用聖人而後天下治婦人之求夫家也必用媒而後家事成故治天下而不用聖人則天下乖亂而民不親也求夫家而不用媒則醜恥而人不信也故曰自媒之女醜而不信未之見而親焉可以往矣明主者人未之見而有親心焉者有使民親之之道也故其位安而民往之故曰未之見而親焉可以往矣久而不忘焉可以來矣堯舜古之明主也天下推之而不倦譽之而不厭久遠而不忘者有使民不忘之道也故其位安而民來之故曰久而不忘焉可以來矣日月不明天不易也日月昭察萬物者也天多雲氣蔽蓋者眾則日月不明人主猶日月也群臣多姦立私以擁蔽主則主不得昭察其臣下臣下之情不得上通故姦邪日多而人主愈蔽故曰日月不明天不易也山高而不見地不易也山物之高者也地險穢不平易則山不得見人主猶山也左右多黨比周以壅其主則主不得見故曰山高而不見地不易也言而不可復者君不言也人主出言不逆於民心不悖於理義其所言足以安天下者也人唯恐其不復言也出言而離父子之親疏君臣之道害天下之眾此言之不可復者也故明主不言也故曰言而不可復者君不言也行而不可再者君不行也人主身行方正使人有禮遇人有理行發於身而為天下法式者人唯恐其不復行也身行不正使人暴虐遇人不信行發於身而為天下笑者此不可復之行故明主不行也故曰行而不可再者君不行也凡言而不可復行而不可再者有國者之大禁也言之不可復者其言不信也行之不可再者其行賊暴也故言而不信則民不附行而賊暴則天下怨民不附天下怨此滅亡之所從生也故明主禁之故曰凡言之不可復行之不可再者有國者之大禁也權脩第三經言三萬乘之國兵不可以無主土地博大野不可以無吏百姓殷眾官不可以無長操民之命朝不可以無政地博而國貧者野不辟也民眾而兵弱者民無取也故末產不禁則野不辟賞罰不信則民無取野不辟民無取外不可以應敵內不可以固守故曰有萬乘之號而無千乘之用而求權之無輕不可得也地辟而國貧者舟輿飾臺榭廣也賞罰信而兵弱者輕用眾使民勞也舟車飾臺榭廣則賦斂厚矣輕用眾使民勞則民力竭矣賦斂厚則下怨上矣民力竭則令不行矣下怨上令不行而求敵之勿謀己不可得也欲為天下者必重用其國欲為其國者必重用其民欲為其民者必重盡其民力無以畜之則往而不可止也無以牧之則處而不可使也遠人至而不去則有以畜之也民眾而可一則有以牧之也見其可也喜之有徵見其不可也惡之有形賞罰信於其所見雖其所不見其敢為之乎見其可也喜之無徵見其不可也惡之無形賞罰不信於其所見而求其所不見之為之化不可得也厚愛利足以親之明智禮足以教之上身服以先之審度量以閑之鄉置師以說道之然后申之以憲令勸之以慶賞振之以刑罰故百姓皆說為善則暴亂之行無由至矣地之生財有時民之用力有倦而人君之欲無窮以有時與有倦養無窮之君而度量不生於其閒則上下相疾也是以臣有殺其君子有殺其父者矣故取於民有度用之有止國雖小必安取於民無度用之不止國雖大必危地之不辟者非吾地也民之不牧者非吾民也凡牧民者以其所積者食之不可不審也其積多者其食多其積寡者其食寡無積者不食或有積而不食者則民離上有積多而食寡者則民不力有積寡而食多者則民多詐有無積而徒食者則民偷幸故離上不力多詐偷幸舉事不成應敵不用故曰察能授官班祿賜予使民之機也野與市爭民家與府爭貨金與粟爭貴鄉與朝爭治故野不積草農事先也府不積貨藏於民也市不成肆家用足也朝不合眾鄉分治也故野不積草府不積貨市不成肆朝不合眾治之至也人情不二故民情可得而御也審其所好惡則其長短可知也觀其交游則其賢不肖可察也二者不失則民能可得而官也地之守在城城之守在兵兵之守在人人之守在粟故地不辟則城不固有身不治奚待於人有人不治奚待於家有家不治奚待於鄉有鄉不治奚待於國有國不治奚待於天下天下者國之本也國者鄉之本也鄉者家之本也家者人之本也人者身之本也身者治之本也故上不好本事則末產不禁末產不禁則民緩於時事而輕地利輕地利而求田野之辟倉廩之實不可得也商賈在朝則貨財上流婦言人事則賞罰不信男女無別則民無廉恥貨財上流賞罰不信民無廉恥而求百姓之安難兵士之死節不可得也朝庭不肅貴賤不明長幼不分度量不審衣服無等上下凌節而求百姓之尊主政令不可得也上好詐謀閒欺臣下賦斂競得使民偷壹則百姓疾怨而求下之親上不可得也有地不務本事君國不能壹民而求宗廟社禝之無危不可得也上恃龜筮好用巫毉則鬼神驟祟故功之不立名之不章為之患者三有獨王者有貧賤者有日不足者一年之計莫如樹穀十年之計莫如樹木終身之計莫如樹人一樹一穫者穀也一樹十穫者木也一樹百穫者人也我苟種之如神用之舉事如神唯王之門凡牧民者使士無邪行女無淫事士無邪行教也女無淫事訓也教訓成俗而刑罰省數也凡牧民者欲民之正也欲民之正則微邪不可不禁也微邪者大邪之所生也微邪不禁而求大邪之無傷國不可得也凡牧民者欲民之有禮也欲民之有禮則小禮不可不謹也小禮不謹於國而求百姓之行大禮不可得也凡牧民者欲民之有義也欲民之有義則小義不可不行小義不行於國而求百姓之行大義不可得也凡牧民者欲民之有廉也欲民之有廉則小廉不可不脩也小廉不脩於國而求百姓之行大廉不可得也凡牧民者欲民之有恥也欲民之有恥則小恥不可不飾也小恥不飾於國而求百姓之行大恥不可得也凡牧民者欲民之謹小禮行小義脩小廉飾小恥禁微邪此厲民之道也民之謹小禮行小義脩小廉飾小恥禁微邪治之本也凡牧民者欲民之可御也欲民之可御則法不可不重法者將立朝庭者也將立朝庭者則爵服不可不貴也爵服加于不義則民賤其爵服民賤其爵服則人主不尊人主不尊則令不行矣法者將用民力者也將用民力者則祿賞不可不重也祿賞加于無功則民輕其祿賞民輕其祿賞則上無以勸民上無以勸民則令不行矣法者將用民能者也將用民能者則授官不可不審也授官不審則民閒其治民閒其治則理不上通理不上通則下怨其上下怨其上則令不行矣法者將用民之死命者也用民之死命者則刑罰不可不審刑罰不審則有辟就有辟就則殺不辜而赦有罪殺不辜而赦有罪則國不免於賊臣矣故夫爵服賤祿賞輕民間其治賊臣首難此謂敗國之教也立政第四經四言國之所以治亂者三殺戮刑罰不足用也國之所以安危者四城郭險阻不足守也國之所以富貧者五輕稅租薄賦斂不足恃也治國有三本而安國有四固而富國有五事五事五經也君之所審者三一曰德不當其位二曰功不當其祿三曰能不當其官此三本者治亂之原也故國有德義未明於朝者則不可加于尊位功力未見於國者則不可授與重祿臨事不信於民者則不可使任大官故德厚而位卑者謂之過德薄而位尊者謂之失寧過於君子而毋失於小人過於君子其為怨淺失於小人其為禍深是故國有德義未明於朝而處尊位者則良臣不進有功力未見於國而有重祿者則勞臣不勸有臨事不信於民而任大官者則材臣不用三本者審則下不敢求三本者不審則邪臣上通而便辟制威如此則明塞於上而治壅於下正道捐棄而邪事日長三本者審則便辟無威於國道塗無行禽䟽遠無蔽獄孤寡無隱治故曰刑省治寡朝不合眾右三本君之所慎者四一曰大德不至仁不可以授國柄二曰見賢不能讓不可與尊位三曰罰避親貴不可使主兵四曰不好本事不務地利而輕賦斂不可與都邑此四務者安危之本也故曰卿相不得眾國之危也大臣不和同國之危也兵主不足畏國之危也民不懷其產國之危也故大德至仁則操國得眾見賢能讓則大臣和同罰不避親貴則威行於鄰敵好本事務地利重賦斂則民懷其產四固君之所務者五一曰山澤不救於火草木不得成國之貧也二曰溝瀆不遂於隘鄣水不安其藏國之貧也三曰桑麻不殖於野五穀不宜其地國之貧也四曰六畜不育於家瓜瓠葷菜百果不備具國之貧也五曰工事競於刻鏤女事繁於文章國之貧也故曰山澤救於火草木殖成國之富也溝瀆遂於隘障水安其藏國之富也桑麻殖於野五穀宜其地國之富也六畜育於家瓜瓠葷菜百果備具國之富也工事無刻鏤女事無文章國之富也右五事分國以為五鄉鄉為之師分鄉以為五州州為之長分州以為十里里為之尉分里以為十游游為之宗十家為什五家為伍什伍皆有長焉築障塞匿一道路摶出入審閭閈慎筦鍵筦藏于里尉置閭有司以時開閉閭有司觀出入者以復于里尉凡出入不時衣服不中圈屬群徒不順於常者閭有司見之復無時若在長家子弟臣妾屬役賓客則里尉以譙于游宗游宗以譙于什伍什伍以譙于長家譙敬而勿復一再則宥三則不赦凡孝悌忠信賢良儁材若在長家子弟臣妾屬役賓客則什伍以復于游宗游宗以復于里尉里尉以復于州長州長以計于鄉師鄉師以著于士師凡過黨其在家屬及于長家其在長家及于什伍之長其在付伍之長及于游宗其在游宗及于里尉其在里尉及于州長其在州長及于鄉師其在鄉師及于士師三月一復六月一計十二月一著凡上賢不過等使能不兼官罰有罪不獨及賞有功不專與孟春之朝君自聽朝論爵賞校官終五日季冬之夕君自聽朝論罰罪刑殺亦終五日正月之朔百吏在朝君乃出令布憲于國五鄉之師五屬大夫皆受憲于太史大朝之日五鄉之師五屬大夫皆身習憲于君前太史既布憲入籍于太府憲籍分于君前五鄉之師出朝遂于鄉官致鄉屬及于游宗皆受憲憲既布乃反致令焉然后敢就舍憲未布令未致不敢就舍就舍謂之留令死罪不赦五屬大夫皆以行車朝出朝不敢就舍遂行至都之日遂於廟致屬吏皆受憲憲既布乃發使者致令以布憲之日蚤晏之時憲既布使者以發然後敢就舍憲未布使者未發不敢就舍就舍謂之留令罪死不赦憲既布有不行憲者謂之不從令罪死不赦考憲而有不合于太府之籍者曰侈專制不足曰虧令罪死不赦首憲既布然后可以行憲右首憲凡將舉事令必先出曰事將為其賞罰之數必先明之立事者謹守令以行賞罰計事致令復賞罰之所加有不合於令之所謂者雖有功利則謂之專制罪死不赦首事既布然后可以舉事右首事脩火憲敬山澤林藪積草天財之所出以時禁發焉使民足於宮室之用薪蒸之所積虞師之事也決水潦通溝瀆修障防安水藏使時水雖過度無害于五穀歲雖凶旱有所秎穫司空之事也相高下視肥墝觀地宜明詔期前後農夫以時均脩焉使五穀桑麻皆安其處司田之事也行鄉里視宮室觀樹蓺𥳑六畜以時鈞脩焉勸勉百姓使力作毋偷懷樂家室重去鄉里鄉師之事也論百工審時事辯功苦上完利監壹五鄉以時鈞脩焉使刻鏤文采毋敢造於鄉工師之事也右省官度爵而制服量祿而用財飲食有量衣服有制宮室有度六畜人徒有數舟車陳器有禁生則有軒冕服位穀祿田宅之分死則有棺槨絞衾壙壟之度雖有賢身貴體毋其爵不敢服其服雖有富家多資毋其祿不敢用其財天子服文有章而夫人不敢以燕以饗廟將軍大夫以朝官吏以命士止于帶緣散民不敢服雜采百工商賈不得服長鬈貂刑餘戮民不敢服絻不敢畜連乘車右服制寢兵之說勝則險阻不守人君唯毋聽寢兵則群臣賓客莫敢言兵然則內之不知國之治亂外之不知諸侯強弱如是則城郭毀壞莫之築補甲獘兵彫莫之修繕如是則守圉之備毀矣遼遠之地謀邊竟之士修百姓無圉敵之心故曰寢兵之說勝則險阻不守兼愛之說勝則士卒不戰人君唯毋聽兼愛之說則視天下之民如其民視國如吾國如是則無并兼攘奪之心無覆軍敗將之事然則射御勇力之士不厚祿覆軍殺將之臣不貴爵如是則射御勇力之士出在外矣我能毋攻人可也不能令人毋攻我被求地而予之非吾所欲也不予而與戰必不勝也被以教士我以敺眾彼以良將我以無能其敗必覆軍殺將故曰兼愛之說勝則士卒不戰全生之說勝則廉恥不立人君唯無好全生則群臣皆全其生而生又養生養何也曰滋味也聲色也然後為養生然則從欲妄行男女無別反於禽獸然則禮義廉恥不立人君無以自守也故曰全生之說勝則廉恥不立私議自貴之說勝則上令不行人君唯無聽私議自貴則民退靜隱伏窟穴就山非世閒上輕爵祿而賤有司然則令不行禁不止故曰私議自貴之說勝則上令不行群徒比周之說勝則賢不肖不分人君唯毋聽群徒比周則群臣朋黨蔽美揚惡然則國之情偽不見於上如是則朋黨者處前寡黨者處後夫朋黨者處前賢不肖不分則爭奪之亂起而君在危殆之中矣故曰群徒比周之說勝則賢不肖不分金玉貨財之說勝則爵服下流人君唯無好金玉貨財必欲得其所好然則必有以易之所以易之者何也大官尊位不然則尊爵重祿也如是則不肖者在上位矣然則賢者不為下智者不為謀信者不為約勇者不為死如是則敺國而捐之也故曰金玉貨財之說勝則爵服下流觀樂玩好之說勝則姦民在上位人君唯毋聽觀樂玩好則敗凡觀樂者宮室臺池珠玉聲樂也此皆費財盡力傷國之道也而以此事君者皆姦人也而人君聽之焉得毋敗然則府倉虛蓄積竭且姦人在上則壅遏賢者而不進也然則國適有患則優倡侏儒起而議國事矣是敺國而捐之也故曰觀樂玩好之說勝則姦人在上位請謁任舉之說勝則繩墨不正人君唯毋聽請謁任譽則群臣皆相為請然則請謁得於上黨與成於鄉如是則貨財行於國法制毀於官群臣務佼而求用然則無爵而貴無祿而富故曰請謁任譽之說勝則繩墨不正諂諛飾過之說勝則巧佞者用人君唯無聽諂諛飾過之言則敗奚以知其然也夫諂臣者常使其主不悔其過不更其失者也故主惑而不自知也如是則謀臣死而諂臣尊矣故曰諂讒飾過之說勝則巧佞者用右九敗期而致使而往百姓舍己以上為心者教之所期也始於不足見終於不可及一人服之萬人從之訓之所期也未之令而為未之使而往上不加勉而民自盡竭俗之所期也好惡形於心百姓化于下罰未行而民畏恐賞未加而民勸勉誠信之所期也為而無害成而不議得而莫之能爭天道之所期也為之而成求之而得上之所欲小大必舉事之所期也令則行禁則止憲之所及俗之所被如百體之從心政之所期也右七觀乘馬第五經言五凡立國都非於大山之下必於廣川之上高毋近旱而水用足下毋近水而溝防省因天材就地利故城郭不必中規矩道路不必中準繩右立國無為者帝為而無以為者王為而不貴者霸不自以為所貴則君道也貴而不過度則臣道也右大數地者政之本也朝者義之理也市者貨之準也黃金者用之量也諸侯之地千乘之國者器之制也五者其理可知也為之有道地者政之本也是故地可以正政也地不平均和調則政不可正也政不正則事不可理也春秋冬夏陰陽之推移也時之短長陰陽之利用也日夜之易陰陽之化也然則陰陽正矣雖不正有餘不可損不足不可益也天也莫之能損益也然則可以正政者地也故不可不正也正地者其實必正長亦正短亦正小亦正大亦正長短大小大盡正正不正則官不理官不理則事不治事不治則貨不多是故何以知貨之多也曰事治何以知事之治也曰貨多貨多事治則所求於天下者寡矣為之有道右陰陽朝者義之理也是故爵位正而民不怨民不怨則不亂然后義可理不正則不可以理也故一國之人不可以皆貴皆貴則事不成而國不利也為事之不成國之不利也使無貴者則民不能自理也是故辨於爵列之尊卑則知先後之序貴賤之義矣為之有道右爵位市者貨之準也是故百貨賤則百利不得百利不得則百事治百事治則百用節矣是故事者生於慮成於務失於傲不慮則不生不務則不成不傲則不失故曰市者可以知治亂可以知多寡而不能為多寡為之有道右務市事黃金者用之量也辨於黃金之理則知侈儉知侈儉則百用節矣故儉則傷事侈則傷貨儉則金賤金賤則事不成故傷事侈則金貴金貴則貨賤故傷貨貨盡而後知不足是不知量也事已而後知貨之有餘是不知節也不知量不知節不可謂之有道天下乘馬服牛而任之輕重有制有壹宿之行道之遠近有數矣是知諸侯之地千乘之國者所以知地之小大也所以知任之輕重也重而後損之是不知任也輕而後益之是不知器也不知任不知器不可為之有道地之不可食者山之無木者百而當一涸澤百而當一地之無草木者百而當一楚棘雜處民不得入焉百而當一藪鎌纆得入焉九而當一蔓山其木可以為材可以為軸斤斧得入焉九而當一汎山其木可以為棺可以為車斤斧得入焉十而當一流水網罟得入焉五而當一林其木可以為棺可以為車斤斧得入焉五而當一澤網罟得入焉五而當一命之曰地均以實數方六里命之曰暴五暴命之曰部五部命之曰聚聚者有市無市則民乏五聚命之曰某鄉四鄉命之曰方官制也官成而立邑五家而伍十家而連五連而暴五暴而長命之曰某鄉四鄉命之曰都邑制也邑成而制事四聚為一離五離為一制五制為一田二田為一夫三夫為一家事制也事成而制器方六里為一乘之地也一乘者四馬也一馬其甲七其蔽五一乘其甲二十有八其蔽二十白徒三十人奉車兩器制也方六里一乘之地也方一里九夫之田也黃金一鎰百乘一宿之盡也無金則用其絹季絹三十三制當一鎰無絹則用其布絟暴布百兩當一鎰一鎰之金食百乘之一宿則所布之地六步一㪷命之曰中歲有市無市則民乏矣方六里名之曰社有邑焉名之曰央亦關市之賦黃金百鎰為一篋其貨一穀籠為十篋其商苟在市者三十人其正月十二月黃金一鎰命之曰正分春曰書比立夏曰月程秋曰大稽與民數得亡三歲脩封五歲脩界十歲更制經正也一仞見水不大潦五尺見水不大旱一仞見水輕征十分去一二則去二三則去三四則去四五則去半比之於山五尺見水十分去一四則去二三則去三二則去四尺而見水比之於澤距國門以外窮四竟之內丈夫二犂童五尺一犂以為三日之功正月令農始作服于公田農耕及雪釋耕始焉芸卒焉士聞見博學意察而不為君臣者與功而不與分焉賈知賈之貴賤日至於市而不為官賈者與功而不與分焉工治容貌功能日至於市而不為官工者與功而不與分焉不可使而為工則視貸離之實而出夫粟是故智者知之愚者不知不可以教民巧者能之拙者不能不可以教民非一令而民服之也不可以為大善非夫人能之也不可以為大功是故非誠賈不得食于賈非誠工不得食于工非誠農不得食于農非信士不得立于朝是故官虛而莫敢為之請君有珍車珍甲而莫之敢有君舉事臣不敢誣其所不能君知臣臣亦知君知己也故臣莫敢不竭力俱操其誠以來道曰均地分力使民知時也民乃知時日之蚤晏日月之不足飢寒之至于身也是故夜寢蚤起父子兄弟不忘其功為而不倦民不憚勞苦故不均之為惡也地利不可竭民力不可殫不告之以時而民不知不道之以事而民不為與之分貨則民知得正矣審其分則民盡力矣是故不使而父子兄弟不忘其功右士農工商聖人之所以為聖人者善分民也聖人不能分民則猶百姓也於己不足安得名聖是故有事則用無事則歸之於民唯聖人為善託業於民民之生也辟則惠閉則類上為一下為二右聖人時之處事精矣不可藏而舍也故曰今日不為明日亡貨昔之日已往而不來矣右失時上地方八十里萬室之國一千室之都四中地方百里萬室之國一千室之都四下地方百二十里萬室之國一千室之都四以上地方八十里與下地方百二十里通於中地方百里右地里
