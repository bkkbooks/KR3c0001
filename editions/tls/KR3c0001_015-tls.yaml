body:
  text: 管子卷第十五勢第四十二短語戰而懼水此謂膽滅小事不從大事不吉戰而懼險此謂迷中分其師眾人既迷芒必其將亡之道重靜者比於死重作者比於鬼重信者比於距重詘者比於避夫靜與作時以為主人時以為客貴得度知靜之備居而自利知作之從每動有功故曰無為者帝其此之謂矣逆節萌生天地未形先為之政其事乃不成繆受其刑天因人聖人因天天時不作勿為客人事不起勿為始慕和其眾以循天地之從人先生之天地刑之聖人成之則與天同極正靜不爭動作不貣素質不留與地同極未得天極則隱於德已得天極則致其力既成其功順守其從人不能代成功之道嬴縮為寶毋亡天極究數而止事若未成毋改其形毋失其始靜民觀時待令而起故曰循陰陽之從而道天地之常嬴嬴縮縮因而為當死死生生因天地之形天地形之聖人成之小取者小利大取者大利盡行之者有天下故賢者誠信以仁之慈惠以愛之端政象不敢以先人中靜不留裕德無求形於女色其所處者柔安靜樂行德而不爭以待天下之濆作也故賢者安徐正靜柔節先定行於不敢而立於不能守弱節而堅處之故不犯天時不亂民功秉時養人先德後刑順於天微度人善周者明不能見也善明者周不能蔽也大明勝大周則民無大周也大周勝大明則民無大明也大周之先可以奮信大明之祖可以代天下索而不得求之招搖之下獸厭走而有伏網罟一偃一側不然不得大文三曾而貴義與德大武三曾而偃武與力正第四十三短語十七制斷五刑各當其名罪人不怨善人不驚曰刑正之服之勝之飾之必嚴其令而民則之曰政如四時之不貣如星辰之不變如宵如晝如陰如陽如日月之明曰法愛之生之養之成之利民不得天下親之曰德無德無怨無好無惡萬物崇一陰陽同度曰道刑以弊之政以命之法以遏之德以養之道以明之刑以弊之毋失民命令之以絕其欲毋使民徑遏之以絕其志意毋使民幸養之以化其惡必自身始必明之以察其生循其理致刑其民庸心以敬致政其民服信以聽致德其民和平以靜致道其民付而不爭罪人當名曰刑出令當時曰正當故不改曰法愛民無私曰德會民所聚曰道立常行政能服信乎中和慎敬能曰新乎正衡一靜能守慎乎廢私立公能舉人乎臨政官民能後其身乎能服信此謂正紀能曰新此謂行理守慎正名偽詐自止舉人無私臣德咸道能後其身上佐天子九變第四十四短語十八凡民之所以守戰至死而不德其上者有數以至焉曰大者親戚墳墓之所在也田宅富厚足居也不然則州縣鄉黨與宗族足懷樂也不然則上之教訓習俗慈愛之於民也厚無所往而得之不然則山林澤谷之利足生也不然則地形險阻易守而難攻也不然則罰嚴而可畏也不然則賞明而足勸也不然則有深怨於敵人也不然則有厚功於上也此民之所以守戰至死而不德其上者也今恃不信之人而求以智用不守之民而欲以固將不戰之卒而幸以勝此兵之三闇也任法第四十五區言一聖君任法而不任智任數而不任說任公而不任私任大道而不任小物然後身佚而天下治失君則不然舍法而任智故民舍事而好譽舍數而任說故民舍實而好言舍公而好私故民離法而妄行舍大道而任小物故上勞煩百姓迷惑而國家不治聖君則不然守道要處佚樂馳騁弋獵鍾鼓竽瑟宮中之樂無禁圉也不思不慮不憂不圖利身體便形軀養壽命垂拱而天下治是故人主有能用其道者不事心不勞意不動力而土地自辟囷倉自實蓄積自多甲兵自彊群臣無詐偽百官無姦邪奇術技藝之人莫敢高言孟行以過其情以遇其主矣昔者堯之治天下也猶埴之在埏也唯陶之所以為猶金之在鑪恣冶之所以鑄其民引之而來推之而往使之而成禁之而止故堯之治也善明法禁之令而已矣黃帝之治天下也其民不引而來不推而往不使而成不禁而止故黃帝之治也置法而不變使民安其法者也所謂仁義禮樂者皆出於法此先聖之所以一民者也周書曰國法法不一則有國者不祥民不道法則不祥國更立法以典民則不祥群臣不用禮義教訓則不祥百官伏事者離法而治則不祥故曰法者不可恆也存亡治亂之所從出聖君所以為天下大儀也君臣上下貴賤皆發焉故曰法古之法也世無請謁任舉之人無閒識博學辨說之士無偉服無奇行皆囊於法以事其主故明王之所恆者二一曰明法而固守之二曰禁民私而收使之此二者主之所恆也夫法者上之所以一民使下也私者下之所以侵法亂主也故聖君置儀設法而固守之然故堪材習士閒識博學之人不可亂也眾彊富貴私勇者不能侵也信近親愛者不能離也珍怪奇物不能惑也萬物百事非在法之中者不能動也故法者天下之至道也聖君之寶用也今天下則不然皆有善法而不能守也然故堪材習士閒識博學之士能以其智亂法惑上眾彊富貴私勇者能以其威犯法侵陵鄰國諸侯能以其權置子立相大臣能以其私附百姓翦公財以祿私士凡如是而求法之行國之治不可得也聖君則不然卿相不得翦其私群臣不得辟其所親愛聖君亦明其法而固守之群臣修通輻湊以事其主百姓輯睦聽令道法以從其事故曰有生法有守法有法於法夫生法者君也守法者臣也法於法者民也君臣上下貴賤皆從法此謂為大治故主有三術夫愛人不私賞也惡人不私罰也置儀設法以度量斷者上主也愛人而私賞之惡人而私罰之倍大臣離左右專以其心斷者中主也臣有所愛而為私賞之有所惡而為私罰之倍其公法損其正心專聽其大臣者危主也故為人主者不重愛人不重惡人重愛曰失德重惡曰失威威德皆失則主危也故明王之所操者六生之殺之富之貧之貴之賤之此六柄者主之所操也主之所處者四一曰文二曰武三曰威四曰德此四位者主之所處也藉人以其所操命曰奪柄藉人以其所處命曰失位奪柄失位而求令之行不可得也法不平令不全是亦奪柄失位之道也故有為枉法有為毀令此聖君之所以自禁也故貴不能威富不能祿賤不能事近不能親美不能淫也植固而不動奇邪乃恐奇革而邪化令往而民移故聖君設度量置儀法如天地之堅如列星之固如日月之明如四時之信然故令往而民從之而失君則不然法立而還廢之令出而後反之枉法而從私毀令而不全是貴能威之富能祿之賤能事之近能親之美能淫之也此五者不禁於身是以群臣百姓人挾其私而幸其主彼幸而得之則主日侵彼幸而不得則怨日產夫日侵而產怨此失君之所循也凡為主而不得用其法不能適其意顧臣而行離法而聽貴臣此所謂貴而威之也富人用金玉事主而求焉主離法而聽之此所謂富而祿之也賤人以服約卑敬悲色告愬其主主因離法而聽之所謂賤而事之也近者以偪近親愛有求其主主因離法而聽之此所謂近而親之也美者以巧言令色請其主主因離法而聽之此所謂美而淫之也治世則不然不知親䟽遠近貴賤美惡以度量斷之其殺戮人者不怨也其賞賜人不德也以法制行之如天地之無私也是以官無私論士無私議民無私說皆虛其匈以聽其上上以公正論以法制斷故任天下而不重也今亂君則不然有私視也故有不見也有私聽也故有不聞也有私慮也故有不知也夫私者壅蔽失位之道也上舍公法而聽私說故群臣百姓皆設私立方以教於國群黨比周以立其私請謁任舉以亂公法人用其心以幸於上上無度量以禁之是以私說日益而公法日損國之不治從此產矣夫君臣者天地之位也民者眾物之象也各立其所職以待君令群臣百姓安得各用其心而立私乎故遵主令而行之雖有傷敗無罰非主令而行之雖有功利罪死然故下之事上也如響之應聲也臣之事主也如影之從形也故上令而下應主行而臣從此治之道也夫非主令而行有功利因賞之是教妄舉也主令而行之有傷敗而罰之是使民慮利害而離法也群臣百姓人慮利害而以其私心舉措則法制毀而令不行矣明法第四十六區言二所謂治國者主道明也明主者有於術數而不可欺也審於法禁而不可犯也察於分職而不可亂也故群臣不敢行其私貴臣不得蔽其賤近者不得塞其遠孤寡老弱不失其所職境內明辨而不相踰越此之謂治國故明法曰所謂治國者主道明也所謂亂國者臣術勝也明主者上之所以一民使下也私術者下之所以侵上亂主也故法廢而私行則人主孤特而獨立人臣群黨而成朋如此則主弱而臣強此之謂亂國故明法曰所謂亂國者臣術勝也夫尊君卑臣非親也以執勝也明主在上位有必治之勢則群臣不敢為非是故群臣之不敢欺主者非以愛主也以畏主之威勢也百姓之爭用非以愛主也以畏主之法令也故明主操必勝之數以治必用之民處必尊之勢以制必服之臣故令行禁止主尊而臣卑故明法曰尊君卑臣非計親也以勢勝也百官識非惠也刑罰必也明主之治也縣爵祿以勸其民民有利於上故主有以使之立刑罰以威其下下有畏於上故主有以牧之故無爵祿則主無以勸民無刑罰則主無以威眾故人臣之行理奉命者非以愛主也且以就利而避害也百官之奉法無姦者非以愛主也欲以受爵祿而避刑罰也故明法曰百官論職非惠也刑罰必也故君臣共道則亂人主者擅生殺處威勢操令行禁止之柄以御其群臣此主道也人臣者處卑賤奉主令守本任治分職此臣道也故主行臣道則亂臣行主道則危故上下無分君臣共道亂之本也故明法曰君臣共道則亂專授則失人臣之所以畏恐而謹事主者以欲生而惡死也使人不欲生不惡死則不可得而制也夫生殺之柄專在大臣而主不危者未嘗有也故治亂不以法斷而決於重臣生殺之柄不制於主而在群下此寄生之主也故人主專以其威勢予人則必有劫殺之患專以其法制予人則必有亂亡之禍如此者亡主之道也故明法曰專授則失夫國有四亡令本不出謂之滅凡為主而不得行其令廢法而恣群臣威嚴已廢權勢已奪令不得出群臣弗為用百姓弗為使竟內之眾不制則國非其國而民非其民如此者滅主之道也故明法曰令不出謂之滅出而道留謂之擁明主之道卑賤不待尊貴而見大臣不因左右而進百官條通群臣顯見有罰者主見其罪有賞者主知其功見知不悖賞罰不差有不蔽之術故無壅遏之患亂主則不然法令不得至於民疏遠鬲閉而不得聞如此者壅遏之道也故明法曰令出而留謂之壅下情求不上通謂之塞人臣之所以乘而為姦者擅主也臣有擅主者則主令不得行而下情不上通人臣之力能鬲君臣之閒而使美惡之情不揚聞禍福之事不通徹人主迷惑而無從悟如此者塞主之道也故明法曰下情不上通謂之塞下情上而道止謂之侵明主者兼聽獨斷多其門戶群臣之道下得明上賤得言貴故姦人不敢欺亂主則不然聽無術數斷事不以參伍故無能之士上通邪枉之臣專國主明蔽而聰塞忠臣之欲謀諫者不得進如此者侵主之道也故明法曰下情上而道止謂之侵故夫滅侵塞擁之所生從法之不立也人主之治國也莫不有法令賞罰具故其法令明而賞罰之所立者當則主尊顯而姦不生其法令逆而賞罰之所立者不當則群臣立私而壅塞之朋黨而劫殺之故明法曰滅塞侵壅之所生從法之不立也是故先王之治國也不淫意於法之外法度者主之所以制天下而禁姦邪也所以牧領海內而奉宗廟也私意者所以生亂長姦而害公正也所以壅蔽失正而危亡也故法度行則國治私意行則國亂明主雖心之所愛而無功者不賞也雖心之所憎而無罪者弗罰也案法式而驗得失非法度不留意焉故明法曰先王之治國也不淫意於法之外不為惠於法之內也明主之治國也案其當宜行其正理故其當賞者群臣不得辭也其當罰者群臣不敢避也夫賞功誅罪所以為天下致利除害也草茅弗去則害禾穀盜賊弗誅則傷良民夫舍公法而行私惠則是利姦邪而長暴亂也行私惠而賞無功則是使民偷幸而望於上也行私惠而赦有罪則是使民輕上而易為非也夫舍公法用私惠明主不為也故明法曰不為惠於法之內動無非法者所以禁過而外私也凡人主莫不欲其民之用也使民用者必法立而令行也故治國使眾莫如法禁淫止暴莫如刑故貧者非不欲奪富者財也然而不敢者法不使也強者非不能暴弱也然而不敢者畏法誅也故百官之事案之以法則姦不生暴慢之人誅之以刑則禍不起群臣并進筴之以數則私無所立故明法曰動無非法者所以禁過而外私也威不兩錯政不二門人主之所以制臣下者威勢也故威勢在下則主制於臣威勢在上則臣制於主夫蔽主者非塞其門守其戶也然而令不行禁不止所欲不得者失其威勢也故威勢獨在於主則群臣畏敬法政獨出於主則天下服德故威勢分於臣則令不行法政出於臣則民不聽故明主之治天下也威勢獨在於主而不與臣共法政獨制於主而不從臣出故明法曰威不二錯政不二門以法治國則舉錯而已明主者一度量立表儀而堅守之故令下而民從法者天下之程式也萬事之儀表也吏者民之所懸命也故明主之治也當於法者賞之違於法者誅之故以法誅罪則民就死而不怨以法量功則民受賞而無德也此以法舉錯之功也故明法曰以法治國則舉錯而已是故有法度之制者不可巧以詐偽有權衡之稱者不可欺以輕重權衡者所以起輕重之數也然而人不事者非心惡利也權不能為之多少其數而衡不能為之輕重其量也人知事權衡之無益故不事也故明主在上位則官不得枉法吏不得為私民知事吏之無益故財貨不行於吏權衡平正而待物故姦軸之人不得行其私故明法曰有權衡之稱者不可以欺輕重有尋丈之數者不可差以長短尺寸尋丈者所以得長短之情也故以尺寸量短長則萬舉而萬不失矣是故尺寸之度雖富貴眾強不為益長雖貧賤卑辱不為損短公平而無所偏故姦軸之人不能誤也故明法曰有尋丈之數者不可差以長短今主釋法以譽進能則臣離上而下比周矣以黨舉官則民務交而不求用矣國之所以亂者廢事情而任非譽也故明主之聽也言者責之以其實譽人者試之以其官言而無實者誅吏而亂官者誅是故虛言不敢進不肖者不敢受官亂主則不然聽言而不督其實故群臣以虛譽進其黨任官而不責其功故愚污之吏在庭如此則群臣相推以美名相假以功伐務多其佼而不為主用故明法曰主釋法以譽進能則臣離上而下比周矣以黨舉官則民務佼而不求用矣是故官之失其治也是主以譽為賞以毀為罰也亂主不察臣之功勞譽眾者則賞之不審其罪過毀眾者則罰之如此者則邪臣無功而得賞忠臣無罪而有罰故功多而無賞則臣不務盡力行正而有罰則賢聖無從竭能行貨財而得爵祿則污辱之人在官寄託之人不肖而位尊則民倍公法而趨有勢如此則愨愿之人失其職而廉潔之吏失其治故明法曰官之失其治也是主以譽為賞而以毀為罰也然則喜賞惡罰之人離公道而行私術矣平吏之治官也行法而無私則姦臣不得其利焉此姦臣之所務傷也人主不參驗其罪過以無實之言誅之則姦臣不能無事貴重而求推譽以避刑罰而受祿賞焉故明法曰喜賞惡罰之人離公道而行私術矣比周以相為匿是忘主死交以進其譽姦臣之敗其主也積漸積微使主迷惑而不自知也上則相為候望於主下則買譽於民譽其黨而使主尊之毀不譽者而使主廢之其所利害者主聽而行之如此則群臣皆忘主而趨私佼矣故明法曰比周以相為慝是故忘主私佼以進其譽故交眾者譽多外內朋黨雖有大姦其蔽主多矣主無術數則群臣易欺之國無明法則百姓輕為非是故姦邪之人用國亊則羣臣仰利害也如此則姦人為之視聽者多矣雖有大義主無從知之故明法曰佼衆譽多外内朋黨雖有大姦其蔽主多矣是以忠臣死於非罪而邪臣起於非功凡所謂忠臣者務明法術日夜佐主明於度數之理以治天下者也姦邪之臣知法術明之必治也治則姦臣困而法術之士顯是故姦邪之所務事者使法無明主無悟而已得所欲也故方正之臣得用則姦邪之臣困傷矣是方正之與姦邪不兩進之勢也姦邪在主之側者能勿惡也惟惡之不則必候主閒而日夜危之人主不察而用其言則忠臣無罪而困死姦臣無功而富貴故明法曰忠臣死於非罪而邪臣起於非功所死者非罪所起者非功也然則為人臣者重私而輕公矣富貴尊顯久有天下人主莫不欲也令行禁止海內無敵人主莫不欲也蔽欺侵凌人主莫不惡也失天下滅宗廟人主莫不惡也忠臣之欲明法術以致主之所欲而除主之所惡者姦臣之擅主者有以私危之則忠臣無從進其公正之數矣故明法曰所死者非罪所起者非功然則為人臣者重私而輕公矣十至私人之門不一至於庭亂主之行爵祿也不以法令案功勞其行刑罰也不以法令案罪過而聽重臣之所言故臣欲有所賞主為賞之臣欲有所罰主為罰之廢其公法專聽重臣如此故群臣皆務其黨重臣而忘其主趨重臣之門而不庭故明法曰十至於私人之門不一至於庭百慮其家不一圖國明主之治也明於分職而督其成事勝其任者處官不勝其任者廢免故群臣皆竭能盡力以治其事亂主則不然故群臣處官位受厚祿莫務治國者期於管國之重而擅其利牧漁其民以富其家故明法曰百慮其家不一圖其國屬數雖眾非以尊君也百官雖具非以任國也此之謂國無人明主在上位則竟內之眾盡力以奉其主百官分職致治以安國家亂主則不然雖有勇力之士大臣私之而非以奉其主也雖有聖智之士大臣私之非以治其國也故屬數雖眾不得進也百官雖具不得制也如此者有人主之名而無其實故明法曰屬數雖眾非以尊君也百官雖具非以任國也此之謂國無人國無人者非朝臣之衰也家與家務於相益不務尊君也明主者使下盡力而守法分故群臣務尊主而不敢顧其家臣主之分明上下之位審故大臣各處其位而不敢相貴亂主則不然法制廢而不行故群臣得務益其家君臣無分上下無別故群臣得務相貴如此者非朝臣少也眾不為用也故明法曰國無人者非朝臣衰也家與家務相益不務尊君也大臣務相貴而不任國也大臣務相貴而不任國小臣持祿養交不以官為事故官失其能人主之張官置吏也非徒尊其身厚奉之而已也使之奉主之法行主之令以治百姓而誅盜賊也是故其所任官者大則爵尊而祿厚其所任官者小則爵卑而祿薄爵祿者人主之所以使吏治官也亂主之治也處尊位受厚祿養所與佼而不以官為務如此者則官失其能矣故明法曰小臣持祿養佼不以官為事故官失職是故先王之治國也使法擇人不自舉也明主之擇賢人也言勇者試之以軍言智者試之以官試於軍而有功者則舉之試於官而事治者則用之故以戰功之事定勇怯以官職之治定愚智故勇怯愚智之見也如白黑之分亂主則不然聽言而不試故妄言者得用任人而不官故不肖者不困故明主以法案其言而求其實以官任其身而課其功專任法不自舉焉故明法曰先王之治國也使法擇人不自舉也使法量功不自度也凡所謂功者安主上利萬民者也夫破軍殺將戰勝攻取使主無危亡之憂而百姓無死虜之患此軍士之所以為功者也奉主法治竟內使強不凌弱眾不暴寡萬民驩盡其力而奉養其主此吏之所以為功也匡主之過救主之失明理義以道其主主無邪僻之行蔽欺之患此臣之所以為功也故明主之治也明分職而課功勞有功者賞亂法者誅誅賞之所加各得其宜而主不自與焉故明法曰使法量功不自度也故能匿而不可蔽敗而不可飾也明主之治也審是非察事情以度量案之合於法則行不合於法則止功充其言則賞不充其言則誅故言智能者必有見功而後舉之言惡敗者必有見過而後廢之如此則士上通而莫之能妒不肖者困廢而莫之能舉故明法曰能不可蔽而敗不可飾也譽者不能進而誹者不能退也明主之道立民所欲以求其功故為爵祿以勸之立民所惡以禁其邪故為刑罰以畏之故案其功而行賞案其罪而行罰如此則群臣之舉無功者不敢進也毀無罪者不能退也故明法曰譽者不能進而誹者不能退也然則君臣之閒明別明別則易治也制群臣擅生殺主之分也縣令仰制臣之分也威勢尊顯主之分也卑賤畏敬臣之分也令行禁止主之分也奉法聽從臣之分也故君臣相與高下之處也如天之與地也其分晝之不同也如白之與黑也故君臣之閒明別則主尊臣卑如此則下之從上也如響之應聲臣之法主也如景之隨形故上令而下應主行而臣從以令則行以禁則止以求則得此之謂易治故明法曰君臣之閒明別則易治主雖不身下為而守法為之可也明主操術任臣下使羣臣效其智能進其長技故智者效其計能者進其功以前言督後事所效當則賞之不當則誅之張官任吏治民案法試課成功守法而法之身無煩勞而分職故明法曰主雖不身下為而守法為之可也正世第四十七區言三古之欲正世調天下者必先觀國政料事務察民俗本治亂之所生知得失之所在然後從事故法可立而治可行夫萬民不和國家不安失非在上則過在下今使人君行逆不修道誅殺不以理重賦斂竭民財急使令罷民力財竭則不能毋侵奪力罷則不能毋墮倪民已侵奪墮倪因以法隨而誅之則是誅罰重而亂愈起夫民勞苦困不足則𥳑禁而輕罪如此則失在上失在上而上不變則萬民無所託其命今人主輕刑政寬百姓薄賦斂緩使令然民淫躁行私而不從制飾智任詐負力而爭則是過在下過在下人君不廉而變則暴人不勝邪亂不止暴人不勝邪亂不止則君人者勢傷而威日衰矣故為人君者莫貴於勝所謂勝者法立令行之謂勝法立令行故群臣奉法守職百官有常法不繁匿萬民敦愨反本而儉力故賞必足以使威必足以勝然後下從故古之所謂明君者非一君也其設賞有薄有厚其立禁有輕有重迹行不必同非故相反也皆隨時而變因俗而動夫民躁而行僻則賞不可以不厚禁不可以不重故聖人設厚賞非侈也立重禁非戾也賞薄則民不利禁輕則邪人不畏設人之所不利欲以使則民不盡力立人之所不畏欲以禁則邪人不止是故陳法出令而民不從故賞不足勸則士民不為用刑罰不足畏則暴人輕犯禁民者服於威殺然后從見利然后用被治然后正得所安然后靜者也夫盜賊不勝邪亂不止彊劫弱眾暴寡此天下之所憂萬民之所患也憂患不除則民不安其居民不安其居則民望絕於上矣夫利莫大於治害莫大於亂夫五帝三王所以成功立名顯於後世者以為天下致利除害也事行不必同所務一也夫民貪行躁而誅罰輕罪過不發則是長淫亂而便邪僻也有愛人之心而實合於傷民此二者不可不察也夫盜賊不勝則良民危法禁不立則姦邪繁故事莫急於當務治莫貴於得齊制民急則民迫民迫則窘窘則民失其所葆緩則縱縱則淫淫則行私行私則離公離公則難用故治之所以不立者齊不得也齊不得則治難行故治民之齊不可不察也聖人者明於治亂之道習於人事之終始者也其治人民也期於利民而上故其位齊也不慕古不留今與時變與俗化夫君人之道莫貴於勝勝故君道立君道立然後下從下從故教可立而化可成也夫民不心服體從則不可以禮義之文教也君人者不可以不察也治國第四十八區言四凡治國之道必先富民民富則易治也民貧則難治也奚以知其然也民富則安鄉重家安鄉重家則敬上畏罪敬上畏罪則易治也民貧則危鄉輕家危鄉輕家則敢陵上犯禁凌上犯禁則難治也故治國常富而亂國必貧是以善為國者必先富民然后治之昔者七十九代之君法制不一號令不同然俱王天下者何也必國富而粟多也夫富國多粟生於農故先王貴之凡為國之急者必先禁末作文巧末作文巧禁則民無所游食民無所游食則必農民事農則田墾田墾則粟多粟多則國富國富者兵彊兵彊者戰勝戰勝者地廣是以先王知眾民彊兵廣地富國之必生於粟也故禁末作止奇巧而利農事今為末作奇巧者一日作而五日食農夫終歲之作不足以自食也然則民舍本事而事末作捨本事而事末作則田荒而國貧矣凡農者月不足而歲有餘者也而上徵暴急無時則民倍貸以給上之徵矣耕耨者有時而澤不必足則民倍貸以取庸矣秋糴以五春糶以束是又倍貸也故以上之徵而倍取於民者四關市之租府庫之徵粟什一厮輿之事此四時亦當一倍貸矣夫以一民養四主故逃徙者刑而上不能止者粟少而民無積也嵩山之東河汝之閒蚤生而晚殺五穀之所蕃孰也四種而五穫中年畝二石一夫為粟二百石今也倉廩虛而民無積農夫以粥子者上無術以均之也故先王使農士商工四民交能易作終歲之利無道相過也是以民作一而得均民作一則田墾姦巧不生田墾則粟多粟多則國富姦巧不生則民治富而治此王之道也不生粟之國亡粟生而死者霸粟生而不死者王粟也者民之所歸也粟也者財之所歸也粟也者地之所歸也粟多則天下之物盡至矣故舜一徙成邑貳徙成都參徙成國舜非嚴刑罰重禁令而民歸之矣去者必害從者必利也先王者善為民除害興利故天下之民歸之所謂興利者利農事也所謂除害者禁害農事也農事勝則入粟多入粟多則國富國富則安鄉重家安鄉重家則雖變俗易習歐眾移民至於殺之而民不惡也此務粟之功也上不利農則粟少粟少則人貧人貧則輕家輕家則易去易去則上令不能必行上令不能必行則禁不能必止禁不能必止則戰不必勝守不必固矣夫令不必行禁不必止戰不必勝守不必固命之曰寄生之君此由不利農少粟之害也粟者王之本事也人主之大務有人之塗治國之道也
