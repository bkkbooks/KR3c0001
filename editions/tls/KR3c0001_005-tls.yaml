body:
  text: 管子卷第五八觀第十三外言四大城不可以不完郭周不可以外通里域不可以橫通閭閈不可以毋闔宮垣關閉不可以不脩故大城不完則亂賊之人謀郭周外通則姦遁踰越者作里域橫通則攘奪竊盜者不止閭閈無闔外內交通則男女無別宮垣不備關閉不固雖有良貨不能守也故形勢不得為非則姦邪之人愨愿禁罰威嚴則𥳑慢之人整齊憲令著明則蠻夷之人不敢犯賞慶信必則有功者勸教訓習俗者眾則君民化變而不自知也是故明君在上位刑省罰寡非可刑而不刑非可罪而不罪也明君者閉其門塞其塗弇其迹使民毋由接於淫非之地是以民之道正行善也若性然故罪罰寡而民以治矣行其田野視其耕芸計其農事而飢飽之國可以知也其耕之不深芸之不謹地宜不任草田多穢耕者不必肥荒者不必墝以人猥計其野草田多而辟田少者雖不水旱飢國之野也若是而民寡則不足以守其地若是而民眾則國貧民飢以此遇水旱則眾散而不收彼民不足以守者其城不固民飢者不可以使戰眾散而不收則國為丘墟故曰有地君國而不務耕芸寄生之君也故曰行其田野視其耕芸計其農事而飢飽之國可知也行其山澤觀其桑麻計其六畜之產而貧富之國可知也夫山澤廣大則草木易多也壤地肥饒則桑麻易殖也薦草多衍則六畜易繁也山澤雖廣草木毋禁壤地雖肥桑麻毋數薦草雖多六畜有征閉貨之門也故曰時貨不遂金玉雖多謂之貧國也故曰行其山澤觀其桑麻計其六畜之產而貧富之國可知也入國邑視宮室觀車馬衣服而侈儉之國可知也夫國城大而田野淺狹者其野不足以養其民城域大而人民寡者其民不足以守其城宮營大而室屋寡者其室不足以實其宮室屋眾而人徒寡者其人不足以處其室囷倉寡而臺榭繁者其藏不足以共其費故曰主上無積而宮室美氓家無積而衣服脩乘車者飾觀望步行者雜文采本資少而末用多者侈國之俗也國侈則用費用費則民貧民貧則姦智生姦智生則邪巧作故姦邪之所生生於匱不足匱不足之所生生於侈侈之所生生於毋度故曰審度量節衣服儉財用禁侈泰為國之急也不通於若計者不可使用國故曰入國邑視宮室觀車馬衣服而侈儉之國可知也課凶饑計師役觀臺榭量國費而實虛之國可知也凡田野萬家之眾可食之地方五十里可以為足矣萬家以下則就山澤可矣萬家以上則去山澤可矣彼野悉辟而民無積者國地小而食地淺也田半墾而民有餘食而粟米多者國地大而食地博也國地大而野不辟者君好貨而臣好利者也辟地廣而民不足者上賦重流其藏者也故曰粟行於三百里則國毋一年之積粟行於四百里則國毋半年之積粟行於五百里則眾有飢色其稼亡三之一者命曰小凶小凶三年而大凶大凶則眾有遺苞矣什一之師什三毋事則稼亡三之一稼亡三之一而非有故積也則道有捐瘠矣什一之師三年不解非有餘食也則民有鬻子矣故曰山林雖近草木雖美宮室必有度禁發必有時是何也曰大木不可獨伐也大木不可獨舉也大木不可獨運也大木不可加之薄墻之上故曰山林雖廣草木雖美禁發必有時國雖充盈金玉雖多宮室必有度江海雖廣池澤雖博魚鱉雖多罔罟必有正舩網不可一財而成也非私草木愛魚鱉也惡廢民於生穀也故曰先王之禁山澤之作者摶民於生穀也彼民非穀不食穀非地不生地非民不動民非作力毋以致財夫才之所生生於用力力之所生生於勞身是故主上用財毋已是民用力毋休也故曰臺榭相望者其上下相怨也民毋餘積者其禁不必止眾有遺苞者其戰不必勝道有捐瘠者其守不必固故令不必行禁不必止戰不必勝守不必固則危亡隨其後矣故曰課凶飢計師役觀臺榭量國費實虛之國可知也入州里觀習俗聽民之所以化其上而治亂之國可知也州里不鬲閭閈不設出入毋時早晏不禁則攘奪竊盜攻擊殘賊之民毋自勝矣食谷水巷鑿井場圃接樹木茂宮牆毀壞門戶不閉外內交通則男女之別毋自正矣鄉毋長游里毋士舍時無會同喪蒸不聚禁罰不嚴則齒長輯睦毋自生矣故昏禮不謹則民不脩廉論賢不鄉舉則士不及行貨財行於國則法令毀於官請謁得於上則黨與成於下鄉官毋法制百姓群徒不從此亡國弒君之所自生也故曰入州里觀習俗聽民之所以化其上者而治亂之國可知也入朝廷觀左右求本朝之臣論上下之所貴賤者而彊弱之國可知也功多為上祿賞為下則積勞之臣不務盡力治行為上爵列為下則豪桀材臣不務竭能便辟左右不論功能而有爵祿則百姓疾怨非上賤爵輕祿金玉貨財商賈之人不論志行而有爵祿則上令輕法制毀權重之人不論才能而得尊位則民倍本行而求外勢彼積勞之人不務盡力則兵士不戰矣豪桀材人不務竭能則內治不別矣百姓疾怨非上賤爵輕祿則上毋以勸眾矣上令輕法制毀則君毋以使臣臣毋以事君矣民倍本行而求外勢則國之情偽竭在敵國矣故曰入朝廷觀左右本朝之臣論上下之所貴賤者而彊弱之國可知也置法出令臨眾用民計其威嚴寬惠行於其民與不行於其民而興滅之國可知也法虛立而害䟽遠令一布而不聽者存賤爵祿而毋功者富然則眾必輕令而上位危故曰良田不在戰士三年而兵弱賞罰不信五年而破上賣官爵七年而亡倍人倫而禽獸行十年而滅戰不勝弱也地四削入諸侯破也離本國徙都邑亡也有者異姓滅也故曰置法出令臨眾用民計威嚴寬惠行於其民不行於其民而興滅之國可知也計敵與量上意察國本觀民產之所有餘不足而存亡之國可知也敵國彊而與國弱諫臣死而諛臣尊私情行而公法毀然則與國不恃其親而敵國不畏其彊豪傑不安其位而積勞之人不懷其祿悅商販而不務本貨則民偷處而不事積聚豪傑不安其位則良臣出積勞之人不懷其祿則兵士不用民偷處而不事積聚則囷倉空虛如是而君不為變然則攘奪竊盜殘賊進取之人起矣內者廷無良臣兵士不用囷倉空虛而外有彊敵之憂則國居而自毀矣故曰計敵與量上意察國本觀民產之所有餘不足而存亡之國可知也故以此八者觀人主之國而人主毋所匿其情矣法禁第十四外言五法制不議則民不相私刑殺毋赦則民不偷於為善爵祿毋假則下不亂其上三者藏於官則為法施於國則成俗其餘不彊而治矣君壹置其儀則百官守其法上明陳其制則下皆會其度矣君之置其儀也不一則下之倍法而立私理者必多矣是以人用其私廢上之制而道其所聞故下與官列法而上與君分威國家之危必自此始矣昔者聖王之治其民也不然廢上之法制者必負以恥厚財博惠以私親於民者正經而自正矣聖王既歿受之者衰君人而不能知立君之道以為國本則大臣之贅下而射人心者必多矣君不能審立其法以為下制則百姓之立私理而徑於利者必眾矣昔者聖王之治人也不貴其人博學也欲其人之和同以聽令也泰誓曰紂有臣億萬人亦有億萬之心武王有臣三千而一心故紂以億萬之心亡武王以一心存故有國之君苟不能同人心一國威齊士義通上之治以為下法則雖有廣地眾民猶不能以為安也君失其道則大臣比權重以相舉於國小臣必循利以相就也故舉國士以為己黨行公道以為私惠進則相推於君退則相譽於民各便其身而忘社稷以廣其居聚徒成群上以蔽君下以索民此皆弱君亂國之道也故國之危也亂國之道易國之常賜賞恣於己者聖王之禁也擅國權以深索於民者聖王之禁也其身毋任於上者聖王之禁也進則受祿於君退則藏祿於室毋事治職但力事屬私王官私君事去非其人而私行者聖王之禁也脩行則不以親為本治事則不以官為主舉毋能進毋功者聖王之禁也交人則以為己賜舉人則以為己勞仕人則與分其祿者聖王之禁也交於利通而獲於貧窮輕取於其民而重致於其君削上以附下枉法以求於民者聖王之禁也用不稱其人家富於其列其祿甚寡而資財甚多者聖王之禁也拂世以為行非上以為名常反上之法制以成群於國者聖王之禁也飾於貧窮而發於勤勞權於貧賤身無職事家無常姓列上下之閒議言為民者聖王之禁也壺士以為己資脩甲以為己本賊臣之養私必死然後矢矯以深與上為市者聖王之禁也審飾小節以示民時言大事以動上遠交以踰群假爵以臨朝者聖王之禁也卑身雜處隱行辟倚側入迎遠遁上而遁民者聖王之禁也詭俗異禮大言法行難其所為而高自錯者聖王之禁也守委閒居博分以致眾勤身遂行說人以貨財濟人以買譽其身甚靜而使人求者聖王之禁也行僻而堅言詭而辯術非而博順惡而澤者聖王之禁也以朋黨為友以蔽惡為仁以數變為智以重斂為忠以遂忿為勇者聖王之禁也固國之本其身務往於上深附於諸侯者聖王之禁也聖王之身治世之時德行必有所是道義必有所明故士莫敢詭俗異禮以自見於國莫敢布惠緩行脩上下之交以私親於民莫敢超等踰官漁利蘇功以取順其君聖王之治民也進則使無由得其所利退則使無由避其所害必使反乎安其位樂其群務其職榮其名而后止矣故踰其官而離其群者必使有害不能其事而失其職者必使有恥是故聖王之教民也以仁錯之以恥使之脩其能致其所成而止故曰絕而定靜而治安而尊舉錯而不變者聖王之道也重令第十五外言六凡君國之重器莫重於令令重則君尊君尊則國安令輕則君卑君卑則國危故安國在乎尊君尊君在乎行令行令在乎嚴罰罰嚴令行則百吏皆恐罰不嚴令不行則百吏皆喜故明君察於治民之本本莫要於令故曰虧令者死益令者死不行令者死留令者死不從令者死五者死而無赦惟令是視故曰令重而下恐為上者不明令出雖自上而論可與不可者在下夫倍上令以為威則行恣於己以為私百吏奚不喜之有且夫令出雖自上而論可與不可者在下是威下繫於民也威下繫於民而求上之毋危不可得也令出而留者無罪則是教民不敬也令出而不行者毋罪行之者有罪是皆教民不聽也令出而論可與不可者在官是威下分也益損者毋罪則是教民邪途也如此則巧佞之人將以此成私為交比周之人將以此阿黨取與貪利之人將以此收貨聚財懦弱之人將以此阿貴富事便辟伐矜之人將以此買譽成名故令一出示民邪途五衢而求上之毋危下之毋亂不可得也菽粟不足末生不禁民必有飢餓之色而工以雕文刻鏤相穉也謂之逆布帛不足衣服毋度民必有凍寒之傷而女以美衣錦繡纂組相穉也謂之逆萬乘藏兵之國卒不能野戰應敵社稷必有危亡之患而士以毋分役相穉也謂之逆爵人不論能祿人不論功則士無為行制死節而群臣必通外請謁取權道行事便辟以貴富為榮華以相穉也謂之逆朝有經臣國以經俗民有經產何謂朝之經臣察身能而受官不誣於上謹於法令以治不阿黨竭能盡力而不尚得犯難離患而不辭死受祿不過其功服位不侈其能不以毋實虛受者朝之經臣也何謂國之經俗所好惡不違於上所貴賤不逆於令毋上拂之事毋下比之說毋侈泰之養毋踰等之服謹於鄉里之行而不逆於本朝之事者國之經俗也何謂民之經產畜長樹蓺務時殖穀力農墾草禁止末事者民之經產也故曰朝不貴經臣則便辟得進毋功虛取奸邪得行毋能上通國不服經俗則臣下不順而上令難行民不務經產則倉廩空虛財用不足便辟得進毋功虛取姦邪得行毋能上通則大臣不和臣下不順上令難行則應難不捷倉廩空虛財用不足則國毋以固守三者見一焉則敵國制之矣故國不虛重兵不虛勝民不虛用令不虛行凡國之重也必待兵之勝也而國乃重凡兵之勝也必待民之用也而兵乃勝凡民之用也必待令之行也而民乃用凡令之行也必待近者之勝也而令乃行故禁不勝於親貴罰不行於便辟法禁不誅於嚴重而害於䟽遠慶賞不施於卑賤而求令之必行不可得也能不通於官受祿賞不當於功號令逆於民心動靜詭於時變有功不必賞有罪不必誅令焉不必行禁焉不必止在上位無以使下而求民之必用不可得也將帥不嚴威民心不專一陳士不死制卒士不輕敵而求兵之必勝不可得也內守不能完外攻不能服野戰不能制敵侵伐不能威四鄰而求國之重不可得也德不加於弱小威不信於強大征伐不能服天下而求霸諸侯不可得也威有與兩立兵有與分爭德不能懷遠國令不能一諸侯而求王天下不可得也地大國富人眾兵彊此霸王之本也然而與危亡為鄰矣天道之數人心之變天道之數至則反盛則衰人心之變有餘則驕驕則緩怠夫驕者驕諸侯驕諸侯者諸侯失於外緩怠者民亂於內諸侯失於外民亂於內天道也此危亡之時也若夫地雖大而不并兼不攘奪人雖眾不緩怠不傲下國雖富不侈泰不縱欲兵雖彊不輕侮諸侯動眾用兵必為天下政理此正天下之本而霸王之主也凡先王治國之器三攻而毀之者六明王能勝其攻故不益於三者而自有國正天下亂王不能勝其攻故亦不損於三者而自有天下而亡三器者何也曰號令也斧鉞也祿賞也六攻者何也曰親也貴也貨也色也巧佞也玩好也三器之用何也曰非號令毋以使下非斧鉞毋以威眾非祿賞毋以勸民六攻之敗何也曰雖不聽而可以得存者雖犯禁而可以得免者雖毋功而可以得富者凡國有不聽而可以得存者則號令不足以使下有犯禁而可以得免者則斧鉞不足以威眾有毋功而可以得富者則祿賞不足以勸民號令不足以使下斧鉞不足以威眾祿賞不足以勸民若此則民毋為自用民毋為自用則戰不勝戰不勝而守不固守不固則敵國制之矣然則先王將若之何曰不為六者變更於號令不為六者疑錯於斧鉞不為六者益損於祿賞若此則遠近一心遠近一心則眾寡同力眾寡同力則戰可以必勝而守可以必固非以并兼攘奪也以為天下政治也此正天下之道也
