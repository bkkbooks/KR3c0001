body:
  text: 管子卷第十二短語九問曰古之時與今之時同乎曰同其人同乎不同乎曰不同可與政誅嚳堯之時混吾之美在下其道非獨出人也山不同而用掞澤不弊而養足耕以自養以其餘應養天子故平牛馬之牧不相及人民之俗不相知不出百里而求足故卿而不理靜也其獄一踦腓一踦屨而當死今周公斷滿稽斷首滿稽斷足滿稽而死民不服非人性也敝也地重人載毀敝而養不足事末作而民興之是以下名而上實也聖人者省諸本而游諸樂大昏也博夜也問曰興時化若何莫善於侈靡賤有實敬無用則人可刑也故賤粟米而敬珠玉好禮樂而賤事業本之始也珠者陰之陽也故勝火玉者陽之陰也故勝水其化如神故天子臧珠玉諸侯臧金石大夫畜狗馬百姓臧布帛不然則強者能守之智者能牧之賤所貴而貴所賤不然鰥寡獨老不與得焉均之始也政與教孰急管子曰夫政教相似而殊方若夫教者摽然若秋雲之遠動人心之悲藹然若夏之靜雲乃及人之體窵然若皓月之靜動人意以怨蕩蕩若流水使人思之人所生往教之始也身必備之辟之若秋雲之始見賢者不肖者化焉敬而待之愛而使之若樊神山祭之賢者少不肖者多使其賢不肖惡得不化今夫政則少別若夫威形之徵者也去則少可使人乎用貧與富何如而可曰甚富不可使甚貧不知恥水平而不流無源則遬竭雲平而雨不甚無委雲雨則遬已政平而無威則不行愛而無親則流親左右用無用則辟之若相為盲兆怨上短下長無度而用則危本不稱而祀談次祖犯詛渝盟傷言敬祖禰尊始也齊約之信論行也尊天地之理所以論威也薄德人群之腐壤也必因威刑而論於人此政行也可以王乎請問用之若何必辨於天地之道然后功名可以殖辨於地利而民可富通於侈靡而士可戚君親以好事強以立斷仁以好任人君壽以致年百姓不夭厲六畜遮育五穀遮熟然后民力可得用鄰國之君俱不賢然后得王俱賢若何曰忽然易卿而移忽然易事而化變而足以成名慈拯弊而名勸種而民富應變待感與物俱長放日月之明應風雨而動天之所覆地之所載斯民之長也不有而醜天地非天子之事也民變而不能變是梲之傅革有革而不能革不可服民服信諸侯服化請問諸侯之化弊也弊也者家也家也者以因人之所重而行之吾君長來獵君長虎豹之皮用功力之君上金玉幣好戰之君上甲兵甲兵之本必先於田宅今吾君戰則請行民之所重飲食者也侈樂者也民之所願也足其所欲贍其所願則能用之耳今使衣皮而冠角食野草飲野水孰能用之傷心者不可以致功故嘗至味而罷至樂而雕卵然后瀹之雕橑然后爨之丹沙之穴不塞則商賈不處富者靡之貧者為之此百姓之怠生百振而食非獨自為也為之畜化用其臣者豫而奪之使而輟之徒以而富之父繫而伏之豫虛爵而驕之收其春秋之時而消之有雜禮義而居之時舉其強者以譽之強而可使服事辨以辨辭智以招請廉以摽人堅強以乘下廣其德以輕上位不能使之而流徙此謂國亡之郤故法而守常尊禮而變俗上信而賤文好緣而嫌駔此謂成國之法也為國者反民性然后可以與民戚民欲佚而教以勞民欲生而教以死勞教定而國富死教定而威行聖人者陰陽理故平外而險中故信其情者傷其神美其質者傷其文化之美者應其名變之美者應其時不能兆其端者菑及之故緣地之利承從天之指辱舉其死開其國門知其神次緣地之利者所以參天地之吉綱也承從天之指者動必明辱舉其死者與其先人同公事則道必行開其國門者玩之以善言辱知神次者操犧牲與其圭璧以執其斝家小害以小勝大員其中辰其外而復畏強長其虛而物正以視其中情公曰國門則塞百姓歡敖胡以備之擇天之所宥擇鬼之所富擇人之所戴而亟付其身此所以安之也強與短而立齊國之若何高豫之名而舉之重豫之官而危之因責其能以隨之猶傶則踈之毋使人圖之猶踈則數之毋使人曲之此所以為之也夫有臣甚大將反為害吾欲優患除害將小能察大為之奈何潭根之毋伐固蒂之毋乂深黎之毋涸丕峨之毋助章明之毋滅生榮之毋失十言者不勝此一雖凶必吉故平以滿無事而揔以待有事而為之若何積者立餘食而侈美車馬而馳多酒醴而靡千歲毋出食此謂本事縣入有主入此治用然而不治積之市一入積之下一入積之上此謂利無常百姓無寶以利為首一上一下唯利所處利然后能通通然后成國利靜而不化觀其所出從而移之視其不可使因以為民等擇其好名因使長民好而不已是以為國紀功未成者不可以獨名事未道者不可以言名成功然后可以獨名事道然後可以言名然後可以承致酢先其士者之為自犯後其民者之為自贍輕國位者國必敗踈貴戚者謀將泄毋仕異國之人是為失經毋數變易是為敗成大臣得罪勿出封外是為漏情毋數據大臣之家而飲酒是為使國大消消堯在臧於荒返於連比若是者必從是儡亡乎辟之若尊觶末勝其本亡流而下不平令苟下不治高下者不足以相待此謂殺事立而壞何也兵遠而畏何也民已聚而散何也輟安而危何也功成而不信者殆兵強而無義者殘不謹於附近而欲求遠者兵不信略近臣合於其遠者則事立而壞亡國之紀毀國之族則兵遠而不畏國小而修大仁而不利猶有爭名者纍哉是也樂聚己力以兼人之強以待其害雖聚必散大王不待衆而自待百姓自聚供而後利之成而無害踈戚而好外企以仁而謀泄賤寡而好大此所以危衆而約實取而言讓行陰而言陽利人之有禍害人之無患吾欲獨有是若何是故之時陳財之道可以行今也利散而民察必放之然後行公曰謂何長喪以毀其時重送葬以起其財一親往一親來所以合親也此謂衆約問用之若何巨瘞堷所以使貧民也美壟墓所以使文萌也巨棺槨所以起木工也多衣衾所以起女工也猶不盡故有次浮也有差樊有瘞藏作此相食然后民相利守戰之備合矣鄉殊俗國異禮則民不流矣不同法則民不困鄉丘老不通覩誅流散則人不眺安鄉樂宅享祭而謳吟稱號者皆殊所以留民俗也斷方井田之數乘馬田之衆制之陵溪立鬼神而謹祭皆以能別以為食數示重本也故地廣千里者祿重而祭尊其君無餘地與地若一者從而艾之君始者艾若一者從乎殺與于殺者一若從者艾若一者從于殺與于殺者一若從無封始王者上事霸者生功言重本是為十禺分地而不爭言先人而自後也官禮之司昭穆之離先後功器事之治尊鬼而守故戰事之任高功而下死本事食功而省利勸臣上義而不能與小利五官者人爭其職然後君聞察之時上賢者也故君臣掌君臣掌則上下均此以知上賢無益也其亡茲適上賢者亡而役賢者昌上義以禁暴尊祖以敬祖聚宗以朝殺示不輕為主也載祭明置高子聞之以告中寢諸子中寢諸子告寡人舍朝不鼎饋中寢諸子告宮中女子曰公將有行故不送公公言無行女安聞之曰聞之中寢諸子索中寢諸子而問之寡人無行女安聞之吾聞之先人諸侯舍於朝不鼎饋者非有外事必有內憂公曰吾不欲與汝及若女言至焉不得毋與女及若言吾欲致諸侯諸侯不至若何哉女子不辨於致諸侯自吾不為汙殺之事人布職不可得而衣故雖有聖人惡用之能摩故道新道定國家然后化時乎國貧而鄙富苴莫美於朝國富而鄙貧莫善如市市也者勸也勸者本所以起善而末事起不侈本事不得立選賢舉能不可得惡得伐不服耶百夫無長不可臨也千乘有道不可侵也夫紂在上惡得伐不服鈞則戰守則攻百蓋無築千聚無社謂之陋一舉而取天下有事之時也萬諸侯鈞萬民無聽上位不能為功更制其能王乎緣故修法以政治道則鈞殺于吾君故取夷吾謂替公曰何若對曰以同其日久臨可立而待鬼神不明囊橐之食無報明厚德也沉浮示輕財也先立象而定期則民從之故為禱朝縷綿明輕財而重名同公曰臨所謂同者其以先後智渝者也鈞同則爭倍則說十則從服萬則化成功而不能識而民期為后成形而更名則臨矣請問為邊若何對曰夫邊日變不可以常知觀也民未始變而是變是為自亂請問諸邊而參其亂任之以事因其謀方百里之地樹表相望者丈夫走禍婦人備食內外相備春秋一日敗曰千金稱本而動候人不可重也唯交於上能必於邊之辭行人可不有私不有私所以為內因也使能者有主俟而內事萬世之國必有萬世之寶必因天地之道使其內無使其外使其小毋使其大棄其國寶使其外遺與而敗稱其寶使其小可以為道能則專專則佚椽能踰則椽於踰能官則不守而不散衆能伯不然將見對君子者勉於糾人者也非身糾者也故輕者輕重者重前後不慈凡輕者操實也以輕則可使重不可起輕重有齊重以為國輕以為死毋全祿貧國而用不足毋全賞好德惡使常請問先合於天下而無私怨犯強而無私害為之若何對曰國雖強令必忠以義國雖弱令必敬以哀強弱不犯則人欲聽矣先人而自後而無以為仁也加功於人而勿得所橐者遠矣所爭者外矣明無私交則無內怨與大則勝私交衆則怨殺夷吾也如以豫人財者不如無奪時如以豫人食者不如毋奪其事此謂無外內之患忠敬也君臣之際也禮義者人君之神也且君臣之屬義也親戚之愛性也使君親之際同索屬敬也使人君不安者屬察也不可不謹也賢不可威能不可留杜事之於前易也水泉之汩也人聚之壤地之美也人死之若江湖之大也求珠貝者不舍也逐神而遠熱交觶者不處兄遺利夫事在中國之人觀危國過君而弋其能者豈不幾於危社主哉利不可法故民流神不可法故事之天地不可留故動化故從新是故得天者高而不崩得人者卑而不可勝是故聖人重之人君重之故至貞生至信至信生至交生至自有道不務以文勝情不務以多勝少不動則望有牆旬身行法制度量王者典器也執故義道畏變也天地若夫神之動化變者也天地之極也能與化起而善用則不可以道止也仁者善用智者善用非其人則與神往矣衣食之於人也不可以一日違也親戚可以時去也是故聖人萬民艱處而立焉人死則易云生則難合也故一為賞再為常三為固然其小行之則欲也久之則禮義故無使下當上必行之然后移商人於國非用人也不擇鄉而處不擇君而使出則從利入則不守國之山林也取而利之市廛之所及二依其本故上侈而下靡而君臣相上下相親則君臣之財不私藏然則動肢而得食矣徙邑移市亦為數一問曰多賢可云對曰魚鱉之不食餌者不出其淵樹木之勝霜雪者不聽於天士能自治者不從聖人豈云哉夷吾之聞之也不欲強能不服智而不牧若旬虛期於月律呂出於一明然則可以處矣故厄其道而薄其所豫則士云矣不擇人而豫之謂之好人不擇人而取之謂之好利審此兩者以為處行則云矣不方之政不可以為國曲靜之言不可以為道節時於政與時往矣不動以為道齊以為行避世之道不可以進取陽者進謀幾者應感再殺則齊然後運可請何謂也對曰夫運謀者天地之虛滿也合離也春秋冬夏之勝也然有知強弱之所尤然後應諸侯取交故知安危國之所存以時事天以天事神以神事鬼故國無罰而君壽而民不殺疫智運謀而離櫜刃焉其滿為感其虛為亡滿虛之合有時而為實時而為動陰陽時貸其冬厚則夏熱其陽厚則陰寒是故王者謹於日至故知虛滿之所在以為政令已殺生其合而未散可以決事將合可以禺其隨行以為兵分其多少以為曲政請問形有時而變乎對曰陰陽之分定則甘苦之草生也從其宜則酸醎和焉而形色定焉以為聲樂夫陰陽進退滿虛亡時其散合可以視歲唯聖人不為歲罷知滿虛奪餘滿補不足以通政事以贍民常地之變氣應其所出水之變氣應之以精受之以豫天之變氣應之以正且夫天地精氣有五不必為沮其亟而反陔其重動毀之進退即此數之難得者也此形之時變也沮平氣之陽若如辭靜餘氣之潛然而動愛氣之潛然而哀胡得而治動對曰得之衰時位之觀之信美然后有輝修之心其殺以相待故有滿虛哀樂之氣也故書之帝八神農不與存為其無位不能相用問運之合滿安臧二十歲而可廣十二歲而聶廣百歲傷神周鄭之禮移矣則周律之廢矣則中國之草木有移於不通之野者然則人君聲服變矣則臣有千駟之祿婦人為政鐵之重反於金而聲好下曲食好醎苦亟則人君日退則溪陵山谷之神之祭更應國之稱號亦更矣視之天變觀之風氣古之祭有時而星有時而熺有時而熰有時而昫鼠應廣之實陰陽之數也華若落之名祭之號也是故天子之為國圖具其樹物也
