body:
  text: 君臣下第三十一短語五古者未有君臣上下之別未有夫婦妃匹之合獸處群居以力相征於是智者詐愚強者凌弱老幼孤獨不得其所故智者假衆力以禁強虐而暴人止為民興利除害正民之德而民師之是故道術德行出於賢人其從義理兆形於民心則民反道矣名物處韙非分則賞罰行矣上下設民生體而國都立矣是故國之所以為國者民體以為國君之所以為君者賞罰以為君致賞則匱致罰則虐財匱而令虐所以失其民也是故明君審居處之教而民可使居治戰勝守固者也夫賞重則上不給也罰虐則下不信也是胡明君飾食飲弔傷之禮而物屬之者也是故厲之以八政旌之以衣服富之以國稟貴之以王禁則民親君可用也民用則天下可致也天下道其道則至不道其道則不至也夫水波而上盡其搖而復下其勢固然者也故德之以懷也威之以畏也則天下歸之矣有道之國發號出令而夫婦盡歸親於上矣布法出憲而賢人列士盡功能於上矣千里之內束布之罰一畝之賦盡可知也治斧鉞者不敢讓刑治軒冕者不敢讓賞隤然若一父之子若一家之實義禮明也夫下不戴其上臣不戴其君則賢人不來賢人不來則百姓不用百姓不用則天下不至故曰德侵則君危論侵則有功者危令侵則官危刑侵則百姓危而明君者審禁淫侵者也上無淫侵之論則下無冀幸之心矣為人君者倍道棄法而好行私謂之亂為人臣者變故易常而巧言以諂上謂之騰亂至則虐騰至則北四者有一至敗敵人謀之則故施舍優猶以濟亂則百姓悅選賢遂材而禮孝弟則姦僞止要淫佚別男女則通亂隔貴賤有義倫等不踰則有功者勸國有常式故法不隱則下無怨心此五者興德匡過存國定民之道也夫君人者有大過臣人者有大罪國所有也民所君也有國君民而使民所惡制之此一過也民有三務不布其民非其民也民非其民則不可以守戰此君人者二過也夫臣人者受君高爵重祿治大官倍其官遺其事穆君之色從其欲阿而勝之此臣人之大罪也君有過而不改謂之倒臣當罪而不誅謂之亂君為倒君臣為亂臣國家之衰也可坐而待之是故有道之君者執本相執要大夫執法以牧其群臣群臣盡智竭力以役其上四守者得則治易則亂故不可不明設而守固昔者聖王本厚民生審知禍福之所生是故慎小事微違非索辨以根之然則躁作姦邪僞詐之人不敢試也此正民之道也古者有二言牆有耳伏寇在側牆有耳者微謀外泄之謂也伏寇在側者沈疑得民之道也微謀之泄也狡婦襲主之請而資游慝也沈疑者得民者也前貴而後賤者為之驅也明君在上便僻不能食其意刑罰亟近也大臣不能侵其勢比黨者誅明也為人君者能遠讒諂廢比黨淫悖行食之徒無爵列於朝者此止詐拘姦厚國存身之道也為人上者制群臣百姓道中央之人是以中央之人臣主之參制令之布於民也必由中央之人中央之人以緩為急急可以取威以急為緩緩可以惠民威惠遷於下則為人上者危矣賢不肖之知於上必由中央之人財力之貢於上必由中央之人能易賢不肖而可成黨於下有能以民之財力上啖其主而可以為勞於上兼上下以環其私爵制而不可加則為人上者危矣先其君以善者侵其賞而奪之惠者也先其君以惡者侵其刑而奪之威者也訛言於外者脅其君者也鬱令而不出者幽其君者也四者一作而上不知也則國之危可坐而待也神聖者王仁智者君武勇者長此天之道人之情也天道人情通者質窮者從此數之因也是故始於患者不與其事親其事者不規其道是以為人上者患而不勞也百姓勞而不患也君臣上下之分素則禮制立矣是故以人役上以力役明以刑役心此物之理也心道進退而刑道滔迂進退者主制滔迂者主勞主勞者方主制者圓圓者運運者通通則和方者執執者固固則信君以利和臣以節信則上下無邪矣故曰君人者制仁臣人者守信此言上下之禮也君之在國都也若心之在身體也道德定於上則百姓化於下矣戒心形於內則容貌動於外矣正也者所以明其德知得諸己知得諸民從其理也知失諸民退而修諸己反其本也所求於己者多故德行立所求於人者少故民輕給之故君人者上注臣人者下注上注者紀天時務民力下注者發地利足財用也故能飾大義審時節上以禮神明下以義輔佐者明君之道能據法而不阿上以匡主之過下以振民之病者忠臣之所行也明君在上忠臣佐之則齊民以政刑牽於衣食之利故願而易使愚而易塞君子食於道小人食於力分也威無勢也無所立事無為也無所生若此則國平而姦省矣君子食於道則義審而禮明義審而禮明則倫等不踰雖有偏卒之大夫不敢有幸心則上無危矣齊民食於力作本作本者衆農以聽命是以明君立世民之制於上猶草木之制於時也故民迂則流之民流通則迂之決之則行塞之則止雖有明君能決之又能塞之決之則君子行於禮塞之則小人篤於農君子行於禮則上尊而民順小民篤於農則財厚而備足上尊而民順財厚而備足四者備體頃時而王不難矣四肢六道身之體也四正五官國之體也四肢不通六道不達曰失四正不正五官不官曰亂是故國君聘妻於異姓設為姪娣命婦宮女盡有法制所以治其內也明男女之別昭嫌疑之節所以防其姦也是以中外不通讒慝不生婦言不及官中之事而諸臣子弟無宮中之交此先王所以明德圉姦昭公滅私也明立女寵後不以逐子傷義禮私愛歡勢不竝倫爵位雖尊禮無不行適為都佼冒之以衣服旌之以章旗所以重其威也然則兄弟無閒郤讒人不敢作矣故其立相也陳功而加之以德論勞而昭之以法參伍相德而周舉之尊勢而明信之是以下之人無諫死之誋而聚立者無鬱怨之心如此則國平而民無慝矣其選賢遂材也舉德以就列不類無德舉能以就官不類無能以德弇勞不以傷年如此則上無困而民不幸生矣國之所以亂者四其所以亡者二內有疑妻之妾此宮亂也庶有疑適之子此家亂也朝有疑相之臣此國亂也任官無能此衆亂也四者無別主失其體群官朋黨以懷其私則失族矣國之幾臣陰約閉謀以相待也則失援矣失族於內失援於外此二亡也故妻必定子必正相必直立以聽官必中信以敬故曰有宮中之亂有兄弟之亂有大臣之亂有中民之亂有小人之亂五者一作則為人上者危矣宮中亂曰妬紛兄弟亂曰黨偏大臣亂曰稱述中民亂曰讋諄小民亂曰財匱財匱生薄讋諄生慢稱述黨偏妬紛生變故正名稽疑刑殺亟近則內定矣順大臣以功順中民以行順小民以務則國豐矣審天時物地生以輯民力禁淫務勸農功以職其無事則小民治矣上稽之以數下十伍以徵近其巽升以固其意鄉樹之師以遂其學官之以其能及年而舉則士反行矣稱德度功勸其所能若稽之以衆風若任以社稷之任若此則士反於情矣小稱第三十二短語六管子曰身不善之患毋患人莫己知丹青在山民知而取之美珠在淵民知而取之是以我有過為而民毋過命民之觀也察矣不可遁逃以為不善故我有善則立譽我我有過則立毀我當民之毀譽也則莫歸問於家矣故先王畏民操名從人無不強也操名去人無不弱也雖有天子諸侯民皆操名而去之則捐其地而走矣故先王畏民在於身者孰為利耳與目為利聖人得利而託焉故民重而名遂我亦託焉聖人託可好我託可惡我託可惡以來美名又可得乎愛且不能為我能也毛嬙西施天下之美人也盛怨氣於面不能以為可好我且惡面而盛怨氣焉怨氣見於面惡言出於口去惡充以求美名又可得乎甚矣百姓之惡人之有餘忌也是以長者斷之短者續之滿者洫之虛者實之管子曰善罪身者民不得罪也不能罪身者民罪之故稱身之過者強也治身之節者惠也不以不善歸人者仁也故明王有過則反之於身有善則歸之於民有過而反之身則身懼有善而歸之民則民喜往喜民來懼身此明王之所以治民也今夫桀紂不然有善則反之於身有過則歸之於民歸之於民則民怒反之於身則身驕往怒民來驕身此其所以失身也故明王懼聲以感耳懼氣以感目以此二者有天下矣可毋慎乎匠人有以感斤欘故繩可得料也羿有以感弓矢故彀可得中也造父有以感轡策故遬獸可及遠道可致天下者無常亂無常治不善人在則亂善人在則治在於既善所以感之也管子曰修恭遜敬愛辭讓除怨無爭以相逆也則不失於人矣嘗試多怨爭利相為不遜則不得其身大哉恭遜敬愛之道吉事可以入祭凶事可以居喪大以理天下而不益也小以治一人而不損也嘗試往之中國諸夏蠻夷之國以及禽獸昆蟲皆待此而為治亂澤之身則榮去之身則辱審行之身毋怠雖夷貉之民可化而使之愛審去之身雖兄弟父母可化而使之惡故身者使之愛惡名者使之榮辱此其變名物也如天如地故先王曰道管仲有病桓公往問之曰仲父之病病矣若不可諱而不起此病也仲父亦將何以詔寡人管仲對曰微君之命臣也故臣且謁之雖然君猶不能行也公曰仲父命寡人東寡人東令寡人西寡人西仲父之命於寡人寡人敢不從乎管仲攝衣冠起對曰臣願君之遠易牙豎刁堂巫公子開方夫易牙以調味事公公曰惟蒸嬰兒之未嘗於是蒸其首子而獻之公人情非不愛其子也於子之不愛將何有於公公喜內而妬豎刁自刑而為公治內人情非不愛其身也於身之不愛將何有於公公子開方事公十五年不歸視其親齊衛之閒不容數日之行臣聞之務為不久蓋虛不長其生不良者其死必不終桓公曰善管仲死已葬公憎四子者廢之官逐堂巫而苛病起逐易牙而味不至逐豎刁而宮中亂逐公子開方而朝不治桓公曰嗟聖人固有悖乎乃復四子者處朞年四子作難圍公一室不得出有一婦人遂從竇入得至公所公曰吾飢而欲食渴而欲飲不可得其故何也婦人對曰易牙豎刁堂巫公子開方四人分齊國塗十日不通矣公子開方以書社七百下衛矣食將不得矣公曰嗟茲乎聖人之言長乎哉死者無知則已若有知吾何面目以見仲父於地下乃援素幭以裹首而絶死十一日蟲出於戶乃知桓公之死也葬以楊門之扇桓公之所以身死十一日蟲出戶而不收者以不終用賢也桓公管仲鮑叔牙寧戚四人飲飲酣桓公謂鮑叔牙曰闔不起為寡人壽乎鮑叔牙奉杯而起曰使公毋忘出如莒時也使管子毋忘束縛在魯也使寧戚毋忘飯牛車下也桓公辟席再拜曰寡人與二大夫能無忘夫子之言則國之社稷必不危矣四稱第三十三短語七桓公問於管子曰寡人幼弱惛愚不通諸侯四鄰之義仲父不當盡語我昔者有道之君乎吾亦鑒焉管子對曰夷吾之所能與所不能盡在君所矣君胡有辱令桓公又問曰仲父寡人幼弱惛愚不通四鄰諸侯之義仲父不當盡告我昔者有道之君乎吾亦鑒焉管子對曰夷吾聞之於徐伯曰昔者有道之君敬其山川宗廟社稷及至先故之大臣收聚以德而大富之固其武臣宣用其力聖人在前貞廉在側競稱於義上下皆飾形正明察四時不貸民亦不憂五穀蕃殖外內均和諸侯臣服國家安寧不用兵革受其幣帛以懷其德昭受其令以為法式此亦可謂昔者有道之君也桓公曰善哉桓公曰仲父既已語我昔者有道之君矣不當盡語我昔者無道之君乎吾亦鑒焉管子對曰今若君之美好而宣通也既官職美道又何以聞惡為桓公曰是何言邪以緇緣緇吾何以知其美也以素緣素吾何以知其善也仲父已語我其善而不語我其惡吾豈知善之為善也管子對曰夷吾聞之於徐伯曰昔者無道之君大其宮室高其臺榭良臣不使讒賊是舍有國不治借人為圖政令不善墨墨若夜辟若野獸無所就處不循天道不鑒四方有家不治辟若生狂衆所怨詛希不滅亡進其俳優繁其鍾鼓流於博塞戲其工瞽誅其良臣敖其婦女獠獵畢弋暴遇諸父馳騁無度戲樂笑語式政既輮刑罰則烈內削其民以為攻伐辟猶漏釜豈能無竭此亦可謂昔者無道之君矣桓公曰善哉桓公曰仲父既已語我昔者有道之君與昔者無道之君矣仲父不當盡語我昔者有道之臣乎吾以鑒焉管子對曰夷吾聞之徐伯曰昔者有道之臣委質為臣不賓事左右君知則仕不知則已若有事必圖國家遍其發揮循其祖德辨其順逆推育賢人讒慝不作事君有義使下有禮貴賤相親若兄若弟忠於國家上下得體居處則思語言則謀動作則事居國則富處軍則克臨難據事雖死不悔近君為拂遠君為輔義以與交廉以與處臨官則治酒食則辭不謗其君不諱其辭君若有過進諫不疑君若有憂則臣服之此亦可謂昔者有道之臣矣桓公曰善哉桓公曰仲父既以語我昔者有道之臣矣不當盡語我昔者無道之臣乎吾亦鑒焉管子對曰夷吾聞之於徐伯曰昔者無道之臣委質為臣賓事左右執說以進不蘄亡己遂進不退假寵鬻貴尊其貨賄卑其爵位進曰輔之退曰不可以敗其君皆曰非我不仁群處以攻賢者見貴若貨見賤若過貪於貨賄競於酒食不與善人唯其所事倨敖不恭不友善士讒賊與通不彌人爭唯趣人訟湛湎於酒行義不從不修先故變易國常擅創為令迷或其君生奪之政保貴寵矜遷捐善士輔援貨人入則乘等出則黨駢貨賄相入酒食相親俱亂其君君若有禍各奉其身此亦謂昔者無道之臣桓公曰善哉短語八篇亡
