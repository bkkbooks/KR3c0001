body:
  text: 入國第五十四雜篇五入國四旬五行九惠之教一曰老老二曰慈幼三曰恤孤四曰養疾五曰合獨六曰問病七曰通窮八曰振困九曰接絶所謂老老者凡國都皆有掌老年七十已上一子無征三月有饋肉八十已上二子無征月有饋肉九十以上盡家無征日有酒肉死上共棺椁勸子弟精膳食問所欲求所嗜此之謂老老所謂慈幼者凡國都皆有掌幼士民有子子有幼弱不勝養為纍者有三幼者無婦征四幼者盡家無征五幼又豫之葆受二人之食能事而后止此之謂慈幼所謂恤孤者凡國都皆有掌孤士民死子孤幼無父母所養不能自生者屬之其鄉黨知識故人養一孤者一子無征養二孤者二子無征養三孤者盡家無征掌孤數行問之必知其食飲飢寒身之膌勝而哀憐之此之謂恤孤所謂養疾者凡國都皆有掌養疾聾盲喑啞跛躄遍枯握遞不耐自生者上收而養之疾官而衣食之殊身而后止此之謂養疾所謂合獨者凡國都皆有掌媒丈夫無妻曰鰥婦人無夫曰寡取鰥寡而合和之豫田宅而家室之三年然后事之此之謂合獨所謂問病者凡國都皆有掌病士人有病者掌病以上令問之九十以上日一問八十已上二日一問七十以上三日一問衆庶五日一問疾甚者以告上身問之掌病行於國中以問病為事此之謂問病所謂通窮者凡國都皆有通窮若有窮夫婦無居處窮賓客絶糧食居其鄉黨以聞者有賞不以聞者有罰此之謂通窮所謂振困者歲凶庸人訾厲多死喪弛刑罰赦有罪散倉粟以食之此之謂振困所謂接絶者士民死上事死戰事使其知識故人受資於上而祠之此之謂接絶也九守第五十五雜篇六安徐而靜柔節先定虛心平意以待須右主位目貴明耳貴聰心貴智以天下之目視則無不見也以天下之耳聽則無不聞也以天下之心慮則無不知也輻湊並進則明不塞矣右主明聽之術曰勿望而距勿望而許許之則失守距之則閉塞高山仰之不可極也深淵度之不可測也神明之德正靜其極也右主聽用賞者貴誠用刑者貴必刑賞信必於耳目之所見則其所不見莫不暗化矣誠暢乎天地通於神明兄姦偽也右主賞一曰天之二曰地之三曰人之四方上下左右前後熒惑之處安在右主問心不為九竅九竅治君不為五官五官治為善者君豫之賞為非者君豫之罰君因其所以來因而豫之則不勞矣聖人因之故能掌之因之循理故能長久右主因人主不可不周人主不周則群臣下亂寂乎其無端也外內不通安知所怨關閉不開善否無原右主周一曰長目二曰飛耳三曰樹明明知千里之外隱微之中曰動姦姦動則變更矣右主參循名而督實按實而定名名實相生反相為情名實當則治不當則亂名生於實實生於德德生於理理生於智智生於當右督名桓公問第五十六雜篇七齊桓公問管子曰吾念有而勿失得而勿亡為之有道乎對曰勿創勿作時至而隨毋以私好惡害公正察民所惡以自為戒黃帝立明臺之議者上觀於賢也堯有衢室之問者下聽於人也舜有告善之旌而主不蔽也禹立建鼓於朝而備訊也湯有總街之庭以觀人誹也武王有靈臺之復而賢者進也此古聖帝明王所以有而勿失得而勿忘者也桓公曰吾欲效而為之其名云何對曰名曰嘖室之議曰法簡而易行刑審而不犯事約而易從求寡而易足人有非上之所過謂之正士內於嘖室之議有司執事者咸以厥事奉職而不忘為此嘖室之事也請以東郭牙為之此人能以正事爭於君前者也桓公曰善度地第五十七雜篇八昔者桓公問管仲曰寡人請問度地形而為國者其何如而可管仲對曰夷吾之所聞能為霸王者蓋天下聖人也故聖人之處國者必於不傾之地而擇地形之肥饒者鄉山左右經水若澤內為落渠之寫因大川而注焉地乃以其天材之所生利養其人以育六畜天子之人皆歸其德而惠其義乃別制斷之州者謂之術不滿術者謂之里故百家為里里十為術術十為州州十為都都十為霸國不如霸國者國也以奉天子天子有萬諸侯也其中有公侯伯子男焉天子中而處此謂因天之材歸地之利內為之城城外為之郭郭外為之土閬地高則溝之下則堤之命之曰金城樹以荊棘上相穡著者所以為固也歲修增而毋已時修增而無已福及孫子此謂人命萬世無窮之利人君之葆守也臣服之以盡忠於君君體有之以臨天下故能為天下之民先也此宰之任則臣之義也故善為國者必先除其五害人乃終身無患害而孝慈焉桓公曰願聞五害之説管仲對曰水一害也旱一害也風霧雹霜一害也厲一害也蟲一害也此謂五害五害之屬水最為大五害已除人乃可治桓公曰願聞水害管仲對曰水有大小又有遠近水之出於山而流入於海者命曰經水水別於他水入於大水及海者命曰枝水山之溝一有水一毋水者命曰谷水水之出於地流於大水及海者命曰川水出地而不流者命曰淵冰此五水者因其利而往之可也因而扼之可也而不久常有危殆矣桓公曰水可扼而使東西南北及高乎管仲對曰可夫水之性以高走下則疾至於漂石而下向高即留而不行故高其上領瓴之尺有十分之三里滿四十九者水可走也乃迂其道而遠之以勢行之水之性行至曲必留退滿則後推前地下則平行地高即控杜曲則搗毀杜曲激則躍躍則倚倚則環環則中中則涵涵則塞塞則移移則控控則水妄行水妄行則傷人傷人則困困則輕法輕法則難治難治則不孝不孝則不臣矣故五害之屬傷殺之類禍福同矣知備此五者人君天地矣桓公曰請問備五害之道管子對曰除五害以水為始請為置水官令習水者為吏大夫大夫佐各一人率部校長官佐各財足乃取水左右各一人使為都匠水工令之行水道城郭堤川溝池官府寺舍及州中當繕治者給卒財足令曰常以秋歲末之時閲其民案家人比地定什伍口數別男女大小其不為用者輒免之有錮病不可作者疾之可省作者半事之并行以定甲士當被兵之數上其都都以臨下視有餘不足之處輒下水官水官亦以甲士當被兵之數與三老里有司伍長行里因父母案行閲具備水之器以冬無事之時籠臿板築各什六土車什一雨軬什二食器兩具人有之錮藏里中以給喪器後常令水官吏與都匠因三老里有司伍長案行之出常以朔日始閲具之取完堅補弊久去苦惡常以冬少事之時令甲士以更次益薪積之水旁州大夫將之唯毋後時其積薪也以事之已其作土也以事未起天地和調日有長久以此觀之其利百倍故常以毋事具器有事用之水常可制而使毋敗此謂素有備而豫具者也桓公曰當何時作之管子曰春三月天地乾燥水糾列之時也山川涸落天氣下地氣上萬物交通故事已新事未起草木荑生可食寒暑調日夜分分之後夜日益短晝日益長利以作土功之事土乃益剛令甲士作堤大水之旁大其下小其上隨水而行地有不生草者必為之囊大者為之堤小者為之防夾水四周禾稼不傷歲埤增之樹以荊棘以固其地雜之以柏楊以備決水民得其饒是謂流膏令下貧守之往往而為界可以毋敗當夏三月天地氣壯大暑至萬物榮華利以疾𧂭殺草薉使令不欲擾命曰不長不利作土功之事放農焉利皆耗十分之五土功不成當秋三月山川百泉踊降雨下山水出海路距雨露屬天地湊泊利以疾作收斂毋留一日把百日餔民毋男女皆行於野不利作土功之事濡濕日生土弱難成利耗什分之六土工之事亦不立當冬三月天地閉藏暑雨止大寒起萬物實熟利以填塞空郤繕邊城塗郭術平度量正權衡虛牢獄實廥倉君修樂與神明相望凡一年之事畢矣舉有功賞賢罰有罪遷有司之吏而第之不利作土功之事利耗什分之七土剛不立晝日益短而夜日益長利以作室不利以作堂四時以得四害皆服桓公曰寡人悖不知四害之服奈何管仲對曰冬作土功發地藏則夏多暴雨秋霖不止春不收枯骨朽脊伐枯木而去之則夏旱至矣夏有大露原煙噎下百草人采食之傷人人多疾病而不止民乃恐殆君令五官之吏與三老里有司伍長行里順之令之家起火為溫其田及宮中皆蓋井毋令毒下及食器將飲傷人有下蟲傷禾稼凡天災害之下也君子謹避之故不八九死也大寒大暑大風大雨其至不時者此謂四刑或遇以死或遇以生君子避之是亦傷人故吏者所以教順也三老里有司伍長者所以為率也五者已具民無願者願其畢也故常以冬日順三老里有司伍長以冬賞罰使各應其賞而服其罰五者不可害則君之法犯矣此示民而易見故民不比也桓公曰凡一年之中十二月作土功有時則為之非其時而敗將何以待之管仲對曰常令水官之吏冬時行堤防可治者章而上之都都以春少事作之已作之後常案行堤有毀作大雨各葆其所可治者趣治以徒隸給大雨堤防可衣者衣之衝水可據者據之終歲以毋敗為故此謂備之常時禍何從來所以然者濁水蒙壤自塞而行者江河之謂也歲高其堤所以不沒也春冬取土於中秋夏取土於外濁水入之不能為敗桓公曰善仲父之語寡人畢矣然則寡人何事乎哉亟為寡人教側臣
