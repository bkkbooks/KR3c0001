body:
  text: 法法第十六外言七不法法則事毋常法不法則令不行令而不行則令不法也法而不行則修令者不審也審而不行則賞罰輕也重而不行則賞罰不信也信而不行則不以身先之也故曰禁勝於身則令行於民矣聞賢而不舉殆聞善而不索殆見能而不使殆親人而不固殆同謀而離殆危人而不能殆廢人而復起殆可而不為殆足而不施殆幾而不密殆人主不周密則正言直行之士危正言直行之士危則人主孤而毋內人主孤而毋內則人臣黨而成群使人主孤而毋內人臣黨而成群者此非人臣之罪也人主之過也民毋重罪過不大也民毋大過上毋赦也上赦小過則民多重罪積之所生也故曰赦出則民不敬惠行則過日益惠赦加於民而囹圄雖實殺戮雖繁姦不勝矣故曰邪莫如蚤禁之凡赦者小利而大害者也故久而不勝其禍毋赦者小害而大利者也故久而不勝其福故赦者奔馬之委轡毋赦者痤疽之砭石也文有三侑武毋一赦惠者多赦者也先易而後難久而不勝其禍法者先難而後易久而不勝其福故惠者民之仇讎也法者民之父母也太上以制制度其次失而能追之雖有過亦不甚矣赦過遺善則民不勵有過不赦有善不遺勵民之道於此乎用之矣故曰明君者事斷者也君有三欲於民三欲不節則上位危三欲者何也一曰求二曰禁三曰令求必欲得禁必欲止令必欲行求多者其得寡禁多者其止寡令多者其行寡求而不得則威日損禁而不止則刑罰侮令而不行則下凌上故未有能多求而多得者也未有能多禁而多止者也未有能多令而多行者也故曰上苛則下不聽下不聽而強以刑罰則為人上者衆謀矣為人上而衆謀之雖欲毋危不可得也號令已出又易之禮義已行又止之度量已制又遷之刑法已錯又移之如是則慶賞雖重民不勸也殺戮雖繁民不畏也故曰上無固植下有疑心國無常經民力不竭數也明君在上位民毋敢立私議自貴者國毋怪嚴毋雜俗毋異禮士毋私議倨傲易令錯儀畫制作議者盡誅故強者折鋭者挫堅者破引之以繩墨繩之以誅僇故萬民之心皆服而從上推之而往引之而來彼下有立其私議自貴分爭而退者則令自此不行矣故曰私議立則主道卑矣況夫倨傲易令錯儀畫制變易風俗詭服殊説猶立上不行君令下不合於鄉里變更自為易國之成俗者命之曰不牧之民不牧之民繩之外也繩之外誅使賢者食於能鬭士食於功賢者食於能則上尊而民從鬭士食於功則卒輕患而傲敵上尊而民從卒輕患而傲敵二者設於國則天下治而主安矣爵不尊祿不重者不與圖難犯危以其道為未可以求之也是故先王制軒冕足以著貴賤不求其美設爵祿所以守其服不求其觀也使君子食於道小人食於力君子食於道則上尊而民順小人食於力則財厚而養足上尊而民順財厚而養足四者備體則胥時而王不難矣明君制宗廟足以設賓祀不求其美為宮室臺榭足以避燥濕寒暑不求其大為雕文刻鏤足以辨貴賤不求其觀故農夫不失其時百工不失其功商無廢利民無遊日財無砥墆故曰儉其道乎令未布而民或為之而賞從之則是上妄豫也上妄豫則功臣怨功臣怨而愚民操事於妄作愚民操事於妾作則大亂之本也令未布而罰及之則是上妄誅也上妄誅則民輕生民輕生則暴人興曹黨起而亂賊作矣令已布而賞不從則是使民不勸勉不行制不死節民不勸勉不行制不死節則戰不勝而守不固戰不勝而守不固則國不安矣令已布而罰不及則是教民不聽民不聽則強者立強者立則主位危矣故曰憲律制度必法道號令必著明賞罰必信密此正民之經也凡大國之君尊小國之君卑大國之君所以尊者何也曰為之用者衆也小國之君所以卑者何也曰為之用者寡也然則為之用者衆則尊為之用者寡則卑則人主安能不欲民之衆為己用也使民衆為己用奈何曰法立令行則民之用者衆矣法不立令不行則民之用者寡矣故法之所立令之所行者多而所廢者寡則民不誹議民不誹議則聽從矣法之所立令之所行與其所廢者鈞則國毋常經國毋常經則民妄行矣法之所立令之所行者寡而所廢者多則民不聽民不聽則暴人起而姦邪作矣計上之所以愛民者為用之愛之也為愛民之故不難毀法虧令則是失所謂愛民矣夫以愛民用民則民之不用明矣夫善用民者殺之危之勞之飢之渴之用民者將致之此極也而民毋可與慮害己者明王在上道法行於國民皆舍所好而行所惡故善用民者軒冕不下擬而斧鉞不上因如是則賢者勸而暴人止賢者勸而暴人止則功名立其後矣蹈白刃受矢石入水火以聽上令上令盡行禁盡止引而使之民不敢轉其力推而戰之民不敢愛其死不敢轉其力然后有功不敢愛其死然後無敵進無敵退有功是以三軍之衆皆得保其首領父母妻子完安於內故民未嘗可與慮始而可與樂成功是故仁者知者有道者不與人慮始國無以小與不幸而削亡者必主與大臣之德行失於身也官職法制政教失於國也諸侯之謀慮失於外也故地削而國危矣國無以大與幸而有功名者必主與大臣之德行得於身也官職法制政教得於國也諸侯之謀慮得於外也然后功立而名成然則國何可無道人何可無賢得道而導之得賢而使之將有所大期於興利除害期於興利除害莫急於身而君獨甚傷也必先令之失人主失令而蔽已蔽而劫已劫而弒凡人君之所以為君者勢也故人君失勢則臣制之矣勢在下則君制於臣矣勢在上則臣制於君矣故君臣之易位勢在下也在臣期年臣雖不忠君不能奪也在子期年子雖不孝父不能服也故春秋之記臣有弒其君子有弒其父者矣故曰堂上遠於百里堂下遠於千里門廷遠於萬里今步者一日百里之情通矣堂上有事十日而君不聞此所謂遠於百里也步者十日千里之情通矣堂下有事一月而君不聞此所謂遠於千里也步者百日萬里之情通矣門廷有事期年而君不聞此所謂遠於萬里也故請入而不出謂之滅出而不入謂之絶入而不至謂之侵出而道止謂之壅滅絶侵擁之君者非杜其門而守其戶也為政之有所不行也故曰令重於寶社稷先於親戚法重於民威權貴於爵祿故不為重寶輕號令不為親戚後社稷不為愛民枉法律不為爵祿分威權故曰勢非所以豫人也政者正也正也者所以正定萬物之命也是故聖人精德立中以生正明正以治國故正者所以止過而逮不及也過與不及也皆非正也非正則傷國一也勇而不義傷兵仁而不正傷法故軍之敗也生於不義法之侵也生於不正故言有辨而非務者行有難而非善者故言必中務不苟為辨行必思善不苟為難規矩者方圜之正也雖有巧目利手不如拙規矩之正方圜也故巧者能生規矩不能廢規矩而正方圜雖聖人能生法不能廢法而治國故雖有明智高行倍法而治是廢規矩而正方圜也一曰凡人君之威嚴非德行獨能盡賢於人也曰人君也故從而貴之不敢論其德行之高卑有故為其殺生急於司命也富人貧人使人相畜也貴人賤人使人相臣也人主操此六者以畜其臣人臣亦望此六者以事其君君臣之會六者謂之謀六者在臣期年臣不忠君不能奪在子期年子不孝父不能奪故春秋之記臣有弒其君子有弒其父者得此六者而君父不智也六者在臣則主蔽矣主蔽者失其令也故曰令入而不出謂之蔽令出而不入謂之壅令出而不行謂之牽令入而不至謂之瑕牽瑕蔽壅之君者非敢杜其門而守其戶也為令之有所不行也此其所以然者由賢人不至而忠臣不用也故人主不可以不慎其令令者人主之大寶也一曰賢人不至謂之蔽忠臣不用謂之塞令而不行謂之障禁而不止謂之逆蔽塞障逆之君者不敢杜其門而守其戶也為賢者之不至令之不行也凡民從上也不從口之所言從情之所好者也上好勇則民輕死上好仁則民輕財故上之所好民必甚焉是故明君知民之必以上為心也故置法以自治立儀以自正也故上不行則民不從彼民不服法死制則國必亂矣是以有道之君行法修制先民服也凡論人有要矜物之人無大士焉彼矜者滿也滿者虛也滿虛在物在物為制也矜者細之屬也凡論人而違古者無高士焉既不知古而易其功者無智士焉德行未成於身而遠古卑人也事無資遇時而簡其業者愚士也釣名之人無賢士焉釣利之君無王主焉賢人之行其身也忘其有名也王主之行其道也忘其成功也賢人之行王主之道其所不能已也明君公國一民以聽於世忠臣直進以論其能明君不以祿爵私所愛忠臣不誣能以干爵祿君不私國臣不誣能行此道者雖未大治正民之經也今以誣能之臣事私國之君而能濟功名者古今無之誣能之人易知也臣度之先王者舜之有天下也禹為司空契為司徒皋陶為李后稷為田此四士者天下之賢人也猶尚精一德以事其君今誣能之人服事任官皆兼四賢之能自此觀之功名之不立亦易知也故列尊祿重無以不受也勢利官大無以不從也以此事君此所謂誣能篡利之臣者也世無公國之君則無直進之士無論能之主則無成功之臣昔者三代之相授也安得二天下而私之貧民傷財莫大於兵危國憂主莫速於兵此四患者明矣古今莫之能廢也兵當廢而不廢則惑也不當廢而欲廢之則亦惑也此二者傷國一也黃帝唐虞帝之隆也資有天下制在一人當此之時也兵不廢今德不及三帝天下不順而求廢兵不亦難乎故明君所擅知所患國治而民務積此所謂擅也動與靜此所患也是故明君審其所擅以備其所患也猛毅之君不免於外難懦弱之君不免於內亂猛毅之君者輕誅輕誅之流道正者不安道正者不安則材能之臣去亡矣彼智者知吾情偽為敵謀我則外難自是至矣故曰猛毅之君不免於外難懦弱之君者重誅重誅之過行邪者不革行邪者久而不革則群臣比周群臣比周則蔽美揚惡蔽美揚惡則內亂自是起矣故曰懦弱之君不免於內亂明君不為親戚危其社稷社稷戚於親不為君欲變其令令尊於君不為重寶分其威威貴於寶不為愛民虧其法法愛於民兵法第十七外言八明一者皇察道者帝通德者王謀得兵勝者霸故夫兵雖非備道至德也然而所以輔王成霸今代之用兵者不然不知兵權者也故舉兵之日而境內貧戰不必勝勝則多死得地而國敗此四者用兵之禍者也四禍其國而無不危矣大度之書曰舉兵之日而境內不貧戰而必勝勝而不死得地而國不敗為此四者若何舉兵之日而境內不貧者計數得也戰而必勝者法度審也勝而不死者教器備利而敵不敢校也得地而國不敗者因其民也因其民則號制有發也教器備利則有制也法度審則有守也計數得則有明也治衆有數勝敵有理察數而知理審器而識勝明理而勝敵定宗廟遂男女官四分則可以定威德制法儀出號令然後可以一衆治民兵無主則不蚤知敵野無吏則無蓄積官無常則下怨上器械不功朝無政賞罰不明則民輕其産故曰早知敵則獨行有蓄積則久而不匱器械巧則伐而不費賞罰明則勇士勸也三官不繆五教不亂九章著明則危危而無害窮窮而無難故能致遠以數縱強以制三官一曰鼓鼓所以任也所以起也所以進也二曰金金所以坐也所以退也所以免也三曰旗旗所以立兵也所以制兵也所以偃兵也此之謂三官有三令而兵法治也五教一曰教其目以形色之旗二曰教其耳以號令之數三曰教其足以進退之度四曰教其手以長短之利五曰教其心以賞罰之誠五教各習而士負以勇矣九章一曰舉日章則晝行二曰舉月章則夜行三曰舉龍章則行水四曰舉虎章則行林五曰舉烏章則行陂六曰舉蛇章則行澤七曰舉鵲章則行陸八曰舉狼章則行山九曰舉櫜章則載食而駕九章既定而動靜不過三官五教九章始乎無端卒乎無窮始乎無端者道也卒乎無窮者德也道不可量德不可數也故不可量則衆強不能圖不可數則偽詐不敢嚮兩者備施則動靜有功徑乎不知發乎不意徑乎不知故莫之能禦也發乎不意故莫之能應也故全勝而無害因便而教準利而行教無常行無常兩者備施動乃有功器成教施追亡逐遁若飄風擊刺若雷電絶地不守恃固不枝中處而無敵令行而不留器成教施散之無方聚之不可計教器備利進退若雷電而無所疑匱一氣專定則傍通而不疑厲士利械則涉難而不匱進無所疑退無所匱敵乃為用凌山坑不待鉤梯歷水谷不須舟楫徑於絶地攻於恃固獨出獨入而莫之能止實不獨入而莫之能止實不獨出故莫之能斂無名之至盡盡而不意故不能疑神畜之以道則民和養之以德則民合和合故能諧諧故能輯諧輯以悉莫之能傷定一至行二要縱三權施五教發四機設六行論七數守八應審九章章十號故能全勝大勝無守也故能守勝數戰則士罷數勝則君驕夫以驕君使罷民則國安得無危故至善不戰其次一之破大勝強一之至也亂之不以變乘之不以詭勝之不以詐一之實也近則用實遠則施號力不可量強不可度氣不可極德不可測一之原也衆若時雨寡若飄風一之終也制適器之至也用適教之盡也不能致器者不能利適不能盡教者不能用適不能用敵者窮不能致器者困速用兵而可以必勝出入異塗則傷其敵深入危之則士自修士自修則同心同力善者之為兵也使敵若據虛若搏景無設無形焉無不可以成也無形無為焉無不可以化也此之謂道矣若亡而存若後而先威不足以命之
