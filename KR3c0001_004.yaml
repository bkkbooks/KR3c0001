body:
  text: 宙合第十一外言二左操五音右執五味懷繩與准鉤多備規軸減溜大成是唯時德之節春采生秋采蓏夏處陰冬處陽大賢之德長明乃哲哲乃明奮乃苓明哲乃大行毒而無怒怨而無言欲而無謀大揆度儀若覺臥若晦明若敖之在堯也毋訪于佞毋蓄于諂毋育于凶毋監于讒不正廣其荒不用其區區鳥飛准繩讂充末衡易政利民毋犯其凶毋邇其求而遠其憂高為其居危顛莫之救可淺可深可浮可沈可曲可直可言可默天不一時地不一利人不一事可正而視定而履深而迹夫天地一險一易若鼓之有桴擿擋則擊天地萬物之橐宙合有橐天地左操五音右執五味此言君臣之分也君出令佚故立于左臣任力勞故立于右夫五音不同聲而能調此言君之所出令無妄也而無所不順順而令行政成五味不同物而能和此言臣之所任力無妄也而無所不得得而力務財多故君出令正其國而無齊其欲一其愛而無獨與是王施而無私則海內來賓矣臣任力同其忠而無爭其利不失其事而無有其名分敬而無妬則夫婦和勉矣君失音則風律必流流則亂敗臣離味則百姓不養百姓不養則眾散亡君臣各能其分則國寧矣故名之曰不德懷繩與准鉤多備規軸減溜大成是唯時德之節夫繩扶撥以為正准壞險以為平鉤入枉而出直此言聖君賢佐之制舉也博而不失因以備能而無遺國猶是國也民猶是民也桀紂以亂亡湯武以治昌章道以教明法以期民之興善也如化湯武之功是也多備規軸者成軸也夫成軸之多也其處大也不窕其入小也不塞猶迹求履之憲也夫焉有不適善適善備也僊也是以無乏故諭教者取辟焉天淯養無計量地化生無泮崖所謂是而無非非而無是是非有必交來苟信是以有不可先規之必有不可識慮之然將卒而不戒故聖人博聞多見畜道以待物物至而對形曲均存矣減盡也溜發也言偏環畢莫不備得故曰減溜大成成功之術必有巨矱必周於德審於時時德之遇事之會也若合符然故曰是唯時德之節春采生秋采蓏夏處陰冬處陽此言聖人之動靜開闔詘信浧儒取與之必因於時也時則動不時則靜是以古之士有意而未可陽也故愁其治言陰愁而藏之也賢人之處亂世也知道之不可行則沈抑以辟罰靜默以侔免辟之也猶夏之就凊冬之就溫焉可以無反於寒暑之菑矣非為畏死而不忠也夫強言以為僇而功澤不加進傷為人君嚴之義退害為人臣者之生其為不利彌甚故退身不舍端脩業不息版以待清明故微子不與於紂之難而封於宋以為殷主先祖不滅後世不絕故曰大賢之德長明乃哲哲乃明奮乃苓明哲乃大行此言擅美主盛自奮也以琅湯凌轢人人之敗也常自此是故聖人著之𥳑筴傳以告後進曰奮盛苓落也盛而不落者未之有也故有道者不平其稱不滿其量不依其樂不致其度爵尊即肅士祿豐則務施功大而不伐業明而不矜夫名實之相怨久矣是故絕而無交惠者知其不可兩守乃取一焉故安而無憂毒而無怒此言止忿速濟也怨而無言言不可不慎也言不周密反傷其身欲而無謀言謀不可以泄謀泄菑極夫行忿速遂沒法賊發言輕謀泄菑必及於身故曰毒而無怒怨而無言欲而無謀大揆度儀若覺臥若晦明言淵色以自詰也靜默以審慮也依賢才用仁良既明通於可不利害之理猶發蒙也故曰若覺臥若晦明若敖之在堯也毋訪于佞言毋用佞人也用佞人則私多行毋蓄于諂言毋聽諂聽諂則欺上毋育于凶言毋使暴使暴則傷民毋監于讒言毋聽讒聽讒則失士夫行私欺上傷民失士此四者用所以害君義失正也夫為君上者既失其義正而倚以為名譽為臣者不忠而邪以趨爵祿亂俗敗世以偷安懷樂雖廣其威可須也故曰不正廣其荒是以古之人阻其路塞其遂守而物修故著之簡筴傳以告後世人曰其為怨也深是以威盡焉不用其區區者虛也人而無良焉故曰虛也凡堅解而不動陼隄而不行其於時必失失則廢而不濟天植之正而不謬不可賢也直而無能不可美也所賢美於聖人者以其與變隨化也淵泉而不盡微約而流施是以德之流潤澤均加于萬物故曰聖人參于天地鳥飛准繩此言大人之義也夫鳥之飛也必還山集谷不還山則困不集谷則死山與谷之處也不必正直而還山集谷曲則曲矣而名繩焉以為鳥起於北意南而至于南起於南意北而至于北苟大意得不以小缺為傷故聖人美而著之曰千里之路不可扶以繩萬家之都不可平以准言大人之行不必以先常義立之謂賢故為上者之論其下也不可以失此術也讂充言心也心欲忠末衡言耳目也耳目欲端中正者治之本也耳司聽聽必順聞聞審謂之聰目司視視必順見見察謂之明心司慮慮必順言言得謂之知聰明以知則博博而不惛所以易政也政易民利利乃勸勸則吉聽不慎不審不聰不審不聰則繆視不察不明不察不明則過慮不得不知不得不知則昏繆過以惛則憂憂則所以伎苛伎苛所以險政政險民害害乃怨怨則凶故曰讂充末衡言易政利民也毋犯其凶言中正以蓄慎也毋邇其求言上之敗常貪於金玉馬女而𠫤愛於粟米貨財也厚藉斂于百姓則萬民懟怨遠其憂言上之亡其國也常邇其樂立優美而外淫于馳騁田獵內縱于美色淫聲下乃解怠惰失百吏皆失其端則煩亂以亡其國家矣高為其居危顛莫之救此言尊高滿大而好矜人以麗主盛處賢而自予雄也故盛必失而雄必敗夫上既主盛處賢以操士民國家煩亂萬民心怨此其必亡也猶自萬仞之山播而入深淵其死而不振也必故曰毋邇其求而遠其憂高為其居危顛莫之救也可淺可深可沈可浮可曲可直可言可默此言指意要功之謂也天不一時地不一利人不一事是以著業不得不多分名位不得不殊方明者察于事故不官于物而旁通于道道也者通乎無上詳乎無窮運乎諸生是故辯于一言察于一治攻于一事者可以曲說而不可以廣舉聖人由此知言之不可兼也故博為之治而計其意知事之不可兼也故名為之說而況其功歲有春秋冬夏月有上下中旬日有朝暮夜有昏晨半星辰序各有其司故曰天不一時山陵岑巖淵泉閎流泉踰瀷而不盡薄承瀷而不滿高下肥墝物有所宜故曰地不一利鄉有俗國有法食飲不同味衣服異采世用器械規矩繩准稱量數度品有所成故曰人不一事此各事之儀其詳不可盡也可正而視言察美惡別良苦不可以不審操分不雜故政治不悔定而履言處其位行其路為其事則民守其職而不亂故葆統而好終深而迹言明墨章畫道德有常則後世人人循理而不迷故名聲不息夫天地一險一易若鼓之有桴擿擋則擊言苟有唱之必有和之和之不差因以盡天地之道景不為曲物直響不為惡聲美是以聖人明乎物之性者必以其類來也故君子繩繩乎慎其所先天地萬物之橐也宙合有橐天地天地苴萬物故曰萬物之橐宙合之意上通於天之上下泉於地之下外出於四海之外合絡天地以為一裹散之至于無閒不可名而止是大之無外小之無內故曰有橐天地其義不傳一典品之不極一薄然而典品無治也多內則富時出則當而聖人之道貴富以當奚謂當本乎無妄之治運乎無方之事應變不失之謂當變無不至無有應當本錯不敢忿故言而名之曰宙合樞言第十二外言三管子曰道之在天者日也其在人者心也故曰有氣則生無氣則死生者以其氣有名則治無名則亂治者以其名樞言曰愛之利之益之安之四者道之出帝王者用之而天下治矣帝王者審所先所後先民與地則得矣先貴與驕則失矣是故先王慎所先所後人主不可以不慎貴不可以不慎民不可以不慎富慎貴在舉賢慎民在置官慎富在務地故人主之卑尊輕重在此三者不可不慎國有寶有器有用城郭險阻蓄藏寶也聖智器也珠玉末用也先王重其寶器而輕其用故能為天下生而不死者二亡而不立者四喜也者怒也者惡也者欲也者天下之敗也而賢者寡之為善者非善也故善無以為也故先王貴善王主積于民霸主積于將戰士衰主積于貴人亡主積于婦女珠玉故先王慎其所積疾之疾之萬物之師也為之為之萬物之時也強之強之萬物之脂也凡國有三制有制人者有為人之所制者有不能制人人亦不能制者何以知其然德盛義尊而不好加名於人人眾兵強而不以其國造難生患天下有大事而好以其國後如此者制人者也德不盛義不尊而好加名于人人不眾兵不強而好以其國造難生患恃與國幸名利如此者人之所制也人進亦進人退亦退人勞亦勞人佚亦佚進退勞佚與人相胥如此者不能制人人亦不能制也愛人甚而不能利也憎人甚而不能害也故先王貴當貴周周者不出于口不見于色一龍一蛇一日五化之謂周故先王不以一過二先王不獨舉不擅功先王不約束不結紐約束則解結紐則絕故親不在約束結紐先王不貨交不列地以為天下天下不可改也而可以鞭菙使也時也義也出為之也餘目不明餘耳不聰是以能繼天子之容官職亦然時者得天義者得人既時且義故能得天與人先王不以勇猛為邊竟則邊竟安邊竟安則鄰國親鄰國親則舉當矣人故相憎也人之心悍故為之法法出于禮禮出于治治禮道也萬物待治禮而后定凡萬物陰陽兩生而參視先王因其參而慎所入所出以卑為卑卑不可得以尊為尊尊不可得桀舜是也先王之所以最重也得之必生失之必死者何也唯無得之堯舜禹湯文武孝己斯待以成天下必待以生故先王重之一日不食比歲歉三日不食比歲飢五日不食比歲荒七日不食無國土十日不食無疇類盡死矣先王貴誠信誠信者天下之結也賢大夫不恃宗室士不恃外權坦坦之利不以功坦坦之備不為用故存國家定社稷在卒謀之閒耳聖人用其心沌沌乎博而圜豚豚乎莫得其門紛紛乎若亂絲逡逡乎若有從治故曰欲知者知之欲利者利之欲勇者勇之欲貴者貴之彼欲貴我貴之人謂我有禮彼欲勇我勇之人謂我恭彼欲利我利之人謂我仁彼欲知我知之人謂我慜戒之戒之微而異之動作必思之無令人識之卒來者必備之信之者仁也不可欺者智也既智且仁是謂成人賤固事貴不肖固事賢貴之所以能成其貴者以其貴而事賤也賢之所以能成其賢者以其賢而事不肖也惡者美之充也卑者尊之充也賤者貴之充也故先王貴之天以時使地以材使人以德使鬼神以祥使禽獸以力使所謂德者先之之謂也故德莫如先應適莫如後先王用一陰二陽者霸盡以陽者王以一陽二陰者削盡以陰者亡量之不以少多稱之不以輕重度之不以短長不審此三者不可舉大事能戒乎能勑乎能隱而伏乎能而稷乎能而麥乎春不生而夏無得乎先王事以合交德以合人二者不合則無成矣無親矣凡國之亡也以其長者也人之自失也以其所長者也故善游者死于梁池善射者死于中野命屬于食治屬于事無善事而有善治者自古及今未嘗之有眾勝寡疾勝徐勇勝怯智勝愚善勝惡有義勝無義有天道勝無天道凡此七勝者貴眾用之終身者眾矣人主好佚欲亡其身失其國者殆其德不足以懷其民者殆明其刑而賤其士者殆諸侯假之威久而不知極己者殆身彌老不知敬其適子者殆蓄藏積陳朽腐不以與人者殆凡人之名三有治也者有恥也者有事也者事之名二正之察之五者而天下治矣名正則治名倚則亂無名則死故先王貴名先王取天下遠者以禮近者以體體禮者所以取天下遠近者所以殊天下之際日益之而患少者惟忠日損之而患多者惟欲多忠少欲智也為人臣者之廣道也為人臣者非有功勞于國也家富而國貧為人臣者之大罪也為人臣者非有功勞于國也爵尊而主卑為人臣者之大罪也無功勞于國而貴富者其唯尚賢乎眾人之用其心也愛者憎之始也德者怨之本也其事親也妻子具則孝衰矣其事君也有好業家室富足則行衰矣爵祿滿則忠衰矣唯賢者不然故先王不滿也釜鼓滿則人概之人滿則天概之故先王不滿也人主操逆人臣操順先王重榮辱榮辱在為天下無私愛也無私憎也為善者有福為不善者有禍禍福在為故先王重為明賞不費明刑不暴賞罰明則德之至者也故先王貴明天道大而帝王者用愛惡愛惡天下可祕閉必固先王之書心之敬執也而眾人不知也故有事事也毋事亦事也吾畏事不欲為事吾畏言不欲為言故行年六十而老吃也
