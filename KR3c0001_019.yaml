body:
  text: 地員第五十八雜篇九夫管仲之匡天下也其施七尺瀆田息徒五種無不宜其立后而垂實其木宜蚖菕與杜松其草宜楚棘見是土也命之曰五施五七三十五尺而至於泉呼音中角其水倉其民彊赤壚歷彊肥五種無不宜其麻白其布黃其草宜白茅與雚其木宜赤棠見是土也命之曰四施四七二十八尺而至於泉呼音中商其水白而甘其民壽黃唐無宜也唯宜黍秫也宜縣澤行牆落地潤數毀難以立邑置牆其草宜𦬸與茅其木宜櫄擾桑見是土也命之曰三施三七二十一尺而至於泉呼音中宮其泉黃而糗流徙斥埴宜大菽與麥雚其草宜萯其木宜杞見是土也命之曰再施二七十四尺而至於泉呼音中羽其泉鹹水流徙黑埴宜稻麥其草宜蘋蓨其木宜白棠見是土也命之曰一施七尺而至於泉呼音中徵其水黑而苦凡聽徵如負猪豕覺而駭凡聽羽如鳴馬在野凡聽宮如牛鳴窖中凡聽商如離群羊凡聽角如雉登木以鳴音疾以清凡將起五音凡首先主一而三之四開以合九九以是生黃鍾小素之首以成宮三分而益之以一為百有八為徵不無有三分而去其乘適足以是生商有三分而復於其所以是成羽有三分去其乘適足以是成角墳延者六施六七四十二尺而至於泉陜之旁七施七七四十九尺而至於泉厄陜八施七八五十六尺而至於泉杜陵九施七九六十三尺而至於泉延陵十施七十尺而至於泉環陵十一施七十七尺而至於泉蔓山十二施八十四尺而至於泉付山十三施九十一尺而至於泉付山白徒十四施九十八尺而至於泉中陵十五施百五尺而至於泉青山十六施百一十二尺而至於泉青龍之所居庚泥不可得泉赤壤磝山十七施百一十九尺而至於泉其下青商不可得泉𨹫山白壤十八施百二十六尺而至於泉其下駢石不可得泉陡山十九施百三十三尺而至於泉其下有灰壤不可得泉高陵土山二十施百四十尺而至於泉山之上命之曰縣泉其地不乾其草如茅與走其木乃樠鑿之二尺乃至於泉山之上命曰復呂其草魚腸與蕕其木乃柳鑿之三尺而至於泉山之上命之曰泉英其草蘄白昌其木乃楊鑿之五尺而至於泉山之側其草兢與薔其木乃格鑿之二七十四尺而至於泉山之側其草葍與蔞其木乃區榆鑿之三七二十一尺而至於泉凡草土之道各有穀造或高或下各有草土葉下於𩏴𩏴下於莞莞下於蒲蒲下於葦葦下於雚雚下於蔞蔞下於荓荓下於蕭蕭下於薜薜下於萑萑下於茅凡彼草物有十二衰各有所歸九州之土為九十物每土有常而物有次群土之長是唯五粟五粟之物或赤或青或白或黑或黃五粟五章五粟之狀淖而不韌剛而不觳不濘車輪不汙手足其種大重細重白莖白秀無不宜也五粟之土若在陵在山在隫在衍其陰其陽盡宜桐柞莫不秀長其榆其柳其檿其桑其柘其櫟其槐其楊群木蕃滋數大條直以長其澤則多魚牧則宜牛羊其地其樊俱宜竹箭藻龜楢檀五臭生之薜荔白芷蘪蕪椒連五臭所校寡疾難老士女皆好其民工巧其泉黃白其人夷姤五粟之土乾而不挌湛而不澤無高下葆澤以處是謂粟土粟土之次曰五沃五沃之物或赤或青或黃或白或黑五沃五物五沃五物各有異則五沃之狀剽怷橐土蟲易全處怷剽不白下乃以澤其種大苗細苗赨莖黑秀箭長五沃之土若在丘在山在陵在岡若在陬陵之陽其左其右宜彼群木桐柞枎櫄及彼白梓其梅其杏其桃其李其秀生莖起其棘其棠其槐其楊其榆其桑其杞其枋群木數大條直以長其陰則生之楂藜其陽安樹之五麻若高若下不擇疇所其麻大者如箭如葦大長以美其細者如雚如蒸欲有與各大者不類小者則治揣而藏之若衆練絲五臭疇生蓮輿蘪蕪藁本白芷其澤則多魚牧則宜牛羊其泉白青其人堅徑寡有疥騷終無痟酲五沃之土乾而不斥湛而不澤無高下葆澤以處是謂沃土沃土之次曰五位五位之物五色雜英各有異章五位之狀不塥不灰青怷以菭及其種大葦無細葦無赨莖白秀五位之土若在岡在陵在隫在衍在丘在山皆宜竹箭藻龜楢檀其山之淺有蘢與介群木安逐條長數大其桑其松其杞其茸種木胥容榆桃柳棟群藥安生薑與桔梗小辛大蒙其山之梟多桔符榆其山之末有箭與苑其山之旁有彼黃虻及彼白昌山藜葦芒群藥安聚以圉民殃其林其漉其槐其棟其柞其穀群木安逐鳥獸安族既有麋麃又且多鹿其泉青黑其人輕直省事少食無高下葆澤以處是謂位土位土之次曰五隱五隱之狀黑土黑菭青怵以肥芬然若灰其種櫑葛赨莖黃秀恚目其葉若苑以蓄殖果木不若三土以十分之二是謂隱土隱土之次曰五壤五壤之狀芬然若澤若屯土其種大水腸細水腸赨莖黃秀以慈忍水旱無不宜也蓄殖果木不若土以十分之二是謂壤土壤土之次曰五浮五浮之狀捍然如米以葆澤不離不坼其種忍蘟忍葉如雚葉以長狐茸黃莖黑莖黑秀其粟大無不宜也蓄殖果木不如三土以十分之二凡上土三十物種十二物中土曰五怷五怷之狀廩焉如壏潤濕以處其種大稷細稷赨莖黃秀慈忍水旱細粟如麻蓄殖果木不若三土以十分之三怷土之次曰五纑五纑之狀彊力剛堅其種大邯鄲細邯鄲莖葉如枎櫄其粟大蓄殖果木不若三土以十分之三纑土之次曰五壏五壏之狀芬焉若糠以肥其種大荔細荔青莖黃秀蓄殖果木不若三土以十分之三壏土之次曰五剽五剽之狀華然如芬以脤其種大秬細秬黑莖青秀蓄殖果木不若三土以十分之四剽土之次曰五沙五沙之狀粟焉如屑塵厲其種大萯細萯白莖青秀以蔓蓄殖果木不如三土以十分之四沙土之次曰五塥五塥之狀纍然如僕纍不忍水旱其種大穋細穋黑莖黑秀蓄殖果木不若三土以十分之四凡中土三十物種十二物下土曰五猶五猶之狀如糞其種大華細華白莖黑秀蓄殖果木不如三土以十分之五猶土之次曰五壯五壯之狀如鼠肝其種青梁黑莖黑秀蓄殖果木不如三土以十分之五𢎳壯土之次曰五殖五殖之狀甚澤以疏離坼以臞塉其種鴈膳黑實朱跗黃實蓄殖果木不如三土以十分之六五殖之次曰五觳五觳之狀婁婁然不忍水旱其種大菽細菽多白實蓄殖果木不如三土以十分之六觳土之次曰五舄五舄之狀堅而不骼其種陵稻黑鵝馬夫蓄殖果木不如三土以十分之七舄土之次曰五桀五桀之狀甚鹹以苦其物為下其種白稻長狹蓄殖果木不如三土以十分之七凡下土三十物其種十二物凡土物九十其種三十六弟子職第五十九雜篇十先生施教弟子是則溫恭自虛所受是極見善從之聞義則服溫柔孝悌毋驕恃力志毋虛邪行必正直游居有常必就有德顏色整齊中心必式夙興夜寐衣帶必飭朝益暮習小心翼翼一此不解是謂學則少者之事夜寐蚤作既拚盥漱執事有恪攝衣共盥先生乃作沃盥徹盥泛拚正席先生乃坐出入恭敬如見賓客危坐鄉師顏色毋怍受業之紀必由長始一周則然其餘則否始誦必作其次則已凡言與行思中以為紀古之將興者必由此始後至就席狹坐則起若有賓客弟子駿作對客無讓應且遂行趨進受命所求雖不在必以反命反坐復業若有所疑捧手問之師出皆起至於食時先生將食弟子饌饋攝衽盥漱跪坐而饋置醬錯食陳膳毋悖凡置彼食鳥獸魚鱉必先菜羹羹胾中別胾在醬前其設要方飯是為卒左酒右漿告具而退捧手而立三飯二斗左執虛豆右執挾匕周還而二唯嗛之視同嗛以齒周則有始柄尺不跪是謂二紀先生已食弟子乃徹趨走進漱拚前斂祭先生有命弟子乃食以齒相要坐必盡席飯必捧𢱯羹不以手亦有據膝毋有隱肘既食乃飽循咡覆手振衽掃席已食者作摳衣而降旋而鄉席各徹其餽如於賓客既徹并器乃還而立凡拚之道實水于盤攘臂袂及肘堂上則播灑室中握手執箕膺揲厥中有帚入戶而立其儀不貸執帚下箕倚于戶側凡拚之紀必由奧始俯仰磬折拚毋有徹拚前而退聚於戶內坐板排之以葉適己實帚于箕先生若作乃興而辭坐執而立遂出棄之既拚反立是協是稽暮食復禮昏將舉火執燭隅坐錯揔之法橫于坐所櫛之遠近乃承厥火居句如矩蒸閒容蒸然者處下捧碗以為緒右手執燭左手正櫛有墮代燭交坐毋倍尊者乃取厥櫛遂出是去先生將息弟子皆起敬奉枕席問所何趾俶衽則請有常則否先生既息各就其友相切相磋各長其儀周則復始是謂第子之紀言昭第六十雜篇十一篇亡修身第六十一雜篇十二篇亡問霸第六十二雜篇十三篇亡牧民解第六十三管子解一篇亡
